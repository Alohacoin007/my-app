let groups=[];

function overlapRatio(a,b){ const ix=Math.max(0,Math.min(a.x+a.w,b.x+b.w)-Math.max(a.x,b.x)),
  iy=Math.max(0,Math.min(a.y+a.h,b.y+b.h)-Math.max(a.y,b.y)), inter=ix*iy, amin=Math.min(a.w*a.h,b.w*b.h);
  return amin>0?inter/amin:0; }
function grpTitle(id){ return WIDGET_TITLES[id] || (/^chart\d+$/.test(id)?(layout[id].sym||'Chart'):id); }

  bar.onclick=e=>{ const b=e.target.closest('[data-gid]'); if(!b) return; g.active=b.dataset.gid; renderGroup(g); }; }

  if(!g.ids.includes(dropId)) g.ids.push(dropId);

    const og=groupOf(oid); if(og&&og.active!==oid) return;

/* ŌĢÉŌĢÉ M2 ņŗżņŗ£ņäĖ ĒÄīĒöä ŌĆö ņä£ļ▓ä prices(3s ĒÅ┤ + Realtime ĒæĖņŗ£) + Ēü¼ļ”ĮĒåĀ Binance ļ»Ėļ¤¼ WS ņ¦üĻ▓░(ms).

const fxFeed={ lastRealAt:0, wsAt:{}, realSyms:new Set(), ws:null, rt:null, _t:null,
  SRV2MW:s=>/^(BTC|ETH|SOL|XRP|DOGE)$/.test(s)?s+'USD':s,   // ņä£ļ▓ä Ēü¼ļ”ĮĒåĀ Ē¢ē(BTCŌĆ”) ŌåÆ Ēä░ļ»ĖļäÉ ņŗ¼ļ│╝(BTCUSDŌĆ”)
  mapRows(rows){ const out=[], now=Date.now(); (rows||[]).forEach(p=>{ const mw=this.SRV2MW(p&&p.symbol); if(!MW_WATCH.includes(mw)) return;
    this.realSyms.add(mw);

  async poll(){ try{ if(!(window.AlpexaSync&&AlpexaSync.db)) return;
      try{ if(AlpexaSync.db.functions){ const x=await AlpexaSync.db.functions.invoke('feed',{body:{t:'prices'}});
        if(x&&!x.error&&Array.isArray(x.data)){ this.applyReal(x.data); return; } } }catch(e){}   // 1s ņ║Éņŗ£ Edge ņÜ░ņäĀ(DB Ļ│╝ļČĆĒĢś ļ░®ņ¦Ć)
      const r=await AlpexaSync.db.from('prices').select('symbol,mid,spr_pts'); if(r&&r.data) this.applyReal(r.data);

  startRT(){ try{ if(this.rt||!(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.db.channel)) return;
      this.rt=AlpexaSync.db.channel('fxterm-prices').on('postgres_changes',{event:'*',schema:'public',table:'prices'},m=>{
        const row=m&&m.new; if(row&&row.symbol) this.applyReal([row]); }).subscribe(); }catch(e){} },
  startWS(){ try{ if(this.ws||typeof WebSocket==='undefined') return;
      const MAP={BTCUSD:'btcusdt',ETHUSD:'ethusdt',SOLUSD:'solusdt',XRPUSD:'xrpusdt',DOGEUSD:'dogeusdt'};
      const REV={}; Object.keys(MAP).forEach(k=>REV[MAP[k].toUpperCase()]=k);
      const ws=new WebSocket('wss://data-stream.binance.vision/stream?streams='+Object.values(MAP).map(s=>s+'@bookTicker').join('/'));
      ws.onmessage=ev=>{ try{ const d=JSON.parse(ev.data).data; if(!d||!d.s) return; const sym=REV[d.s]; if(!sym) return;
        const b=+d.b,a=+d.a; if(!(b>0&&a>0)) return; const mid=(a+b)/2, spr=Math.round((a-b)/mid*1e6)/100;   // ņŗżņŖżĒöäļĀłļō£ BPS(crypto-prices ļŗ©ņ£ä ļØĮņŖżĒģØ)
        this.wsAt[sym]=Date.now(); this.realSyms.add(sym); mwStore.apply([{symbol:sym,mid,spr_pts:spr}]); this.lastRealAt=Date.now(); this.badge(); }catch(e){} };
      ws.onclose=()=>{ this.ws=null; setTimeout(()=>this.startWS(),5000); };
      ws.onerror=()=>{ try{ws.close();}catch(e){} };
      this.ws=ws; }catch(e){} },
  state(){ if(!this.lastRealAt) return 'sim'; return (Date.now()-this.lastRealAt<15000)?'live':'stale'; },
  badge(){ let el=document.getElementById('mwLive');

  start(){ if(this._t) return; this.poll(); this._t=setInterval(()=>{ if(!document.hidden) this.poll(); },3000);
    this.startRT(); this.startWS();
    /* ņøīņ╣śļÅģ(feedHz ļ»Ėļ¤¼): ļ░░ņ¦Ć ņ×¼ĒÅēĻ░Ć + ņĪ░ņÜ®Ē×ł ņŻĮņØĆ WS(30s ļ¼┤ĒöäļĀłņ×ä) ņåīņ╝ō ņ×¼ĒÖ£ņÜ®.
       ņŗżĒö╝ļō£Ļ░Ć ļüŖĻ▓©ļÅä SIMņ£╝ļĪ£ ļÉśļÅīņĢäĻ░Ć Ļ░Ćņ¦£ļĪ£ ĒØöļōżņ¦Ć ņĢŖļŖöļŗż ŌĆö ļ¦łņ¦Ćļ¦ē ņŗżĻ░ĆĻ▓® ļÅÖĻ▓░ + STALE ņĀĢņ¦ü Ēæ£ņŗ£. */
    setInterval(()=>{ if(document.hidden) return; this.badge();
      const wsNew=Object.values(this.wsAt).reduce((a,b)=>Math.max(a,b),0);
      if(this.ws && wsNew && Date.now()-wsNew>30000){ try{ this.ws.onclose=null; this.ws.close(); }catch(e){} this.ws=null; this.startWS(); }

   Ļ│äņĢĮ = webtrade positionsStore ļØĮņŖżĒģØ: accounts/positions ņ┐╝ļ”¼┬ĘRealtime┬ĘBUYŌåÆbid/SELLŌåÆash ņ▓Łņé░Ļ░Ć┬Ę

const FX_CONTRACT_OF=s=>mwCat(s)==='Forex'?100000:1;   // fx_notional_usd ļØĮņŖżĒģØ
const FX_LEVCAP_OF=s=>mwCat(s)==='Forex'?100:5;
const fxAcct={ authed:false, acct:null, pos:[], _t:null, ch1:null, ch2:null,
  async session(){ try{

      const [ar,pr]=await Promise.all([
        AlpexaSync.db.from('accounts').select('acct_no,balance').eq('server','fx').eq('acct_no',a).limit(1),
        AlpexaSync.db.from('positions').select('local_id,symbol,side,size,open_price,status,updated_at,meta')

      if(ar&&ar.data&&ar.data[0]){ this.acct=ar.data[0]; }
      if(pr&&pr.data){ this.pos=pr.data; }
      if(this.acct){ if(!this.authed){ this.authed=true; } this.paint(); }
    }catch(e){} },
  closePx(p){ const r=mwStore.rows[p.symbol]; if(!r||r.bid==null) return null;
    return String(p.side).toUpperCase()==='SELL'?r.ask:r.bid; },   // BUYŌåÆBID ┬Ę SELLŌåÆASK (MT5)
  pnl(p){ const cur=this.closePx(p); if(cur==null) return 0;
    const dir=String(p.side).toUpperCase()==='SELL'?-1:1;
    return dir*(cur-(+p.open_price||cur))*(+p.size||0)*FX_CONTRACT_OF(p.symbol)*(String(p.symbol).includes('JPY')?0.0067:1); },
  baseUsd(sym){ const base=sym.slice(0,3), quote=sym.slice(3), r=mwStore.rows[sym];
    if(mwCat(sym)!=='Forex') return r?r.mid:0;                      // Ēü¼ļ”ĮĒåĀ/ņŻ╝ņŗØ: 1Ļ│äņĢĮ=1ņĮöņØĖ/ņŻ╝ ŌåÆ USDĻ░ĆĻ▓®
    if(base==='USD') return 1; if(quote==='USD') return r?r.mid:0;
    const b=mwStore.rows[base+'USD']; if(b) return b.mid;
    const i=mwStore.rows['USD'+base]; if(i&&i.mid) return 1/i.mid; return r?r.mid:0; },
  margin(p){ return (+p.size||0)*FX_CONTRACT_OF(p.symbol)*this.baseUsd(p.symbol)/FX_LEVCAP_OF(p.symbol); },
  /* DEMO_POS ļ¬©ņ¢æņ£╝ļĪ£ ļ│ĆĒÖś ŌĆö Trade/Exposure ļĀīļŹöĻ░Ć ĻĘĖļīĆļĪ£ ļ©╣Ļ▓ī (noClose: ņŗżņ▓Łņé░ņØĆ M5) */
  rows(){ return this.pos.map(p=>{ const m=(p.meta&&typeof p.meta==='object')?p.meta:{}, dg=mwDigits(p.symbol), cur=this.closePx(p), pl=this.pnl(p);
    return { sym:p.symbol, ticket:String(p.local_id||''), time:fxStamp(Date.parse(p.updated_at)||Date.now()),
      type:String(p.side||'').toLowerCase(), vol:(+p.size||0).toFixed(2), price:(+p.open_price||0).toFixed(dg),
      sl:m.sl?(+m.sl).toFixed(dg):'', tp:m.tp?(+m.tp).toFixed(dg):'',
      cur:cur!=null?cur.toFixed(dg):'ŌĆö', comm:'0.00', swap:m.swap!=null?(+m.swap).toFixed(2):'0.00',
      pl:pl.toFixed(2), noClose:true }; }); },
  stats(){ const floating=this.pos.reduce((s,p)=>s+this.pnl(p),0), bal=+((this.acct&&this.acct.balance))||0;
    const margin=this.pos.reduce((s,p)=>s+this.margin(p),0), equity=bal+floating;
    return { bal, floating, equity, margin, free:equity-margin, level:margin>0?equity/margin*100:0 }; },
  paint(){ if(curTbxTab==='Trade'||curTbxTab==='Exposure') renderToolbox(curTbxTab); },
  start(){ if(this._t) return;
    this.load(); [1500,4000].forEach(ms=>setTimeout(()=>{ if(!this.authed) this.load(); },ms));   // ņäĖņģś ĒĢśņØ┤ļō£ļĀłņØ┤ņģś ļĀłņØ┤ņŖż ņ×ÉĻ░Ćņ╣śņ£Ā
    this._t=setInterval(()=>{ if(!document.hidden) this.load(); },5000);   // ĒÅ┤ļ░▒ ĒÅ┤ (Realtime ņŻĮņ¢┤ļÅä 5s ļé┤ ļö░ļØ╝Ļ░É)

/* Toolbox ļÅäĒü¼ ŌĆö ĒāŁ(ļ░öļŗź) ┬Ę Trade ļĀīļŹö ┬Ę ņāüļŗ© ļ”¼ņé¼ņØ┤ņ”ł ┬Ę X ļŗ½ĻĖ░(ņÖ╝ņ¬Į ĒŚżļō£, Ctrl+T ņ×¼ņśżĒöł) ┬Ę ņøÉĒü┤ļ”Ł ņ▓Łņé░ */
(function toolboxDock(){
  const tabs=document.getElementById('tbxTabs'), dock=document.getElementById('dock'),
        content=document.getElementById('tbxBody'), rz=document.getElementById('dockRz'), closeBtn=document.getElementById('dockClose');
  if(!tabs||!dock||!content) return;
  const DOCK_H='alpexa.fxdash.dockH', DOCK_C='alpexa.fxdash.dockHidden';
  let dockH=Math.max(90, Math.min(+localStorage.getItem(DOCK_H)||190, 700));
  let hidden=localStorage.getItem(DOCK_C)==='1';
  function applyDock(){ content.style.height=dockH+'px'; dock.style.display=hidden?'none':'flex'; refitLayout(); }
  function setHiddenDock(v){ hidden=v; try{localStorage.setItem(DOCK_C,v?'1':'0');}catch(_){} applyDock(); }
  toggleDock=()=>setHiddenDock(!hidden);   // Ōś░ View>ToolboxņŚÉņä£ ĒśĖņČ£
  tabs.innerHTML=TBX_TABS.map((t,i)=>'<button data-tab="'+t+'"'+(i===0?' class="on"':'')+'>'+t+'</button>').join('');
  renderToolbox('Trade');
  tabs.addEventListener('click', e=>{ const b=e.target.closest('[data-tab]'); if(!b) return;
    tabs.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('on',x===b)); renderToolbox(b.dataset.tab); });
  /* X = Ēł┤ļ░ĢņŖż ļŗ½ĻĖ░(ņÖäņĀä ņł©Ļ╣Ć, ņ░©ĒŖĖ ĒÖĢļīĆ). Ctrl+TļĪ£ ņ×¼ņśżĒöł */
  if(closeBtn) closeBtn.addEventListener('click', ()=>{ setHiddenDock(true); toast('Toolbox closed ŌĆö Ctrl+T to reopen'); });
  /* Ēł┤ļ░ĢņŖż ļ│Ėļ¼Ė ņ£äņ×ä: ņøÉĒü┤ļ”Ł ņ▓Łņé░ ┬Ę Alerts ņČöĻ░Ć/ņéŁņĀ£ ┬Ę History ĻĖ░Ļ░ä ┬Ę Mailbox ĒÄ╝ņ╣śĻĖ░ */
  content.addEventListener('click', e=>{
    const x=e.target.closest('.poclose'); if(x){ if(x.dataset.cancel) cancelPendDemo(x.dataset.cancel); else closePosDemo(x.dataset.close); return; }
    const add=e.target.closest('#alAdd'); if(add){ tbxAddAlert(); return; }
    const del=e.target.closest('.aldel'); if(del){ alertsStore.remove(del.dataset.del); JOURNAL.log('Alert removed', true); renderToolbox('Alerts'); return; }
    const hp=e.target.closest('[data-hp]'); if(hp){ histPeriod=hp.dataset.hp; renderToolbox('History'); return; }
    const mail=e.target.closest('[data-mail]'); if(mail){ const d=document.getElementById('mbxDetail'+mail.dataset.mail);
      if(d) d.style.display=d.style.display==='none'?'table-row':'none'; mail.classList.remove('unread'); return; }
  });
  content.addEventListener('keydown', e=>{ if(e.key==='Enter' && e.target.id==='alPx'){ e.preventDefault(); tbxAddAlert(); } });
  /* ņāüļŗ© ĒģīļæÉļ”¼ ļō£ļ×śĻĘĖļĪ£ ļåÆņØ┤ ņĪ░ņĀł */
  if(rz) rz.addEventListener('pointerdown', e=>{ e.preventDefault(); rz.setPointerCapture(e.pointerId);
    const sy=e.clientY, sh=dockH;
    const move=ev=>{ dockH=Math.max(90, Math.min(sh+(sy-ev.clientY), window.innerHeight*0.75)); content.style.height=dockH+'px'; refitLayout(); };
    const up=()=>{ rz.releasePointerCapture(e.pointerId); rz.removeEventListener('pointermove',move); rz.removeEventListener('pointerup',up);
      try{localStorage.setItem(DOCK_H, Math.round(dockH));}catch(_){} };
    rz.addEventListener('pointermove',move); rz.addEventListener('pointerup',up); });
  document.addEventListener('keydown', e=>{ if((e.ctrlKey||e.metaKey)&&(e.key==='t'||e.key==='T')){ e.preventDefault(); setHiddenDock(!hidden); } });
  applyDock();
})();

/* ŌöĆŌöĆ ĒåĀņŖżĒŖĖ + MT5 ĒĢ½Ēéż ŌöĆŌöĆ */
let _toastT=null;
function toast(msg){ let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast'; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add('on'); clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove('on'),1500); }
document.addEventListener('keydown', e=>{
  const tag=(e.target&&e.target.tagName)||''; if(tag==='INPUT'||tag==='TEXTAREA') return;
  const cmd=e.ctrlKey||e.metaKey, k=e.key;
  if(cmd&&/^m$/i.test(k)){ e.preventDefault(); const h=!layout.marketwatch.hidden; setHidden('marketwatch',h); toast(h?'Market Watch ŌĆö hidden':'Market Watch'); }
  else if(cmd&&/^n$/i.test(k)){ e.preventDefault(); const h=!layout.navigator.hidden; setHidden('navigator',h); toast(h?'Navigator ŌĆö hidden':'Navigator'); }
  else if(cmd&&/^d$/i.test(k)){ e.preventDefault(); toast('Data Window ŌĆö coming in build'); }
  else if(cmd&&/^g$/i.test(k)){ e.preventDefault(); toggleGrid(); }   // ĒÖ£ņä▒ ņ░©ĒŖĖ ĻĘĖļ”¼ļō£
  else if(cmd&&/^b$/i.test(k)){ e.preventDefault(); toast('Objects List ŌĆö coming in build'); }
  else if(k==='F9'){ e.preventDefault(); const g=layout[activeChart]; openOrderDialog((g&&g.sym)||mwSel); }
  else if(k==='F8'){ e.preventDefault(); toast('Chart Properties (F8) ŌĆö coming in build'); }
  else if(k==='F11'){ e.preventDefault(); if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); }
  else if(k==='Escape'){ const om=document.getElementById('ordModal'); if(om&&om.style.display==='flex'){ closeOrder(); return; }   // ņŻ╝ļ¼Ėņ░Į ļ©╝ņĀĆ
    const cc=document.getElementById('chCtx'); const md=document.getElementById('menuDrop');   // ĒīØņŚģ ļ©╝ņĀĆ ļŗ½ĻĖ░
    if((cc&&cc.style.display==='block')||(md&&md.style.display==='block')){ if(cc) cc.style.display='none'; if(md) md.style.display='none'; }
    else if(drawDrag){ const id=drawDrag.id; drawDrag=null; renderChart(id); } else if(drawTool){ setDrawTool(null); }
    else if(selObj){ const id=selObj.id; selObj=null; renderChart(id); } }   // ĒīØņŚģ/ĻĘĖļ”¼ĻĖ░/Ēł┤/ņäĀĒāØ ņĘ©ņåī
  else if(k==='Delete'||k==='Backspace'){ if(selObj){ delSelObj(); toast('Object deleted'); }   // ņäĀĒāØļÉ£ Ļ▓āļ¦ī ņéŁņĀ£
    else if(activeChart){ clearObjects(activeChart); toast('All objects deleted'); } }
  else if(k==='+'||k==='='){ zoomCharts(1); }
  else if(k==='-'||k==='_'){ zoomCharts(-1); }
});

/* ŌöĆŌöĆ ļ¦łņÜ░ņŖżņśżļ▓ä Ēł┤Ēīü (ļ¬©ļōĀ [data-tip] ŌĆö Ēł┤ļ░ö ņĢäņØ┤ņĮś ĒÅ¼ĒĢ©, ņśżļ▓äĒöīļĪ£ņŚÉ ņĢł ņ×śļ”╝) ŌöĆŌöĆ */
(function tips(){
  let tip;
  document.addEventListener('mouseover', e=>{ const el=e.target.closest('[data-tip]'); if(!el) return;
    const t=el.getAttribute('data-tip'); if(!t) return;
    if(!tip){ tip=document.createElement('div'); tip.id='gtip'; document.body.appendChild(tip); }
    tip.textContent=t; tip.style.display='block';
    const r=el.getBoundingClientRect(), tw=tip.offsetWidth;
    let left=r.left+r.width/2-tw/2; left=Math.max(6, Math.min(left, window.innerWidth-tw-6));
    tip.style.left=left+'px'; tip.style.top=(r.bottom+6)+'px'; });
  document.addEventListener('mouseout', e=>{ if(tip && e.target.closest && e.target.closest('[data-tip]')) tip.style.display='none'; });
})();
</script>
