<!-- ══════════════════════════════════════════════════════════════════════════
  크립토 레전드 대시보드 — DEV 격리 빌드 (2026-07-16)
  · 기존 파일 0터치: 이 파일은 dev/ 안에서만 자란다. legend-ui.css는 링크만.
  · 어디서도 링크되지 않음 + noindex — 고객 유입 경로 없음.
  · 완성 + 승인 후 정식 위치로 한 번에 이동("실행").
  · 이 단계(바탕화면): 위젯 무브먼트 엔진 — 픽셀 드래그 · 자석 스냅(±6px) + 초록
    정렬 가이드 · 8px 미세 격자 · 4방향 리사이즈 · z-순서 · 레이아웃 저장/리셋 ·
    뷰포트 리핏(선형 사상) · 풀스크린. sports-dashboard.html 검증 엔진의 이식본.
  · 데이터/돈 코드 0 — 위젯 본문은 다음 단계에서 연결 (기획서 M1~M5).
═══════════════════════════════════════════════════════════════════════════ -->
<style>
html,body{height:100%; margin:0; background:var(--lgd-bg,#0B0D0E)}
body{color:var(--lgd-ink,#F5F6F7); overflow:hidden}
.tnum{font-variant-numeric:tabular-nums}
/* 스크롤바 전면 숨김 (스포츠 대시보드와 동일 결정) */
*{scrollbar-width:none; -ms-overflow-style:none}
*::-webkit-scrollbar{width:0; height:0; display:none}

/* ══ 헤더 (레전드 §2: h48 · 블랙 바 · 탭 필 · 중앙 상태 필 · 우측 액션) ══ */
.hdr{display:flex; align-items:center; gap:8px; height:var(--lgd-header-h); padding:0 14px;
  background:#000; border-bottom:1px solid var(--lgd-hair)}
.mark{width:26px; height:26px; display:flex; align-items:center; justify-content:center;
  color:#fff; font-family:'Arial Black',Arial,sans-serif; font-weight:900; font-size:19px; letter-spacing:-1px}
.htab{display:flex; align-items:center; gap:8px; background:var(--lgd-pill); border-radius:var(--lgd-r-btn);
  height:32px; padding:0 14px 0 12px; font-size:var(--lgd-fs-tab); font-weight:600; cursor:pointer; transition:background .12s}
.htab:hover{background:var(--lgd-pill-hi)}
.addtab{width:32px; height:32px; border-radius:var(--lgd-r-btn); display:flex; align-items:center;
  justify-content:center; color:var(--lgd-dim); font-size:19px; cursor:pointer}
.addtab:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
.hsp{flex:1}
.hmid{display:flex; align-items:center; gap:8px; background:var(--lgd-pill); border-radius:999px;
  height:32px; padding:0 14px; font-size:var(--lgd-fs-body); font-weight:600}
.hmid .dot{width:6px; height:6px; border-radius:999px; background:#C8C8C2}
.hmid .dot.ok{background:var(--lgd-up)}
.hbtn{background:var(--lgd-pill); border:none; color:var(--lgd-ink); border-radius:var(--lgd-r-btn); height:32px;
  padding:0 14px; font-size:var(--lgd-fs-body); font-weight:600; cursor:pointer; transition:background .12s}
.hbtn:hover{background:var(--lgd-pill-hi)}
.hic{width:34px; height:34px; border-radius:var(--lgd-r-btn); display:flex; align-items:center;
  justify-content:center; color:var(--lgd-ink); cursor:pointer}
.hic:hover{background:var(--lgd-pill)}
.avatar{width:28px; height:28px; border-radius:999px; background:#3A3E42; display:flex;
  align-items:center; justify-content:center; color:#101214; cursor:pointer}
.tabrow{display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:6px; cursor:pointer}
.tabrow:hover{background:var(--lgd-pill)}
.tabrow.dis{cursor:default; color:var(--lgd-dim)}
.tabrow.dis:hover{background:transparent}
.tabrow .sub{margin-left:auto; color:var(--lgd-dim); font-size:var(--lgd-fs-caption)}

/* ══ 캔버스 + 점 그리드 (드래그/리사이즈 중에만) ══ */
.stage{position:relative; height:calc(100vh - 49px); overflow:auto; background:var(--lgd-bg)}
.dots{position:absolute; inset:0; opacity:0; transition:opacity .18s; pointer-events:none; z-index:1;
  background-image:radial-gradient(circle, rgba(255,255,255,.15) 1.2px, transparent 1.6px);
  background-size:38px 38px; background-position:19px 19px}
.stage.dragging .dots{opacity:1}
.algn{position:absolute; background:var(--lgd-up); z-index:45; pointer-events:none}
.algn.v{width:1px; top:0; bottom:0}
.algn.h{height:1px; left:0; right:0}
@media (prefers-reduced-motion: reduce){ .dots{transition:none} }

/* ══ 위젯 크롬 (레전드 §3: 타이틀바 36 · 링크 사각형 · ⋮ · 4방향 리사이즈) ══ */
.widget{position:absolute; display:flex; flex-direction:column; background:var(--lgd-surface);
  border:1px solid var(--lgd-hair); border-radius:var(--lgd-r-widget); overflow:hidden; z-index:2}
.widget.drag{box-shadow:0 12px 32px rgba(0,0,0,.6); opacity:.92; z-index:9}
.wtb{display:flex; align-items:center; gap:9px; height:var(--lgd-titlebar-h); padding:0 10px;
  border-bottom:1px solid var(--lgd-hair); flex:none; cursor:grab; user-select:none}
.widget.drag .wtb{cursor:grabbing}
.linksq{width:12px; height:12px; border-radius:3px; flex:none; cursor:pointer}
.wtb h3{margin:0; font-size:var(--lgd-fs-widget-title); font-weight:700}
.wtb .wsub{font-size:var(--lgd-fs-label); color:var(--lgd-dim)}
.wtb .wsp{flex:1}
.wtb .wic{width:24px; height:24px; display:flex; align-items:center; justify-content:center;
  color:var(--lgd-dim); cursor:pointer; border-radius:5px}
.wtb .wic:hover{background:var(--lgd-surface2); color:var(--lgd-ink)}
.wbody{flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column}
.rz{position:absolute; z-index:6}
.rz.br{right:0; bottom:0; width:18px; height:18px; cursor:nwse-resize}
.rz.br::after{content:""; position:absolute; right:5px; bottom:5px; width:7px; height:7px;
  border-right:2px solid var(--lgd-dim); border-bottom:2px solid var(--lgd-dim);
  border-bottom-right-radius:2px; opacity:0; transition:opacity .12s}
.widget:hover .rz.br::after{opacity:1}
.rz.r{right:-3px; top:12px; bottom:20px; width:8px; cursor:ew-resize}
.rz.l{left:-3px; top:12px; bottom:20px; width:8px; cursor:ew-resize}
.rz.b{bottom:-3px; left:12px; right:20px; height:8px; cursor:ns-resize}
.rz.r:hover,.rz.l:hover,.rz.b:hover{background:rgba(255,255,255,.06); border-radius:4px}
.wempty{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  color:var(--lgd-dim); font-size:var(--lgd-fs-label); text-align:center; padding:16px}
.wempty .big{font-size:15px; font-weight:700; color:var(--lgd-ink); opacity:.55}
.wempty .tag{background:var(--lgd-pill); border-radius:999px; padding:4px 11px; font-size:10.5px;
  font-weight:700; letter-spacing:.4px; color:var(--lgd-dim)}

/* ══ W1 My wallet — RH 크립토 차트 문법 (앱 Chart 973-1058 번역) ══ */
.wal{flex:1; min-height:0; display:flex; flex-direction:column; padding:14px 16px 10px}
.wal .lbl{font-size:var(--lgd-fs-label); color:var(--lgd-dim); font-weight:600}
.wal .amt{font-size:26px; font-weight:700; letter-spacing:-.3px; margin-top:2px}
.wal .amt .cents{font-size:17px; color:var(--lgd-dim)}
.wal .chg{font-size:var(--lgd-fs-caption); font-weight:600; margin-top:3px; min-height:15px}
.wal .chg.up{color:var(--lgd-up)} .wal .chg.down{color:var(--lgd-down)}
.wal .chg .dim{color:var(--lgd-dim); font-weight:500}
.wal .chartwrap{position:relative; flex:1; min-height:90px; margin:8px -6px 2px}
.wal svg.rhchart{width:100%; height:100%; display:block; touch-action:none; cursor:crosshair}
.wal .ranges{display:flex; gap:2px; flex:none; margin-top:4px}
.wal .ranges button{flex:1; background:none; border:none; color:var(--lgd-dim); font-size:10.5px;
  font-weight:700; padding:6px 0; border-radius:6px; cursor:pointer; font-family:inherit; letter-spacing:.3px}
.wal .ranges button:hover{color:var(--lgd-ink)}
.wal .ranges button.on{background:var(--lgd-pill); color:var(--lgd-ink)}
.wal .pvtag{position:absolute; left:50%; top:8px; transform:translateX(-50%); background:var(--lgd-pill);
  color:var(--lgd-dim); border-radius:999px; padding:3px 10px; font-size:9.5px; font-weight:700; letter-spacing:.6px}
/* 발란스 키-밸류 섹션 (스포츠 발란스 문법 이식 — 라벨 dim 12px / 값 12.5px tabular / 행 24px) */
.wal .kvs{flex:none; overflow:auto; margin-top:6px}
.wal .sect{font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--lgd-dim);
  padding:10px 0 5px; border-bottom:1px solid var(--lgd-hair); margin-bottom:3px}
.wal .kv{display:flex; align-items:center; height:24px; font-size:12.5px}
.wal .kv .k{color:var(--lgd-dim); font-size:12px}
.wal .kv .v{margin-left:auto; font-weight:600}
.wal .kv .v.up{color:var(--lgd-up)} .wal .kv .v.down{color:var(--lgd-down)}
.wal .kv.lnk{cursor:pointer; border-radius:5px; margin:0 -6px; padding:0 6px}
.wal .kv.lnk:hover{background:var(--lgd-surface2)}
.wal .kv .go{color:var(--lgd-dim); font-size:11px; margin-left:7px}

/* ══ 라이트 테마 — legend-ui.css 무변경, 이 파일 안에서 --lgd-* 토큰만 오버라이드.
   업/다운/링크 색은 의미색이라 유지. 크립토 앱의 라이트 기본과 조화(화이트 서피스). ══ */

}
body.light .hdr{background:#fff; border-bottom:1px solid var(--lgd-hair)}

<script>
'use strict';
/* ════════════════════ 레이아웃 엔진 — sports-dashboard.html 검증 이식본 ════════════════════
   픽셀 드래그 + 자석 스냅(±6px, 이웃 변/8px 갭/가터) + 초록 정렬 가이드 + 8px 미세 격자 +
   4방향 리사이즈 + z-순서 + 저장/리셋 + 뷰포트 선형 리핏. */
const GRID=38, FINE=8, SNAP=6, GAP=8, LKEY='alpexa.cbdash.layout.v1';
const stage=document.getElementById('stage');
const guides={ els:[], clear(){ this.els.forEach(e=>e.remove()); this.els=[]; },
  v(x){ const e=document.createElement('div'); e.className='algn v'; e.style.left=x+'px';
    stage.appendChild(e); this.els.push(e); },
  h(y){ const e=document.createElement('div'); e.className='algn h'; e.style.top=y+'px';
    stage.appendChild(e); this.els.push(e); } };
function snapAxis(cands, v){ let best=null;
  for(const c of cands){ const d=Math.abs(c.at-v); if(d<=SNAP&&(!best||d<best.d)) best={...c,d}; }
  return best; }
function othersOf(id){ return Object.keys(layout).filter(k=>k!=='__ref'&&k!==id&&!layout[k].hidden).map(k=>layout[k]); }
function dragCands(id, w, h){
  const xs=[{at:GAP, guide:GAP}], ys=[{at:GAP, guide:GAP}];
  othersOf(id).forEach(o=>{
    xs.push({at:o.x, guide:o.x});
    xs.push({at:o.x+o.w-w, guide:o.x+o.w});
    xs.push({at:o.x+o.w+GAP, guide:o.x+o.w+GAP/2});
    xs.push({at:o.x-w-GAP, guide:o.x-GAP/2});
    ys.push({at:o.y, guide:o.y});
    ys.push({at:o.y+o.h-h, guide:o.y+o.h});
    ys.push({at:o.y+o.h+GAP, guide:o.y+o.h+GAP/2});
    ys.push({at:o.y-h-GAP, guide:o.y-GAP/2});
  });
  return {xs,ys};
}
/* 기본 배치 v1 — 1900×856 기준, GAP 8 수학 정합:
   열 8|340|520|660|340 (경계 348/356·876/884·1544/1552·1892) — 340+520+660+340=1860 + 갭5×8=1900 ✓
   행 504+8+328 (=840+16=856 ✓) · A열은 452+8+380 (=840) ✓
   위젯 10종 중 8종 기본 표시, swap/orders는 Add widget으로 (기획 §2). */
const DEFAULT_LAYOUT={
  balance:{x:8,y:8,w:340,h:452},   staking:{x:8,y:468,w:340,h:380},
  markets:{x:356,y:8,w:520,h:504}, activity:{x:356,y:520,w:520,h:328},
  chart:{x:884,y:8,w:660,h:504},   portfolio:{x:884,y:520,w:660,h:328},
  trade:{x:1552,y:8,w:340,h:504},  money:{x:1552,y:520,w:340,h:328},
  swap:{x:1208,y:8,w:336,h:420,hidden:true}, orders:{x:1208,y:436,w:336,h:412,hidden:true},
  __ref:{w:1900,h:856} };
const deepLayout=(o)=>JSON.parse(JSON.stringify(o));
const MIN_SIZE={ balance:{w:300,h:220}, staking:{w:300,h:240}, markets:{w:400,h:260}, activity:{w:400,h:220},
  chart:{w:480,h:280}, portfolio:{w:440,h:220}, trade:{w:300,h:320}, money:{w:300,h:200},
  swap:{w:300,h:300}, orders:{w:300,h:220} };
function loadLayout(){ try{ const raw=localStorage.getItem(LKEY); if(!raw) return deepLayout(DEFAULT_LAYOUT);
  const p=JSON.parse(raw);
  Object.keys(DEFAULT_LAYOUT).forEach(k=>{ if(!p[k]) p[k]=deepLayout(DEFAULT_LAYOUT[k]); });
  return p;
}catch(e){ return deepLayout(DEFAULT_LAYOUT); } }
let layout=loadLayout();
Object.keys(layout).forEach(id=>{ const m=MIN_SIZE[id]; if(!m) return;
  if(layout[id].w<m.w) layout[id].w=m.w; if(layout[id].h<m.h) layout[id].h=m.h; });
function saveLayout(){ try{ localStorage.setItem(LKEY, JSON.stringify(layout)); }catch(e){} }
document.getElementById('btnReset').onclick=()=>{ try{ localStorage.removeItem(LKEY); }catch(e){}
  layout=deepLayout(DEFAULT_LAYOUT); Object.keys(layout).forEach(k=>{ if(k!=='__ref') applyGeo(k); });
  renderAddMenu(); refitLayout(); };

/* 뷰포트 선형 리핏 — 저장 배치를 기준 뷰포트 → 현재 뷰포트로 재사상 (끝변 매핑, float 유지) */
const HDR_H=48;
function refitLayout(){
  const vw=window.innerWidth, vh=window.innerHeight-HDR_H;
  if(vw<500||vh<300) return;
  const ref=layout.__ref||{w:1900,h:856};
  if(Math.abs(ref.w-vw)<2&&Math.abs(ref.h-vh)<2){ layout.__ref={w:vw,h:vh}; return; }
  const sx=(vw-2*GAP)/(ref.w-2*GAP), sy=(vh-2*GAP)/(ref.h-2*GAP);
  const mapX=v=>GAP+(v-GAP)*sx, mapY=v=>GAP+(v-GAP)*sy;
  Object.keys(layout).forEach(id=>{ if(id==='__ref') return; const g=layout[id];
    const r=mapX(g.x+g.w), b=mapY(g.y+g.h);
    g.x=mapX(g.x); g.y=mapY(g.y); g.w=r-g.x; g.h=b-g.y;
    if(g.w<120)g.w=120; if(g.h<120)g.h=120;
    applyGeo(id); });
  layout.__ref={w:vw,h:vh}; saveLayout();
}
let _refitT=null;
window.addEventListener('resize', ()=>{ clearTimeout(_refitT); _refitT=setTimeout(refitLayout,150); });
document.addEventListener('fullscreenchange', ()=>{ clearTimeout(_refitT); _refitT=setTimeout(refitLayout,120); });

function applyGeo(id){ const el=document.getElementById('w-'+id); if(!el) return; const g=layout[id];
  el.style.display=g.hidden?'none':'flex';
  el.style.left=g.x+'px'; el.style.top=g.y+'px'; el.style.width=g.w+'px'; el.style.height=g.h+'px'; }
const WIDGET_TITLES={ balance:'Account', portfolio:'Portfolio', markets:'Markets', chart:'Chart',
  trade:'Trade', swap:'Swap', staking:'Staking', orders:'Open orders', activity:'Activity', money:'Money moves' };
function setHidden(id, hidden){ layout[id].hidden=hidden; applyGeo(id); saveLayout(); renderAddMenu(); }
function renderAddMenu(){ const m=document.getElementById('addMenu'); if(!m) return;
  m.innerHTML=Object.keys(WIDGET_TITLES).map(id=>{
    const off=!!layout[id].hidden;
    return '<div class="addrow" data-id="'+id+'" style="display:flex; align-items:center; gap:8px; padding:8px 10px;'+
      ' border-radius:6px; cursor:pointer'+(off?'':'; color:var(--lgd-dim)')+'">'+
      '<span style="width:14px; text-align:center">'+(off?'+':'✓')+'</span>'+WIDGET_TITLES[id]+'</div>';
  }).join('');
}

/* 클릭한 위젯 = 맨 앞 — z 2..N 재정규화 (가이드 z45 아래 유지) */
const zOrder=[];
function bringToFront(id){
  const i=zOrder.indexOf(id); if(i>=0) zOrder.splice(i,1); zOrder.push(id);
  zOrder.forEach((wid,k)=>{ const el=document.getElementById('w-'+wid); if(el) el.style.zIndex=2+k; });
}
function makeWidget(id, title, sub, linkColor, bodyHTML){
  const el=document.createElement('div'); el.className='widget'; el.id='w-'+id;
  zOrder.push(id);
  el.addEventListener('pointerdown', ()=>bringToFront(id), true);
  el.innerHTML='<div class="wtb"><span class="linksq" style="background:'+linkColor+'"></span>'+
    '<h3>'+title+'</h3>'+(sub?'<span class="wsub">'+sub+'</span>':'')+
    '<span class="wsp"></span><span class="wic" title="Close widget">⋮</span></div>'+
    '<div class="wbody">'+bodyHTML+'</div>';
  stage.appendChild(el); applyGeo(id);
  el.querySelector('.wic').addEventListener('click', ()=>setHidden(id,true));
  // 드래그 (타이틀바) — 자석 스냅 + 초록 가이드, 미스냅 축은 8px 미세 격자
  const tb=el.querySelector('.wtb');
  tb.addEventListener('pointerdown', e=>{
    if(e.target.closest('.wic,.linksq')) return;
    e.preventDefault(); tb.setPointerCapture(e.pointerId);
    const g=layout[id], offX=e.clientX-g.x, offY=e.clientY-g.y;
    stage.classList.add('dragging'); el.classList.add('drag');
    const cands=dragCands(id, g.w, g.h);
    const move=ev=>{
      let x=Math.max(0,ev.clientX-offX), y=Math.max(0,ev.clientY-offY);
      guides.clear();
      const sx=snapAxis(cands.xs,x), sy=snapAxis(cands.ys,y);
      if(sx){ x=sx.at; guides.v(sx.guide); }
      if(sy){ y=sy.at; guides.h(sy.guide); }
      g.x=x; g.y=y; applyGeo(id); };
    const up=()=>{ tb.removeEventListener('pointermove',move); tb.removeEventListener('pointerup',up);
      stage.classList.remove('dragging'); el.classList.remove('drag'); guides.clear();
      const sx=snapAxis(cands.xs,g.x), sy=snapAxis(cands.ys,g.y);
      if(!sx) g.x=Math.round(g.x/FINE)*FINE;
      if(!sy) g.y=Math.round(g.y/FINE)*FINE;
      applyGeo(id); saveLayout(); };
    tb.addEventListener('pointermove',move); tb.addEventListener('pointerup',up);
  });
  // 리사이즈 4방향 — 이웃 변/갭 스냅, 미스냅 치수는 8px 격자
  const MINW=(MIN_SIZE[id]||{}).w||220, MINH=(MIN_SIZE[id]||{}).h||170;
  ['br','r','l','b'].forEach(dir=>{
    const rz=document.createElement('div'); rz.className='rz '+dir; el.appendChild(rz);
    rz.addEventListener('pointerdown', e=>{
      e.preventDefault(); e.stopPropagation(); rz.setPointerCapture(e.pointerId);
      const g=layout[id], x0=e.clientX, y0=e.clientY, w0=g.w, h0=g.h, l0=g.x;
      stage.classList.add('dragging'); el.classList.add('drag');
      const eXs=[], eYs=[];
      othersOf(id).forEach(o=>{ eXs.push({at:o.x-GAP, guide:o.x-GAP/2},{at:o.x, guide:o.x},{at:o.x+o.w, guide:o.x+o.w});
        eYs.push({at:o.y-GAP, guide:o.y-GAP/2},{at:o.y, guide:o.y},{at:o.y+o.h, guide:o.y+o.h}); });
      const move=ev=>{ const dx=ev.clientX-x0, dy=ev.clientY-y0;
        guides.clear();
        if(dir==='br'||dir==='r'){ let r=l0+Math.max(MINW,w0+dx);
          const sn=snapAxis(eXs,r); if(sn){ r=sn.at; guides.v(sn.guide); } g.w=Math.max(MINW,r-g.x); }
        if(dir==='br'||dir==='b'){ let btm=g.y+Math.max(MINH,h0+dy);
          const sn=snapAxis(eYs,btm); if(sn){ btm=sn.at; guides.h(sn.guide); } g.h=Math.max(MINH,btm-g.y); }
        if(dir==='l'){ let x=l0+Math.min(dx,w0-MINW);
          const sn=snapAxis(eXs,x); if(sn){ x=sn.at; guides.v(sn.guide); }
          const w=Math.max(MINW,l0+w0-x); g.x=l0+w0-w; g.w=w; }
        applyGeo(id); };
      const up=()=>{ rz.removeEventListener('pointermove',move); rz.removeEventListener('pointerup',up);
        stage.classList.remove('dragging'); el.classList.remove('drag'); guides.clear();
        const right=g.x+g.w, btm=g.y+g.h;
        if(!snapAxis(eXs,right)) g.w=Math.max(MINW,Math.round(g.w/FINE)*FINE);
        if(!snapAxis(eYs,btm)) g.h=Math.max(MINH,Math.round(g.h/FINE)*FINE);
        if(dir==='l'){ if(!snapAxis(eXs,g.x)) g.x=right-g.w; }
        applyGeo(id); saveLayout(); };
      rz.addEventListener('pointermove',move); rz.addEventListener('pointerup',up);
    });
  });
  return el;
}

/* ════════════════════ W1 My wallet — RH 크립토 차트 (앱 Chart:973-1058 문법 번역) ════════════════════
   라인 + 에어리어 그라디언트 + 베이스라인 점선 + 끝점 펄스 + 스크럽(수직 점선·값 연동) + 레인지 탭.
   돈 규율: 세션 있으면 get_portfolio_history(p_acct,p_range) 실데이터(앱:1654 계약),

const WAL_RANGES={'1D':'Today','1W':'Past week','1M':'Past month','3M':'Past 3 months','YTD':'Year to date','1Y':'Past year','ALL':'All time'};
const wal={ range:'1D', pts:[], real:false, scrub:null };
function seedRnd(seed){ let s=seed>>>0; return ()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }
function sampleSeries(range){
  const N={'1D':96,'1W':84,'1M':90,'3M':90,'YTD':100,'1Y':104,'ALL':120}[range]||96;
  const rnd=seedRnd(range.split('').reduce((a,c)=>a*31+c.charCodeAt(0),7));
  let v=100; const out=[]; for(let i=0;i<N;i++){ v*=1+(rnd()-0.482)*0.016; out.push(v); } return out;
}
const fmtUsdBig=(v)=>{ const s=Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const i=s.lastIndexOf('.'); return (v<0?'-':'')+'$'+s.slice(0,i)+'<span class="cents">.'+s.slice(i+1)+'</span>'; };
function cssVar(n){ return getComputedStyle(document.body).getPropertyValue(n).trim()||'#00C805'; }
function renderWal(){
  const svg=document.getElementById('walSvg'), wrap=document.getElementById('walWrap');
  if(!svg||!wrap||wal.pts.length<2) return;
  const W=Math.max(60,wrap.clientWidth), H=Math.max(60,wrap.clientHeight);
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  const pts=wal.pts, base=pts[0], last=pts[pts.length-1];
  const up=last>=base, col=up?cssVar('--lgd-up'):cssVar('--lgd-down');
  // Y 스케일 — min==max 붕괴/미세변동 증폭 방지: 스팬 하한 ±1% (앱 chartYScale:963-971 규칙)
  let lo=Math.min(...pts), hi=Math.max(...pts);
  const mid=(lo+hi)/2, span=Math.max(hi-lo, Math.abs(mid)*0.02, 1e-9);
  lo=mid-span/2; hi=mid+span/2;
  const padY=12, xAt=i=>i/(pts.length-1)*W, yAt=v=>padY+(1-(v-lo)/(hi-lo))*(H-2*padY);
  let line=''; pts.forEach((v,i)=>{ line+=(i?'L':'M')+xAt(i).toFixed(1)+' '+yAt(v).toFixed(1)+' '; });
  const area=line+'L'+W+' '+H+' L0 '+H+' Z';
  const sc=wal.scrub, si=sc==null?pts.length-1:sc;
  const ex=xAt(si), ey=yAt(pts[si]);
  svg.innerHTML=
    '<defs><linearGradient id="walG" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0" stop-color="'+col+'" stop-opacity="0.22"/>'+

    '<line x1="0" x2="'+W+'" y1="'+yAt(base).toFixed(1)+'" y2="'+yAt(base).toFixed(1)+'" stroke="'+cssVar('--lgd-dim')+'" stroke-opacity="0.5" stroke-width="1" stroke-dasharray="3 4"/>'+
    '<path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
    (sc==null
      ? '<circle cx="'+ex+'" cy="'+ey+'" r="7" fill="'+col+'" opacity="0.25"><animate attributeName="r" values="4;13" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.35;0" dur="2s" repeatCount="indefinite"/></circle>'+
        '<circle cx="'+ex+'" cy="'+ey+'" r="3.4" fill="'+col+'"/>'
      : '<line x1="'+ex+'" x2="'+ex+'" y1="0" y2="'+H+'" stroke="'+cssVar('--lgd-dim')+'" stroke-width="1" stroke-dasharray="3 4"/>'+
        '<circle cx="'+ex+'" cy="'+ey+'" r="4" fill="'+col+'"/>'+
        '<circle cx="'+ex+'" cy="'+ey+'" r="8" fill="'+col+'" opacity="0.18"/>');
  // 헤더 숫자·변동 — 실데이터만 달러 표기, 프리뷰는 '···' 유지
  const amtEl=document.getElementById('walAmt'), chgEl=document.getElementById('walChg');

      ' ('+(d>=0?'+':'−')+Math.abs(p).toFixed(2)+'%) <span class="dim">'+WAL_RANGES[wal.range]+'</span>';
  } else {
    amtEl.textContent='···';

    chgEl.innerHTML=(d>=0?'▲':'▼')+' '+(d>=0?'+':'−')+Math.abs(p).toFixed(2)+'% <span class="dim">'+WAL_RANGES[wal.range]+' · preview</span>';
  }
}
/* 세션 게이트 — 세션 실존 + alpexa.me 태그 둘 다 (유령세션 클래스 가드, 결함-로그 2026-07-15) */
async function walSession(){
  try{
    if(!(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.db.auth)) return null;
    const s=await AlpexaSync.db.auth.getSession();
    const me=JSON.parse(localStorage.getItem('alpexa.me')||'null');
    const acct=me&&me.accts&&me.accts.crypto;
    return (s&&s.data&&s.data.session&&acct)?{acct,me}:null;
  }catch(e){ return null; }
}
const fmtUsdSm=v=>'$'+(+v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const setKv=(id,txt,cls)=>{ const el=document.getElementById(id); if(el){ el.textContent=txt; el.className='v'+(cls?' '+cls:''); } };
const pnlKv=(id,d)=>setKv(id,(d>=0?'▲ ':'▼ ')+fmtUsdSm(Math.abs(d)), d>=0?'up':'down');
/* 키-밸류 섹션 — 전부 서버 SELECT/RPC 읽기 전용. 세션 없으면 '···' 유지 (가짜 $0.00 표시 금지 —
   RH는 빈 계좌를 $0.00으로 그리지만 우리는 "모름(미로그인)"과 "0원"을 구분한다). */
async function loadWalletKvs(sess){
  if(!sess) return;
  const db=AlpexaSync.db, acct=sess.acct;
  try{
    const [h,p,st]=await Promise.all([
      db.from('crypto_holdings').select('asset,qty').eq('acct_no',acct),
      db.from('prices').select('symbol,mid'),
      db.from('crypto_stakes').select('asset,period,usd,principal').eq('acct_no',acct)]);
    const mid={}; (p.data||[]).forEach(r=>mid[r.symbol]=+r.mid||0); mid.USDT=1; mid.USDC=1; mid.DAI=1;
    let cash=0, cryptoV=0;
    (h.data||[]).forEach(r=>{ const q=+r.qty||0;
      if(r.asset==='USDT') cash=q; else cryptoV+=q*(mid[r.asset]||0); });
    let staked=0, rewards=0;
    (st.data||[]).forEach(r=>{ staked+=(+r.usd||0); rewards+=Math.max(0,(+r.usd||0)-(+r.principal||+r.usd||0)); });
    setKv('kvCash',fmtUsdSm(cash)); setKv('kvCrypto',fmtUsdSm(cryptoV));
    setKv('kvStaked',fmtUsdSm(staked)); setKv('kvTotal',fmtUsdSm(cash+cryptoV+staked));
    setKv('kvPStk','▲ '+fmtUsdSm(rewards),'up');
  }catch(e){}
  try{ // P&L — 서버 이력 RPC 앞뒤차 (1D=Today, YTD)
    for(const [rng,id] of [['1D','kvPToday'],['YTD','kvPYtd']]){
      const r=await AlpexaSync.db.rpc('get_portfolio_history',{p_acct:acct,p_range:rng});
      const pts=(r&&r.data&&r.data.ok&&r.data.points)||[];
      if(pts.length>1) pnlKv(id,(+pts[pts.length-1].v||0)-(+pts[0].v||0));
    }
  }catch(e){}
  try{ // Pending — requests 승인 대기 (RLS가 본인 것만)
    const r=await db.from('requests').select('type,amount,status').eq('status','pending');
    const rows=r.data||[];
    const sum=t=>rows.filter(x=>x.type===t).reduce((a,x)=>a+(+x.amount||0),0);
    const cnt=t=>rows.filter(x=>x.type===t).length;
    setKv('kvPendDep',cnt('deposit')?cnt('deposit')+' · '+fmtUsdSm(sum('deposit')):'—');
    setKv('kvPendWd',cnt('withdraw')?cnt('withdraw')+' · '+fmtUsdSm(sum('withdraw')):'—');
  }catch(e){}
  try{ // Other wallets — accounts 3서버 (RLS 본인)
    const r=await db.from('accounts').select('server,balance');
    (r.data||[]).forEach(a=>{ if(a.server==='fx') setKv('kvFx',fmtUsdSm(+a.balance||0));
      if(a.server==='sports') setKv('kvSp',fmtUsdSm(+a.balance||0)); });
  }catch(e){}
}

async function loadWallet(){
  wal.real=false;

  try{
    if(sess){
      const r=await AlpexaSync.db.rpc('get_portfolio_history',{p_acct:sess.acct,p_range:wal.range});
      if(r&&r.data&&r.data.ok&&Array.isArray(r.data.points)&&r.data.points.length>1){
        wal.pts=r.data.points.map(pt=>+pt.v||0); wal.real=true;

  if(!wal.real) wal.pts=sampleSeries(wal.range);

/* 스크럽 — 포인터 x → 인덱스, 떼면 라이브 끝점 복귀 (앱:987-994 계약) */
(function(){

    const ratio=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
    return Math.round(ratio*(wal.pts.length-1)); };
  svg.addEventListener('pointerdown',e=>{ svg.setPointerCapture(e.pointerId); wal.scrub=idxOf(e); renderWal(); });
  svg.addEventListener('pointermove',e=>{ if(e.buttons!==1&&e.pointerType==='mouse'&&wal.scrub==null) return;
    if(e.buttons===1||e.pointerType!=='mouse'){ wal.scrub=idxOf(e); renderWal(); } });
  const end=()=>{ if(wal.scrub!=null){ wal.scrub=null; renderWal(); } };
  svg.addEventListener('pointerup',end); svg.addEventListener('pointerleave',end);
})();
document.getElementById('walRanges').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  document.querySelector('#walRanges button.on').classList.remove('on'); b.classList.add('on');
  wal.range=b.dataset.r; loadWallet();
});
try{ new ResizeObserver(()=>renderWal()).observe(document.getElementById('walWrap')); }catch(e){}
loadWallet();
</script>
