<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<meta name="robots" content="noindex,nofollow"/>
<title>ALPEXA Crypto — Dashboard (DEV)</title>
<link rel="stylesheet" href="../legend-ui.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../alpexa-sync.js?v=16"></script>
<!-- ══════════════════════════════════════════════════════════════════════════
  크립토 레전드 대시보드 — DEV 격리 빌드 (2026-07-16)
  · 기존 파일 0터치: 이 파일은 dev/ 안에서만 자란다. legend-ui.css는 링크만.
  · 어디서도 링크되지 않음 + noindex — 고객 유입 경로 없음.
  · 완성 + 승인 후 정식 위치로 한 번에 이동("실행").
  · 이 단계(바탕화면): 위젯 무브먼트 엔진 — 픽셀 드래그 · 자석 스냅(±6px) + 초록
    정렬 가이드 · 8px 미세 격자 · 4방향 리사이즈 · z-순서 · 레이아웃 저장/리셋 ·
    뷰포트 리핏(선형 사상) · 풀스크린. sports-dashboard.html 검증 엔진의 이식본.
  · 데이터/돈 코드 0 — 위젯 본문은 다음 단계에서 연결 (기획서 M1~M5).
═══════════════════════════════════════════════════════════════════════════ -->
<style>
html,body{height:100%; margin:0; background:var(--lgd-bg,#0B0D0E)}
body{color:var(--lgd-ink,#F5F6F7); overflow:hidden}
.tnum{font-variant-numeric:tabular-nums}
/* 스크롤바 전면 숨김 (스포츠 대시보드와 동일 결정) */
*{scrollbar-width:none; -ms-overflow-style:none}
/* 즉시 눌림 피드백 (2026-07-17 사장님 "빛의 속도") — 클릭 순간 시각 반응, transition 없음 */
button:active:not(:disabled),.htab:active,.hic:active,.chip:active,.mrow:active,.prow2:active,
.arow:active,.ubtn:active,.mx:active,.madd:active,.addtab:active,.avatar:active{
  transform:scale(.97); filter:brightness(1.15)}
*::-webkit-scrollbar{width:0; height:0; display:none}

/* ══ 헤더 (레전드 §2: h48 · 블랙 바 · 탭 필 · 중앙 상태 필 · 우측 액션) ══ */
.hdr{display:flex; align-items:center; gap:8px; height:var(--lgd-header-h); padding:0 14px;
  background:#000; border-bottom:1px solid var(--lgd-hair)}
.mark{width:26px; height:26px; display:flex; align-items:center; justify-content:center;
  color:#fff; font-family:'Arial Black',Arial,sans-serif; font-weight:900; font-size:19px; letter-spacing:-1px}
.htab{display:flex; align-items:center; gap:8px; background:var(--lgd-pill); border-radius:var(--lgd-r-btn);
  height:32px; padding:0 14px 0 12px; font-size:var(--lgd-fs-tab); font-weight:600; cursor:pointer; transition:background .12s}
.htab:hover{background:var(--lgd-pill-hi)}
/* 앱 전환 칩 (2026-07-17 사장님 지시) — 비활성 탭 톤, 클릭=같은 탭 이동(세션 유지) */
.swtab{background:none; color:var(--lgd-dim); cursor:pointer}
.swtab:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
.addtab{width:32px; height:32px; border-radius:var(--lgd-r-btn); display:flex; align-items:center;
  justify-content:center; color:var(--lgd-dim); font-size:19px; cursor:pointer}
.addtab:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
.hsp{flex:1}
.hmid{display:flex; align-items:center; gap:8px; background:var(--lgd-pill); border-radius:999px;
  height:32px; padding:0 14px; font-size:var(--lgd-fs-body); font-weight:600}
.hmid .dot{width:6px; height:6px; border-radius:999px; background:#C8C8C2}
.hmid .dot.ok{background:var(--lgd-up)}
.hbtn{background:var(--lgd-pill); border:none; color:var(--lgd-ink); border-radius:var(--lgd-r-btn); height:32px;
  padding:0 14px; font-size:var(--lgd-fs-body); font-weight:600; cursor:pointer; transition:background .12s}
.hbtn:hover{background:var(--lgd-pill-hi)}
.hic{width:34px; height:34px; border-radius:var(--lgd-r-btn); display:flex; align-items:center;
  justify-content:center; color:var(--lgd-ink); cursor:pointer}
.hic:hover{background:var(--lgd-pill)}
.avatar{width:28px; height:28px; border-radius:999px; background:#3A3E42; display:flex;
  align-items:center; justify-content:center; color:#101214; cursor:pointer;
  font-size:12.5px; font-weight:800; position:relative}
.avatar.me{background:#26292C; color:#C9CDD1}   /* 로그인 = 사람 아이콘 + 초록 상태점 (사장님 시안) */
.avatar .pdot{position:absolute; right:-1px; bottom:-1px; width:9px; height:9px; border-radius:50%;
  background:var(--lgd-up); border:2px solid var(--lgd-surface)}
body.light .avatar.me{background:#D7DBE2; color:#4a5364}
body.light .avatar .pdot{border-color:#fff}
.avatar.signin{background:var(--lgd-up); color:#04250B; animation:avpulse 2s ease-in-out infinite}
@keyframes avpulse{0%,100%{box-shadow:0 0 0 0 rgba(0,200,5,.45)}50%{box-shadow:0 0 0 7px rgba(0,200,5,0)}}
.tabrow{display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:6px; cursor:pointer}
.tabrow:hover{background:var(--lgd-pill)}
.tabrow.dis{cursor:default; color:var(--lgd-dim)}
.tabrow.dis:hover{background:transparent}
.tabrow .sub{margin-left:auto; color:var(--lgd-dim); font-size:var(--lgd-fs-caption)}

/* ══ 캔버스 + 점 그리드 (드래그/리사이즈 중에만) ══ */
.stage{position:relative; height:calc(100vh - 49px); overflow:auto; background:var(--lgd-bg)}
.dots{position:absolute; inset:0; opacity:0; transition:opacity .18s; pointer-events:none; z-index:1;
  background-image:radial-gradient(circle, rgba(255,255,255,.15) 1.2px, transparent 1.6px);
  background-size:38px 38px; background-position:19px 19px}
.stage.dragging .dots{opacity:1}
.algn{position:absolute; background:var(--lgd-up); z-index:45; pointer-events:none}
.algn.v{width:1px; top:0; bottom:0}
.algn.h{height:1px; left:0; right:0}
@media (prefers-reduced-motion: reduce){ .dots{transition:none} }

/* ══ 위젯 크롬 (레전드 §3: 타이틀바 36 · 링크 사각형 · ⋮ · 4방향 리사이즈) ══ */
.widget{position:absolute; display:flex; flex-direction:column; background:var(--lgd-surface);
  border:1px solid var(--lgd-hair); border-radius:var(--lgd-r-widget); overflow:hidden; z-index:2}
.widget.drag{box-shadow:0 12px 32px rgba(0,0,0,.6); opacity:.92; z-index:9}
.wtb{display:flex; align-items:center; gap:9px; height:var(--lgd-titlebar-h); padding:0 10px;
  border-bottom:1px solid var(--lgd-hair); flex:none; cursor:grab; user-select:none}
.widget.drag .wtb{cursor:grabbing}
.linksq{width:12px; height:12px; border-radius:3px; flex:none; cursor:pointer}
.wtb h3{margin:0; font-size:var(--lgd-fs-widget-title); font-weight:700}
.wtb .wsub{font-size:var(--lgd-fs-label); color:var(--lgd-dim)}
.wtb .wsp{flex:1}
.wtb .wic{width:24px; height:24px; display:flex; align-items:center; justify-content:center;
  color:var(--lgd-dim); cursor:pointer; border-radius:5px}
.wtb .wic:hover{background:var(--lgd-surface2); color:var(--lgd-ink)}
.wbody{flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column}
.rz{position:absolute; z-index:6}
.rz.br{right:0; bottom:0; width:18px; height:18px; cursor:nwse-resize}
.rz.br::after{content:""; position:absolute; right:5px; bottom:5px; width:7px; height:7px;
  border-right:2px solid var(--lgd-dim); border-bottom:2px solid var(--lgd-dim);
  border-bottom-right-radius:2px; opacity:0; transition:opacity .12s}
.widget:hover .rz.br::after{opacity:1}
.rz.r{right:-3px; top:12px; bottom:20px; width:8px; cursor:ew-resize}
.rz.l{left:-3px; top:12px; bottom:20px; width:8px; cursor:ew-resize}
.rz.b{bottom:-3px; left:12px; right:20px; height:8px; cursor:ns-resize}
.rz.r:hover,.rz.l:hover,.rz.b:hover{background:rgba(255,255,255,.06); border-radius:4px}
.wempty{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  color:var(--lgd-dim); font-size:var(--lgd-fs-label); text-align:center; padding:16px}
.wempty .big{font-size:15px; font-weight:700; color:var(--lgd-ink); opacity:.55}
.wempty .tag{background:var(--lgd-pill); border-radius:999px; padding:4px 11px; font-size:10.5px;
  font-weight:700; letter-spacing:.4px; color:var(--lgd-dim)}

/* ══ W1 My wallet — RH 크립토 차트 문법 (앱 Chart 973-1058 번역) ══ */
.wal{flex:1; min-height:0; display:flex; flex-direction:column; padding:14px 16px 10px;
  overflow:auto}   /* KV 섹션이 위젯보다 길면 휠 스크롤 (2026-07-17 사장님 리포트) */
.wal .lbl{font-size:var(--lgd-fs-label); color:var(--lgd-dim); font-weight:600}
.wal .amt{font-size:26px; font-weight:700; letter-spacing:-.3px; margin-top:2px}
.wal .amt .cents{font-size:17px; color:var(--lgd-dim)}
.wal .chg{font-size:var(--lgd-fs-caption); font-weight:600; margin-top:3px; min-height:15px}
.wal .chg.up{color:var(--lgd-up)} .wal .chg.down{color:var(--lgd-down)}
.wal .chg .dim{color:var(--lgd-dim); font-weight:500}
.wal .chartwrap{position:relative; flex:1 0 auto; min-height:120px; margin:8px -6px 2px}
.wal svg.rhchart{width:100%; height:100%; display:block; touch-action:none; cursor:crosshair}
.wal .ranges{display:flex; gap:2px; flex:none; margin-top:4px}
.wal .ranges button{flex:1; background:none; border:none; color:var(--lgd-dim); font-size:10.5px;
  font-weight:700; padding:6px 0; border-radius:6px; cursor:pointer; font-family:inherit; letter-spacing:.3px}
.wal .ranges button:hover{color:var(--lgd-ink)}
.wal .ranges button.on{background:var(--lgd-pill); color:var(--lgd-ink)}
.wal .pvtag{position:absolute; left:50%; top:8px; transform:translateX(-50%); background:var(--lgd-pill);
  color:var(--lgd-dim); border-radius:999px; padding:3px 10px; font-size:9.5px; font-weight:700; letter-spacing:.6px}
/* 발란스 키-밸류 섹션 (스포츠 발란스 문법 이식 — 라벨 dim 12px / 값 12.5px tabular / 행 24px) */
.wal .kvs{flex:none; overflow:auto; margin-top:6px}
.wal .sect{font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--lgd-dim);
  padding:10px 0 5px; border-bottom:1px solid var(--lgd-hair); margin-bottom:3px}
.wal .kv{display:flex; align-items:center; height:24px; font-size:12.5px}
.wal .kv .k{color:var(--lgd-dim); font-size:12px}
.wal .kv .v{margin-left:auto; font-weight:600}
.wal .kv .v.up{color:var(--lgd-up)} .wal .kv .v.down{color:var(--lgd-down)}
.wal .kv.lnk{cursor:pointer; border-radius:5px; margin:0 -6px; padding:0 6px}
.wal .kv.lnk:hover{background:var(--lgd-surface2)}
.wal .kv .go{color:var(--lgd-dim); font-size:11px; margin-left:7px}

/* ══ W3 Markets — 레전드 워치리스트 문법 (사용자 스크린샷 2026-07-16) ══ */
.mk{flex:1; min-height:0; display:flex; flex-direction:column; position:relative}
.mk .mhead{display:grid; grid-template-columns:26px 1.2fr 1fr 1fr 1fr; gap:6px; padding:8px 14px 6px;
  font-size:10.5px; font-weight:700; letter-spacing:.4px; color:var(--lgd-dim); border-bottom:1px solid var(--lgd-hair)}
.mk .mhead span{text-align:right}
.mk .mhead .sym{text-align:left}
.mk .mhead .sortable{cursor:pointer; user-select:none}
.mk .mhead .sortable:hover{color:var(--lgd-ink)}
.mk .mlist{flex:1; overflow:auto}
.mk .mrow{display:grid; grid-template-columns:26px 1.2fr 1fr 1fr 1fr; gap:6px; align-items:center;
  padding:9px 14px; font-size:12.5px; cursor:pointer; border-bottom:1px solid transparent}
.mk .mrow:hover{background:var(--lgd-surface2)}
.mk .mrow .idx{color:var(--lgd-dim); font-size:11px}
.mk .mrow .sym{display:flex; align-items:center; gap:6px; font-weight:700}
.mk .mrow .sym .cbadge{width:13px; height:13px; border-radius:50%; border:1.4px solid var(--lgd-dim);
  display:inline-flex; align-items:center; justify-content:center; font-size:8px; color:var(--lgd-dim); flex:none}
.mk .mrow .chg{text-align:right; font-weight:600}
.mk .mrow .chg.up{color:var(--lgd-up)} .mk .mrow .chg.down{color:var(--lgd-down)}
.mk .mrow .px{text-align:right; font-weight:600}
@keyframes mkflashU{0%{background:var(--lgd-up-soft,rgba(0,200,5,.16))}100%{background:transparent}}
@keyframes mkflashD{0%{background:rgba(235,93,42,.14)}100%{background:transparent}}
.mk .mrow.fu{animation:mkflashU .7s ease-out}
.mk .mrow.fd{animation:mkflashD .7s ease-out}
.mk .madd{display:flex; align-items:center; gap:8px; padding:10px 14px; color:var(--lgd-dim);
  font-size:12.5px; font-weight:600; cursor:pointer; flex:none}
.mk .madd:hover{color:var(--lgd-ink)}
/* + Add 팝오버 — 검색 + 카테고리 칩 + 체크 리스트 */
.mk .mpop{position:absolute; left:10px; right:10px; bottom:44px; z-index:8; background:var(--lgd-surface2);
  border:1px solid var(--lgd-hair); border-radius:var(--lgd-r-pop); box-shadow:0 12px 32px rgba(0,0,0,.5);
  padding:10px; display:none; flex-direction:column; gap:8px; max-height:62%}
.mk .mpop.open{display:flex}
.mk .mpop .srch{display:flex; align-items:center; gap:7px; background:var(--lgd-pill); border-radius:8px; padding:7px 10px}
.mk .mpop .srch input{flex:1; background:none; border:none; outline:none; color:var(--lgd-ink);
  font-size:12.5px; font-family:inherit}
.mk .mpop .srch .x{cursor:pointer; color:var(--lgd-dim)}
.mk .mpop .chips{display:flex; gap:6px; flex-wrap:wrap}
.mk .mpop .chip{background:var(--lgd-pill); border-radius:999px; padding:5px 12px; font-size:11px;
  font-weight:700; cursor:pointer; color:var(--lgd-ink)}
.mk .mpop .chip.on{background:var(--lgd-ink); color:var(--lgd-bg)}
.mk .mpop .chip.dis{color:var(--lgd-dim); cursor:default}
.mk .mpop .grp{font-size:10.5px; font-weight:700; letter-spacing:.4px; color:var(--lgd-dim); padding:4px 2px 2px}
.mk .mpop .plist{overflow:auto; min-height:0}
.mk .mpop .prow{display:flex; align-items:center; gap:9px; padding:7px 6px; border-radius:6px;
  cursor:pointer; font-size:12.5px}
.mk .mpop .prow:hover{background:var(--lgd-pill)}
.mk .mpop .prow .ps{font-weight:700; width:52px}
.mk .mpop .prow .pn{color:var(--lgd-dim)}
.mk .mpop .prow .ck{margin-left:auto; color:var(--lgd-dim)}
.mk .mpop .prow.in .ps,.mk .mpop .prow.in .pn{opacity:.45}

/* ══ W4 Chart — 레전드 캔들 차트 (사용자 스크린샷 2026-07-16) ══ */
.ch{flex:1; min-height:0; display:flex; flex-direction:column}
.ch .chd{display:flex; align-items:center; gap:9px; padding:8px 12px 6px; flex:none; flex-wrap:wrap}
.ch .csym{display:flex; align-items:center; gap:7px; background:var(--lgd-pill); border-radius:8px;
  padding:6px 11px; font-size:13px; font-weight:700}
.ch .csym .cbadge{width:13px; height:13px; border-radius:50%; border:1.4px solid var(--lgd-dim);
  display:inline-flex; align-items:center; justify-content:center; font-size:8px; color:var(--lgd-dim)}
.ch .cchg{font-size:12px; font-weight:700}
.ch .cchg.up{color:var(--lgd-up)} .ch .cchg.down{color:var(--lgd-down)}
.ch .csp{flex:1}
.ch .cbtn{background:var(--lgd-pill); border:none; color:var(--lgd-ink); border-radius:7px; height:26px;
  padding:0 13px; font-size:11.5px; font-weight:700; cursor:pointer; font-family:inherit; opacity:.55}
.ch .cbtn[title]{cursor:help}
.ch .ohlc{display:flex; gap:10px; padding:0 12px 6px; font-size:11px; font-weight:600; flex:none; flex-wrap:wrap}
.ch .ohlc b{color:var(--lgd-dim); font-weight:700; margin-right:3px}
.ch .ohlc .v.up{color:var(--lgd-up)} .ch .ohlc .v.down{color:var(--lgd-down)} .ch .ohlc .v.dim{color:var(--lgd-dim)}
.ch .cwrap{position:relative; flex:1; min-height:80px}
.ch canvas{position:absolute; inset:0; width:100%; height:100%; cursor:crosshair}
.ch .ctag{position:absolute; right:0; transform:translateY(-50%); font-size:10.5px; font-weight:700;
  padding:2px 7px; border-radius:4px; color:#04250B; pointer-events:none; font-variant-numeric:tabular-nums}
.ch .cempty{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  color:var(--lgd-dim); font-size:12px}
.ch .cbar{display:flex; align-items:center; gap:2px; padding:5px 10px 7px; flex:none; border-top:1px solid var(--lgd-hair)}
.ch .cbar button{background:none; border:none; color:var(--lgd-dim); font-size:10.5px; font-weight:700;
  padding:5px 8px; border-radius:6px; cursor:pointer; font-family:inherit}
.ch .cbar button:hover{color:var(--lgd-ink)}
.ch .cbar button.on{background:var(--lgd-pill); color:var(--lgd-ink)}
.ch .cbar .isel{margin-left:auto; display:flex; align-items:center; gap:5px; color:var(--lgd-dim);
  font-size:10.5px; font-weight:700}
.ch .cbar select{background:var(--lgd-pill); border:none; color:var(--lgd-ink); border-radius:6px;
  padding:4px 6px; font-size:10.5px; font-weight:700; font-family:inherit; outline:none}

/* ══ W2 Portfolio — 앱 AssetRow 문법 (crypto-live.html:1131-1209 번역) ══ */
.pf{flex:1; min-height:0; overflow:auto; padding:4px 0 8px}
.pf .sect{font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--lgd-dim);
  padding:12px 14px 5px; border-bottom:1px solid var(--lgd-hair); margin-bottom:2px; display:flex; align-items:center; gap:7px}
.pf .sect .lv{width:6px; height:6px; border-radius:50%; background:var(--lgd-up)}
.pf .prow2{display:grid; grid-template-columns:30px 1fr auto; gap:9px; align-items:center;
  padding:8px 14px; cursor:pointer}
.pf .prow2:hover{background:var(--lgd-surface2)}
.pf .aicon{width:26px; height:26px; border-radius:50%; background:var(--lgd-pill); display:flex;
  align-items:center; justify-content:center; font-size:10px; font-weight:800; color:var(--lgd-dim)}
.pf .anm{min-width:0}
.pf .anm .t{font-size:12.5px; font-weight:700}
.pf .anm .s{font-size:11px; color:var(--lgd-dim); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.pf .anm .s .earn{color:var(--lgd-up); font-weight:600}
.pf .aval{text-align:right}
.pf .aval .v{font-size:12.5px; font-weight:700}
.pf .aval .c{font-size:11px; font-weight:600; margin-top:1px}
.pf .aval .c.up{color:var(--lgd-up)} .pf .aval .c.down{color:var(--lgd-down)} .pf .aval .c.dim{color:var(--lgd-dim)}
.pf .lockchip{display:inline-flex; align-items:center; gap:4px; background:var(--lgd-pill); border-radius:999px;
  padding:1px 8px; font-size:9.5px; font-weight:700; color:var(--lgd-dim); margin-left:6px}
.pf .pfempty{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  padding:34px 16px; color:var(--lgd-dim); font-size:12px; text-align:center}
.pf .pfempty .big{font-size:14px; font-weight:700; color:var(--lgd-ink); opacity:.6}

/* ══ W9 Activity — 원장 (crypto_trades + requests) ══ */
.ac{flex:1; min-height:0; display:flex; flex-direction:column}
.ac .fbar{display:flex; align-items:center; gap:5px; padding:8px 12px; flex:none; flex-wrap:wrap}
.ac .fbar .fc{background:var(--lgd-pill); border:none; color:var(--lgd-dim); border-radius:999px;
  padding:5px 11px; font-size:10.5px; font-weight:700; cursor:pointer; font-family:inherit}
.ac .fbar .fc.on{background:var(--lgd-ink); color:var(--lgd-bg)}
.ac .fbar .sp{flex:1}
.ac .fbar select{background:var(--lgd-pill); border:none; color:var(--lgd-ink); border-radius:6px;
  padding:4px 7px; font-size:10.5px; font-weight:700; font-family:inherit; outline:none}
.ac .alist{flex:1; overflow:auto; padding-bottom:8px}
.ac .dhead{font-size:10.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
  color:var(--lgd-dim); padding:10px 14px 4px}
.ac .arow{display:grid; grid-template-columns:28px 1fr auto; gap:9px; align-items:center; padding:7px 14px}
.ac .arow:hover{background:var(--lgd-surface2)}
.ac .aic{width:24px; height:24px; border-radius:50%; background:var(--lgd-pill); display:flex;
  align-items:center; justify-content:center; font-size:11px}
.ac .at .t{font-size:12.5px; font-weight:700}
.ac .at .s{font-size:10.5px; color:var(--lgd-dim); margin-top:1px}
.ac .aamt{text-align:right; font-size:12.5px; font-weight:700}
.ac .aamt.up{color:var(--lgd-up)} .ac .aamt.down{color:var(--lgd-ink)}
.ac .stch{display:inline-flex; margin-left:6px; background:var(--lgd-pill); border-radius:999px;
  padding:1px 7px; font-size:9px; font-weight:700; letter-spacing:.3px; color:var(--lgd-dim)}
.ac .stch.ok{color:var(--lgd-up)} .ac .stch.no{color:var(--lgd-down)}
.ac .acempty{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; color:var(--lgd-dim); font-size:12px; text-align:center; padding:20px}
.ac .acempty .big{font-size:14px; font-weight:700; color:var(--lgd-ink); opacity:.6}

/* ══ W5 Trade — 자산 Summary 패널 + Buy/Sell 티켓 (레전드 샷 2026-07-17) ══ */
.tr{flex:1; min-height:0; display:flex; flex-direction:column; position:relative; overflow:auto}
.tr .thead{padding:12px 14px 4px}
.tr .tnm{font-size:13px; font-weight:600; color:var(--lgd-dim)}
.tr .tpx{font-size:22px; font-weight:700; letter-spacing:-.3px; margin-top:1px}
.tr .tch{font-size:11.5px; font-weight:700; margin-top:2px}
.tr .tch.up{color:var(--lgd-up)} .tr .tch.down{color:var(--lgd-down)}
.tr .tba{font-size:11px; color:var(--lgd-dim); margin-top:6px; line-height:1.6}
.tr .tba b{color:var(--lgd-ink); font-weight:600}
.tr .tbtns{display:flex; gap:8px; padding:10px 14px}
.tr .tbtns button{flex:1; background:var(--lgd-pill); border:none; border-radius:8px; height:32px;
  font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--lgd-ink)}
.tr .tbtns button:hover{background:var(--lgd-pill-hi)}
.tr .tbtns .buy{background:var(--lgd-up); color:#04250B}   /* 활성 룩 (2026-07-17 사장님 지시) */
.tr .tbtns .buy:hover{filter:brightness(1.08)}
.tr .ttabs{display:flex; gap:16px; padding:4px 14px 0; border-bottom:1px solid var(--lgd-hair)}
.tr .ttabs span{font-size:12px; font-weight:700; padding:7px 1px; color:var(--lgd-dim)}
.tr .ttabs span.on{color:var(--lgd-ink); border-bottom:2px solid var(--lgd-ink)}
.tr .ttabs span.dis{opacity:.45}
.tr .tsec{padding:12px 14px 0}
.tr .tsec .h{font-size:12.5px; font-weight:700; margin-bottom:8px}
.tr .rng{position:relative; height:5px; border-radius:3px; background:linear-gradient(90deg,var(--lgd-down),var(--lgd-down)); opacity:.9}
.tr .rng .mk2{position:absolute; top:-2.5px; width:3px; height:10px; background:#FF9500; border-radius:2px; transform:translateX(-50%)}
.tr .rlh{display:flex; justify-content:space-between; font-size:10.5px; color:var(--lgd-dim); margin-top:5px}
.tr .rlh b{color:var(--lgd-ink); font-weight:600}
.tr .vrow{display:flex; font-size:11.5px; padding:4px 0 12px}
.tr .vrow .k{color:var(--lgd-dim)} .tr .vrow .v{margin-left:auto; font-weight:600}
.tr .hdl{font-size:11px; color:var(--lgd-dim); padding:0 0 14px}
/* 티켓 오버레이 */
.tk{position:absolute; inset:0; z-index:9; background:var(--lgd-surface); display:none; flex-direction:column; overflow:auto}
/* 팝업 모드 (2026-07-17 사장님 지시, 레전드 주문창) — 포트폴리오 클릭 시 떠 있는 창.
   같은 티켓 DOM·같은 돈 경로, 표시만 플로팅. */
.tk.float{position:fixed; inset:auto; left:50%; top:50%; transform:translate(-50%,-50%);
  width:330px; max-height:86vh; z-index:80; border:1px solid var(--lgd-hair);
  border-radius:12px; box-shadow:0 18px 52px rgba(0,0,0,.55)}
body.light .tk.float{box-shadow:0 18px 52px rgba(15,23,40,.28)}
.tk.open{display:flex}
.tk .tkh{display:flex; align-items:center; padding:11px 14px 7px}
.tk .tkh .t{font-size:14px; font-weight:800}
.tk .tkh .x{margin-left:auto; cursor:pointer; color:var(--lgd-dim); font-size:15px; padding:3px 6px}
.tk .seg{display:flex; gap:4px; margin:2px 14px 10px; background:var(--lgd-pill); border-radius:8px; padding:3px}
.tk .seg button{flex:1; background:none; border:none; border-radius:6px; height:26px; font-size:12px;
  font-weight:700; cursor:pointer; font-family:inherit; color:var(--lgd-dim)}
.tk .seg button.on{background:var(--lgd-up); color:#04250B}
.tk .seg button.on.sellon{background:var(--lgd-pill-hi); color:var(--lgd-ink)}
.tk .frow{display:flex; align-items:center; padding:7px 14px; font-size:12.5px}
.tk .frow .k{color:var(--lgd-ink); font-weight:600}
.tk .frow .r{margin-left:auto; display:flex; align-items:center; gap:6px}
.tk select{background:var(--lgd-pill); border:none; color:var(--lgd-ink); border-radius:7px;
  padding:6px 9px; font-size:12px; font-weight:700; font-family:inherit; outline:none}
.tk .qwrap{display:flex; align-items:center; gap:2px; background:var(--lgd-pill); border-radius:7px; padding:2px}
.tk .qwrap input{width:110px; background:none; border:none; outline:none; color:var(--lgd-ink);
  font-size:13px; font-weight:700; text-align:right; padding:5px 7px; font-family:inherit; font-variant-numeric:tabular-nums}
.tk .qwrap .stp{display:flex; flex-direction:column; gap:1px; padding-right:4px}
.tk .qwrap .stp button{background:var(--lgd-pill-hi); border:none; color:var(--lgd-ink); border-radius:4px;
  width:18px; height:12px; font-size:9px; line-height:1; cursor:pointer; font-family:inherit}
.tk .warn{margin:4px 14px; font-size:11.5px; line-height:1.5; color:#FF9500; display:none}
.tk .warn a{color:#FF9500; font-weight:700; text-decoration:underline; cursor:pointer}
.tk .hairline{border-top:1px solid var(--lgd-hair); margin:8px 14px}
.tk .sumrow{display:flex; padding:5px 14px; font-size:12.5px}
.tk .sumrow .k{font-weight:700}
.tk .sumrow .k small{display:block; font-weight:500; color:var(--lgd-dim); font-size:10.5px; margin-top:1px}
.tk .sumrow .v{margin-left:auto; font-weight:700; text-align:right}
.tk .sumrow .v small{display:block; font-weight:500; color:var(--lgd-dim); font-size:10.5px; margin-top:1px}
.tk .bp{padding:2px 14px 0; font-size:11px; color:var(--lgd-dim)}
.tk .disc{padding:12px 14px 0; font-size:10px; color:var(--lgd-dim); line-height:1.55}
.tk .tkbtns{display:flex; gap:8px; padding:12px 14px 14px; margin-top:auto}
.tk .tkbtns button{border:none; border-radius:8px; height:36px; font-size:12.5px; font-weight:700;
  cursor:pointer; font-family:inherit}
.tk .tkbtns .cancel{flex:1; background:var(--lgd-pill); color:var(--lgd-ink)}
.tk .tkbtns .go{flex:1.4; background:var(--lgd-up); color:#04250B}
.tk .tkbtns .go:disabled{background:var(--lgd-pill); color:var(--lgd-dim); cursor:not-allowed}
.tk .done{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:20px}
.tk .done .ic{width:44px; height:44px; border-radius:50%; background:var(--lgd-up); color:#04250B;
  display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900}
.tk .done .t1{font-size:14px; font-weight:800}
.tk .done .t2{font-size:11.5px; color:var(--lgd-dim)}

/* ══ W6 Swap ══ */
.sw{flex:1; min-height:0; display:flex; flex-direction:column; overflow:auto; padding:6px 0}
.sw .card{margin:6px 14px; background:var(--lgd-surface2); border:1px solid var(--lgd-hair);
  border-radius:10px; padding:10px 12px}
.sw .lbl2{font-size:10.5px; font-weight:700; letter-spacing:.5px; color:var(--lgd-dim); text-transform:uppercase}
.sw .row2{display:flex; align-items:center; gap:8px; margin-top:7px}
.sw select{background:var(--lgd-pill); border:none; color:var(--lgd-ink); border-radius:7px;
  padding:7px 9px; font-size:12.5px; font-weight:700; font-family:inherit; outline:none}
.sw input{flex:1; min-width:0; background:none; border:none; outline:none; color:var(--lgd-ink);
  font-size:16px; font-weight:700; text-align:right; font-family:inherit; font-variant-numeric:tabular-nums}
.sw .sub2{font-size:10.5px; color:var(--lgd-dim); margin-top:5px; display:flex}
.sw .sub2 .mx{margin-left:auto; color:var(--lgd-ink); font-weight:700; cursor:pointer}
.sw .arrow{display:flex; justify-content:center; margin:-2px 0; color:var(--lgd-dim); font-size:14px}
.sw .meta{padding:4px 16px; font-size:11px; color:var(--lgd-dim); display:flex}
.sw .meta .v{margin-left:auto; color:var(--lgd-ink); font-weight:600}
.sw .warn{margin:4px 16px; font-size:11.5px; color:#FF9500; display:none}
.sw .gobtn{margin:8px 14px 12px; background:var(--lgd-up); color:#04250B; border:none; border-radius:8px;
  height:36px; font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit}
.sw .gobtn:disabled{background:var(--lgd-pill); color:var(--lgd-dim); cursor:not-allowed}
.sw .done2{display:none; flex-direction:column; align-items:center; gap:6px; padding:14px; text-align:center}
.sw .done2 .ic{width:36px; height:36px; border-radius:50%; background:var(--lgd-up); color:#04250B;
  display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:900}
.sw .done2 .t1{font-size:13px; font-weight:800}
.sw .done2 .t2{font-size:11px; color:var(--lgd-dim)}

/* ══ W10 Money moves ══ */
.mm{flex:1; min-height:0; display:flex; flex-direction:column; overflow:auto}
.mm .mtabs{display:flex; gap:14px; padding:8px 14px 0; border-bottom:1px solid var(--lgd-hair); flex:none}
.mm .mtabs span{font-size:12px; font-weight:700; padding:6px 1px; color:var(--lgd-dim); cursor:pointer}
.mm .mtabs span.on{color:var(--lgd-ink); border-bottom:2px solid var(--lgd-ink)}
.mm .pane{padding:10px 14px; display:none; flex-direction:column; gap:8px}
.mm .pane.on{display:flex}
.mm .fld .l{font-size:10.5px; font-weight:700; letter-spacing:.5px; color:var(--lgd-dim); text-transform:uppercase; margin-bottom:4px}
.mm .fld input,.mm .fld select{width:100%; box-sizing:border-box; background:var(--lgd-pill); border:none;
  color:var(--lgd-ink); border-radius:7px; padding:8px 10px; font-size:12.5px; font-weight:600;
  font-family:inherit; outline:none; font-variant-numeric:tabular-nums}
.mm .hint{font-size:10.5px; color:var(--lgd-dim); margin-top:3px; min-height:13px}
.mm .hint.ok{color:var(--lgd-up)} .mm .hint.bad{color:var(--lgd-down)}
.mm .meta2{display:flex; font-size:11px; color:var(--lgd-dim)}
.mm .meta2 .v{margin-left:auto; color:var(--lgd-ink); font-weight:600}
.mm .meta2 .mx{margin-left:8px; color:var(--lgd-ink); font-weight:700; cursor:pointer}
.mm .warn2{font-size:11.5px; color:#FF9500; display:none}
.mm .gobtn{background:var(--lgd-up); color:#04250B; border:none; border-radius:8px; height:34px;
  font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit}
.mm .gobtn:disabled{background:var(--lgd-pill); color:var(--lgd-dim); cursor:not-allowed}
.mm .done3{display:none; flex-direction:column; align-items:center; gap:6px; padding:10px; text-align:center}
.mm .done3 .ic{width:34px; height:34px; border-radius:50%; background:var(--lgd-up); color:#04250B;
  display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:900}
.mm .done3 .t1{font-size:12.5px; font-weight:800}
.mm .done3 .t2{font-size:10.5px; color:var(--lgd-dim)}
.mm .soon2{padding:22px 10px; text-align:center; color:var(--lgd-dim); font-size:11.5px}
.mm .wirebox{background:var(--lgd-pill); border-radius:8px; padding:8px 10px; font-size:10.5px}
.mm .wirebox .wr{display:flex; gap:8px; padding:2px 0}
.mm .wirebox .wr .l2{color:var(--lgd-dim); width:64px; flex:none}
.mm .wirebox .wr .v2{font-weight:600; word-break:break-all}
.mm .wirebox .ref{color:var(--lgd-down); font-weight:800; letter-spacing:.4px}
.mm .wirebox .cpy{margin-top:4px; background:var(--lgd-pill-hi); border:none; color:var(--lgd-ink);
  font-size:10px; font-weight:700; border-radius:6px; padding:4px 10px; cursor:pointer; font-family:inherit}
.mm .rcqr{display:flex; justify-content:center; padding:2px 0}
.mm .rcqr img{border-radius:8px; background:#fff; padding:6px; display:none}
.mm .rcaddr{background:var(--lgd-pill); border-radius:7px; padding:8px 10px; font-size:11.5px;
  font-weight:600; word-break:break-all; user-select:all}

/* ══ W8 Open orders ══ */
.od{flex:1; min-height:0; display:flex; flex-direction:column; overflow:auto}
.od .odh{padding:9px 14px 5px; font-size:10.5px; font-weight:800; letter-spacing:.6px;
  color:var(--lgd-dim); text-transform:uppercase}
.od .orow{display:flex; align-items:center; gap:8px; padding:7px 14px; border-bottom:1px solid var(--lgd-hair)}
.od .orow .nm{font-size:12.5px; font-weight:800}
.od .typechip{font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
  background:rgba(0,200,5,.10); border:1px solid rgba(0,200,5,.35); color:var(--lgd-up);
  border-radius:999px; padding:1px 7px; margin-left:6px}
.od .orow .sub{font-size:10.5px; color:var(--lgd-dim); margin-top:2px}
.od .orow .man{margin-left:auto; font-size:9.5px; font-weight:700; letter-spacing:.6px;
  text-transform:uppercase; color:var(--lgd-dim)}
.od .orow .cx{background:var(--lgd-pill); border:none; color:var(--lgd-ink); font-size:10.5px;
  font-weight:700; border-radius:6px; padding:4px 10px; cursor:pointer; font-family:inherit}
.od .empty2{padding:14px; font-size:11px; color:var(--lgd-dim); line-height:1.5}

/* ══ 설정 패널 (Settings) ══ */
.stg{flex:1; min-height:0; display:flex; flex-direction:column; overflow:auto}
.stg .sect2{padding:10px 14px 5px; font-size:10.5px; font-weight:800; letter-spacing:.6px;
  color:var(--lgd-dim); text-transform:uppercase}
.stg .kv2{display:flex; align-items:center; padding:6px 14px; font-size:11.5px}
.stg .kv2 .l{color:var(--lgd-dim)}
.stg .kv2 .v{margin-left:auto; font-weight:600; text-align:right; word-break:break-all}
.stg .empty2{padding:4px 14px 8px; font-size:11px; color:var(--lgd-dim)}
.stg .rowbtns{display:flex; gap:8px; padding:2px 14px 6px}
.stg .rowbtns button{flex:1; background:var(--lgd-pill); border:1px solid transparent; color:var(--lgd-ink);
  font-size:11.5px; font-weight:700; border-radius:7px; height:30px; cursor:pointer; font-family:inherit}
.stg .rowbtns button.on{background:rgba(0,200,5,.10); border-color:var(--lgd-up)}
.stg .fld2{padding:2px 14px 8px}
.stg .lbl3{font-size:10.5px; font-weight:700; letter-spacing:.5px; color:var(--lgd-dim);
  text-transform:uppercase; margin-bottom:4px}
.stg .refbox{background:var(--lgd-pill); border-radius:7px; padding:8px 10px; font-size:11px;
  font-weight:600; word-break:break-all; user-select:all}
.stg .row3{display:flex; gap:8px}
.stg .row3 input{flex:1; min-width:0; box-sizing:border-box; background:var(--lgd-pill); border:none;
  color:var(--lgd-ink); border-radius:7px; padding:8px 10px; font-size:12px; font-weight:600;
  font-family:inherit; outline:none}
.stg .mini{background:var(--lgd-pill-hi); border:none; color:var(--lgd-ink); font-size:11px;
  font-weight:700; border-radius:7px; padding:0 12px; height:32px; cursor:pointer; font-family:inherit}
.stg .mini.grn{background:var(--lgd-up); color:#04250B}
.stg .hint2{font-size:10.5px; color:var(--lgd-dim); margin-top:4px; min-height:13px}
.stg .hint2.ok{color:var(--lgd-up)} .stg .hint2.bad{color:#FF9500}
.stg .btm{padding:8px 14px 14px; display:flex; flex-direction:column; gap:8px; margin-top:auto}
.stg .btm button{background:var(--lgd-pill); border:none; color:var(--lgd-down); font-size:12px;
  font-weight:700; border-radius:8px; height:32px; cursor:pointer; font-family:inherit}
.stg .btm .b2{color:var(--lgd-dim)}

/* ══ W7 Staking ══ */
.stk{flex:1; min-height:0; display:flex; flex-direction:column; overflow:auto}
.stk .sect2{padding:9px 14px 5px; font-size:10.5px; font-weight:800; letter-spacing:.6px;
  color:var(--lgd-dim); text-transform:uppercase}
.stk .srow{padding:7px 14px; border-bottom:1px solid var(--lgd-hair)}
.stk .srow .top{display:flex; align-items:center; gap:8px}
.stk .srow .nm{font-size:12.5px; font-weight:800}
.stk .lockchip{font-size:9.5px; font-weight:700; background:var(--lgd-pill); color:var(--lgd-dim);
  border-radius:5px; padding:2px 6px; margin-left:6px}
.stk .srow .apy{font-size:10.5px; color:var(--lgd-up); font-weight:700; margin-left:2px}
.stk .srow .val{margin-left:auto; font-size:12.5px; font-weight:700; font-variant-numeric:tabular-nums}
.stk .srow .sub{display:flex; align-items:center; gap:8px; margin-top:3px; font-size:10.5px; color:var(--lgd-dim)}
.stk .srow .earn{color:var(--lgd-up); font-weight:600}
.stk .srow .ubtn{margin-left:auto; background:var(--lgd-pill); border:none; color:var(--lgd-ink);
  font-size:10.5px; font-weight:700; border-radius:6px; padding:4px 10px; cursor:pointer; font-family:inherit}
.stk .srow .ubtn:disabled{color:var(--lgd-dim); cursor:not-allowed}
.stk .cfm{margin-top:7px; background:var(--lgd-pill); border-radius:8px; padding:8px 10px; font-size:11px}
.stk .cfm .m{color:var(--lgd-ink); line-height:1.45}
.stk .cfm .m.warn3{color:#FF9500}
.stk .cfm .btns{display:flex; gap:8px; margin-top:7px}
.stk .cfm button{flex:1; border:none; border-radius:6px; height:26px; font-size:11px; font-weight:700;
  cursor:pointer; font-family:inherit}
.stk .cfm .yes{background:var(--lgd-up); color:#04250B}
.stk .cfm .no{background:var(--lgd-pill-hi); color:var(--lgd-ink)}
.stk .empty2{padding:14px; font-size:11px; color:var(--lgd-dim)}
.stk .form{padding:4px 14px 12px; display:flex; flex-direction:column; gap:8px}
.stk .fld .l{font-size:10.5px; font-weight:700; letter-spacing:.5px; color:var(--lgd-dim); text-transform:uppercase; margin-bottom:4px}
.stk .fld input,.stk .fld select{width:100%; box-sizing:border-box; background:var(--lgd-pill); border:none;
  color:var(--lgd-ink); border-radius:7px; padding:8px 10px; font-size:12.5px; font-weight:600;
  font-family:inherit; outline:none; font-variant-numeric:tabular-nums}
.stk .meta2{display:flex; font-size:11px; color:var(--lgd-dim)}
.stk .meta2 .v{margin-left:auto; color:var(--lgd-ink); font-weight:600}
.stk .meta2 .mx{margin-left:8px; color:var(--lgd-ink); font-weight:700; cursor:pointer}
.stk .pers{display:flex; gap:6px}

<div class="stage" id="stage"><div class="dots"></div></div>

<script>
'use strict';
/* ════════════════════ 레이아웃 엔진 — sports-dashboard.html 검증 이식본 ════════════════════
   픽셀 드래그 + 자석 스냅(±6px, 이웃 변/8px 갭/가터) + 초록 정렬 가이드 + 8px 미세 격자 +
   4방향 리사이즈 + z-순서 + 저장/리셋 + 뷰포트 선형 리핏. */
const GRID=38, FINE=8, SNAP=6, GAP=8, LKEY='alpexa.cbdash.layout.v1';
const stage=document.getElementById('stage');
const guides={ els:[], clear(){ this.els.forEach(e=>e.remove()); this.els=[]; },
  v(x){ const e=document.createElement('div'); e.className='algn v'; e.style.left=x+'px';
    stage.appendChild(e); this.els.push(e); },
  h(y){ const e=document.createElement('div'); e.className='algn h'; e.style.top=y+'px';
    stage.appendChild(e); this.els.push(e); } };
function snapAxis(cands, v){ let best=null;
  for(const c of cands){ const d=Math.abs(c.at-v); if(d<=SNAP&&(!best||d<best.d)) best={...c,d}; }
  return best; }
function othersOf(id){ return Object.keys(layout).filter(k=>k!=='__ref'&&k!==id&&!layout[k].hidden).map(k=>layout[k]); }
function dragCands(id, w, h){
  const xs=[{at:GAP, guide:GAP}], ys=[{at:GAP, guide:GAP}];
  othersOf(id).forEach(o=>{
    xs.push({at:o.x, guide:o.x});
    xs.push({at:o.x+o.w-w, guide:o.x+o.w});
    xs.push({at:o.x+o.w+GAP, guide:o.x+o.w+GAP/2});
    xs.push({at:o.x-w-GAP, guide:o.x-GAP/2});
    ys.push({at:o.y, guide:o.y});
    ys.push({at:o.y+o.h-h, guide:o.y+o.h});
    ys.push({at:o.y+o.h+GAP, guide:o.y+o.h+GAP/2});
    ys.push({at:o.y-h-GAP, guide:o.y-GAP/2});
  });
  return {xs,ys};
}
/* 기본 배치 v1 — 1900×856 기준, GAP 8 수학 정합:
   열 8|340|520|660|340 (경계 348/356·876/884·1544/1552·1892) — 340+520+660+340=1860 + 갭5×8=1900 ✓
   행 504+8+328 (=840+16=856 ✓) · A열은 452+8+380 (=840) ✓
   위젯 10종 중 8종 기본 표시, swap/orders는 Add widget으로 (기획 §2). */
const DEFAULT_LAYOUT={
  balance:{x:8,y:8,w:340,h:452},   staking:{x:8,y:468,w:340,h:380},
  markets:{x:356,y:8,w:520,h:504}, activity:{x:356,y:520,w:520,h:328},
  chart:{x:884,y:8,w:660,h:504},   portfolio:{x:884,y:520,w:660,h:328},
  trade:{x:1552,y:8,w:340,h:504},  money:{x:1552,y:520,w:340,h:328},
  swap:{x:1208,y:8,w:336,h:420,hidden:true}, orders:{x:1208,y:436,w:336,h:412,hidden:true},
  settings:{x:760,y:88,w:380,h:640,hidden:true},
  __ref:{w:1900,h:856} };
const deepLayout=(o)=>JSON.parse(JSON.stringify(o));
const MIN_SIZE={ balance:{w:300,h:220}, staking:{w:300,h:240}, markets:{w:400,h:260}, activity:{w:400,h:220},
  chart:{w:480,h:280}, portfolio:{w:440,h:220}, trade:{w:300,h:320}, money:{w:300,h:200},
  swap:{w:300,h:300}, orders:{w:300,h:220}, settings:{w:320,h:320} };
function loadLayout(){ try{ const raw=localStorage.getItem(LKEY); if(!raw) return deepLayout(DEFAULT_LAYOUT);
  const p=JSON.parse(raw);
  Object.keys(DEFAULT_LAYOUT).forEach(k=>{ if(!p[k]) p[k]=deepLayout(DEFAULT_LAYOUT[k]); });
  return p;
}catch(e){ return deepLayout(DEFAULT_LAYOUT); } }
let layout=loadLayout();
Object.keys(layout).forEach(id=>{ const m=MIN_SIZE[id]; if(!m) return;
  if(layout[id].w<m.w) layout[id].w=m.w; if(layout[id].h<m.h) layout[id].h=m.h; });
function saveLayout(){ try{ localStorage.setItem(LKEY, JSON.stringify(layout)); }catch(e){} }
document.getElementById('btnReset').onclick=()=>{ try{ localStorage.removeItem(LKEY); }catch(e){}
  layout=deepLayout(DEFAULT_LAYOUT); Object.keys(layout).forEach(k=>{ if(k!=='__ref') applyGeo(k); });
  renderAddMenu(); refitLayout(); };

/* 뷰포트 선형 리핏 — 저장 배치를 기준 뷰포트 → 현재 뷰포트로 재사상 (끝변 매핑, float 유지) */
const HDR_H=48;
function refitLayout(){
  const vw=window.innerWidth, vh=window.innerHeight-HDR_H;
  if(vw<500||vh<300) return;
  const ref=layout.__ref||{w:1900,h:856};
  if(Math.abs(ref.w-vw)<2&&Math.abs(ref.h-vh)<2){ layout.__ref={w:vw,h:vh}; return; }
  const sx=(vw-2*GAP)/(ref.w-2*GAP), sy=(vh-2*GAP)/(ref.h-2*GAP);
  const mapX=v=>GAP+(v-GAP)*sx, mapY=v=>GAP+(v-GAP)*sy;
  Object.keys(layout).forEach(id=>{ if(id==='__ref') return; const g=layout[id];
    const r=mapX(g.x+g.w), b=mapY(g.y+g.h);
    g.x=mapX(g.x); g.y=mapY(g.y); g.w=r-g.x; g.h=b-g.y;
    if(g.w<120)g.w=120; if(g.h<120)g.h=120;
    applyGeo(id); });
  layout.__ref={w:vw,h:vh}; saveLayout();
}
let _refitT=null;
window.addEventListener('resize', ()=>{ clearTimeout(_refitT); _refitT=setTimeout(refitLayout,150); });
document.addEventListener('fullscreenchange', ()=>{ clearTimeout(_refitT); _refitT=setTimeout(refitLayout,120); });

function applyGeo(id){ const el=document.getElementById('w-'+id); if(!el) return; const g=layout[id];
  el.style.display=g.hidden?'none':'flex';
  el.style.left=g.x+'px'; el.style.top=g.y+'px'; el.style.width=g.w+'px'; el.style.height=g.h+'px'; }
const WIDGET_TITLES={ balance:'Account', portfolio:'Portfolio', markets:'Markets', chart:'Chart',
  trade:'Trade', swap:'Swap', staking:'Staking', orders:'Open orders', activity:'Activity', money:'Money moves',
  settings:'Settings' };
function setHidden(id, hidden){ layout[id].hidden=hidden; applyGeo(id); saveLayout(); renderAddMenu(); }
function renderAddMenu(){ const m=document.getElementById('addMenu'); if(!m) return;
  m.innerHTML=Object.keys(WIDGET_TITLES).map(id=>{
    const off=!!layout[id].hidden;
    return '<div class="addrow" data-id="'+id+'" style="display:flex; align-items:center; gap:8px; padding:8px 10px;'+
      ' border-radius:6px; cursor:pointer'+(off?'':'; color:var(--lgd-dim)')+'">'+
      '<span style="width:14px; text-align:center">'+(off?'+':'✓')+'</span>'+WIDGET_TITLES[id]+'</div>';
  }).join('');
}

/* 클릭한 위젯 = 맨 앞 — z 2..N 재정규화 (가이드 z45 아래 유지) */
const zOrder=[];
function bringToFront(id){
  const i=zOrder.indexOf(id); if(i>=0) zOrder.splice(i,1); zOrder.push(id);
  zOrder.forEach((wid,k)=>{ const el=document.getElementById('w-'+wid); if(el) el.style.zIndex=2+k; });
}
function makeWidget(id, title, sub, linkColor, bodyHTML){
  const el=document.createElement('div'); el.className='widget'; el.id='w-'+id;
  zOrder.push(id);
  el.addEventListener('pointerdown', ()=>bringToFront(id), true);
  el.innerHTML='<div class="wtb"><span class="linksq" style="background:'+linkColor+'"></span>'+
    '<h3>'+title+'</h3>'+(sub?'<span class="wsub">'+sub+'</span>':'')+
    '<span class="wsp"></span><span class="wic" title="Close widget">⋮</span></div>'+
    '<div class="wbody">'+bodyHTML+'</div>';
  stage.appendChild(el); applyGeo(id);
  el.querySelector('.wic').addEventListener('click', ()=>setHidden(id,true));
  // 드래그 (타이틀바) — 자석 스냅 + 초록 가이드, 미스냅 축은 8px 미세 격자
  const tb=el.querySelector('.wtb');
  tb.addEventListener('pointerdown', e=>{
    if(e.target.closest('.wic,.linksq')) return;
    e.preventDefault(); tb.setPointerCapture(e.pointerId);
    const g=layout[id], offX=e.clientX-g.x, offY=e.clientY-g.y;
    stage.classList.add('dragging'); el.classList.add('drag');
    const cands=dragCands(id, g.w, g.h);
    const move=ev=>{
      let x=Math.max(0,ev.clientX-offX), y=Math.max(0,ev.clientY-offY);
      guides.clear();
      const sx=snapAxis(cands.xs,x), sy=snapAxis(cands.ys,y);
      if(sx){ x=sx.at; guides.v(sx.guide); }
      if(sy){ y=sy.at; guides.h(sy.guide); }
      g.x=x; g.y=y; applyGeo(id); };
    const up=()=>{ tb.removeEventListener('pointermove',move); tb.removeEventListener('pointerup',up);
      stage.classList.remove('dragging'); el.classList.remove('drag'); guides.clear();
      const sx=snapAxis(cands.xs,g.x), sy=snapAxis(cands.ys,g.y);
      if(!sx) g.x=Math.round(g.x/FINE)*FINE;
      if(!sy) g.y=Math.round(g.y/FINE)*FINE;
      applyGeo(id); saveLayout(); };
    tb.addEventListener('pointermove',move); tb.addEventListener('pointerup',up);
  });
  // 리사이즈 4방향 — 이웃 변/갭 스냅, 미스냅 치수는 8px 격자
  const MINW=(MIN_SIZE[id]||{}).w||220, MINH=(MIN_SIZE[id]||{}).h||170;
  ['br','r','l','b'].forEach(dir=>{
    const rz=document.createElement('div'); rz.className='rz '+dir; el.appendChild(rz);
    rz.addEventListener('pointerdown', e=>{
      e.preventDefault(); e.stopPropagation(); rz.setPointerCapture(e.pointerId);
      const g=layout[id], x0=e.clientX, y0=e.clientY, w0=g.w, h0=g.h, l0=g.x;
      stage.classList.add('dragging'); el.classList.add('drag');
      const eXs=[], eYs=[];
      othersOf(id).forEach(o=>{ eXs.push({at:o.x-GAP, guide:o.x-GAP/2},{at:o.x, guide:o.x},{at:o.x+o.w, guide:o.x+o.w});
        eYs.push({at:o.y-GAP, guide:o.y-GAP/2},{at:o.y, guide:o.y},{at:o.y+o.h, guide:o.y+o.h}); });
      const move=ev=>{ const dx=ev.clientX-x0, dy=ev.clientY-y0;
        guides.clear();
        if(dir==='br'||dir==='r'){ let r=l0+Math.max(MINW,w0+dx);
          const sn=snapAxis(eXs,r); if(sn){ r=sn.at; guides.v(sn.guide); } g.w=Math.max(MINW,r-g.x); }
        if(dir==='br'||dir==='b'){ let btm=g.y+Math.max(MINH,h0+dy);
          const sn=snapAxis(eYs,btm); if(sn){ btm=sn.at; guides.h(sn.guide); } g.h=Math.max(MINH,btm-g.y); }
        if(dir==='l'){ let x=l0+Math.min(dx,w0-MINW);
          const sn=snapAxis(eXs,x); if(sn){ x=sn.at; guides.v(sn.guide); }
          const w=Math.max(MINW,l0+w0-x); g.x=l0+w0-w; g.w=w; }
        applyGeo(id); };
      const up=()=>{ rz.removeEventListener('pointermove',move); rz.removeEventListener('pointerup',up);
        stage.classList.remove('dragging'); el.classList.remove('drag'); guides.clear();
        const right=g.x+g.w, btm=g.y+g.h;
        if(!snapAxis(eXs,right)) g.w=Math.max(MINW,Math.round(g.w/FINE)*FINE);
        if(!snapAxis(eYs,btm)) g.h=Math.max(MINH,Math.round(g.h/FINE)*FINE);
        if(dir==='l'){ if(!snapAxis(eXs,g.x)) g.x=right-g.w; }
        applyGeo(id); saveLayout(); };
      rz.addEventListener('pointermove',move); rz.addEventListener('pointerup',up);
    });
  });
  return el;
}

/* ════════════════════ 위젯 프레임 10종 (본문은 다음 단계에서 연결) ════════════════════
   기획서 §2 매핑: W1 balance · W2 portfolio · W3 markets · W4 chart · W5 trade ·
   W6 swap · W7 staking · W8 orders · W9 activity · W10 money */
const frame=(big,note)=>'<div class="wempty"><span class="big">'+big+'</span><span>'+note+'</span>'+
  '<span class="tag">CONNECTS NEXT</span></div>';
makeWidget('balance','Account','Crypto','var(--lgd-link1)',
  '<div class="wal tnum"><div class="lbl">My wallet</div>'+
  '<div class="amt" id="walAmt">···</div>'+
  '<div class="chg" id="walChg"></div>'+
  '<div class="chartwrap" id="walWrap"><svg class="rhchart" id="walSvg" preserveAspectRatio="none"></svg>'+
  '<span class="pvtag" id="walPv" style="display:none">PREVIEW · SIGN IN FOR LIVE DATA</span></div>'+
  '<div class="ranges" id="walRanges">'+['1D','1W','1M','3M','YTD','1Y','ALL'].map((r,i)=>
    '<button data-r="'+r+'"'+(i===0?' class="on"':'')+'>'+r+'</button>').join('')+'</div>'+
  '<div class="kvs tnum" id="walKvs">'+
  '<div class="sect">Overview</div>'+
  '<div class="kv"><span class="k">Cash (USDT)</span><span class="v" id="kvCash">···</span></div>'+
  '<div class="kv"><span class="k">Crypto value</span><span class="v" id="kvCrypto">···</span></div>'+
  '<div class="kv"><span class="k">Staked</span><span class="v" id="kvStaked">···</span></div>'+
  '<div class="kv"><span class="k">Total assets</span><span class="v" id="kvTotal">···</span></div>'+
  '<div class="sect">Profit &amp; loss</div>'+
  '<div class="kv"><span class="k">Today</span><span class="v" id="kvPToday">···</span></div>'+
  '<div class="kv"><span class="k">YTD</span><span class="v" id="kvPYtd">···</span></div>'+
  '<div class="kv"><span class="k">Staking rewards</span><span class="v" id="kvPStk">···</span></div>'+
  '<div class="sect">Pending</div>'+
  '<div class="kv"><span class="k">Deposits in review</span><span class="v" id="kvPendDep">···</span></div>'+
  '<div class="kv"><span class="k">Withdrawals in review</span><span class="v" id="kvPendWd">···</span></div>'+
  '<div class="sect">Other wallets</div>'+
  '<div class="kv lnk" id="kvGoFx"><span class="k">Alpexa FX</span><span class="v" id="kvFx">···</span><span class="go">›</span></div>'+
  '<div class="kv lnk" id="kvGoSp"><span class="k">Alpexa Sports</span><span class="v" id="kvSp">···</span><span class="go">›</span></div>'+
  '</div></div>');
makeWidget('staking','Staking','','var(--lgd-link3)',
  '<div class="stk tnum">'+
  '<div class="sect2">Your stakes</div>'+
  '<div id="stList"></div>'+
  '<div class="sect2">New stake</div>'+

/* ════════════════════ W1 My wallet — RH 크립토 차트 (앱 Chart:973-1058 문법 번역) ════════════════════
   라인 + 에어리어 그라디언트 + 베이스라인 점선 + 끝점 펄스 + 스크럽(수직 점선·값 연동) + 레인지 탭.
   돈 규율: 세션 있으면 get_portfolio_history(p_acct,p_range) 실데이터(앱:1654 계약),
   없으면 잔고 '···' + PREVIEW 라벨의 표본 파형 — 가짜 달러 숫자는 절대 표시하지 않는다. */
const WAL_RANGES={'1D':'Today','1W':'Past week','1M':'Past month','3M':'Past 3 months','YTD':'Year to date','1Y':'Past year','ALL':'All time'};
const wal={ range:'1D', pts:[], real:false, scrub:null };
function seedRnd(seed){ let s=seed>>>0; return ()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }
function sampleSeries(range){
  const N={'1D':96,'1W':84,'1M':90,'3M':90,'YTD':100,'1Y':104,'ALL':120}[range]||96;
  const rnd=seedRnd(range.split('').reduce((a,c)=>a*31+c.charCodeAt(0),7));
  let v=100; const out=[]; for(let i=0;i<N;i++){ v*=1+(rnd()-0.482)*0.016; out.push(v); } return out;
}
const fmtUsdBig=(v)=>{ const s=Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const i=s.lastIndexOf('.'); return (v<0?'-':'')+'$'+s.slice(0,i)+'<span class="cents">.'+s.slice(i+1)+'</span>'; };
function cssVar(n){ return getComputedStyle(document.body).getPropertyValue(n).trim()||'#00C805'; }
function renderWal(){
  const svg=document.getElementById('walSvg'), wrap=document.getElementById('walWrap');
  if(!svg||!wrap||wal.pts.length<2) return;
  const W=Math.max(60,wrap.clientWidth), H=Math.max(60,wrap.clientHeight);
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  const pts=wal.pts, base=pts[0], last=pts[pts.length-1];
  const up=last>=base, col=up?cssVar('--lgd-up'):cssVar('--lgd-down');
  // Y 스케일 — min==max 붕괴/미세변동 증폭 방지: 스팬 하한 ±1% (앱 chartYScale:963-971 규칙)
  let lo=Math.min(...pts), hi=Math.max(...pts);
  const mid=(lo+hi)/2, span=Math.max(hi-lo, Math.abs(mid)*0.02, 1e-9);
  lo=mid-span/2; hi=mid+span/2;
  const padY=12, xAt=i=>i/(pts.length-1)*W, yAt=v=>padY+(1-(v-lo)/(hi-lo))*(H-2*padY);

   RH는 빈 계좌를 $0.00으로 그리지만 우리는 "모름(미로그인)"과 "0원"을 구분한다). */
async function loadWalletKvs(sess){
  if(!sess) return;
  const db=AlpexaSync.db, acct=sess.acct;
  try{
    const [h,p,st]=await Promise.all([
      db.from('crypto_holdings').select('asset,qty').eq('acct_no',acct),
      db.from('prices').select('symbol,mid'),
      db.from('crypto_stakes').select('asset,period,usd,principal').eq('acct_no',acct)]);
    const mid={}; (p.data||[]).forEach(r=>mid[r.symbol]=+r.mid||0); mid.USDT=1; mid.USDC=1; mid.DAI=1;
    let cash=0, cryptoV=0;
    (h.data||[]).forEach(r=>{ const q=+r.qty||0;
      if(r.asset==='USDT') cash=q; else cryptoV+=q*(mid[r.asset]||0); });
    let staked=0, rewards=0;
    (st.data||[]).forEach(r=>{ staked+=(+r.usd||0); rewards+=Math.max(0,(+r.usd||0)-(+r.principal||+r.usd||0)); });
    setKv('kvCash',fmtUsdSm(cash)); setKv('kvCrypto',fmtUsdSm(cryptoV));
    setKv('kvStaked',fmtUsdSm(staked)); setKv('kvTotal',fmtUsdSm(cash+cryptoV+staked));
    setKv('kvPStk','▲ '+fmtUsdSm(rewards),'up');
  }catch(e){}
  try{ // P&L — 서버 이력 RPC 앞뒤차 (1D=Today, YTD)
    for(const [rng,id] of [['1D','kvPToday'],['YTD','kvPYtd']]){
      const r=await AlpexaSync.db.rpc('get_portfolio_history',{p_acct:acct,p_range:rng});
      const pts=(r&&r.data&&r.data.ok&&r.data.points)||[];
      if(pts.length>1) pnlKv(id,(+pts[pts.length-1].v||0)-(+pts[0].v||0));
    }
  }catch(e){}
  try{ // Pending — requests 승인 대기 (RLS가 본인 것만)
    const r=await db.from('requests').select('type,amount,status').eq('status','pending');
    const rows=r.data||[];
    const sum=t=>rows.filter(x=>x.type===t).reduce((a,x)=>a+(+x.amount||0),0);
    const cnt=t=>rows.filter(x=>x.type===t).length;
    setKv('kvPendDep',cnt('deposit')?cnt('deposit')+' · '+fmtUsdSm(sum('deposit')):'—');
    setKv('kvPendWd',cnt('withdraw')?cnt('withdraw')+' · '+fmtUsdSm(sum('withdraw')):'—');
  }catch(e){}
  try{ // Other wallets — accounts 3서버 (RLS 본인)
    const r=await db.from('accounts').select('server,balance');
    (r.data||[]).forEach(a=>{ if(a.server==='fx') setKv('kvFx',fmtUsdSm(+a.balance||0));
      if(a.server==='sports') setKv('kvSp',fmtUsdSm(+a.balance||0)); });
  }catch(e){}
}

  ch.hover=null; chDraw();
}
function chDraw(){
  const cv=document.getElementById('chCv'), wrap=document.getElementById('chWrap');
  if(!cv||!wrap) return;
  const dpr=window.devicePixelRatio||1, W=wrap.clientWidth, H=wrap.clientHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  const g=cv.getContext('2d'); g.setTransform(dpr,0,0,dpr,0,0); g.clearRect(0,0,W,H);
  const cs=ch.candles; const tag=document.getElementById('chTag');
  if(!cs.length){ tag.style.display='none'; chOhlcRender(null); chHdr(); return; }
  const AX=62, BX=18, plotW=W-AX, volH=Math.max(24,H*0.16), priceH=H-BX-volH-4;
  const up=cssVar('--lgd-up'), dn=cssVar('--lgd-down'), dim=cssVar('--lgd-dim'), hair='rgba(128,128,128,.14)';
  let lo=Infinity, hi=-Infinity, vmax=0;
  cs.forEach(k=>{ if(k.l<lo)lo=k.l; if(k.h>hi)hi=k.h; if(k.v>vmax)vmax=k.v; });
  const pad=(hi-lo)*0.06||hi*0.01; lo-=pad; hi+=pad;
  const xAt=i=>(i+0.5)*plotW/cs.length, yAt=v=>(1-(v-lo)/(hi-lo))*priceH+2;
  const bw=Math.max(1,Math.min(9,plotW/cs.length*0.62));
  // Y 그리드 + 우측 가격 라벨
  g.font='9.5px Inter,system-ui'; g.textAlign='left'; g.textBaseline='middle';
  const steps=Math.max(3,Math.min(7,Math.floor(priceH/44)));
  for(let i=0;i<=steps;i++){ const v=lo+(hi-lo)*i/steps, y=yAt(v);
    g.strokeStyle=hair; g.beginPath(); g.moveTo(0,y); g.lineTo(plotW,y); g.stroke();
    g.fillStyle=dim; g.fillText(chFmt(v), plotW+6, y); }
  // X 날짜 라벨 (4~6개)
  const nx=Math.max(3,Math.min(6,Math.floor(plotW/150)));
  g.textAlign='center'; g.textBaseline='top';
  for(let i=0;i<=nx;i++){ const idx=Math.min(cs.length-1,Math.round(i*(cs.length-1)/nx));
    const d=new Date(cs[idx].t);
    const lbl=(ch.range==='1D'||ch.iv==='1m'||ch.iv==='5m')
      ? d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:false})
      : d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    g.fillStyle=dim; g.fillText(lbl, Math.max(18,Math.min(plotW-18,xAt(idx))), H-BX+5); }
  // 볼륨 히스토그램
  cs.forEach((k,i)=>{ const x=xAt(i), h=vmax?k.v/vmax*(volH-4):0;
    g.fillStyle=(k.c>=k.o?up:dn); g.globalAlpha=0.45;
    g.fillRect(x-bw/2, priceH+4+(volH-4-h), bw, h); g.globalAlpha=1; });
  // 캔들 (몸통+심지)
  cs.forEach((k,i)=>{ const x=xAt(i), col=k.c>=k.o?up:dn;
    g.strokeStyle=col; g.lineWidth=1;
    g.beginPath(); g.moveTo(x,yAt(k.h)); g.lineTo(x,yAt(k.l)); g.stroke();
    const y1=yAt(Math.max(k.o,k.c)), y2=yAt(Math.min(k.o,k.c));
    g.fillStyle=col; g.fillRect(x-bw/2, y1, bw, Math.max(1,y2-y1)); });
  // 크로스헤어
  if(ch.hover!=null){ const k=cs[ch.hover], x=xAt(ch.hover), y=yAt(k.c);
    g.strokeStyle=dim; g.setLineDash([3,4]); g.lineWidth=1;
    g.beginPath(); g.moveTo(x,0); g.lineTo(x,priceH+volH); g.stroke();
    g.beginPath(); g.moveTo(0,y); g.lineTo(plotW,y); g.stroke(); g.setLineDash([]); }
  // 라스트 프라이스 태그 (DOM 오버레이)
  const last=cs[cs.length-1];
  tag.style.display=''; tag.textContent=chFmt(last.c);
  tag.style.top=Math.max(8,Math.min(priceH-4,yAt(last.c)))+'px';
  tag.style.background=(last.c>=last.o?up:dn);
  // 볼륨 라벨
  g.textAlign='left'; g.fillStyle=dim; g.font='9.5px Inter,system-ui';
  g.fillText('Volume '+chVol(last.v), 6, priceH+10);
  chOhlcRender(ch.hover!=null?cs[ch.hover]:last); chHdr();
}
function chOhlcRender(k){
  const el=document.getElementById('chOhlc'); if(!el) return;
  if(!k){ el.innerHTML=''; return; }
  const cls=k.c>=k.o?'up':'down';
  el.innerHTML=['O','H','L','C'].map((n,i)=>{ const v=[k.o,k.h,k.l,k.c][i];
    return '<span><b>'+n+'</b><span class="v '+cls+'">'+chFmt(v)+'</span></span>'; }).join('')+
    '<span><b>V</b><span class="v dim">'+chVol(k.v)+'</span></span>';
}

const AC_META={ buy:['🟢','Buy'], sell:['🔴','Sell'], swap:['🔁','Swap'], stake:['🔒','Stake'],
  unstake:['🔓','Unstake'], deposit:['⬇️','Deposit'], withdraw:['⬆️','Withdraw'], transfer:['↔️','Transfer'],
  reward:['🎁','Reward'], send:['📤','Send'] };   // B-4: activity 테이블 병합분
const AC_SIGN={ buy:-1, sell:+1, swap:0, stake:-1, unstake:+1, deposit:+1, withdraw:-1, transfer:-1,
  reward:+1, send:-1 };
const ac={ rows:null, filt:'All', days:30, authed:false };
function acDay(ts){ const d=new Date(ts), now=new Date();
  const day=(a)=>Math.floor(a/86400e3);
  const diff=day(now.getTime()+ -now.getTimezoneOffset()*60e3)-day(d.getTime()-d.getTimezoneOffset()*60e3);
  if(diff===0) return 'Today'; if(diff===1) return 'Yesterday';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function acRender(){
  const el=document.getElementById('acList'); if(!el) return;
  if(!ac.authed){ el.innerHTML='<div class="acempty"><span class="big">Activity</span>'+
    '<span>Sign in to see your trades, staking and funding history.</span></div>'; return; }
  let rows=ac.rows||[];
  if(ac.days) rows=rows.filter(r=>Date.now()-r.ts<ac.days*86400e3);
  if(ac.filt==='Trades') rows=rows.filter(r=>['buy','sell','swap'].includes(r.kind));
  else if(ac.filt==='Staking') rows=rows.filter(r=>['stake','unstake','reward'].includes(r.kind));
  else if(ac.filt==='Funding') rows=rows.filter(r=>['deposit','withdraw','transfer','send'].includes(r.kind));
  if(!rows.length){ el.innerHTML='<div class="acempty"><span class="big">No activity</span>'+
    '<span>Nothing in this range yet.</span></div>'; return; }
  let html='', lastDay='';
  rows.forEach(r=>{
    const d=acDay(r.ts); if(d!==lastDay){ html+='<div class="dhead">'+d+'</div>'; lastDay=d; }
    const [ic,vb]=AC_META[r.kind]||['·',r.kind];

    const amtTxt=!amt?'—':(sign>0?'+':sign<0?'−':'')+fmtUsdSm(Math.abs(amt));

      ? '<span class="stch'+(r.status==='pending'?'':(r.status==='rejected'?' no':' ok'))+'">'+r.status+'</span>':'';
    html+='<div class="arow"><span class="aic">'+ic+'</span>'+
      '<span class="at"><div class="t">'+vb+' '+(r.asset||'')+st+'</div>'+
      '<div class="s">'+(r.sub||'')+'</div></span>'+
      '<span class="aamt '+(sign>0?'up':'down')+'">'+amtTxt+'</span></div>';
  });

/* ════════════════════ W7 Staking — stake_crypto / unstake_crypto (M4) ════════════════════
   crypto_stakes는 서버 전용(RLS 락) — 클라는 SELECT + RPC만. APY = stake-accrue RATES 사본(PF_APY).

   ref 멱등: stk- / unstk- (앱 crypto-live.html:13958/14161과 동일 접두·rand6). */
const ST_LOCK={flexible:0,'90d':90,'1y':365};
const ST_DEFAULT={flexible:5,'90d':7,'1y':9};   // stake-accrue RATE_DEFAULT 사본
const st={busy:false, err:'', sess:null, stakes:[], have:{}, confirm:null};
function stApy(sym,per){ const r=PF_APY[sym]||ST_DEFAULT; return r[per]!=null?r[per]:ST_DEFAULT[per]; }
function stPrice(a){ return a==='USDT'?1:(a==='ALPXS'?alpxsPrice():swPrice(a)); }
function stMat(r){ const d=ST_LOCK[r.period]||0; return d?(+r.since||0)+d*86400e3:0; }
function stFmtD(ms){ return new Date(ms).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
async function stLoad(){
  st.sess=await walSession(); st.stakes=[]; st.have={};
  if(st.sess){ try{
    const [sr,hr]=await Promise.all([
      AlpexaSync.db.from('crypto_stakes').select('asset,period,usd,principal,since').eq('acct_no',st.sess.acct),
      AlpexaSync.db.from('crypto_holdings').select('asset,qty').eq('acct_no',st.sess.acct)]);
    st.stakes=(sr.data||[]).filter(r=>(+r.usd||0)>0.005);
    (hr.data||[]).forEach(x=>{ st.have[x.asset]=+x.qty||0; });
  }catch(e){} }
  stRender(); stCalc();
}
function stRender(){
  const el=document.getElementById('stList'); if(!el) return;
  if(!st.sess){ el.innerHTML='<div class="empty2">Sign in to see your stakes.</div>'; return; }
  if(!st.stakes.length){ el.innerHTML='<div class="empty2">No stakes yet — earn up to 18% APY below.</div>'; return; }
  el.innerHTML=st.stakes.map(r=>{
    const k=r.asset+'|'+r.period, apy=stApy(r.asset,r.period);
    const usd=+r.usd||0, prin=(+r.principal||usd), earned=Math.max(0,usd-prin);
    const mat=stMat(r), locked=!!mat&&Date.now()<mat;
    const hard=locked&&r.asset==='ALPXS';
    const status=!mat?'Flexible — unstake anytime':(locked?(hard?'Hard-locked until '+stFmtD(mat):'Matures '+stFmtD(mat)):'Matured ✓');
    let cfm='';
    if(st.confirm===k){
      const early=locked&&!hard;
      cfm='<div class="cfm"><div class="m'+(early?' warn3':'')+'">'+
        (early?('Early exit returns your principal only ('+fmtUsdSm(prin)+') — '+fmtUsdSm(earned)+' interest is forfeited.')
              :('Returns '+fmtUsdSm(usd)+' to your '+r.asset+' balance.'))+
        '</div><div class="btns"><button class="yes" data-yes="'+k+'">'+(early?'Unstake early':'Confirm unstake')+'</button>'+
        '<button class="no" data-no="1">Cancel</button></div></div>';
    }
    return '<div class="srow"><div class="top"><span class="nm">'+r.asset+
      '<span class="lockchip">'+(PF_PERIOD[r.period]||r.period)+'</span></span>'+
      '<span class="apy">'+apy.toFixed(1)+'%</span><span class="val">'+fmtUsdSm(usd)+'</span></div>'+
      '<div class="sub"><span>'+status+'</span>'+(earned>0.005?'<span class="earn">+'+fmtUsdSm(earned)+' earned</span>':'')+
      '<button class="ubtn" data-un="'+k+'"'+(hard?' disabled':'')+'>'+(hard?'Locked':'Unstake')+'</button></div>'+cfm+'</div>';
  }).join('');

const mm={ busy:false, sess:null, have:{}, toAcct:'', resolving:0 };

  const raw=(document.getElementById('mmTo').value||'').trim();

  if(raw.includes('@')){
    const seq=++mm.resolving;
    h.textContent='Looking up…'; h.className='hint';
    try{
      const r=await AlpexaSync.db.rpc('acct_for_email',{p_email:raw});
      if(seq!==mm.resolving) return;
      if(r&&r.data){ mm.toAcct=String(r.data).toUpperCase(); h.textContent='→ '+mm.toAcct; h.className='hint ok'; }

    }catch(e){ if(seq===mm.resolving){ h.textContent='Lookup failed.'; h.className='hint bad'; } }
  } else {
    mm.toAcct=raw.toUpperCase();
    h.textContent=/^CR-/i.test(raw)?'':'Crypto accounts start with CR-';
    h.className='hint'+(/^CR-/i.test(raw)?' ok':'');

    }
    // 제출 — 승인 전 차감 없음. 서버 트리거(2FA/허용목록/상한)가 최종 관문: 거절 메시지 그대로 표시.
    const res=await AlpexaSync.pushRequest({ id:'cr-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),
      type:'withdraw', server:'crypto', amount:usd, net:usd, fee:0,
      asset:asset, network:WD_NET[asset].split(' ')[0], address:addr, status:'pending' });
    if(res&&!res.error){
      const dn=document.getElementById('wdDone'); dn.style.display='flex';
      document.getElementById('wdDoneT').textContent='Withdrawal submitted — '+fmtUsdSm(usd)+' '+asset;
      document.getElementById('wdDoneS').textContent='Reviewed by our team · nothing deducted until approval';
      setTimeout(()=>{ dn.style.display='none'; },8000);
      document.getElementById('wdAmt').value=''; wd.otpSent=false; wd.unlocked=false;
      document.getElementById('wdOtpBox').style.display='none'; document.getElementById('wdOtp').value='';
      loadActivity(); walSession().then(s=>loadWalletKvs(s));
    } else {
      const msg=(res&&res.error&&(res.error.message||res.error))||'Submit failed.';
      wd.err=/allowlist|whitel/i.test(String(msg))
        ? 'This address isn\'t on your active allowlist yet (needed for $5,000+). Add it in the app: Account → Security → Whitelisted destinations, then wait 24 hours. Nothing was deducted.'
        : String(msg);
    }
  }catch(e){ wd.err='Network error — nothing was submitted.'; }
  wd.busy=false; wdCalc();
};
/* ── Receive — 표시 전용 (앱 Receive 계약 그대로): 내부 = 내 CR- 계좌(모든 자산 수취,
   서버 북 이체) · 외부 = USDT ERC-20 회사 고정주소만 — 타 자산 온체인 입금은 미제공
   (공유주소 오입금 방지, 앱 #C1~C3). 시뮬 입금 경로는 이식 제외(기획 5절).
   QR = qrserver 실스캔 이미지(앱 QrPattern과 동일 소스). ── */
const RC_EXT={ address:'0x6B1c8941698Affc56757eF9Be1723Ec43F720966', network:'ERC-20 · Ethereum' };
function rcRender(){
  const internal=document.getElementById('rcMode').value==='internal';
  const qr=document.getElementById('rcQr');
  const addr=internal?((mm.sess&&mm.sess.acct)||''):RC_EXT.address;
  document.getElementById('rcAddrL').textContent=internal?'Your account number':'USDT deposit address';
  document.getElementById('rcAddr').textContent=addr||'···';
  document.getElementById('rcNet').textContent=internal?(addr?'Alpexa · Internal':''):('Network: '+RC_EXT.network);
  document.getElementById('rcNote').textContent=internal
    ?(addr?'Receives any asset — the sender uses Send with this account number.':'Sign in to see your receive details.')
    :'Only send USDT on Ethereum (ERC-20). For other assets, use Internal.';
  document.getElementById('rcCopy').disabled=!addr;
  if(addr){ qr.src='https://api.qrserver.com/v1/create-qr-code/?size=264x264&qzone=2&data='+encodeURIComponent(addr);
    qr.style.display='block'; } else qr.style.display='none';
}
document.getElementById('rcMode').addEventListener('change',rcRender);
document.getElementById('rcCopy').onclick=()=>{
  const a=document.getElementById('rcAddr').textContent;
  if(!a||a==='···') return;

    navigator.clipboard.writeText(a).catch(()=>{}); }catch(e){}
  const b=document.getElementById('rcCopy'); b.textContent='Copied ✓';
  setTimeout(()=>{ b.textContent='Copy'; },1800);
};

/* ════════════════════ W8 Open orders — 앱 localStorage 'alpexa.pendingOrders' 공유 ════════════════════
   표시·취소 전용 — 체결 엔진 없음(정직 표기 'Pending (manual)'). 돈 이동 0:
   지정가/스탑 주문은 의사표시일 뿐 자금은 체결 시까지 미이동(앱 :14025와 동일). */
function odRead(){ try{ const v=JSON.parse(localStorage.getItem('alpexa.pendingOrders')||'[]');
  return Array.isArray(v)?v:[]; }catch(e){ return []; } }
function odRender(){
  const list=document.getElementById('odList'); if(!list) return;
  const os=odRead();
  document.getElementById('odCount').textContent=os.length?(os.length+' pending · manual fill'):'';
  if(!os.length){ list.innerHTML='<div class="empty2">No open orders. Limit / Stop orders placed in the '+
    'app show up here — there is no matching engine yet, so fills are manual.</div>'; return; }
  list.innerHTML=os.map(o=>{
    const side=String(o.side||'buy');
    return '<div class="orow"><div style="min-width:0"><div class="nm">'+
      side.charAt(0).toUpperCase()+side.slice(1)+' '+(o.sym||'?')+
      '<span class="typechip">'+(o.type||'Limit')+'</span></div>'+
      '<div class="sub">'+((o.type==='Stop')?'≥':'≤')+' $'+(+o.trigger||0).toFixed(2)+
      ' · $'+(+o.usd||0).toFixed(2)+'</div></div>'+
      '<span class="man">Pending (manual)</span>'+
      '<button class="cx" data-cx="'+o.id+'">Cancel</button></div>';
  }).join('');
}
document.getElementById('odList').addEventListener('click',e=>{
  const b=e.target.closest('[data-cx]'); if(!b) return;
  const os=odRead().filter(o=>String(o.id)!==String(b.dataset.cx));
  try{ localStorage.setItem('alpexa.pendingOrders',JSON.stringify(os)); }catch(e2){}
  odRender();
});
window.addEventListener('storage',e=>{ if(e.key==='alpexa.pendingOrders') odRender(); });
setInterval(()=>{ if(!document.hidden) odRender(); },10000);
odRender();

document.querySelector('#w-money .mtabs').addEventListener('click',e=>{
  const t=e.target.closest('span[data-p]'); if(!t) return;
  document.querySelectorAll('#w-money .mtabs span').forEach(x=>x.classList.toggle('on',x===t));
  document.querySelectorAll('#w-money .pane').forEach(p=>p.classList.toggle('on',p.dataset.pane===t.dataset.p));
  if(t.dataset.p==='transfer') xfLoad();
  if(t.dataset.p==='withdraw') wdLoad();
  if(t.dataset.p==='fund') fdCalc();
  if(t.dataset.p==='receive') rcRender();
});
/* ════════════════════ 설정 패널 (Settings) — 앱 Account §7 이식 ════════════════════
   표시값은 앱 하드코드 그대로(수수료 티어·HIFO·$50K/day·버전 — crypto-live.html:9157/9181/9257/9270).
   Redeem = redeem_referral RPC (서버가 고객당 1회 강제 + ALPXS 지급 — 앱 :9514 계약).
   Sign out = 앱 doSignOut 동일(:253-257): auth.signOut + alpexa.me 제거 → login.html?switch=1. */
const sg={ sess:null, busy:false };
function sgKv(l,v){ return '<div class="kv2"><span class="l">'+l+'</span><span class="v">'+v+'</span></div>'; }
async function sgLoad(){
  sg.sess=await walSession();
  const prof=document.getElementById('sgProf'), acc=document.getElementById('sgAccts');
  const me=sg.sess&&sg.sess.me;
  if(!me){
    prof.innerHTML='<div class="empty2">Sign in to see your profile.</div>';
    acc.innerHTML='<div class="empty2">···</div>';
    document.getElementById('sgRef').textContent='···';
    sgTheme(); return;
  }
  prof.innerHTML=sgKv('Name',me.name||'—')+sgKv('Email',me.email||'—')+
    sgKv('Customer ID',me.custId||'—');
  const a=me.accts||{}; let bals=null;
  try{ bals=await AlpexaSync.pullBalances(); }catch(e){}
  const row=(srv,label)=>a[srv]?sgKv(label+' · '+a[srv],(bals&&bals[srv]!=null)?fmtUsdSm(bals[srv]):'···'):'';
  acc.innerHTML=(row('crypto','Crypto')+row('fx','FX')+row('sports','Sports'))||'<div class="empty2">···</div>';
  const code=String(me.custId||'').toUpperCase();   // 앱 alpexaRefLink 동일
  document.getElementById('sgRef').textContent=
    'https://app.alpexa-suisse.com/signup.html'+(code?('?ref='+encodeURIComponent(code)):'');
  sgTheme();
}
function sgTheme(){ const light=localStorage.getItem(TKEY)==='light';
  document.getElementById('sgLight').classList.toggle('on',light);
  document.getElementById('sgDark').classList.toggle('on',!light); }
document.getElementById('sgDark').onclick=()=>{ localStorage.setItem(TKEY,'dark'); applyThemeCB(); sgTheme(); };
document.getElementById('sgLight').onclick=()=>{ localStorage.setItem(TKEY,'light'); applyThemeCB(); sgTheme(); };
document.getElementById('sgRedeem').onclick=async()=>{
  if(sg.busy) return;
  const h=document.getElementById('sgRedH');
  const code=(document.getElementById('sgCode').value||'').trim();
  h.className='hint2';
  if(!sg.sess){ h.textContent='Sign in to redeem a code.'; h.className='hint2 bad'; return; }
  if(!code){ h.textContent='Enter a code.'; h.className='hint2 bad'; return; }
  sg.busy=true; h.textContent='Checking…';
  try{
    const r=await AlpexaSync.db.rpc('redeem_referral',{p_code:code});
    const d=r&&r.data;
    if((r&&r.error)||!d||d.ok===false){
      const msg=(d&&d.error)||(r&&r.error&&r.error.message)||'Could not redeem this code.';
      h.textContent=(msg==='already redeemed')?'You have already redeemed a referral code.':String(msg);
      h.className='hint2 bad';
    } else {
      try{ localStorage.setItem('alpexa.referralRedeemed',JSON.stringify({code,ts:Date.now()})); }catch(e){}
      h.textContent='Code applied · 100 ALPXS earned'; h.className='hint2 ok';
      document.getElementById('sgCode').value='';
      loadPortfolio(); mmSession(); stLoad(); sgLoad(); walSession().then(s=>loadWalletKvs(s));
    }
  }catch(e){ h.textContent='Network error — try again.'; h.className='hint2 bad'; }
  sg.busy=false;
};
function sgSignOut(all){
  // 앱 doSignOut(:253-257)과 동일 — signOut은 기다리지 않는다(먹통이어도 사용자를 가두지 않기).
  try{ if(AlpexaSync.db&&AlpexaSync.db.auth) AlpexaSync.db.auth.signOut(all?{scope:'global'}:undefined)
    .catch(()=>{}); }catch(e){}
  try{ ['alpexa.me','alpexa.userName','alpexa.userEmail'].forEach(k=>localStorage.removeItem(k)); }catch(e){}
  try{ location.replace('/login.html?switch=1'); }catch(e){ location.href='/login.html?switch=1'; }
}
document.getElementById('sgOut').onclick=()=>sgSignOut(false);
document.getElementById('sgOutAll').onclick=()=>sgSignOut(true);

/* ── 헤더 아바타(동그라미) = 로그인 관문 (2026-07-17 사장님 지시 "동그라미 안에") ──
   로그아웃: 초록 → 클릭 = 닫힌 토큰(alpexa.dest2='crypto-dashboard') 심고 login.html로 —
   로그인 끝나면 login.html fxDest가 이 대시보드로 자동 복귀(스포츠 대시보드와 동일 패턴,
   같은 탭이라 세션도 함께 옴 = "새 탭 함정" 해소). 로그인됨: 이름 이니셜, 클릭 = Settings. */
async function hdrAuth(){
  const av=document.querySelector('.avatar'); if(!av) return;
  const s=await walSession();
  if(s){
    av.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">'+
      '<circle cx="12" cy="8.2" r="4.2"/><path d="M4 20.6c0-4 3.6-6.6 8-6.6s8 2.6 8 6.6v.4H4z"/></svg>'+
      '<span class="pdot"></span>';
    av.title=((s.me&&s.me.name)||'')+' · signed in';
    av.classList.remove('signin'); av.classList.add('me');
    av.onclick=()=>{ setHidden('settings',false); bringToFront('settings'); };
  } else {
    av.classList.remove('me');
    av.textContent='→'; av.title='Sign in'; av.classList.add('signin');
    av.onclick=()=>{ try{ sessionStorage.setItem('alpexa.dest2','crypto-dashboard'); }catch(e){}
      location.href='/login.html'; };
  }
}
/* ════ 백오피스 락스텝 (A-1·A-2 수리, 앱 crypto-live.html:14636-14648 사본) ════
   · 마크업: pricing_marks → window.__alpexaCryptoMarks (0~50 클램프) — 이게 없으면
     거래·스왑 수수료가 0%로 나가 하우스 스프레드를 못 받는다.
   · 킬스위치: controls.trading_halt → window.__alpexaHalt — 서버 RPC엔 halt 게이트가
     없어 클라 체크가 유일 관문. 모든 돈 제출 버튼이 이 플래그를 본다. */
window.__alpexaCryptoMarks=window.__alpexaCryptoMarks||{};
window.__alpexaHalt=false;
const HALT_MSG='Trading is temporarily paused. Please try again shortly.';
function tkHalt(){ const w=document.getElementById('tkWarn'); if(w){ w.textContent=HALT_MSG; w.style.display='block'; } }
/* B-3: 원클릭 방지 — 1차 클릭 = 버튼이 "Tap again…"으로 무장(6초 내 재클릭=실행, 지나면 원복).
   앱 Review 단계의 데스크톱 등가. unstake는 자체 확인 스트립이 있어 제외. */
const ARM={};
function armed(key,btn,label){
  const t=ARM[key];
  if(t&&Date.now()-t.ts<6000){ ARM[key]=null; btn.textContent=t.orig; btn.classList.remove('armw'); return true; }
  ARM[key]={ts:Date.now(),orig:btn.textContent};
  btn.textContent=label; btn.classList.add('armw');
  setTimeout(()=>{ const c=ARM[key]; if(c&&Date.now()-c.ts>=5800){ ARM[key]=null; btn.textContent=c.orig; btn.classList.remove('armw'); } },6000);
  return false;
}
/* B-4: 앱 :13348과 동일하게 모든 성공 액션을 activity에 미러 — 백오피스·앱 이력에 보이게 */
function logAct(kind,symbol,amount,detail){ try{ AlpexaSync.logActivity({ server:'crypto', kind:kind,
  symbol:symbol||'', amount:+amount||0, detail:detail||'' }); }catch(e){} }
/* B-8: accounts.balance(crypto) 표시 캐시 동기화 (앱 :1799 락스텝) */
function syncBal(){ try{ if(mm.sess) AlpexaSync.db.rpc('sync_crypto_balance',{p_acct:mm.sess.acct})
  .then(()=>{},()=>{}); }catch(e){} }
function swHaltWarn(){ const w=document.getElementById('swWarn'); if(w){ w.textContent=HALT_MSG; w.style.display='block'; } }
function pullMarksHalt(){
  if(!(window.AlpexaSync&&AlpexaSync.db)) return;
  AlpexaSync.db.from('pricing_marks').select('symbol,markup_pts').then(r=>{
    if(r&&r.data){ const m={}; r.data.forEach(p=>{ m[p.symbol]=Math.max(0,Math.min(50,+p.markup_pts||0)); });
      window.__alpexaCryptoMarks=m; } },()=>{});
  AlpexaSync.db.from('controls').select('val').eq('key','trading_halt').limit(1).then(r=>{
    window.__alpexaHalt=!!(r&&r.data&&r.data[0]&&r.data[0].val==='1'); },()=>{});
}
setTimeout(pullMarksHalt,1300); setInterval(()=>{ if(!document.hidden) pullMarksHalt(); },5000);

/* A-3 수리: 세션↔표시 신원 대조 (불일치 시 재로그인 강제 — alpexa-sync.js:288 공용) */
try{ AlpexaSync.assertIdentity&&AlpexaSync.assertIdentity(); }catch(e){}

/* B-9: Realtime — 다른 기기의 스테이크/보유 변경을 즉시 반영 (앱 :13924 패턴) */
function rtSubscribe(){
  try{
    const me=JSON.parse(localStorage.getItem('alpexa.me')||'null');
    const acct=me&&me.accts&&me.accts.crypto;
    if(!acct||!(AlpexaSync.db&&AlpexaSync.db.channel)) return;
    AlpexaSync.db.channel('cbdash-'+acct)
      .on('postgres_changes',{event:'*',schema:'public',table:'crypto_stakes',filter:'acct_no=eq.'+acct},
        ()=>{ stLoad(); loadPortfolio(); })
      .on('postgres_changes',{event:'*',schema:'public',table:'crypto_holdings',filter:'acct_no=eq.'+acct},
        ()=>{ loadPortfolio(); mmSession(); walSession().then(s2=>loadWalletKvs(s2)); })
      .subscribe();
  }catch(e){}
}
/* B-10: 백오피스 원격 청산 명령 실행기 — 앱 :14658 등가를 서버 진실로 번역:
   liquidate 'stk-<asset|period>' → unstake_crypto · liquidate '<sym>' → crypto_trade sell p_all.
   set_balance는 클라 잔고 시대 유산 — 대시보드는 손대지 않고 pending 유지(앱이 처리). */
let cmdBusy=false;   // 재진입 가드 — 인터벌·수동 호출이 겹쳐도 명령은 한 번에 한 배치만
async function runCmds(){
  if(cmdBusy) return;
  if(!mm.sess) return;
  const cust=mm.sess.me&&mm.sess.me.custId; if(!cust) return;
  cmdBusy=true;
  try{
    const r=await AlpexaSync.db.from('commands').select('*')
      .eq('cust_id',cust).eq('server','crypto').eq('status','pending');
    let did=false;
    for(const c of ((r&&r.data)||[])){
      if(c.action==='set_balance') continue;
      const lid=String(c.local_id||''); if(!lid) continue;
      try{
        if(lid.indexOf('stk-')===0){
          const key=lid.slice(4);
          await AlpexaSync.db.rpc('unstake_crypto',{ p_ref:'unstk-'+Date.now()+'-'+Math.random().toString(36).slice(2,8),
            p_acct:mm.sess.acct, p_asset:key.split('|')[0], p_period:key.split('|')[1]||'flexible' });
        } else {
          const px=swPrice(lid)||(lid==='ALPXS'?alpxsPrice():null);
          const v=px?(mm.have[lid]||0)*px:0; if(!(v>0)) continue;
          const mkP=Math.max(0,Math.min(50,(window.__alpexaCryptoMarks&&+window.__alpexaCryptoMarks[lid])||0));
          await AlpexaSync.db.rpc('crypto_trade',{ p_ref:'cb-'+Date.now()+'-'+Math.random().toString(36).slice(2,8),
            p_acct:mm.sess.acct, p_symbol:lid, p_usd:+v.toFixed(2), p_side:'sell', p_markup:mkP, p_all:true });
        }
        did=true;
        await AlpexaSync.db.from('commands').update({status:'done'}).eq('id',c.id);
      }catch(e){}
    }
    if(did){ loadPortfolio(); stLoad(); mmSession(); loadActivity(); syncBal();
      walSession().then(s2=>loadWalletKvs(s2)); }
  }catch(e){}
  cmdBusy=false;
}
setInterval(()=>{ if(!document.hidden) runCmds(); },4000);

mmSession().then(()=>{ syncBal(); }); stLoad(); sgLoad(); hdrAuth(); rtSubscribe();
</script>
