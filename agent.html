<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Alpexa Suisse · Partner Portal</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=4">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=4">
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
<style>
  :root{--acc:#2F6BF6;--acc-press:#2257E6;--tint:#EEF3FE;--pos:#1AA05F;--neg:#E5484D;
        --dim:#8A9099;--line:#E6E6E9;--hair:#ECECF0;--ink:#0F1115;--soft:#F4F6F9;--ink2:#0F1115}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'SF Pro Display','Inter',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;letter-spacing:-0.374px;background:#fff;color:var(--ink);min-height:100vh}
  #wrap{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .hdr{background:#fff;color:var(--ink);padding:16px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;border-bottom:1px solid var(--hair)}
  .hdr b{font-size:17px;font-weight:600;color:var(--acc);letter-spacing:-0.4px}
  .hdr .sub{font-size:10px;color:var(--dim);margin-top:1px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .hdr button{margin-left:auto;background:var(--soft);color:var(--dim);border:1px solid var(--line);border-radius:9999px;padding:8px 16px;font:600 13px inherit;cursor:pointer}
  .sec{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-0.2px;margin:18px 18px 8px}
  .card{background:var(--soft);border:1px solid var(--line);border-radius:16px;margin:0 18px 10px;padding:16px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--hair);font-size:14px}
  .row:last-child{border-bottom:none}
  .pos{color:var(--pos);font-weight:600} .neg{color:var(--neg);font-weight:600} .muted{color:var(--dim)}
  .meta{font-size:13px;color:var(--dim)}
  .in{width:100%;border:1px solid var(--line);border-radius:14px;padding:15px 16px;font-size:16px;margin-top:8px;outline:none;background:var(--soft);color:var(--ink);font-family:inherit}
  .in:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(47,107,246,.12)}
  .lbl{font-size:12px;font-weight:600;color:var(--dim);letter-spacing:.3px;text-transform:uppercase}
  .btn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:9999px;padding:16px;font:600 17px inherit;cursor:pointer;margin-top:16px;transition:background .2s,transform .14s}
  .btn:active{background:var(--acc-press);transform:scale(.98)}
  .empty{text-align:center;color:var(--dim);font-size:14px;padding:20px 0}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 18px 12px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 16px}
  .kpi .k{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .kpi .v{font-size:22px;font-weight:600;margin-top:4px;letter-spacing:-0.5px}
  .kpi .s{font-size:11px;color:var(--dim);margin-top:3px}
  .ranges{display:flex;gap:6px;margin:16px 18px 14px}
  .ranges button{flex:1;background:var(--soft);color:var(--dim);border-radius:9999px;padding:10px 0;font:600 13px inherit;border:none;cursor:pointer}
  .ranges button.on{background:var(--tint);color:var(--acc);font-weight:700}
  .badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:9999px;letter-spacing:.3px}
  .badge.won{background:#E8F5E9;color:var(--pos)}.badge.lost{background:#FDECEA;color:var(--neg)}.badge.open{background:var(--tint);color:var(--acc)}
  .hint{font-size:11px;color:var(--dim);margin:10px 18px 16px;line-height:1.5}
  .login{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
  .login .card{width:100%;max-width:380px;margin:0;padding:28px 22px;background:#fff;border:1px solid var(--hair);box-shadow:0 6px 30px rgba(15,17,21,.06)}
  .err{color:var(--neg);font:600 13px inherit;text-align:center;margin-top:12px;display:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="wrap"></div>
<script>
  var db=null; try{ db=window.supabase.createClient('https://grxnbgtfnaayeluenvqh.supabase.co','sb_publishable_ow1DihBdAAvNtnb1H0Kojw_7vbeMKFu'); }catch(e){}
  var AGENT=null, LINKS=[], SETTLE=[], NAMES={}, RANGE='30d', SHOWR=false, PAYOUTS=[], SHOWW=false;
  var MIN_PAYOUT=50;
  var TG={pay:false,cust:false,tr:false}; // collapsed sections — keep the portal minimal
  function secToggle(id,label,open){
    return '<div class="sec" data-tg="'+id+'" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 0;margin:4px 12px 2px;border-bottom:1px solid var(--line)">'+label+
      '<span style="background:#fff;border:1px solid var(--line);border-radius:4px;padding:3px 9px;font:700 10px system-ui;color:#1c2430">'+(open?'▴':'▾')+'</span></div>';
  }
  function usd(n){n=+n||0;return '$'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
  function el(){return document.getElementById('wrap');}

  function viewLogin(msg){
    el().innerHTML='<div class="login"><div class="card">'+
      '<div style="text-align:center;margin-bottom:22px">'+
      '<div style="font-size:22px;font-weight:600;color:var(--acc);letter-spacing:-0.4px">Alpexa Suisse</div>'+
      '<div style="font-size:11px;font-weight:600;color:var(--acc);letter-spacing:2.4px;margin-top:12px">PARTNER PORTAL</div>'+
      '<div class="meta" style="margin-top:6px">Commission &amp; referrals</div></div>'+
      '<label class="lbl">Agent code or email</label><input class="in" id="lgCode" placeholder="AG-1234 or you@email.com" autocomplete="off">'+
      '<label class="lbl" style="display:block;margin-top:12px">PIN</label><input class="in" id="lgPin" type="password" inputmode="numeric" placeholder="••••" autocomplete="off">'+
      '<button class="btn" id="lgGo">Sign in</button>'+
      '<div class="err" id="lgErr"></div></div></div>';
    if(msg){ var e=document.getElementById('lgErr'); e.textContent=msg; e.style.display='block'; }
    document.getElementById('lgGo').onclick=doLogin;
    document.getElementById('lgPin').onkeydown=function(ev){ if(ev.key==='Enter')doLogin(); };
  }
  function doLogin(){
    var raw=(document.getElementById('lgCode').value||'').trim();
    var pin=(document.getElementById('lgPin').value||'').trim();
    var err=document.getElementById('lgErr');
    if(!db){ err.textContent='No server connection.'; err.style.display='block'; return; }
    if(!raw||!pin){ err.textContent='Enter your code (or email) and PIN.'; err.style.display='block'; return; }
    // Sign in with the AG-xxxx code or the agent's email — whichever was typed.
    var isEmail=raw.indexOf('@')>=0, code=raw.toUpperCase();
    var q=isEmail ? db.from('agents').select('*').ilike('email',raw).limit(1)
                  : db.from('agents').select('*').eq('code',code).limit(1);
    q.then(function(r){
      if(r&&r.error){ err.textContent='Server error: '+r.error.message+' (agents SQL not run yet?)'; err.style.display='block'; return; }
      var a=r&&r.data&&r.data[0];
      if(!a){ err.textContent=(isEmail?('No agent with email '+raw):('No agent with code '+code))+' — check Back Office 1 → Agents.'; err.style.display='block'; return; }
      code=a.code;
      if(String(a.pin)!==pin){ err.textContent='Wrong PIN for '+code+'.'; err.style.display='block'; return; }
      if(a.status&&a.status!=='active'){ err.textContent='This agent account is not active.'; err.style.display='block'; return; }
      AGENT=a; try{ sessionStorage.setItem('alpexa.agent',code+'|'+pin); }catch(e){}
      pull(); viewDash();
    },function(){ err.textContent='Connection error — try again.'; err.style.display='block'; });
  }
  function logout(){ AGENT=null; try{ sessionStorage.removeItem('alpexa.agent'); }catch(e){} viewLogin(); }

  function range(){ var now=Date.now(), lo=0, label='All time';
    if(RANGE==='today'){ var d=new Date(); d.setHours(0,0,0,0); lo=d.getTime(); label='Today'; }
    else if(RANGE==='7d'){ lo=now-7*86400e3; label='Last 7 days'; }
    else if(RANGE==='30d'){ lo=now-30*86400e3; label='Last 30 days'; }
    return {lo:lo,hi:Infinity,label:label}; }

  function commission(allTime){
    var rg=allTime?{lo:0,hi:Infinity,label:'All time'}:range(), share={};
    LINKS.forEach(function(l){ share[l.cust_id]=(+l.share||100)/100; });
    var fxLots=0, sportsNet=0, cryptoFees=0, n=0, perCust={};
    SETTLE.forEach(function(s){
      var sh=share[s.cust_id]; if(sh==null)return;
      var t=s.created_at?Date.parse(s.created_at):0; if(!(t>=rg.lo))return; n++;
      perCust[s.cust_id]=perCust[s.cust_id]||0;
      if(s.server==='fx'&&s.kind==='fx_close'){ fxLots+=(+s.stake||0)*sh; }
      else if(s.server==='sports'&&String(s.kind||'').indexOf('bet_')===0){ var v=(-(+s.pnl||0))*sh; sportsNet+=v; perCust[s.cust_id]+=v; }
      else if(s.kind==='crypto_fee'){ cryptoFees+=(+s.stake||0)*sh; }
    });
    var a=AGENT||{};
    var cFx=fxLots*(+a.fx_per_lot||0), cSp=sportsNet*((+a.sports_net_pct||0)/100), cCr=cryptoFees*((+a.crypto_fee_pct||0)/100);
    return {label:rg.label,lo:rg.lo,fxLots:fxLots,sportsNet:sportsNet,cryptoFees:cryptoFees,cFx:cFx,cSp:cSp,cCr:cCr,total:cFx+cSp+cCr,n:n,perCust:perCust};
  }

  function viewDash(){
    if(!AGENT){ viewLogin(); return; }
    var c=commission();
    var KINDS={fx_close:'FX close',bet_won:'Bet won',bet_lost:'Bet lost',bet_cashout:'Cashout',bet_void:'Void',crypto_fee:'Fee'};
    var h='<div class="hdr"><div><b>'+(AGENT.name||AGENT.code)+'</b><div class="sub">'+AGENT.code+' · Alpexa Suisse Partners</div></div><button id="btnOut">Sign out</button></div>';
    h+='<div class="sec" style="display:flex;align-items:center;justify-content:space-between">Commission · '+c.label+
      '<button id="btnRange" style="background:'+(SHOWR?'var(--acc)':'#fff')+';border:1px solid var(--line);border-radius:4px;padding:5px 11px;font:700 11px system-ui;color:'+(SHOWR?'#fff':'#1c2430')+';cursor:pointer">Period '+(SHOWR?'▴':'▾')+'</button></div>';
    if(SHOWR){
      h+='<div class="ranges" style="margin:0 12px 8px">'+[['today','Today'],['7d','7d'],['30d','30d'],['all','All']].map(function(x){
        return '<button data-r="'+x[0]+'" class="'+(RANGE===x[0]?'on':'')+'">'+x[1]+'</button>'; }).join('')+'</div>';
    }
    h+='<div class="kpis">'+
      kpi('My commission',usd(Math.max(0,c.total)),c.label+' · '+c.n+' trades',c.total>=0?'pos':'neg')+
      kpi('FX',usd(c.cFx),(Math.round(c.fxLots*100)/100)+' lots × $'+(+AGENT.fx_per_lot||0),'pos')+
      kpi('Sports',(c.cSp<0?'-':'')+usd(Math.abs(c.cSp)),'pool net × '+(+AGENT.sports_net_pct||0)+'%',c.cSp>=0?'pos':'neg')+
      kpi('Crypto',usd(c.cCr),'fees × '+(+AGENT.crypto_fee_pct||0)+'%','pos')+
    '</div>';
    if(c.cSp<0) h+='<div class="hint" style="color:var(--neg)">Sports pool is negative this period (your customers won) — it carries over; payout is $0 until it recovers.</div>';
    // ── Withdraw: available = lifetime commission − paid − pending requests ──
    var ca=commission(true), paid=0, pendAmt=0, adj=0;
    PAYOUTS.forEach(function(p){ if(p.method==='adjust'){ if(p.status==='approved')adj+=(+p.amount||0); }
      else if(p.status==='approved')paid+=(+p.amount||0); else if(p.status==='pending')pendAmt+=(+p.amount||0); });
    var avail=Math.max(0, Math.max(0,ca.total)+adj-paid-pendAmt);
    h+='<div class="sec">Withdraw</div><div class="card">'+
      '<div class="row"><span>Available to withdraw</span><b class="pos">'+usd(avail)+'</b></div>'+
      (adj!==0?'<div class="row"><span>Adjustments</span><b class="'+(adj>=0?'pos':'neg')+'">'+(adj<0?'-':'+')+usd(Math.abs(adj))+'</b></div>':'')+
      '<div class="row"><span>Paid out (lifetime)</span><b>'+usd(paid)+'</b></div>'+
      (pendAmt>0?'<div class="row"><span>Pending requests</span><b class="muted">'+usd(pendAmt)+'</b></div>':'');
    if(SHOWW){
      h+='<label class="lbl" style="display:block;margin-top:10px">Amount (USD)</label><input class="in" id="wAmt" type="number" min="'+MIN_PAYOUT+'" placeholder="min $'+MIN_PAYOUT+'">'+
        '<label class="lbl" style="display:block;margin-top:10px">Method</label>'+
        '<select class="in" id="wMethod"><option value="crypto">Crypto · USDT (ERC-20)</option><option value="bank">Bank transfer</option><option value="internal">My trading account (instant)</option></select>'+
        '<label class="lbl" style="display:block;margin-top:10px" id="wDestLbl">USDT address (0x…)</label><input class="in" id="wDest" placeholder="0x…" autocomplete="off">'+
        '<button class="btn" id="wGo">Submit request</button>'+
        '<button class="btn" id="wNo" style="background:#eef0f3;color:#5f6b7a;margin-top:8px">Cancel</button>'+
        '<div class="err" id="wErr"></div>';
    } else {
      h+='<button class="btn" id="wOpen"'+(avail<MIN_PAYOUT?' style="background:#c8cfd8"':'')+'>Withdraw commission</button>'+
        (avail<MIN_PAYOUT?'<div class="hint" style="margin:8px 0 0">Minimum withdrawal is $'+MIN_PAYOUT+'.</div>':'');
    }
    h+='</div>';
    // Shareable signup link — customers who join through it auto-link to me.
    var refUrl=location.href.replace(/[^\/]*(\?.*)?(#.*)?$/,'')+'signup.html?ref='+AGENT.code;
    h+='<div class="sec">My referral link</div><div class="card">'+
      '<div id="refLink" style="font-family:ui-monospace,monospace;font-size:11px;word-break:break-all;color:#1c2430;background:#F1F3F6;border-radius:4px;padding:8px 10px;cursor:pointer">'+refUrl+'</div>'+
      '<button class="btn" id="refCopy" style="margin-top:8px;padding:10px">Copy link</button></div>';
    // Everything below stays hidden until tapped — agents land on a minimal view.
    h+=secToggle('pay','My payouts · '+PAYOUTS.length,TG.pay);
    if(TG.pay){ h+='<div class="card">';
      if(!PAYOUTS.length) h+='<div class="empty">No payout requests yet.</div>';
      PAYOUTS.slice(0,10).forEach(function(p){ var st=p.status==='approved'?'won':p.status==='rejected'?'lost':'open';
        var M={crypto:'USDT',bank:'Bank',internal:'Trading acct',adjust:'Adjustment'};
        var amtTxt=(p.method==='adjust')?(((+p.amount||0)<0?'-':'+')+usd(Math.abs(+p.amount||0))):usd(p.amount);
        h+='<div class="row"><span><b class="'+(p.method==='adjust'?((+p.amount||0)>=0?'pos':'neg'):'')+'">'+amtTxt+'</b> <span class="muted">· '+(M[p.method]||p.method)+(p.method==='adjust'&&p.dest?(' · '+p.dest):'')+' · '+(p.created_at?new Date(p.created_at).toLocaleDateString():'')+'</span>'+
          (p.txid?('<div class="meta"><a href="https://etherscan.io/tx/'+p.txid+'" target="_blank" rel="noopener" style="color:#1F2A37;font-weight:700">tx ↗</a></div>'):'')+'</span>'+
          '<span class="badge '+st+'">'+(p.status||'pending').toUpperCase()+'</span></div>'; });
      h+='</div>'; }
    h+=secToggle('cust','My customers · '+LINKS.length,TG.cust);
    if(TG.cust){ h+='<div class="card">';
      if(!LINKS.length) h+='<div class="empty">No customers linked yet.</div>';
      LINKS.forEach(function(l){
        var net=c.perCust[l.cust_id]||0;
        h+='<div class="row"><span><b>'+(NAMES[l.cust_id]||l.cust_id)+'</b> <span class="muted">· '+l.cust_id+' · '+(+l.share||100)+'%</span></span>'+
          '<b class="'+(net>=0?'pos':'neg')+'">'+(net<0?'-':'+')+usd(Math.abs(net))+'</b></div>';
      });
      h+='</div>'; }
    var rg=range(), myIds={}; LINKS.forEach(function(l){ myIds[l.cust_id]=true; });
    var trades=SETTLE.filter(function(s){ var t=s.created_at?Date.parse(s.created_at):0; return myIds[s.cust_id] && t>=rg.lo; }).slice(0,30);
    h+=secToggle('tr','Recent trades · '+trades.length,TG.tr);
    if(TG.tr){ h+='<div class="card">';
      if(!trades.length) h+='<div class="empty">No trades in this period.</div>';
      trades.forEach(function(s){ var p=(s.kind==='crypto_fee')?-(+s.stake||0):(+s.pnl||0); var bcls=(KINDS[s.kind]==='Void')?'open':(p>=0?'won':'lost');
        h+='<div class="row"><span><span class="badge '+bcls+'">'+(KINDS[s.kind]||s.kind||'Trade').toUpperCase()+'</span> <b style="font-size:12.5px">'+(s.symbol||'')+'</b>'+
          '<div class="meta" style="margin-top:2px">'+(NAMES[s.cust_id]||s.cust_id)+' · '+(s.server||'')+' · '+(s.created_at?new Date(s.created_at).toLocaleString():'')+'</div></span>'+
          '<b class="'+(p>=0?'pos':'neg')+'">'+(p<0?'-':'+')+usd(Math.abs(p))+'</b></div>'; });
      h+='</div>'; }
    el().innerHTML=h;
    document.querySelectorAll('[data-tg]').forEach(function(b){ b.onclick=function(){ var k=b.getAttribute('data-tg'); TG[k]=!TG[k]; viewDash(); }; });
    var doCopy=function(){ try{ navigator.clipboard.writeText(refUrl); var bb=document.getElementById('refCopy'); if(bb){ bb.textContent='Copied ✓'; setTimeout(function(){ if(bb)bb.textContent='Copy link'; },1500); } }catch(e){} };
    var rc=document.getElementById('refCopy'); if(rc) rc.onclick=doCopy;
    var rl=document.getElementById('refLink'); if(rl) rl.onclick=doCopy;
    document.getElementById('btnOut').onclick=logout;
    var br=document.getElementById('btnRange'); if(br) br.onclick=function(){ SHOWR=!SHOWR; viewDash(); };
    document.querySelectorAll('[data-r]').forEach(function(b){ b.onclick=function(){ RANGE=b.getAttribute('data-r'); SHOWR=false; viewDash(); }; });
    var wo=document.getElementById('wOpen'); if(wo) wo.onclick=function(){ if(avail>=MIN_PAYOUT){ SHOWW=true; viewDash(); } };
    var wn=document.getElementById('wNo'); if(wn) wn.onclick=function(){ SHOWW=false; viewDash(); };
    var wm=document.getElementById('wMethod'); if(wm) wm.onchange=function(){
      var L={crypto:'USDT address (0x…)',bank:'Bank name · holder · account no.',internal:'Your customer ID (P-1234)'};
      var P={crypto:'0x…',bank:'e.g. Chase · John Doe · 1234567',internal:'P-1234'};
      document.getElementById('wDestLbl').textContent=L[this.value]||'Destination';
      document.getElementById('wDest').placeholder=P[this.value]||''; };
    var wg=document.getElementById('wGo'); if(wg) wg.onclick=function(){ submitPayout(avail); };
  }
  function submitPayout(avail){
    var err=document.getElementById('wErr'); var show=function(m){ err.textContent=m; err.style.display='block'; };
    var amt=Math.round((parseFloat(document.getElementById('wAmt').value)||0)*100)/100;
    var m=document.getElementById('wMethod').value, dest=(document.getElementById('wDest').value||'').trim();
    if(!(amt>=MIN_PAYOUT)) return show('Minimum withdrawal is $'+MIN_PAYOUT+'.');
    if(amt>avail) return show('Amount exceeds your available balance ('+usd(avail)+').');
    if(m==='crypto' && !/^0x[0-9a-fA-F]{40}$/.test(dest)) return show('Enter a valid 0x… USDT (ERC-20) address.');
    if(m==='bank' && dest.length<8) return show('Enter bank name · account holder · account number.');
    if(m==='internal' && !/^P-/i.test(dest)) return show('Enter your customer ID (looks like P-1234).');
    db.from('agent_payouts').insert({agent_code:AGENT.code,amount:amt,method:m,dest:dest,status:'pending'}).then(function(r){
      if(r&&r.error) return show('Server error: '+r.error.message+' (payouts SQL not run yet?)');
      SHOWW=false; pull(); viewDash();
    },function(){ show('Connection error — try again.'); });
  }
  function kpi(k,v,s,cls){ return '<div class="kpi"><div class="k">'+k+'</div><div class="v '+(cls||'')+'">'+v+'</div><div class="s">'+(s||'')+'</div></div>'; }

  function pull(){
    if(!db||!AGENT)return;
    db.from('agent_links').select('*').eq('agent_code',AGENT.code).then(function(r){
      if(r&&r.data){ LINKS=r.data;
        var ids=LINKS.map(function(l){return l.cust_id;});
        if(ids.length){ db.from('players').select('cust_id,name').in('cust_id',ids).then(function(r2){
          if(r2&&r2.data){ r2.data.forEach(function(p){ NAMES[p.cust_id]=p.name; }); if(AGENT&&!SHOWW)viewDash(); } },function(){}); }
        if(AGENT&&!SHOWW)viewDash(); }
    },function(){});
    db.from('settlements').select('*').order('created_at',{ascending:false}).limit(2000).then(function(r){
      if(r&&r.data){ SETTLE=r.data; if(AGENT&&!SHOWW)viewDash(); } },function(){});
    db.from('agent_payouts').select('*').eq('agent_code',AGENT.code).order('created_at',{ascending:false}).limit(50).then(function(r){
      if(r&&r.data){ PAYOUTS=r.data; if(AGENT&&!SHOWW)viewDash(); } },function(){});
    db.from('agents').select('*').eq('code',AGENT.code).limit(1).then(function(r){
      if(r&&r.data&&r.data[0]){ AGENT=r.data[0]; } },function(){});
  }
  setInterval(function(){ if(!document.hidden && AGENT) pull(); },10000);

  // Auto-restore session
  (function(){
    var s=null; try{ s=sessionStorage.getItem('alpexa.agent'); }catch(e){}
    if(s&&db){ var p=s.split('|');
      db.from('agents').select('*').eq('code',p[0]).limit(1).then(function(r){
        var a=r&&r.data&&r.data[0];
        if(a&&String(a.pin)===p[1]&&(!a.status||a.status==='active')){ AGENT=a; pull(); viewDash(); }
        else viewLogin();
      },function(){ viewLogin(); });
    } else viewLogin();
  })();
</script>
</body>
</html>
