<svg xmlns="http://www.w3.org/2000/svg" width="960" height="760" viewBox="0 0 960 760" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="960" height="760" fill="#000000"/>
  <text x="40" y="50" fill="#FFFFFF" font-size="26" font-weight="700">Balance 디자인 미리보기 (수정 안 함 · 보기용)</text>
  <text x="40" y="80" fill="#9A9A9A" font-size="15">아래 4가지 중에 골라줘. 숫자/색은 예시야.</text>

  <!-- CURRENT -->
  <g transform="translate(40,110)">
    <rect width="880" height="120" rx="16" fill="#0E0E0E" stroke="#1F1F1F"/>
    <text x="22" y="34" fill="#5F5F5F" font-size="13" font-weight="700" letter-spacing="1.5">지금 (CURRENT)</text>
    <text x="22" y="84" fill="#FFFFFF" font-size="38" font-weight="600" letter-spacing="-1.2">$9,564.87</text>
    <text x="320" y="84" fill="#3D9DFF" font-size="14" font-weight="600">▲ $181.84 (+1.94%) <tspan fill="#9A9A9A">Today</tspan></text>
  </g>

  <!-- OPTION 1 -->
  <g transform="translate(40,250)">
    <rect width="880" height="130" rx="16" fill="#0E0E0E" stroke="#1F1F1F"/>
    <text x="22" y="34" fill="#3D9DFF" font-size="13" font-weight="700" letter-spacing="1.5">옵션 1 — 크게 + 깔끔</text>
    <text x="22" y="92" fill="#FFFFFF" font-size="50" font-weight="600" letter-spacing="-1.8">$9,564.87</text>
    <text x="430" y="92" fill="#3D9DFF" font-size="17" font-weight="600">▲ $181.84 (+1.94%) <tspan fill="#9A9A9A">Today</tspan></text>
  </g>

  <!-- OPTION 2 -->
  <g transform="translate(40,400)">
    <rect width="880" height="160" rx="16" fill="#0E0E0E" stroke="#1F1F1F"/>
    <text x="22" y="34" fill="#3D9DFF" font-size="13" font-weight="700" letter-spacing="1.5">옵션 2 — 라벨 + 더 큰 숫자 + 파란 칩</text>
    <text x="22" y="62" fill="#5F5F5F" font-size="13" font-weight="600" letter-spacing="0.5">Total balance</text>
    <text x="22" y="118" fill="#FFFFFF" font-size="58" font-weight="700" letter-spacing="-2">$9,564.87</text>
    <g transform="translate(22,132)">
      <rect width="240" height="26" rx="13" fill="#10233D"/>
      <text x="14" y="18" fill="#3D9DFF" font-size="14" font-weight="700">▲ $181.84 (+1.94%) Today</text>
    </g>
  </g>

  <!-- OPTION 3 -->
  <g transform="translate(40,580)">
    <rect width="880" height="150" rx="16" fill="#0E0E0E" stroke="#1F1F1F"/>
    <text x="22" y="34" fill="#3D9DFF" font-size="13" font-weight="700" letter-spacing="1.5">옵션 3 — 제일 큼 + 글로우 강조</text>
    <text x="22" y="112" fill="#FFFFFF" font-size="68" font-weight="700" letter-spacing="-2.6" style="filter:drop-shadow(0 0 14px rgba(61,157,255,0.25))">$9,564.87</text>
    <text x="22" y="140" fill="#3D9DFF" font-size="18" font-weight="700">▲ $181.84 (+1.94%) <tspan fill="#9A9A9A">Today</tspan></text>
