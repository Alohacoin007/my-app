<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="960" height="620" fill="#000000"/>
  <text x="40" y="48" fill="#FFFFFF" font-size="26" font-weight="700">잔액 — 3줄 디자인 샘플 (수정 안 함 · 보기용)</text>
  <text x="40" y="78" fill="#9A9A9A" font-size="15">① 라벨  ② 큰 숫자  ③ 변동 — 이 구조. 아래 3가지 중에 골라줘.</text>

  <!-- A: basic 3 lines -->
  <g transform="translate(40,108)">
    <rect width="880" height="150" rx="16" fill="#0E0E0E" stroke="#1F1F1F"/>
    <text x="24" y="32" fill="#3D9DFF" font-size="13" font-weight="700" letter-spacing="1.5">A — 기본 3줄</text>
    <text x="24" y="66" fill="#5F5F5F" font-size="13" font-weight="600" letter-spacing="0.5">Total balance</text>
    <text x="24" y="116" fill="#FFFFFF" font-size="50" font-weight="700" letter-spacing="-1.8">$9,564.87</text>
    <text x="24" y="142" fill="#3D9DFF" font-size="15" font-weight="600">▲ $181.84 (+1.94%) <tspan fill="#9A9A9A">Today</tspan></text>
  </g>

  <!-- B: 3 lines, bigger number + blue chip -->
  <g transform="translate(40,278)">
    <rect width="880" height="160" rx="16" fill="#0E0E0E" stroke="#1F1F1F"/>
    <text x="24" y="32" fill="#3D9DFF" font-size="13" font-weight="700" letter-spacing="1.5">B — 큰 숫자 + 파란 칩</text>
    <text x="24" y="64" fill="#5F5F5F" font-size="13" font-weight="600" letter-spacing="0.5">Total balance</text>
    <text x="24" y="120" fill="#FFFFFF" font-size="58" font-weight="700" letter-spacing="-2">$9,564.87</text>
    <g transform="translate(24,134)">
      <rect width="244" height="26" rx="13" fill="#10233D"/>
      <text x="14" y="18" fill="#3D9DFF" font-size="14" font-weight="700">▲ $181.84 (+1.94%) Today</text>
    </g>
  </g>

  <!-- C: 3 lines centered -->
  <g transform="translate(40,458)">
    <rect width="880" height="150" rx="16" fill="#0E0E0E" stroke="#1F1F1F"/>
    <text x="24" y="32" fill="#3D9DFF" font-size="13" font-weight="700" letter-spacing="1.5">C — 가운데 정렬 3줄</text>
    <text x="440" y="64" fill="#5F5F5F" font-size="13" font-weight="600" letter-spacing="0.5" text-anchor="middle">Total balance</text>
    <text x="440" y="114" fill="#FFFFFF" font-size="52" font-weight="700" letter-spacing="-1.8" text-anchor="middle">$9,564.87</text>
    <text x="440" y="140" fill="#3D9DFF" font-size="15" font-weight="600" text-anchor="middle">▲ $181.84 (+1.94%) Today</text>
  </g>
</svg>
