<script type="text/babel" data-presets="react">
// Shared bits: chart paths, status bar, formatters, sparklines

const fmt = (n, d = 2) => n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
const fmtUsd = (n, d = 2) => '$' + fmt(n, d);
const fmtPct = (n, d = 2) => (n >= 0 ? '+' : '') + n.toFixed(d) + '%';
// Compact USD: $32.4B, $48M, $900K
const fmtCompact = (n) => {
  const abs = Math.abs(n);
  if (abs >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (abs >= 1e9)  return '$' + (n / 1e9).toFixed(2) + 'B';
  if (abs >= 1e6)  return '$' + (n / 1e6).toFixed(2) + 'M';
  if (abs >= 1e3)  return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
};

// Multi-currency support. Rates as of May 26, 2026 (approximate snapshot).
const CURRENCIES = {
  USD: { code: 'USD', symbol: '$',   suffix: '',     rate: 1.000 },
  CHF: { code: 'CHF', symbol: '',    suffix: ' CHF', rate: 0.812 },
  EUR: { code: 'EUR', symbol: '€',   suffix: '',     rate: 0.921 },
};
const CURRENCY_ORDER = ['USD', 'CHF', 'EUR'];
const cvt = (usdAmount, code = 'USD') => usdAmount * (CURRENCIES[code]?.rate || 1);
const fmtMoney = (usdAmount, code = 'USD', d = 2) => {
  const c = CURRENCIES[code] || CURRENCIES.USD;
  return c.symbol + fmt(usdAmount * c.rate, d) + c.suffix;
};

// ─────────────────────────────────────────────────────────────
// Chart path generator — deterministic pseudo-random walk
// ─────────────────────────────────────────────────────────────
function makeChart(seed, n = 96, drift = 0.06, vol = 1) {
  let s = seed;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const pts = [];
  let y = 0;
  for (let i = 0; i < n; i++) {
    y += (rnd() - 0.5) * vol + drift / n * 100;
    pts.push(y);
  }
  return pts;
}

function pathFromPts(pts, w, h, pad = 0) {
  const min = Math.min(...pts), max = Math.max(...pts);
  const r = max - min || 1;
  const dx = (w - pad * 2) / (pts.length - 1);
  return pts.map((p, i) => {
    const x = pad + i * dx;
    const y = pad + (h - pad * 2) * (1 - (p - min) / r);
    return (i === 0 ? 'M' : 'L') + x.toFixed(2) + ' ' + y.toFixed(2);
  }).join(' ');
}

function areaFromPts(pts, w, h, pad = 0) {
  const p = pathFromPts(pts, w, h, pad);
  return p + ` L ${w - pad} ${h - pad} L ${pad} ${h - pad} Z`;
}

// Sparkline component — shape actually reflects the asset's net % move.
// The line starts at 0, ends exactly at `pct`, with shape variation per seed
// and volatility proportional to |pct|. So +6% looks visibly steeper than +2%.
function Spark({ seed, w = 60, h = 22, color = '#C2FF3D', pct = 0, strokeWidth = 1.5 }) {
  // True flat for stable coins (pct ≈ 0). No fake wave.
  if (Math.abs(pct) < 0.05) {
    const y = (h / 2).toFixed(2);
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: 'block' }}>
        <line x1="1" y1={y} x2={w - 1} y2={y} stroke={color} strokeWidth={strokeWidth} strokeLinecap="round"/>
      </svg>
    );
  }
  // Generate end-anchored series
  const n = 36;
  let s = seed;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const range = Math.max(0.4, Math.abs(pct));
  const noiseAmp = range * 0.42;
  // Pick two wave frequencies per seed for shape variety
  const f1 = 1.5 + rnd() * 2.5;
  const f2 = 0.7 + rnd() * 1.2;
  const phase = rnd() * Math.PI * 2;
  const pts = new Array(n);
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1);
    const base = pct * t;                                          // ramp 0 → pct
    const taper = Math.sin(Math.PI * t);                           // 0 at ends, 1 mid
    const wave = (Math.sin(t * Math.PI * 2 * f1 + phase) * 0.6
                + Math.sin(t * Math.PI * 2 * f2 - phase) * 0.4)
                * noiseAmp * taper;
    const jitter = (rnd() - 0.5) * noiseAmp * 0.35 * taper;
    pts[i] = base + wave + jitter;
  }
  pts[0] = 0;
  pts[n - 1] = pct;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: 'block' }}>
      <path d={pathFromPts(pts, w, h, 1)} stroke={color} strokeWidth={strokeWidth} fill="none" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────
// Coin icons — simple stylized monograms (placeholder-friendly)
// ─────────────────────────────────────────────────────────────

}

// ─────────────────────────────────────────────────────────────
// Status bar (custom, themable) — replaces IOSStatusBar so colors match
// ─────────────────────────────────────────────────────────────
function StatusBar({ color = '#fff', time = '9:41' }) {

      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        {/* Signal */}
        <svg width="18" height="11" viewBox="0 0 18 11"><g fill={color}>
          <rect x="0" y="7" width="3" height="4" rx="0.5"/>
          <rect x="5" y="5" width="3" height="6" rx="0.5"/>
          <rect x="10" y="2" width="3" height="9" rx="0.5"/>
          <rect x="15" y="0" width="3" height="11" rx="0.5"/>
        </g></svg>
        {/* Wifi */}
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
          <path d="M8.5 11.5 L10.7 9.3 A3 3 0 0 0 6.3 9.3 Z" fill={color}/>
          <path d="M3.5 6.5 A7 7 0 0 1 13.5 6.5" stroke={color} strokeWidth="1.6" fill="none" strokeLinecap="round"/>
          <path d="M0.5 3 A11 11 0 0 1 16.5 3" stroke={color} strokeWidth="1.6" fill="none" strokeLinecap="round"/>
        </svg>
        {/* Battery */}
        <svg width="28" height="12" viewBox="0 0 28 12" fill="none">
          <rect x="0.5" y="0.5" width="23" height="11" rx="3" stroke={color} strokeOpacity="0.4"/>
          <rect x="2" y="2" width="20" height="8" rx="1.5" fill={color}/>
          <rect x="24.5" y="4" width="2" height="4" rx="1" fill={color} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// Home indicator bar
function HomeIndicator({ color = '#fff' }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'center', padding: '8px 0 8px', flexShrink: 0 }}>
      <div style={{ width: 134, height: 5, borderRadius: 3, background: color }} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Phone frame — simple rounded device used in all artboards
// ─────────────────────────────────────────────────────────────
function Phone({ children, width = 390, height = 844, bg = '#000', radius = 54, chrome = true }) {
  return (
    <div style={{
      width, height,
      background: bg,
      borderRadius: radius,
      overflow: 'hidden',
      position: 'relative',
      display: 'flex',
      flexDirection: 'column',
      boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.04)',
    }}>
      {/* Dynamic island */}
      {chrome && (
        <div style={{
          position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
          width: 124, height: 37, borderRadius: 20, background: '#000', zIndex: 100,
        }} />
      )}
      {children}
    </div>
  );
}

Object.assign(window, {
  fmt, fmtUsd, fmtPct, fmtCompact,
  CURRENCIES, CURRENCY_ORDER, cvt, fmtMoney,
  makeChart, pathFromPts, areaFromPts, Spark,
  COIN_META, CoinIcon,
  StatusBar, HomeIndicator, Phone,
});

</script>

<script type="text/babel" data-presets="react">
// Alpexa Suisse — WHITE HOME screen explorations.
// Three variations of the home/portfolio screen on a light palette.

// Count-up hook — animates a number from 0 → target on mount.
// Robinhood-style: cubic ease-out, ~1.2s.
function useCountUp(target, duration = 1200) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    let raf;
    const start = performance.now();
    const ease = (t) => 1 - Math.pow(1 - t, 3);
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      setVal(target * ease(t));
      if (t < 1) raf = requestAnimationFrame(tick);
      else setVal(target);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return val;
}

// Live-tick hook — counts up on mount, then random-walks around target
// with mean reversion (so the displayed value jitters but stays in range).
function useLiveTick(target, opts = {}) {
  const {
    mountDuration = 1100,
    tickPeriod = 140,
    volatility = 2.5,   // ± dollars per tick
    meanRevert = 0.04,  // pull-back strength per tick
  } = opts;
  const [val, setVal] = React.useState(0);
  const valRef = React.useRef(0);
  React.useEffect(() => {
    let raf, intervalId;
    const start = performance.now();
    const ease = (t) => 1 - Math.pow(1 - t, 3);
    const mountTick = (now) => {
      const t = Math.min(1, (now - start) / mountDuration);
      const v = target * ease(t);
      valRef.current = v;
      setVal(v);
      if (t < 1) {
        raf = requestAnimationFrame(mountTick);
      } else {
        valRef.current = target;
        setVal(target);
        intervalId = setInterval(() => {
          const delta = (Math.random() - 0.5) * 2 * volatility;
          const revert = (target - valRef.current) * meanRevert;
          valRef.current += delta + revert;
          setVal(valRef.current);
        }, tickPeriod);
      }
    };
    raf = requestAnimationFrame(mountTick);
    return () => {
      cancelAnimationFrame(raf);
      if (intervalId) clearInterval(intervalId);
    };
  }, [target, mountDuration, tickPeriod, volatility, meanRevert]);
  return val;
}

// Direction-of-tick hook: returns 'up' | 'down' | null briefly after each change.
function useTickDirection(value, decayMs = 480, threshold = 0.01) {
  const [dir, setDir] = React.useState(null);
  const prev = React.useRef(value);
  React.useEffect(() => {
    const diff = value - prev.current;
    if (Math.abs(diff) > threshold) {
      setDir(diff > 0 ? 'up' : 'down');
      prev.current = value;
      const t = setTimeout(() => setDir(null), decayMs);
      return () => clearTimeout(t);
    }
  }, [value, decayMs, threshold]);
  return dir;
}

// Odometer — each digit slot is a 0-9 column that slides vertically.
// Non-digit characters ($ , .) stay put. Robinhood-style rolling number.
// rowH > 1em prevents the next digit from bleeding into the current row
// when the font's actual glyph height exceeds the em-box (Manrope etc).
const ODO_ROW_H = 1.15; // multiplier of font size
function OdometerColumn({ digit }) {
  const rowH = `${ODO_ROW_H}em`;
  return (
    <span style={{
      display: 'inline-block',
      overflow: 'hidden',
      height: rowH,
      verticalAlign: 'baseline',
      fontVariantNumeric: 'tabular-nums',
    }}>
      <span style={{
        display: 'block',
        transform: `translateY(-${digit * ODO_ROW_H}em)`,
        transition: 'transform 600ms cubic-bezier(0.22, 0.85, 0.25, 1)',
        willChange: 'transform',
      }}>
        {'0123456789'.split('').map((d) => (
          <span key={d} style={{
            display: 'block', height: rowH, lineHeight: rowH,
          }}>{d}</span>
        ))}
      </span>
    </span>
  );
}

function Odometer({ value, decimals = 2, prefix = '$', suffix = '', superDecimals = false }) {
  const safeVal = Number.isFinite(value) ? value : 0;
  const mult = Math.pow(10, decimals);
  const total = Math.round(safeVal * mult);
  const intPart = Math.floor(total / mult);
  const fracPart = total % mult;
  const intStr = intPart.toLocaleString('en-US');
  const fracStr = String(fracPart).padStart(decimals, '0');
  const renderDigits = (str) => str.split('').map((c, i) =>
    /\d/.test(c)
      ? <OdometerColumn key={i} digit={Number(c)}/>
      : <span key={i}>{c}</span>
  );

        )
      )}
      {suffix && <span>{suffix}</span>}
    </span>
  );
}

// Range timeline metadata for the balance chart
// ─────────────────────────────────────────────────────────────
const RANGES_FULL = ['1D', '1W', '1M', '3M', 'YTD', '1Y', 'ALL'];
const RANGE_SEEDS = { '1D': 7771, '1W': 442, '1M': 9118, '3M': 3344, 'YTD': 5099, '1Y': 1822, 'ALL': 2233 };
// Open price multipliers vs current balance — defines whether each
// range is up or down overall (1D is derived from PORTFOLIO.changeUsd).
const RANGE_OPEN_MULT = {
  '1D':  null,
  '1W':  0.928,
  '1M':  1.041,
  '3M':  0.866,
  'YTD': 0.732,
  '1Y':  0.781,
  'ALL': 0.412,
};
const RANGE_LABEL = {
  '1D': 'Today', '1W': 'Past week', '1M': 'Past month',
  '3M': 'Past 3 months', 'YTD': 'YTD', '1Y': 'Past year', 'ALL': 'All time',
};
const RANGE_MS = {
  '1D':  24 * 3600 * 1000,
  '1W':  7  * 24 * 3600 * 1000,
  '1M':  30 * 24 * 3600 * 1000,
  '3M':  90 * 24 * 3600 * 1000,
  'YTD': 145 * 24 * 3600 * 1000,
  '1Y':  365 * 24 * 3600 * 1000,
  'ALL': 3 * 365 * 24 * 3600 * 1000,
};
function getScrubTimeLabel(range, idx, n) {
  const ms = RANGE_MS[range] || RANGE_MS['1D'];
  const now = new Date();
  const t = new Date(now.getTime() - (n - 1 - idx) / Math.max(1, n - 1) * ms);
  if (range === '1D') {
    return t.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  } else if (range === '1W') {
    return t.toLocaleString('en-US', { weekday: 'short', hour: 'numeric', minute: '2-digit' });
  } else if (range === '1Y' || range === 'ALL') {
    return t.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  } else {
    return t.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
}

// ─────────────────────────────────────────────────────────────
// Generate a deterministic intraday series that opens at `open`
// and lands exactly at `close`.
// ─────────────────────────────────────────────────────────────
function generateIntraday(open, close, n = 80, seed = 7771) {
  let s = seed;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const vals = new Array(n);
  vals[0] = open;
  for (let i = 1; i < n; i++) {
    const drift = (close - vals[i - 1]) / (n - i) * 0.7;
    const noise = (rnd() - 0.5) * (Math.abs(close) * 0.0018);
    vals[i] = vals[i - 1] + drift + noise;
  }
  vals[n - 1] = close;
  return vals;
}

// ─────────────────────────────────────────────────────────────
// Robinhood-style live balance chart:
//   • dotted baseline at period open
//   • line color flips green/red based on current vs baseline
//   • scrubbing — press/drag shows guide + scrub dot
//   • pulsing endpoint when not scrubbing
//   • range pills + Open/High/Low row below
// ─────────────────────────────────────────────────────────────
function LiveBalanceChart({
  series, baseline, lineColor,
  range, onRangeChange,
  scrubIndex, onScrubChange,
  height = 130,
}) {
  const W = 350, H = height;
  const padTop = 24, padBot = 6;
  const chartH = H - padTop - padBot;
  const allVals = [...series, baseline];
  const minV = Math.min(...allVals);
  const maxV = Math.max(...allVals);
  const valRange = (maxV - minV) || 1;
  const padPx = valRange * 0.12;
  const yMin = minV - padPx;
  const yMax = maxV + padPx;
  const yRange = yMax - yMin;
  const xOf = (i) => (i / (series.length - 1)) * W;
  const yOf = (v) => padTop + chartH - ((v - yMin) / yRange) * chartH;
  const pathD = series.map((v, i) => `${i === 0 ? 'M' : 'L'}${xOf(i).toFixed(1)} ${yOf(v).toFixed(1)}`).join(' ');
  const baselineY = yOf(baseline);
  const endX = xOf(series.length - 1);
  const endY = yOf(series[series.length - 1]);
  const scrubbing = scrubIndex !== null;
  const sX = scrubbing ? xOf(scrubIndex) : 0;
  const sY = scrubbing ? yOf(series[scrubIndex]) : 0;

  const ohlOpen = series[0];
  const ohlHigh = Math.max(...series);
  const ohlLow  = Math.min(...series);

  const svgRef = React.useRef(null);
  const dragging = React.useRef(false);
  const updateFromX = (clientX) => {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
    const idx = Math.round((x / Math.max(1, rect.width)) * (series.length - 1));
    onScrubChange(Math.max(0, Math.min(series.length - 1, idx)));
  };
  const handlers = {
    onPointerDown: (e) => {
      try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
      dragging.current = true;
      updateFromX(e.clientX);
      e.preventDefault();
    },
    onPointerMove: (e) => {
      if (dragging.current) updateFromX(e.clientX);
    },
    onPointerUp: () => {
      dragging.current = false;
      onScrubChange(null);
    },
    onPointerCancel: () => {
      dragging.current = false;
      onScrubChange(null);
    },
    onPointerLeave: () => {
      if (dragging.current) {
        dragging.current = false;
        onScrubChange(null);
      }
    },
  };

  return (
    <div>
      <div style={{ padding: '0 24px' }}>
        <svg
          ref={svgRef}
          width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
          {...handlers}
          style={{ display: 'block', touchAction: 'none', cursor: 'crosshair', userSelect: 'none', overflow: 'visible' }}
        >
        <line x1="0" y1={baselineY} x2={W} y2={baselineY}
          stroke={ALW.textDim} strokeDasharray="2 5" strokeOpacity="0.45" strokeWidth="1"/>
        <path d={pathD} stroke={lineColor} strokeWidth="2" fill="none"
          strokeLinejoin="round" strokeLinecap="round"
          style={{ transition: 'stroke 240ms ease' }}/>
        {!scrubbing && (
          <g>
            <circle cx={endX} cy={endY} r="9" fill={lineColor} opacity="0.4">
              <animate attributeName="r" values="3;14" dur="1.6s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.5;0" dur="1.6s" repeatCount="indefinite"/>
            </circle>
            <circle cx={endX} cy={endY} r="3.5" fill={lineColor}/>
          </g>
        )}
        {scrubbing && (
          <g>
            <line x1={sX} y1={padTop - 6} x2={sX} y2={padTop + chartH + 2}
              stroke={ALW.text} strokeWidth="1" strokeOpacity="0.45"/>
            <circle cx={sX} cy={sY} r="6" fill={ALW.bg} stroke={lineColor} strokeWidth="2.5"/>
          </g>
        )}
      </svg>
      </div>

      <div style={{ display: 'flex', justifyContent: 'space-around', padding: '8px 12px 0' }}>
        {RANGES_FULL.map((r) => {
          const active = r === range;
          return (
            <div key={r} onClick={() => onRangeChange(r)} style={{
              fontSize: 11, fontWeight: 600, letterSpacing: 0.6,
              color: active ? ALW.text : ALW.textDim,
              background: active ? ALW.panel : 'transparent',
              padding: '5px 11px', borderRadius: 6,
              fontFamily: 'Geist Mono, monospace',
              cursor: 'pointer', userSelect: 'none',
            }}>{r}</div>
          );
        })}
      </div>
    </div>
  );
}

// Data freshness strip — shows "last updated Xs ago · TZ" so a trader can
// gauge whether the price they're seeing is decision-grade or stale.
function DataFreshness() {
  const [now, setNow] = React.useState(() => new Date());
  const lastUpdate = React.useRef(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  React.useEffect(() => {
    const id = setInterval(() => {
      lastUpdate.current = new Date();
      setNow(new Date());
    }, 3400);
    return () => clearInterval(id);
  }, []);
  const ageSec = Math.max(0, Math.floor((now - lastUpdate.current) / 1000));
  const tz = 'UTC+1 · Zurich';
  const tStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Europe/Zurich' });
  return (
    <div style={{
      padding: '10px 22px 0',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      fontFamily: 'Geist Mono, monospace', fontSize: 10, letterSpacing: 0.6,
      color: ALW.textMute, textTransform: 'uppercase', fontWeight: 600,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <span
          className="alpexa-pulse-dot"
          style={{
            width: 5, height: 5, borderRadius: 3,
            background: ageSec < 5 ? ALW.green : ageSec < 30 ? '#B8860B' : ALW.red,
          }}
        />
        <span style={{ color: ALW.textDim }}>Updated {ageSec}s ago</span>
      </div>
      <span>{tStr} · {tz}</span>
    </div>
  );
}

<script type="text/babel" data-presets="react">
// Alpexa Suisse — full screen set, Robinhood-DNA but original brand.
// Brand notes:
//   • Wordmark: "Alpexa" set in Geist tight, "Suisse" in Mono uppercase tag
//   • Mark: ⟁ — geometric A/mountain hybrid (Alpine reference)
//   • Color: pure black + neon lime + faint cream + small Swiss red dot accent
//   • Type: Geist for UI, Geist Mono for all numbers (Swiss precision feel)

const ALPEXA = {
  ink: '#0A0A0A',
  bg: '#000',
  panel: '#0F0F0F',
  panel2: '#161616',
  line: '#1c1c1c',
  text: '#FFFFFF',
  textDim: '#8a8a8a',
  textMute: '#5a5a5a',
  neon: '#C2FF3D',
  neonDim: '#7a9c20',
  red: '#FF4D4D',
  swissRed: '#E5332A',
  cream: '#F6F4EE',
};

// Logo lockup
function AlpexaMark({ size = 16, color = '#fff' }) {
  return (
    <svg width={size} height={size * 0.95} viewBox="0 0 20 19" fill="none" style={{ display: 'block' }}>
      <path d="M10 1 L19 17 L13.5 17 L10 10.5 L6.5 17 L1 17 Z" stroke={color} strokeWidth="1.6" strokeLinejoin="round" fill="none"/>
      <path d="M7.5 13.5 L12.5 13.5" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>
    </svg>

}

function AlpexaWordmark({ color = '#fff', size = 14 }) {

      }}>SUISSE</span>
    </div>

}

// ─────────────────────────────────────────────────────────────
// QR placeholder — black/white deterministic block pattern
// ─────────────────────────────────────────────────────────────
function QR({ size = 200, seed = 1, dark = '#fff', light = 'transparent' }) {
  const N = 21;
  const cell = size / N;
  let s = seed;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const cells = [];
  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      // 3 finder patterns
      const inFinder = (
        (x < 7 && y < 7) || (x >= N - 7 && y < 7) || (x < 7 && y >= N - 7)
      );
      const inFinderEdge = inFinder && (
        // outer frame
        (x === 0 || x === 6 || y === 0 || y === 6 ||
         (x === N - 7 || x === N - 1 || y === 0 || y === 6) ||
         (x === 0 || x === 6 || y === N - 7 || y === N - 1))
      );
      const inFinderCenter = (
        (x >= 2 && x <= 4 && y >= 2 && y <= 4) ||
        (x >= N - 5 && x <= N - 3 && y >= 2 && y <= 4) ||
        (x >= 2 && x <= 4 && y >= N - 5 && y <= N - 3)
      );
      let on;
      if (inFinder) {
        if (x === 0 || x === 6 || y === 0 || y === 6 ||
            (x === N - 7 && y < 7) || (x === N - 1 && y < 7) ||
            (y === 0 && x >= N - 7) || (y === 6 && x >= N - 7) ||
            (x === 0 && y >= N - 7) || (x === 6 && y >= N - 7) ||
            (y === N - 7 && x < 7) || (y === N - 1 && x < 7)) {
          on = true;
        } else if (inFinderCenter) {
          on = true;
        } else {
          on = false;
        }
      } else {
        on = rnd() > 0.5;
      }
      if (on) cells.push(<rect key={`${x}-${y}`} x={x * cell} y={y * cell} width={cell} height={cell} fill={dark}/>);
    }
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: 'block' }}>
      {light !== 'transparent' && <rect width={size} height={size} fill={light}/>}
      {cells}
    </svg>
  );
}

// Smooth interpolation between target values — used by the Order entry
// so that user keypresses cause digits to roll instead of snapping instantly.
function useSmoothNumber(target, duration = 220) {
  const [val, setVal] = React.useState(target);
  React.useEffect(() => {
    let raf;
    const start = performance.now();
    const from = val;
    const ease = (t) => 1 - Math.pow(1 - t, 3);
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const v = from + (target - from) * ease(t);
      setVal(v);
      if (t < 1) raf = requestAnimationFrame(tick);
      else setVal(target);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [target, duration]);
  return val;
}

  const fracDisplay = fracPart === null ? '.00' : (fracPart === '' ? '.' : `.${fracPart}`);

// Reusable card for STO sections
function SecCard({ title, children }) {

function SecStat({ label, value, color, align = 'left' }) {
  return (
    <div style={{ textAlign: align }}>

      }}>{value}</div>
    </div>

}

// Yield curve chart — like the balance chart but yield-axis, with maturity buckets.
function YieldCurveChart({ series, baseline, lineColor, buckets, scrubIndex, onScrubChange }) {
  const W = 350, H = 130;
  const padTop = 24, padBot = 6;
  const chartH = H - padTop - padBot;
  const allVals = [...series, baseline];
  const minV = Math.min(...allVals);
  const maxV = Math.max(...allVals);
  const valRange = (maxV - minV) || 1;
  const padPx = valRange * 0.18;
  const yMin = minV - padPx;
  const yMax = maxV + padPx;
  const yRange = yMax - yMin;
  const xOf = (i) => (i / (series.length - 1)) * (W - 14);
  const yOf = (v) => padTop + chartH - ((v - yMin) / yRange) * chartH;
  const pathD = series.map((v, i) => `${i === 0 ? 'M' : 'L'}${xOf(i).toFixed(1)} ${yOf(v).toFixed(1)}`).join(' ');
  const baselineY = yOf(baseline);
  const endX = xOf(series.length - 1);
  const endY = yOf(series[series.length - 1]);
  const scrubbing = scrubIndex !== null;
  const sX = scrubbing ? xOf(scrubIndex) : 0;
  const sY = scrubbing ? yOf(series[scrubIndex]) : 0;

  const svgRef = React.useRef(null);
  const dragging = React.useRef(false);
  const updateFromX = (clientX) => {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
    const idx = Math.round((x / Math.max(1, rect.width)) * (series.length - 1));
    onScrubChange(Math.max(0, Math.min(series.length - 1, idx)));
  };
  const handlers = {
    onPointerDown: (e) => {
      try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
      dragging.current = true;
      updateFromX(e.clientX);
      e.preventDefault();
    },
    onPointerMove: (e) => { if (dragging.current) updateFromX(e.clientX); },
    onPointerUp: () => { dragging.current = false; onScrubChange(null); },
    onPointerCancel: () => { dragging.current = false; onScrubChange(null); },
    onPointerLeave: () => { if (dragging.current) { dragging.current = false; onScrubChange(null); } },
  };
  return (
    <div>
      <div style={{ padding: '0 22px' }}>
        <svg
          ref={svgRef}
          width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
          {...handlers}
          style={{ display: 'block', touchAction: 'none', cursor: 'crosshair', userSelect: 'none', overflow: 'visible' }}
        >
          <line x1="0" y1={baselineY} x2={W} y2={baselineY}
            stroke={ALW.textDim} strokeDasharray="2 5" strokeOpacity="0.45" strokeWidth="1"/>
          <path d={pathD} stroke={lineColor} strokeWidth="2" fill="none"
            strokeLinejoin="round" strokeLinecap="round"
            style={{ transition: 'stroke 240ms ease' }}/>
          {!scrubbing && (
            <g>
              <circle cx={endX} cy={endY} r="9" fill={lineColor} opacity="0.4">
                <animate attributeName="r" values="3;14" dur="1.6s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.5;0" dur="1.6s" repeatCount="indefinite"/>
              </circle>
              <circle cx={endX} cy={endY} r="3.5" fill={lineColor}/>
            </g>
          )}
          {scrubbing && (
            <g>
              <line x1={sX} y1={padTop - 6} x2={sX} y2={padTop + chartH + 2}
                stroke={ALW.text} strokeWidth="1" strokeOpacity="0.45"/>
              <circle cx={sX} cy={sY} r="6" fill={ALW.bg} stroke={lineColor} strokeWidth="2.5"/>
            </g>
          )}
        </svg>
      </div>
      <div style={{
        display: 'flex', justifyContent: 'space-between',
        padding: '6px 30px 0',
        fontFamily: 'Geist Mono, monospace', fontSize: 9.5, color: ALW.textMute,
        letterSpacing: 0.6, fontWeight: 600,
      }}>
        {buckets.map((b) => <span key={b}>{b}</span>)}
      </div>
    </div>
  );
}

<script type="text/babel" data-presets="react">
// Alpexa Suisse — Trade / Markets screen.
// Discovery-oriented. Search + category tabs + top movers + full market list.

function AlpexaDiscoverW() {

        kind: 'security', sym: s.sym, name: s.name, price: s.price, chg: 0,

      }));
    } else if (tab === 'watch') {

        price: a.price, chg: a.chg, seed: a.seed, stable: a.stable,

        price: m.price, chg: m.chg, seed: m.seed, stable: m.stable,

    } else {

          price: m.price, chg: m.chg, seed: m.seed, stable: m.stable,
        })),
        ...PORTFOLIO.securities.map((s) => ({
          kind: 'security', sym: s.sym, name: s.name, price: s.price, chg: 0,
          secondary: `${s.apy.toFixed(1)}% APY`, seed: s.seed,
        })),

              {movers.map((m) => (
                <a key={m.sym} href={`Coin Detail.html?sym=${m.sym}`} style={{
                  flexShrink: 0, width: 140,

                    {m.price < 10 ? `$${m.price.toFixed(4)}` : fmtUsd(m.price)}
                  </div>

              ))}

          </div>

        {/* Markets list */}
        <div style={{ marginTop: 22, padding: '0 22px' }}>
          <div style={{
            display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',

            </div>

          {rows.length === 0 ? (

                  fontSize: 10.5, marginTop: 2,

<!-- 7) Coin Detail (AlpexaCoinDetailW) -->
<script type="text/babel" data-presets="react">
// Alpexa Suisse — Coin Detail (drill-in from Dashboard tap).
// Reuses the heavy machinery from screens-alpexa-white.jsx
// (LiveBalanceChart, useLiveTick, Odometer, useTickDirection, etc.).

function AlpexaCoinDetailW({ symbol = 'BTC', simple = false }) {
  const W = 390, H = 844;
  const asset = PORTFOLIO.assets.find((a) => a.sym === symbol);
  if (!asset) return null;

  // Local alerts state — seeded from PORTFOLIO, mutated via the +New flow.
  const [alerts, setAlerts] = React.useState(asset.alerts || []);
  const [showNewAlert, setShowNewAlert] = React.useState(false);
  const [newAlertTarget, setNewAlertTarget] = React.useState('');
  const [newAlertDirection, setNewAlertDirection] = React.useState('above');
  const [newAlertNote, setNewAlertNote] = React.useState('');

  // Remember the last viewed symbol so the Trade tab returns to it.
  React.useEffect(() => {
    try { localStorage.setItem('alpexa.lastSymbol', asset.sym); } catch (_) {}
  }, [asset.sym]);

  // Live ticking price (the asset's market price, not the user's mine value)
  const livePrice = useLiveTick(asset.price, {
    tickPeriod: 2000,
    volatility: Math.max(0.5, asset.price * 0.0005),
  });
  const direction = useTickDirection(livePrice);

  // Range + scrubbing — same architecture as the Dashboard balance chart.
  const [range, setRange] = React.useState('1D');
  const [scrubIndex, setScrubIndex] = React.useState(null);
  const isScrubbing = scrubIndex !== null;

  const seriesOpen = React.useMemo(() => {
    if (range === '1D') return asset.price / (1 + asset.chg / 100);
    return asset.price * RANGE_OPEN_MULT[range];
  }, [range, asset.price, asset.chg]);

  const baseHistory = React.useMemo(
    () => generateIntraday(seriesOpen, asset.price, 80, (RANGE_SEEDS[range] || 1) ^ asset.seed),
    [seriesOpen, range, asset.price, asset.seed],
  );
  const chartSeries = React.useMemo(
    () => [...baseHistory.slice(0, -1), livePrice],
    [baseHistory, livePrice],
  );
  const displayPrice = isScrubbing ? chartSeries[scrubIndex] : livePrice;
  const periodChange = displayPrice - seriesOpen;
  const periodPct = (periodChange / seriesOpen) * 100;
  const isUp = periodChange >= 0;
  const accent = isUp ? ALW.green : ALW.red;
  const flashColor = isScrubbing
    ? ALW.text
    : direction === 'up' ? ALW.green : direction === 'down' ? ALW.red : ALW.text;
  const periodCaption = isScrubbing
    ? getScrubTimeLabel(range, scrubIndex, chartSeries.length)
    : RANGE_LABEL[range];

  // Live-ticking bid/ask spread (small wiggle around the base spread)
  const baseSpreadBps = asset.spreadBps || 0.4;
  const liveSpreadBps = useLiveTick(baseSpreadBps, {
    tickPeriod: 900,
    volatility: Math.max(0.08, baseSpreadBps * 0.18),
    mountDuration: 600,
  });
  const liveBid = livePrice * (1 - liveSpreadBps / 20000);
  const liveAsk = livePrice * (1 + liveSpreadBps / 20000);
  const [spreadOpen, setSpreadOpen] = React.useState(false);
  const marketValue = livePrice * asset.qty;
  const unrealized = marketValue - asset.invested;
  const returnPct = (unrealized / asset.invested) * 100;
  const pctOfPortfolio = (marketValue / PORTFOLIO.balance) * 100;
  const isProfitable = unrealized >= 0;
  const posColor = isProfitable ? ALW.green : ALW.red;

  // Series stats for OHL
  const ohlOpen = chartSeries[0];
  const ohlHigh = Math.max(...chartSeries);
  const ohlLow  = Math.min(...chartSeries);

  return (
    <Phone width={W} height={H} bg={ALW.bg} chrome={false}>
      <div style={{ flex: 1, overflowY: 'auto', WebkitOverflowScrolling: 'touch' }} className="alpexa-hide-scrollbar">
      <div style={{ height: 16 }}/>

      {/* Header — back, coin name, share */}
      <div style={{ padding: '12px 18px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <a href="Dashboard.html" style={{
          width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center',
          textDecoration: 'none', cursor: 'pointer',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={ALW.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 6 L9 12 L15 18"/>
          </svg>
        </a>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <div style={{ width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke={ALW.text} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
              <path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.7 21a2 2 0 0 1-3.4 0"/>
            </svg>
          </div>
          <div style={{ width: 26, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="4" height="18" viewBox="0 0 4 18">
              <circle cx="2" cy="2" r="1.6" fill={ALW.text}/>
              <circle cx="2" cy="9" r="1.6" fill={ALW.text}/>
              <circle cx="2" cy="16" r="1.6" fill={ALW.text}/>
            </svg>
          </div>
        </div>
      </div>

      {/* Data freshness strip — full detail only */}
      {!simple && <DataFreshnessB/>}

      {/* Hero: ticker > name > price > change — terminal style, mono-leaning */}
      <div style={{ padding: '14px 22px 0' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
          <div style={{
            fontSize: 13, fontWeight: 700, letterSpacing: 1.4,
            fontFamily: 'Geist Mono, monospace', textTransform: 'uppercase',
          }}>
            <span style={{ color: ALW.text }}>{asset.sym}</span>
            <span style={{ color: ALW.textMute, fontWeight: 500, margin: '0 6px' }}>/</span>
            <span style={{ color: ALW.textMute, fontWeight: 500 }}>USD</span>
          </div>
        </div>
        <div style={{
          fontSize: 42, fontWeight: 600, letterSpacing: -1.4, marginTop: 10, lineHeight: 1.02,
          color: flashColor,
          transition: 'color 260ms ease',
          fontFamily: 'Geist Mono, monospace',
        }}>
          <Odometer value={displayPrice} decimals={2}/>
        </div>
        <div className="alpexa-color-shift" style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 8, color: accent }}>
          <span style={{
            fontSize: 12, fontWeight: 600, fontFamily: 'Geist Mono, monospace', fontFeatureSettings: '"tnum"',
            display: 'flex', alignItems: 'center', gap: 5,
          }}>
            <svg width="9" height="9" viewBox="0 0 10 10" className="alpexa-color-shift">
              <path d={isUp ? "M5 1 L9 8 L1 8 Z" : "M5 9 L1 2 L9 2 Z"} fill={accent}/>
            </svg>
            {fmtUsd(Math.abs(periodChange))}
          </span>
          <span style={{ fontSize: 12, fontWeight: 600, fontFamily: 'Geist Mono, monospace', fontFeatureSettings: '"tnum"' }}>
            {fmtPct(periodPct)}
          </span>
        </div>
      </div>

      {/* Chart — full Robinhood-style with scrubbing, baseline, OHL */}
      <div style={{ marginTop: 14 }}>
        <LiveBalanceChart
          series={chartSeries}
          baseline={seriesOpen}
          lineColor={accent}
          range={range}
          onRangeChange={setRange}
          scrubIndex={scrubIndex}
          onScrubChange={setScrubIndex}
          height={240}
        />
      </div>

      {/* Stat strip — institutional terminal feel, label-above-value layout */}
      <div style={{
        margin: '14px 22px 0',
        padding: '12px 14px',
        background: ALW.bg,
        border: `1px solid ${ALW.line}`,
        display: 'grid',
        gridTemplateColumns: 'repeat(3, 1fr)',
        columnGap: 16, rowGap: 12,
      }}>
        {[
          ['Open',    fmtUsd(ohlOpen),                                                '#9A9A9A'],
          ['High',    fmtUsd(ohlHigh),                                                '#9A9A9A'],
          ['Low',     fmtUsd(ohlLow),                                                 '#9A9A9A'],
          ['Vol 24h', fmtCompact(asset.vol24h || 0),                                  '#6E6E6E'],
          ['VWAP',    fmtUsd((ohlOpen + ohlHigh + ohlLow + livePrice) / 4),           '#9A9A9A'],
          ['Spread',  `${liveSpreadBps.toFixed(2)} bps`,                              '#6E6E6E'],
        ].map(([k, v, c]) => (
          <div key={k} style={{ minWidth: 0 }}>
            <div style={{
              color: ALW.textMute, fontSize: 9, letterSpacing: 1, fontWeight: 700,
              fontFamily: 'Geist Mono, monospace', textTransform: 'uppercase',
              whiteSpace: 'nowrap',
            }}>{k}</div>
            <div style={{
              color: c, fontSize: 12, fontWeight: 600, marginTop: 3,
              fontFamily: 'Geist Mono, monospace', fontFeatureSettings: '"tnum"',
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            }}>{v}</div>
          </div>
        ))}
      </div>

      {/* My Position quick line — only when user holds this asset */}
      {asset.qty > 0 && (
        <div style={{
          margin: '12px 22px 0',
          padding: '12px 14px',
          background: ALW.bg,
          border: `1px solid ${ALW.line}`,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
        }}>
          <div>
            <div style={{
              color: ALW.textMute, fontSize: 10, letterSpacing: 1.4,
              fontFamily: 'Geist Mono, monospace', fontWeight: 700, textTransform: 'uppercase',
            }}>
              You own
            </div>
            <div style={{
              color: '#9A9A9A', fontSize: 13, fontWeight: 500, marginTop: 2,
              fontFamily: 'Geist Mono, monospace', fontFeatureSettings: '"tnum"',
            }}>
              {asset.qty.toFixed(4)} {asset.sym}
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{
              color: '#9A9A9A', fontSize: 14, fontWeight: 600,
              fontFamily: 'Geist Mono, monospace', fontFeatureSettings: '"tnum"',
            }}>
              {fmtUsd(marketValue)}
            </div>
            <div style={{
              color: isProfitable ? ALW.green : ALW.red,
              fontSize: 11, fontWeight: 500, marginTop: 2,
              fontFamily: 'Geist Mono, monospace', fontFeatureSettings: '"tnum"',
            }}>
              {isProfitable ? '+' : ''}{fmtUsd(unrealized)} ({isProfitable ? '+' : ''}{returnPct.toFixed(2)}%)
            </div>
          </div>
        </div>
      )}

      {/* — Your position card */}
      {!simple && (
      <div style={{
        margin: '20px 22px 0',
        padding: '14px 16px',
        background: ALW.panel,
        border: `1px solid ${ALW.line}`,
        borderRadius: 0,
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end',
          paddingBottom: 10, borderBottom: `1px solid ${ALW.line}`,
        }}>
          <div style={{
            color: ALW.textMute, fontSize: 10, letterSpacing: 1.4,
            fontFamily: 'Geist Mono, monospace', fontWeight: 700, textTransform: 'uppercase',
          }}>
            Your position
          </div>
          <div style={{
            color: ALW.textMute, fontSize: 10, letterSpacing: 1.2,
            fontFamily: 'Geist Mono, monospace', fontWeight: 600,
          }}>
            {pctOfPortfolio.toFixed(1)}% of portfolio
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', columnGap: 16, rowGap: 12, marginTop: 12 }}>
          <Stat label="Holdings" value={`${asset.qty.toFixed(4)} ${asset.sym}`}/>
          <Stat label="Market value" value={fmtUsd(marketValue)} align="right"/>
          <Stat label="Avg buy price" value={fmtUsd(asset.avgBuy)}/>
          <Stat label="Total invested" value={fmtUsd(asset.invested)} align="right"/>
          <Stat label="Unrealized P&L" value={`${isProfitable ? '+' : ''}${fmtUsd(unrealized)}`} color={posColor}/>
          <Stat label="Return" value={`${isProfitable ? '+' : ''}${returnPct.toFixed(2)}%`} color={posColor} align="right"/>
        </div>
        {/* Allocation bar */}
        <div style={{ marginTop: 14 }}>
          <div style={{ height: 4, background: ALW.line, borderRadius: 2, overflow: 'hidden' }}>
            <div style={{
              width: `${Math.min(100, pctOfPortfolio)}%`,
              height: '100%', background: ALW.green,
            }}/>
          </div>
        </div>
      </div>
      )}

      {/* — Market liquidity card — */}
      {!simple && (
      <div style={{
        margin: '16px 22px 0',
        padding: '14px 16px',
        background: ALW.panel,
        border: `1px solid ${ALW.line}`,
        borderRadius: 0,
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end',
          paddingBottom: 10, borderBottom: `1px solid ${ALW.line}`,
        }}>
          <div style={{
            color: ALW.textMute, fontSize: 10, letterSpacing: 1.4,
            fontFamily: 'Geist Mono, monospace', fontWeight: 700, textTransform: 'uppercase',
          }}>
            Market liquidity
          </div>
          {(() => {
            // Decide exit-quality indicator
            const ratio = marketValue / (asset.depth1pct || 1);
            const easy = ratio < 0.05;
            const moderate = ratio >= 0.05 && ratio < 0.25;
            const slip = ratio >= 0.25;
            const label = easy ? 'Exit · Easy' : moderate ? 'Exit · Moderate' : 'Exit · May slip';
            const c = easy ? ALW.green : moderate ? '#B8860B' : ALW.red;
            return (
              <div style={{
                color: c, fontSize: 10, fontWeight: 600,
                fontFamily: 'Geist Mono, monospace', letterSpacing: 0.8,
                textTransform: 'uppercase',
                display: 'flex', alignItems: 'center', gap: 5,
              }}>
                <span style={{ width: 5, height: 5, borderRadius: 3, background: c }}/>
                {label}
              </div>
            );
          })()}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', columnGap: 16, rowGap: 12, marginTop: 12 }}>
          <Stat label="24h volume" value={fmtCompact(asset.vol24h)}/>

// Data freshness — small pulsing dot + "Xs ago" — designed to sit inside
// the OHL bar so the freshness signal lives with the data it qualifies.
function FreshnessDot() {
  const [now, setNow] = React.useState(() => new Date());
  const lastUpdate = React.useRef(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  React.useEffect(() => {
    const id = setInterval(() => {
      lastUpdate.current = new Date();
      setNow(new Date());
    }, 3400);
    return () => clearInterval(id);
  }, []);
  const ageSec = Math.max(0, Math.floor((now - lastUpdate.current) / 1000));
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 5,
      fontFamily: 'Geist Mono, monospace', fontSize: 9.5,
      color: ALW.textMute, textTransform: 'uppercase', fontWeight: 600, letterSpacing: 0.6,
      flexShrink: 0,
    }}>
      <span
        className="alpexa-pulse-dot"
        style={{
          width: 5, height: 5, borderRadius: 3,
          background: ageSec < 5 ? ALW.green : ageSec < 30 ? '#B8860B' : ALW.red,
        }}
      />
      {ageSec}s
    </div>
  );
}

// Data freshness strip — shows "last updated Xs ago · TZ" so a trader can

  }, []);
  const ageSec = Math.max(0, Math.floor((now - lastUpdate.current) / 1000));

        }}>{String(i+1).padStart(2,'0')} / {String(total).padStart(2,'0')}</div>
      </header>

      {/* Stage */}
      <main style={{
        flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
        gap: 48, padding: '40px 32px',
      }}>
        <ArrowBtn dir="prev" onClick={prev}/>

        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 24 }}>
          {/* Label above */}
          <div style={{ textAlign: 'center' }}>
            <div style={{
              fontFamily: 'Geist Mono, monospace', fontSize: 10.5, fontWeight: 700,
              letterSpacing: 1.6, color: TOKENS.muted, textTransform: 'uppercase', marginBottom: 6,
            }}>{cur.sub || ''}</div>
            <div style={{
              fontFamily: 'Inter, system-ui', fontSize: 22, fontWeight: 500,
              letterSpacing: -0.4, color: TOKENS.text,
            }}>{cur.label}</div>
          </div>

          {/* Phone — click to advance */}
          <div
            onClick={next}
            style={{
              borderRadius: 54, boxShadow: TOKENS.shadow, overflow: 'hidden',
              cursor: 'pointer', transition: 'transform 200ms ease',
            }}
            onMouseDown={(e) => (e.currentTarget.style.transform = 'scale(0.98)')}
            onMouseUp={(e) => (e.currentTarget.style.transform = '')}
            onMouseLeave={(e) => (e.currentTarget.style.transform = '')}
            title="Click to go to next screen (→ key works too)"
          >
            {cur.render()}
          </div>

          {/* Hint */}
          <div style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 10, letterSpacing: 1.4,
            color: TOKENS.muted, textTransform: 'uppercase',
          }}>Click phone · ← → · 1–{total}</div>
        </div>

        <ArrowBtn dir="next" onClick={next}/>
      </main>

      {/* Dots */}
      <footer style={{
        padding: '20px 32px 36px', display: 'flex', justifyContent: 'center',
        gap: 8, borderTop: `1px solid ${TOKENS.rule}`,
      }}>
        {SCREENS.map((s, idx) => (
          <button
            key={s.id}
            onClick={() => setI(idx)}
            aria-label={s.label}
            style={{
              width: idx === i ? 28 : 8, height: 8, borderRadius: 4, border: 'none',
              background: idx === i ? TOKENS.text : 'rgba(0,0,0,0.18)',
              cursor: 'pointer', padding: 0, transition: 'all 220ms ease',
            }}
          />
        ))}
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

window.addEventListener('load', () => {
  const b = document.getElementById('boot');
  if (b) { b.classList.add('hide'); setTimeout(() => b.remove(), 300); }
});
</script>
</body>
</html>
