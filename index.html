<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="바카라 분석기">
<meta name="theme-color" content="#eef1f6">
<title>바카라 데이터 분석기</title>
<style>
  :root{
    --line:#dde3ec; --txt:#1b2433; --mut:#64748b;
    --banker:#d6453c; --player:#2f6fd6; --tie:#2f9e6a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#eef1f6;color:var(--txt);
    font-family:-apple-system,'Segoe UI',Roboto,'Malgun Gothic',sans-serif;
    line-height:1.5;padding:14px;padding-bottom:40px;}
  h1{font-size:20px;margin:0 0 2px;color:#0f172a}
  h2{font-size:16px;margin:0 0 12px;color:#0f172a}
  .sub{color:var(--mut);font-size:12.5px;margin-bottom:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;
    padding:15px;margin-bottom:13px;box-shadow:0 1px 3px rgba(16,24,40,.05)}
  textarea{width:100%;min-height:60px;background:#f8fafc;border:1px solid var(--line);
    color:var(--txt);border-radius:10px;padding:11px;font-size:16px;letter-spacing:2px;resize:vertical}
  .bprow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:11px}
  .bprow button{height:52px;font-size:16px}
  .btns2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  button{cursor:pointer;border:none;border-radius:11px;padding:13px 10px;font-size:15px;
    font-weight:600;color:#fff;background:#64748b;transition:.1s}
  button:active{transform:scale(.97)}
  .b-bank{background:var(--banker)} .b-play{background:var(--player)} .b-tie{background:var(--tie)}
  .b-del{background:#64748b} .b-clr{background:#b15b5b}
  .fld{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--mut);margin-bottom:11px}
  .fld input,.fld select{background:#f8fafc;border:1px solid var(--line);color:var(--txt);
    border-radius:9px;padding:11px;font-size:16px;width:100%}
  .stats{font-size:14px;color:var(--mut);background:#f8fafc;border:1px solid var(--line);
    border-radius:10px;padding:11px 13px;line-height:1.8}
  .stats b{color:var(--txt)}
  .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -3px}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:300px}
  th,td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--mut);font-weight:600;font-size:11.5px}
  .pat{font-family:monospace;letter-spacing:1px;font-weight:700}
  .pill{display:inline-block;min-width:20px;padding:2px 7px;border-radius:6px;font-weight:700;font-size:12px}
  .pB{background:#fbe3e0;color:#b3372f} .pP{background:#e2edfb;color:#1f5bb0} .pT{background:#dcf2e7;color:#1f7a52}
  .seqview{margin-top:11px;line-height:2}
  .seqview span{display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;
    border-radius:7px;margin:2px;font-weight:700;font-size:13px;color:#fff}
  .sB{background:var(--banker)} .sP{background:var(--player)} .sT{background:var(--tie)}
  .muted{color:var(--mut);font-size:12px}
  .note{font-size:11px;color:#9a6a2c;margin-top:9px}
  .empty{color:var(--mut);font-style:italic;padding:8px 0;font-size:13px}
  .foot{color:var(--mut);font-size:11.5px;text-align:center;margin-top:4px;padding:0 6px}
</style>
</head>
<body>
  <h1>바카라 데이터 분석기</h1>
  <div class="sub">입력한 과거 데이터만 요약 · 미래 예측 없음</div>

  <div class="card">
    <h2>1. 데이터 입력</h2>
    <textarea id="seq" inputmode="latin" placeholder="B P B B T P ... (B=뱅커 P=플레이어 T=타이)"></textarea>
    <div class="bprow">
      <button class="b-bank" onclick="add('B')">＋뱅커</button>
      <button class="b-play" onclick="add('P')">＋플레이어</button>
      <button class="b-tie" onclick="add('T')">＋타이</button>
    </div>
    <div class="btns2">
      <button class="b-del" onclick="delLast()">↶ 마지막 삭제</button>
      <button class="b-clr" onclick="clearAll()">전체 지우기</button>
    </div>
    <div id="seqview" class="seqview"></div>
  </div>

  <div class="card">
    <h2>2. 빈도 · 연속 통계</h2>
    <div id="stats" class="stats"></div>
  </div>

  <div class="card">
    <h2>3. 패턴 분석</h2>
    <div class="fld">직전 몇 핸드를 패턴으로 볼지
      <select id="depth" onchange="render()">
        <option value="1">직전 1핸드</option>
        <option value="2" selected>직전 2핸드</option>
        <option value="3">직전 3핸드</option>
        <option value="4">직전 4핸드</option>
      </select>
    </div>
    <div class="scroll"><div id="pattern"></div></div>
    <div class="note">"발생"은 그 패턴이 데이터에서 나온 횟수, 나머지는 그 다음에 실제로 나온 결과입니다. 다음 핸드 확률이 아닙니다.</div>
  </div>

  <div class="foot">도박은 장기적으로 손실(하우스 엣지 −1.06%)로 수렴합니다. 잃어도 되는 금액만, 정해둔 손절선을 지키세요.</div>

<script>
let data=[];
function parse(s){return (s.toUpperCase().match(/[BPT]/g))||[];}
function sync(){document.getElementById('seq').value=data.join(' ');drawSeq();stats();render();}
function add(x){data.push(x);sync();}
function delLast(){data.pop();sync();}
function clearAll(){data=[];sync();}
document.getElementById('seq').addEventListener('input',e=>{data=parse(e.target.value);drawSeq();stats();render();});

function drawSeq(){
  const v=document.getElementById('seqview');
  if(!data.length){v.innerHTML='<span class="muted" style="background:none;width:auto;color:var(--mut)">아직 데이터가 없습니다</span>';return;}
  v.innerHTML=data.map((x,i)=>`<span class="s${x}" title="${i+1}">${x}</span>`).join('');
}
function longestRun(sym){let max=0,cur=0;for(const x of data){if(x===sym){cur++;if(cur>max)max=cur;}else cur=0;}return max;}
function stats(){
  const el=document.getElementById('stats'),n=data.length,c={B:0,P:0,T:0};
  data.forEach(x=>c[x]++);
  const pct=s=>n?(c[s]/n*100).toFixed(1)+'%':'0%';
  el.innerHTML=`총 <b>${n}</b> · <b style="color:var(--banker)">B ${c.B}</b> (${pct('B')}) · `+
    `<b style="color:var(--player)">P ${c.P}</b> (${pct('P')}) · `+
    `<b style="color:var(--tie)">T ${c.T}</b> (${pct('T')}) · `+
    `최장연속 ${longestRun('B')}/${longestRun('P')}/${longestRun('T')}`;
}
function render(){
  const k=+document.getElementById('depth').value,out=document.getElementById('pattern');
  if(data.length<=k){out.innerHTML='<div class="empty">패턴 집계에는 최소 '+(k+1)+'핸드가 필요합니다.</div>';return;}
  const map={};
  for(let i=k;i<data.length;i++){const pat=data.slice(i-k,i).join('-'),nxt=data[i];if(!map[pat])map[pat]={B:0,P:0,T:0,tot:0};map[pat][nxt]++;map[pat].tot++;}
  const keys=Object.keys(map).sort((a,b)=>map[b].tot-map[a].tot);
  const rows=keys.map(p=>{const m=map[p],cell=s=>m[s]?`<span class="pill p${s}">${m[s]}</span>`:`<span class="muted">0</span>`;
    return `<tr><td class="pat">${p}</td><td>${m.tot}</td><td>${cell('B')}</td><td>${cell('P')}</td><td>${cell('T')}</td></tr>`;}).join('');
  out.innerHTML=`<table><tr><th>직전 ${k}핸드</th><th>발생</th><th>다음 B</th><th>다음 P</th><th>다음 T</th></tr>${rows}</table>`;
}
clearAll();
</script>
</body>
</html>
