<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Alpexa Suisse</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0A0F1C;--card:#121a2c;--line:#1e2a42;--blue:#2D6CDF;--blue2:#1d4ed8;--txt:#fff;--dim:#9aa7bd}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
    display:flex;justify-content:center;min-height:100dvh}
  .wrap{width:100%;max-width:440px;min-height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
  /* hero */
  .hero{background:linear-gradient(180deg,var(--blue) 0%,var(--blue2) 38%,var(--bg) 100%);
    padding:calc(env(safe-area-inset-top,18px) + 26px) 26px 70px;position:relative}
  .brand{font-size:14px;font-weight:800;letter-spacing:2px;color:#fff;opacity:.95}
  .h1{margin-top:62px;font-size:clamp(34px,9vw,42px);font-weight:800;line-height:1.08;letter-spacing:-1px}
  .sub{margin-top:14px;font-size:14.5px;color:#dbe6fb;line-height:1.5}
  /* body */
  .body{flex:1;padding:0 22px 22px;display:flex;flex-direction:column;margin-top:-34px}
  .grid{display:flex;gap:12px;margin-bottom:12px}
  .card{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 16px 18px}
  .card.full{margin-bottom:0;display:flex;align-items:center;gap:14px}
  .ct{font-size:15px;font-weight:700;margin-top:0}
  .cs{font-size:11.5px;color:var(--dim);margin-top:3px}
  .spacer{flex:1;min-height:24px}
  .cta{display:block;width:100%;text-align:center;padding:16px 0;border-radius:999px;font-size:16px;font-weight:800;
    background:#fff;color:var(--bg);text-decoration:none;border:none;cursor:pointer}
  .login{display:block;text-align:center;margin-top:16px;margin-bottom:8px;font-size:14px;font-weight:600;color:var(--dim);text-decoration:none}
  .login b{color:#cfe0ff}
  .foot{text-align:center;font-size:10.5px;color:#46566f;margin-top:14px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap" id="wrap" style="visibility:hidden">
  <div class="hero">
    <div class="brand">ALPEXA SUISSE</div>
    <div class="h1">Trade it<br>all. One app.</div>
    <div class="sub">FX · Crypto · Sports — real-time markets, bank-grade security.</div>
  </div>
  <div class="body">
    <div class="grid">
      <div class="card"><div class="ct">FX &amp; Stocks</div><div class="cs">Live charts, real prices</div></div>
      <div class="card"><div class="ct">Crypto</div><div class="cs">Real spot markets</div></div>
    </div>
    <div class="card full"><div><div class="ct">Sports — live betting</div><div class="cs">Real games, instant cash-out</div></div></div>
    <div class="spacer"></div>
    <a class="cta" href="signup.html">Get Started &nbsp;→</a>
    <a class="login" href="login.html?switch=1">Already have an account? <b>Log in</b></a>
    <div class="foot">© Alpexa Suisse · Markets involve risk.</div>
  </div>
</div>
<script>
  // Returning, signed-in users skip the intro and go straight to their app
  // (login.html auto-passes a valid session). Add ?intro=1 to force the landing.
  try{
    var force=/[?&]intro=1/.test(location.search);
    var me=JSON.parse(localStorage.getItem('alpexa.me')||'null');
    if(!force && me && me.authId){ location.replace('login.html'); }
    else { document.getElementById('wrap').style.visibility='visible'; }
  }catch(e){ document.getElementById('wrap').style.visibility='visible'; }
</script>
</body>
</html>
