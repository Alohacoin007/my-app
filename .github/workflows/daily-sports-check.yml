# Alpexa — daily sports + crypto feed & render health check.
# Runs every morning (08:17 Las Vegas / 15:17 UTC) so feed/odds/render problems are
# caught by US, not by a customer. If anything is wrong the job FAILS → GitHub emails
# the repo owner. Also runnable on demand (Actions → this workflow → Run workflow).
#
# NOTE: GitHub only fires `schedule` on the repository's DEFAULT branch. This file lives
# on main (the default) for that reason, but checks out the serving branch to run the
# actual app + tests. `workflow_dispatch` always works on any branch.
name: daily sports check

on:
  schedule:
    - cron: "17 15 * * *"   # 15:17 UTC = 08:17 PDT (off-minute on purpose)
  workflow_dispatch: {}       # manual "run now"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # This workflow file lives on the DEFAULT branch (so `schedule` fires), but the app
      # + tests live on the serving branch — check that out and run against it.
      - uses: actions/checkout@v4
        with:
          ref: claude/wizardly-ritchie-lsRnz
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install parser (for verify's JSX parse arm)
        run: npm i @babel/parser --no-save || true
      - name: Verify gate — render crash-isolation + unit tests + defect scan
        run: node tests/verify.js
      - name: Live sports feed health — coverage + odds (real/placeholder/missing) + TBD
        run: node tests/sports-feed-check.js
      - name: Live crypto/prices feed health — frozen feeds + ALPXS + sanity
        run: node tests/crypto-feed-check.js
