<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Alpexa · Backup</title>
<meta name="theme-color" content="#ffffff">
<style>
  :root{--acc:#1F2A37;--pos:#1e8e3e;--neg:#d93025;--dim:#5f6b7a;--line:#e7ebf0}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,system-ui,'Roboto',sans-serif;background:#F7F8FA;color:#1c2430;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:400px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:22px 20px}
  h1{font-size:18px;font-weight:800;margin-bottom:4px}
  .sub{font-size:12px;color:var(--dim);margin-bottom:18px}
  .btn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:5px;padding:14px;font:700 14px system-ui;cursor:pointer}
  .btn:disabled{opacity:.5;cursor:wait}
  .row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f3f6;font-size:13px}
  .row:last-child{border-bottom:none}
  .ok{color:var(--pos);font-weight:700}.err{color:var(--neg);font-weight:700}.dim{color:var(--dim)}
  #log{margin-top:14px;max-height:280px;overflow:auto}
  .status{margin-top:14px;font-weight:700;font-size:13.5px;text-align:center}
  .lock{position:fixed;inset:0;z-index:50;background:#0F1B2D;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px}
  .lock input{width:170px;text-align:center;font-size:22px;letter-spacing:8px;padding:12px;border-radius:8px;border:none;outline:none;background:#1A2740;color:#fff}
  .lock button{background:#1565C0;color:#fff;border:none;border-radius:8px;padding:12px 30px;font:700 15px system-ui;cursor:pointer}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="card">
  <h1>🗄️ Alpexa Backup</h1>
  <div class="sub">Downloads a full copy of all customer, account &amp; transaction data as one JSON file. Keep it somewhere safe.</div>
  <button class="btn" id="go">Download full backup</button>
  <div class="status" id="status"></div>
  <div id="log"></div>
</div>
<script>
  // PIN gate (same as the manager) so this isn't open to anyone with the link.
  (function(){ var PIN='0070'; if(sessionStorage.getItem('alpexa.mgrUnlocked')==='1') return;
    var ov=document.createElement('div'); ov.className='lock';
    ov.innerHTML='<div style="font:800 19px system-ui">Alpexa Backup</div><div style="font:600 12px system-ui;opacity:.8;letter-spacing:.5px;text-transform:uppercase">Enter PIN</div>'+
      '<input id="bp" type="password" inputmode="numeric" maxlength="8" placeholder="••••"><button id="bg">Unlock</button><div id="be" style="color:#ff8a8a;font:600 12px system-ui;height:14px"></div>';
    document.body.appendChild(ov);
    function go(){ if(document.getElementById('bp').value===PIN){ try{sessionStorage.setItem('alpexa.mgrUnlocked','1');}catch(e){} ov.remove(); } else { document.getElementById('be').textContent='Wrong PIN'; document.getElementById('bp').value=''; } }
    document.getElementById('bg').onclick=go; document.getElementById('bp').onkeydown=function(e){ if(e.key==='Enter')go(); };
    setTimeout(function(){var el=document.getElementById('bp'); if(el)el.focus();},100);
  })();

  var db=window.supabase.createClient('https://grxnbgtfnaayeluenvqh.supabase.co','sb_publishable_ow1DihBdAAvNtnb1H0Kojw_7vbeMKFu');
  var TABLES=['players','accounts','requests','payments','positions','commands','logs','hedges','settlements','agents','agent_links','agent_payouts','pricing','pricing_marks'];
  var logEl=document.getElementById('log'), statusEl=document.getElementById('status');
  function line(name,txt,cls){ var d=document.createElement('div'); d.className='row'; d.innerHTML='<span>'+name+'</span><span class="'+(cls||'dim')+'">'+txt+'</span>'; logEl.appendChild(d); return d; }

  async function pullAll(table){
    var out=[], from=0, page=1000;
    while(true){
      var r=await db.from(table).select('*').range(from,from+page-1);
      if(r.error) throw r.error;
      out=out.concat(r.data||[]);
      if(!r.data || r.data.length<page) break;
      from+=page;
    }
    return out;
  }

  document.getElementById('go').onclick=async function(){
    var btn=this; btn.disabled=true; logEl.innerHTML=''; statusEl.textContent='Backing up…';
    var backup={ _meta:{ app:'Alpexa', taken_at:new Date().toISOString(), tables:{} } };
    var total=0, failed=0;
    for(var i=0;i<TABLES.length;i++){
      var t=TABLES[i]; var row=line(t,'…');
      try{ var rows=await pullAll(t); backup[t]=rows; backup._meta.tables[t]=rows.length; total+=rows.length;
        row.querySelector('span:last-child').textContent=rows.length+' rows'; row.querySelector('span:last-child').className='ok';
      }catch(e){ failed++; backup[t]=[]; backup._meta.tables[t]='ERROR';
        row.querySelector('span:last-child').textContent='skipped'; row.querySelector('span:last-child').className='err';
      }
    }
    // Trigger download
    var d=new Date(), pad=function(n){return String(n).padStart(2,'0');};
    var fname='alpexa-backup-'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'-'+pad(d.getHours())+pad(d.getMinutes())+'.json';
    var blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob), a=document.createElement('a'); a.href=url; a.download=fname; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    statusEl.innerHTML='<span class="ok">✓ '+total.toLocaleString()+' rows saved → '+fname+'</span>'+(failed?(' <span class="err">('+failed+' table(s) skipped)</span>'):'');
    btn.disabled=false;
  };
</script>
</body>
</html>
