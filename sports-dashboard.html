<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>ALPEXA Sports — Dashboard</title>
<link rel="stylesheet" href="legend-ui.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="alpexa-sync.js?v=16"></script>
<!-- ══════════════════════════════════════════════════════════════════════════
  ALPEXA 스포츠 대시보드 v1 (2026-07-14) — 데스크톱 전용, 레전드 디자인 언어.
  · 디자인 = 레전드-디자인-스펙.md §1~5 (토큰은 legend-ui.css --lgd-*)
  · 문법   = 스포츠-앱-문법-스펙.md (매트릭스/잠금/1X2/sel 계약 — 앱과 동일)
  · 게이트 = tests/sports-dashboard-fidelity.test.js (금지 8종 + 위젯별 존재 핀)
  v1 범위: 읽기 전용 — live_games 실데이터 4위젯 (발란스는 세션 없으면 ···).
  베팅/캐시아웃(돈 경로)은 다음 단계에서 place_bet/cash_out RPC 단일 경로로만.
═══════════════════════════════════════════════════════════════════════════ -->
<style>
html,body{height:100%; margin:0; background:var(--lgd-bg,#0B0D0E)}
body{color:var(--lgd-ink,#F5F6F7); overflow:hidden}
.tnum{font-variant-numeric:tabular-nums}
/* 스크롤바 전면 숨김 (2026-07-14 사용자 결정) — 스크롤 동작은 유지, 바만 제거 */
*{scrollbar-width:none; -ms-overflow-style:none}
*::-webkit-scrollbar{width:0; height:0; display:none}

/* ══ 헤더 (스펙 §2: h48 · 탭 필 · 중앙 상태 필 · 우측 액션) ══ */
.hdr{display:flex; align-items:center; gap:8px; height:var(--lgd-header-h); padding:0 14px;
  background:#000; border-bottom:1px solid var(--lgd-hair)}
.mark{width:26px; height:26px; display:flex; align-items:center; justify-content:center;
  color:#fff; font-family:'Arial Black',Arial,sans-serif; font-weight:900; font-size:19px; letter-spacing:-1px}
.htab{display:flex; align-items:center; gap:8px; background:var(--lgd-pill); border-radius:var(--lgd-r-btn);
  height:32px; padding:0 14px 0 12px; font-size:var(--lgd-fs-tab); font-weight:600; cursor:pointer; transition:background .12s}
.htab:hover{background:var(--lgd-pill-hi)}
.htab.fxtab{cursor:pointer}
/* 앱 전환 칩 (2026-07-17 사장님 지시) — 비활성 탭 톤, 클릭=같은 탭 이동(세션 유지) */
.htab.swtab{background:none; color:var(--lgd-dim); cursor:pointer}
.htab.swtab:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
/* 라이트 테마 (2026-07-17 사장님 지시 — 크립토 대시보드와 동일 토큰 오버라이드.
   legend-ui.css 무변경, 의미색(업/다운)은 유지) */
body.light{ --lgd-bg:#F4F5F7; --lgd-surface:#FFFFFF; --lgd-surface2:#F0F2F5;
  --lgd-pill:#EEF0F3; --lgd-pill-hi:#E4E7EB; --lgd-hair:rgba(15,23,40,.10);
  --lgd-ink:#0E1726; --lgd-dim:#6B7480; }
body.light .hdr{background:#fff; border-bottom:1px solid var(--lgd-hair)}
body.light .mark{color:#0E1726}
body.light .dots{background-image:radial-gradient(circle, rgba(15,23,40,.18) 1.2px, transparent 1.6px)}
body.light .widget.drag{box-shadow:0 12px 32px rgba(15,23,40,.22)}
body.light #tabMenu, body.light #addMenu{box-shadow:0 8px 24px rgba(15,23,40,.18)}
body.light .avatar{background:#D7DBE2; color:#4a5364}
.htab.fxtab.on{outline:1px solid var(--lgd-up)}
/* FX 오버레이 — 풀스크린 전용, ESC = 닫고 대시보드 복귀 (2026-07-15 사용자: 미니 잔상 폐기) */
.fxov{position:fixed; inset:0; z-index:70; display:none; flex-direction:column; background:#0B0D0E}
.fxov.open{display:flex}
.fxov iframe{flex:1; border:0; width:100%; min-height:0}
.tabrow{display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:6px; cursor:pointer}
.tabrow:hover{background:var(--lgd-pill)}
.tabrow.dis{cursor:default; color:var(--lgd-dim)}
.tabrow.dis:hover{background:transparent}
.tabrow .sub{margin-left:auto; color:var(--lgd-dim); font-size:var(--lgd-fs-caption)}
.addtab{width:32px; height:32px; border-radius:var(--lgd-r-btn); display:flex; align-items:center;
  justify-content:center; color:var(--lgd-dim); font-size:19px; cursor:pointer}
.addtab:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
.hsp{flex:1}
.hmid{display:flex; align-items:center; gap:8px; background:var(--lgd-pill); border-radius:999px;
  height:32px; padding:0 14px; font-size:var(--lgd-fs-body); font-weight:600}
.hmid .dot{width:6px; height:6px; border-radius:999px; background:#C8C8C2}
.hmid .dot.ok{background:var(--lgd-up)}
.hmid .dot.stale{background:var(--lgd-warn)}
.hbtn{background:var(--lgd-pill); border:none; color:var(--lgd-ink); border-radius:var(--lgd-r-btn); height:32px;
  padding:0 14px; font-size:var(--lgd-fs-body); font-weight:600; cursor:pointer; transition:background .12s}
.hbtn:hover{background:var(--lgd-pill-hi)}
.hic{width:34px; height:34px; border-radius:var(--lgd-r-btn); display:flex; align-items:center;
  justify-content:center; color:var(--lgd-ink); cursor:pointer}
.hic:hover{background:var(--lgd-pill)}
.avatar{width:28px; height:28px; border-radius:999px; background:#3A3E42; display:flex;
  align-items:center; justify-content:center; color:#101214; cursor:pointer}

/* ══ 캔버스 + 점 그리드 (드래그/리사이즈 중에만) ══ */
.stage{position:relative; height:calc(100vh - 49px); overflow:auto; background:var(--lgd-bg)}
.dots{position:absolute; inset:0; opacity:0; transition:opacity .18s; pointer-events:none; z-index:1;
  background-image:radial-gradient(circle, rgba(255,255,255,.15) 1.2px, transparent 1.6px);
  background-size:38px 38px; background-position:19px 19px}
.stage.dragging .dots{opacity:1}
.algn{position:absolute; background:var(--lgd-up); z-index:45; pointer-events:none}
.algn.v{width:1px; top:0; bottom:0}
.algn.h{height:1px; left:0; right:0}
@media (prefers-reduced-motion: reduce){ .dots{transition:none} }

/* ══ 위젯 크롬 (스펙 §3: 타이틀바 36 · 링크 사각형 · ⋮ · 4방향 리사이즈) ══ */
.widget{position:absolute; display:flex; flex-direction:column; background:var(--lgd-surface);
  border:1px solid var(--lgd-hair); border-radius:var(--lgd-r-widget); overflow:hidden; z-index:2}
.widget.drag{box-shadow:0 12px 32px rgba(0,0,0,.6); opacity:.92; z-index:9}
.wtb{display:flex; align-items:center; gap:9px; height:var(--lgd-titlebar-h); padding:0 10px;
  border-bottom:1px solid var(--lgd-hair); flex:none; cursor:grab; user-select:none}
.widget.drag .wtb{cursor:grabbing}
.linksq{width:12px; height:12px; border-radius:3px; flex:none; cursor:pointer}
.wtb h3{margin:0; font-size:var(--lgd-fs-widget-title); font-weight:700}
.wtb .wsub{font-size:var(--lgd-fs-label); color:var(--lgd-dim)}
.wtb .wsp{flex:1}
.wtb .wic{width:24px; height:24px; display:flex; align-items:center; justify-content:center;
  color:var(--lgd-dim); cursor:pointer; border-radius:5px}
.wtb .wic:hover{background:var(--lgd-surface2); color:var(--lgd-ink)}
.wbody{flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column}
.rz{position:absolute; z-index:6}
.rz.br{right:0; bottom:0; width:18px; height:18px; cursor:nwse-resize}
.rz.br::after{content:""; position:absolute; right:5px; bottom:5px; width:7px; height:7px;
  border-right:2px solid var(--lgd-dim); border-bottom:2px solid var(--lgd-dim);
  border-bottom-right-radius:2px; opacity:0; transition:opacity .12s}
.widget:hover .rz.br::after{opacity:1}
.rz.r{right:-3px; top:12px; bottom:20px; width:8px; cursor:ew-resize}
.rz.l{left:-3px; top:12px; bottom:20px; width:8px; cursor:ew-resize}
.rz.b{bottom:-3px; left:12px; right:20px; height:8px; cursor:ns-resize}
.rz.r:hover,.rz.l:hover,.rz.b:hover{background:rgba(255,255,255,.06); border-radius:4px}
.wempty{flex:1; display:flex; align-items:center; justify-content:center; color:var(--lgd-dim);
  font-size:var(--lgd-fs-label); text-align:center; padding:16px}

/* ══ Balance card ══ */
/* ══ 발란스 카드 — 레전드 §8.10 (헤더→스파크→레인지탭→키-밸류 섹션)
   타이포 축소 재설계 (사용자 확정 2026-07-15): 라벨 dim 12px / 값 12.5px tabular /
   행 24px / 섹션 타이틀 11px 대문자 letter-spacing + 헤어라인 — 밀도 높고 차분하게 ══ */
.bal{padding:12px 18px 12px; display:flex; flex-direction:column; flex:1; min-height:0; overflow:auto}
.bal .top{display:flex; align-items:flex-start; flex:none}
.bal .nm{font-size:14px; font-weight:700}
.bal .dep{margin-left:auto; background:var(--lgd-pill); border:none; color:var(--lgd-ink);
  border-radius:6px; height:26px; padding:0 11px; font-size:var(--lgd-fs-label); font-weight:700; cursor:pointer}
.bal .dep:hover{background:var(--lgd-pill-hi)}
.bal .amt{font-size:20px; font-weight:700; margin-top:1px; letter-spacing:-.2px}
.bal .chg{font-size:var(--lgd-fs-caption); font-weight:600; margin-top:2px; min-height:14px}
.bal .chg.up{color:var(--lgd-up)} .bal .chg.down{color:var(--lgd-down)}
.bal .chg .dim{color:var(--lgd-dim); font-weight:500}
.bal .sparkwrap{position:relative; flex:none; margin-top:4px}
.bal canvas.spark{width:100%; height:74px; display:block}
.bal .enddot{position:absolute; width:6px; height:6px; border-radius:50%;
  transform:translate(-50%,-50%); animation:dotblink 1.1s ease-in-out infinite; pointer-events:none}
@keyframes dotblink{0%,100%{opacity:1}50%{opacity:.12}}
.bal .ranges{display:flex; gap:1px; align-items:center; flex:none; margin:4px 0 0}
.bal .ranges button{background:transparent; border:none; color:var(--lgd-up); font-weight:700; font-size:11px;
  padding:2px 7px; border-radius:4px; cursor:pointer; font-family:inherit; letter-spacing:.2px}
.bal .ranges button.on{background:var(--lgd-up); color:#0B0D0E}   /* §8.10: 유일한 solid-액센트 반전 */
.bal .sect{font-size:var(--lgd-fs-caption); font-weight:700; color:var(--lgd-dim); text-transform:uppercase;
  letter-spacing:.6px; margin-top:14px; padding-top:10px; border-top:1px solid var(--lgd-hair); flex:none}
.bal .kv{display:flex; justify-content:space-between; align-items:center; min-height:24px; flex:none}
.bal .kv .k{color:var(--lgd-dim); font-size:var(--lgd-fs-label)}
.bal .kv .v{font-weight:600; font-size:12.5px}
.bal .kv .v.pos{color:var(--lgd-up)} .bal .kv .v.neg{color:var(--lgd-down)}

/* ══ Leagues ══ */
.lgs{flex:1; min-height:0; overflow:auto; display:flex; flex-direction:column}
.lgrow{display:flex; align-items:center; gap:10px; padding:9px 12px; cursor:pointer; border-left:2px solid transparent}
.lgrow:hover{background:var(--lgd-surface2)}
.lgrow.sel{background:var(--lgd-surface2); border-left-color:var(--lgd-up)}
.lgrow .chip{width:26px; height:26px; border-radius:6px; background:var(--lgd-pill); display:flex; align-items:center;
  justify-content:center; font-size:14px; font-weight:700; flex:none; line-height:1}
.lgrow .nm{font-size:var(--lgd-fs-body); font-weight:600}
.lgrow .cnt{margin-left:auto; font-size:var(--lgd-fs-label); color:var(--lgd-dim)}
.lgrow .lv{display:flex; align-items:center; gap:4px; font-size:var(--lgd-fs-caption); font-weight:700; color:var(--lgd-down)}
.lgrow .lv i{width:5px; height:5px; border-radius:99px; background:var(--lgd-down)}

/* ══ Schedule ══ */
.sch{flex:1; min-height:0; overflow:auto}
.sch table{width:100%; border-collapse:collapse; font-size:var(--lgd-fs-body)}
.sch th{position:sticky; top:0; background:var(--lgd-surface); text-align:right; font-size:var(--lgd-fs-label);
  font-weight:600; color:var(--lgd-dim); padding:8px 12px; white-space:nowrap; z-index:1}
.sch th:first-child{text-align:left}
.sch td{padding:9px 12px; text-align:right; white-space:nowrap}
.sch td:first-child{text-align:left; font-weight:700}
.sch td .at{color:var(--lgd-dim); font-weight:400; margin:0 4px}
.sch tbody tr:hover{background:var(--lgd-surface2)}
.sch .st{font-size:var(--lgd-fs-label); color:var(--lgd-dim)}
.sch .st.live{color:var(--lgd-up); font-weight:700}

/* ══ My bets (앱 ticketHTML 문법 × 레전드 스킨) ══ */
.mb{display:flex; flex-direction:column; flex:1; min-height:0}
.mbseg{display:flex; gap:6px; padding:10px 12px 8px; flex:none}
.mbseg button{border:none; background:transparent; color:var(--lgd-dim); font-size:var(--lgd-fs-body); font-weight:600;
  height:28px; padding:0 12px; border-radius:var(--lgd-r-btn); cursor:pointer}
.mbseg button.on{background:var(--lgd-pill); color:var(--lgd-ink)}
.mbscroll{flex:1; min-height:0; overflow:auto; padding:0 12px 12px; display:flex; flex-direction:column; gap:10px}
.tkc{background:var(--lgd-surface2); border:1px solid var(--lgd-hair); border-radius:var(--lgd-r-widget); padding:10px 12px}
.tkc .th{display:flex; align-items:center; gap:8px}
.tkc .badge{font-size:var(--lgd-fs-caption); font-weight:700; padding:3px 8px; border-radius:5px; background:var(--lgd-pill)}
.tkc .res{margin-left:auto; font-size:var(--lgd-fs-caption); font-weight:700}
.tkc .res.open{color:var(--lgd-up)}
.tkc .tid{font-family:ui-monospace,'SF Mono',Menlo,monospace; font-size:10px; color:var(--lgd-dim); margin:4px 0 8px}
.tleg{display:flex; align-items:flex-start; gap:9px; padding:7px 0; border-top:1px solid var(--lgd-hair)}
.tleg .dot{width:6px; height:6px; border-radius:99px; background:var(--lgd-dim); margin-top:5px; flex:none}
.tleg.live .dot{background:var(--lgd-up)}
.tleg .pk{font-size:var(--lgd-fs-body); font-weight:700}
.tleg .gm{font-size:var(--lgd-fs-label); color:var(--lgd-dim); margin-top:2px}
.tleg .gm .sc{color:var(--lgd-ink); font-weight:600}
.tleg .odd{margin-left:auto; font-size:var(--lgd-fs-body); font-weight:600; white-space:nowrap}
.tkc .ft{display:flex; align-items:center; gap:12px; padding-top:9px; border-top:1px solid var(--lgd-hair);
  font-size:var(--lgd-fs-label); color:var(--lgd-dim); flex-wrap:wrap}
.tkc .ft b{color:var(--lgd-ink); font-weight:600}
.tkc .co{margin-left:auto; display:flex; gap:6px}
.tkc .co button{border:none; border-radius:var(--lgd-r-btn); height:28px; padding:0 12px; font-size:var(--lgd-fs-label);
  font-weight:700; cursor:pointer; background:rgba(0,200,5,.12); color:var(--lgd-up)}
.tkc .co button:hover{background:rgba(0,200,5,.2)}
.tkc .co .half{background:var(--lgd-pill); color:var(--lgd-ink)}
.bsgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:0 12px 10px}
.bscell{background:var(--lgd-surface2); border:1px solid var(--lgd-hair); border-radius:var(--lgd-r-widget); padding:8px 10px}
.bscell .l{font-size:var(--lgd-fs-caption); color:var(--lgd-dim); letter-spacing:.02em}
.bscell .v{font-size:var(--lgd-fs-body-lg); font-weight:700; margin-top:3px}
.bscell .v.pos{color:var(--lgd-up)} .bscell .v.neg{color:var(--lgd-down)}
.tkc .res.won{color:var(--lgd-up)} .tkc .res.lost{color:var(--lgd-down)} .tkc .res.refunded{color:var(--lgd-dim)}
.tleg .rtag{font-size:10px; font-weight:800; margin-top:2px; text-align:right}
.tleg .rtag.w{color:var(--lgd-up)} .tleg .rtag.l{color:var(--lgd-down)} .tleg .rtag.p{color:var(--lgd-dim)}
.tkc .ft .win{color:var(--lgd-up)} .tkc .ft .loss{color:var(--lgd-down)}
.tkc .setts{font-size:10px; color:var(--lgd-dim); padding-top:5px}
.loginp{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--lgd-dim); font-size:var(--lgd-fs-label)}
.loginp button{background:var(--lgd-pill); border:none; color:var(--lgd-ink); border-radius:var(--lgd-r-btn); height:32px; padding:0 16px; font-weight:700; cursor:pointer}

/* ══ Wallet (앱 wallet 문법 요약판) ══ */
.wal{padding:12px 14px; display:flex; flex-direction:column; gap:10px; flex:1; min-height:0}
.wal .row3{display:flex; gap:8px}
.wal .stat{flex:1; background:var(--lgd-surface2); border:1px solid var(--lgd-hair); border-radius:var(--lgd-r-widget); padding:9px 11px}
.wal .stat .l{font-size:var(--lgd-fs-caption); color:var(--lgd-dim); letter-spacing:.02em}
.wal .stat .v{font-size:var(--lgd-fs-body-lg); font-weight:600; margin-top:3px}
.wal .acts{display:flex; gap:8px}
.wal .acts a{flex:1; text-align:center; background:var(--lgd-pill); color:var(--lgd-ink); text-decoration:none;
  border-radius:var(--lgd-r-btn); height:32px; line-height:32px; font-size:var(--lgd-fs-body); font-weight:700}
.wal .acts a:hover{background:var(--lgd-pill-hi)}
.wal .rah{font-size:var(--lgd-fs-label); color:var(--lgd-dim); font-weight:600; margin-top:2px}
.wal .ralist{flex:1; min-height:0; overflow:auto; display:flex; flex-direction:column}
.wal .ra{display:flex; align-items:center; gap:9px; padding:7px 2px; border-top:1px solid var(--lgd-hair); font-size:var(--lgd-fs-label)}
.wal .ra .t2{color:var(--lgd-dim)}
.wal .ra .amt{margin-left:auto; font-weight:600}
.wal .ra .amt.neg{color:var(--lgd-down)}
.wal .ra .amt.pos{color:var(--lgd-up)}

/* ══ 돈 이동 시트 (입금·출금·이체 — 중앙 모달, 레전드 토큰) ══ */
.msov{position:fixed; inset:0; z-index:80; background:rgba(0,0,0,.6); display:none}
.msov.open{display:block}
.mssheet{position:fixed; z-index:81; left:50%; top:50%; transform:translate(-50%,-50%); width:380px; max-width:calc(100vw - 32px);
  max-height:calc(100vh - 48px); overflow:auto; display:none; flex-direction:column; background:#141617;
  border:1px solid rgba(255,255,255,.14); border-radius:14px; box-shadow:0 24px 60px rgba(0,0,0,.7); font-size:var(--lgd-fs-body)}
.mssheet.open{display:flex}
.mssheet .mh{display:flex; align-items:center; padding:16px 18px 10px}
.mssheet .mh h3{font-size:17px; font-weight:700}
.mssheet .mh .mx{margin-left:auto; color:var(--lgd-dim); cursor:pointer; width:26px; height:26px; display:flex; align-items:center; justify-content:center; border-radius:6px}
.mssheet .mh .mx:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
.mssheet *{box-sizing:border-box}   /* 입력칸이 시트 폭을 넘지 않게 (padding 포함 계산) */
.mssheet .mbody{padding:0 18px 18px; display:flex; flex-direction:column; gap:12px}
.mssheet .lbl{font-size:var(--lgd-fs-label); color:var(--lgd-dim); font-weight:600; margin-bottom:5px}
.mssheet .in{width:100%; background:var(--lgd-surface2); border:1px solid var(--lgd-hair); border-radius:8px;
  padding:11px 12px; color:var(--lgd-ink); font-size:15px; font-family:inherit; outline:none}
.mssheet .in:focus{border-color:var(--lgd-dim)}
.mssheet .addrbox{display:flex; align-items:center; gap:8px; background:var(--lgd-surface2); border:1px solid var(--lgd-hair);
  border-radius:8px; padding:10px 12px}

const dec=a=>{ var d=a>0?1+a/100:1+100/(-a); var m=Math.max(0,Math.min(15,+(window.__alpexaSportsMargin||0)))/100; return 1+(d-1)*(1-m); };
const toAm=d=>Math.round(d>=2?(d-1)*100:-100/(d-1));
const SGP_HAIRCUT=0.25;
const isSGP=ls=>ls.length>1&&ls.every(l=>l.gid===ls[0].gid);
const comboDec=ls=>{ var d=ls.reduce((a,l)=>a*dec(l.am),1); return isSGP(ls)?1+(d-1)*(1-SGP_HAIRCUT):d; };
/* 라이브 게이트 — 앱 1713-1726 + 3567-3568 그대로 (안티 아비트라지 3조건) */
const SUSPEND_MS=15000, ODDS_STALE_MS=90000;
window.__alpexaLiveBetting=window.__alpexaLiveBetting||false;
window.__alpexaOddsStale=false; window.__alpexaHalt=false; window.__alpexaSportsMargin=window.__alpexaSportsMargin||0;
function liveOK(g){

function liveReason(g){

/* 검색 = 보드 필터 (앱 :1689-1693) — 쿼리 중엔 리그 필터 무시하고 전 종목 검색 */

const gamesStore = {
  games:[], updatedAt:0, subs:new Set(),

      const r=await fetch(SB+'/rest/v1/live_games?id=eq.all&select=data,updated_at',

      if(st!==window.__alpexaOddsStale){ window.__alpexaOddsStale=st; this.emit(); } }, 3000); }
};

/* ════════════════════ 레이아웃 엔진 (스펙 §2/§5) ════════════════════ */
const GRID=38, FINE=8, SNAP=6, GAP=8, LKEY='alpexa.sbdash.layout.v2';
/* 스마트 정렬: 다른 위젯 모서리/8px 갭/가터에 ±6px 접근 시 자석 스냅 + 초록 가이드라인.
   스냅 없으면 8px 미세 격자. (점 그리드 38px는 시각 리듬 — 실제 정밀도는 여기) */

    stage.appendChild(e); this.els.push(e); } };
function snapAxis(cands, v){ let best=null;
  for(const c of cands){ const d=Math.abs(c.at-v); if(d<=SNAP&&(!best||d<best.d)) best={...c,d}; }
  return best; }
function othersOf(id){ return Object.keys(layout).filter(k=>k!==id&&!layout[k].hidden).map(k=>layout[k]); }
// 드래그용 후보: x축(내 왼쪽 좌표 기준) / y축(내 위 좌표 기준) — guide는 기준 모서리 위치
function dragCands(id, w, h){
  const xs=[{at:GAP, guide:GAP}], ys=[{at:GAP, guide:GAP}];
  othersOf(id).forEach(o=>{
    xs.push({at:o.x, guide:o.x});                    // 좌변 정렬
    xs.push({at:o.x+o.w-w, guide:o.x+o.w});          // 우변 정렬
    xs.push({at:o.x+o.w+GAP, guide:o.x+o.w+GAP/2});  // 오른쪽 이웃 갭
    xs.push({at:o.x-w-GAP, guide:o.x-GAP/2});        // 왼쪽 이웃 갭

const stage=document.getElementById('stage');
// 기본 배치 v2 (2026-07-16 사용자 확정 스크린샷) — 1900×856 그리드, GAP 8에서 수학적 정합:
// 열 8|232|424|520|336|340 (경계 240/248·672/680·1200/1208·1544/1552·1892), 행 504+8+328 (슬립 840 풀)
const DEFAULT_LAYOUT={ leagues:{x:8,y:8,w:232,h:504}, schedule:{x:248,y:8,w:424,h:504},
  live:{x:8,y:520,w:664,h:328}, board:{x:680,y:8,w:520,h:504}, mybets:{x:680,y:520,w:520,h:328},
  slip:{x:1208,y:8,w:336,h:840}, balance:{x:1552,y:8,w:340,h:452}, wallet:{x:1552,y:468,w:340,h:380},

const deepLayout=(o)=>JSON.parse(JSON.stringify(o));   // 리셋/기본값이 DEFAULT 객체를 참조 공유하지 않게

const MIN_SIZE={ balance:{w:300,h:180}, leagues:{w:200,h:220}, schedule:{w:420,h:220}, board:{w:520,h:260},
  mybets:{w:380,h:240}, wallet:{w:320,h:280}, slip:{w:320,h:320}, live:{w:520,h:260} };

/* ── 수학적 칸 채움 (사용자 확정 2026-07-15): 뷰포트가 바뀌면(풀스크린 전환 포함)

   가장자리가 정확히 vw−GAP / vh−GAP 에 닿고, 좌표를 float로 유지해 전환을 반복해도

const HDR_H=48;   // 스테이지 = 헤더 아래
function refitLayout(){
  const vw=window.innerWidth, vh=window.innerHeight-HDR_H;
  if(vw<500||vh<300) return;   // 비정상 뷰포트 방어
  const ref=layout.__ref||{w:1900,h:856};
  if(Math.abs(ref.w-vw)<2&&Math.abs(ref.h-vh)<2){ layout.__ref={w:vw,h:vh}; return; }
  const sx=(vw-2*GAP)/(ref.w-2*GAP), sy=(vh-2*GAP)/(ref.h-2*GAP);
  const mapX=v=>GAP+(v-GAP)*sx, mapY=v=>GAP+(v-GAP)*sy;
  Object.keys(layout).forEach(id=>{ if(id==='__ref') return; const g=layout[id];
    const r=mapX(g.x+g.w), b=mapY(g.y+g.h);
    g.x=mapX(g.x); g.y=mapY(g.y); g.w=r-g.x; g.h=b-g.y;
    // 리핏에서는 MIN_SIZE 클램프를 걸지 않는다 — 한 위젯만 늘리면 이웃과 겹쳐
    // 선형 사상(무겹침 보존)이 깨진다. 콘텐츠는 위젯 내부 스크롤이 받치고,
    // 절대 하한(120px)만 방어. 사용자 드래그/리사이즈 시의 MIN_SIZE는 그대로.
    if(g.w<120)g.w=120; if(g.h<120)g.h=120;
    applyGeo(id); });
  layout.__ref={w:vw,h:vh}; saveLayout();
}

window.addEventListener('resize', ()=>{ clearTimeout(_refitT); _refitT=setTimeout(refitLayout,150); });

function makeWidget(id, title, sub, linkColor, bodyHTML){
  const el=document.createElement('div'); el.className='widget'; el.id='w-'+id;
  zOrder.push(id);
  el.addEventListener('pointerdown', ()=>bringToFront(id), true);   // 캡처: 드래그·본문 클릭 모두
  el.innerHTML='<div class="wtb"><span class="linksq" style="background:'+linkColor+'"></span>'+
    '<h3 data-i18n="'+title+'">'+t(title)+'</h3>'+(sub?'<span class="wsub">'+sub+'</span>':'')+
    '<span class="wsp"></span><span class="wic" title="Close widget">⋮</span></div>'+
    '<div class="wbody">'+bodyHTML+'</div>';
  stage.appendChild(el); applyGeo(id);
  // 드래그 (타이틀바) — 점 그리드 + 스냅
  const tb=el.querySelector('.wtb');
  tb.addEventListener('pointerdown', e=>{
    if(e.target.closest('.wic,.linksq')) return;
    e.preventDefault(); tb.setPointerCapture(e.pointerId);
    const g=layout[id], offX=e.clientX-g.x, offY=e.clientY-g.y;
    stage.classList.add('dragging'); el.classList.add('drag');
    const cands=dragCands(id, g.w, g.h);
    const move=ev=>{
      let x=Math.max(0,ev.clientX-offX), y=Math.max(0,ev.clientY-offY);
      guides.clear();
      const sx=snapAxis(cands.xs,x), sy=snapAxis(cands.ys,y);
      if(sx){ x=sx.at; guides.v(sx.guide); }
      if(sy){ y=sy.at; guides.h(sy.guide); }
      g.x=x; g.y=y; applyGeo(id); };
    const up=()=>{ tb.removeEventListener('pointermove',move); tb.removeEventListener('pointerup',up);
      stage.classList.remove('dragging'); el.classList.remove('drag'); guides.clear();
      // 가이드 스냅이 안 잡힌 축은 8px 미세 격자로
      const sx=snapAxis(cands.xs,g.x), sy=snapAxis(cands.ys,g.y);
      if(!sx) g.x=Math.round(g.x/FINE)*FINE;
      if(!sy) g.y=Math.round(g.y/FINE)*FINE;
      applyGeo(id); saveLayout(); };
    tb.addEventListener('pointermove',move); tb.addEventListener('pointerup',up);
  });
  // 리사이즈 4방향 (스펙 §3: br 갈매기 + 좌/우/하 변) — 최소 크기는 위젯별(콘텐츠 기반)
  const MINW=(MIN_SIZE[id]||{}).w||220, MINH=(MIN_SIZE[id]||{}).h||170;
  ['br','r','l','b'].forEach(dir=>{
    const rz=document.createElement('div'); rz.className='rz '+dir; el.appendChild(rz);
    rz.addEventListener('pointerdown', e=>{
      e.preventDefault(); e.stopPropagation(); rz.setPointerCapture(e.pointerId);
      const g=layout[id], x0=e.clientX, y0=e.clientY, w0=g.w, h0=g.h, l0=g.x;
      stage.classList.add('dragging'); el.classList.add('drag');
      // 모서리 스냅 후보: 이웃의 변(정렬)·변±8(갭)
      const eXs=[], eYs=[];
      othersOf(id).forEach(o=>{ eXs.push({at:o.x-GAP, guide:o.x-GAP/2},{at:o.x, guide:o.x},{at:o.x+o.w, guide:o.x+o.w});
        eYs.push({at:o.y-GAP, guide:o.y-GAP/2},{at:o.y, guide:o.y},{at:o.y+o.h, guide:o.y+o.h}); });
      const move=ev=>{ const dx=ev.clientX-x0, dy=ev.clientY-y0;
        guides.clear();
        if(dir==='br'||dir==='r'){ let r=l0+Math.max(MINW,w0+dx);
          const sn=snapAxis(eXs,r); if(sn){ r=sn.at; guides.v(sn.guide); } g.w=Math.max(MINW,r-g.x); }
        if(dir==='br'||dir==='b'){ let btm=g.y+Math.max(MINH,h0+dy);
          const sn=snapAxis(eYs,btm); if(sn){ btm=sn.at; guides.h(sn.guide); } g.h=Math.max(MINH,btm-g.y); }
        if(dir==='l'){ let x=l0+Math.min(dx,w0-MINW);
          const sn=snapAxis(eXs,x); if(sn){ x=sn.at; guides.v(sn.guide); }
          const w=Math.max(MINW,l0+w0-x); g.x=l0+w0-w; g.w=w; }
        applyGeo(id); };
      const up=()=>{ rz.removeEventListener('pointermove',move); rz.removeEventListener('pointerup',up);
        stage.classList.remove('dragging'); el.classList.remove('drag'); guides.clear();
        // 스냅 안 걸린 치수만 8px 미세 격자
        const right=g.x+g.w, btm=g.y+g.h;
        if(!snapAxis(eXs,right)) g.w=Math.max(MINW,Math.round(g.w/FINE)*FINE);
        if(!snapAxis(eYs,btm)) g.h=Math.max(MINH,Math.round(g.h/FINE)*FINE);
        if(dir==='l'){ if(!snapAxis(eXs,g.x)) g.x=right-g.w; }
        applyGeo(id); saveLayout(); };
      rz.addEventListener('pointermove',move); rz.addEventListener('pointerup',up);
    });
  });
  return el;
}

function renderSchedule(games){
  const el=document.getElementById('schBody'); if(!el) return;
  const list=games.filter(g=>g.lg===selLg).slice().sort(sortByPin).slice(0,40);
  if(!list.length){ el.innerHTML='<tr><td colspan="4" style="color:var(--lgd-dim);font-weight:400">No games</td></tr>'; return; }
  el.innerHTML=list.map(g=>{
    const st=g.live?'<span class="st live">● '+esc(g.time)+'</span>':'<span class="st">'+esc(g.time)+'</span>';
    const locked=!oddsReal(g);
    // ⛳ 골프 = 대회명 + 우승배당 1위(페이버릿) 표시 — 2팀 ML 칸이 없음
    if(g.lg==='GOLF'){
      const fav=(g.outright&&g.outright[0])?fmtAm(+g.outright[0].am):null;
      return '<tr><td>'+esc(g.name||g.home.nm||'Golf')+'</td><td>'+st+'</td>'+
        '<td colspan="2">'+(locked||fav==null?'🔒':('Fav '+fav))+'</td></tr>';
    }
    // 서버 배열 규약: index 0=홈, 1=원정 (sports-games/index.ts:76-79)
    const mlA=(g.ml&&g.ml[1])?fmtAm(+g.ml[1].am):null, mlH=(g.ml&&g.ml[0])?fmtAm(+g.ml[0].am):null;
    return '<tr><td>'+esc(g.away.ab)+'<span class="at">@</span>'+esc(g.home.ab)+'</td><td>'+st+'</td>'+
      '<td>'+(locked||mlA==null?'🔒':mlA)+'</td><td>'+(locked||mlH==null?'🔒':mlH)+'</td></tr>';
  }).join('');
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function renderBoard(games){
  const el=document.getElementById('obList'); if(!el) return;
  document.getElementById('obFil').innerHTML=LEAGUES.map(([lg])=>
    '<button class="'+(lg===selLg?'on':'')+'" data-lg="'+lg+'">'+lg+'</button>').join('');

  el.innerHTML=list.map(gameRowHTML).join('');

/* 행 렌더러 — Odds board와 Live 위젯이 공유 (복제 금지: 한 진실) */
function gameRowHTML(g){
    try{
      // 잠금 셀: 앱:1641 리터럴 그대로 — 노라인은 data-am 미부여가 돈 관문
      const cell=(arr,key,i)=>{
        if(!oddsReal(g)) return '<div class="bet sus" title="Odds unavailable — no market"><span class="ln">&nbsp;</span><span class="pr">🔒</span></div>';
        const b=arr&&arr[i]; if(!b) return '<div></div>';
        if(g.live&&!liveOK(g)) return '<div class="bet sus" title="'+esc(liveReason(g))+'"><span class="ln">'+esc(b.ln||'')+'</span><span class="pr">🔒</span></div>';
        const on=slip.legs.some(l=>l.uid===g.gid+'|'+b.sel);
        return '<div class="bet'+(on?' sel':'')+'" data-game="'+esc(g.gid)+'" data-market="'+key+'" data-sel="'+esc(b.sel)+'" data-am="'+(+b.am)+'">'+
          '<span class="ln">'+esc(b.ln||'')+'</span><span class="pr '+(b.am>0?'pos':'')+'">'+fmtAm(+b.am)+'</span></div>'; };
      // ④ 핀 ★ (앱:1678-1679 문법 — pin-btn 클래스·타이틀 리터럴 그대로)
      const isPinned=pinnedGames.has(g.gid);
      const pinBtn='<button class="pin-btn'+(isPinned?' pinned':'')+'" data-pin="'+esc(g.gid)+'" title="'+(isPinned?'Unpin':'Pin to top')+'">★</button>';
      // 행 규약 (앱:1664): 원정팀 윗줄=index 1, 홈팀 아랫줄=index 0
      const row=(t,i)=>'<div class="obg-row" style="display:contents">'+
        '<div class="obg">'+(i===1?('<div class="st'+(g.live?' live':'')+'">'+(g.live?'● ':'')+esc(g.time)+'</div>'):'<div class="st">'+pinBtn+'</div>')+
        '<div class="tm">'+esc(t.ab)+'<small>'+esc(t.nm)+'</small>'+(t.sc!==undefined?'<span class="sc">'+esc(t.sc)+'</span>':'')+'</div></div>'+
        cell(g.spread,'Spread',i)+cell(g.total,'Total',i)+cell(g.ml,'Moneyline',i)+'</div>';
      // ⛳ 골프 = OUTRIGHT (대회 우승자): 대회 헤더 + 선수별 우승배당 행 (앱 golfHTML 계약:
      // market='Outright', sel=선수명, uid=gid|sel). 상위 8명 + 전체 펼침. 잠금/라이브
      // 게이트는 팀 종목과 동일 — data-am 미부여가 돈 관문.
      if(g.lg==='GOLF'){
        const oc=g.outright||[];
        const hdr='<div class="soc-hdr"><span>⛳</span><span class="soc-nm">'+esc(g.name||g.home.nm||'Tournament')+'</span>'+
          '<span class="st'+(g.live?' live':'')+'">'+(g.live?'● ':'')+esc(g.time)+'</span>'+pinBtn+'</div>';
        if(!oddsReal(g)||!oc.length)
          return '<div class="obrow" data-gid="'+esc(g.gid)+'">'+hdr+
            '<div class="golf-list"><div class="bet sus" title="Odds unavailable — no market"><span class="ln">Winner odds</span><span class="pr">🔒</span></div></div></div>';
        const prow=(b)=>{
          if(g.live&&!liveOK(g)) return '<div class="golf-row"><span class="golf-nm">'+esc(b.sel)+'</span><div class="bet sus" title="'+esc(liveReason(g))+'"><span class="pr">🔒</span></div></div>';
          const on=slip.legs.some(l=>l.uid===g.gid+'|'+b.sel);
          return '<div class="golf-row"><span class="golf-nm">'+esc(b.sel)+'</span>'+
            '<div class="bet'+(on?' sel':'')+'" data-game="'+esc(g.gid)+'" data-market="Outright" data-sel="'+esc(b.sel)+'" data-am="'+(+b.am)+'">'+
            '<span class="pr '+(b.am>0?'pos':'')+'">'+fmtAm(+b.am)+'</span></div></div>'; };
        const open=golfExpanded.has(g.gid), top=oc.slice(0,8), rest=oc.slice(8);
        return '<div class="obrow" data-gid="'+esc(g.gid)+'">'+hdr+'<div class="golf-list">'+top.map(prow).join('')+
          (rest.length?(open?rest.map(prow).join(''):'<div class="golf-more" data-golfmore="'+esc(g.gid)+'">Show all '+oc.length+' players</div>'):'')+
          '</div></div>';
      }
      // 축구 = 1X2 (앱 c3/soc1x2 계약: tw[0] Home / tw[1] Draw / tw[2] Away)
      if(g.lg==='SOC'){
        const tw=g.threeWay||[];
        const c3=(b,lbl)=>{
          if(!oddsReal(g)) return '<div class="bet sus" title="Odds unavailable — no market"><span class="ln">'+lbl+'</span><span class="pr">🔒</span></div>';
          if(!b) return '<div class="bet dis"><span class="ln">'+lbl+'</span><span class="pr">—</span></div>';
          if(g.live&&!liveOK(g)) return '<div class="bet sus" title="'+esc(liveReason(g))+'"><span class="ln">'+lbl+'</span><span class="pr">🔒</span></div>';
          const on=slip.legs.some(l=>l.uid===g.gid+'|'+b.sel);
          return '<div class="bet'+(on?' sel':'')+'" data-game="'+esc(g.gid)+'" data-market="1X2" data-sel="'+esc(b.sel)+'" data-am="'+(+b.am)+'">'+
            '<span class="ln">'+lbl+'</span><span class="pr '+(b.am>0?'pos':'')+'">'+fmtAm(+b.am)+'</span></div>'; };
        return '<div class="obrow" data-gid="'+esc(g.gid)+'"><div class="soc-hdr"><span>'+esc(g.home.ab)+'</span>'+
          '<span class="soc-nm">'+esc(g.home.nm)+' <b>v</b> '+esc(g.away.nm)+'</span>'+
          ((g.home.sc!==undefined&&g.away.sc!==undefined)?'<span class="soc-sc'+(g.live?' live':'')+'">'+esc(g.home.sc)+'–'+esc(g.away.sc)+'</span>':'')+
          '<span>'+esc(g.away.ab)+'</span>'+pinBtn+'</div>'+
          '<div class="soc1x2">'+c3(tw[0],'Home')+c3(tw[1],'Draw')+c3(tw[2],'Away')+'</div></div>';
      }
      return '<div class="obrow" data-gid="'+esc(g.gid)+'">'+row(g.away,1)+row(g.home,0)+'</div>';
    }catch(e){ console.error('card render failed', g&&g.gid, e); return ''; }   // 항목별 격리 (앱:1686)
}

// Odds board·Live 위젯 공용 핸들러 — 돈 관문 로직을 두 벌 만들지 않는다
function boardClick(e){
  const pb=e.target.closest('.pin-btn');   // ④ ★ 클릭은 행/셀 클릭으로 새지 않게 (앱:1768)
  if(pb){ e.stopPropagation(); togglePin(pb.dataset.pin); return; }
  const gm=e.target.closest('[data-golfmore]');   // ⛳ 전체 선수 펼침 (재렌더에도 유지)
  if(gm){ golfExpanded.add(gm.dataset.golfmore); renderBoard(gamesStore.games); return; }
  const b=e.target.closest('.bet'); if(!b||b.classList.contains('sus')||b.classList.contains('dis')) return;
  if(layout.slip&&layout.slip.hidden){ openQuickBet(b.dataset.game, b.dataset.market, b.dataset.sel, b); return; }

/* ── Account 카드 렌더 (레전드 §8.10) — 미로그인 '···' 유지, 0으로 거짓 표시 금지 ── */
let balRange='1D';

const RANGE_MS={ '1D':86400e3, '1W':7*86400e3, '1M':30*86400e3, '3M':90*86400e3, '1Y':365*86400e3 };
function rangeCutoff(){ if(balRange==='ALL') return 0;
  if(balRange==='YTD'){ const y=new Date(); return new Date(y.getFullYear(),0,1).getTime(); }
  return Date.now()-RANGE_MS[balRange]; }
/* 잔고 곡선 = 현재 잔고에서 ledger를 거꾸로 걸어 역산: balance_at(t) = now − Σ ledger(t..now).
   불변식(accounts.balance == 오프닝 + Σledger)이 정확성을 보장 — 클라 쓰기 0, 표시 전용. */
function balSeries(ms){
  const rows=(ms.ledger||[]).slice().sort((a,b)=>a.ts-b.ts);   // 과거→현재
  const pts=[]; let run=+ms.bal||0;   // 표시 전용 역산 커서 (서버 잔고는 불변)
  for(let i=rows.length-1;i>=0;i--){ pts.unshift({ts:rows[i].ts, v:run}); run-=rows[i].amt; }
  pts.unshift({ts:rows.length?rows[0].ts-1:Date.now()-86400e3, v:run});   // 창 시작점(당시 잔고)
  pts.push({ts:Date.now(), v:+ms.bal||0});
  const cut=rangeCutoff();
  const inWin=pts.filter(p=>p.ts>=cut);
  if(!inWin.length||inWin[0].ts>cut){ const before=pts.filter(p=>p.ts<cut);
    inWin.unshift({ts:cut, v:before.length?before[before.length-1].v:(+ms.bal||0)}); }
  return inWin;
}
function drawSpark(ms){
  const cv=document.getElementById('balSpark'); if(!cv) return;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth||300, H=cv.clientHeight||90;
  cv.width=W*dpr; cv.height=H*dpr;
  const cx=cv.getContext('2d'); cx.scale(dpr,dpr); cx.clearRect(0,0,W,H);
  const dot=document.getElementById('balDot');
  if(!ms.authed){ if(dot) dot.style.display='none'; return; }
  const pts=balSeries(ms);
  const t0=pts[0].ts, t1=pts[pts.length-1].ts||t0+1;
  let lo=Math.min(...pts.map(p=>p.v)), hi=Math.max(...pts.map(p=>p.v));
  if(hi-lo<1e-9){ lo-=1; hi+=1; }   // 평평한 곡선(변화 0)도 중앙선으로
  const X=t=>4+(W-8)*((t-t0)/Math.max(1,t1-t0)), Y=v=>H-8-(H-16)*((v-lo)/(hi-lo));
  const up=pts[pts.length-1].v>=pts[0].v;
  const col=up?'#00C805':'#EB5D2A';
  // 솔리드 라인 + 끝점 도트 (사용자 확정 2026-07-15 — 점선 폐기). 축·그리드 없음 유지.
  cx.strokeStyle=col; cx.lineWidth=1.8; cx.lineJoin='round'; cx.lineCap='round';
  cx.beginPath();
  pts.forEach((p,i)=>{ const x=X(p.ts), y=Y(p.v); if(i===0)cx.moveTo(x,y); else cx.lineTo(x,y); });
  cx.stroke();
  const last=pts[pts.length-1];   // 현재값 마커 = DOM 도트 (깜박깜박 — 사용자 확정 2026-07-15)
  if(dot){ dot.style.display='block'; dot.style.background=col;
    dot.style.left=X(last.ts)+'px'; dot.style.top=Y(last.v)+'px'; }
}
const mv=(n)=> hideAmounts?'••••':(n==null?'···':usd(n));   // §8.10: 마스킹 = 고정 4점(자릿수 은닉)
function renderAccount(ms){

  $('balTot').textContent=mv(tot);   // Total assets 전서버 (§8.9 번역)

  setV('balPTd',pTd); setV('balPYtd',pYtd);
  const wonN=sb.filter(b=>b.result==='won').length;
  const staked=sb.reduce((a,b)=>a+(+b.stake||0),0), net=sb.reduce((a,b)=>a+pnl(b),0);
  $('balPWr').textContent=sb.length?Math.round(wonN/sb.length*100)+'%':'—';
  $('balPRoi').textContent=staked?(Math.round(net/staked*1000)/10)+'%':'—';
  $('balOw').textContent=mv(pend);   // Total wager = 오픈 스테이크 합
  $('balOe').textContent=mv(ms.openBets.reduce((a,b)=>a+(+b.potential||0),0));   // Est. payout (추정 — 서버 정산과 무관)
  drawSpark(ms);

function betKick(b){ let min=Infinity; (b.legs||[]).forEach(l=>{
  const g=gamesStore.games.find(x=>x.gid===l.gid);
  const kt=l.kt||(g&&g.iso)||''; const t=kt?Date.parse(kt):NaN; if(!isNaN(t)&&t<min)min=t; }); return min; }
/* 티켓 버킷 = 앱 ticketBucket 미러: Live(0) → Upcoming(1) → Awaiting result(2, 정산 대기 맨 아래) */
function betBucket(b){ const legs=b.legs||[];
  if(legs.some(l=>legState(l)==='live')) return 0;
  return legs.some(l=>legState(l)==='await')?2:1; }

  const ba=betBucket(a), bb=betBucket(b); if(ba!==bb) return ba-bb;
  const ka=betKick(a), kb=betKick(b); if(ka!==kb) return ka-kb;
  return (+b.placedTs||0)-(+a.placedTs||0); }); }

    document.querySelectorAll('#msSheet .chips button').forEach(b=>b.onclick=()=>{

      amt.value=(Math.floor((src||0)*(+b.dataset.fill/100)*100)/100)||0; });

async function doDeposit(){
  const m=meId(); if(!m){ goLogin(); return; }
  const v=msNum('msAmt');
  if(v<=0){ msErr('Enter a deposit amount'); return; }
  // 입금 한도 가드 — players.deposit_limit(서버 소유). 오늘 입금 합은 서버 requests 파생.
  const lim=+((moneyStore.rg&&moneyStore.rg.depositLimit)||0);
  if(lim>0 && depositedToday()+v>lim){ msErr('Daily deposit limit '+usd(lim)+' exceeded'); return; }
  const go=document.getElementById('msGo'); go.disabled=true; go.textContent='Submitting…';
  const reqId='dp_'+Date.now();
  try{
    // 입금 요청 = requests 테이블 (앱 pushRequest 재사용 — 계약 한 벌). 잔고는 서버 승인 후 반영.
    await AlpexaSync.pushRequest({ id:reqId, type:'deposit', server:'Sports', asset:'USDT',
      network:'ERC-20', address:companyAddr(), amount:v, fee:0, net:v, status:'pending' });
    closeMoney();
  }catch(e){ go.disabled=false; go.textContent='Submit deposit'; msErr('Couldn’t submit — please try again'); return; }
  finally{ moneyStore.pull(); }
}
async function doWithdraw(){
  const m=meId(); if(!m){ goLogin(); return; }
  const v=msNum('msAmt'), addr=(document.getElementById('msWdAddr').value||'').trim();
  if(v<=0){ msErr('Enter a withdrawal amount'); return; }
  const wAvail=(moneyStore.withdrawable!=null?moneyStore.withdrawable:moneyStore.bal);
  if(wAvail!=null && v>wAvail){ msErr('Exceeds withdrawable '+usd(wAvail)+' (bonus & locked funds excluded)'); return; }
  if(!/^0x[0-9a-fA-F]{40}$/.test(addr)){ msErr('Invalid address — 0x followed by 40 hex characters'); return; }
  const fee=wdFee(); if(v<=fee){ msErr('Amount must exceed the network fee '+usd(fee)); return; }
  const acct=m.accts&&m.accts.sports;
  if(!(window.AlpexaSync&&AlpexaSync.db&&acct)){ msErr('No server connection — nothing was deducted. Try again.'); return; }
  const go=document.getElementById('msGo'); go.disabled=true; go.textContent='Requesting…';
  const wid='wd_'+Date.now();
  let res; try{ res=await AlpexaSync.db.rpc('withdraw_hold',{p_id:wid,p_acct:acct,p_amount:v,p_fee:fee,p_asset:'USDT',p_network:'ERC-20',p_address:addr}); }catch(e){ res={error:e}; }
  const dt=res&&res.data;
  if((res&&res.error)||!dt||dt.ok===false){
    go.disabled=false; go.textContent='Request withdrawal';
    msErr((dt&&dt.error)||(res&&res.error&&res.error.message)||'Withdrawal not submitted — nothing was deducted.');
    return;   // 서버 원자적: 실패면 아무것도 안 함
  }
  closeMoney(); moneyStore.pull();   // 서버가 hold+요청 생성 — 잔고는 재조회로만 (클라 델타 없음)
}
async function doTransfer(){
  const m=meId(); if(!m){ goLogin(); return; }
  const v=msNum('msAmt');
  if(v<=0){ msErr('Enter an amount'); return; }
  const src=tfFrom==='sports'?(moneyStore.withdrawable!=null?moneyStore.withdrawable:moneyStore.bal):moneyStore.balCrypto;
  if(src!=null && v>src){ msErr(tfFrom==='sports'?'Bonus is non-transferable — transferable '+usd(src):'Insufficient '+((tfFrom==='sports')?'Sports':'Crypto')+' balance'); return; }
  const fromAcct=m.accts&&m.accts[tfFrom], toAcct=m.accts&&m.accts[tfTo];
  if(!fromAcct||!toAcct){ msErr('Account not found — re-login and try again'); return; }
  const go=document.getElementById('msGo'); go.disabled=true; go.textContent='Transferring…';
  const ref='xfer-'+Date.now()+'-'+Math.random().toString(36).slice(2,7);
  let r; try{ r=await AlpexaSync.db.rpc('app_transfer',{p_ref:ref,p_from:fromAcct,p_to:toAcct,p_amount:v}); }catch(e){ r={error:e}; }
  const res=r&&r.data;
  if((r&&r.error)||!res||res.ok===false){
    go.disabled=false; go.textContent='Transfer';
    msErr((res&&res.error)||(r&&r.error&&r.error.message)||'Transfer failed — try again');
    return;
  }
  closeMoney(); moneyStore.pull();   // 원자·멱등 — 잔고는 서버 재조회로만
}

document.getElementById('slipModes').addEventListener('click', e=>{

/* 베팅 코어 — 서버 권위 place_bet 단일 경로 (앱 1977-2035 이식). 슬립·퀵벳 팝업 공용.
   클라는 베팅 행도 잔고 차감도 절대 만들지 않는다 — 결과는 서버 재조회로만. */
async function placeBetCore(legsArr, mode, stake){
  const m=meId();
  if(!m) return {ok:false, msg:'Log in required', login:true};
  if(window.__alpexaHalt) return {ok:false, msg:'Trading paused — betting is temporarily disabled'};
  // P1 가드 (스펙 §8 차이감사): 자기배제 + 일일 손실 한도 — 앱 isLocked/checkLossLimit (:1439-1448, :1978-1979)
  if(moneyStore.rg.selfExcludeUntil&&moneyStore.rg.selfExcludeUntil>Date.now())
    return {ok:false, msg:'Account locked — Self-exclusion is active'};
  if(moneyStore.rg.lossLimit>0){
    // 오늘 베팅 스테이크 합 — 서버 ledger(kind=bet, betstake-)에서 파생: 기기·탭 무관, 위조 불가
    let lost=0;
    try{ const t0=new Date(); t0.setHours(0,0,0,0);
      const m=meId();
      const r=await AlpexaSync.db.from('ledger').select('amount')
        .eq('cust_id',m.custId).eq('server','sports').eq('kind','bet')
        .gte('created_at', t0.toISOString());
      if(r&&Array.isArray(r.data)) r.data.forEach(x=>{ if(+x.amount<0) lost+=-x.amount; });
    }catch(e){}
    if(lost>=moneyStore.rg.lossLimit)
      return {ok:false, msg:'Loss limit reached — Daily limit '+usd(moneyStore.rg.lossLimit)+' hit'};
  }
  const n=legsArr.length; if(!n) return {ok:false, msg:''};
  const d=comboDec(legsArr);
  const pot=mode==='single'?legsArr.reduce((a,l)=>a+l.stake*dec(l.am),0):stake*d;
  if(moneyStore.bal!=null&&stake>moneyStore.bal) return {ok:false, msg:'Insufficient balance — transfer funds to Sports first', fund:true};
  const _minBet=+((window.__alpexaCtrl&&window.__alpexaCtrl.minBet)||1);
  if(stake<_minBet) return {ok:false, msg:'Minimum is '+usd(_minBet)+' per bet'};
  const _maxBet=+((window.__alpexaCtrl&&window.__alpexaCtrl.maxBet)||0);
  if(_maxBet>0&&stake>_maxBet) return {ok:false, msg:'Limit is '+usd(_maxBet)+' per bet'};
  const betType=n===1?'Single':mode==='single'?'Singles':mode==='sgp'?'Same Game':'Parlay';
  const d0=comboDec(legsArr), baseCash=Math.round(stake*0.92*100)/100;
  let spTicket; try{ const k='alpexa.seq.sp', nn=parseInt(localStorage.getItem(k)||'100000',10)+1;
    localStorage.setItem(k,String(nn)); spTicket='SP-'+nn; }catch(e){ spTicket='SP-'+Math.floor(100000+Math.random()*900000); }
  const betId='b'+Date.now();
  const legsMeta=legsArr.map(l=>({pk:l.sel,sel:l.sel,gid:l.gid,market:l.market,gm:l.game,am:l.am,am0:l.am,
    dec0:dec(l.am),tm:l.tm,kt:l.kt||'',live:l.live,lg:l.lg,st:'o'}));
  const acct=m.accts&&m.accts.sports;
  if(!acct) return {ok:false, msg:'No sports account'};
  const fl=legsMeta[0]||{};
  const meta={type:betType, cls:mode, stake:stake, potential:pot, baseCash:baseCash, d0:d0,
    cashout:baseCash, ticket:spTicket, placedTs:Date.now(), legs:legsMeta};
  try{
    const res=await AlpexaSync.db.rpc('place_bet',{ p_acct:acct, p_stake:stake, p_potential:pot,
      p_symbol:betType+' · '+(fl.sel||''), p_local_id:String(betId), p_meta:meta,
      p_game:(fl.gm||''), p_pick:(fl.sel||''), p_odds:(fl.am||0), p_size:n });
    const dt=res&&res.data;
    if((res&&res.error)||(dt&&dt.ok===false))
      return {ok:false, msg:(dt&&dt.error)||(res&&res.error&&res.error.message)||'Server rejected the bet'};
    return {ok:true, ticket:spTicket};
  }catch(err){ return {ok:false, msg:'Connection issue — please try again'}; }
  finally{ moneyStore.pull(); }   // 성공/실패 모두 서버 재조회
}
document.getElementById('slipPlace').addEventListener('click', async ()=>{
  const stake=slip.mode==='single'?slip.legs.reduce((a,l)=>a+l.stake,0):(parseInt((document.getElementById('slipStake')||{}).value)||0);
  const place=document.getElementById('slipPlace'); place.disabled=true;
  const r=await placeBetCore(slip.legs, slip.mode, stake);
  if(r.ok){ slip.legs=[]; renderBoard(gamesStore.games); renderSlip(); slipNote('✓ Bet placed — '+r.ticket); }
  else slipNote(r.msg);
  renderSlipSummary();
});

function qbBuildOpts(g, market, clickedSel){
  // 클릭한 마켓의 아웃컴들 = 레전드 Buy/Sell 세그먼트의 스포츠 번역 (원정=1/홈=0, 1X2=3)
  if(market==='1X2'){ const tw=g.threeWay||[]; return [

  const arr=market==='Spread'?g.spread:market==='Total'?g.total:g.ml;
  return [ {lbl:g.away.ab, b:arr&&arr[1]}, {lbl:g.home.ab, b:arr&&arr[0]} ].filter(o=>o.b);
}
function openQuickBet(gid, market, sel, anchor){

// 팝업 드래그 (헤더 도트)
document.getElementById('qbH').addEventListener('pointerdown', e=>{
  if(e.target.closest('.qx')) return;
  e.preventDefault(); const h=e.currentTarget; h.setPointerCapture(e.pointerId);
  const r=qb.getBoundingClientRect(), ox=e.clientX-r.left, oy=e.clientY-r.top;
  const mv=ev=>{ qb.style.left=Math.max(4,ev.clientX-ox)+'px'; qb.style.top=Math.max(52,ev.clientY-oy)+'px'; };
  const up=()=>{ h.removeEventListener('pointermove',mv); h.removeEventListener('pointerup',up); };
  h.addEventListener('pointermove',mv); h.addEventListener('pointerup',up);
});

/* ── Search (레전드 §8 팝오버 + / 핫키) — 스포츠 번역: 팀/경기 검색, 리그 필, Recent ── */
const SCATS=['All','MLB','SOC','NFL','NBA','NHL','UFC','NCAAB'];
let sCat='All';
const sPop=document.getElementById('sPop');
function recentGames(){ try{ return JSON.parse(localStorage.getItem('alpexa.sbdash.recent')||'[]'); }catch(e){ return []; } }
function pushRecent(gid){ try{ const r=recentGames().filter(x=>x!==gid); r.unshift(gid);
  localStorage.setItem('alpexa.sbdash.recent', JSON.stringify(r.slice(0,6))); }catch(e){} }   // UI 설정 — 돈 아님 (로컬 OK)
function openSearch(){ sPop.classList.add('open'); renderSearch(); setTimeout(()=>document.getElementById('sIn').focus(),0); }
function closeSearch(){ sPop.classList.remove('open'); document.getElementById('sIn').value=''; if(gameQuery){ gameQuery=''; renderBoard(gamesStore.games); } }
function renderSearch(){
  document.getElementById('sCats').innerHTML=SCATS.map(c=>
    '<button class="cat'+(c===sCat?' on':'')+'" data-cat="'+c+'">'+c+'</button>').join('');
  const q=(document.getElementById('sIn').value||'').trim().toLowerCase();
  let pool=gamesStore.games;
  if(sCat!=='All') pool=pool.filter(g=>g.lg===sCat);
  let list, sect;
  if(q){ sect='Results';
    list=pool.filter(g=>[g.away.ab,g.away.nm,g.home.ab,g.home.nm].some(t=>String(t||'').toLowerCase().includes(q))).slice(0,12);
  }else{ sect='Recent';
    const rec=recentGames(); list=rec.map(gid=>pool.find(g=>g.gid===gid)).filter(Boolean);
    if(!list.length){ sect='Today'; list=pool.slice().sort((a,b)=>String(a.iso||'').localeCompare(String(b.iso||''))).slice(0,8); }
  }
  document.getElementById('sSect').textContent=sect;
  document.getElementById('sList').innerHTML=list.length?list.map(g=>
    '<div class="srow" data-gid="'+esc(g.gid)+'" data-lg="'+esc(g.lg)+'">'+
    '<span class="ab">'+esc(g.away.ab)+' @ '+esc(g.home.ab)+'</span>'+
    '<span class="ic">'+(ICONS[g.lg]||'')+'</span>'+
    '<span class="nm">'+esc(g.away.nm)+' @ '+esc(g.home.nm)+'</span>'+
    '<span class="st'+(g.live?' live':'')+'">'+(g.live?'● ':'')+esc(g.time)+'</span></div>').join('')
    :'<div class="none">No matches</div>';
}
document.getElementById('sIn').addEventListener('input', ()=>{
  gameQuery=(document.getElementById('sIn').value||'').trim();   // 팝오버 타이핑 = 보드 실시간 필터 (앱 홈 검색바 동작)
  renderSearch(); renderBoard(gamesStore.games); });
document.getElementById('sClr').addEventListener('click', ()=>{ document.getElementById('sIn').value=''; gameQuery=''; renderSearch(); renderBoard(gamesStore.games); });
document.getElementById('sCats').addEventListener('click', e=>{ const c=e.target.closest('.cat'); if(!c) return;
  sCat=c.dataset.cat; renderSearch(); });
document.getElementById('sList').addEventListener('click', e=>{ const r=e.target.closest('.srow'); if(!r) return;
  const gid=r.dataset.gid, lg=r.dataset.lg; pushRecent(gid);
  if(lg&&lg!==selLg){ selLg=lg; renderLeagues(gamesStore.games); renderBoard(gamesStore.games); renderSchedule(gamesStore.games); }
  closeSearch();
  const row=document.querySelector('.obrow[data-gid="'+gid+'"]');
  if(row){ row.scrollIntoView({block:'center'}); row.classList.add('flash'); setTimeout(()=>row.classList.remove('flash'),1400); }
});
// 열기: 보드 타이틀바 🔍(레전드 §8: 검색은 타이틀바에 산다 — 동적 삽입) + `/` 핫키 · 닫기: Esc/바깥
(function(){ const tb=document.querySelector('#w-board .wtb');
  const ic=document.createElement('span'); ic.className='wic'; ic.title='Search';
  ic.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>';
  tb.insertBefore(ic, tb.querySelector('.wic'));
  ic.addEventListener('click', e=>{ e.stopPropagation();
    sPop.classList.contains('open')?closeSearch():openSearch(); });
})();
sPop.addEventListener('click', e=>e.stopPropagation());
document.addEventListener('click', ()=>closeSearch());
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ try{ fxEsc(); }catch(err){} closeSearch(); }
  else if(e.key==='/'&&!/INPUT|TEXTAREA/.test((document.activeElement||{}).tagName||'')){ e.preventDefault(); openSearch(); }
});

/* ── Add widget 메뉴: 닫은 위젯 다시 추가 / ✓ = 이미 표시 중(클릭 시 해당 위젯 앞으로) ── */
const addMenu=document.getElementById('addMenu');
document.getElementById('btnAdd').onclick=(e)=>{ e.stopPropagation();
  renderAddMenu(); addMenu.style.display=addMenu.style.display==='none'?'block':'none'; };
addMenu.addEventListener('click', e=>{ const r=e.target.closest('.addrow'); if(!r) return;
  const id=r.dataset.id;
  if(layout[id].hidden){ setHidden(id,false); bringToFront(id); }   // 다시 추가 (기존 자리·크기 복원 + 맨 앞)
  else{ const el=document.getElementById('w-'+id);      // 이미 있음 → 맨 앞 + 잠깐 하이라이트로 위치 알림
    bringToFront(id);
    el.style.borderColor='var(--lgd-up)'; setTimeout(()=>{ el.style.borderColor=''; },700); }

/* ── ⑦ 아바타 메뉴: 계정(로그인/사인아웃) + Odds format (설정 저장은 앱 공유 alpexaSettings) ── */
const avMenu=document.getElementById('avMenu');
/* 로그인 홉: 고정 토큰(alpexa.dest2)을 이 탭 sessionStorage에 심고 login.html로 이동 —
   URL로 착지를 지정하지 않는다 (login.html fxDest의 닫힌 allowlist 계약, 오픈리다이렉트 표면 0).
   세션은 sessionStorage(탭별)이므로 반드시 같은 탭 왕복이어야 대시보드가 세션을 본다. */
function goLogin(){ try{ sessionStorage.setItem('alpexa.dest2','sports-dashboard'); }catch(e){}
  location.href='login.html'; }
/* 사인아웃 — alpexa-sync 문법 그대로(:330-336): auth.signOut() + 로컬 신원 태그 3종 제거
   (안 지우면 유령 세션 — 결함 #30) + login.html?switch=1 착지(자동 재로그인 방지) */
function doSignOut(){
  try{ if(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.db.auth) AlpexaSync.db.auth.signOut(); }catch(e){}
  try{ ['alpexa.me','alpexa.userName','alpexa.userEmail'].forEach(k=>localStorage.removeItem(k)); }catch(e){}
  try{ sessionStorage.setItem('alpexa.dest2','sports-dashboard'); }catch(e){}   // 재로그인 시 대시보드 복귀
  try{ location.replace('login.html?switch=1'); }catch(e){ location.href='login.html?switch=1'; }
}
function renderAvMenu(){
  const tag=meId(), m=moneyStore.authed?tag:null;   // 태그+세션 둘 다 있어야 로그인 (유령 세션 게이트)
  avMenu.innerHTML='<div class="mh">'+t('Account')+'</div>'+(m
    ? '<div class="mo" style="cursor:default"><span class="ck">●</span><b>'+esc(m.name||'Account')+'</b><span class="sub">'+esc(m.custId||'')+'</span></div>'+
      '<div class="mo" data-act="signout"><span class="ck"></span><b>'+t('Sign out')+'</b></div>'
    : '<div class="mo" data-act="login"><span class="ck"></span><b>'+t('Log in')+'</b><span class="sub">'+
      ((tag&&moneyStore.sessAbsent)?'session expired':'real account')+'</span></div>')+
  '<div class="mh">'+t('Odds format')+'</div>'+ODDS_OPTS.map(o=>
    '<div class="mo" data-odds="'+o.v+'"><span class="ck">'+(settings.oddsFormat===o.v?'✓':'')+'</span>'+
    '<b>'+o.lbl+'</b><span class="sub">'+o.sub+'</span></div>').join('')+
  '<div class="mh">'+t('Language')+'</div>'+LANGS.map(function(l){return '<div class="mo" data-lang="'+l[0]+'"><span class="ck">'+(LANG.cur===l[0]?'✓':'')+'</span><b>'+l[1]+'</b></div>';}).join('');
}
document.getElementById('btnAv').onclick=(e)=>{ e.stopPropagation();
  renderAvMenu(); avMenu.style.display=avMenu.style.display==='block'?'none':'block'; };
avMenu.addEventListener('click', e=>{ const o=e.target.closest('.mo'); if(!o) return;
  e.stopPropagation();
  if(o.dataset.act==='login'){ goLogin(); return; }
  if(o.dataset.act==='signout'){ doSignOut(); return; }
  if(o.dataset.odds){ setOddsFormat(o.dataset.odds); renderAvMenu(); return; }
  if(o.dataset.lang){ setLang(o.dataset.lang); return; } });
// 아바타 로그인 상태 점 (초록 = 세션 있음)
moneyStore.sub(ms=>{ const d=document.getElementById('avDot'); if(d) d.style.display=ms.authed?'block':'none'; });
document.addEventListener('click', ()=>{ avMenu.style.display='none'; });
function rerenderOdds(){ const gs=gamesStore.games;
  renderBoard(gs); renderSchedule(gs); renderLive(gs); renderBets();
  try{ renderSlip(); }catch(e){} }

/* ── 서버 탭 (+ 메뉴): Alpexa FX = 웹트레이더 임베드 풀스크린, ESC = 미니 창 ──
   레전드 레이아웃 탭의 알펙사 번역 — 우리 스타일(.htab 필 + 기존 메뉴 문법) 그대로.
   FX 터미널은 iframe으로 webtrade.html "한 진실" 임베드 (복제 금지). 같은 탭·같은
   sessionStorage라 로그인 세션이 그대로 통한다. 크립토 컴퓨터용은 미구현(이번 주). */
const tabMenu=document.getElementById('tabMenu'), fxTab=document.getElementById('fxTab');
let fxOv=null;
function ensureFxOv(){
  if(fxOv) return fxOv;
  // 크롬 없음 (사용자 확정 2026-07-15: 상단 바 삭제 — 허가 없는 디자인 추가 금지).
  // 조작은 기존 것만: ESC = 닫고 대시보드 복귀, 헤더 Alpexa FX 탭 = 닫기/열기.
  fxOv=document.createElement('div'); fxOv.className='fxov';
  fxOv.innerHTML='<iframe id="fxFrame" title="Alpexa FX WebTrade terminal"></iframe>';
  document.body.appendChild(fxOv);
  const fr=document.getElementById('fxFrame');
  fr.addEventListener('load', ()=>{ try{   // 같은 출처 — iframe 안에서 눌러도 ESC가 통하게
    fr.contentDocument.addEventListener('keydown', e=>{ if(e.key==='Escape') fxEsc(); }); }catch(e){} });
  return fxOv;
}
function openFx(){
  ensureFxOv();
  const fr=document.getElementById('fxFrame');
  if(!fr.src) fr.src='webtrade.html';   // 첫 오픈에만 로드 (대시보드 부팅 무영향)
  fxOv.classList.add('open');
  fxTab.style.display='flex'; fxTab.classList.add('on');
  // 네이티브 풀스크린 (사용자 확정 2026-07-15): 서버 전환 = 화면 위까지 꽉 채움.
  // ESC는 브라우저가 직접 처리 — iframe 어디에 포커스가 있어도 무조건 동작
  // (라이브에서 keydown 바인딩 ESC가 안 먹히던 문제의 근본 해결).
  try{ if(fxOv.requestFullscreen) fxOv.requestFullscreen().catch(()=>{}); }catch(e){}
}
function closeFx(){
  if(document.fullscreenElement){ try{ document.exitFullscreen(); }catch(e){} }
  if(fxOv) fxOv.classList.remove('open'); fxTab.classList.remove('on');
}
// 브라우저 ESC로 풀스크린이 풀리면 → 오버레이 완전 닫고 대시보드 복귀
// (2026-07-15 사용자: 미니 잔상이 대시보드 위에 어중간하게 남는 문제 폐기)
document.addEventListener('fullscreenchange', ()=>{
  if(!document.fullscreenElement && fxOv && fxOv.classList.contains('open')) closeFx();
});
function fxEsc(){   // 폴백 (풀스크린 API 거부/미지원 환경): ESC = 닫기
  if(!(fxOv&&fxOv.classList.contains('open'))) return;
  closeFx();
}
fxTab.addEventListener('click', ()=>{ (fxOv&&fxOv.classList.contains('open'))?closeFx():openFx(); });
// 헤더 화살표 = 풀스크린 토글 (2026-07-15 사용자 확정 — 구 Open app 링크 대체)
document.getElementById('btnFull').addEventListener('click', ()=>{
  if(document.fullscreenElement===document.documentElement){ try{ document.exitFullscreen(); }catch(e){} return; }
  try{ if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{}); }catch(e){}
});
// 앱 전환 칩 — 크립토 대시보드로 (같은 탭 = 세션 유지. 활성화 시 경로 갱신 예정)
document.getElementById('goCrypto').addEventListener('click', ()=>{ location.href='/dev/crypto-dashboard.html'; });
// 라이트/다크 토글 (2026-07-17) — classList만 (className 통째 대입 금지, 결함-로그 2026-07-16)
const SB_THKEY='alpexa.sbdash.theme.v2';   // 분리 키 (2026-07-17 사장님 확정): 스포츠 = 다크 기본
function applyThemeSB(){ const light=(localStorage.getItem(SB_THKEY)||'dark')==='light';   // 기본 = 다크
  document.body.classList.toggle('light', light);
  const mo=document.getElementById('thMoon'), su=document.getElementById('thSun');
  if(mo) mo.style.display=light?'none':''; if(su) su.style.display=light?'':'none'; }
document.getElementById('btnTheme').addEventListener('click', ()=>{
  localStorage.setItem(SB_THKEY, localStorage.getItem(SB_THKEY)==='light'?'dark':'light'); applyThemeSB(); });
applyThemeSB();
// sbTab 풀스크린 제거 (2026-07-17 사장님 지시) — 풀스크린은 오른쪽 버튼만.
// 탭 본연의 의미는 유지: FX 오버레이가 떠 있으면 Sports 탭 클릭 = 스포츠로 복귀.
document.getElementById('sbTab').addEventListener('click', ()=>{
  if(fxOv && fxOv.classList.contains('open')) closeFx();
});
document.getElementById('btnTabs').onclick=(e)=>{ e.stopPropagation();
  tabMenu.innerHTML=
    '<div class="tabrow" data-tab="fx"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 17l6-7 4 4 7-9"/></svg>Alpexa FX<span class="sub">WebTrade terminal</span></div>'+
    '<div class="tabrow dis" data-tab="crypto">🪙 Alpexa Crypto<span class="sub">Coming this week</span></div>';
  tabMenu.style.display=tabMenu.style.display==='block'?'none':'block'; };
tabMenu.addEventListener('click', e=>{ const r=e.target.closest('.tabrow'); if(!r) return;
  e.stopPropagation(); tabMenu.style.display='none';
  if(r.dataset.tab==='fx') openFx(); });   // crypto = 예고만 (컴퓨터용 미구현)
document.addEventListener('click', ()=>{ tabMenu.style.display='none'; });

// 위젯 ⋮ 메뉴: v1 액션 = Close (레전드 §3 크롬 — 커스터마이즈 확장 예정)
document.querySelectorAll('.widget .wic[title="Close widget"]').forEach(ic=>{
  ic.addEventListener('click', e=>{ e.stopPropagation();
    const id=ic.closest('.widget').id.replace(/^w-/,''); setHidden(id,true); });
  ic.title='Close widget';
});

/* ════════════════════ 부팅 ════════════════════ */
gamesStore.sub(games=>{ renderLeagues(games); renderBoard(games); renderSchedule(games); renderLive(games); });
refitLayout();   // 첫 페인트부터 현재 뷰포트를 수학적으로 채움 (저장 배치는 비율 보존)
applyLang(); gamesStore.start();
moneyStore.start();
</script>
