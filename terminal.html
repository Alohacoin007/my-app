<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Alpexa · FX Terminal (Legend)</title>
<link rel="stylesheet" href="../legend-ui.css">
<!-- M2 실시세: 서버 prices 읽기 전용(공개 키). CDN/AlpexaSync 실패 시 SIM 폴백 유지 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../alpexa-sync.js?v=16"></script>
<style>
/* ══ FX 레전드 터미널 — M1 셸(기초공사). 크립토/스포츠 대시보드 위젯 엔진 재사용.
   기존 FX 코드(webtrade/trading) 0터치 · legend-ui.css 읽기 전용 링크. 돈 코드 0. ══ */
*{box-sizing:border-box; margin:0}
*{scrollbar-width:none; -ms-overflow-style:none}
*::-webkit-scrollbar{display:none}
/* 미니멀 · 직사각형 — 레전드 라운드 토큰을 샤프하게 오버라이드 */
body{color:var(--lgd-ink,#F5F6F7); overflow:hidden; font-family:var(--lgd-font,system-ui,-apple-system,Segoe UI,sans-serif);
  --lgd-r-widget:2px; --lgd-r-btn:2px; --lgd-r-pop:2px; display:flex; flex-direction:column; height:100vh}
/* 컨셉 초록 → MT5 블루 (.lgd 특이도 이겨야 함). 차트 색 별도, --lgd-down 빨강 유지 */
body.lgd{ --lgd-up:#2E90FA; --lgd-link2:#2E90FA }
body{ --lgd-green:#00C805 }   /* 시세창(Market Watch) = 레전드 초록 상승 / 빨강 하락 */
button:active:not(:disabled),.htab:active,.hic:active,.avatar:active{ transform:scale(.97); filter:brightness(1.15) }

/* ── 헤더 (컴팩트 38px) ── */
.hdr{display:flex; align-items:center; gap:6px; height:38px; padding:0 8px; background:var(--lgd-surface);
  border-bottom:1px solid var(--lgd-hair); position:relative; z-index:60}
.mark{width:24px; height:24px; border-radius:2px; background:var(--lgd-up); color:#ffffff; font-weight:900;
  display:flex; align-items:center; justify-content:center; font-size:14px}
/* 헤더 = 아이콘 전용(글자 제거), 라벨은 hover 툴팁으로 */
.htab{display:flex; align-items:center; justify-content:center; width:30px; height:26px; flex:none;
  background:var(--lgd-pill); color:var(--lgd-ink); border-radius:var(--lgd-r-btn,2px); cursor:default;
  transition:background .12s, color .12s}
.htab.swtab{background:none; color:var(--lgd-dim); cursor:pointer}
.htab.swtab:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
/* 마우스오버 툴팁 = body 레벨(오버플로에 안 잘림). JS가 위치 지정 */
#gtip{position:fixed; display:none; background:var(--lgd-surface2); color:var(--lgd-ink); font-size:11px; font-weight:600;
  white-space:nowrap; padding:5px 8px; border-radius:2px; border:1px solid var(--lgd-hair);
  box-shadow:0 6px 18px rgba(0,0,0,.45); z-index:300; pointer-events:none}
body.light #gtip{box-shadow:0 6px 18px rgba(15,23,40,.18)}
.addtab{width:28px; height:26px; border-radius:var(--lgd-r-btn,2px); display:flex; align-items:center;
  justify-content:center; color:var(--lgd-dim); cursor:pointer; font-size:16px}
.addtab:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
.hsp{flex:1}
.hmid{display:flex; align-items:center; gap:7px; font-size:11px; color:var(--lgd-dim); font-weight:600; white-space:nowrap; flex:none}
.hmid .dot{width:7px; height:7px; border-radius:50%; background:var(--lgd-dim)}
.hmid .dot.ok{background:var(--lgd-up)}
.hic{width:30px; height:30px; border-radius:var(--lgd-r-btn,2px); display:flex; align-items:center;
  justify-content:center; color:var(--lgd-ink); cursor:pointer}
.hic:hover{background:var(--lgd-pill)}
/* ── MT5 툴바 (헤더 한 줄, 좁으면 가운데만 가로 스크롤) ── */
.hmenu{height:28px; padding:0 8px; border-radius:2px; display:flex; align-items:center; color:var(--lgd-dim);
  cursor:pointer; font-size:17px; flex:none}
.hmenu:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
#menuDrop{display:none; position:absolute; top:32px; left:0; z-index:70; min-width:160px; background:var(--lgd-surface2);
  border:1px solid var(--lgd-hair); border-radius:2px; box-shadow:0 8px 24px rgba(0,0,0,.5); padding:6px}
#menuDrop .mrow{display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:2px; font-size:12.5px; color:var(--lgd-dim)}
#menuDrop .mrow .sub{margin-left:auto; font-size:10px; opacity:.7}
#menuDrop .cgmhd{font-size:10px; font-weight:800; letter-spacing:.5px; color:var(--lgd-dim); text-transform:uppercase; padding:4px 10px 6px}
#menuDrop .cgsep{height:1px; background:var(--lgd-hair); margin:5px 4px}
#menuDrop .mtile{display:block; width:100%; text-align:left; background:none; border:none; color:var(--lgd-ink);
  font:600 12.5px/1 inherit; padding:8px 10px; border-radius:2px; cursor:pointer}
#menuDrop .mtile:hover{background:var(--lgd-pill)}
#menuDrop .mact{display:flex; align-items:center; gap:8px; width:100%; text-align:left; background:none; border:none;
  color:var(--lgd-ink); font:600 12.5px/1 inherit; padding:8px 10px; border-radius:2px; cursor:pointer}
#menuDrop .mact:hover{background:var(--lgd-pill)}
#menuDrop .mact .ck{margin-left:auto; color:var(--lgd-up); font-weight:800}
#menuDrop .mact .key{margin-left:auto; font-size:10px; color:var(--lgd-dim); opacity:.7}
.htoolbar{display:flex; align-items:center; gap:2px; flex:1; min-width:0; overflow-x:auto; overflow-y:visible; padding:0 4px}
.hdivider{width:1px; height:20px; background:var(--lgd-hair); margin:0 5px; flex:none}
.htool{width:28px; height:28px; border-radius:2px; display:flex; align-items:center; justify-content:center;
  color:var(--lgd-dim); cursor:pointer; flex:none}
.htool:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
.htool.on{background:var(--lgd-pill); color:var(--lgd-ink)}
.tfstrip{display:flex; align-items:center; gap:1px; flex:none}
.tfbtn{height:26px; min-width:28px; padding:0 7px; border-radius:2px; font-size:11.5px; font-weight:700;
  color:var(--lgd-dim); background:none; border:none; cursor:pointer; font-family:inherit; flex:none}
.tfbtn:hover{background:var(--lgd-pill); color:var(--lgd-ink)}
.tfbtn.on{background:rgba(46,144,250,.14); color:var(--lgd-up)}
.avatar{width:26px; height:26px; border-radius:999px; background:#3A3E42; display:flex; align-items:center;
  justify-content:center; color:#101214; cursor:pointer; font-size:12px; font-weight:800; position:relative}
.avatar.signin{background:var(--lgd-up); color:#ffffff; animation:avpulse 2s ease-in-out infinite}
@keyframes avpulse{0%,100%{box-shadow:0 0 0 0 rgba(46,144,250,.45)}50%{box-shadow:0 0 0 6px rgba(46,144,250,0)}}
#addMenu, #tabMenu{display:none; position:absolute; top:32px; z-index:70; min-width:190px;
  background:var(--lgd-surface2); border:1px solid var(--lgd-hair); border-radius:var(--lgd-r-pop,2px);
  box-shadow:0 8px 24px rgba(0,0,0,.5); padding:6px; font-size:13px}
.tabrow, .addrow{display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:2px; cursor:pointer}
.tabrow:hover, .addrow:hover{background:var(--lgd-pill)}
.tabrow.dis{cursor:default; color:var(--lgd-dim)}
.addrow .sub, .tabrow .sub{margin-left:auto; color:var(--lgd-dim); font-size:11px}

/* ── 스테이지 · 점 배경 ── */
.stage{position:relative; flex:1 1 auto; min-height:0; overflow:hidden; background:var(--lgd-bg)}
.dots{position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, rgba(255,255,255,.05) 1.2px, transparent 1.6px);
  background-size:26px 26px}

/* ── 위젯 ── */
.widget{position:absolute; display:flex; flex-direction:column; background:var(--lgd-surface);
  border:1px solid var(--lgd-hair); border-radius:var(--lgd-r-widget,12px); overflow:hidden; z-index:2}
.widget.drag{box-shadow:0 12px 32px rgba(0,0,0,.5); opacity:.97}
/* 컴팩트 타이틀바 — MT5 도크 스트립처럼 얇게(34→18), 레전드 hairline·컬러 링크 유지 */
.wtb{display:flex; align-items:center; gap:6px; height:18px; padding:0 7px;
  cursor:grab; flex:none; border-bottom:1px solid var(--lgd-hair); user-select:none}
.widget.drag .wtb{cursor:grabbing}
.wtb .linksq{width:6px; height:6px; border-radius:2px; flex:none}
.wtb h3{margin:0; font-size:10.5px; font-weight:700; letter-spacing:.2px; line-height:1}
.wtb .wsub{font-size:9.5px; color:var(--lgd-dim)}
.wtb .wsp{flex:1}
.wtb .wic{width:16px; height:16px; display:flex; align-items:center; justify-content:center;
  color:var(--lgd-dim); cursor:pointer; border-radius:2px; font-size:12px}
.wtb .wic:hover{background:var(--lgd-surface2); color:var(--lgd-ink)}
.wtb .wmin, .wtb .wmax{font-size:13px}
.widget.mini .wbody, .widget.mini .rz{display:none}   /* 최소화: 타이틀바만 */
/* 도킹 탭 그룹 — 위젯 하단 [탭][탭] (MT5 도크 탭) */
.grptabs{display:flex; align-items:center; gap:1px; flex:none; height:24px; padding:0 6px;
  border-top:1px solid var(--lgd-hair); overflow-x:auto}
.grptabs button{background:none; border:none; color:var(--lgd-dim); font:700 10.5px/1 inherit; padding:5px 9px;
  border-radius:2px; cursor:pointer; white-space:nowrap; flex:none}
.grptabs button:hover{color:var(--lgd-ink)}
.grptabs button.on{color:var(--lgd-up); box-shadow:inset 0 -2px 0 var(--lgd-up)}
.wbody{flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column}
.rz{position:absolute; z-index:6}
.rz.r{right:-3px; top:14px; bottom:16px; width:8px; cursor:ew-resize}
.rz.l{left:-3px; top:14px; bottom:16px; width:8px; cursor:ew-resize}
.rz.b{bottom:-3px; left:14px; right:16px; height:8px; cursor:ns-resize}
.rz.t{top:-3px; left:14px; right:16px; height:8px; cursor:ns-resize}
.rz.c{right:-3px; bottom:-3px; width:16px; height:16px; cursor:nwse-resize}
.rz.tl{left:-3px; top:-3px; width:14px; height:14px; cursor:nwse-resize}
.rz.tr{right:-3px; top:-3px; width:14px; height:14px; cursor:nesw-resize}
.rz.bl{left:-3px; bottom:-3px; width:14px; height:14px; cursor:nesw-resize}
.algn{position:absolute; z-index:45; background:var(--lgd-up); pointer-events:none}

/* ── 기초공사 프레임(빈 위젯) ── */
.found{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  color:var(--lgd-dim); text-align:center; padding:18px}
.found .big{font-size:15px; font-weight:800; color:var(--lgd-ink); opacity:.6}
.found .tag{background:var(--lgd-pill); border-radius:2px; padding:4px 12px; font-size:10.5px;
  font-weight:700; letter-spacing:.4px; color:var(--lgd-dim)}

/* ── 차트 창 (각 차트 = 최상위 위젯 — 스테이지 아무데나 이동) + ⊞ 개수 메뉴 ── */
.cgmenu{display:none; position:fixed; z-index:80; min-width:150px; background:var(--lgd-surface2);
  border:1px solid var(--lgd-hair); border-radius:var(--lgd-r-pop,10px); box-shadow:0 8px 24px rgba(0,0,0,.5); padding:6px}
.cgmenu .cgmhd{font-size:10px; font-weight:800; letter-spacing:.5px; color:var(--lgd-dim);
  text-transform:uppercase; padding:4px 10px 6px}
.cgmenu button{display:flex; align-items:center; gap:8px; width:100%; text-align:left; background:none;
  border:none; color:var(--lgd-ink); font:600 12px/1 inherit; padding:8px 10px; border-radius:2px; cursor:pointer}
.cgmenu button:hover{background:var(--lgd-pill)}
.cgmenu button.on{color:var(--lgd-up)}
.cgmenu button .ck{margin-left:auto; color:var(--lgd-up); opacity:0}
.cgmenu button.on .ck{opacity:1}
body.light .cgmenu{box-shadow:0 8px 24px rgba(15,23,40,.18)}

/* ── Market Watch (시세) — MT5 Symbol·Bid·Ask·Spread ── */
.mwwrap{flex:1; min-height:0; display:flex; flex-direction:column}
.mwfeed{font-size:8.5px; font-weight:800; letter-spacing:.6px; padding:3px 7px; border-radius:2px;
  background:rgba(240,180,40,.15); color:#E0A020}
.mwfeed.live{background:rgba(46,144,250,.15); color:var(--lgd-up)}
.mwgrid{display:grid; gap:4px}  /* grid-template-columns는 활성 컬럼대로 인라인 지정(우클릭 토글) */
.mwhd{padding:6px 10px; flex:none; font-size:9.5px; font-weight:800; letter-spacing:.4px;
  color:var(--lgd-dim); text-transform:uppercase; border-bottom:1px solid var(--lgd-hair)}
.mwhd div:not(:first-child), .mwrow .mwpx, .mwrow .mwspr{text-align:right}
.mwlist{flex:1; min-height:0; overflow:auto}
.mwrow{padding:5px 10px; font-size:12px; border-bottom:1px solid rgba(128,128,128,.10); cursor:grab}   /* MT5 밀도 — 전 심볼 노출용 */
.mwrow:hover{background:var(--lgd-surface2)}
.mwrow:active{cursor:grabbing}
/* 심볼 드래그 중 차트 위 드롭 하이라이트(MT5) */
body.symdrag .widget[id^="w-chart"]{outline:1px dashed var(--lgd-hair); outline-offset:-2px}
.widget.dropok{outline:2px solid var(--lgd-up)!important; outline-offset:-2px}
.mwrow.sel{background:var(--lgd-surface2); box-shadow:inset 2px 0 0 var(--lgd-up)}
/* M2 실시세 배지 — LIVE(초록)=신선 · STALE(주황 점멸)=실피드 끊김(동결) · 배지 없음=SIM */
.mwlive{font-size:8.5px; font-weight:800; letter-spacing:.6px; padding:2px 7px; border-radius:2px; margin-right:6px}
.mwlive.live{background:rgba(0,200,5,.15); color:var(--lgd-green,#00C805)}
.mwlive.sim{background:rgba(128,136,150,.18); color:var(--lgd-dim)}
.mwlive.stale{background:rgba(240,180,40,.15); color:#E0A020; animation:mwstale 1.6s ease-in-out infinite}
@keyframes mwstale{0%,100%{opacity:1}50%{opacity:.4}}
.mwsym{font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.mwpx{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; font-weight:600; color:var(--lgd-dim); white-space:nowrap}
.mwpx.up{color:var(--lgd-up)} .mwpx.down{color:var(--lgd-down,#EB5D2A)}   /* 시세창 상승 = MT5 블루 (2026-07-19 사장님 지시로 초록→블루 원복) */
.mwspr{font-variant-numeric:tabular-nums; color:var(--lgd-dim); font-size:11px; opacity:.85}
/* ── Market Watch 하위탭: Details(선택 심볼 상세, MT5) ── */
.mwdetwrap{flex:1; min-height:0; display:flex; flex-direction:column; overflow:auto}
.mwdetbar{flex:none; padding:5px 8px; border-bottom:1px solid var(--lgd-hair)}
.mwdetsel{width:100%}
.mwdetname{flex:none; padding:6px 10px; font-size:11px; font-weight:700; color:var(--lgd-ink); border-bottom:1px solid var(--lgd-hair)}
.mwdetrows{flex:none}
.mwdrow{display:grid; grid-template-columns:16px 1fr auto; align-items:center; gap:8px; padding:6px 12px; font-size:12px}
.mwdrow:nth-child(even){background:var(--lgd-surface2)}
.mwdlbl{color:var(--lgd-dim)}
.mwdval{font-variant-numeric:tabular-nums; font-weight:700; text-align:right; color:var(--lgd-ink)}
.mwdval.up{color:var(--lgd-up)} .mwdval.dn{color:var(--lgd-down,#EB5D2A)}
.mwdar{font-size:11px; font-weight:800; text-align:center; line-height:1}
.mwdar.up{color:#26A69A} .mwdar.dn{color:#EF5350} .mwdar.fl{color:var(--lgd-dim)}
/* ── Market Watch 하위탭: Trading(원클릭·DEMO) ── */
.mwtradewrap,.mwtickwrap{flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden}
.mwtradebar{flex:none; display:flex; align-items:center; justify-content:space-between; gap:8px; padding:5px 10px;
  font-size:9px; font-weight:800; letter-spacing:.5px; color:#E0A020; background:rgba(240,180,40,.10); border-bottom:1px solid var(--lgd-hair)}
.mwvol{display:inline-flex; align-items:center; gap:6px; color:var(--lgd-ink)}
.mwvol button{width:16px; height:16px; line-height:1; border:1px solid var(--lgd-hair); background:var(--lgd-pill); color:var(--lgd-ink); border-radius:3px; cursor:pointer; font-weight:800}
.mwvol b{min-width:34px; text-align:center; font-variant-numeric:tabular-nums}
.mwtlist{flex:1; min-height:0; overflow:auto}
.mwtrow{display:grid; grid-template-columns:1.1fr 1.5fr .6fr 1.5fr; gap:5px; align-items:center; padding:5px 10px; border-bottom:1px solid rgba(128,128,128,.10)}
.mwtsym{font-weight:700}
.mwtsell,.mwtbuy{display:flex; flex-direction:column; align-items:center; gap:1px; padding:4px 2px; border-radius:4px; cursor:pointer;
  border:1px solid var(--lgd-hair); background:var(--lgd-pill); font-family:inherit}
.mwtsell span,.mwtbuy span{font-size:8px; font-weight:800; letter-spacing:.6px; opacity:.7}
.mwtsell b,.mwtbuy b{font-size:12px; font-weight:700; font-variant-numeric:tabular-nums}
.mwtsell{color:var(--lgd-down,#EB5D2A)} .mwtsell:hover{background:rgba(235,93,42,.14)}
.mwtbuy{color:var(--lgd-up)} .mwtbuy:hover{background:rgba(46,144,250,.14)}
.mwtsell b.up,.mwtbuy b.up{color:var(--lgd-up)} .mwtsell b.dn,.mwtbuy b.dn{color:var(--lgd-down,#EB5D2A)}
.mwtspr{text-align:center; font-size:10px; color:var(--lgd-dim); font-variant-numeric:tabular-nums}
/* ── Market Watch 하위탭: Ticks(실시간 Bid/Ask 라인) ── */
.mwtickbar{flex:none; display:flex; align-items:center; gap:10px; padding:5px 10px; border-bottom:1px solid var(--lgd-hair); font-size:11px}
.mwticksel{background:var(--lgd-pill); color:var(--lgd-ink); border:1px solid var(--lgd-hair); border-radius:3px; padding:2px 4px; font-family:inherit; font-weight:700}
.mwtickrd{display:flex; align-items:center; gap:5px; color:var(--lgd-dim); font-variant-numeric:tabular-nums}
.mwtickrd b{color:var(--lgd-ink)} .mwtickrd .mwspr{margin-left:2px}
.mwtickrd .dot{width:7px; height:7px; border-radius:50%; display:inline-block}
.mwtickrd .dot.bid{background:var(--lgd-up)} .mwtickrd .dot.ask{background:var(--lgd-down,#EB5D2A)}
.mwtickplot{flex:1; min-height:0; position:relative; padding:6px 8px}
.mwticksvg{width:100%; height:100%; display:block}
/* 차트 창 본문(스켈레톤 + TF/M2 오버레이) — 껍데기는 표준 .widget/.wtb/.rz 재사용 */
.cgwplot{flex:1; min-height:0; position:relative; display:flex; user-select:none; -webkit-user-select:none}
.cgwplot > svg{width:100%; height:100%; display:block; position:absolute; inset:0}   /* 직계 svg만(=cgsvg/cgcross). 툴바 아이콘 svg는 제외 */
.cgwplot .cgcross{pointer-events:none; z-index:1}   /* 크로스헤어 오버레이(별도 레이어 — 틱 재렌더에 안 지워짐) */
.cgwplot.crossmode{cursor:crosshair}
/* 활성(포커스) 차트 — 헤더만 아주 은은하게(네온 파랑 제거, 티 안나게) */
.widget.chart-active .wtb{background:var(--lgd-surface2)}
.widget.chart-active .wtb h3{color:var(--lgd-ink)}
.cgtf{position:absolute; bottom:24px; left:8px; font-size:9.5px; font-weight:800; color:var(--lgd-dim); letter-spacing:.4px}   /* 좌하단(시간축 위) — 상단 DEMO 칩과 겹침 방지 */
/* 차트 지표 범례(원클릭 삭제) — 좌상단, TF 라벨 아래. 칩별 ✕ 한 번에 그 지표 제거 */
.chleg{position:absolute; top:36px; left:8px; z-index:2; display:flex; flex-wrap:wrap; gap:4px; pointer-events:none; max-width:70%}
.chchip{pointer-events:auto; display:inline-flex; align-items:center; gap:5px; font-size:9.5px; font-weight:700;
  line-height:1; padding:2px 4px 2px 6px; border-radius:3px; background:var(--lgd-pill); color:var(--lgd-dim);
  border:1px solid var(--lgd-hair); user-select:none}
.chchip .chsw{width:7px; height:7px; border-radius:1px; flex:none}
.chchip .chx{cursor:pointer; font-size:11px; font-weight:800; color:var(--lgd-dim); opacity:.55; padding:0 1px; border-radius:2px}
.chchip .chx:hover{opacity:1; color:var(--lgd-down,#EB5D2A); background:var(--lgd-surface2)}
/* (차트 왼쪽 라인스터디 사이드바 CSS 제거 — 2026-07-19, 기능은 상단 툴바) */
/* 차트 원클릭 매매 바 — 상단, 가격 크고 뚜렷. SELL 빨강 / BUY 초록(레전드) */
.ocbar{position:absolute; top:3px; left:6px; z-index:4; display:flex; align-items:stretch; gap:4px; font-size:10px; max-width:calc(100% - 62px)}
.ocbar.mclosed .ocsell,.ocbar.mclosed .ocbuy{opacity:.35; filter:grayscale(.6); cursor:not-allowed}
.ocbar.mclosed .ocsell::after,.ocbar.mclosed .ocbuy::after{content:' 🔒'}
.ocvol{display:flex; align-items:center; gap:1px; background:rgba(18,24,34,.72); border:1px solid var(--lgd-hair); border-radius:4px; padding:0 2px}
.ocvb{width:15px; height:100%; min-height:22px; border:none; background:transparent; color:var(--lgd-ink); font-weight:800; font-size:13px; cursor:pointer; line-height:1}
.ocvb:hover{color:var(--lgd-up)}
.ocvv{min-width:32px; text-align:center; font-weight:700; font-variant-numeric:tabular-nums; color:var(--lgd-ink)}
.octrade{display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:70px; padding:2px 8px; border-radius:4px;
  cursor:pointer; border:1px solid; background:rgba(18,24,34,.72); font-family:inherit; line-height:1.05}
.ocl{font-size:8px; font-weight:800; letter-spacing:.7px; opacity:.85}
.octrade b{font-size:13.5px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:.2px}
.octrade b.dn{opacity:.9}
.ocsell{color:var(--lgd-down,#EB5D2A); border-color:rgba(235,93,42,.55)} .ocsell:hover{background:rgba(235,93,42,.18)}
.ocbuy{color:var(--lgd-green,#00C805); border-color:rgba(0,200,5,.5)} .ocbuy:hover{background:rgba(0,200,5,.16)}
.ocspr{display:flex; align-items:center; justify-content:center; min-width:26px; padding:0 5px; font-size:10px; font-weight:800;
  color:var(--lgd-dim); background:rgba(18,24,34,.72); border:1px solid var(--lgd-hair); border-radius:4px; font-variant-numeric:tabular-nums}
.ocmore{width:18px; border:1px solid var(--lgd-hair); background:rgba(18,24,34,.72); color:var(--lgd-dim); border-radius:4px; cursor:pointer; font-size:11px}
.ocmore:hover{color:var(--lgd-ink)}
.ocohlc{display:flex; align-items:center; padding-left:8px; color:var(--lgd-dim); white-space:nowrap; overflow:hidden; font-size:9px; font-variant-numeric:tabular-nums}
/* 주문 티켓 다이얼로그(MT5) */
.ordback{position:fixed; inset:0; z-index:220; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center}
.ordbox{width:320px; max-width:92vw; background:var(--lgd-surface); border:1px solid var(--lgd-hair); border-radius:6px; box-shadow:0 20px 60px rgba(0,0,0,.5); overflow:hidden}
.ordhd{display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-bottom:1px solid var(--lgd-hair); font-size:13px}
.ordx{cursor:pointer; color:var(--lgd-dim); font-size:14px} .ordx:hover{color:var(--lgd-ink)}
.ordbadge{padding:5px 12px; font-size:9px; font-weight:800; letter-spacing:.4px; color:#E0A020; background:rgba(240,180,40,.10); border-bottom:1px solid var(--lgd-hair)}
.ordbadge.ordlive{color:#F23645; border-color:rgba(242,54,69,.5); background:rgba(242,54,69,.08)}
.ordbody{padding:10px 12px; display:flex; flex-direction:column; gap:7px}
.ordrow{display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:12px}
.ordlbl{color:var(--lgd-dim)}
.ordsel{flex:1; max-width:190px; background:var(--lgd-pill); color:var(--lgd-ink); border:1px solid var(--lgd-hair); border-radius:3px; padding:3px 5px; font-family:inherit; font-weight:600}
.ordfield{display:flex; align-items:center; gap:3px}
.ordstep{width:20px; height:22px; border:1px solid var(--lgd-hair); background:var(--lgd-pill); color:var(--lgd-ink); border-radius:3px; cursor:pointer; font-weight:800}
.ordinput{width:96px; height:22px; text-align:right; background:var(--lgd-bg,#0d1117); color:var(--lgd-ink); border:1px solid var(--lgd-hair); border-radius:3px; padding:0 6px; font-family:inherit; font-variant-numeric:tabular-nums; font-weight:600}
.ordquote{display:flex; align-items:center; justify-content:space-between; gap:6px; padding:6px 8px; background:var(--lgd-surface2); border-radius:4px; font-size:12px; font-variant-numeric:tabular-nums}
.ordquote .dot{width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:4px}
.ordquote .dot.sell{background:var(--lgd-down,#EB5D2A)} .ordquote .dot.buy{background:var(--lgd-green,#00C805)}
.ordquote b{color:var(--lgd-ink)} .odsprwrap{color:var(--lgd-dim)}
.ordbtns{display:flex; gap:8px; padding:10px 12px 12px}
.ordsell,.ordbuy,.ordplace{flex:1; display:flex; flex-direction:column; align-items:center; gap:1px; padding:8px; border-radius:5px; cursor:pointer; border:1px solid; background:transparent; font-family:inherit}
.ordsell span,.ordbuy span{font-size:9px; font-weight:800; letter-spacing:.6px}
.ordsell b,.ordbuy b{font-size:15px; font-weight:800; font-variant-numeric:tabular-nums}
.ordsell{color:var(--lgd-down,#EB5D2A); border-color:rgba(235,93,42,.55)} .ordsell:hover{background:rgba(235,93,42,.16)}
.ordbuy{color:var(--lgd-green,#00C805); border-color:rgba(0,200,5,.5)} .ordbuy:hover{background:rgba(0,200,5,.16)}
.ordplace{color:var(--lgd-ink); border-color:var(--lgd-up); background:rgba(46,144,250,.14); font-weight:800; font-size:13px}
.ordplace:hover{background:rgba(46,144,250,.24)}
.cgtag{position:absolute; top:5px; right:8px; background:var(--lgd-pill); color:var(--lgd-dim); font-size:9px;
  font-weight:800; border-radius:2px; padding:2px 6px; letter-spacing:.5px}

/* ── Toolbox = 하단 도크(#dock) — 상단 리사이즈 핸들 · 내용 · 바닥 탭. 접기 가능 ── */
/* MT5: 좌측 세로 헤드(× + "Toolbox" 세로) + 우측 본체(리사이즈/내용/탭) */
#dock{flex:none; display:flex; flex-direction:row; background:var(--lgd-surface);
  border-top:1px solid var(--lgd-hair); position:relative; z-index:55}
.dockside{width:20px; flex:none; display:flex; flex-direction:column; align-items:center;
  border-right:1px solid var(--lgd-hair); padding-top:3px; gap:4px}
.dockclose{width:16px; height:16px; display:flex; align-items:center; justify-content:center; color:var(--lgd-dim);
  cursor:pointer; border-radius:2px; flex:none; font-size:11px}
.dockclose:hover{background:var(--lgd-down,#EB5D2A); color:#fff}
.dockvlabel{writing-mode:vertical-rl; transform:rotate(180deg); font-size:9px; font-weight:800;
  letter-spacing:.5px; text-transform:uppercase; color:var(--lgd-dim); margin-top:5px}
.dockmain{flex:1; min-width:0; display:flex; flex-direction:column}
.dockrz{height:6px; margin-top:-3px; cursor:row-resize; flex:none; z-index:2}
.dockrz:hover{background:var(--lgd-hair)}
.dockcontent{overflow:hidden; display:flex; flex-direction:column; min-height:0}  /* 높이는 JS가 지정 */
.docktabs{display:flex; align-items:center; gap:1px; height:26px; flex:none; padding:0 8px;
  border-top:1px solid var(--lgd-hair); overflow-x:auto}
.dtabs{display:flex; align-items:center; gap:1px; flex:none}
.docktabs button{background:none; border:none; color:var(--lgd-dim); font:700 11px/1 inherit; padding:6px 9px;
  border-radius:2px; cursor:pointer; white-space:nowrap; flex:none}
.docktabs button:hover{color:var(--lgd-ink)}
.docktabs button.on{color:var(--lgd-up); box-shadow:inset 0 -2px 0 var(--lgd-up)}
/* 포지션 원클릭 청산 X (행 우측) */
.poclose{display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:2px;
  color:var(--lgd-dim); cursor:pointer; font-size:11px; font-weight:700}
.poclose:hover{background:var(--lgd-down,#EB5D2A); color:#fff}
/* M3 실포지션 — 청산은 M5(fx_close)라 ✕ 대신 — (읽기 전용) */
.ponoclose{display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; color:var(--lgd-dim); cursor:default; font-size:11px}
.acctlive{display:inline-flex; align-items:center; padding:1px 6px; border-radius:3px; font-size:9.5px; font-weight:800; letter-spacing:.5px;
  background:color-mix(in srgb, var(--lgd-up) 18%, transparent); color:var(--lgd-up); border:1px solid var(--lgd-up)}
.postbl td.pox, .postbl th:last-child{text-align:center; padding:2px 6px; width:32px}
/* Trade 탭: 포지션 스크롤(위) + 계좌 sticky 푸터(아래, 포지션 수 무관 항상 표시) */
.tbxscroll{flex:1; min-height:0; overflow:auto}
.tbxacct{display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:5px 10px; flex:none;
  font-size:11.5px; border-top:1px solid var(--lgd-hair); background:var(--lgd-surface2)}
.tbxacct span{color:var(--lgd-dim)} .tbxacct b{color:var(--lgd-ink); font-weight:700; font-variant-numeric:tabular-nums; margin-left:4px}
.tbxtotal{margin-left:auto; margin-right:32px; font-weight:800; font-variant-numeric:tabular-nums; font-size:12px}  /* Profit 열 아래 정렬(청산 X열폭 32px만큼 왼쪽) */
.postbl{width:100%; border-collapse:collapse; font-size:11.5px; table-layout:fixed}
.postbl th, .postbl td{white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.postbl th{position:sticky; top:0; background:var(--lgd-surface); text-align:right; font-weight:700; color:var(--lgd-dim);
  padding:5px 10px; font-size:9.5px; text-transform:uppercase; letter-spacing:.3px; border-bottom:1px solid var(--lgd-hair)}
.postbl th:first-child, .postbl td:first-child{text-align:left}
.postbl td{text-align:right; padding:5px 10px; border-bottom:1px solid rgba(128,128,128,.08); font-variant-numeric:tabular-nums; color:var(--lgd-ink)}   /* 라이트에서 흰 글자 방지 — 항상 테마 ink */
.postbl .buy{color:var(--lgd-up); text-transform:capitalize} .postbl .sell{color:var(--lgd-down,#EB5D2A); text-transform:capitalize}
.postbl .pend{color:#E0A020; text-transform:capitalize}   /* 대기 주문 = MT5 주황 */
.postbl .pendhd td{background:var(--lgd-surface2); color:var(--lgd-dim); font-weight:800; font-size:10px; letter-spacing:.4px; padding:4px 10px; text-align:left}
.postbl .pl-pos{color:var(--lgd-up)} .postbl .pl-neg{color:var(--lgd-down,#EB5D2A)}
.postbl td.sltp{cursor:pointer; text-decoration:underline dotted rgba(128,128,128,.6); text-underline-offset:2px}
.postbl td.sltp:hover{color:var(--lgd-up)}
/* 계좌/합계 tfoot — colspan으로 Profit 열에 자동 정렬(하드코딩 margin 제거) */
.postbl tfoot .acctrow td{background:var(--lgd-surface2); border-top:1px solid var(--lgd-hair); padding:6px 10px; overflow:visible}
.acctline{display:flex; align-items:center; gap:14px; flex-wrap:wrap; font-size:11.5px}
.acctline span{color:var(--lgd-dim)} .acctline b{color:var(--lgd-ink); font-weight:700; margin-left:4px; font-variant-numeric:tabular-nums}
.postbl tfoot td.tbxtotal{text-align:right; font-weight:800; font-size:12px; font-variant-numeric:tabular-nums}
.tbxempty{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--lgd-dim); font-size:12px; padding:24px; text-align:center}
.tbxempty .ic{font-size:28px; opacity:.7}
.postbl .up{color:var(--lgd-up)} .postbl .down{color:var(--lgd-down,#EB5D2A)}
/* History 기간 필터 바 */
.histbar{display:flex; align-items:center; gap:5px; padding:5px 10px; border-bottom:1px solid var(--lgd-hair); flex:none; flex-wrap:wrap}
.histbar .hbtn{background:var(--lgd-pill); border:1px solid transparent; color:var(--lgd-dim); font:700 10px/1 inherit;
  padding:4px 8px; border-radius:2px; cursor:pointer}
.histbar .hbtn:hover{color:var(--lgd-ink)} .histbar .hbtn.on{color:var(--lgd-up); border-color:var(--lgd-up)}
.histbar .hbcount{margin-left:auto; color:var(--lgd-dim); font-size:10.5px}
/* Alerts 추가 폼 */
.aladd{display:flex; align-items:center; gap:6px; padding:8px 10px; border-bottom:1px solid var(--lgd-hair); flex:none; flex-wrap:wrap}
.aladd .k{color:var(--lgd-dim); font-size:11px; font-weight:700}
.aladd select, .aladd input{background:var(--lgd-surface2); border:1px solid var(--lgd-hair); color:var(--lgd-ink);
  font:600 11px inherit; padding:4px 6px; border-radius:2px; outline:none}
.aladd input{width:96px}
.aladd .albtn{background:var(--lgd-up); border:none; color:#fff; font:800 11px inherit; padding:5px 12px; border-radius:2px; cursor:pointer}
.aldel{background:none; border:none; color:var(--lgd-dim); cursor:pointer; font-size:11px; font-weight:700; padding:2px 6px; border-radius:2px}
.aldel:hover{background:var(--lgd-down,#EB5D2A); color:#fff}
/* Journal 로그 */
.jrnl{width:100%; border-collapse:collapse; font-size:11px}
.jrnl td{padding:4px 10px; border-bottom:1px solid rgba(128,128,128,.08); vertical-align:top}
.jrnl td.t{color:var(--lgd-dim); white-space:nowrap; font-variant-numeric:tabular-nums; width:150px}
.jrnl td.ok{color:var(--lgd-ink)} .jrnl td.err{color:var(--lgd-down,#EB5D2A)}
/* Company 정보 패널 */
.cinfo{padding:12px 14px; overflow:auto}
.cinfo-hd{font-size:13px; font-weight:800; color:var(--lgd-ink); margin-bottom:10px}
.cinfo-tbl{border-collapse:collapse; font-size:11.5px}
.cinfo-tbl td{padding:5px 10px; border-bottom:1px solid rgba(128,128,128,.08); vertical-align:top}
.cinfo-tbl td.ck{color:var(--lgd-dim); white-space:nowrap; padding-right:20px} .cinfo-tbl td.cv{color:var(--lgd-ink)}
.cinfo-note{margin-top:10px; color:var(--lgd-dim); font-size:10.5px; max-width:520px; line-height:1.5}
/* Mailbox — MT5 브로커 메시지함(Time·Subject·본문). 좌측 정렬, 읽지 않음 볼드. */
.mbxtbl th, .mbxtbl td{text-align:left!important}
.mbxtbl td.t{color:var(--lgd-dim); font-variant-numeric:tabular-nums; white-space:nowrap}
.mbxtbl .mbxsub{overflow:hidden; text-overflow:ellipsis}
.mbxtbl .mbx-row.unread .mbxsub{font-weight:800; color:var(--lgd-ink)}
.mbx-row{cursor:pointer} .mbx-row:hover td{background:rgba(128,128,128,.06)}
.mbx-detail td.mbxbody{white-space:normal; color:var(--lgd-dim); font-size:11px; line-height:1.6; padding:8px 12px 10px; background:var(--lgd-surface2)}
/* Exposure — 통화별 순노출 표 + Long Positions 파이 (MT5) */
.expwrap{display:flex; align-items:flex-start; gap:18px; padding:0 0 8px}
.exptbl{flex:1; min-width:0}
.exptbl td:first-child, .exptbl th:first-child{text-align:left}
.expdot{display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:7px; vertical-align:middle}
.expgcell{width:34%; padding-top:7px !important; padding-bottom:7px !important}
.expbar{display:block; height:9px; border-radius:2px; min-width:2px; opacity:.85}
.exppiewrap{flex:none; width:190px; padding:8px 10px 4px; text-align:center}
.exphd{font-size:11px; font-weight:800; color:var(--lgd-ink); margin-bottom:8px}
.exppie{width:112px; height:112px; border-radius:50%; margin:0 auto 10px; box-shadow:0 0 0 1px var(--lgd-hair) inset}
.explegend{display:flex; flex-direction:column; gap:3px; align-items:flex-start; font-size:11px}
.explg{color:var(--lgd-dim); white-space:nowrap} .explg b{color:var(--lgd-ink); font-variant-numeric:tabular-nums; font-weight:700; margin-left:2px}

/* ── 상태바 (MT5 최하단) ── */
.statusbar{display:flex; align-items:center; gap:12px; height:22px; padding:0 10px; background:var(--lgd-surface);
  border-top:1px solid var(--lgd-hair); font-size:10.5px; color:var(--lgd-dim); position:relative; z-index:60; white-space:nowrap; overflow:hidden; flex:none}
.statusbar .ssp{flex:1}
.statusbar b{color:var(--lgd-ink); font-weight:600; font-variant-numeric:tabular-nums}

/* ── Navigator 트리 (Accounts/Indicators/EA/Scripts) ── */
.nvtree{flex:1; min-height:0; overflow:auto; padding:4px 0; font-size:12px}
.nvhead{display:flex; align-items:center; gap:6px; padding:4px 8px; cursor:pointer; font-weight:700; user-select:none}
.nvhead:hover{background:var(--lgd-surface2)}
.nvcar{width:9px; font-size:8px; color:var(--lgd-dim)}
.nvic{display:flex; align-items:center; color:var(--lgd-dim); flex:none}
.nvgrp.closed .nvkids{display:none}
.nvgrp.closed .nvcar{transform:rotate(-90deg)}
.nvleaf{display:flex; align-items:center; gap:6px; padding:3px 8px 3px 26px; color:var(--lgd-dim); cursor:default}
.nvleaf:hover{background:var(--lgd-surface2); color:var(--lgd-ink)}
/* ── Market Watch 하위탭(Symbols/Details/Trading/Ticks) ── */
.mwsub{display:flex; align-items:center; gap:1px; flex:none; padding:0 6px; border-top:1px solid var(--lgd-hair); overflow-x:auto}
.mwsub button{background:none; border:none; color:var(--lgd-dim); font:700 10px/1 inherit; padding:5px 8px; border-radius:2px; cursor:pointer; white-space:nowrap; flex:none}
.mwsub button:hover{color:var(--lgd-ink)}
.mwsub button.on{color:var(--lgd-up); box-shadow:inset 0 -2px 0 var(--lgd-up)}
/* 컨텍스트 메뉴 구분선 + 단축키 라벨 */
.cgmenu .cgsep{height:1px; background:var(--lgd-hair); margin:5px 4px}
.cgmenu button .key{margin-left:auto; font-size:10px; color:var(--lgd-dim); opacity:.7}
/* ── 토스트 (핫키 피드백) ── */
#toast{position:fixed; left:50%; bottom:64px; transform:translateX(-50%); background:var(--lgd-surface2); color:var(--lgd-ink);
  border:1px solid var(--lgd-hair); border-radius:2px; padding:8px 14px; font-size:12px; font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.5); z-index:200; opacity:0; transition:opacity .15s; pointer-events:none}
#toast.on{opacity:1}
body.light #toast{box-shadow:0 8px 24px rgba(15,23,40,.18)}

/* ── 언어 (설정 위젯) ── */
.stg{flex:1; min-height:0; overflow:auto; display:flex; flex-direction:column}
.stg .sect2{padding:10px 14px 5px; font-size:10.5px; font-weight:800; letter-spacing:.6px;
  color:var(--lgd-dim); text-transform:uppercase}
.stg .rowbtns{display:flex; gap:8px; padding:2px 14px 6px}
.stg .rowbtns button{flex:1; background:var(--lgd-pill); border:1px solid transparent; color:var(--lgd-ink);
  font-size:11.5px; font-weight:700; border-radius:2px; height:30px; cursor:pointer; font-family:inherit}
.stg .rowbtns button.on{background:rgba(46,144,250,.10); border-color:var(--lgd-up)}
.stg .langs{display:flex; gap:6px; padding:2px 14px 10px; flex-wrap:wrap}
.stg .langs button{background:var(--lgd-pill); border:1px solid transparent; color:var(--lgd-ink);

function t(str){ const d=I18N[LANG.cur]; return (d&&d[str])||str; }
function applyLang(){ document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('#sgLangs [data-lang]').forEach(b=>b.classList.toggle('on',b.dataset.lang===LANG.cur));
  /* 동적 표면 재렌더 — 탭 라벨은 data-sub/data-tab(영문 키)로 다시 그리고, 표·메뉴는 렌더러 재호출.
     부팅 초기(함수 미정의)에도 안전하게 typeof 가드. */

  document.querySelectorAll('#tbxTabs [data-tab]').forEach(b=>{ b.textContent=t(b.dataset.tab); });

  try{ if(window.__drawMenu) window.__drawMenu(); }catch(e){} }

/* ════ 위젯 엔진 (크립토/스포츠 대시보드 검증 엔진 이식) ════ */
const stage=document.getElementById('stage');
const GAP=2, GRID=38, FINE=8, SNAP=6;   // GAP: 스테이지 가장자리·패널↔차트 여백 = 차트끼리(2px)와 동일 — "꽉" (2026-07-19 사장님)
const LKEY='alpexa.fxdash.layout.v10';   // v10: 폭 365(주식 큰 % 한 줄). v8: h 710 전심볼. v6: 네비 바닥. v5: 여백 2px
/* MT5 기본 프로필 — 좌측 도크(Market Watch 상 / Navigator 하) · 차트창들 우상 · Toolbox 하단 풀폭.
   차트는 별도(chart1..N 최상위 창, buildCharts가 우상 영역에 타일). 나머지 숨김. 1900×856 기준 */
/* 기본 비율(사장님 스샷 실측): 좌열 스테이지 h≈697px 중 시세창 449 / 네비 110 → 레퍼런스(840) 환산 ×1.205
   = 시세창 h540(심볼 다수 노출) · 네비 y556 h132(4그룹 접힘). 아래 네비 여백은 스샷과 동일. */
const DEFAULT_LAYOUT={
  marketwatch:{x:2,y:2,w:365,h:710},   /* 폭 365(주식 ▲46% 급도 한 줄) · 높이 710(심볼 전부 노출 — 2026-07-19 사장님) */
  navigator:{x:2,y:714,w:365,h:140},   /* 그 아래~바닥(856-2) — 빈 공간 없음 */
  /* (Toolbox는 하단 도크 #dock — 스테이지 위젯 아님. 옛 유령 layout.toolbox 항목 제거: 도킹 시 전폭 부풀림 원인) */
  positions:{x:900,y:140,w:470,h:340,hidden:true}, account:{x:980,y:180,w:380,h:300,hidden:true},
  order:{x:1140,y:120,w:340,h:400,hidden:true},    pending:{x:900,y:200,w:360,h:280,hidden:true},
  depth:{x:940,y:220,w:320,h:300,hidden:true},     money:{x:980,y:200,w:340,h:320,hidden:true},
  settings:{x:760,y:120,w:380,h:520,hidden:true},
  __ref:{w:1900,h:856} };
/* Toolbox는 위젯이 아니라 하단 도크(#dock) — 자유 위젯 목록에서 제외 */
const MIN_SIZE={ navigator:{w:180,h:96}, marketwatch:{w:220,h:200},
  positions:{w:360,h:260}, account:{w:300,h:220}, order:{w:300,h:300},
  pending:{w:280,h:200}, depth:{w:260,h:220}, money:{w:300,h:220}, settings:{w:320,h:320} };
/* 차트 창 최소 크기(동적 chart1..N — MIN_SIZE 맵엔 없음, makeWidget 폴백 사용) */
const CHART_MIN={w:200,h:140};
const WIDGET_TITLES={ navigator:'Navigator', marketwatch:'Market Watch', positions:'Positions',
  account:'Account', order:'Order', pending:'Pending orders', depth:'Depth',
  money:'Money moves', settings:'Settings' };
const deepLayout=o=>JSON.parse(JSON.stringify(o));
function loadLayout(){ try{ const raw=localStorage.getItem(LKEY); if(!raw) return deepLayout(DEFAULT_LAYOUT);
  const p=JSON.parse(raw); Object.keys(DEFAULT_LAYOUT).forEach(k=>{ if(!p[k]) p[k]=deepLayout(DEFAULT_LAYOUT[k]); }); return p;
}catch(e){ return deepLayout(DEFAULT_LAYOUT); } }
let layout=loadLayout();
Object.keys(layout).forEach(id=>{ const m=MIN_SIZE[id]; if(!m) return;
  if(layout[id].w<m.w) layout[id].w=m.w; if(layout[id].h<m.h) layout[id].h=m.h; });
function saveLayout(){ try{ localStorage.setItem(LKEY, JSON.stringify(layout)); }catch(e){} }
document.getElementById('btnReset').onclick=()=>{ try{ localStorage.removeItem(LKEY); }catch(e){}
  destroyCharts();                       // 이전 차트 창 DOM/레이아웃 제거
  Object.keys(chartCfg).forEach(k=>delete chartCfg[k]); saveCfg();   // 차트별 설정도 초기화(타입·TF·지표)
  layout=deepLayout(DEFAULT_LAYOUT); Object.keys(layout).forEach(k=>{ if(k!=='__ref') applyGeo(k); });
  cgN=4; try{ localStorage.setItem(CG_KEY,4); }catch(e){} buildCharts();   // 기본 4차트 타일
  renderAddMenu(); refitLayout(); };

const HDR_H=39, STATUS_H=22;
function refitLayout(){
  const vw=stage.clientWidth, vh=stage.clientHeight;   // 실제 스테이지(도크 높이/접힘 반영)
  if(vw<500||vh<300) return;
  const ref=layout.__ref||{w:1900,h:856};
  if(Math.abs(ref.w-vw)<2&&Math.abs(ref.h-vh)<2){ layout.__ref={w:vw,h:vh}; return; }
  const sx=(vw-2*GAP)/(ref.w-2*GAP), sy=(vh-2*GAP)/(ref.h-2*GAP);
  const mapX=v=>GAP+(v-GAP)*sx, mapY=v=>GAP+(v-GAP)*sy;
  Object.keys(layout).forEach(id=>{ if(id==='__ref') return; const g=layout[id];
    const r=mapX(g.x+g.w), b=mapY(g.y+g.h);
    g.x=mapX(g.x); g.y=mapY(g.y); g.w=r-g.x; g.h=b-g.y;
    if(g.w<120)g.w=120; if(g.h<120)g.h=120; applyGeo(id); });

/* ── MT5 도킹 탭 그룹 — 패널 위젯을 겹쳐 놓으면 하단 [탭][탭]으로 묶음(차트 제외) ── */
let groups=[];

function overlapRatio(a,b){ const ix=Math.max(0,Math.min(a.x+a.w,b.x+b.w)-Math.max(a.x,b.x)),
  iy=Math.max(0,Math.min(a.y+a.h,b.y+b.h)-Math.max(a.y,b.y)), inter=ix*iy, amin=Math.min(a.w*a.h,b.w*b.h);

  bar.onclick=e=>{ const b=e.target.closest('[data-gid]'); if(!b) return; g.active=b.dataset.gid; renderGroup(g); }; }

function renderGroup(g){ g.ids.forEach(id=>{ const el=document.getElementById('w-'+id); if(!el) return;

    const og=groupOf(oid); if(og&&og.active!==oid) return;
    const r=overlapRatio(g, layout[oid]); if(r>bestR){ bestR=r; best=oid; } });

        if(dir.includes('w')){ let nw=Math.max(m.w, ow-dx); nw=Math.min(nw, ox+ow); g.x=ox+ow-nw; g.w=nw; }
        if(dir.includes('n')){ let nh=Math.max(m.h, oh-dy); nh=Math.min(nh, oy+oh); g.y=oy+oh-nh; g.h=nh; }
        el.style.left=g.x+'px'; el.style.top=g.y+'px'; el.style.width=g.w+'px'; el.style.height=g.h+'px';
        if(/^chart\d+$/.test(id)) renderChart(id);       // 리사이즈 중 봉 실시간 재계산(늘어남 방지)

      const up=ev=>{ h.releasePointerCapture(e.pointerId); h.removeEventListener('pointermove',move);

      h.addEventListener('pointermove',move); h.addEventListener('pointerup',up); }); }

function tileCharts(mode, save){ lastTileMode=mode||'grid'; const ids=chartIds().filter(id=>!layout[id].hidden), n=ids.length; if(!n) return;
  const R=chartRegion(), gap=2;
  ids.forEach(id=>{ const g=layout[id]; g.__max=null; g.__min=null; const el=document.getElementById('w-'+id); if(el) el.classList.remove('mini'); });
  if(mode==='cascade'){ const off=28; ids.forEach((id,i)=>{ const g=layout[id];
      g.x=Math.round(R.x+i*off); g.y=Math.round(R.y+i*off); g.w=Math.round(R.w*0.72); g.h=Math.round(R.h*0.72); applyGeo(id); bringToFront(id); }); }
  else { let cols,rows;
    if(mode==='vertical'){ cols=n; rows=1; }           // 세로 분할 = 좌우로 나란히
    else if(mode==='horizontal'){ cols=1; rows=n; }    // 가로 분할 = 위아래로 쌓기
    else { cols=Math.ceil(Math.sqrt(n)); rows=Math.ceil(n/cols); }   // 격자(기본)
    const cw=(R.w-gap*(cols-1))/cols, ch=(R.h-gap*(rows-1))/rows;
    ids.forEach((id,i)=>{ const r=Math.floor(i/cols), c=i%cols, g=layout[id];
      g.x=Math.round(R.x+c*(cw+gap)); g.y=Math.round(R.y+r*(ch+gap)); g.w=Math.round(cw); g.h=Math.round(ch); applyGeo(id); }); }

  const sl=parseFloat((document.getElementById('odSL')||{}).value)||0, tp=parseFloat((document.getElementById('odTP')||{}).value)||0;
  const LIVE=window.fxAcct&&fxAcct.authed;
  if(kind==='buy'||kind==='sell'){
    if(!fxGateOrder(sym)) return;   // 세션 게이트 — 장마감이면 LIVE·데모 모두 거절(주말 동결가 체결 금지)
    if(LIVE){ closeOrder();   // M4: 시장가 실체결 (SL/TP는 체결 후 fx_modify로)
      /* SL/TP 결정적 부착 — fxPlaceReal이 돌려준 그 local_id로 즉시(900ms 최신-포지션 추정 폐기, 차이감사 #4) */
      fxPlaceReal(sym,kind,vol).then(lid=>{ if(lid&&(sl>0||tp>0)) fxModifyReal(lid, sl, tp); });
      return; }
    if(placeMarketDemo(sym,kind,vol,sl,tp)) closeOrder(); return; }
  if(kind==='pending'){
    const price=parseFloat((document.getElementById('odPrice')||{}).value)||0;
    if(LIVE){   // M4.5: 서버 매칭 엔진 — Limit/Stop 4종. Stop Limit은 정직 거절(v2)
      const parts=String(ordUI.otype||'').split(' '), pSide=parts[0].toLowerCase(), pType=parts.slice(1).join(' ').toUpperCase();
      if(pType==='STOP LIMIT'){ toast('Stop Limit orders come in v2 — Limit/Stop available now'); return; }
      if(!(price>0)){ toast('Enter a valid price'); return; }
      fxPlacePendingReal(sym, pSide, pType, vol, price, sl, tp).then(okd=>{ if(okd) closeOrder(); });
      return; }
    if(placePendingDemo(sym,ordUI.otype,vol,price,sl,tp)) closeOrder(); } }

/* ── MT5 Modify — Trade 탭 S/L·T/P 셀 클릭 → SL/TP 설정 창 (DEMO 전용, LIVE 수정은 M5) ── */
function modifyPosDemo(ticket, sl, tp){ const p=DEMO_POS.find(x=>x.ticket===ticket); if(!p) return;
  const dg=mwDigits(symPair(p.sym));
  p.sl=sl>0?(+sl).toFixed(dg):''; p.tp=tp>0?(+tp).toFixed(dg):'';
  JOURNAL.log('Modify #'+ticket+' — S/L '+(p.sl||'—')+' · T/P '+(p.tp||'—')+' (demo)', true);
  toast('#'+ticket+' modified — S/L '+(p.sl||'—')+' / T/P '+(p.tp||'—')+' (DEMO)');
  if(curTbxTab==='Trade') renderToolbox('Trade'); renderAllCharts(false); }
function openModifyDemo(ticket, isReal){
  /* isReal: 실포지션(fxAcct) — 저장 시 fx_modify RPC. 아니면 데모 인메모리. */
  const p=isReal ? (fxAcct.pos||[]).map(x=>({ sym:x.symbol, ticket:String(x.local_id||''), type:String(x.side||'').toLowerCase(),
      vol:(+x.size||0).toFixed(2), price:(+x.open_price||0), sl:(x.meta&&x.meta.sl)||'', tp:(x.meta&&x.meta.tp)||'' })).find(x=>x.ticket===ticket)
    : DEMO_POS.find(x=>x.ticket===ticket);
  if(!p) return;
  const pair=symPair(p.sym), dg=mwDigits(pair), step=mwPip(pair), r=mwStore.rows[pair]||{};
  let m=document.getElementById('modModal');
  if(!m){ m=document.createElement('div'); m.id='modModal'; m.className='ordback'; document.body.appendChild(m);
    m.addEventListener('click', e=>{ if(e.target===m||e.target.closest('[data-md="close"]')){ m.style.display='none'; return; }
      if(e.target.closest('[data-md="save"]')){
        const sl=parseFloat((document.getElementById('mdSL')||{}).value)||0,
              tp=parseFloat((document.getElementById('mdTP')||{}).value)||0;
        if(m.dataset.real==='1') fxModifyReal(m.dataset.ticket, sl, tp);   // M4: 서버 fx_modify
        else modifyPosDemo(m.dataset.ticket, sl, tp);
        m.style.display='none'; } });
    bindHoldRepeat(m,'[data-ostep]',(b,mult)=>stepField(b.dataset.ostep, mult)); }
  m.dataset.ticket=ticket; m.dataset.real=isReal?'1':'0';
  const num=(label,id,val)=>'<div class="ordrow"><span class="ordlbl">'+label+'</span><span class="ordfield">'+
    '<button class="ordstep" data-ostep="'+id+'|-'+step+'|'+dg+'|0">−</button>'+
    '<input class="ordinput" id="'+id+'" value="'+val+'" inputmode="decimal">'+
    '<button class="ordstep" data-ostep="'+id+'|'+step+'|'+dg+'|0">+</button></span></div>';
  m.innerHTML='<div class="ordbox">'+
    '<div class="ordhd"><b>Modify #'+ticket+' — '+p.sym+'</b><span class="ordx" data-md="close">✕</span></div>'+
    '<div class="ordbadge'+(isReal?' ordlive':'')+'">'+(isReal?'LIVE':'DEMO')+' · '+p.type.toUpperCase()+' '+p.vol+' @ '+(typeof p.price==='number'?p.price.toFixed(dg):p.price)+(r.bid!=null?' · now '+mwFmt(pair,p.type==='buy'?r.bid:r.ask):'')+'</div>'+
    '<div class="ordbody">'+num(t('Stop Loss'),'mdSL',p.sl||'0')+num(t('Take Profit'),'mdTP',p.tp||'0')+'</div>'+
    '<div class="ordbtns"><button class="ordplace" data-md="save">Modify</button></div></div>';
  m.style.display='flex'; }
/* 트레이드 레벨 드래그 커밋 — 진입선에서 끌면 방향으로 SL/TP 판정(롱: 아래=SL·위=TP, 숏 반전),
   기존 SL/TP 라인을 끌면 그 값 이동. 실포지션=fx_modify(서버 검증), 데모=인메모리. */
function commitSltpDrag(){ const d=sltpDrag; sltpDrag=null; if(!d) return;
  if(d.price==null || Math.abs(d.price-d.entry)<1e-12){ renderChart(d.id); return; }   // 안 끌었으면 취소
  let sl=d.sl||0, tp=d.tp||0;
  if(d.kind==='sl') sl=d.price;
  else if(d.kind==='tp') tp=d.price;
  else { const isSL=d.side==='buy' ? d.price<d.entry : d.price>d.entry; if(isSL) sl=d.price; else tp=d.price; }
  if(d.real) fxModifyReal(d.ticket, sl, tp);
  else modifyPosDemo(d.ticket, sl, tp);
  renderChart(d.id); }

/* 계좌 바(Trade tfoot·Exposure 하단 공용) — LIVE면 fxAcct.stats() 실수치(MT5 공백 천단위), 아니면 데모 고정치 */
function acctSpans(live){
  const mt5n=n=>(+n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}).replace(/,/g,' ');
  const spans=st=>'<span>'+t('Balance')+':<b>'+mt5n(st.bal)+' USD</b></span><span>'+t('Equity')+':<b>'+mt5n(st.equity)+'</b></span>'+
    '<span>'+t('Margin')+':<b>'+mt5n(st.margin)+'</b></span><span>'+t('Free Margin')+':<b>'+mt5n(st.free)+'</b></span>'+
    '<span>'+t('Margin Level')+':<b>'+(st.margin>0?mt5n(st.level)+'%':'—')+'</b></span>';
  if(!live) return spans(demoStats());   // DEMO도 실시간 계산 — 마진(500:1)·스왑·플로팅 (2026-07-19 사장님)
  return spans(fxAcct.stats()); }   /* LIVE 칩 제거 (2026-07-23 사장님 지시 — 실계좌 여부는 주문창 배지·잔고로 충분) */

    Calendar:['📅','Economic calendar — connects in M6'], Articles:['📄','No articles'],
    'Code Base':['💾','Code Base is empty'], Experts:['🤖','No Expert Advisors attached']};

  if(tab==='Trade'){
    /* M3: 로그인 시 실계좌·실포지션(fxAcct, 읽기 전용) — 아니면 DEMO 프리뷰. 실행은 M5. */

      : '<tr><td colspan="13" style="text-align:center;color:var(--lgd-dim);padding:16px">'+t('No open positions')+'</td></tr>';
    /* 로그인 화면 = 실계좌만 (연습 섹션 제거 — 2026-07-19 사장님 "데모 지우자". M4로 주문이 실체결이라 혼동 없음) */
    /* 대기 주문(Pending) — MT5는 포지션 아래 별도 섹션. 현재가는 라이브, 취소 ✕. (LIVE엔 데모 대기주문 미표시) */
    const pmk=s=>{ const p=symPair(s), rr=mwStore.rows[p]; return rr&&rr.mid!=null?mwFmt(p,rr.mid):'—'; };
    const pend=(!LIVE&&DEMO_PEND.length) ? '<tr class="pendhd"><td colspan="13">Pending Orders ('+DEMO_PEND.length+')</td></tr>'+

      : (LIVE&&fxAcct.pend.length) ? '<tr class="pendhd"><td colspan="13">Pending Orders — server matched ('+fxAcct.pend.length+')</td></tr>'+

        '<td class="pend">'+String(p.side||'').toLowerCase()+' '+String(p.otype||'').toLowerCase()+'</td><td>'+(+p.size||0).toFixed(2)+'</td>'+
        '<td>'+mwFmt(p.symbol,+p.trigger)+'</td><td>'+(p.sl?mwFmt(p.symbol,+p.sl):'—')+'</td>'+
        '<td>'+(p.tp?mwFmt(p.symbol,+p.tp):'—')+'</td><td>'+pmk(p.symbol)+'</td><td>—</td><td>—</td><td>—</td>'+
        '<td class="pox"><span class="poclose" data-rpcancel="'+p.local_id+'" title="Cancel pending order — LIVE (server)">✕</span></td></tr>').join('') : '';
    body.innerHTML='<div class="tbxscroll"><table class="postbl">'+colg(TBX_COLW.trade)+'<thead><tr>'+

      /* 계좌 바 = tfoot(마지막 행 바로 밑) · 총 P/L은 colspan으로 Profit 열에 정확히 정렬(margin 하드코딩 X) */

      '</tr></tfoot></table></div>';

  } else if(tab==='Exposure'){

    const LIVE=fxAcct.authed, POS=LIVE?fxAcct.rows():DEMO_POS;
    const ccy={};
    POS.forEach(p=>{ const pair=symPair(p.sym), base=pair.slice(0,3), quote=pair.slice(3,6);
      const units=(+p.vol||0)*FX_CONTRACT, dir=p.type==='sell'?-1:1;
      const px=(mwStore.rows[pair]&&mwStore.rows[pair].mid)||+p.cur||+p.price||1;
      ccy[base]=(ccy[base]||0)+dir*units;          // base: 매수=+, 매도=−
      ccy[quote]=(ccy[quote]||0)-dir*units*px; });  // quote: 반대, 현재가로 평가
    const list=Object.keys(ccy).map(c=>{ const rate=ccyUsdRate(c), vol=ccy[c];
      return { c, vol, rate, usd:(rate!=null?vol*rate:0) }; })
      .filter(x=>Math.abs(x.vol)>1e-6).sort((a,b)=>Math.abs(b.usd)-Math.abs(a.usd));
    const maxUsd=Math.max(1,...list.map(x=>Math.abs(x.usd)));

        if(mwDbl.sym===sym && now-mwDbl.t<450){ mwDbl={sym:null,t:0}; openOrderDialog(sym); return; }

    const why=(d&&d.error)||(r&&r.error&&r.error.message)||'cancel failed';
    toast('❌ Cancel rejected: '+why); return false;
  }catch(e){ toast('❌ Cancel failed: '+String(e&&e.message||e)); return false; } }
async function fxModifyReal(localId, sl, tp){
  try{
    const r=await AlpexaSync.db.rpc('fx_modify', { p_local_id:localId, p_sl:(sl>0?+sl:null), p_tp:(tp>0?+tp:null) });
    const d=r&&r.data;
    if(r&&!r.error&&d&&d.ok){ JOURNAL.log('LIVE modify — '+localId+' S/L '+(sl||'—')+' T/P '+(tp||'—'), true);
      toast('✅ '+localId+' modified (LIVE)'); fxAcct.load(); return true; }
    const why=(d&&d.error)||(r&&r.error&&r.error.message)||'modify failed';
    toast('❌ Modify rejected: '+why); return false;
  }catch(e){ toast('❌ Modify failed: '+String(e&&e.message||e)); return false; } }

/* Toolbox 도크 — 탭(바닥) · Trade 렌더 · 상단 리사이즈 · X 닫기(왼쪽 헤드, Ctrl+T 재오픈) · 원클릭 청산 */
(function toolboxDock(){
  const tabs=document.getElementById('tbxTabs'), dock=document.getElementById('dock'),
        content=document.getElementById('tbxBody'), rz=document.getElementById('dockRz'), closeBtn=document.getElementById('dockClose');
  if(!tabs||!dock||!content) return;
  const DOCK_H='alpexa.fxdash.dockH', DOCK_C='alpexa.fxdash.dockHidden';
  let dockH=Math.max(90, Math.min(+localStorage.getItem(DOCK_H)||190, 700));
  let hidden=localStorage.getItem(DOCK_C)==='1';
  function applyDock(){ content.style.height=dockH+'px'; dock.style.display=hidden?'none':'flex'; refitLayout(); }
  function setHiddenDock(v){ hidden=v; try{localStorage.setItem(DOCK_C,v?'1':'0');}catch(_){} applyDock(); }
  toggleDock=()=>setHiddenDock(!hidden);   // ☰ View>Toolbox에서 호출
  tabs.innerHTML=TBX_TABS.map((nm,i)=>'<button data-tab="'+nm+'"'+(i===0?' class="on"':'')+'>'+t(nm)+'</button>').join('');
  renderToolbox('Trade');
  tabs.addEventListener('click', e=>{ const b=e.target.closest('[data-tab]'); if(!b) return;
    tabs.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('on',x===b)); renderToolbox(b.dataset.tab); });
  /* X = 툴박스 닫기(완전 숨김, 차트 확대). Ctrl+T로 재오픈 */
  if(closeBtn) closeBtn.addEventListener('click', ()=>{ setHiddenDock(true); toast('Toolbox closed — Ctrl+T to reopen'); });
  /* 툴박스 본문 위임: 원클릭 청산 · Alerts 추가/삭제 · History 기간 · Mailbox 펼치기 */
  content.addEventListener('click', e=>{
    const x=e.target.closest('.poclose'); if(x){
      if(x.dataset.rclose){ fxCloseReal(x.dataset.rclose); return; }   // M4: 서버 청산
      if(x.dataset.rpcancel){ fxCancelPendingReal(x.dataset.rpcancel); return; }   // M4.5: 서버 대기 취소
      if(x.dataset.cancel) cancelPendDemo(x.dataset.cancel); else closePosDemo(x.dataset.close); return; }
    const rmd=e.target.closest('[data-rmod]'); if(rmd){ openModifyDemo(rmd.dataset.rmod, true); return; }   // 실포지션 S/L·T/P → fx_modify
    const md=e.target.closest('[data-mod]'); if(md){ openModifyDemo(md.dataset.mod); return; }   // 데모 Modify
    const add=e.target.closest('#alAdd'); if(add){ tbxAddAlert(); return; }
    const del=e.target.closest('.aldel'); if(del){ alertsStore.remove(del.dataset.del); JOURNAL.log('Alert removed', true); renderToolbox('Alerts'); return; }
    const hp=e.target.closest('[data-hp]'); if(hp){ histPeriod=hp.dataset.hp; renderToolbox('History'); return; }
    const mail=e.target.closest('[data-mail]'); if(mail){ const d=document.getElementById('mbxDetail'+mail.dataset.mail);
      if(d) d.style.display=d.style.display==='none'?'table-row':'none'; mail.classList.remove('unread'); return; }
  });
  content.addEventListener('keydown', e=>{ if(e.key==='Enter' && e.target.id==='alPx'){ e.preventDefault(); tbxAddAlert(); } });
  /* 상단 테두리 드래그로 높이 조절 */
  if(rz) rz.addEventListener('pointerdown', e=>{ e.preventDefault(); rz.setPointerCapture(e.pointerId);
    const sy=e.clientY, sh=dockH;
    const move=ev=>{ dockH=Math.max(90, Math.min(sh+(sy-ev.clientY), window.innerHeight*0.75)); content.style.height=dockH+'px'; refitLayout(); };
    const up=()=>{ rz.releasePointerCapture(e.pointerId); rz.removeEventListener('pointermove',move); rz.removeEventListener('pointerup',up);
      try{localStorage.setItem(DOCK_H, Math.round(dockH));}catch(_){} };
    rz.addEventListener('pointermove',move); rz.addEventListener('pointerup',up); });
  document.addEventListener('keydown', e=>{ if((e.ctrlKey||e.metaKey)&&(e.key==='t'||e.key==='T')){ e.preventDefault(); setHiddenDock(!hidden); } });
  applyDock();
})();

/* ── 토스트 + MT5 핫키 ── */
let _toastT=null;
function toast(msg){ let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast'; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add('on'); clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove('on'),1500); }
document.addEventListener('keydown', e=>{
  const tag=(e.target&&e.target.tagName)||''; if(tag==='INPUT'||tag==='TEXTAREA') return;
  const cmd=e.ctrlKey||e.metaKey, k=e.key;
  if(cmd&&/^m$/i.test(k)){ e.preventDefault(); const h=!layout.marketwatch.hidden; setHidden('marketwatch',h); toast(h?'Market Watch — hidden':'Market Watch'); }
  else if(cmd&&/^n$/i.test(k)){ e.preventDefault(); const h=!layout.navigator.hidden; setHidden('navigator',h); toast(h?'Navigator — hidden':'Navigator'); }
  else if(cmd&&/^d$/i.test(k)){ e.preventDefault(); toast('Data Window — coming in build'); }
  else if(cmd&&/^g$/i.test(k)){ e.preventDefault(); toggleGrid(); }   // 활성 차트 그리드
  else if(cmd&&/^b$/i.test(k)){ e.preventDefault(); toast('Objects List — coming in build'); }
  else if(k==='F9'){ e.preventDefault(); const g=layout[activeChart]; openOrderDialog((g&&g.sym)||mwSel); }
  else if(k==='F8'){ e.preventDefault(); toast('Chart Properties (F8) — coming in build'); }
  else if(k==='F11'){ e.preventDefault(); if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); }
  else if(k==='Escape'){ if(sltpDrag){ const cid=sltpDrag.id; sltpDrag=null; renderChart(cid); return; }   // 레벨 드래그 취소
    const om=document.getElementById('ordModal'); if(om&&om.style.display==='flex'){ closeOrder(); return; }   // 주문창 먼저
    const cc=document.getElementById('chCtx'); const md=document.getElementById('menuDrop');   // 팝업 먼저 닫기
    if((cc&&cc.style.display==='block')||(md&&md.style.display==='block')){ if(cc) cc.style.display='none'; if(md) md.style.display='none'; }
    else if(drawDrag){ const id=drawDrag.id; drawDrag=null; renderChart(id); } else if(drawTool){ setDrawTool(null); }
    else if(selObj){ const id=selObj.id; selObj=null; renderChart(id); } }   // 팝업/그리기/툴/선택 취소
  else if(k==='Delete'||k==='Backspace'){ if(selObj){ delSelObj(); toast('Object deleted'); }   // 선택된 것만 삭제
    else if(activeChart){ clearObjects(activeChart); toast('All objects deleted'); } }
  else if(k==='+'||k==='='){ zoomCharts(1); }
  else if(k==='-'||k==='_'){ zoomCharts(-1); }
});

/* ── 마우스오버 툴팁 (모든 [data-tip] — 툴바 아이콘 포함, 오버플로에 안 잘림) ── */
(function tips(){
  let tip;
  document.addEventListener('mouseover', e=>{ const el=e.target.closest('[data-tip]'); if(!el) return;
    const t=el.getAttribute('data-tip'); if(!t) return;
    if(!tip){ tip=document.createElement('div'); tip.id='gtip'; document.body.appendChild(tip); }
    tip.textContent=t; tip.style.display='block';
    const r=el.getBoundingClientRect(), tw=tip.offsetWidth;
    let left=r.left+r.width/2-tw/2; left=Math.max(6, Math.min(left, window.innerWidth-tw-6));
    tip.style.left=left+'px'; tip.style.top=(r.bottom+6)+'px'; });
  document.addEventListener('mouseout', e=>{ if(tip && e.target.closest && e.target.closest('[data-tip]')) tip.style.display='none'; });
})();
</script>
