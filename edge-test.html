<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Alpexa — 백엔드(주방) 테스트</title>
<style>
  body{font-family:-apple-system,system-ui,'Roboto',sans-serif;background:#0F1729;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:24px}
  .card{width:100%;max-width:420px;background:#16203A;border:1px solid #283247;border-radius:18px;padding:26px 22px;text-align:center}
  h1{font-size:20px;margin:0 0 6px}
  p{color:#9FB0C4;font-size:13.5px;margin:0 0 18px}
  button{background:#0052FF;color:#fff;border:none;border-radius:12px;padding:14px 22px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
  pre{text-align:left;background:#0B1322;border:1px solid #283247;border-radius:12px;padding:14px;margin-top:16px;font-size:12.5px;color:#bcd0ea;white-space:pre-wrap;word-break:break-all;min-height:40px}
  .ok{color:#5ED27A;font-weight:800;font-size:16px;margin-top:14px}
  .bad{color:#ff8a8a;font-weight:800;font-size:15px;margin-top:14px}
</style>
</head>
<body>
  <div class="card">
    <h1>🍳 백엔드(주방) 테스트</h1>
    <p>버튼을 누르면 우리 서버(Edge Function)에 "살아있어?"라고 물어봐요.</p>
    <button id="go">주방에 물어보기</button>
    <div id="status"></div>
    <pre id="out">대기 중…</pre>
  </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var URL='https://grxnbgtfnaayeluenvqh.supabase.co';
  var KEY='sb_publishable_ow1DihBdAAvNtnb1H0Kojw_7vbeMKFu';
  var sb=window.supabase.createClient(URL,KEY);
  async function ask(){
    var s=document.getElementById('status'), o=document.getElementById('out');
    s.textContent=''; o.textContent='물어보는 중…';
    try{
      var res=await sb.functions.invoke('hello',{ body:{} });
      if(res.error){ s.className='bad'; s.textContent='❌ 실패'; o.textContent=JSON.stringify(res.error,null,2); return; }
      s.className='ok'; s.textContent='✅ 주방 작동 중!';
      o.textContent=JSON.stringify(res.data,null,2);
    }catch(e){ s.className='bad'; s.textContent='❌ 오류'; o.textContent=String(e&&e.message||e); }
  }
  document.getElementById('go').onclick=ask;
  ask(); // 자동으로 한 번 물어봄
</script>
</body>
</html>
