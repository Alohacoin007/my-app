<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ALPEXA SUISSE Manager — Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined&display=block">
<style>
html, body { width: 100%; min-height: 100vh; margin: 0; padding: 0; }
#root { width: 100%; min-height: 100vh; }
.boot { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: #5A6478; font-family: system-ui, sans-serif; background: #F0F2F5; }
.boot .spinner { width: 36px; height: 36px; border: 3px solid #cbd5e1; border-top-color: #1B3955; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
/* ALPEXA — Design Tokens (per ALPEXA SUISSE README) */
/* Fonts loaded via <link> tags in <head> for reliability */

:root {
  /* Surfaces */
  --ink:        #0F1B2D;
  --ink-2:      #1A2942;
  --ink-3:      #2A3A55;
  --text:       #212121;
  --text-2:     #5A6478;
  --text-3:     #9E9E9E;
  --muted:      #BDBDBD;
  --line:       #ECEFF3;
  --line-2:     #E0E0E0;
  --surface:    #FFFFFF;
  --bg:         #F0F2F5;
  --bg-2:       #ECEFF1;

  /* Accent — ALPEXA blue (per brand README) */
  --acc:        #1565C0;
  --acc-2:      #0D47A1;
  --acc-3:      #E3F2FD;
  --acc-ink:    #0D47A1;
  --primary:    #2196F3;

  /* Buy / Sell — trading convention (per brand README) */
  --buy:        #2E7D32;
  --buy-2:      #1B5E20;
  --buy-tint:   #E8F5E9;
  --sell:       #E53935;
  --sell-2:     #C62828;
  --sell-tint:  #FFEBEE;

  /* On-dark variants — for use over the colored header */
  --buy-bright:  #4ADE80;
  --sell-bright: #FB7185;
  --buy-glow:   rgba(74, 222, 128, 0.18);
  --sell-glow:  rgba(251, 113, 133, 0.18);

  /* Misc */
  --warn:       #E58B1E;

  --radius:     12px;
  --radius-sm:  8px;
  --radius-lg:  18px;

  --shadow-sm:  0 1px 2px rgba(15,27,45,0.04), 0 1px 1px rgba(15,27,45,0.03);
  --shadow:     0 2px 6px rgba(15,27,45,0.05), 0 8px 24px rgba(15,27,45,0.04);
  --shadow-lg:  0 8px 28px rgba(15,27,45,0.10);

  /* Foreground that contrasts with --ink-colored surfaces.
     In light mode: --ink is dark → white text on it.
     In dark mode: --ink is light → dark text on it. */
  --ink-fg:     #FFFFFF;

  --font:       'Roboto', system-ui, sans-serif;
  --brand:      'Montserrat', 'Roboto', system-ui, sans-serif;
  --mono:       'JetBrains Mono', ui-monospace, monospace;
}

/* ─── Dark mode overrides ─── */
:root.dark {
  --ink:        #F4F6FA;
  --ink-2:      #ECEFF4;
  --ink-3:      #D6DAE3;
  --text:       #F4F6FA;
  --text-2:     #A9B3C5;
  --text-3:     #6A7385;
  --muted:      #4A5468;
  --line:       #232B3D;
  --line-2:     #2F384C;
  --surface:    #1A2334;
  --bg:         #0F1729;
  --bg-2:       #232B3D;

  --acc:        #2196F3;
  --acc-2:      #64B5F6;
  --acc-3:      #1A3556;
  --acc-ink:    #BBDEFB;
  --primary:    #2196F3;

  --buy:        #34D399;
  --buy-2:      #6EE7B7;
  --buy-tint:   #133A2A;
  --sell:       #FB7185;
  --sell-2:     #FCA5B3;
  --sell-tint:  #3A1721;

  --shadow-sm:  0 1px 2px rgba(0,0,0,0.4);
  --shadow:     0 2px 8px rgba(0,0,0,0.45);
  --shadow-lg:  0 8px 28px rgba(0,0,0,0.55);

  /* Foreground for --ink-colored surfaces in dark mode (light ink → dark text) */
  --ink-fg:     #0F1729;
}
html.dark, html.dark body {
  background: var(--bg);
  color: var(--text);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); color: var(--text); background: #E5E7EB; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; outline: none; border: none; background: none; color: inherit; }

/* ── Typography helpers ── */
.mono { font-family: var(--mono); font-feature-settings: 'tnum' 1, 'zero' 1; }
.up   { color: var(--buy); }
.dn   { color: var(--sell); }

/* ── Material Symbols ── */
.msi {
  font-family: 'Material Symbols Outlined';
  font-weight: normal;
  font-style: normal;
  font-size: 18px;
  line-height: 1;
  letter-spacing: normal;
  text-transform: none;
  display: inline-block;
  white-space: nowrap;
  word-wrap: normal;
  direction: ltr;
  -webkit-font-feature-settings: 'liga';
  font-feature-settings: 'liga';
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  user-select: none;
}
.msi.fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.msi.bold { font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24; }

/* Catch inline-style usages of Material Symbols so ligature activates.
   Also fall back to transparent text if the font fails to load (prevents
   raw ligature names like "close" / "description" from leaking through). */
[style*="Material Symbols"] {
  font-feature-settings: 'liga' !important;
  -webkit-font-feature-settings: 'liga' !important;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  display: inline-block;
  white-space: nowrap;
  letter-spacing: normal;
  text-transform: none;
  user-select: none;
  font-family: 'Material Symbols Outlined', 'transparent-fallback' !important;
}
/* When MSO not loaded, font name falls back; this hides any leaked text */
@font-face {
  font-family: 'transparent-fallback';
  src: local(' '); /* invalid → keeps text invisible via metric fallback */
  size-adjust: 0%;
}

/* ── App shell within iOS frame ── */
.app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  background: var(--bg);
  overflow: hidden;
  font-size: 14px;
  position: relative;
}

/* live dot */
.livedot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4CAF50;
  box-shadow: 0 0 0 0 rgba(76,175,80,0.5);
  animation: lp 1.8s infinite;
  display: inline-block;
  flex-shrink: 0;
}
@keyframes lp {
  0%   { box-shadow: 0 0 0 0 rgba(76,175,80,0.55); }
  70%  { box-shadow: 0 0 0 6px rgba(76,175,80,0.0); }
  100% { box-shadow: 0 0 0 0 rgba(76,175,80,0.0); }
}

/* tick flash */
@keyframes flashUp   { 0%{background:rgba(46,125,50,.16);} 100%{background:transparent;} }
@keyframes flashDown { 0%{background:rgba(229,57,53,.16);} 100%{background:transparent;} }
.flash-up   { animation: flashUp 600ms ease-out; }
.flash-down { animation: flashDown 600ms ease-out; }

/* compact scrollbar */
::-webkit-scrollbar { width: 0; height: 0; }

/* Hide scrollbar on horizontal scrolling category strips */
.cat-strip::-webkit-scrollbar { display: none; }
</style>
<script>
window.__alpexaProgress = function(msg) {
  var el = document.getElementById('mgrStatus');
  if (el) el.textContent = msg;
  console.log('[MGR]', msg);
};
window.__alpexaCDNFail = function(name) {
  var r = document.getElementById('root');
  if (r) r.innerHTML = '<div class="boot" style="color:#c62828;padding:20px;text-align:center"><b>Manager failed to load</b><br><br><small style="font-family:monospace">' + name + ' could not load from CDN</small></div>';
};
window.addEventListener('error', function(ev) {
  console.error('[MGR error]', ev.message, ev.filename, ev.lineno);
  var r = document.getElementById('root');
  if (r && r.querySelector('.boot')) {
    r.innerHTML = '<div class="boot" style="color:#c62828;padding:20px;text-align:center"><div style="max-width:600px"><b>Manager failed to load</b><div style="margin-top:12px;font-family:monospace;font-size:12px;background:#fff3f3;padding:10px;border-radius:6px;white-space:pre-wrap;text-align:left">' + (ev.message || 'Unknown error') + '\n\nat ' + (ev.filename || '?') + ':' + (ev.lineno || '?') + '</div></div></div>';
  }
});
setTimeout(function() {
  var r = document.getElementById('root');
  if (r && r.querySelector('.boot')) {
    var checks = [
      'React: ' + (typeof React !== 'undefined' ? 'OK' : 'MISSING'),
      'ReactDOM: ' + (typeof ReactDOM !== 'undefined' ? 'OK' : 'MISSING'),
      'Babel: ' + (typeof Babel !== 'undefined' ? 'OK' : 'MISSING'),
    ];
    var s = document.getElementById('mgrStatus');
    if (s) s.innerHTML = 'Still loading after 30s<br><br><small style="font-family:monospace">' + checks.join('<br>') + '</small>';
  }
}, 30000);
</script>
<script src="vendor/react.min.js?v=1780769444219" onload="window.__alpexaProgress&&window.__alpexaProgress('React loaded')" onerror="window.__alpexaCDNFail&&window.__alpexaCDNFail('React')"></script>
<script src="vendor/react-dom.min.js?v=1780769444219" onload="window.__alpexaProgress&&window.__alpexaProgress('ReactDOM loaded')" onerror="window.__alpexaCDNFail&&window.__alpexaCDNFail('ReactDOM')"></script>
</head>
<body>
<div id="root"><div class="boot"><div class="spinner"></div><div id="mgrStatus">Loading ALPEXA Manager…</div></div></div>

<script src="vendor/manager-compiled.js?v=1780769444219" defer onload="console.log('[MGR] App script loaded')" onerror="window.__alpexaCDNFail&&window.__alpexaCDNFail('Manager App')"></script>

<!-- Alpexa back-office: withdrawal approvals (shared with the apps via localStorage) -->
<script>
(function(){
  var STORE='alpexa.withdrawals';
  function load(){try{return JSON.parse(localStorage.getItem(STORE)||'[]');}catch(e){return [];}}
  function save(a){try{localStorage.setItem(STORE,JSON.stringify(a));}catch(e){}}
  function usd(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function pendingCount(){return load().filter(function(w){return w.status==='pending';}).length;}

  var css=document.createElement('style');
  css.textContent=
    '#awBtn{position:fixed;right:18px;bottom:18px;z-index:2147483000;background:#1565C0;color:#fff;border:none;border-radius:24px;padding:12px 18px;font:700 13px system-ui,sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.3);cursor:pointer}'+
    '#awBtn .n{background:#fff;color:#1565C0;border-radius:10px;padding:1px 7px;margin-left:6px;font-size:12px}'+
    '#awPanel{position:fixed;right:18px;bottom:74px;width:360px;max-width:calc(100vw - 36px);max-height:72vh;overflow:auto;background:#fff;border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.35);z-index:2147483000;display:none;font-family:system-ui,sans-serif}'+
    '#awPanel.show{display:block}'+
    '.aw-h{padding:14px 16px;font-weight:800;font-size:15px;color:#0F1B2D;border-bottom:1px solid #ECEFF3;display:flex;justify-content:space-between;align-items:center}'+
    '.aw-h button{border:none;background:#f1f3f4;border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:15px}'+
    '.aw-item{padding:12px 16px;border-bottom:1px solid #f2f4f7}'+
    '.aw-row{display:flex;justify-content:space-between;font-size:13px;color:#5A6478;margin-bottom:3px}'+
    '.aw-row b{color:#0F1B2D}'+
    '.aw-addr{font-family:monospace;font-size:11px;color:#8a93a6;word-break:break-all;margin:4px 0 8px}'+
    '.aw-btns{display:flex;gap:8px}'+
    '.aw-btns button{flex:1;border:none;border-radius:8px;padding:8px;font-weight:700;font-size:13px;cursor:pointer}'+
    '.aw-ok{background:#2E7D32;color:#fff}.aw-no{background:#fff;color:#C62828;border:1px solid #f0c0c0}'+
    '.aw-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}'+
    '.aw-status.approved{background:#E8F5E9;color:#1B5E20}.aw-status.rejected{background:#FFEBEE;color:#C62828}'+
    '.aw-empty{padding:24px 16px;text-align:center;color:#9E9E9E;font-size:13px}';
  document.head.appendChild(css);

  var btn=document.createElement('button'); btn.id='awBtn'; btn.innerHTML='💸 출금 승인 <span class="n" id="awN">0</span>';
  var panel=document.createElement('div'); panel.id='awPanel';
  document.body.appendChild(btn); document.body.appendChild(panel);

  function render(){
    var all=load();
    var n=document.getElementById('awN'); if(n)n.textContent=pendingCount();
    var pend=all.filter(function(w){return w.status==='pending';});
    var done=all.filter(function(w){return w.status!=='pending';}).slice(0,8);
    var html='<div class="aw-h">출금 승인 대기 <button id="awX">✕</button></div>';
    if(!pend.length) html+='<div class="aw-empty">대기 중인 출금이 없어요.</div>';
    pend.forEach(function(w){
      html+='<div class="aw-item">'+
        '<div class="aw-row"><span>'+w.server+' · '+w.asset+' ('+(w.network||'')+')</span><b>'+usd(w.amount)+'</b></div>'+
        '<div class="aw-row"><span>받는 금액 (수수료 후)</span><b>'+usd(w.net)+'</b></div>'+
        '<div class="aw-addr">'+(w.address||'')+'</div>'+
        '<div class="aw-btns"><button class="aw-ok" data-ok="'+w.id+'">승인</button><button class="aw-no" data-no="'+w.id+'">거절</button></div>'+
      '</div>';
    });
    if(done.length){
      html+='<div class="aw-h" style="border-top:1px solid #ECEFF3">최근 처리</div>';
      done.forEach(function(w){
        html+='<div class="aw-item"><div class="aw-row"><span>'+w.server+' · '+usd(w.amount)+'</span><span class="aw-status '+w.status+'">'+(w.status==='approved'?'승인됨':'거절됨')+'</span></div></div>';
      });
    }
    panel.innerHTML=html;
    var x=document.getElementById('awX'); if(x)x.onclick=function(){panel.classList.remove('show');};
    panel.querySelectorAll('[data-ok]').forEach(function(b){b.onclick=function(){decide(b.getAttribute('data-ok'),'approved');};});
    panel.querySelectorAll('[data-no]').forEach(function(b){b.onclick=function(){decide(b.getAttribute('data-no'),'rejected');};});
  }
  function decide(id,status){
    var all=load(),w=null;
    for(var i=0;i<all.length;i++){ if(all[i].id===id){ w=all[i]; break; } }
    if(!w)return; w.status=status; w.decidedTs=Date.now(); save(all); render();
  }
  btn.onclick=function(){ panel.classList.toggle('show'); render(); };
  window.addEventListener('storage',function(e){ if(e.key===STORE){ render(); } });
  setInterval(function(){ var n=document.getElementById('awN'); if(n)n.textContent=pendingCount(); },3000);
  render();
})();
</script>
</body>
</html>
