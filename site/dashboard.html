<style>
  :root{--bg:#f4f6fb;--surface:#ffffff;--surface2:#eef1f7;--line:#e7ebf2;--text:#0e1726;--muted:#8a94a6;--tertiary:#aab3c2;--accent:#1e40d8;--accent2:#3a5bf0;--green:#16a34a;--red:#e5484d;--font-num:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--font-tech:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  body.dark{--bg:#0b0f1a;--surface:#141a28;--surface2:#1d2536;--line:rgba(255,255,255,.08);--text:#eef2f8;--muted:#9aa6bd;--tertiary:#5e6b80}

  body.dark .place:disabled{background:#2c3346}

  header{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:18px;padding:14px 24px;background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(16px);border-bottom:1px solid var(--line)}

  nav{display:flex;gap:8px;align-items:center;flex:none}

  nav a .tip::before{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:#111827}
  nav a:hover .tip{opacity:1;transform:translateX(-50%) translateY(0)}

  .account .dropdown a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text);transition:background .15s}

  .account .dropdown .drow{display:flex;align-items:center;gap:11px;width:100%;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text);background:none;border:none;text-align:left;transition:background .15s}
  .account .dropdown .drow:hover{background:var(--surface2)}
  .account .dropdown .drow .ic{color:var(--muted);display:flex;width:18px;justify-content:center;flex:none}
  .logout{font-size:13px;color:var(--muted)}

  .pillbar{position:sticky;top:56px;z-index:25;display:flex;gap:8px;overflow-x:auto;padding:11px 28px;background:rgba(5,7,15,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);scrollbar-width:none}

  .chip{display:inline-flex;align-items:center;gap:7px;white-space:nowrap;font-size:13px;color:#cdd4e4;background:rgba(255,255,255,.05);border:1px solid var(--line);padding:8px 15px;border-radius:999px;cursor:pointer;transition:background .15s,color .15s,border-color .15s}

  .layout{display:grid;grid-template-columns:240px minmax(0,760px) 360px;gap:18px;width:100%;justify-content:center;min-height:calc(100vh - 58px);padding:24px 28px 56px;align-items:start}
  .center{width:100%}

  /* sidebar */
  .side{position:sticky;top:88px;margin-top:38px;border:1px solid var(--line);border-radius:16px;padding:8px;background:var(--surface)}
  .side .lab{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;padding:6px 8px 12px}
  .sp{display:flex;align-items:center;gap:11px;font-size:14px;font-weight:500;color:var(--text);padding:11px 12px;border-radius:11px;cursor:pointer;margin-bottom:3px;transition:background .15s,color .15s}

  .filt.on{color:var(--text)}
  .filt.on::after{content:"";position:absolute;left:0;right:0;bottom:-3px;height:2.5px;background:var(--accent);border-radius:2px}
  .filt .fdot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.3s infinite}
  .mkt-head{display:grid;grid-template-columns:minmax(0,1fr) 134px 134px 134px;gap:12px;font-size:13px;color:var(--text);font-weight:700;padding:4px 18px 12px}
  .mkt-head span:not(:first-child){text-align:center}
  .game{position:relative;border:1px solid var(--line);border-radius:15px;padding:18px;margin-bottom:14px;background:var(--surface)}
  .game.live{background:var(--surface)}

  .team{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--text)}
  .team .ab{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);background:var(--surface2);border:1px solid var(--line);flex:none}
  .team .sc{margin-left:12px;font-size:15px;font-weight:800;color:var(--text)}
  .odd{border:1px solid var(--line);border-radius:9px;padding:12px 6px;text-align:center;background:var(--surface2);transition:border-color .12s,background .12s;min-height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .odd:not(.sel):hover{border-color:var(--accent);background:#fff}
  .odd .l{font-size:10px;color:var(--muted)}
  .odd .v{font-size:16px;font-weight:700;color:var(--text)}
  .odd.sel{border-color:transparent;background:var(--accent)}
  .odd.sel .l{color:rgba(255,255,255,.85)}
  .odd.sel .v{color:#fff}

  /* bet slip */
  .slip{position:sticky;top:88px;margin-top:38px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--surface)}
  .slip-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--line)}

  .slip-modes{display:flex;gap:5px;padding:11px 15px 0}
  .slip-modes .sm{flex:1;font-size:12px;font-weight:700;color:var(--muted);background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:7px;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
  .slip-modes .sm.on{background:rgba(59,108,246,.12);border-color:rgba(59,108,246,.35);color:var(--accent)}
  .slip-modes .sm:disabled{opacity:.45;cursor:not-allowed}
  .parlay-tag{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--accent);background:rgba(59,108,246,.1);border:1px solid rgba(59,108,246,.25);border-radius:8px;padding:7px 10px;margin-bottom:11px}
  .bsel .srow{display:flex;align-items:center;gap:6px;margin-top:7px}
  .bsel .srow span{font-size:10px;color:var(--muted)}
  .bsel .sstake{width:84px;height:30px;border:1px solid var(--line);border-radius:7px;background:var(--surface2);color:var(--text);padding:0 9px;font-size:12px;font-weight:600;outline:none;text-align:right}

  #payout,#totOdds{color:var(--text)}
  .calc.tot #payout{font-size:18px}
  .slip-body{padding:12px 15px;max-height:340px;overflow:auto}
  .empty{text-align:center;color:var(--muted);font-size:12px;padding:30px 10px}

  .stake label{font-size:12px;color:var(--muted)}
  .stake input{flex:1;height:38px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--text);padding:0 11px;font-size:13px;outline:none;cursor:default}
  .stake input::-webkit-outer-spin-button,.stake input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .stake input[type=number]{-moz-appearance:textfield;appearance:textfield}
  .stake input:focus{border-color:var(--accent)}
  .calc{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}

  .place:active{transform:translateY(1px)}
  .place:disabled{background:#e3e8f0;color:var(--tertiary);cursor:not-allowed}
  .note{font-size:10px;color:var(--muted);text-align:center;margin-top:10px}

  @media(max-width:1080px){
    .layout{grid-template-columns:1fr 300px}
    .side{display:none}
  }
  @media(max-width:780px){
    .layout{grid-template-columns:1fr}
    .slip{position:static}
  }
  .cs-toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:120;display:flex;align-items:center;gap:9px;max-width:88vw}

  .cs-toast svg{color:#4ade80;flex:none}

  .ticker{margin-bottom:14px;border:1px solid var(--line);border-radius:12px;background:var(--surface);overflow:hidden;position:relative;height:38px}

  /* odds move arrows */
  .oarr{font-size:8px;margin-left:6px;vertical-align:middle}
  .oarr.up{color:var(--green)}
  .oarr.down{color:#e5484d}

  .rcol{display:flex;flex-direction:column}
  .rcol .slip{margin-top:14px}
  .openbets{margin-top:38px;border:1px solid var(--line);border-radius:16px;background:var(--surface);overflow:hidden}

  .openbets .oh .lv::before{content:"";width:6px;height:6px;border-radius:50%;background:#e5484d}

  .ob:last-child{border-bottom:none}
  .ob .obpick{font-size:13px;font-weight:600}
  .ob .obsub{font-size:11px;color:var(--muted);margin:2px 0 9px}
  .ob .obrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ob .obscore{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .ob .cashout{font-size:12px;font-weight:700;color:#fff;background:var(--green);border:none;border-radius:8px;padding:7px 12px;cursor:pointer;white-space:nowrap;transition:filter .15s}

  .openbets .ob-empty{padding:22px 15px;text-align:center;font-size:12px;color:var(--muted)}
  .openbets .ob-all{display:block;padding:12px 15px;text-align:center;font-size:12.5px;font-weight:600;color:var(--accent);border-top:1px solid var(--line);transition:background .15s}

  @keyframes oflash{0%{background:rgba(59,108,246,.22)}100%{background:transparent}}
  .odd.upd:not(.sel){animation:oflash .9s ease-out}

  var state={sport:"Football",filter:"all",slip:[],mode:"parlay"};
  var oddDir={};
  function setDir(mi,mk,sd,o,n){ var k=mi+'|'+mk+'|'+sd; if(n>o)oddDir[k]='up'; else if(n<o)oddDir[k]='down'; }
  var $=function(id){return document.getElementById(id);};

  function setSport(id){state.sport=id;renderSports();renderGames();}

  function renderSports(){
    $("sports").innerHTML=SPORTS.map(function(s){
      return '<div class="sp'+(s.id===state.sport?' on':'')+'" data-sp="'+s.id+'"><span class="ico">'+s.ico+'</span>'+s.id+'</div>';
    }).join("");
    Array.prototype.forEach.call($("sports").querySelectorAll(".sp"),function(el){
      el.addEventListener("click",function(){setSport(el.dataset.sp);});
    });
  }

  function cell(mi,market,side,label,odd){
    var key=mi+"|"+market+"|"+side;
    var sel=state.slip.some(function(s){return s.key===key;});
    var lab=label?'<div class="l">'+label+'</div>':'';
    var dir=oddDir[key], arr=dir?'<span class="oarr '+dir+'">'+(dir==='up'?'▲':'▼')+'</span>':'';
    return '<div class="odd'+(sel?' sel':'')+'" data-key="'+key+'" data-mi="'+mi+'" data-mk="'+market+'" data-sd="'+side+'">'+lab+'<div class="v">'+odd.toFixed(2)+arr+'</div></div>';
  }

  function renderGames(){
    var list=DATA.filter(function(m){return m.sport===state.sport&&(state.filter!=='live'||m.live);});
    $("mktTitle").textContent=state.sport+" · Today";
    $("games").innerHTML=list.map(function(m){
      var mi=DATA.indexOf(m);
      var top='<div class="g-top">'+(m.live?'<span class="livep"><span class="dot"></span>'+m.status+'</span>':'<span class="g-league">'+m.league+'</span>')+'<span class="g-time">'+(m.live?'':m.status)+'</span></div>';
      var rowH='<div class="g-row">'+
        '<div class="team"><span class="ab">'+m.home.ab+'</span>'+m.home.name+(m.home.sc!==null?'<span class="sc">'+m.home.sc+'</span>':'')+'</div>'+
        cell(mi,"spread","h",m.spread.hl,m.spread.ho)+
        cell(mi,"total","o","O "+m.total.ln,m.total.o)+
        cell(mi,"ml","h","",m.ml.h)+'</div>';
      var rowA='<div class="g-row">'+
        '<div class="team"><span class="ab">'+m.away.ab+'</span>'+m.away.name+(m.away.sc!==null?'<span class="sc">'+m.away.sc+'</span>':'')+'</div>'+
        cell(mi,"spread","a",m.spread.al,m.spread.ao)+
        cell(mi,"total","u","U "+m.total.ln,m.total.u)+
        cell(mi,"ml","a","",m.ml.a)+'</div>';
      return '<div class="game'+(m.live?' live':'')+'">'+top+rowH+rowA+'</div>';
    }).join("")||'<div class="empty">'+(state.filter==='live'?'No live games right now.':'No games for this sport right now.')+'</div>';
    Array.prototype.forEach.call($("games").querySelectorAll(".odd"),function(el){
      el.addEventListener("click",function(){toggle(el.dataset);});
    });
  }

  function labelFor(m,mk,sd){
    if(mk==="spread")return (sd==="h"?m.home.name+" "+m.spread.hl:m.away.name+" "+m.spread.al);
    if(mk==="total")return (sd==="o"?"Over "+m.total.ln:"Under "+m.total.ln);
    return (sd==="h"?m.home.name:m.away.name)+" ML";
  }
  function oddFor(m,mk,sd){
    if(mk==="spread")return sd==="h"?m.spread.ho:m.spread.ao;
    if(mk==="total")return sd==="o"?m.total.o:m.total.u;
    return sd==="h"?m.ml.h:m.ml.a;
  }

  function toggle(d){
    var key=d.key,mi=+d.mi,m=DATA[mi];
    var i=state.slip.findIndex(function(s){return s.key===key;});
    if(i>-1){state.slip.splice(i,1);}
    else{
      // replace any existing pick from same match+market
      state.slip=state.slip.filter(function(s){return !(s.mi===mi&&s.mk===d.mk);});
      var _idx=(d.sd==='h'||d.sd==='o')?0:1, _ci=(m._core&&m._core[d.mk])?m._core[d.mk][_idx]:null;
      state.slip.push({key:key,mi:mi,mk:d.mk,sd:d.sd,pick:labelFor(m,d.mk,d.sd),sub:m.away.name+" @ "+m.home.name,odd:oddFor(m,d.mk,d.sd),stake:50,gid:m._gid,sel:(_ci&&_ci.sel)||labelFor(m,d.mk,d.sd),am:(_ci&&_ci.am)||0});
    }
    renderGames();renderSlip();
  }

  function renderSlip(){
    $("cnt").textContent=state.slip.length;
    if(!state.slip.length){
      $("slipBody").innerHTML='<div class="empty">No selections yet.<br>Tap any odds to add a bet.</div>';
    }else{
      var singles=state.mode==='singles';
      $("slipBody").innerHTML=state.slip.map(function(s){
        var srow = singles ? '<div class="srow"><span>$</span><input class="sstake" type="number" min="0" step="5" data-key="'+s.key+'" value="'+s.stake+'"><span class="ip">→ $'+(s.odd*(parseFloat(s.stake)||0)).toFixed(2)+'</span></div>' : '';
        return '<div class="bsel"><div style="flex:1;min-width:0"><div class="pick">'+s.pick+'</div><div class="sub">'+s.sub+'</div>'+srow+'</div><div class="right"><span class="o">'+s.odd.toFixed(2)+'</span><button class="rm" data-key="'+s.key+'">&times;</button></div></div>';
      }).join("");
      Array.prototype.forEach.call($("slipBody").querySelectorAll(".rm"),function(b){
        b.addEventListener("click",function(){
          var i=state.slip.findIndex(function(s){return s.key===b.dataset.key;});
          if(i>-1){state.slip.splice(i,1);renderGames();renderSlip();}
        });
      });
      Array.prototype.forEach.call($("slipBody").querySelectorAll(".sstake"),function(inp){
        inp.addEventListener("input",function(){
          var s=state.slip.find(function(x){return x.key===inp.dataset.key;});
          if(s){ s.stake=inp.value; var ip=inp.parentNode.querySelector('.ip'); if(ip)ip.textContent='→ $'+(s.odd*(parseFloat(s.stake)||0)).toFixed(2); calc(); }
        });
      });
    }
    calc();
  }

  function setMode(m){
    state.mode=m;
    $("modeParlay").classList.toggle('on',m==='parlay');
    $("modeSingles").classList.toggle('on',m==='singles');
    $("stakeRow").style.display = m==='singles' ? 'none' : '';
    renderSlip();
  }

  function calc(){
    var n=state.slip.length;
    if(state.mode==='singles'){
      var totStake=0, totPay=0;
      state.slip.forEach(function(s){ var st=parseFloat(s.stake)||0; totStake+=st; totPay+=st*s.odd; });
      $("calcLabel").textContent="Total stake";
      $("totOdds").textContent=n?"$"+totStake.toFixed(2):"—";
      $("payout").textContent="$"+(n?totPay:0).toFixed(2);
      $("place").disabled=!n||totStake<=0;
    }else{
      var tot=state.slip.reduce(function(a,s){return a*s.odd;},1);
      var stake=parseFloat($("stake").value)||0;
      $("calcLabel").textContent="Total odds";
      $("totOdds").textContent=n?tot.toFixed(2):"—";
      $("payout").textContent="$"+(n?tot*stake:0).toFixed(2);
      $("place").disabled=!n||stake<=0;
    }
  }

  $("stake").addEventListener("input",calc);
  $("modeParlay").addEventListener("click",function(){setMode("parlay");});
  $("modeSingles").addEventListener("click",function(){setMode("singles");});
  // ===== balance + toast =====
  function money(v){ return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  var balance=parseFloat($("balance").textContent.replace(/[^0-9.]/g,''))||0;
  function setBalance(v){ balance=Math.max(0,v); $("balance").textContent=money(balance); }
  var toastEl=document.createElement('div'); toastEl.className='cs-toast'; document.body.appendChild(toastEl); var toastTmr;
  function toast(msg){ toastEl.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span>'+msg+'</span>'; toastEl.classList.add('show'); clearTimeout(toastTmr); toastTmr=setTimeout(function(){toastEl.classList.remove('show');},2400); }

  // ===== open-bets badge =====
  function getBetCount(){ var n; try{ n=parseInt(localStorage.getItem('alpexa_openbets'),10); }catch(e){} return isNaN(n)?0:n; }
  function renderBetBadge(){ var b=$("myBetsBadge"); if(!b)return; var n=getBetCount(); b.textContent=n; b.style.display=n>0?'':'none'; }
  function addBets(k){ var n=getBetCount()+k; try{ localStorage.setItem('alpexa_openbets',n); }catch(e){} renderBetBadge(); }
  renderBetBadge();

  var MKT={spread:'spread',total:'total',ml:'moneyline'};   // settler-friendly market names
  var MKNAME={spread:'Spread',total:'Total',ml:'Moneyline'};
  $("place").addEventListener("click", async function(){
    if(!state.slip.length) return;
    if(!window._db){ toast('No server connection'); return; }
    var me=null; try{ me=JSON.parse(localStorage.getItem('alpexa.me')||'null'); }catch(e){}
    var acct=me&&me.accts&&me.accts.sports;
    if(!acct){ toast('Please log in first'); return; }
    function legOf(s){ return { uid:'L'+Math.random().toString(36).slice(2,9), gid:s.gid, market:(MKT[s.mk]||s.mk), sel:s.sel, am:s.am, game:s.sub }; }
    // Build the bet(s): singles = one bet per pick, parlay = one combined bet.
    var bets=[];
    if(state.mode==='singles'){
      state.slip.forEach(function(s){ var st=parseFloat(s.stake)||0; if(st<=0)return;
        bets.push({ cls:'single', stake:st, potential:Math.round(st*s.odd*100)/100,
          type:((DATA[s.mi]&&DATA[s.mi].league)?DATA[s.mi].league+' ':'')+(MKNAME[s.mk]||'Bet'), pick:s.pick, legs:[legOf(s)] }); });
    }else{
      var stake=parseFloat($("stake").value)||0; if(stake<=0){ toast('Enter a stake first'); return; }
      var d=state.slip.reduce(function(a,s){return a*s.odd;},1);
      bets.push({ cls:'parlay', stake:stake, potential:Math.round(stake*d*100)/100,
        type:(state.slip.length>1?state.slip.length+'-leg parlay':'Single'),
        pick:state.slip.map(function(s){return s.sel||s.pick;}).join(' + '), legs:state.slip.map(legOf) });
    }
    if(!bets.length){ toast('Enter a stake first'); return; }
    var totStake=bets.reduce(function(a,b){return a+b.stake;},0);
    if(totStake>balance){ toast('Insufficient balance'); return; }
    // Every leg must carry a game id, else the server can't settle it.
    for(var k=0;k<bets.length;k++) for(var j=0;j<bets[k].legs.length;j++) if(!bets[k].legs[j].gid){ toast("This game can't be bet right now"); return; }
    var pb=$("place"), label=pb.textContent; pb.disabled=true; pb.textContent='Placing…';
    var ok=0, err='';
    for(var bi=0; bi<bets.length; bi++){
      var b=bets[bi];
      var localId='sp'+Date.now()+'-'+bi+'-'+Math.random().toString(36).slice(2,6);
      var meta={ type:b.type, cls:b.cls, stake:b.stake, potential:b.potential, ticket:localId, placedTs:Date.now(), legs:b.legs };
      try{
        var res=await window._db.rpc('place_bet',{ p_acct:acct, p_stake:b.stake, p_potential:b.potential,
          p_symbol:b.type+' · '+b.pick, p_local_id:localId, p_meta:meta,
          p_game:(b.legs[0]&&b.legs[0].game)||'', p_pick:b.pick, p_odds:(b.legs[0]&&b.legs[0].am)||0, p_size:b.legs.length });
        var dt=res&&res.data;
        if(res&&res.error){ err=res.error.message||'Bet failed'; }
        else if(dt&&dt.ok===false){ err=dt.error||'Bet failed'; }
        else { ok++; }
      }catch(e){ err=(e&&e.message)||'Bet failed'; }
    }
    pb.disabled=false; pb.textContent=label;
    if(ok>0){
      toast(ok+' bet'+(ok>1?'s':'')+' placed ✓');
      state.slip=[]; renderGames(); renderSlip();
      loadOpenBets();
      // Pull the new balance from the server (place_bet deducted the stake there).
      window._db.from('accounts').select('balance').eq('acct_no',acct).maybeSingle().then(function(r){
        if(r&&!r.error&&r.data){ setBalance(+r.data.balance||0); try{localStorage.setItem('alpexa.sportsBalance',String(+r.data.balance||0));}catch(e){} }
      });
    }
    if(err){ toast(err); }
  });

  Array.prototype.forEach.call(document.querySelectorAll('#boardFilters .filt'),function(el){
    el.addEventListener('click',function(){
      state.filter=el.dataset.f;
      Array.prototype.forEach.call(document.querySelectorAll('#boardFilters .filt'),function(x){x.classList.toggle('on',x.dataset.f===state.filter);});
      renderGames();
    });
  });

  renderSports();renderGames();renderSlip();

  // ===== my open bets =====
  var OPEN=[];  // no demo bets — a fresh account has none; real bets are wired in the bets step
  function renderOpenBets(){
    var el=$("openbets"); if(!el) return;
    var head='<div class="oh"><h3>My open bets</h3></div>';
    if(!OPEN.length){ el.innerHTML=head+'<div class="ob-empty">No open bets right now.</div>'; return; }
    var LIMIT=4, shown=OPEN.slice(0,LIMIT);
    el.innerHTML=head+shown.map(function(o){
      return '<div class="ob"><div class="obpick">'+(o.pick||'Bet')+'</div><div class="obsub">'+(o.sub||'')+' · $'+(+o.stake||0).toFixed(2)+' → win $'+(+o.potential||0).toFixed(2)+'</div></div>';
    }).join('')+'<a class="ob-all" href="my-bets.html">View all in My Bets'+(OPEN.length>LIMIT?' ('+OPEN.length+')':'')+' &rsaquo;</a>';
  }
  // Load THIS account's open bets from the server (positions) — same source the app uses.
  async function loadOpenBets(){
    try{
      if(!window._db) return;
      var me=JSON.parse(localStorage.getItem('alpexa.me')||'null'); var cust=me&&me.custId; if(!cust) return;
      var r=await window._db.from('positions').select('symbol,stake,potential,game,pick,meta')
        .eq('cust_id',cust).eq('server','sports').eq('kind','bet').eq('status','open');
      if(r&&!r.error&&Array.isArray(r.data)){
        OPEN.length=0;
        r.data.forEach(function(p){ var meta=p.meta||{}; OPEN.push({ pick:p.pick||p.symbol||'Bet', sub:p.game||meta.type||'', stake:+p.stake||0, potential:+p.potential||0 }); });
        try{ localStorage.setItem('alpexa_openbets', OPEN.length); }catch(e){}
        renderBetBadge(); renderOpenBets();
      }
    }catch(e){}
  }
  renderOpenBets(); loadOpenBets(); setInterval(loadOpenBets, 30000);

  // ===== live odds + score simulation =====
  function nudge(o){ var v=Math.round((o+(Math.random()*0.08-0.04))*100)/100; return Math.min(3.6,Math.max(1.20,v)); }
  function flashGame(mi){
    Array.prototype.forEach.call(document.querySelectorAll('.odd[data-mi="'+mi+'"]'),function(el){ el.classList.remove('upd'); void el.offsetWidth; el.classList.add('upd'); });
  }
  setInterval(function(){
    if(window.__realOdds) return;
    var live=DATA.filter(function(m){return m.live;});
    if(!live.length) return;
    var m=live[Math.floor(Math.random()*live.length)], mi=DATA.indexOf(m), r=Math.random();
    if(r<0.34){ var a=m.ml.h,b=m.ml.a; m.ml.h=nudge(a); m.ml.a=nudge(b); setDir(mi,'ml','h',a,m.ml.h); setDir(mi,'ml','a',b,m.ml.a); }
    else if(r<0.67){ var c=m.spread.ho,d=m.spread.ao; m.spread.ho=nudge(c); m.spread.ao=nudge(d); setDir(mi,'spread','h',c,m.spread.ho); setDir(mi,'spread','a',d,m.spread.ao); }
    else { var e=m.total.o,f=m.total.u; m.total.o=nudge(e); m.total.u=nudge(f); setDir(mi,'total','o',e,m.total.o); setDir(mi,'total','u',f,m.total.u); }
    if(state.sport===m.sport){ renderGames(); flashGame(mi); }
  },2600);
  setInterval(function(){
    if(window.__realOdds) return;
    var live=DATA.filter(function(m){return m.live && m.home.sc!==null;});
    if(!live.length) return;
    var m=live[Math.floor(Math.random()*live.length)], mi=DATA.indexOf(m);
    if(Math.random()<0.5) m.home.sc++; else m.away.sc++;
    if(state.sport===m.sport) renderGames();
    renderOpenBets();
  },6500);

  (function(){
    var sun='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>';
    var moon='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
    var btn=document.getElementById('themeBtn');
    var themeIc=document.getElementById('themeIc'), themeLb=document.getElementById('themeLb');
    try{ if(localStorage.getItem('alpexa_theme')==='dark') document.body.classList.add('dark'); }catch(e){}
    function paint(){ var dark=document.body.classList.contains('dark'); if(themeIc)themeIc.innerHTML=dark?sun:moon; if(themeLb)themeLb.textContent=dark?'Light mode':'Dark mode'; }
    paint();
    if(btn) btn.addEventListener('click',function(){
      document.body.classList.toggle('dark');
      try{ localStorage.setItem('alpexa_theme', document.body.classList.contains('dark')?'dark':'light'); }catch(e){}
      paint();
    });
  })();

  // account dropdown
  (function(){
    var acc=document.getElementById('account');
    var btn=document.getElementById('avatarBtn');
    if(!acc||!btn) return;
    btn.addEventListener('click',function(e){ e.stopPropagation(); acc.classList.toggle('open'); });
    document.addEventListener('click',function(e){ if(!acc.contains(e.target)) acc.classList.remove('open'); });
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') acc.classList.remove('open'); });
  })();
</script>
<script>
/* Step 2: show the REAL sports balance (same account as the app).
   Paints instantly from the value cached at login, then refreshes from the
   server so the number always matches sports-live.html. */
(function(){
  function applyBal(b){
    b=Math.max(0,+b||0);
    if(typeof setBalance==='function'){ try{ setBalance(b); return; }catch(e){} }
    var el=document.getElementById('balance');
    if(el) el.textContent='$'+b.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  try{
    var me=JSON.parse(localStorage.getItem('alpexa.me')||'null'); if(!me) return;
    var cached=parseFloat(localStorage.getItem('alpexa.sportsBalance'));
    if(!isNaN(cached)) applyBal(cached);
    var acct=me.accts && me.accts.sports;
    if(acct && window._db){
      window._db.from('accounts').select('balance').eq('acct_no',acct).maybeSingle().then(function(r){
        if(r && !r.error && r.data){
          var b=+r.data.balance||0;
          applyBal(b);
          try{
            localStorage.setItem('alpexa.sportsBalance', String(b));
            var sb=JSON.parse(localStorage.getItem('alpexa.serverBalances')||'{}'); sb.sports=b;
            localStorage.setItem('alpexa.serverBalances', JSON.stringify(sb));
          }catch(e){}
        }
      });
    }
  }catch(e){}
})();
</script>
<script>
/* Server-center: read games from live_games (ONE source for app + desktop).
   Each game carries gid + raw odds (am/sel) so a bet placed here settles on the
   server exactly like the app's. Read-only. */
(function(){
  if(!window._db || typeof DATA==='undefined') return;
  var PALS=['linear-gradient(135deg,#e23744,#9e1124)','linear-gradient(135deg,#2a915c,#0c3b24)','linear-gradient(135deg,#1d4ed8,#0b1e66)','linear-gradient(135deg,#7c3aed,#3b1d72)','linear-gradient(135deg,#ea580c,#7c2d12)','linear-gradient(135deg,#0891b2,#0e4f5e)','linear-gradient(135deg,#475569,#1e293b)','linear-gradient(135deg,#b45309,#713f12)'];
  function pal(s){var h=0;for(var i=0;i<(s||'').length;i++)h=(h*31+s.charCodeAt(i))|0;return PALS[Math.abs(h)%PALS.length];}
  function dec(am){am=+am;if(!am)return 1.9;return Math.round((am>0?1+am/100:1+100/(-am))*100)/100;}
  function numOf(s){var m=String(s||'').match(/([\d.]+)/);return m?parseFloat(m[1]):0;}
  function toRow(g){
    var sp=g.spread||[],to=g.total||[],ml=g.ml||[];
    if(sp.length<2||to.length<2||ml.length<2) return null;
    return {
      sport:g.sport,league:g.lg,status:g.time||'',live:!!g.live,
      home:{ab:g.home.ab,name:g.home.nm,c:pal(g.home.nm),sc:(g.home.sc!=null?g.home.sc:null)},
      away:{ab:g.away.ab,name:g.away.nm,c:pal(g.away.nm),sc:(g.away.sc!=null?g.away.sc:null)},
      spread:{hl:sp[0].ln,ho:dec(sp[0].am),al:sp[1].ln,ao:dec(sp[1].am)},
      total:{ln:numOf(to[0].ln||to[0].sel),o:dec(to[0].am),u:dec(to[1].am)},
      ml:{h:dec(ml[0].am),a:dec(ml[1].am)},
      _gid:g.gid,_core:{spread:sp,total:to,ml:ml}
    };
  }
  async function load(){
    try{
      var r=await window._db.from('live_games').select('data').eq('id','all').maybeSingle();
      var games=(r&&r.data&&r.data.data)||[];
      if(!Array.isArray(games)) return;
      var rows=[]; games.forEach(function(g){ try{ var x=toRow(g); if(x) rows.push(x); }catch(e){} });
      window.__realOdds=true;
      DATA.length=0; rows.forEach(function(x){DATA.push(x);});
      try{ if(typeof state==='object'){ var have={}; DATA.forEach(function(g){have[g.sport]=true;});
        if(!have[state.sport]){ var first=Object.keys(have)[0]; if(first){ state.sport=first; if(typeof renderSports==='function')renderSports(); } } } }catch(e){}
      if(typeof renderGames==='function') renderGames();
    }catch(e){}
  }
  load(); setInterval(load,60000);
})();
</script>
