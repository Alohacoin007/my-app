<!DOCTYPE html>
<html lang="en">
<head>

<title>Alpexa Sports — My Bets</title>
<script>
/* Route guard: require a signed-in session, else send to login. */
(function(){try{
  var m=JSON.parse(localStorage.getItem('alpexa.me')||'null');
  if(!(m&&m.accts&&(m.email||m.authId))){ location.replace('login.html'); }
}catch(e){ location.replace('login.html'); }})();
</script>
<style>
  :root{--bg:#f4f6fb;--surface:#ffffff;--surface2:#eef1f7;--line:#e7ebf2;--text:#0e1726;--muted:#5a6478;--tertiary:#aab3c2;--accent:#1e40d8;--green:#16a34a;--red:#e5484d}
  body.dark{--bg:#0b0f1a;--surface:#141a28;--surface2:#1d2536;--line:rgba(255,255,255,.08);--text:#eef2f8;--muted:#9aa6bd;--tertiary:#5e6b80}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  body::after{content:"";position:fixed;inset:0;z-index:-2;background:linear-gradient(180deg,#f8fafd,#eef2f8)}
  body.dark::after{background:linear-gradient(180deg,#0e1322,#0b0f1a)}

  header{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:20px;padding:14px 24px;background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(16px);border-bottom:1px solid var(--line)}
  body.dark header{background:rgba(15,20,32,.78)}
  .logo{font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:17px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--text);display:inline-flex;align-items:center;gap:9px}
  .logo .mark{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;background:#1e40d8;color:#fff;font-size:14px;font-weight:800;letter-spacing:0;flex:none}
  .bal{display:inline-flex;align-items:center;background:var(--surface);border:1px solid var(--line);padding:8px 16px;border-radius:999px;margin-left:auto;transition:background .15s}
  .bal:hover{background:var(--surface2)}
  .bal b{font-weight:700;font-size:15px;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.2px}
  nav{display:flex;gap:8px;align-items:center}
  nav a{position:relative;display:flex;color:#5a6478;transition:color .15s}
  body.dark nav a{color:#9aa6bd}
  nav a .tip{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(4px);background:#111827;color:#fff;font-size:11px;font-weight:600;letter-spacing:.2px;padding:6px 11px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;box-shadow:0 8px 22px rgba(0,0,0,.28);transition:opacity .16s,transform .16s;z-index:50}
  nav a .tip::before{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:#111827}
  nav a:hover .tip{opacity:1;transform:translateX(-50%) translateY(0)}
  nav a .ni{width:38px;height:38px;border-radius:50%;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
  nav a:hover{color:var(--text)}
  nav a:hover .ni{background:var(--line)}
  nav a.on{color:var(--accent)}
  nav a.on .ni{background:rgba(59,108,246,.12);border-color:rgba(59,108,246,.35)}
  nav a .ni{position:static;opacity:1;background:var(--surface2);border:1px solid var(--line)}
  nav a svg{color:var(--text)}
  nav a .nbadge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px var(--bg)}
  .theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--surface2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;transition:background .15s}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;transition:filter .15s,box-shadow .15s}
  .avatar:hover{filter:brightness(1.08)}
  .account{position:relative;display:flex}
  .account.open .avatar{box-shadow:0 0 0 3px rgba(59,108,246,.25)}
  .account .dropdown{position:absolute;top:calc(100% + 12px);right:0;min-width:200px;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 40px rgba(16,24,40,.18);padding:6px;opacity:0;visibility:hidden;transform:translateY(-6px);transition:opacity .15s,transform .15s,visibility .15s;z-index:60}
  .account.open .dropdown{opacity:1;visibility:visible;transform:translateY(0)}
  .account .dropdown .uhead{padding:8px 12px 10px;border-bottom:1px solid var(--line);margin-bottom:6px}
  .account .dropdown .uhead .un{font-size:13px;font-weight:700;color:var(--text)}
  .account .dropdown .uhead .ue{font-size:11px;color:var(--muted)}
  .account .dropdown a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text);transition:background .15s}
  .account .dropdown a:hover{background:var(--surface2)}
  .account .dropdown a svg{color:var(--muted);flex:none}
  .account .dropdown a.on{color:var(--accent)}
  .account .dropdown a.on svg{color:var(--accent)}
  .account .dropdown .sep{height:1px;background:var(--line);margin:6px 4px}
  .account .dropdown .drow{display:flex;align-items:center;gap:11px;width:100%;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text);background:none;border:none;text-align:left;transition:background .15s}
  .account .dropdown .drow:hover{background:var(--surface2)}
  .account .dropdown .drow .ic{color:var(--muted);display:flex;width:18px;justify-content:center;flex:none}
  .logout{font-size:13px;color:var(--muted)}
  .logout:hover{color:var(--text)}

  .wrap{max-width:720px;margin:0 auto;padding:30px 24px 70px}
  .wrap h1{font-size:26px;font-weight:700;letter-spacing:-.6px;margin-bottom:18px}
  .ph{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .wrap .ph h1{margin-bottom:0}
  .back{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--line);color:var(--muted);flex:none;transition:background .15s,color .15s,transform .15s}
  .back:hover{background:var(--surface2);color:var(--text);transform:translateX(-2px)}
  .tabs{display:inline-flex;gap:3px;padding:4px;background:var(--surface2);border:1px solid var(--line);border-radius:12px;margin-bottom:22px}
  .tab{font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:none;padding:8px 20px;border-radius:9px;cursor:pointer;transition:color .15s,background .15s}
  .tab:hover{color:var(--text)}
  .tab.on{color:#fff;background:var(--accent);box-shadow:0 2px 8px rgba(59,108,246,.28)}

  .bet{border:1px solid var(--line);border-radius:16px;background:var(--surface);margin-bottom:14px;overflow:hidden}
  .bet-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
  .bet-type{font-size:13px;font-weight:700}
  .bet-type span{color:var(--muted);font-weight:500;margin-left:6px}
  .status{font-size:11px;font-weight:700;letter-spacing:.4px;padding:4px 10px;border-radius:999px}
  .status.open{color:var(--accent);background:rgba(59,108,246,.12)}
  .status.live{color:var(--red);background:rgba(229,72,77,.14);display:inline-flex;align-items:center;gap:5px}
  .status.live .dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.3s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .status.won{color:#fff;background:var(--green)}
  .status.lost{color:#fff;background:var(--red)}

  .legs{padding:6px 16px}
  .leg{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .leg:last-child{border-bottom:none}
  .leg .pick{font-size:13px;font-weight:600}
  .leg .sub{font-size:11px;color:var(--muted);margin-top:2px}
  .leg .live-sc{font-size:11px;color:var(--accent);font-weight:600;margin-top:3px}
  .leg .o{font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap}
  .leg .o.win{color:var(--green)}
  .leg .o.lose{color:var(--muted);text-decoration:line-through}

  .bet-foot{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface2)}
  .bet-foot .col{display:flex;flex-direction:column}
  .bet-foot .k{font-size:10px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
  .bet-foot .v{font-size:14px;font-weight:700;margin-top:1px}
  .bet-foot .v.green{color:var(--green)}
  .cashout{margin-left:auto;display:inline-flex;flex-direction:column;align-items:flex-end}
  .cashout button{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;transition:filter .15s}
  .cashout button:hover{filter:brightness(1.08)}
  .cashout .hint{font-size:10px;color:var(--muted);margin-top:4px}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:50px 10px}
  .panel{display:none}
  .panel.on{display:block}
</style>
</head>
<body class="light">
  <header>
    <a class="logo" href="index.html"><span class="mark">A</span>Alpexa Sports</a>

    <nav>
      <a class="on" href="my-bets.html" aria-label="My Bets"><span class="ni"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16a1 1 0 0 1 1 1v3a2 2 0 0 0 0 4v3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-3a2 2 0 0 0 0-4V7a1 1 0 0 1 1-1z"/><path d="M14 6.5v11" stroke-dasharray="2 3"/></svg></span><span class="nbadge" id="myBetsBadge" style="display:none">0</span><span class="tip">My Bets</span></a>
    </nav>
    <span class="account" id="account">
      <span class="avatar" id="avatarBtn">CK</span>
      <div class="dropdown">
        <div class="uhead"><div class="un">Christian Kim</div><div class="ue">VIP · Gold</div></div>
        <a href="dashboard.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/></svg> Dashboard</a>
        <a class="on" href="my-bets.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16a1 1 0 0 1 1 1v3a2 2 0 0 0 0 4v3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-3a2 2 0 0 0 0-4V7a1 1 0 0 1 1-1z"/><path d="M14 6.5v11" stroke-dasharray="2 3"/></svg> My Bets</a>
        <a href="wallet.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18"/><circle cx="16.5" cy="14" r="1.2"/></svg> Wallet</a>

      </div>
    </span>
  </header>

  <div class="wrap">
    <div class="ph"><a class="back" href="dashboard.html" aria-label="Back to dashboard"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a><h1>My Bets</h1></div>
    <div class="tabs">
      <button class="tab on" data-p="open">Open</button>
      <button class="tab" data-p="settled">Settled</button>
    </div>

    <!-- OPEN -->
    <section class="panel on" id="open">
      <div style="text-align:center;color:var(--muted);padding:46px 12px;font-size:14px">No open bets yet. Place a bet and it will show up here.</div>
    </section>

    <!-- SETTLED -->
    <section class="panel" id="settled">
      <div style="text-align:center;color:var(--muted);padding:46px 12px;font-size:14px">No settled bets yet.</div>
    </section>

  <script>
  (function(){
    var b=document.body;
    var sun='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>';
    var moon='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
    try{ var t=localStorage.getItem('alpexa_theme'); if(t==='dark') b.classList.remove('light'); else b.classList.add('light'); if(t==='dark')b.classList.add('dark'); }catch(e){}
    var btn=document.getElementById('themeBtn');
    var themeIc=document.getElementById('themeIc'), themeLb=document.getElementById('themeLb');
    function paint(){ var dark=b.classList.contains('dark'); if(themeIc)themeIc.innerHTML=dark?sun:moon; if(themeLb)themeLb.textContent=dark?'Light mode':'Dark mode'; }
    paint();
    if(btn) btn.addEventListener('click',function(){
      b.classList.toggle('dark'); b.classList.toggle('light');
      try{ localStorage.setItem('alpexa_theme', b.classList.contains('dark')?'dark':'light'); }catch(e){}
      paint();
    });
    var tabs=[].slice.call(document.querySelectorAll('.tab'));
    tabs.forEach(function(t){t.addEventListener('click',function(){
      tabs.forEach(function(x){x.classList.toggle('on',x===t);});
      [].slice.call(document.querySelectorAll('.panel')).forEach(function(p){p.classList.toggle('on',p.id===t.dataset.p);});
    });});
    var acc=document.getElementById('account');
    var avb=document.getElementById('avatarBtn');
    if(acc&&avb){
      avb.addEventListener('click',function(e){ e.stopPropagation(); acc.classList.toggle('open'); });
      document.addEventListener('click',function(e){ if(!acc.contains(e.target)) acc.classList.remove('open'); });
      document.addEventListener('keydown',function(e){ if(e.key==='Escape') acc.classList.remove('open'); });
    }
  })();
  </script>
<script>(function(){var n;try{n=parseInt(localStorage.getItem('alpexa_openbets'),10);}catch(e){}if(isNaN(n))n=0;var b=document.getElementById('myBetsBadge');if(b){b.textContent=n;b.style.display=n>0?'':'none';}})();</script>

<script>try{window._db=window.supabase.createClient('https://grxnbgtfnaayeluenvqh.supabase.co','sb_publishable_ow1DihBdAAvNtnb1H0Kojw_7vbeMKFu');}catch(e){console.error('supabase init',e);}</script>
<script>
/* Show the real sports balance (same account as the app). */
(function(){
  function setBal(b){ b=Math.max(0,+b||0); var el=document.getElementById('balance'); if(el) el.textContent='$'+b.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  try{
    var me=JSON.parse(localStorage.getItem('alpexa.me')||'null'); if(!me) return;
    var c=parseFloat(localStorage.getItem('alpexa.sportsBalance')); if(!isNaN(c)) setBal(c);
    var acct=me.accts&&me.accts.sports;
    if(acct&&window._db){ window._db.from('accounts').select('balance').eq('acct_no',acct).maybeSingle().then(function(r){ if(r&&!r.error&&r.data){ var b=+r.data.balance||0; setBal(b); try{localStorage.setItem('alpexa.sportsBalance',String(b));}catch(e){} } }); }
  }catch(e){}
})();
</script>
