<script>
// Tiny version stamp so we can tell at a glance if the NEW design loaded.
(function(){try{var b=document.createElement('div');b.textContent='FX v101';
b.style.cssText='position:fixed;left:50%;top:env(safe-area-inset-top,8px);transform:translateX(-50%);z-index:2147483647;background:#16243F;color:#fff;font:700 11px system-ui;padding:5px 10px;border-radius:8px;opacity:.95;box-shadow:0 3px 10px rgba(0,0,0,.3)';
document.body.appendChild(b);setTimeout(function(){b.style.transition='opacity .5s';b.style.opacity='0';},3500);setTimeout(function(){b.remove();},4200);}catch(e){}})();
</script>
<script>
/* Report open FX positions to the server so the back office can see them live. */
(function(){
  function meX(){try{var m=JSON.parse(localStorage.getItem('alpexa.me')||'null');return m&&m.accts?m:null;}catch(e){return null;}}
  // M4-1: Identity auto-refresh. On every load, pull THIS user's current cust_id +
  // account numbers from the server and rewrite alpexa.me. This kills cust_id drift
  // structurally (no re-login needed) so positions/online/P&L always line up.
  function refreshMe(){ try{
    if(!window.AlpexaSync||!AlpexaSync.db)return;
    var m; try{m=JSON.parse(localStorage.getItem('alpexa.me')||'null');}catch(e){return;}
    if(!m||(!m.authId&&!m.email))return;
    var q=AlpexaSync.db.from('players').select('id,cust_id,name,email,auth_id');
    if(m.authId) q=q.eq('auth_id',m.authId); else q=q.ilike('email',m.email);
    q.limit(1).then(function(r){
      var p=r&&r.data&&r.data[0]; if(!p)return;
      AlpexaSync.db.from('accounts').select('server,acct_no').eq('player_id',p.id).then(function(r2){
        var accts={}; (r2&&r2.data||[]).forEach(function(a){ accts[a.server]=a.acct_no; });
        if(!accts.fx&&!accts.crypto&&!accts.sports)return; // never wipe identity if accounts are missing
        var merged=Object.assign({},m,{custId:p.cust_id,name:p.name||m.name,email:p.email||m.email,authId:p.auth_id||m.authId,accts:accts});
        localStorage.setItem('alpexa.me',JSON.stringify(merged));
      },function(){});
    },function(){});
  }catch(e){} }
  setTimeout(refreshMe,800);
  // Record one finished trade (close/settle) on the server for company P&L.
  window.__alpexaSettle=function(rec){ try{ if(!window.AlpexaSync||!AlpexaSync.db)return; var m=meX(); if(!m)return;
    AlpexaSync.db.from('settlements').insert({cust_id:m.custId,acct_no:(m.accts&&m.accts[rec.server])||'',server:rec.server||'',kind:rec.kind||'',local_id:String(rec.local_id||''),ticket:String(rec.ticket||''),symbol:rec.symbol||'',stake:Math.round((+rec.stake||0)*100)/100,pnl:Math.round((+rec.pnl||0)*100)/100,detail:rec.detail||''}).then(function(){},function(){});
  }catch(e){} };
  function push(){
    if(!window.AlpexaSync||!AlpexaSync.db)return;
    var m=meX(); if(!m||!m.accts.fx)return; var cust=m.custId, acct=m.accts.fx;
    AlpexaSync.db.from('players').update({last_seen:new Date().toISOString(),last_app:'fx'}).eq('cust_id',cust).then(function(){},function(){});
    var items=[];
    try{var live=JSON.parse(localStorage.getItem('alpexa.fxLive')||'[]')||[];
      live.forEach(function(o){ if(!o||!(+o.vol>0))return;
        items.push({cust_id:cust,acct_no:acct,server:'fx',kind:'position',local_id:String(o.id||''),symbol:o.sym||'',side:o.side||'',size:+o.vol||0,open_price:Math.round((+o.open||0)*1e5)/1e5,pnl:Math.round((+o.pnl||0)*100)/100,status:'open'});});
    }catch(e){}
    AlpexaSync.db.from('positions').delete().eq('cust_id',cust).eq('server','fx').then(function(){
      if(items.length)AlpexaSync.db.from('positions').insert(items).then(function(){},function(){});
    },function(){});
  }
  setTimeout(push,2000); setInterval(function(){ if(!document.hidden){ push(); } else { window.__bgPosPush=window.__bgPosPush||0; if(Date.now()-window.__bgPosPush>9000){ window.__bgPosPush=Date.now(); push(); } } },3000);
  // Instant: when a position opens/closes (id list changes), push right away
  // instead of waiting for the next tick. PnL drift rides the 3s interval.
  function posSig(){try{var a=JSON.parse(localStorage.getItem('alpexa.fxLive')||'[]')||[];return a.map(function(o){return o&&o.id;}).join(',');}catch(e){return'';}}
  var _psig=posSig();
  setInterval(function(){var n=posSig(); if(n!==_psig){_psig=n; if(!document.hidden)push();}},700);
  // Lightweight presence heartbeat — runs even in the background so the back
  // office "Online" view stays accurate; fires immediately on focus too.
  function beat(){ if(!window.AlpexaSync||!AlpexaSync.db)return; var m=meX(); if(!m)return;
    var patch={last_seen:new Date().toISOString(),last_app:'fx'};
    // Match by email (stable) when we have it, else cust_id — survives cust_id drift.
    if(m.email) AlpexaSync.db.from('players').update(patch).ilike('email',m.email).then(function(){},function(){});
    else if(m.custId) AlpexaSync.db.from('players').update(patch).eq('cust_id',m.custId).then(function(){},function(){}); }
  setTimeout(beat,1500); setInterval(beat,8000);
  document.addEventListener('visibilitychange',function(){ if(!document.hidden) beat(); });
  // Dealing desk: pull the back-office spread/bias settings and expose them to the
  // price engine. Hard-limited client-side too, so a bad value can't break pricing.
  window.__alpexaFXPricing=window.__alpexaFXPricing||{spreadMult:1,biasFrac:0};
  window.__alpexaFXMarks=window.__alpexaFXMarks||{};
  function pullPricing(){ if(!window.AlpexaSync||!AlpexaSync.db)return;
    AlpexaSync.db.from('pricing').select('*').eq('server','fx').limit(1).then(function(r){
      var p=r&&r.data&&r.data[0]; if(!p)return;
      var sm=+p.spread_mult; if(!(sm>0))sm=1; sm=Math.max(0.5,Math.min(5,sm));
      var bb=+p.bias_bps; if(!isFinite(bb))bb=0; bb=Math.max(-30,Math.min(30,bb));
      window.__alpexaFXPricing={spreadMult:sm,biasFrac:bb/10000};
    },function(){});
    // Per-symbol spread markup (points), set in the back-office dealing desk.
    AlpexaSync.db.from('pricing_marks').select('symbol,markup_pts').then(function(r){
      if(r&&r.data){ var m={}; r.data.forEach(function(p){ var v=+p.markup_pts||0; m[p.symbol]=Math.max(0,Math.min(50,v)); }); window.__alpexaFXMarks=m; }
    },function(){}); }
  setTimeout(pullPricing,1200); setInterval(function(){ if(!document.hidden) pullPricing(); },5000);
  // Shared price feed (one source for everyone). The engine anchors to this each
  // pull so all clients + the back office show the same quote. If the feed goes
  // stale (no manager publishing), the app falls back to its own simulation.
  window.__alpexaFXFeed=window.__alpexaFXFeed||{};
  function pullFeed(){ if(!window.AlpexaSync||!AlpexaSync.db) return;
    AlpexaSync.db.from('prices').select('symbol,mid,spr_pts').then(function(r){
      if(r&&r.data){ var now=Date.now(),f={}; r.data.forEach(function(p){ f[p.symbol]={mid:+p.mid||0,spr:+p.spr_pts||0,ts:now}; }); window.__alpexaFXFeed=f; }
    },function(){}); }
  setTimeout(pullFeed,1000); setInterval(function(){ if(!document.hidden) pullFeed(); },1500);
  // Kill switch: read the back-office trading-halt flag.
  window.__alpexaHalt=false;
  function pullHalt(){ if(!window.AlpexaSync||!AlpexaSync.db)return;
    AlpexaSync.db.from('controls').select('val').eq('key','trading_halt').limit(1).then(function(r){
      window.__alpexaHalt=!!(r&&r.data&&r.data[0]&&r.data[0].val==='1'); },function(){}); }
  setTimeout(pullHalt,1500); setInterval(function(){ if(!document.hidden) pullHalt(); },5000);
  /* Execute back-office commands (force close). */
  function runCmds(){
    if(!window.AlpexaSync||!AlpexaSync.db)return; var m=meX(); if(!m||!m.accts.fx)return; var cust=m.custId;
    AlpexaSync.db.from('commands').select('*').eq('cust_id',cust).eq('server','fx').eq('status','pending').then(function(r){
      if(!r||!r.data||!r.data.length)return;
      r.data.forEach(function(c){ try{
        if(c.action==='set_balance'){ var t=parseFloat(c.local_id);
          if(!isNaN(t)&&window.getBalances&&window.addBalance){ var b=window.getBalances(); window.addBalance('live', t-(+b.live||0)); } }
        else if(window.__alpexaFXClose) window.__alpexaFXClose(c.local_id); }catch(e){}
        AlpexaSync.db.from('commands').update({status:'done'}).eq('id',c.id).then(function(){},function(){}); });
      setTimeout(push,1000);
    },function(){});
  }
  setTimeout(runCmds,4000); setInterval(function(){if(!document.hidden)runCmds();},4000);
})();
</script>
