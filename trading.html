/* Restore identity from the URL (#alpexa=...) so a home-screen install can inherit the account created in Safari (iOS isolates their storage) - no re-login. */
(function(){try{var m=(location.hash||"").match(/alpexa=([^&]+)/);if(m){var id=JSON.parse(decodeURIComponent(atob(m[1])));if(id&&id.accts){localStorage.setItem("alpexa.me",JSON.stringify(id));}}}catch(e){}})();
/* Login gate (real service): no anonymous guest trading. Require a logged-in identity (email or authId); guests/empty go to login. */
(function(){try{var m=JSON.parse(localStorage.getItem("alpexa.me")||"null");if(!(m&&m.accts&&(m.email||m.authId))){location.replace("login.html");}}catch(e){location.replace("login.html");}})();
</script>

<script>
// ALPEXA SFX
(function(){
  let ctx=null;
  function audio(){if(!ctx){try{ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}if(ctx.state==='suspended')ctx.resume();return ctx;}
  function tone({freq=800,dur=0.15,type='sine',vol=0.18,attack=0.005,decay=0.1,slideTo=null,when=0}){const ac=audio();if(!ac)return;const t=ac.currentTime+when;const osc=ac.createOscillator();const gain=ac.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,t);if(slideTo!=null)osc.frequency.exponentialRampToValueAtTime(slideTo,t+dur);gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(vol,t+attack);gain.gain.exponentialRampToValueAtTime(0.0001,t+dur);osc.connect(gain).connect(ac.destination);osc.start(t);osc.stop(t+dur+0.02);}
  function chord(notes,opts={}){notes.forEach((n,i)=>tone({...opts,freq:n,when:(opts.when||0)+i*0.02}));}
  function getMuted(){try{const raw=localStorage.getItem('alpexa.prefs');if(raw)return JSON.parse(raw).soundMuted===true;}catch(e){}return false;}
  const sfx={
    orderFill(side){if(!getMuted()){if(side==='BUY'){tone({freq:660,dur:0.12,type:'sine',vol:0.18,slideTo:1320,decay:0.12});tone({freq:880,dur:0.18,type:'sine',vol:0.12,when:0.06});}else{tone({freq:880,dur:0.12,type:'sine',vol:0.18,slideTo:440,decay:0.12});tone({freq:660,dur:0.18,type:'sine',vol:0.12,when:0.06});}}},
    pendingPlaced(){if(!getMuted())tone({freq:740,dur:0.22,type:'triangle',vol:0.14});},
    triggered(){if(!getMuted())chord([880,1320],{dur:0.16,type:'sine',vol:0.14});},
    closed(){if(!getMuted())tone({freq:520,dur:0.18,type:'sine',vol:0.14,slideTo:380});},
    error(){if(!getMuted()){tone({freq:200,dur:0.12,type:'square',vol:0.12});tone({freq:160,dur:0.18,type:'square',vol:0.12,when:0.08});}},
    tick(){if(!getMuted())tone({freq:1200,dur:0.04,type:'sine',vol:0.06});},
  };
  window.ALPEXA_SFX=sfx;
  // iOS unlocks Web Audio only inside a user gesture — prime it on first touch
  // so the very first order-fill sound plays reliably.
  function unlock(){
    var ac=audio(); if(ac){
      try{ var buf=ac.createBuffer(1,1,22050); var src=ac.createBufferSource(); src.buffer=buf; src.connect(ac.destination); src.start(0); }catch(e){}
      try{ if(ac.state==='suspended') ac.resume(); }catch(e){}
    }
    document.removeEventListener('touchend',unlock,true); document.removeEventListener('mousedown',unlock,true); document.removeEventListener('click',unlock,true);
  }
  document.addEventListener('touchend',unlock,true);
  document.addEventListener('mousedown',unlock,true);
  document.addEventListener('click',unlock,true);
})();
</script>

function createMarket(){
  const state=SYMBOLS.map(s=>({...s,last:s.bid,open:s.bid*(1+(Math.random()-0.5)*0.006),high:s.bid*1.004,low:s.bid*0.996,chgPct:(Math.random()-0.5)*2,series:genSeries(s.bid,60),flash:null,baseSpread:s.spread,spreadFlash:null}));
  function tick(){
    state.forEach((s)=>{

      // steady. Crypto trades 24/7 so it always moves.
      if(!symOpen(s)){ s.flash=null; s.spreadFlash=null; return; }
      // Realistic, calm volatility (real FX barely moves second-to-second).
      const stepScale=s.cls==='CRYPTO'?0.00035:s.cls==='STOCK'?0.00020:0.00004;
      const drift=(Math.random()-0.5)*2*stepScale;

      const PX=(typeof window!=='undefined'&&window.__alpexaFXPricing)||{spreadMult:1,biasFrac:0};

      // symbol, anchor to it (everyone converges to one source). Else self-sim.
      // Price mean-reverts to the symbol's true reference level (s.bid). The
      // shared feed is published for later server use, but we DON'T chase it on
      // every tick — that caused the wild oscillation. Same base on all devices
      // keeps quotes naturally aligned anyway.
      const target=s.bid;

      const pct=drift+meanRev;

      const maxStep=s.last*(s.cls==='CRYPTO'?0.003:s.cls==='STOCK'||s.cls==='INDEX'?0.0015:0.0006);
      if(next>s.last+maxStep)next=s.last+maxStep; else if(next<s.last-maxStep)next=s.last-maxStep;
      // Hard band around the reference so the price stays in a realistic range.
      const bandPct=(s.cls==='CRYPTO'?0.02:s.cls==='STOCK'||s.cls==='INDEX'?0.012:0.0025);
      const loB=s.bid*(1-bandPct), hiB=s.bid*(1+bandPct);
      if(next<loB)next=loB; else if(next>hiB)next=hiB;
      s.flash=next>s.last?'up':next<s.last?'down':null;
      s.last=next;
      if(next>s.high)s.high=next;
      if(next<s.low)s.low=next;
      s.chgPct=((next-s.open)/s.open)*100;
      // Base spread = the symbol's natural spread.
      const baseSp=s.baseSpread;
      // Track the NATURAL spread (unaffected by the desk) so the multiplier
      // never compounds; the desk multiplier is applied only to the final value.
      const prev=(s._natSpread!=null?s._natSpread:s.spread);
      const spike=Math.random()<0.04?(0.7+Math.random()*1.8):1;
      const noise=1+(Math.random()-0.5)*0.35;
      const revert=0.18*(baseSp-prev)/baseSp;
      let natSpread=prev*noise*spike*(1+revert);
      natSpread=Math.max(baseSp*0.4,Math.min(baseSp*3.5,natSpread));
      s._natSpread=natSpread;
      // Dealing-desk spread multiplier (the safe, standard markup lever).
      let nextSpread=natSpread*(PX.spreadMult||1);
      // Per-symbol markup in points (1pt = 10^-(digits-1)) added to the spread.
      const MK=(typeof window!=='undefined'&&window.__alpexaFXMarks)||{};
      const mkPts=+MK[s.sym]||0;
      if(mkPts>0){ nextSpread+=mkPts*Math.pow(10,-((s.digits||5)-1)); }
      s.spreadFlash=Math.abs(natSpread-prev)/s.baseSpread>0.12?(natSpread>prev?'wide':'tight'):null;
      s.spread=nextSpread;

function applySlippage(s,side,px,otype){

    const maxRight=Math.max(PAD,window.innerWidth-w-PAD);

    const up=()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
  };
  if(!open)return null;
  return(
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{right:offsetRef.current.x,bottom:offsetRef.current.y}}>

const TF_CONFIG={M1:{n:60,scale:0.0008,label:'min',step:1},M5:{n:60,scale:0.0015,label:'min',step:5},M15:{n:60,scale:0.0025,label:'min',step:15},H1:{n:80,scale:0.0050,label:'h',step:1},H4:{n:80,scale:0.0095,label:'h',step:4},D1:{n:90,scale:0.0180,label:'d',step:1},W1:{n:52,scale:0.0400,label:'w',step:1}};
function seededRandom(seed){let x=seed;return()=>{x=(x*9301+49297)%233280;return x/233280;};}
function genTfSeries(sym,tf,currentPrice){
  const cfg=TF_CONFIG[tf]||TF_CONFIG.M15;
  const seedStr=sym+':'+tf;let seed=0;
  for(let i=0;i<seedStr.length;i++)seed=(seed*31+seedStr.charCodeAt(i))%1000000;
  const rng=seededRandom(seed);
  let p=currentPrice*(1-cfg.scale*(1+rng()*0.4));
  const arr=[];
  for(let i=0;i<cfg.n;i++){
    const o=p;const dir=rng()>0.48?1:-1;
    const range=currentPrice*(cfg.scale*0.18+rng()*cfg.scale*0.5);
    const c=o+dir*range*(0.3+rng()*0.9);
    const h=Math.max(o,c)+range*rng()*0.6;
    const l=Math.min(o,c)-range*rng()*0.6;
    const v=0.3+rng()*0.7;
    arr.push({o,h,l,c,v});p=c;
  }
  if(arr.length){const last=arr[arr.length-1];last.c=currentPrice;last.h=Math.max(last.h,currentPrice);last.l=Math.min(last.l,currentPrice);}
  return arr;
}
// ── Time-based candle engine (broker-style) ──────────────────────────────────
// Real wall-clock buckets per timeframe; PAST candles are frozen, only the
// current one tracks the live price; persisted so reload keeps history. This is
// the stepping stone to server-stored candles (swap the source later).
function tfMs(tf){ const c=TF_CONFIG[tf]||TF_CONFIG.M15; const step=c.step||1;
  const unit=c.label==='min'?60000:c.label==='h'?3600000:c.label==='d'?86400000:c.label==='w'?604800000:60000;
  return step*unit; }
function fxCandles(sym,tf,livePrice){
  const cfg=TF_CONFIG[tf]||TF_CONFIG.M15, ms=tfMs(tf), cap=cfg.n||80, key='alpexa.fxc.'+sym+'.'+tf;
  if(!(livePrice>0)) return genTfSeries(sym,tf,livePrice||1);
  let store=null; try{ store=JSON.parse(localStorage.getItem(key)||'null'); }catch(e){}
  const nowB=Math.floor(Date.now()/ms);
  let arr;
  if(!store||!store.c||!store.c.length||(nowB-store.c[store.c.length-1].b)>cap){
    // First load (or huge gap): seed a deterministic history ending at "now".
    const seeded=genTfSeries(sym,tf,livePrice);
    arr=seeded.map((k,i)=>({o:k.o,h:k.h,l:k.l,c:k.c,v:k.v,b:nowB-(seeded.length-1-i)}));
  } else {
    arr=store.c;
    const last=arr[arr.length-1];
    if(nowB>last.b){
      // Open new candle(s) for each elapsed bucket; open = previous close.
      let prev=last.c;
      for(let bb=last.b+1; bb<=nowB; bb++){
        arr.push({o:prev,h:Math.max(prev,livePrice),l:Math.min(prev,livePrice),c:livePrice,v:0.3+Math.random()*0.5,b:bb});
        prev=livePrice;
      }
    }
  }
  // Update the CURRENT (last) candle with the live price.
  const cur=arr[arr.length-1];
  cur.c=livePrice; if(livePrice>cur.h)cur.h=livePrice; if(livePrice<cur.l)cur.l=livePrice;
  if(arr.length>cap) arr=arr.slice(arr.length-cap);
  try{ localStorage.setItem(key,JSON.stringify({c:arr})); }catch(e){}
  return arr.map(k=>({o:k.o,h:k.h,l:k.l,c:k.c,v:k.v}));
}

function tdSymbolFor(symStr){

  var o=(window.ALPEXA_MARKET&&ALPEXA_MARKET.SYMBOLS||[]).find(x=>x.sym===symStr);
  if(o&&o.cls==='STOCK')return symStr;
  return symStr.length===6?symStr.slice(0,3)+'/'+symStr.slice(3):symStr;
}
function Chart({series,sym,tf,digits=5,showMA=true,showVol=true,showBB=false,showRSI=false,showMACD=false,accent='#22B8CF',height=280,candleCount,fillContainer=false}){
  const ref=useRef(null);const wrapRef=useRef(null);
  const [hover,setHover]=useState(null);const [w,setW]=useState(360);const [h,setH]=useState(height);
  // Real historical candles from Twelve Data (only for the main chart, cached per sym|tf).
  const [realMap,setRealMap]=useState({});
  const realKey=sym+'|'+tf;
  useEffect(()=>{
    return; // disabled: external history mixed with our simulated live price caused spikes; use the local time-based candle engine instead
    if(!fillContainer||!sym||!tf||typeof fetch!=='function')return;
    if(realMap[realKey])return;
    const iv=TD_INTERVAL[tf]||'5min';const n=(candleCount&&candleCount>0)?candleCount:80;
    let cancelled=false;
    fetch('https://api.twelvedata.com/time_series?symbol='+encodeURIComponent(tdSymbolFor(sym))+'&interval='+iv+'&outputsize='+n+'&order=ASC&apikey='+TD_KEY_CHART)
      .then(r=>r.json()).then(j=>{ if(cancelled)return;
        if(j&&j.values&&j.values.length){
          const candles=j.values.map(v=>({o:+v.open,h:+v.high,l:+v.low,c:+v.close,v:+(v.volume||0)||0.5})).filter(c=>isFinite(c.c)&&c.c>0);
          if(candles.length)setRealMap(m=>({...m,[realKey]:candles}));
        }
      }).catch(()=>{});
    return ()=>{cancelled=true;};
  },[sym,tf,fillContainer,candleCount]);
  const liveSeries=useMemo(()=>{
    const livePx=series&&series.length?series[series.length-1].c:null;
    // Main chart: time-based persistent candles (broker-style). Past candles
    // frozen, current one tracks the live price, survives reloads.
    if(fillContainer&&sym&&tf&&livePx!=null&&isFinite(livePx)){
      const full=fxCandles(sym,tf,livePx);
      if(candleCount&&full.length>candleCount)return full.slice(full.length-candleCount);
      return full;
    }
    if(sym&&tf&&series&&series.length){
      const last=series[series.length-1].c;
      const full=genTfSeries(sym,tf,last);
      if(candleCount&&full.length>candleCount)return full.slice(full.length-candleCount);
      return full;
    }return series;
  },[sym,tf,candleCount,fillContainer,series&&series[series.length-1]&&series[series.length-1].c]);
  useEffect(()=>{const ro=new ResizeObserver(entries=>{for(const e of entries){setW(e.contentRect.width);if(fillContainer&&e.contentRect.height>0)setH(e.contentRect.height);}});if(wrapRef.current)ro.observe(wrapRef.current);return()=>ro.disconnect();},[fillContainer]);
  useEffect(()=>{if(!fillContainer)setH(height);},[height,fillContainer]);
  useEffect(()=>{if(!ref.current||!liveSeries||!liveSeries.length)return;draw();},[liveSeries,w,h,showMA,showVol,showBB,showRSI,showMACD,hover,accent,tf]);
  function draw(){
    const cnv=ref.current;const dpr=window.devicePixelRatio||1;const W=w,H=h;
    cnv.width=W*dpr;cnv.height=H*dpr;cnv.style.width=W+'px';cnv.style.height=H+'px';
    const ctx=cnv.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
    const padR=56,padL=6,padT=8;
    const volH=showVol?36:0;
    const rsiH=showRSI?52:0;
    const macdH=showMACD?54:0;
    const subGap=(showVol?4:0)+(showRSI?4:0)+(showMACD?4:0);
    const padB=volH+rsiH+macdH+subGap+22;
    const plotW=W-padL-padR;const plotH=H-padT-padB;
    const hi=Math.max(...liveSeries.map(c=>c.h));const lo=Math.min(...liveSeries.map(c=>c.l));
    const pad=(hi-lo)*0.08;const yMax=hi+pad,yMin=lo-pad;
    const y2p=v=>padT+(1-(v-yMin)/(yMax-yMin))*plotH;
    const cw=plotW/liveSeries.length;

    // MT5-style grid: more visible lines
    ctx.strokeStyle=isDark?'#3A4358':'#D7DCE3';ctx.lineWidth=1;
    ctx.font='10px "JetBrains Mono",monospace';ctx.fillStyle=isDark?'#8896AC':'#5F6A7D';ctx.textAlign='left';
    for(let i=0;i<=4;i++){
      const y=padT+(plotH*i)/4;

      ctx.setLineDash([1,3]);
      ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+plotW,y);ctx.stroke();
      ctx.setLineDash([]);
      const v=yMax-((yMax-yMin)*i)/4;ctx.fillText(v.toFixed(digits),padL+plotW+4,y+3);
    }
    if(showMA&&liveSeries.length>20){

      for(let i=19;i<liveSeries.length;i++){let sum=0;for(let j=i-19;j<=i;j++)sum+=liveSeries[j].c;const ma=sum/20;const x=padL+cw*(i+0.5);const y=y2p(ma);if(i===19)ctx.moveTo(x,y);else ctx.lineTo(x,y);}

      for(let k=bb.length-1;k>=0;k--){const x=padL+cw*(bb[k].i+0.5);const y=y2p(bb[k].lower);ctx.lineTo(x,y);}
      ctx.closePath();ctx.fill();
      // Upper band (blue)

      bb.forEach((b,k)=>{const x=padL+cw*(b.i+0.5);const y=y2p(b.upper);if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
      ctx.stroke();
      // Lower band (blue)
      ctx.beginPath();
      bb.forEach((b,k)=>{const x=padL+cw*(b.i+0.5);const y=y2p(b.lower);if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
      ctx.stroke();
      // Middle band (lighter)
      ctx.strokeStyle='rgba(33,150,243,0.55)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();
      bb.forEach((b,k)=>{const x=padL+cw*(b.i+0.5);const y=y2p(b.mid);if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
      ctx.stroke();ctx.setLineDash([]);
    }
    const bodyW=Math.max(3,cw*0.75);
    liveSeries.forEach((c,i)=>{
      const x=padL+cw*(i+0.5);const up=c.c>=c.o;
      // MT5 vivid colors: brighter green, deeper red
      const col=up?'#00A65A':'#E63946';
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1.5;
      // Wick line (thicker, more visible)
      ctx.beginPath();ctx.moveTo(x,y2p(c.h));ctx.lineTo(x,y2p(c.l));ctx.stroke();
      const bt=y2p(Math.max(c.o,c.c));const bb=y2p(Math.min(c.o,c.c));
      // Solid body (no transparency)
      ctx.fillRect(x-bodyW/2,bt,bodyW,Math.max(1,bb-bt));
      // Body outline for extra crispness
      ctx.lineWidth=1;ctx.strokeRect(x-bodyW/2,bt,bodyW,Math.max(1,bb-bt));
    });
    const last=liveSeries[liveSeries.length-1].c;const yL=y2p(last);
    // MT5 ask/bid horizontal line - dashed
    ctx.setLineDash([4,4]);ctx.strokeStyle='#1B3955';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,yL);ctx.lineTo(padL+plotW,yL);ctx.stroke();ctx.setLineDash([]);
    // MT5 price label box
    ctx.fillStyle='#1B3955';const pillW=54,pillH=18;ctx.fillRect(padL+plotW+2,yL-pillH/2,pillW,pillH);
    ctx.fillStyle='#fff';ctx.font='700 10px "JetBrains Mono",monospace';ctx.textAlign='center';ctx.fillText(last.toFixed(digits),padL+plotW+2+pillW/2,yL+3);ctx.textAlign='left';
    // ─── Sub-panel layout (cumulative top positions) ───
    let subY=H-padB+4;
    if(showVol){
      const vMax=Math.max(...liveSeries.map(c=>c.v));const vTop=subY;const vH=volH-4;
      liveSeries.forEach((c,i)=>{
        const x=padL+cw*(i+0.5);const up=c.c>=c.o;
        ctx.fillStyle=up?'rgba(0,166,90,0.7)':'rgba(230,57,70,0.7)';
        const h=(c.v/vMax)*vH;ctx.fillRect(x-bodyW/2,vTop+(vH-h),bodyW,h);
      });
      ctx.fillStyle=isDark?'#8896AC':'#5F6A7D';ctx.font='9px "JetBrains Mono",monospace';ctx.textAlign='left';
      ctx.fillText('Volume',padL+2,vTop+8);

    }
    // ─── RSI(14) panel ───
    if(showRSI&&liveSeries.length>14){

      for(let i=1;i<liveSeries.length;i++){
        const ch=liveSeries[i].c-liveSeries[i-1].c;const g=Math.max(0,ch),l=Math.max(0,-ch);
        if(i<=N){avgG+=g;avgL+=l;if(i===N){avgG/=N;avgL/=N;const rs=avgL===0?100:avgG/avgL;rsi.push({i,v:100-100/(1+rs)});}}
        else{avgG=(avgG*(N-1)+g)/N;avgL=(avgL*(N-1)+l)/N;const rs=avgL===0?100:avgG/avgL;rsi.push({i,v:100-100/(1+rs)});}
      }

      // 70/30 levels
      ctx.strokeStyle=isDark?'#3A4358':'#D7DCE3';ctx.lineWidth=1;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(padL,r2y(70));ctx.lineTo(padL+plotW,r2y(70));ctx.stroke();
      ctx.beginPath();ctx.moveTo(padL,r2y(30));ctx.lineTo(padL+plotW,r2y(30));ctx.stroke();
      ctx.setLineDash([]);

      ctx.strokeStyle='#7B1FA2';ctx.lineWidth=1.5;ctx.beginPath();

      ctx.stroke();
      // Labels
      ctx.fillStyle=isDark?'#8896AC':'#5F6A7D';ctx.font='9px "JetBrains Mono",monospace';ctx.textAlign='left';
      ctx.fillText('RSI(14)',padL+2,rTop+8);
      ctx.textAlign='right';ctx.fillText('70',padL+plotW+plotW*0+plotW*0+4+plotW*0,r2y(70)+3);
      ctx.textAlign='left';ctx.fillText('70',padL+plotW+4,r2y(70)+3);
      ctx.fillText('30',padL+plotW+4,r2y(30)+3);
      const lastRSI=rsi[rsi.length-1].v;
      ctx.fillStyle='#7B1FA2';ctx.fillRect(padL+plotW+2,r2y(lastRSI)-7,40,14);
      ctx.fillStyle='#fff';ctx.font='700 9px "JetBrains Mono",monospace';ctx.textAlign='center';

      // Zero line

      ctx.beginPath();ctx.moveTo(padL,m2y(0));ctx.lineTo(padL+plotW,m2y(0));ctx.stroke();ctx.setLineDash([]);

        ctx.fillRect(x-bodyW/2,Math.min(y0,y1),bodyW,Math.abs(y1-y0)||1);
      }
      // MACD line (blue)
      ctx.strokeStyle='#1976D2';ctx.lineWidth=1.5;ctx.beginPath();
      for(let i=26;i<liveSeries.length;i++){const x=padL+cw*(i+0.5);const y=m2y(macd[i]);if(i===26)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
      ctx.stroke();
      // Signal line (orange)
      ctx.strokeStyle='#F57C00';ctx.lineWidth=1.5;ctx.beginPath();
      for(let i=26;i<liveSeries.length;i++){const x=padL+cw*(i+0.5);const y=m2y(signal[i]);if(i===26)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
      ctx.stroke();
      ctx.fillStyle=isDark?'#8896AC':'#5F6A7D';ctx.font='9px "JetBrains Mono",monospace';ctx.textAlign='left';
      ctx.fillText('MACD(12,26,9)',padL+2,mTop+8);

    }
    ctx.fillStyle=isDark?'#8896AC':'#5F6A7D';ctx.font='10px "JetBrains Mono",monospace';ctx.textAlign='center';

}

function AuthScreen({onAuth}){
  const [tab,setTab]=useState('login');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [name,setName]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');

  async function handleLogin(e){
    e.preventDefault();setError('');setLoading(true);
    try{
      const cred=await window.FB.auth.signInWithEmailAndPassword(email,password);
      onAuth(cred.user);
    }catch(err){
      setError(err.message.replace('Firebase: ','').replace(/\(auth.*\)/,'').trim());
    }finally{setLoading(false);}
  }
  async function handleSignup(e){
    e.preventDefault();setError('');setLoading(true);
    try{
      const cred=await window.FB.auth.createUserWithEmailAndPassword(email,password);
      await window.FB.createUserProfile(cred.user.uid,{name,email});
      onAuth(cred.user);
    }catch(err){
      setError(err.message.replace('Firebase: ','').replace(/\(auth.*\)/,'').trim());
    }finally{setLoading(false);}
  }

  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,background:'var(--bg)',overflowY:'auto'}}>
      {/* Hero */}
      <div style={{background:'var(--acc)',padding:'48px 24px 32px',textAlign:'center'}}>

        <div style={{fontSize:12,color:'rgba(255,255,255,0.7)',letterSpacing:1}}>Professional Trading Platform</div>
      </div>
      {/* Tabs */}
      <div style={{display:'flex',background:'var(--surface)',borderBottom:'1px solid var(--line)'}}>
        {[['login','Sign In'],['signup','Create Account']].map(([k,l])=>(
          <button key={k} onClick={()=>{setTab(k);setError('');}} style={{flex:1,padding:'14px 0',fontSize:13,fontWeight:tab===k?700:500,color:tab===k?'var(--ink)':'var(--text-3)',borderBottom:tab===k?'2px solid var(--acc)':'2px solid transparent'}}>{l}</button>
        ))}
      </div>
      {/* Form */}
      <form onSubmit={tab==='login'?handleLogin:handleSignup} style={{padding:'24px 20px',display:'flex',flexDirection:'column',gap:14}}>
        {tab==='signup'&&(
          <div>
            <div style={{fontSize:10,fontWeight:700,color:'var(--text-3)',letterSpacing:0.5,marginBottom:6}}>FULL NAME</div>

// ── TradeTicket ──
function TradeTicket({market,sym,setSym,lots,setLots,onPlace}){
  const s=market.find(m=>m.sym===sym);
  const [side,setSide]=useState('BUY');
  const [otype,setOtype]=useState('MARKET');
  const [otypePrice,setOtypePrice]=useState('');
  const [sl,setSl]=useState('');
  const [tp,setTp]=useState('');
  const [pickerOpen,setPickerOpen]=useState(false);
  const [pickerFilter,setPickerFilter]=useState('ALL');
  const [pickerSearch,setPickerSearch]=useState('');
  const [confirmOpen,setConfirmOpen]=useState(false);
  const vol=lots;const setVol=setLots;
  const cryptoUsdRef=useRef(500);            // desired USD size for crypto orders
  const prevClsRef=useRef(s?s.cls:null);
  useEffect(()=>{if(!s)return;
    const px=s.last||s.bid||1;
    const classChanged=prevClsRef.current!==s.cls; prevClsRef.current=s.cls;
    // Crypto is sized in USD: keep ~the same dollar amount as you switch coins.
    if(s.cls==='CRYPTO'){ setLots(+(cryptoUsdRef.current/px).toFixed(6)); }
    else if(classChanged){ setLots((s.cls==='STOCK'||s.cls==='INDEX')?1:0.10); }
  },[s&&s.cls, s&&s.sym]);
  const ask=s.last+s.spread;const entryPx=side==='BUY'?ask:s.last;
  const notional=ALPEXA_MARKET.getNotionalUSD(s,vol,entryPx);
  const levSettings=getLeverageSettings();
  const lev=levSettings[s.cls]||(s.cls==='STOCK'?5:s.cls==='CRYPTO'?5:s.cls==='INDEX'?20:100);
  const marginPct=(100/lev).toFixed(lev<10?0:1);const margin=notional/lev;
  // Crypto order sizing in USD (internal vol stays in coins, so all the math below is unchanged).
  const coinSym=s.sym.replace('USD','');
  const cryptoUsd=vol*entryPx;
  const cryptoStep=cryptoUsd<=100?10:cryptoUsd<=1000?50:100;
  const setCryptoUsd=(u)=>{const nu=Math.max(10,u);cryptoUsdRef.current=nu;setVol(+(nu/entryPx).toFixed(6));};
  const commission=s.cls==='STOCK'?Math.max(1,vol*0.02):s.cls==='CRYPTO'?notional*0.001:0;
  const lotSize=ALPEXA_MARKET.getLotSize(s);const tickSize=Math.pow(10,-s.digits);
  // USD value of one point — derived from the (USD-correct) P&L of a 1-point move,
  // so cross pairs like EURJPY convert to USD just like the position P&L does.
  const tickValueUSD=Math.abs(ALPEXA_MARKET.getPnlUSD(s,entryPx,entryPx+tickSize,'BUY',vol));

  function sltpHelper(val,isTp){
    if(val===''||val==null)return null;
    const rawStr=String(val).trim();let p=parseFloat(rawStr);
    if(isNaN(p)||p===0)return null;
    p=Math.abs(p);let targetPx;
    const tickSizeLocal=Math.pow(10,-s.digits);const hasDecimal=rawStr.includes('.');
    const isPipMode=!hasDecimal||p<entryPx*0.5;
    if(isPipMode){const offset=p*tickSizeLocal;if(isTp)targetPx=side==='BUY'?entryPx+offset:entryPx-offset;else targetPx=side==='BUY'?entryPx-offset:entryPx+offset;}
    else targetPx=p;
    const dist=Math.abs(entryPx-targetPx)*Math.pow(10,s.digits);const amt=tickValueUSD*dist;
    const pctAway=Math.abs(entryPx-targetPx)/entryPx;
    return{dist:dist.toFixed(0),amt:amt.toFixed(2),invalid:pctAway>0.30,tooClose:dist<10,pctAway:(pctAway*100).toFixed(1),targetPx:targetPx.toFixed(s.digits),asPipsInput:isPipMode};
  }
  const slH=sltpHelper(sl,false);const tpH=sltpHelper(tp,true);
  let contractLabel;
  if(s.cls==='FX'){if(s.sym==='XAUUSD')contractLabel=`${(100*vol).toFixed(2)} oz`;else if(s.sym==='XAGUSD')contractLabel=`${(5000*vol).toFixed(0)} oz`;else contractLabel=`${(100000*vol).toLocaleString('en-US',{maximumFractionDigits:0})} ${s.sym.slice(0,3)}`;}
  else if(s.cls==='CRYPTO')contractLabel=`${vol.toFixed(2)} ${s.sym.replace('USD','')}`;
  else if(s.cls==='STOCK')contractLabel=`${vol.toFixed(0)} ${vol===1?'share':'shares'}`;
  else contractLabel=`${vol.toFixed(2)} units`;
  const tagBg={FX:'var(--acc-3)',STOCK:'var(--buy-tint)',CRYPTO:'#FCE4EC',INDEX:'#EDE7F6'};
  const tagCol={FX:'var(--acc-2)',STOCK:'var(--buy-2)',CRYPTO:'#C2185B',INDEX:'#5E35B1'};
  function place(){
    setConfirmOpen(false);if(!onPlace)return;
    const trigger=otype==='MARKET'?null:parseFloat(otypePrice);
    const order={sym:s.sym,side,vol,open:otype==='MARKET'?entryPx:trigger,trigger,sl:slH?parseFloat(slH.targetPx):0,tp:tpH?parseFloat(tpH.targetPx):0,otype,swap:0};
    onPlace(order);
  }
  function submit(){
    if(getPrefs().oneClick&&otype==='MARKET'&&canPlace)place();
    else if(canPlace)setConfirmOpen(true);
  }
  const canPlace=(otype==='MARKET'||(otypePrice&&!isNaN(parseFloat(otypePrice))&&parseFloat(otypePrice)>0))&&(!slH||(!slH.invalid&&!slH.tooClose))&&(!tpH||(!tpH.invalid&&!tpH.tooClose));
  const bidParts=formatPriceFixed(s.last,s.digits);const askParts=formatPriceFixed(ask,s.digits);
  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,background:'var(--bg)',position:'relative'}}>
      <button onClick={()=>setPickerOpen(true)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:'var(--surface)',borderBottom:'1px solid var(--line)',textAlign:'left',width:'100%'}}>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:18,fontWeight:800,color:'var(--ink)',letterSpacing:0.2}}>{s.sym}</span>
            <span style={{fontSize:8.5,padding:'2px 5px',borderRadius:3,fontWeight:800,letterSpacing:0.4,background:tagBg[s.cls]||'var(--bg-2)',color:tagCol[s.cls]||'var(--text-2)'}}>{s.cls}</span>
          </div>
          <div style={{fontSize:11,color:'var(--text-3)',marginTop:2}}>{s.name}</div>
        </div>
        <div style={{width:30,height:30,borderRadius:15,background:'var(--bg-2)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-2)'}}><Mi name="unfold_more" size={18}/></div>
      </button>
      {/* MT5 colors */}
      <div style={{display:'flex',gap:10,padding:'12px 12px 8px',background:'var(--bg)',position:'relative'}}>

// ── ModifySheet ──
function ModifySheet({position,isPending=false,market=[],onSave,onClose}){
  const symInfo=ALPEXA_MARKET.SYMBOLS.find(s=>s.sym===position.sym);
  const digits=symInfo?symInfo.digits:5;
  const [sl,setSl]=useState(position.sl?String(position.sl):'');
  const [tp,setTp]=useState(position.tp?String(position.tp):'');
  const [trigger,setTrigger]=useState(position.trigger?String(position.trigger):'');
  const [,force]=useState(0);
  const liveSym=market.find(m=>m.sym===position.sym);
  const bid=liveSym?liveSym.last:position.open;
  const ask=liveSym?liveSym.last+liveSym.spread:position.open;
  const curPx=position.side==='BUY'?bid:ask;
  const lotSize=ALPEXA_MARKET.getLotSize?ALPEXA_MARKET.getLotSize(symInfo||{sym:position.sym,cls:'FX'}):(symInfo?.cls==='FX'?100000:1);
  const tickSize=Math.pow(10,-digits);
  // USD value of one point via the corrected P&L (handles cross pairs like EURJPY).
  const tickValueUSD=symInfo?Math.abs(ALPEXA_MARKET.getPnlUSD(symInfo,curPx,curPx+tickSize,'BUY',position.vol||0)):tickSize*lotSize*(position.vol||0);
  const entryPx=isPending?(parseFloat(trigger)||position.trigger||curPx):position.open;
  function sltpHelper(val,isTp){
    if(val===''||val==null)return null;
    const rawStr=String(val).trim();let p=parseFloat(rawStr);
    if(isNaN(p)||p===0)return null;p=Math.abs(p);let targetPx;
    const hasDecimal=rawStr.includes('.');const isPipMode=!hasDecimal||p<entryPx*0.5;
    if(isPipMode){const offset=p*tickSize;if(isTp)targetPx=position.side==='BUY'?entryPx+offset:entryPx-offset;else targetPx=position.side==='BUY'?entryPx-offset:entryPx+offset;}
    else targetPx=p;
    const dist=Math.abs(entryPx-targetPx)*Math.pow(10,digits);const amt=tickValueUSD*dist;
    const pctAway=Math.abs(entryPx-targetPx)/entryPx;
    return{dist:dist.toFixed(0),amt:amt.toFixed(2),invalid:pctAway>0.30,tooClose:dist<10,pctAway:(pctAway*100).toFixed(1),targetPx:targetPx.toFixed(digits),asPipsInput:isPipMode};
  }
  const slH=sltpHelper(sl,false);const tpH=sltpHelper(tp,true);
  useEffect(()=>{const id=setInterval(()=>force(x=>x+1),700);return()=>clearInterval(id);},[]);
  function save(){
    if(slH&&(slH.invalid||slH.tooClose))return;if(tpH&&(tpH.invalid||tpH.tooClose))return;
    const updated={...position,sl:slH?parseFloat(slH.targetPx):0,tp:tpH?parseFloat(tpH.targetPx):0};

function filterByDate(history,mode,customFrom,customTo){
  if(mode==='all')return history;
  const now=new Date();const _p=n=>String(n).padStart(2,'0');
  const _ymd=d=>d.getFullYear()+'-'+_p(d.getMonth()+1)+'-'+_p(d.getDate());
  const today=_ymd(now);
  function toIso(d){if(!d)return null;const md=d.slice(0,5);return now.getFullYear()+'-'+md;}
  return history.filter(h=>{
    const iso=toIso(h.date);if(!iso)return false;
    if(mode==='today')return iso===today;
    if(mode==='7d'||mode==='30d'){const days=mode==='7d'?7:30;const cutoff=_ymd(new Date(now.getTime()-days*86400000));return iso>=cutoff&&iso<=today;}
    if(mode==='custom'){if(!customFrom&&!customTo)return true;if(customFrom&&iso<customFrom)return false;if(customTo&&iso>customTo)return false;return true;}
    return true;
  });
}

              <Stat label="Deposits" val={`$${totalIn.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}`}/>
              <Stat label="Withdrawals" val={`$${totalOut.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}`}/>
            </div>
            <div style={{display:'flex',gap:5,padding:'10px 14px',background:'var(--surface)',borderBottom:'1px solid var(--line)',overflowX:'auto'}}>

                <button key={k} onClick={()=>setFundFilter(k)} style={{flexShrink:0,padding:'5px 12px',borderRadius:14,fontSize:11,fontWeight:700,letterSpacing:0.3,background:fundFilter===k?'var(--ink)':'var(--bg-2)',color:fundFilter===k?'var(--ink-fg)':'var(--text-2)'}}>{l}</button>
              ))}

            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'var(--bg-2)',borderBottom:'1px solid var(--line)'}}>
              <Mi name="receipt_long" size={16} style={{color:'var(--text-3)'}}/>
              <span style={{fontSize:11.5,color:'var(--text-2)',flex:1}}><b className="mono" style={{color:'var(--ink)'}}>{list.length}</b> {list.length===1?'transaction':'transactions'}</span>
            </div>
            <div style={{flex:1,overflowY:'auto',background:'var(--surface)'}}>
              {list.length===0?(
                <div style={{padding:'40px 24px',textAlign:'center',color:'var(--text-3)'}}>
                  <Mi name="receipt_long" size={36} style={{color:'var(--muted)',display:'block',margin:'0 auto 8px'}}/>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text-2)'}}>No transactions yet</div>
                  <div style={{fontSize:11.5,marginTop:4}}>Deposits, withdrawals and transfers will appear here</div>
                </div>
              ):list.map(rec=><FundingRow key={rec.id} rec={rec}/>)}
            </div>
          </>
        );
      })()}
    </div>
  );
}

// ── LeverageSheet ──
function LeverageSheet({ openPositions, onClose }) {
  // Brokers freeze leverage while positions are open.
  const locked = (openPositions||0) > 0;
  const [lev, setLev] = useState(getLeverageSettings());
  const PRESETS = { FX:[10,30,50,100,200,500], INDEX:[5,10,20,50,100], STOCK:[1,2,5,10,20], CRYPTO:[1,2,5,10,20] };
  const META = {
    FX:     { label:'Forex',   sub:'Major and minor currency pairs', icon:'currency_exchange' },
    INDEX:  { label:'Indices', sub:'NAS100, SPX500, GER40, etc.',    icon:'show_chart' },
    STOCK:  { label:'Stocks',  sub:'AAPL, TSLA, NVDA, MSFT, etc.',   icon:'business' },
    CRYPTO: { label:'Crypto',  sub:'BTC, ETH and other crypto CFDs', icon:'currency_bitcoin' },
  };
  function save() { setLeverageSettings(lev); window.dispatchEvent(new Event('alpexa-balance-change')); onClose(); }
  function reset() { const d={FX:100,INDEX:20,STOCK:5,CRYPTO:5}; setLev(d); setLeverageSettings(d); window.dispatchEvent(new Event('alpexa-balance-change')); }
  return (
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(10,14,26,0.55)',zIndex:300,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'var(--surface)',borderTopLeftRadius:16,borderTopRightRadius:16,display:'flex',flexDirection:'column',maxHeight:'88%',overflow:'hidden',animation:'slideUp 0.22s cubic-bezier(0.2,0.8,0.2,1)'}}>
        <div style={{display:'flex',justifyContent:'center',padding:'8px 0 4px'}}><div style={{width:36,height:4,borderRadius:2,background:'var(--line-2)'}}/></div>
        <div style={{padding:'6px 16px 12px',display:'flex',alignItems:'center'}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:'var(--ink)'}}>Leverage Settings</div>
            <div style={{fontSize:11.5,color:'var(--text-3)',marginTop:2}}>Adjust max leverage per asset class</div>
          </div>
          <span style={{flex:1}}/>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:14,background:'var(--bg-2)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-2)'}}><Mi name="close" size={14}/></button>
        </div>
        {locked && (
          <div style={{margin:'0 16px 10px',background:'var(--sell-tint)',borderRadius:9,padding:'10px 12px',display:'flex',alignItems:'flex-start',gap:8,fontSize:11.5,color:'var(--sell-2)',lineHeight:1.45,border:'1px solid rgba(229,57,53,0.25)'}}>
            <Mi name="lock" size={14}/>
            <span><b>Locked.</b> Close your {openPositions} open {openPositions===1?'position':'positions'} before changing leverage.</span>
          </div>
        )}
        <div style={{flex:1,overflowY:'auto',padding:'0 16px 14px'}}>
          {['FX','INDEX','STOCK','CRYPTO'].map(cls => {
            const m=META[cls]; const presets=PRESETS[cls]; const cur=lev[cls];
            const marginPct=(100/cur).toFixed(cur<10?0:1);
            return (
              <div key={cls} style={{background:'var(--bg)',borderRadius:11,padding:'12px 14px',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <div style={{width:32,height:32,borderRadius:8,background:'var(--surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--acc-2)'}}><Mi name={m.icon} size={18}/></div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--ink)'}}>{m.label}</div>
                    <div style={{fontSize:10.5,color:'var(--text-3)',marginTop:1}}>{m.sub}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div className="mono" style={{fontSize:15,fontWeight:700,color:'var(--ink)'}}>1:{cur}</div>
                    <div style={{fontSize:9.5,color:'var(--text-3)',marginTop:1}}>{marginPct}% margin</div>
                  </div>
                </div>
                <div style={{display:'flex',gap:4}}>
                  {presets.map(p=>(
                    <button key={p} onClick={()=>{if(locked)return;const next={...lev,[cls]:p};setLev(next);setLeverageSettings(next);window.dispatchEvent(new Event('alpexa-balance-change'));}} disabled={locked} className="mono" style={{flex:1,padding:'8px 0',borderRadius:7,fontSize:11,fontWeight:700,background:cur===p?(locked?'var(--muted)':'#1B3955'):'var(--surface)',color:cur===p?'#fff':(locked?'var(--text-3)':'var(--text-2)'),border:'1px solid '+(cur===p?(locked?'var(--muted)':'#1B3955'):'var(--line-2)'),opacity:locked&&cur!==p?0.5:1,cursor:locked?'not-allowed':'pointer'}}>1:{p}</button>
                  ))}
                </div>
              </div>
            );
          })}
          <div style={{background:'var(--acc-3)',borderRadius:9,padding:'10px 12px',display:'flex',alignItems:'flex-start',gap:8,fontSize:11.5,color:'var(--acc-2)',lineHeight:1.45}}>
            <Mi name="info" size={14}/>
            <span>Higher leverage amplifies both profits and losses. ESMA/FCA regulated brokers cap retail leverage at 1:30 for FX majors, 1:20 for indices, 1:5 for stocks, and 1:2 for crypto.</span>
          </div>
        </div>
        <div style={{padding:'10px 16px 16px',background:'var(--surface)',borderTop:'1px solid var(--line)',display:'flex',gap:8}}>
          <button onClick={()=>!locked&&reset()} disabled={locked} style={{flex:1,padding:'12px 0',borderRadius:10,fontSize:13,fontWeight:600,background:'var(--bg-2)',color:locked?'var(--muted)':'var(--text-2)',cursor:locked?'not-allowed':'pointer',opacity:locked?0.6:1}}>Reset to Default</button>
          <button onClick={()=>!locked&&save()} disabled={locked} style={{flex:1.5,padding:'12px 0',borderRadius:10,fontSize:13,fontWeight:700,color:'#fff',background:locked?'var(--muted)':'#1B3955',cursor:locked?'not-allowed':'pointer'}}>{locked?'Close positions first':'Save Changes'}</button>
        </div>
      </div>
    </div>
  );
}

function PriceAlertsPanel(){
  const [alerts,setAlerts]=useState(getAlerts());

  const [sym,setSym]=useState('EURUSD');
  const [side,setSide]=useState('above');

  function add(){if(!px||isNaN(parseFloat(px)))return;const next=[...alerts,{id:Date.now(),sym,side,px:parseFloat(px),active:true}];setAlerts(next);saveAlerts(next);setAdding(false);setPx('');}
  function toggle(id){const next=alerts.map(a=>a.id===id?{...a,active:!a.active}:a);setAlerts(next);saveAlerts(next);}
  function remove(id){const next=alerts.filter(a=>a.id!==id);setAlerts(next);saveAlerts(next);}
  const symInfo=ALPEXA_MARKET.SYMBOLS.find(s=>s.sym===sym);

    <div style={{flex:1,overflowY:'auto',padding:'4px 16px 18px'}}>
      <button onClick={()=>setAdding(!adding)} style={{width:'100%',padding:'12px 0',borderRadius:10,marginBottom:14,background:adding?'var(--bg-2)':'var(--acc)',color:adding?'var(--text-2)':'#fff',fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>

        <div style={{background:'var(--bg)',borderRadius:11,padding:'12px 14px',marginBottom:14}}>

            {ALPEXA_MARKET.SYMBOLS.map(s=><option key={s.sym} value={s.sym}>{s.sym} — {s.name}</option>)}
          </select>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text-3)',letterSpacing:0.5,marginBottom:6}}>CONDITION</div>

            <button onClick={()=>setSide('below')} style={{flex:1,padding:'10px 0',borderRadius:8,fontSize:12,fontWeight:700,background:side==='below'?'var(--sell-tint)':'var(--surface)',color:side==='below'?'var(--sell-2)':'var(--text-2)',border:'1px solid '+(side==='below'?'var(--sell)':'var(--line-2)'),display:'flex',alignItems:'center',justifyContent:'center',gap:4}}><Mi name="arrow_downward" size={14}/>Price falls below</button>
          </div>
          <div style={{fontSize:10,fontWeight:700,color:'var(--text-3)',letterSpacing:0.5,marginBottom:6}}>TARGET PRICE</div>
          <input value={px} onChange={e=>setPx(e.target.value)} type="number" step="any" placeholder={`e.g. ${(1.0850).toFixed(digits)}`} className="mono" style={{width:'100%',padding:'10px 12px',borderRadius:8,border:'1.5px solid var(--line-2)',background:'var(--surface)',fontSize:15,fontWeight:600,color:'var(--ink)',outline:'none',marginBottom:12}}/>
          <button onClick={add} disabled={!px} style={{width:'100%',padding:'12px 0',borderRadius:9,fontSize:13,fontWeight:700,color:'#fff',background:px?'var(--acc)':'var(--muted)',cursor:px?'pointer':'not-allowed'}}>Create Alert</button>
        </div>
      )}

          <div style={{fontSize:13,fontWeight:600,color:'var(--text-2)'}}>No price alerts yet</div>

              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:13,fontWeight:700,color:'var(--ink)'}}>{a.sym}</span>

            </button>

          </div>
        );
      })}
    </div>
  );

function NotificationsPanel(){
  const [prefs,setPrefsState]=useState(getNotifPrefs());
  function update(key,ch,val){const next={...prefs,[key]:{...prefs[key],[ch]:val}};setPrefsState(next);saveNotifPrefs(next);}
  function bulk(channel,val){const next={...prefs};Object.keys(next).forEach(k=>{next[k]={...next[k],[channel]:val};});setPrefsState(next);saveNotifPrefs(next);}
  const totalPush=Object.values(prefs).filter(p=>p.push).length;
  const totalEmail=Object.values(prefs).filter(p=>p.email).length;
  return(
    <div style={{flex:1,overflowY:'auto',padding:'4px 16px 18px'}}>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <div style={{flex:1,padding:'10px 12px',borderRadius:9,background:'var(--bg)',display:'flex',alignItems:'center',gap:8}}>

          <div style={{flex:1}}><div style={{fontSize:11.5,fontWeight:700,color:'var(--ink)'}}>Push</div><div style={{fontSize:9.5,color:'var(--text-3)'}}>{totalPush}/{Object.keys(prefs).length} on</div></div>
          <button onClick={()=>bulk('push',totalPush<Object.keys(prefs).length)} style={{fontSize:10.5,fontWeight:700,color:'var(--acc-2)',padding:'4px 8px',borderRadius:6,background:'var(--acc-3)'}}>{totalPush===Object.keys(prefs).length?'OFF':'ALL'}</button>
        </div>
        <div style={{flex:1,padding:'10px 12px',borderRadius:9,background:'var(--bg)',display:'flex',alignItems:'center',gap:8}}>
          <Mi name="mail" size={18} style={{color:'var(--acc-2)'}}/>
          <div style={{flex:1}}><div style={{fontSize:11.5,fontWeight:700,color:'var(--ink)'}}>Email</div><div style={{fontSize:9.5,color:'var(--text-3)'}}>{totalEmail}/{Object.keys(prefs).length} on</div></div>
          <button onClick={()=>bulk('email',totalEmail<Object.keys(prefs).length)} style={{fontSize:10.5,fontWeight:700,color:'var(--acc-2)',padding:'4px 8px',borderRadius:6,background:'var(--acc-3)'}}>{totalEmail===Object.keys(prefs).length?'OFF':'ALL'}</button>
        </div>
      </div>
      {NOTIF_LABELS.map(group=>(
        <div key={group.group} style={{marginBottom:14}}>

function fmtFundingTime(ts){
  const d=new Date(ts);const now=Date.now();const diff=now-ts;
  if(diff<60000)return 'Just now';
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(diff<86400000)return Math.floor(diff/3600000)+'h ago';
  if(diff<7*86400000)return Math.floor(diff/86400000)+'d ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

              <span style={{fontSize:10,fontWeight:700,padding:'2px 6px',background:'rgba(255,255,255,0.18)',borderRadius:2,letterSpacing:0.4}}>MARKET</span>

              <div style={{fontSize:11.5,color:'var(--text-3)',marginBottom:10,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Order details</div>

function AppHeader({accent,account,onAccountClick,livePnl=0,prevPnl=0,usedMargin=0,notifCount=0,onBellClick,onMenuClick,tab}){
  const [,forceBal]=useState(0);
  useEffect(()=>{const h=()=>forceBal(x=>x+1);window.addEventListener('alpexa-balance-change',h);window.addEventListener('alpexa-leverage-change',h);return()=>{window.removeEventListener('alpexa-balance-change',h);window.removeEventListener('alpexa-leverage-change',h);};},[]);
  const a=ACCOUNTS.find(x=>x.id===account)||ACCOUNTS[0];
  const balanceNum=getBalances()[a.id]||0;
  const prefs=getPrefs();
  const cur=window.getCurrency?window.getCurrency(prefs.currency||'USD'):{code:'USD',symbol:'$',rate:1};
  const equityUsd=balanceNum+livePnl;
  const freeUsd=balanceNum+livePnl-usedMargin;
  const equity=equityUsd*cur.rate;
  const balance=balanceNum*cur.rate;
  const free=freeUsd*cur.rate;
  const pnlConverted=livePnl*cur.rate;
  // Treat negligible used margin (no real open positions) as no margin in use,
  // so the level shows "—" instead of an absurd number from floating-point dust.
  const marginLevel=usedMargin>=0.01?(equityUsd/usedMargin)*100:Infinity;
  const MARGIN_CALL=100;const STOP_OUT=50;const SAFE_THRESHOLD=500;
  const marginColor=marginLevel<STOP_OUT?'#FB7185':marginLevel<MARGIN_CALL?'#F59E0B':marginLevel<200?'#FBBF24':marginLevel>=SAFE_THRESHOLD?'#86EFAC':'rgba(255,255,255,0.92)';
  const marginWarn=marginLevel<MARGIN_CALL;
  const marginDisplay=marginLevel===Infinity?'—':Math.round(marginLevel).toLocaleString('en-US')+'%';
  const up=livePnl>=0;
  const flashClass=livePnl>prevPnl?'flash-up':livePnl<prevPnl?'flash-down':'';
  const decimals=cur.code==='JPY'||cur.code==='KRW'?0:2;
  const fmtN=n=>n.toLocaleString('en-US',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
  return(
    <div className="app-hdr" style={{background:'#1B3955',color:'#fff',padding:'56px 14px 12px',display:'flex',flexDirection:'column',gap:8}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontFamily:'var(--brand)',fontSize:13,fontWeight:800,letterSpacing:2.5,color:'#fff'}}>ALPEXA SUISSE</span>

function NotificationSheet({notifications,setNotifications,onClose}){
  const unread=notifications.filter(n=>!n.read).length;

  function clear(id){setNotifications(notifications.filter(n=>n.id!==id));}
  function markRead(id){setNotifications(notifications.map(n=>n.id===id?{...n,read:true}:n));}
  const META={orderFill:{icon:'task_alt',tint:'var(--buy-tint)',col:'var(--buy-2)',label:'Order Filled'},pendingTriggered:{icon:'bolt',tint:'#FFF3E0',col:'#E65100',label:'Pending Triggered'},priceAlert:{icon:'notifications_active',tint:'var(--acc-3)',col:'var(--acc-2)',label:'Price Alert'},news:{icon:'campaign',tint:'#FCE4EC',col:'#C2185B',label:'Market News'},login:{icon:'login',tint:'var(--bg-2)',col:'var(--text-2)',label:'New Sign-in'},marginCall:{icon:'warning',tint:'var(--sell-tint)',col:'var(--sell-2)',label:'Margin Call'},deposit:{icon:'south',tint:'var(--buy-tint)',col:'var(--buy-2)',label:'Deposit'},withdraw:{icon:'north',tint:'var(--sell-tint)',col:'var(--sell-2)',label:'Withdrawal'},transfer:{icon:'swap_horiz',tint:'var(--acc-3)',col:'var(--acc-2)',label:'Transfer'},approved:{icon:'check_circle',tint:'var(--buy-tint)',col:'var(--buy-2)',label:'Approved'},rejected:{icon:'cancel',tint:'var(--sell-tint)',col:'var(--sell-2)',label:'Rejected'},marketClosed:{icon:'lock',tint:'var(--sell-tint)',col:'var(--sell-2)',label:'Market Closed'},marketOpen:{icon:'lock_open',tint:'var(--buy-tint)',col:'var(--buy-2)',label:'Market Open'}};
  function renderBody(n){
    if(n.type==='orderFill')return<>Filled <b>{n.side} {n.vol&&n.vol.toFixed(2)} {n.sym}</b> @ <span className="mono">{n.px}</span></>;
    if(n.type==='pendingTriggered')return<><b>{n.side} {n.sym}</b> triggered at <span className="mono">{n.px}</span></>;

    if(n.type==='news')return<>{n.title}</>;
    if(n.type==='login')return n.title?<>{n.title}</>:<>New sign-in from <b>{n.device}</b> · {n.loc}</>;
    return n.title?<>{n.title}</>:null;
  }
  return(
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(10,14,26,0.55)',zIndex:300,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'var(--surface)',borderTopLeftRadius:16,borderTopRightRadius:16,display:'flex',flexDirection:'column',maxHeight:'82%',overflow:'hidden',animation:'slideUp 0.22s cubic-bezier(0.2,0.8,0.2,1)'}}>
        <div style={{display:'flex',justifyContent:'center',padding:'8px 0 4px'}}><div style={{width:36,height:4,borderRadius:2,background:'var(--line-2)'}}/></div>
        <div style={{padding:'6px 16px 12px',display:'flex',alignItems:'center',gap:8}}>
          <div><div style={{fontSize:16,fontWeight:700,color:'var(--ink)'}}>Notifications</div><div style={{fontSize:11.5,color:'var(--text-3)',marginTop:2}}>{unread>0?`${unread} unread · ${notifications.length} total`:`${notifications.length} total`}</div></div>
          <span style={{flex:1}}/>
          {unread>0&&<button onClick={markAllRead} style={{fontSize:11,fontWeight:600,color:'var(--acc-2)',padding:'5px 10px',borderRadius:6,background:'var(--acc-3)'}}>Mark all read</button>}
          <button onClick={onClose} style={{width:28,height:28,borderRadius:14,background:'var(--bg-2)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-2)'}}><Mi name="close" size={14}/></button>

          {notifications.length===0?(
            <div style={{padding:'50px 16px',textAlign:'center'}}><Mi name="notifications_off" size={42} style={{color:'var(--muted)',display:'block',margin:'0 auto 10px'}}/><div style={{fontSize:13,fontWeight:600,color:'var(--text-2)'}}>No notifications</div><div style={{fontSize:11,marginTop:4,color:'var(--text-3)'}}>You're all caught up</div></div>
          ):notifications.map(n=>{
            const m=META[n.type]||META.login;
            return(

          })}

  );
}

const TWEAK_DEFAULTS={accent:'#1565C0',density:'compact',darkHdr:true};

function App(){
  const [tweaks,setTweak]=useTweaks(TWEAK_DEFAULTS);
  const urlSym=(()=>{try{const p=new URLSearchParams(window.location.search).get('sym');const ls=localStorage.getItem('alpexa.selectedSym');return p||ls||'EURUSD';}catch(e){return'EURUSD';}})();
  const [tab,setTab]=useState('WATCH');
  const [sym,setSym]=useState(urlSym);
  const [posTab,setPosTab]=useState('OPEN');
  const [account,_setAccount]=useState('live');
  // === Cross-app navigation: switching server redirects to the matching app ===
  const setAccount = (next) => {
    if (next === 'crypto') { window.location.href = 'crypto-live.html'; return; }
    if (next === 'sports') { window.location.href = 'sports-live.html'; return; }
    _setAccount(next);  // 'live' stays in this app
  };
  // Apply back-office approvals to FX balances (pending -> approved).
  React.useEffect(()=>{
    if(!window.AlpexaSync||!AlpexaSync.db) return;
    let stop=false;
    const tick=()=>{ AlpexaSync.pullMine().then(rows=>{
      if(stop||!rows||!rows.length) return;
      const map={}; rows.forEach(r=>{map[r.local_id]=r;});
      const hist=(window.getFundingHistory?window.getFundingHistory():[]); let changed=false;
      hist.forEach(h=>{ if(!h.id) return; const r=map[h.id]; if(!r||!r.status||r.status===h.status) return;
        if(r.status==='approved' && h.status!=='approved'){
          const amt=+h.amount||0;
          if(h.kind==='deposit') window.addBalance(h.account||'live', amt);
          else if(h.kind==='withdraw') window.addBalance(h.account||'live', -amt);
          else if(h.kind==='transfer'){ window.addBalance(h.account||'live', -amt); } // debit source; the destination app credits itself
        }
        if(r.status==='approved'||r.status==='rejected'){
          const lbl=(h.kind==='deposit'?'Deposit':h.kind==='withdraw'?'Withdrawal':'Transfer')+' $'+(+h.amount||0).toLocaleString();
          window.alpexaNotify&&alpexaNotify({type:(r.status==='approved'?'approved':'rejected'),pref:(h.kind==='withdraw'?'withdrawal':'deposit'),title:lbl+(r.status==='approved'?' approved ✓':' rejected')});
        }
        h.status=r.status; changed=true;
      });
      if(changed){ try{localStorage.setItem('alpexa.funding',JSON.stringify(hist));}catch(e){} window.dispatchEvent(new Event('alpexa-balance-change')); }
      // Credit transfers that OTHER apps sent to FX (idempotent across apps).
      AlpexaSync.pullIncomingTransfers('live').then(legs=>{ legs.forEach(l=>{ window.addBalance('live', l.amount); window.alpexaNotify&&alpexaNotify({type:'approved',pref:'deposit',title:'Transfer received · $'+(+l.amount).toLocaleString()+' → FX'}); }); }).catch(()=>{});
    }).catch(()=>{}); };
    tick(); const iv=setInterval(()=>{if(!document.hidden)tick();},15000);
    const vis=()=>{if(!document.hidden)tick();}; document.addEventListener('visibilitychange',vis);
    return ()=>{stop=true;clearInterval(iv);document.removeEventListener('visibilitychange',vis);};
  },[]);
  const [acctSheet,setAcctSheet]=useState(false);
  const [notifOpen,setNotifOpen]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  const [notifications,setNotifications]=useState(()=>{try{return JSON.parse(localStorage.getItem('alpexa.fxNotifs')||'[]');}catch(e){return [];}});
  useEffect(()=>{try{localStorage.setItem('alpexa.fxNotifs',JSON.stringify(notifications));}catch(e){}},[notifications]);
  // Receive notifications fired anywhere in the app.
  useEffect(()=>{
    function onNotify(e){ const d=(e&&e.detail)||{};
      const now=new Date(); const time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
      setNotifications(prev=>[{id:Date.now()+Math.random(),read:false,time,...d},...prev].slice(0,60));
    }

  },[]);
  // New sign-in (once per browser session)
  useEffect(()=>{ try{ if(!sessionStorage.getItem('alpexa.loginNotif')){ sessionStorage.setItem('alpexa.loginNotif','1'); window.alpexaNotify&&alpexaNotify({type:'login',pref:'login',title:'New sign-in · '+((navigator.platform)||'this device')}); } }catch(e){} },[]);
  // Market open / closed transitions
  const mktOpenRef=useRef(null);
  useEffect(()=>{
    function check(){
      const cur={FX:symOpen({cls:'FX'}),STOCK:symOpen({cls:'STOCK'}),INDEX:symOpen({cls:'INDEX'})};
      const prev=mktOpenRef.current;
      if(prev){ [['FX','Forex'],['STOCK','US stocks'],['INDEX','Indices']].forEach(([k,lbl])=>{ if(prev[k]!==cur[k]) window.alpexaNotify&&alpexaNotify({type:cur[k]?'marketOpen':'marketClosed',title:lbl+(cur[k]?' market is now open':' market is now closed')}); }); }
      mktOpenRef.current=cur;
    }
    check(); const iv=setInterval(check,30000); return ()=>clearInterval(iv);
  },[]);
  // Price alerts — fire when the target is crossed, then deactivate.
  useEffect(()=>{
    function check(){
      let alerts; try{alerts=JSON.parse(localStorage.getItem('alpexa.alerts')||'[]');}catch(e){return;}
      if(!alerts.length||!marketRef.current) return; let changed=false;
      alerts.forEach(a=>{ if(!a.active)return; const m=marketRef.current.state.find(s=>s.sym===a.sym); if(!m)return;
        const hit=a.side==='above'?m.last>=a.px:m.last<=a.px;
        if(hit){ a.active=false; changed=true; window.alpexaNotify&&alpexaNotify({type:'priceAlert',pref:'priceAlert',sym:a.sym,side:a.side,px:a.px}); }
      });
      if(changed){ try{localStorage.setItem('alpexa.alerts',JSON.stringify(alerts));}catch(e){} }
    }
    const iv=setInterval(check,5000); return ()=>clearInterval(iv);
  },[]);
  const [lots,setLots]=useState(0.10);
  const [indicators,setIndicators]=useState({ma:true,vol:false,bb:false,rsi:false,macd:false});
  // Open positions & pending orders persist across server switches / reloads.
  const [liveOrders,setLiveOrders]=useState(()=>{try{return (JSON.parse(localStorage.getItem('alpexa.fxLive')||'[]')||[]).filter(o=>o&&(+o.vol)>0);}catch(e){return [];}});
  const [pendingOrders,setPendingOrders]=useState(()=>{try{return JSON.parse(localStorage.getItem('alpexa.fxPending')||'[]');}catch(e){return [];}});

  useEffect(()=>{try{localStorage.setItem('alpexa.fxClosed',JSON.stringify(closedHistory));}catch(e){}},[closedHistory]);
  useEffect(()=>{try{localStorage.setItem('alpexa.fxLive',JSON.stringify(liveOrders.map(o=>({...o,fresh:false}))));}catch(e){}},[liveOrders]);
  useEffect(()=>{try{localStorage.setItem('alpexa.fxPending',JSON.stringify(pendingOrders.map(o=>({...o,fresh:false}))));}catch(e){}},[pendingOrders]);
  const [modifyTarget,setModifyTarget]=useState(null);
  const [toast,setToast]=useState(null);
  const marketRef=useRef(null);
  if(!marketRef.current)marketRef.current=ALPEXA_MARKET.createMarket();
  const [,force]=useState(0);

  // Instant re-render when leverage changes so usedMargin/free recompute immediately
  useEffect(()=>{
    const h=()=>force(x=>x+1);
    window.addEventListener('alpexa-leverage-change',h);

    window.addEventListener('alpexa-prefs-change',h);

  },[]);

  // ── Real market data (Twelve Data, free tier ~8 req/min) ──
  // Polls the symbol you're viewing + rotates through the rest one at a time,
  // anchoring real prices; the simulation drifts smoothly around them.
  // Degrades to pure simulation if offline / rate-limited.
  const symRef=useRef(sym); symRef.current=sym;
  const accountRef=useRef(account); accountRef.current=account;
  const marginCallRef=useRef(false);
  const pullRef=useRef(null);
  // ── Real market data via the SERVER feed (Polygon → prices table → __alpexaFXFeed) ──
  // The shared feed is filled server-side every ~10s (Edge Function + cron) and
  // pulled into window.__alpexaFXFeed every ~1.5s. We anchor the engine to it as a
  // TRUSTED source; the simulation drifts smoothly between updates. No API key in
  // the client. Symbols the feed doesn't carry (stocks/indices) keep simulating.
  useEffect(()=>{
    function applyFeed(){ if(document.hidden) return;
      const f=window.__alpexaFXFeed||{}; const o={}; let any=false;
      Object.keys(f).forEach((sym)=>{ const px=+(f[sym]&&f[sym].mid)||0; if(px>0){ o[sym]=px; any=true; } });
      if(any){ marketRef.current.applyReal(o,true); force(x=>x+1); }
    }
    function pull(s){ if(!s) return; const f=window.__alpexaFXFeed||{}; const px=+(f[s.sym]&&f[s.sym].mid)||0;
      if(px>0){ const o={}; o[s.sym]=px; marketRef.current.applyReal(o,true); force(x=>x+1); } }
    pullRef.current=pull;
    applyFeed(); const ivF=setInterval(applyFeed, 1000);
    return ()=>{ clearInterval(ivF); };
  },[]);
  // Immediately anchor the symbol you just opened from the feed (ready to trade fast).
  useEffect(()=>{ const s=ALPEXA_MARKET.SYMBOLS.find(x=>x.sym===sym); if(s&&pullRef.current) pullRef.current(s); },[sym]);

  useEffect(()=>{
    const id=setInterval(()=>{
      marketRef.current.tick();
      const sltpHits=[];
      const levSet=(window.getLeverageSettings?window.getLeverageSettings():{FX:100,INDEX:20,STOCK:5,CRYPTO:5});
      let floatPnl=0,usedM=0,worst=null;
      setLiveOrders(prev=>prev.map(o=>{
        if(o.status!=='OPEN')return o;
        const m=marketRef.current.state.find(s=>s.sym===o.sym);
        if(!m)return o;
        const cur=o.side==='BUY'?m.last:m.last+m.spread;
        const pnl=ALPEXA_MARKET.getPnlUSD(m,o.open,cur,o.side,o.vol);
        // tally floating P&L + used margin for the margin-level check
        floatPnl+=pnl; usedM+=ALPEXA_MARKET.getMarginUSD(m,o.vol||0,o.open||0,(levSet[m.cls]||100));
        if(!worst||pnl<worst.pnl)worst={id:o.id,pnl,sym:o.sym};
        // Auto-close when the live price reaches the take-profit or stop-loss.
        if(o.tp&&(o.side==='BUY'?cur>=o.tp:cur<=o.tp))sltpHits.push({id:o.id,reason:'TP',sym:o.sym});
        else if(o.sl&&(o.side==='BUY'?cur<=o.sl:cur>=o.sl))sltpHits.push({id:o.id,reason:'SL',sym:o.sym});
        return{...o,pnl,current:cur};
      }));
      if(sltpHits.length){
        sltpHits.forEach(h=>{
          closeOrder(h.id);
          try{window.alpexaNotify&&alpexaNotify({type:h.reason==='TP'?'tp':'sl',title:(h.reason==='TP'?'Take profit hit ✓ · ':'Stop loss hit · ')+h.sym+' closed automatically'});}catch(e){}
        });
        const last=sltpHits[sltpHits.length-1];
        setToast({error:last.reason==='SL',icon:last.reason==='TP'?'flag':'shield',msg:last.reason==='TP'?'Take profit hit':'Stop loss hit',sub:last.sym+' closed automatically'});
        setTimeout(()=>setToast(null),3200);
      }
      // ── Margin call (100%) + stop out (50%) ──
      // Include the static demo positions in the floating P&L / used margin too.
      ALPEXA_MARKET.POSITIONS.forEach(p=>{ floatPnl+=(p.pnl||0); const m=marketRef.current.state.find(s=>s.sym===p.sym); if(m)usedM+=ALPEXA_MARKET.getMarginUSD(m,p.vol||0,p.open||0,(levSet[m.cls]||100)); });
      // Keep the server-switcher FX value in sync with live Equity (cash balance +
      // floating P&L) so the switcher matches the balance card instead of showing
      // only the cash balance.
      try{const eqBal=(window.getBalances?window.getBalances():{})[accountRef.current]||0;
        const sbo=JSON.parse(localStorage.getItem('alpexa.serverBalances')||'{}')||{};
        sbo.fx=eqBal+floatPnl; localStorage.setItem('alpexa.serverBalances',JSON.stringify(sbo));
        // Push live equity to the server (throttled) for the back-office Players list.
        if(window.AlpexaSync&&AlpexaSync.db){
          const meId=JSON.parse(localStorage.getItem('alpexa.me')||'null');
          const acct=meId&&meId.accts&&meId.accts.fx; const now=Date.now();
          window.__balPush=window.__balPush||{};
          if(acct&&now-(window.__balPush.fx||0)>3000){ window.__balPush.fx=now;
            AlpexaSync.db.from('accounts').update({balance:Math.round((eqBal+floatPnl)*100)/100}).eq('acct_no',acct).then(function(){},function(){}); }
        }
      }catch(e){}
      if(usedM>=0.01){
        const bal=(window.getBalances?window.getBalances():{})[accountRef.current]||0;
        const lvl=((bal+floatPnl)/usedM)*100;
        if(lvl<50&&worst){ // stop out: liquidate the worst-losing live position
          closeOrder(worst.id);
          try{window.alpexaNotify&&alpexaNotify({type:'marginCall',pref:'marginCall',title:'Stop out · '+worst.sym+' liquidated at '+Math.round(lvl)+'% margin'});}catch(e){}
          setToast({error:true,icon:'warning',msg:'Stop out — '+Math.round(lvl)+'%',sub:worst.sym+' liquidated to protect your account'});
          setTimeout(()=>setToast(null),4000);
        } else if(lvl<100){ if(!marginCallRef.current){ marginCallRef.current=true;
          try{window.alpexaNotify&&alpexaNotify({type:'marginCall',pref:'marginCall',title:'Margin call · level '+Math.round(lvl)+'% — add funds or reduce positions'});}catch(e){}
          setToast({error:true,icon:'warning',msg:'Margin call — '+Math.round(lvl)+'%',sub:'Add funds or close positions to avoid stop out (50%)'});
          setTimeout(()=>setToast(null),4500);
        } } else if(lvl>=120){ marginCallRef.current=false; } // re-arm once safely recovered
      } else { marginCallRef.current=false; }
      setPendingOrders(prev=>{
        const triggered=[];
        const stillPending=prev.filter(p=>{
          const m=marketRef.current.state.find(s=>s.sym===p.sym);
          if(!m)return true;
          const px=p.side==='BUY'?m.last+m.spread:m.last;
          let hit=false;
          if(p.otype==='LIMIT'){hit=p.side==='BUY'?px<=p.trigger:px>=p.trigger;}
          else if(p.otype==='STOP'){hit=p.side==='BUY'?px>=p.trigger:px<=p.trigger;}

            const now=new Date();
            const time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');

            return false;
          }
          return true;
        });
        if(triggered.length>0){
          setLiveOrders(lo=>[...triggered,...lo]);
          const t=triggered[0];

          setTimeout(()=>setToast(null),3200);

  },[]);

  function placeOrder(orderData){
    // Kill switch: if the back office halted trading, block new orders.
    if(window.__alpexaHalt){ if(window.ALPEXA_SFX&&ALPEXA_SFX.error)ALPEXA_SFX.error();
      setToast({error:true,icon:'lock',msg:'Trading paused',sub:'New orders are temporarily disabled. Please try again shortly.'});
      setTimeout(()=>setToast(null),4000); return; }
    // Guard: only block a genuinely closed market. If the live price hasn't
    // loaded yet (free data tier is rate-limited), still fill at the current
    // simulated price and fetch the real one in the background — never block.
    const sObj=marketRef.current.state.find(x=>x.sym===orderData.sym);
    if(sObj){
      const TT=(window.alpexaTR||((x)=>x));
      if(!symOpen(sObj)){ if(window.ALPEXA_SFX&&ALPEXA_SFX.error)ALPEXA_SFX.error();
        setToast({error:true,icon:'lock',msg:TT('Market closed'),sub:orderData.sym+' · '+(sObj.cls==='STOCK'?'Stocks 09:30–16:00 ET (Mon–Fri)':sObj.cls==='INDEX'?'Index hours':'FX 24/5 (closed weekends)')});
        setTimeout(()=>setToast(null),4000); return; }
      if(!sObj.real&&pullRef.current){ pullRef.current(sObj); }
    }
    const id=Date.now();
    const now=new Date();
    const time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
    if(orderData.otype&&orderData.otype!=='MARKET'){
      const newPending={id,...orderData,status:'PENDING',placedAt:time,placedTs:Date.now(),ticket:alpexaTicket('FX')};
      setPendingOrders(prev=>[newPending,...prev]);
      setToast({side:orderData.side,sym:orderData.sym,vol:orderData.vol,price:orderData.trigger,pending:true,otype:orderData.otype});
      setTimeout(()=>setToast(null),3200);
      if(window.ALPEXA_SFX)window.ALPEXA_SFX.pendingPlaced();
      setTab('HIST');setPosTab('PEND');return;
    }
    const fillPx=sObj?applySlippage(sObj,orderData.side,orderData.open,'MARKET'):orderData.open;
    const newOrder={id,...orderData,open:fillPx,status:'OPEN',placedAt:time,placedTs:Date.now(),ticket:alpexaTicket('FX'),pnl:0,fresh:true};
    setLiveOrders(prev=>[newOrder,...prev]);
    try{window.broadcastPositionOpen&&window.broadcastPositionOpen(newOrder, account);}catch(e){}
    setToast({side:orderData.side,sym:orderData.sym,vol:orderData.vol,price:fillPx});
    setTimeout(()=>setToast(null),3200);
    if(window.ALPEXA_SFX)window.ALPEXA_SFX.orderFill(orderData.side);
    setTimeout(()=>{setLiveOrders(prev=>prev.map(o=>o.id===id?{...o,fresh:false}:o));},1500);
    setTab('HIST');setPosTab('OPEN');
  }

  function cancelPending(id){setPendingOrders(prev=>prev.filter(p=>p.id!==id));}
  function modifyPosition(updated){setLiveOrders(prev=>prev.map(o=>o.id===updated.id?{...o,sl:updated.sl,tp:updated.tp}:o));if(window.ALPEXA_SFX)window.ALPEXA_SFX.tick();}

  function closeOrder(id){
    setLiveOrders(prev=>{
      const order=prev.find(o=>o.id===id);

        const now=new Date();
        const dateStr=String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');

        // Bank the realized P&L into the balance so closed wins/losses stick
        // (and equity stays continuous as the floating P&L drops off).
        try{window.addBalance&&window.addBalance(accountRef.current,order.pnl||0);}catch(e){}

  useEffect(()=>{document.documentElement.style.setProperty('--acc',tweaks.accent);},[tweaks.accent]);
  const staticPnl=ALPEXA_MARKET.POSITIONS.reduce((s,p)=>s+(p.pnl||0),0);

    const m=marketRef.current.state.find(s=>s.sym===o.sym);

  useEffect(()=>{prevPnlRef.current=livePnl;},[livePnl]);
  // On load, adopt the server FX balance if the back office set it (server > 0 and

  useEffect(()=>{
    if(!window.AlpexaSync||!AlpexaSync.db)return;

      },()=>{});
    }catch(e){}
  },[]);

  return(
    <div className="app">
      {tab!=='CHART'&&<AppHeader accent={tweaks.accent} account={account} onAccountClick={()=>setAcctSheet(true)} livePnl={livePnl} prevPnl={prevPnl} usedMargin={usedMargin} notifCount={notifications.filter(n=>!n.read).length} onBellClick={()=>setNotifOpen(true)} onMenuClick={()=>setMenuOpen(true)} tab={tab}/>}
      {tab==='WATCH'&&<Watchlist market={market} current={sym} onSelect={s=>{setSym(s);setTab('CHART');}} onDepositCrypto={()=>{try{localStorage.setItem('alpexa.openDeposit','crypto');}catch(e){}setTab('ACCT');}}/>}
      {tab==='CHART'&&<ChartScreen market={market} sym={sym} setSym={setSym} accent={tweaks.accent} density={tweaks.density} indicators={indicators} setIndicators={setIndicators} lots={lots} setLots={setLots} onPlace={placeOrder}/>}
      {tab==='TRADE'&&<TradeTicket market={market} sym={sym} setSym={setSym} lots={lots} setLots={setLots} onPlace={placeOrder}/>}
      {tab==='HIST'&&<Positions tab={posTab} setTab={setPosTab} liveOrders={liveOrders} pendingOrders={pendingOrders} closedHistory={closedHistory} market={market} onClose={closeOrder} onCancelPending={cancelPending} onModify={(p)=>setModifyTarget({position:p,isPending:false})} onModifyPending={(p)=>setModifyTarget({position:p,isPending:true})}/>}
      {tab==='ACCT'&&<Account openPositions={liveOrders.length} onNavigate={setTab}/>}
      {modifyTarget&&<ModifySheet position={modifyTarget.position} isPending={modifyTarget.isPending} market={market} onSave={modifyTarget.isPending?modifyPending:modifyPosition} onClose={()=>setModifyTarget(null)}/>}
      <BottomNav tab={tab} setTab={setTab}/>
      <AccountSheet open={acctSheet} current={account} onPick={setAccount} onClose={()=>setAcctSheet(false)}/>
      {notifOpen&&<NotificationSheet notifications={notifications} setNotifications={setNotifications} onClose={()=>setNotifOpen(false)}/>}
      {menuOpen&&<AppMenu indicators={indicators} setIndicators={setIndicators} liveOrders={liveOrders} closedHistory={closedHistory} onClose={()=>setMenuOpen(false)}/>}
      {toast&&toast.error&&(
        <div onClick={()=>setToast(null)} style={{position:'absolute',inset:0,zIndex:600,background:'rgba(10,14,26,0.55)',display:'flex',alignItems:'center',justifyContent:'center',padding:24,animation:'tFade .18s ease'}}>
          <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:300,background:'var(--surface)',borderRadius:18,padding:'24px 22px 18px',textAlign:'center',boxShadow:'0 20px 60px rgba(0,0,0,0.4)',animation:'tPop .22s cubic-bezier(0.34,1.56,0.64,1)'}}>
            <div style={{width:60,height:60,borderRadius:30,background:'#FFEBEE',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
              <Mi name={toast.icon||'lock'} size={30} fill style={{color:'#E04141'}}/>
            </div>
            <div style={{fontSize:17,fontWeight:800,color:'var(--ink)',letterSpacing:-0.2}}>{toast.msg}</div>
            {toast.sub?<div style={{fontSize:12.5,color:'var(--text-2)',lineHeight:1.5,marginTop:7}}>{toast.sub}</div>:null}

          <div style={{width:32,height:32,borderRadius:16,background:toast.pending?'rgba(229,139,30,0.18)':(toast.side==='BUY'?'var(--buy-glow)':'var(--sell-glow)'),color:toast.pending?'var(--warn)':(toast.side==='BUY'?'var(--buy-bright)':'var(--sell-bright)'),display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Mi name={toast.pending?'hourglass_empty':toast.triggered?'bolt':(toast.side==='BUY'?'trending_up':'trending_down')} size={18} fill/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,letterSpacing:0.2}}>{toast.pending?`${toast.otype} Order Pending · ${toast.side} ${toast.vol.toFixed(2)} ${toast.sym}`:toast.triggered?`Triggered · ${toast.side} ${toast.vol.toFixed(2)} ${toast.sym}`:`Order Filled · ${toast.side} ${toast.vol.toFixed(2)} ${toast.sym}`}</div>
            <div className="mono" style={{fontSize:10.5,color:'rgba(255,255,255,0.55)',marginTop:2}}>{toast.pending?'Trigger @ ':'@ '}{toast.price.toFixed(5).replace(/\.?0+$/,p=>p==='.'?'':p)}</div>
          </div>
          <button onClick={()=>setToast(null)} style={{color:'rgba(255,255,255,0.5)'}}><Mi name="close" size={16}/></button>
          <style>{`@keyframes tIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}`}</style>
        </div>
      )}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Accent Color">
          <TweakColor label="Accent" value={tweaks.accent} onChange={v=>setTweak('accent',v)} options={['#1565C0','#0EA5E9','#22B8CF','#10B981','#8B5CF6']}/>
        </TweakSection>
        <TweakSection label="Layout Density">
          <TweakRadio label="Density" value={tweaks.density} onChange={v=>setTweak('density',v)} options={[{value:'compact',label:'Compact'},{value:'cozy',label:'Cozy'}]}/>
        </TweakSection>
        <TweakSection label="Indicators">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
            {[['ma','MA(20)'],['vol','Volume'],['bb','Bollinger'],['rsi','RSI'],['macd','MACD']].map(([k,l])=>(
              <button key={k} onClick={()=>setIndicators({...indicators,[k]:!indicators[k]})} style={{padding:'7px 10px',borderRadius:7,fontSize:11.5,fontWeight:600,background:indicators[k]?'#0A0E1A':'#F4F6FA',color:indicators[k]?'#fff':'#5A6478',textAlign:'left'}}>{indicators[k]?'● ':'○ '}{l}</button>
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

// ── Root (Firebase Auth Gate) ──
function Root(){
  const [user,setUser]=useState(undefined); // undefined = loading
  // Track viewport so we can disable the iOS device frame on small screens.
  const [isMobile,setIsMobile]=useState(()=>typeof window!=='undefined' && window.innerWidth<480);
  useEffect(()=>{
    const onResize=()=>setIsMobile(window.innerWidth<480);
    window.addEventListener('resize',onResize);
    return()=>window.removeEventListener('resize',onResize);
  },[]);
  useEffect(()=>{
    // Demo mode: allow access without Firebase auth (file:// / no internet).
    // If a real Firebase session exists, use it. Otherwise show as a demo user.
    if(window.FB&&window.FB.auth){
      const unsub=window.FB.auth.onAuthStateChanged(u=>{
        if(u){ setUser(u); }
        else { setUser({ email:'demo@alpexa.com', displayName:'Demo User', uid:'demo' }); }
      });
      return unsub;
    } else {
      // Firebase unavailable — proceed in demo mode (don't bounce to login).
      setUser({ email:'demo@alpexa.com', displayName:'Demo User', uid:'demo' });
    }
  },[]);

  if(user===undefined||!user){
    return(
      <div style={{minHeight:'100vh',width:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#E5E7EB'}}>
        <div style={{width:48,height:48,border:'4px solid rgba(21,101,192,0.2)',borderTopColor:'#1565C0',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
        <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  // On mobile, render the app full-bleed without the iOS device frame.
  // Use a DEFINITE height (100dvh) so the .app{height:100%} and the chart's
  // fill-container logic have a bounded parent (prevents infinite growth).
  if(isMobile){
    return(
      <div className="fx-mobile-shell" style={{width:'100%',overflow:'hidden',background:'#1B3955'}}>
        <App/>
      </div>
    );
  }

  return(
    <div style={{minHeight:'100vh',width:'100%',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 0',background:'#E5E7EB'}}>
      <IOSDevice width={402} height={874}>
        <App/>
      </IOSDevice>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root/>);
