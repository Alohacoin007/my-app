<!DOCTYPE html>
<!-- Alpexa WebTrade — PC-only MetaTrader-style FX terminal. Mobile apps untouched. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpexa WebTrade — FX Terminal</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://unpkg.com">
<style>
  /* MT5 classic terminal — pure black, grey Excel gridlines, Tahoma. */
  :root{ --bg:#000000; --panel:#050708; --panel2:#04060a; --line:#333333; --cellbd:#444444;
    --text:#d0d4da; --dim:#8890a0; --up:#00ff00; --down:#ff2020; --accent:#3a6ea5; --r:0; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:Tahoma,'Segoe UI','Malgun Gothic',Arial,sans-serif;font-size:12px;overflow:hidden}
  #app{height:100vh}
  /* ── thin dark custom scrollbars (kill the ugly white browser bars; keep scrolling) ── */
  .terminal *{scrollbar-width:thin;scrollbar-color:#333a44 transparent}
  .terminal ::-webkit-scrollbar{width:8px;height:8px}
  .terminal ::-webkit-scrollbar-track{background:transparent}
  .terminal ::-webkit-scrollbar-corner{background:transparent}
  .terminal ::-webkit-scrollbar-thumb{background:#333a44;border-radius:4px;border:2px solid transparent;background-clip:content-box}
  .terminal ::-webkit-scrollbar-thumb:hover{background:#48505c;background-clip:content-box}
  /* ── MT5-style CSS Grid: toolbar / [market-watch | 2×2 charts] / bottom bar ── */
  .terminal{display:grid;height:100vh;
    grid-template-columns:var(--leftw,240px) 6px 1fr;
    grid-template-rows:23px 33px 1fr var(--bottomh,188px);
    grid-template-areas:"menu menu menu" "tools tools tools" "left splitter charts" "bottom bottom bottom";}
  /* horizontal (row-resize) splitters — layout CHROME, always present & draggable
     regardless of table/data content (the resize engine is data-independent). */
  /* thin 1px line, but a 7px transparent grab zone; cursor snaps to row-resize on hover */
  .hsplit,.lhsplit{flex:none;height:7px;cursor:row-resize;background:transparent;position:relative;user-select:none}
  .hsplit::before,.lhsplit::before{content:"";position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:1px;background:#222}
  .hsplit:hover::before,.hsplit.drag::before,.lhsplit:hover::before,.lhsplit.drag::before{height:2px;background:#3a6ea5}
  /* vertical splitter: thin 1px line inside a 6px transparent grab zone; col-resize on hover */
  .splitter{grid-area:splitter;cursor:col-resize;background:transparent;position:relative;user-select:none}
  .splitter::before{content:"";position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:1px;background:#222}
  .splitter:hover::before,.splitter.drag::before{width:2px;background:#3a6ea5}
  /* ── menu bar (File View …) ── */
  .menu{grid-area:menu;display:flex;align-items:center;gap:1px;padding:0 3px;background:linear-gradient(#2c3138,#20242a);border-bottom:1px solid #0a0a0a;font-size:11px;font-weight:400}
  .menu .mi{padding:2px 7px;color:#d0d4da;cursor:default;border-radius:2px}.menu .mi:hover{background:#3a6ea5;color:#fff}
  .menu .mi{position:relative}
  .menu .mi.on{background:#3a6ea5;color:#fff}
  .mdrop{position:absolute;top:100%;left:0;min-width:190px;background:#1b1f25;border:1px solid #3a3f47;
    box-shadow:0 6px 18px rgba(0,0,0,.6);z-index:40;padding:3px 0;font-size:11.5px}
  .mdrop .row{display:flex;align-items:center;gap:8px;padding:5px 12px;color:#cfd4dc;cursor:pointer;white-space:nowrap}
  .mdrop .row:hover{background:#3a6ea5;color:#fff}
  .mdrop .row .ck{width:12px;text-align:center;color:#00d060}
  .mdrop .sep{height:1px;background:#3a3f47;margin:3px 0}
  .mdrop .hd{padding:3px 12px;color:#79808c;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
  .mdrop .row .sc{margin-left:auto;color:#79808c;font-size:10.5px;padding-left:20px}
  .mdrop .row.dis{color:#6a7078;cursor:default}.mdrop .row.dis:hover{background:transparent;color:#6a7078}
  .mdrop .row .ar{margin-left:auto;color:#8a9098}
  /* ── bottom status bar (View → Status Bar) ── */
  .statusbar{grid-area:status;display:flex;align-items:center;gap:14px;padding:0 8px;font-size:11px;color:#9aa2b0;
    background:linear-gradient(#20242a,#171a1f);border-top:1px solid #000;white-space:nowrap;overflow:hidden}
  .statusbar .s{display:flex;align-items:center;gap:5px}.statusbar b{color:#c8ccd2;font-weight:600}
  .statusbar .grow{margin-left:auto}
  /* ── toolbox non-Trade tab content (News/Mailbox/…): themed empty panels ── */
  .tbxbody{flex:1;overflow:auto;padding:0}
  .tbxempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#6a7078;gap:6px;font-size:12px}
  .tbxempty .ic{font-size:22px;opacity:.5}
  table.jrnl{width:100%;border-collapse:collapse;font:11px Consolas,monospace}
  table.jrnl td{padding:2px 10px;border-bottom:1px solid #14181e;color:#9aa2b0;white-space:nowrap}
  table.jrnl td.t{color:#6f778a;width:150px}
  table.jrnl td.ok{color:#59c26a}
  .menu .conn{margin-left:auto;color:#9aa2b0;display:flex;align-items:center;gap:6px;padding-right:6px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--up)}
  /* ── icon toolbar (New Order · Algo · chart tools · timeframes) — compact, 2–4px gaps ── */
  .tools{grid-area:tools;display:flex;align-items:center;gap:3px;padding:0 4px;background:linear-gradient(#22262c,#15181d);border-bottom:1px solid #000}
  .tbtn{display:flex;align-items:center;gap:4px;height:22px;padding:0 7px;background:linear-gradient(#3a4048,#2a2e34);border:1px solid #4a5059;border-radius:3px;color:#e0e4ea;font-size:11px;cursor:pointer;white-space:nowrap;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
  .tbtn:hover{background:linear-gradient(#464c55,#34393f);border-color:#5a636e}
  .tbtn:active{box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
  .tbtn svg{width:14px;height:14px;flex:none}
  .tbtn.algo .play{color:#37c837}
  .tbtn.algo:hover{border-color:#4f8a4f;box-shadow:inset 0 0 8px rgba(60,220,80,.28),inset 0 1px 0 rgba(255,255,255,.08)}
  .tbtn.algo.on{background:linear-gradient(#2f7a35,#1e5a26);color:#eaffea;border-color:#3c8a44}
  /* square icon buttons (chart type / zoom / tile) */
  .tibtn{display:flex;align-items:center;justify-content:center;width:22px;height:22px;color:#c2c8d0;cursor:pointer;
    background:linear-gradient(#31363d,#252a30);border:1px solid #454b54;border-radius:3px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
  .tibtn:hover{background:linear-gradient(#3b414a,#2c3138);color:#fff;border-color:#5a636e}
  .tibtn:active{box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
  .tibtn.on{background:#3a6ea5;color:#fff;border-color:#3a6ea5}
  .tibtn svg{width:14px;height:14px}
  .tigrp{display:flex;gap:2px}
  .tsep{width:1px;height:18px;background:#3a3f47;margin:0 3px}
  .tf{display:flex;gap:1px}
  .tf b{padding:2px 6px;background:#23272d;border:1px solid #383d45;color:#b8bcc4;font-weight:600;font-size:11px;cursor:pointer;border-radius:2px}
  .tf b:hover{background:#2b3037;color:#dfe3ea}
  .tf b.on{background:#3a6ea5;color:#fff;border-color:#3a6ea5}
  .tbrand{margin-left:auto;font-weight:700;letter-spacing:.3px;color:#8890a0;font-size:11px}.tbrand span{color:#7fb0e0}
  /* ── left column: Market Watch (top) + Navigator (bottom) ── */
  .left{grid-area:left;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .watch{flex:1;background:var(--panel);overflow:auto;min-height:0}
  .nav{height:var(--navh,186px);background:var(--panel);border-top:1px solid var(--cellbd);overflow-x:hidden;overflow-y:auto;flex:none}
  .nav .navhd{position:sticky;top:0;padding:3px 8px;background:#0a0d12;color:var(--dim);font-size:11px;font-weight:600;border-bottom:1px solid var(--line)}
  .nav ul{list-style:none;margin:0;padding:2px 0}
  .nav li{padding:2px 8px;color:#c4c8d0;cursor:default;white-space:nowrap}
  .nav li:hover{background:#0d1420}
  .nav li.root{font-weight:700;color:#dfe3ea}
  .nav li.child{padding-left:26px;color:#aeb6c2}
  .nav li.navf{cursor:pointer;color:#c4c8d0}
  .nav li.ind{cursor:pointer;color:#aeb6c2}.nav li.ind.on{color:#8fd3a0}
  .nav li.ind .ic{color:#e0b84a}.nav li.ind.on .ic{color:#8fd3a0}
  .nav li.dim{color:#6a7078}
  .nav .tw{display:inline-block;width:12px;text-align:center;color:#8a9098}
  .nav li.leaf{color:#8fd3a0;font-size:11px}
  .nav li.leaf .ic{margin-right:4px}
  .nav .ic{display:inline-block;width:15px;text-align:center;margin-right:5px}
  /* ── one-click order box (top-left of each chart) ── */
  /* MT5 one-click panel — pixel-matched override ([SELL] [volume] [BUY], 42px, angular) */
  .obox{position:absolute;top:6px;left:6px;z-index:1000;display:flex;align-items:stretch;height:42px;
    border:1px solid #050505;box-shadow:0 1px 4px rgba(0,0,0,.55);background:#0d0e12;
    font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif}
  .obox *{border-radius:0 !important;box-sizing:border-box;font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif}
  .obox .side{height:100%;padding:2px 9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;min-width:70px;color:#fff;line-height:1;text-shadow:1px 1px 1px rgba(0,0,0,.8)}
  .obox .sell{background:linear-gradient(to bottom,#bd3a30 0%,#8d1c14 100%);border-top:1px solid rgba(255,255,255,.28)}
  .obox .buy{background:linear-gradient(to bottom,#2b579a 0%,#1e3d70 100%);border-top:1px solid rgba(255,255,255,.28)}
  .obox .side:hover{filter:brightness(1.1)}
  .obox .side:active{box-shadow:inset 0 2px 5px rgba(0,0,0,.6);transform:translateY(1px)}
  .obox .lbl{font-size:9px;letter-spacing:1px;opacity:.95;margin-bottom:1px;font-weight:bold}
  .obox .bf{display:inline-flex;align-items:baseline;line-height:1;font-variant-numeric:tabular-nums}
  .obox .bf .sm{font-size:11px;font-weight:400;color:#fff;line-height:1}       /* 앞자리 1.14 — baseline 정렬 */
  .obox .bf .bg{font-size:22px;font-weight:900;color:#fff;line-height:1}        /* 핵심 핍 — 순백/굵게 */
  .obox .bf .fr{align-self:flex-start;font-size:9px;font-weight:700;color:#fff;line-height:1;margin-left:1px;transform:translateY(-4px)}  /* 위첨자 — 우상단 꼬리에 밀착 */
  .obox .vol{position:relative;height:100%;width:68px;background:#e1e1e1;color:#20242a;display:flex;align-items:center;justify-content:center;border-left:1px solid #555;border-right:1px solid #555}
  .obox .vol b{position:absolute;top:50%;transform:translateY(-50%);cursor:pointer;color:#333;font-size:9px;width:14px;text-align:center;user-select:none;line-height:1}
  .obox .vol b.dn{left:0}.obox .vol b.up{right:0}
  .obox .vol b:hover{color:#1e3d70}
  .obox .vol input{width:34px;height:22px;text-align:center;padding:0;border:1px dashed #888888;background:#fff;color:#111;font-weight:bold;font-size:12px;outline:none}
  .mwt{width:100%;border-collapse:collapse}
  .mwt th{position:sticky;top:0;background:#0a0d12;color:var(--dim);font-weight:600;font-size:11px;text-align:right;padding:3px 6px;border:1px solid var(--line)}
  .mwt th:first-child{text-align:left}
  .mwt td{padding:2px 6px;border:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .mwt td.sym{text-align:left;font-weight:600;color:#c8ccd2}
  .mwt tr{cursor:pointer}.mwt tr:hover td{background:#0d1420}
  .up{color:var(--up)}.down{color:var(--down)}
  /* ── MDI workspace: charts area is a positioning context; each chart is a free
     floating window (absolute) that can move, resize and overlap like real MT5. ── */
  .charts{grid-area:charts;position:relative;overflow:hidden;background:#0a0d12}
  .win{position:absolute;background:#000;display:flex;flex-direction:column;
    border:1px solid var(--cellbd);box-shadow:0 2px 12px rgba(0,0,0,.55);
    min-width:220px;min-height:150px;overflow:hidden}
  .win.active{border-color:#3a6ea5;box-shadow:0 4px 20px rgba(0,0,0,.8)}
  .cell-title{display:flex;align-items:center;gap:4px;height:18px;padding:0 5px;flex:none;
    cursor:move;user-select:none;
    background:linear-gradient(#3a3f47,#2a2e34);border-bottom:1px solid #000;font:600 11px Tahoma,sans-serif;color:#9aa1ad}  /* inactive = muted grey */
  .cell-title .ti{display:inline-flex;align-items:center;gap:2px;margin-right:1px;flex:none}
  .cell-title .ti svg{width:12px;height:12px;display:block}
  .win.active .cell-title{background:linear-gradient(#2f7fe0,#1c5ec0);color:#ffffff}  /* active = vivid program blue */
  .win.active{border-color:#2f7fe0}
  .cell-title .wc{margin-left:auto;display:flex;gap:4px}
  .cell-title .wc span{cursor:pointer;width:16px;text-align:center;border-radius:2px;color:#c8ccd2}
  .cell-title .wc span:hover{background:rgba(255,255,255,.22)}
  .win.active .cell-title .wc span{color:#eaf2ff}
  .cell-title .wc span:last-child:hover{background:#e81123;color:#fff}
  .canvas{position:relative;flex:1;min-height:0}
  /* 8-direction resize handles hugging the window border */
  .rsz{position:absolute;z-index:7}
  .rsz.n{top:-2px;left:6px;right:6px;height:6px;cursor:ns-resize}
  .rsz.s{bottom:-2px;left:6px;right:6px;height:6px;cursor:ns-resize}
  .rsz.e{right:-2px;top:6px;bottom:6px;width:6px;cursor:ew-resize}
  .rsz.w{left:-2px;top:6px;bottom:6px;width:6px;cursor:ew-resize}
  .rsz.ne{top:-3px;right:-3px;width:12px;height:12px;cursor:nesw-resize}
  .rsz.nw{top:-3px;left:-3px;width:12px;height:12px;cursor:nwse-resize}
  .rsz.se{bottom:-3px;right:-3px;width:12px;height:12px;cursor:nwse-resize}
  .rsz.sw{bottom:-3px;left:-3px;width:12px;height:12px;cursor:nesw-resize}
  .cell-lbl{position:absolute;top:48px;left:8px;z-index:3;pointer-events:none;
    font:400 11px Tahoma,'Segoe UI',Arial,sans-serif;color:#8fa0b4;letter-spacing:.2px;text-shadow:0 0 3px #000,0 0 3px #000}
  .cell-lbl b{font-weight:600}
  /* drawing layer over each chart — captures the mouse only when a draw tool is armed */
  .drawlayer{position:absolute;inset:0;z-index:4;pointer-events:none}
  .drawlayer.arm{pointer-events:auto;cursor:crosshair}
  .dov{position:absolute;pointer-events:none;z-index:4}
  .dov.vline{top:0;bottom:0;width:0;border-left:1px solid #e8b23a}
  .dov.text{transform:translate(0,-50%);color:#e6c14a;font:600 11px Tahoma,sans-serif;white-space:nowrap;text-shadow:0 0 3px #000,0 0 3px #000}
  /* ── Market Watch: per-tick price flash + selected row + bottom tab strip ── */
  .mwt td.uptick{color:#26c281}.mwt td.dntick{color:#ff4d4d}
  .mwt td.flash{animation:mwflash .35s ease-out}
  @keyframes mwflash{0%{background:rgba(120,140,170,.28)}100%{background:transparent}}
  .mwt tr.sel td{background:#3a6ea5 !important;color:#fff}
  .mwt tr.sel td.sym,.mwt tr.sel td.up,.mwt tr.sel td.down,.mwt tr.sel td.uptick,.mwt tr.sel td.dntick{color:#fff}
  .mwtabs{display:flex;flex:none;background:linear-gradient(#20242a,#14171c);border-top:1px solid #000}
  .mwtabs .mt{padding:3px 10px;font-size:11px;color:#a2aab6;border-right:1px solid #2a2e34;cursor:default}
  .mwtabs .mt.on{background:#000;color:#fff;border-top:2px solid #3a6ea5;margin-top:-1px}
  /* Market Watch title bar (live clock + close) */
  .mwhead{flex:none;display:flex;align-items:center;justify-content:space-between;height:20px;padding:0 4px 0 8px;
    background:linear-gradient(#2f7fe0,#1c60c0);color:#fff;font-size:11px;font-weight:600;border-bottom:1px solid #000}
  .mwhead .x{cursor:pointer;width:16px;text-align:center;border-radius:2px}
  .mwhead .x:hover{background:#e81123}
  /* Details tab */
  .mwdet{padding:0}.mwdet .sh{padding:5px 8px;color:#7fb0e0;font-size:11px;font-weight:600;border-bottom:1px solid var(--line)}
  .mwdet table{width:100%;border-collapse:collapse;font-size:11.5px}
  .mwdet td{padding:3px 8px;border-bottom:1px solid #14181e;white-space:nowrap}
  .mwdet td.k{color:#c4c8d0}.mwdet td.v{text-align:right;font-variant-numeric:tabular-nums}
  .mwdet td .ar{display:inline-block;width:12px;color:#8a9098}
  /* Trading tab — stacked one-click panels */
  .mwtrade{padding:0}
  .mwtp{border-bottom:1px solid #23272d;padding:4px 6px 6px}
  .mwtp .hd{display:flex;justify-content:space-between;color:#c8ccd2;font-size:11px;font-weight:600;margin-bottom:3px}
  .mwtp .hd .tm{color:#8890a0;font-weight:400}
  .mwtp .row{display:flex;height:38px;gap:2px;align-items:stretch}
  .mwtp .sd{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;cursor:pointer;line-height:1.05}
  .mwtp .sd.sell{background:linear-gradient(#2f7fd6,#1d63b4)}.mwtp .sd.buy{background:linear-gradient(#e2574c,#d23a2d)}
  .mwtp .sd:hover{filter:brightness(1.08)}
  .mwtp .sd .lbl{font-size:9px;letter-spacing:.5px;opacity:.9}
  .mwtp .sd .pr{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}.mwtp .sd .pr sup{font-size:10px}
  .mwtp .mid{width:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0d12}
  .mwtp .mid .q{color:#e6ebf2;font:700 12px Tahoma}.mwtp .mid .sp{color:#8890a0;font-size:9px;margin-top:2px}
  .mwtp .lh{display:flex;justify-content:space-between;font-size:9.5px;color:#8890a0;margin-top:2px}
  .mwtp .lh b{color:#c4c8d0;font-weight:600}
  /* Ticks tab chart */
  .mwtick{flex:1;min-height:0;position:relative;background:#ffffff}
  .watch{display:flex;flex-direction:column;overflow:hidden}
  .watch .mwscroll{flex:1;overflow-x:hidden;overflow-y:auto;min-height:0}
  .ctxmenu{position:fixed;z-index:1200;min-width:216px;background:#f0f0f0;border:1px solid #9a9a9a;
    box-shadow:2px 2px 5px rgba(0,0,0,.2);padding:2px;font:12px 'Segoe UI',Tahoma,sans-serif;color:#1c1c1c}
  .ctxmenu .ci{display:flex;align-items:center;gap:8px;height:24px;padding:0 10px 0 8px;cursor:default;border-radius:2px}
  .ctxmenu .ci:hover{background:#cfe3fb}
  .ctxmenu .ci.dis{color:#a0a0a0}.ctxmenu .ci.dis:hover{background:transparent}
  .ctxmenu .ci .ic{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#3a3f46}
  .ctxmenu .ci .ic svg{width:15px;height:15px}
  .ctxmenu .ci .lbl{flex:1;white-space:nowrap}
  .ctxmenu .ci .sc{color:#6a6a6a;font-size:11px;padding-left:22px}
  .ctxmenu .ci .ar{color:#6a6a6a;margin-left:auto}
  .ctxmenu .ci .ck{width:14px;text-align:center;color:#2e7d32}
  .ctxsep{height:1px;background:#c8c8c8;margin:3px 6px}
  .ctxmenu .ci.has{position:relative}
  .ctxmenu.sub{position:absolute;left:100%;top:-3px;min-width:150px;z-index:1201}
  .ctxmenu .ci .ic svg{width:15px;height:15px}
  /* ── Bottom: KPI strip + Excel-grid positions table ── */
  .bottom{grid-area:bottom;background:var(--panel);border-top:1px solid var(--cellbd);display:flex;flex-direction:column;overflow:hidden}
  .tbxtabs{display:flex;background:linear-gradient(#20242a,#14171c);border-bottom:1px solid #000}
  .tbxtabs .t{padding:3px 11px;font-size:11px;color:#a2aab6;border-right:1px solid #2a2e34;cursor:default}
  .tbxtabs .t.on{background:#000;color:#fff;border-top:2px solid #3a6ea5;margin-top:-1px}
  .acctline{display:flex;align-items:center;gap:18px;padding:4px 12px;background:#0a0d12;border-top:1px solid var(--line);font-size:11.5px;color:#c8ccd2;white-space:nowrap;overflow-x:auto}
  .acctline .k{color:#8890a0}.acctline b{color:#fff;font-variant-numeric:tabular-nums}
  .postbl{flex:1;overflow:auto}
  table.pos{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  table.pos th{position:sticky;top:0;background:#0a0d12;color:var(--dim);font-weight:600;font-size:11px;text-align:right;padding:3px 10px;border:1px solid var(--line)}
  table.pos th:first-child,table.pos td:first-child{text-align:left}
  table.pos td{padding:3px 10px;border:1px solid var(--line);text-align:right}
  .xclose{width:18px;height:18px;line-height:1;padding:0;border:1px solid #5a2020;border-radius:2px;

<!-- PINNED versions + crossorigin — MUST match crypto-live.html/trading.html (proven-working
     React+Babel setup). Unpinned versions were why the app didn't mount. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="alpexa-sync.js?v=16"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
/* ══════════════════════════════════════════════════════════════════════════
   OVERLOAD-SAFE PIPELINE: the whole page subscribes to prices ONCE (priceStore),
   through the 1s-cache `feed` Edge. Every chart cell + market-watch + bottom bar
   reads from that single in-memory store (browser fan-out) — NOT their own poll.
   Fan-out to the UI is throttled to ~2.5/sec (mirrors _shared/throttle.ts).
   ══════════════════════════════════════════════════════════════════════════ */

// throttle — trailing edge, keeps the newest value (mirror of supabase/functions/_shared/throttle.ts)
function throttle(fn, interval){
  let last=0, pending=null, timer=null;
  const fire=()=>{ last=Date.now(); const a=pending; pending=null; timer=null; fn.apply(null,a); };
  return function(){ const now=Date.now(), wait=interval-(now-last);
    if(wait<=0){ last=now; fn.apply(null,arguments); return; }
    pending=arguments; if(!timer) timer=setTimeout(fire, wait); };
}

const WATCH = ['EURUSD','AUDUSD','USDJPY','GBPUSD','USDCAD','NZDUSD','USDCHF','GBPJPY','AUDJPY','EURJPY'];
const GRID  = ['EURUSD','USDJPY','AUDUSD','GBPUSD'];   // the 2×2 (matches the MT5 screenshot)
const pip   = (s)=> s.slice(3)==='JPY'||s.slice(0,3)==='JPY' ? 0.01 : 0.0001;
const digits= (s)=> s.slice(3)==='JPY'||s.includes('JPY') ? 3 : 5;
const fmtPx = (s,v)=> (v==null?'—':(+v).toFixed(digits(s)));

// ── read prices via the cache proxy (feed-first → direct DB fallback → dev simulator) ──
async function feedPrices(){
  try{ if(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.db.functions){
    const x=await AlpexaSync.db.functions.invoke('feed',{body:{t:'prices'}});
    if(x&&!x.error&&Array.isArray(x.data)) return x.data;
  } }catch(e){}
  try{ if(window.AlpexaSync&&AlpexaSync.db){
    const r=await AlpexaSync.db.from('prices').select('symbol,mid,spr_pts');
    if(r&&r.data) return r.data;
  } }catch(e){}
  return null;   // → simulator seed keeps the terminal alive in dev / logged-out
}

const BASE = { EURUSD:1.143, AUDUSD:0.694, USDJPY:162.36, GBPUSD:1.3417, USDCAD:1.417,
  NZDUSD:0.5758, USDCHF:0.8068, GBPJPY:217.8, AUDJPY:112.7, EURJPY:185.6 };

const priceStore = {
  mids:{}, listeners:new Set(), timer:null, live:false,
  _set(sym,mid,half,spr,now){
    const prev=this.mids[sym]; const bid=mid-half, ask=mid+half;
    this.mids[sym]={ mid, bid, ask, spr, open: prev? prev.open : mid, chg: prev? (mid-prev.open)/prev.open*100 : 0, ts:now,
      bidHi: prev? Math.max(prev.bidHi,bid):bid, bidLo: prev? Math.min(prev.bidLo,bid):bid,
      askHi: prev? Math.max(prev.askHi,ask):ask, askLo: prev? Math.min(prev.askLo,ask):ask };
  },
  _apply(rows){
    const now=Date.now();
    rows.forEach(p=>{
      const sym=p.symbol; if(WATCH.indexOf(sym)<0) return;
      const mid=+p.mid||0; if(mid<=0) return;
      const spr=(+p.spr_pts||10); this._set(sym, mid, spr*pip(sym)/2, spr, now);
    });
  },
  _simulate(){ // dev fallback: gentle random walk so charts show life without a live feed
    const now=Date.now();
    WATCH.forEach(sym=>{
      const cur=this.mids[sym]? this.mids[sym].mid : BASE[sym];
      const mid=cur*(1+(Math.random()-0.5)*0.0006); this._set(sym, mid, 10*pip(sym)/2, 10, now);
    });
  },
  async pull(){
    const rows=await feedPrices();
    if(rows && rows.length){ this.live=true; this._apply(rows); } else { this.live=false; this._simulate(); }
    this.notify();
  },
  start(){ if(this.timer) return; this.pull(); this.timer=setInterval(()=>this.pull(), 1000); }, // 1 poll/sec — server 1s-cached
  subscribe(fn){ this.listeners.add(fn); fn(this.mids); return ()=>this.listeners.delete(fn); },
  get(sym){ return this.mids[sym]; },
};
priceStore.notify = throttle(function(){ priceStore.listeners.forEach(fn=>{ try{fn(priceStore.mids);}catch(e){} }); }, 400);

/* ── positionsStore: ONE source of truth for open FX positions + account.
   ChartCell draws createPriceLine flags from it; BottomBar tables it. Server-owned
   (read-only display) — never writes money, matches CLAUDE.md #5 (server is sole owner). ── */
// DEMO seed — a mock ledger so the terminal is never empty for layout/UX testing.
// Pure client-side DISPLAY only: never written to the server or localStorage, never
// treated as spendable money (orders still route through useTradeEngine). A real
// logged-in load REPLACES this (real users never see the mock). (#5 stays intact.)
const DEMO_ACCT = { acct_no:'FX-DEMO', balance:100000 };
const DEMO_POS  = [{ local_id:'3172308', symbol:'EURUSD', side:'buy', stake:0.01, size:0.01,
  open_price:1.14318, status:'open', created_at:'2026-07-09T20:17:40', _demo:true, profit:-0.39 }];

const positionsStore = {
  acct:null, pos:[], listeners:new Set(), ch1:null, ch2:null, started:false,
  async loadAcct(){ try{ if(!(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.me)) return;
    const r=await AlpexaSync.db.from('accounts').select('acct_no,balance').eq('server','fx').limit(1);
    if(r&&r.data&&r.data[0]){ this.acct=r.data[0]; this.notify(); } }catch(e){} },
  async loadPos(){ try{ if(!(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.me)) return;
    const r=await AlpexaSync.db.from('positions').select('local_id,symbol,side,stake,size,open_price,status,created_at').eq('server','fx').eq('status','open').limit(200);
    if(r&&r.data){ this.pos=r.data; this.notify(); } }catch(e){} },   // real load REPLACES the demo seed
  start(){ if(this.started) return; this.started=true;
    this.acct=DEMO_ACCT; this.pos=DEMO_POS.slice(); this.notify();   // seed demo first → ledger never empty
    try{ if(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.me){
      this.loadAcct(); this.loadPos();                                // logged in → overwrite demo with reality
      this.ch1=AlpexaSync.db.channel('wt-acct').on('postgres_changes',{event:'*',schema:'public',table:'accounts'},()=>this.loadAcct()).subscribe();
      this.ch2=AlpexaSync.db.channel('wt-pos').on('postgres_changes',{event:'*',schema:'public',table:'positions'},()=>this.loadPos()).subscribe();
    } }catch(e){} },
  notify(){ this.listeners.forEach(fn=>{ try{fn(this);}catch(e){} }); },
  subscribe(fn){ this.listeners.add(fn); fn(this); return ()=>this.listeners.delete(fn); },
  forSymbol(sym){ return this.pos.filter(p=>p.symbol===sym); },
  // append a DEMO position from an order-modal fill — client display only (never server/
  // localStorage; #5 intact). Live P/L (no pinned profit) marks at the feed mid.
  addDemo({ symbol, side, volume, price }){
    const tkt=String(3000000+Math.floor(Math.random()*999999));
    const d=new Date(), p2=n=>String(n).padStart(2,'0');
    const ts=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+'T'+p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());
    this.pos=this.pos.concat([{ local_id:tkt, symbol, side:(side==='sell'?'sell':'buy'), stake:+volume||0.01,
      size:+volume||0.01, open_price:+price||0, status:'open', created_at:ts, _demo:true }]);
    this.notify();
  },
  removeDemo(localId){ this.pos=this.pos.filter(p=>p.local_id!==localId); this.notify(); },   // demo close (no money)
};

// lots for a position row (MT5 "Volume") + display helpers shared by chart flags & tables
const lotsOf = (p)=> (+p.size||+p.stake||0.01);
const sideUp = (s)=> (s==='sell'||s==='SELL')?'SELL':'BUY';

/* ── chartResizer: every chart registers its instance + container. The splitter drag loop
   and window-resize call resizeAll() → chart.resize(w,h) so the 4 charts follow the layout
   instead of squishing. (autoSize is OFF so these explicit calls actually apply.) ── */
const chartResizer = {
  items:new Set(),
  resizeOne(it){ try{ const w=it.el.clientWidth, h=it.el.clientHeight; if(w>0&&h>0) it.chart.resize(w,h); }catch(e){} },
  resizeAll(){ this.items.forEach(it=>this.resizeOne(it)); },
  add(chart, el){ const it={chart,el}; this.items.add(it); this.resizeOne(it); return ()=>this.items.delete(it); },
};
if(typeof window!=='undefined') window.addEventListener('resize', ()=>chartResizer.resizeAll());

/* ── MDI window manager: a z-order counter + a focus broadcaster so clicking any
   floating chart window raises it to the front and highlights it (others dim). ── */
let WIN_Z = 20, WIN_SEQ = 0;
const winFocus = { listeners:new Set(), active:null,
  set(id){ this.active=id; this.listeners.forEach(fn=>{ try{fn(id);}catch(e){} }); },
  subscribe(fn){ this.listeners.add(fn); return ()=>this.listeners.delete(fn); } };
const WIN_MINW=220, WIN_MINH=150;
// initial 2×2 tiling as fractions of the workspace — after mount each window is free-floating
const WINLAYOUT=[
  {fx:0.004, fy:0.008, fw:0.492, fh:0.484},
  {fx:0.504, fy:0.008, fw:0.492, fh:0.484},
  {fx:0.004, fy:0.508, fw:0.492, fh:0.484},
  {fx:0.504, fy:0.508, fw:0.492, fh:0.484},
];

// ── candle history: try the fx-prices Edge, fall back to a synthetic seed (live bars are REAL feed). ──
async function loadCandles(symbol, tf){
  try{ if(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.db.functions){
    const x=await AlpexaSync.db.functions.invoke('fx-prices',{body:{candles:symbol,tf:tf||'M15'}});
    if(x&&!x.error&&x.data&&Array.isArray(x.data.candles)&&x.data.candles.length)
      return x.data.candles.map(c=>({ time:Math.floor((c.t||c.time)/1000), open:+c.o||+c.open, high:+c.h||+c.high, low:+c.l||+c.low, close:+c.c||+c.close }));
  } }catch(e){}
  return synthCandles(symbol);   // TODO: wire a public candles endpoint for real history
}
function synthCandles(symbol){   // ~120 M15 bars ending near the current mid
  const step=900, n=120; let t=Math.floor(Date.now()/1000/step)*step - n*step;
  let px=(priceStore.get(symbol)&&priceStore.get(symbol).mid)||BASE[symbol]||1;
  const out=[];
  for(let i=0;i<n;i++){ const o=px; px=px*(1+(Math.random()-0.5)*0.0008);
    const c=px, h=Math.max(o,c)*(1+Math.random()*0.0003), l=Math.min(o,c)*(1-Math.random()*0.0003);
    out.push({ time:t, open:o, high:h, low:l, close:c }); t+=step; }
  return out;
}

/* ══════════════════════════════════════════════════════════════════════════
   INDICATOR ENGINE — extensible, chart-engine-agnostic. Each indicator is a pure
   compute + a render descriptor (main overlay | bottom sub-band). Adding one = a
   single registry entry; ChartCell needs no change. This is the seam a future
   'TradingView Advanced Charts' / server-computed overlay drops into.
   ══════════════════════════════════════════════════════════════════════════ */
function _sma(c,p){ const o=[]; let s=0; for(let i=0;i<c.length;i++){ s+=c[i].close; if(i>=p) s-=c[i-p].close; if(i>=p-1) o.push({time:c[i].time,value:s/p}); } return o; }
function _ema(c,p){ const o=[],k=2/(p+1); let e=null; for(let i=0;i<c.length;i++){ const x=c[i].close; e=e==null?x:x*k+e*(1-k); if(i>=p-1) o.push({time:c[i].time,value:e}); } return o; }
function _rsi(c,p){ const o=[]; let g=0,l=0; for(let i=1;i<c.length;i++){ const d=c[i].close-c[i-1].close,u=Math.max(d,0),w=Math.max(-d,0);
  if(i<=p){ g+=u; l+=w; if(i===p){ g/=p; l/=p; o.push({time:c[i].time,value:l===0?100:100-100/(1+g/l)}); } }
  else { g=(g*(p-1)+u)/p; l=(l*(p-1)+w)/p; o.push({time:c[i].time,value:l===0?100:100-100/(1+g/l)}); } } return o; }
function _macd(c){ const a=_ema(c,12), b=new Map(_ema(c,26).map(x=>[x.time,x.value])); return a.filter(x=>b.has(x.time)).map(x=>({time:x.time,value:x.value-b.get(x.time)})); }

const INDICATORS = {
  MA20:  { label:'Moving Average (20)', pane:'main', build:(c)=>[{color:'#f0c674', data:_sma(c,20)}] },
  MA50:  { label:'Moving Average (50)', pane:'main', build:(c)=>[{color:'#e0709a', data:_sma(c,50)}] },
  EMA20: { label:'EMA (20)',            pane:'main', build:(c)=>[{color:'#5fb0ff', data:_ema(c,20)}] },
  RSI14: { label:'RSI (14)',            pane:'sub',  build:(c)=>[{color:'#c792ea', data:_rsi(c,14)}] },
  MACD:  { label:'MACD (12, 26)',       pane:'sub',  build:(c)=>[{color:'#82d982', data:_macd(c)}] },
};

/* ══ COMMAND BUS — one event map the menu bar + toolbar dispatch into. Components
   subscribe; App owns the reducer. New menu action = one entry in COMMANDS. ══ */
const COMMANDS = {
  'order.new':        'Open the New Order ticket',
  'algo.toggle':      'Toggle Algo Trading',
  'chart.tf':         'Set chart timeframe (arg: M1…MN)',
  'chart.indicator':  'Toggle an indicator (arg: MA20/RSI14/…)',
  'chart.type':       'Set chart series type (arg: candle/bar/line)',
  'chart.zoom':       'Zoom the charts (arg: in/out)',
  'chart.tool':       'Arm a drawing tool (arg: cross/vline/hline/trend/fib/text|null)',
  'window.tile':      'Re-tile the chart windows to a 2×2 grid',
  'view.toggle':      'Show/hide a panel (arg: marketwatch/navigator/toolbox/toolbars/statusbar)',
};
const terminalBus = { listeners:new Set(),
  emit(cmd,arg){ this.listeners.forEach(fn=>{ try{fn(cmd,arg);}catch(e){} }); },
  subscribe(fn){ this.listeners.add(fn); return ()=>this.listeners.delete(fn); } };

/* ══ useTradeEngine — the single hook the order box + trade panel talk to. It is a
   thin CLIENT INTERFACE over the server: it READS balance/positions (positionsStore,
   server-owned, realtime) and exposes placeOrder/closeOrder that route to a
   configurable execution endpoint. It NEVER writes balances locally (CLAUDE.md #5 —
   server is the sole owner). Wire window.ALPEXA_TRADE_API (external MT5 Web API) or
   the fx_open RPC to go live; until then placeOrder reports 'not connected' rather
   than faking money. ══ */
const TRADE_API = (typeof window!=='undefined' && window.ALPEXA_TRADE_API) || '/api/trade/order';
const CONTRACT = 100000;   // FX standard lot
const LEVERAGES = [10,50,100,500];

/* tradeSettings — leverage is a UI/config setting (NOT money), so localStorage is OK
   (CLAUDE.md: UI settings/session OK, money forbidden). Shared across components. */
const tradeSettings = {
  leverage:100, listeners:new Set(),
  load(){ try{ const v=localStorage.getItem('alpexa.wt.leverage'); if(v) this.leverage=Math.max(1,+v||100); }catch(e){} return this; },
  setLeverage(n){ this.leverage=Math.max(1,+n||100); try{ localStorage.setItem('alpexa.wt.leverage', String(this.leverage)); }catch(e){} this.notify(); },
  notify(){ this.listeners.forEach(fn=>{ try{fn(this.leverage);}catch(e){} }); },
  subscribe(fn){ this.listeners.add(fn); return ()=>this.listeners.delete(fn); },
}.load();

   (localStorage OK per CLAUDE.md — UI settings/session allowed). */
const wtConfig = {

// base-currency → USD rate for margin conversion (MT5-standard). USD base = 1; USD quote
// = the pair price; a cross (EURJPY) uses the base's USD pair if the feed has it.
function baseUsdRate(symbol){
  const base=symbol.slice(0,3), quote=symbol.slice(3), px=priceStore.get(symbol);
  if(base==='USD') return 1;
  if(quote==='USD') return px? px.mid : 0;
  const b=priceStore.get(base+'USD'); if(b) return b.mid;
  const inv=priceStore.get('USD'+base); if(inv&&inv.mid) return 1/inv.mid;
  return px? px.mid : 0;   // best-effort fallback
}
// required margin (in USD account ccy) for a volume at a leverage — the MT5 formula.
function requiredMargin(symbol, volume, leverage){
  const lev=Math.max(1,+leverage||100); return (+volume||0)*CONTRACT*baseUsdRate(symbol)/lev;
}

function useTradeEngine(){
  const [acct,setAcct]=React.useState(positionsStore.acct);
  const [pos,setPos]=React.useState(positionsStore.pos);
  const [leverage,setLeverageState]=React.useState(tradeSettings.leverage);
  const [tick,setTick]=React.useState(0);   // re-render on price ticks so margin figures stay live
  React.useEffect(()=> positionsStore.subscribe(s=>{ setAcct(s.acct); setPos([...s.pos]); }), []);
  React.useEffect(()=> tradeSettings.subscribe(setLeverageState), []);
  React.useEffect(()=> priceStore.subscribe(throttle(()=>setTick(t=>t+1),300)), []);   // 0.3s live P&L/equity
  const connected = !!(window.ALPEXA_TRADE_API);   // real execution endpoint present?
  const setLeverage = (n)=> tradeSettings.setLeverage(n);
  // ── leverage → real-time order affordability (all display; server stays the money owner) ──
  const floating = pos.reduce((s,p)=>{ if(p._demo && p.profit!=null) return s+(+p.profit);
    const m=priceStore.get(p.symbol); if(!m) return s; const dir=sideUp(p.side)==='SELL'?-1:1;
    return s + dir*(m.mid-(+p.open_price||m.mid))*lotsOf(p)*CONTRACT*(p.symbol.includes('JPY')?0.0067:1); }, 0);
  const balance = acct?+acct.balance||0:0;
  const equity  = balance + floating;
  const usedMargin = pos.reduce((s,p)=> s + requiredMargin(p.symbol, lotsOf(p), leverage), 0);
  const freeMargin = equity - usedMargin;
  const marginFor  = (symbol, volume)=> requiredMargin(symbol, volume, leverage);
  const maxVolume  = (symbol)=>{ const one=requiredMargin(symbol, 1, leverage);
    return one>0 ? Math.max(0, Math.floor(freeMargin/one*100)/100) : 0; };   // lots affordable with free margin
  // B-BOOK ORDER EXECUTION — the client only CALLS the server; it never sets the fill
  // price, inserts a position, or moves balance. fx_open decides the entry price, enforces
  // the free-margin gate, and inserts the position server-side (idempotent by local_id).
  async function placeOrder({ symbol, side, volume, leverage:lev }){
    const size=+volume||0.01;
    const local_id='wt-'+Date.now()+'-'+Math.floor(Math.random()*1e6);
    // 1) external MT5 Web API (only if the operator wired one)
    if(window.ALPEXA_TRADE_API){
      try{ const r=await fetch(TRADE_API,{ method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ symbol, side, volume:size, leverage:+lev||undefined, local_id, ts:Date.now() }) });
        return { ok:r.ok, status:r.status, local_id }; }catch(e){ return { ok:false, reason:String(e) }; }
    }
    // 2) B-Book: our Supabase fx_open RPC (server-authoritative — it sets the fill price,
    //    enforces the free-margin gate, inserts the position). We PASS the chosen leverage;
    //    the server CLAMPS it to the house cap (LEAST) so a client can only be more
    //    conservative, never bypass the cap. If the leverage-aware overload isn't deployed
    //    yet, we transparently retry the base signature (house cap applies).
    if(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.me){
      try{
        const base={ p_local_id:local_id, p_symbol:symbol, p_side:side, p_size:size };
        let r=await AlpexaSync.db.rpc('fx_open', lev ? { ...base, p_leverage:+lev } : base);
        if(r&&r.error&&lev && /PGRST202|could not find the function|does not exist|schema cache/i.test(((r.error&&r.error.message)||'')+((r.error&&r.error.code)||''))){
          r=await AlpexaSync.db.rpc('fx_open', base);   // overload not deployed → base call
        }
        const d=r&&r.data;
        if(r&&!r.error&&d&&d.ok){ positionsStore.loadPos(); return { ok:true, server:true, open:d.open, margin:d.margin, local_id }; }
        return { ok:false, reason:(d&&d.error)||(r&&r.error&&r.error.message)||'rejected' };   // e.g. 'insufficient margin'
      }catch(e){ return { ok:false, reason:String(e&&e.message||e) }; }
    }
    // 3) logged out → caller may fall back to the demo ledger (no real money)
    return { ok:false, reason:'not_logged_in' };
  }
  // CLOSE — fx_close computes realized P&L server-side and banks it via settlements
  // (trg_settlement_balance → accounts.balance). The client never touches balance.
  async function closeOrder(localId){
    if(window.ALPEXA_TRADE_API){ try{ const r=await fetch(TRADE_API+'?close='+encodeURIComponent(localId),{method:'POST'}); return {ok:r.ok}; }catch(e){ return {ok:false,reason:String(e)}; } }
    if(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.me){
      try{ const r=await AlpexaSync.db.rpc('fx_close',{ p_local_id:localId });
        const d=r&&r.data;
        if(r&&!r.error&&d&&d.ok){ positionsStore.loadPos(); positionsStore.loadAcct(); return { ok:true, pnl:d.pnl }; }
        return { ok:false, reason:(d&&d.error)||'close failed' };
      }catch(e){ return { ok:false, reason:String(e&&e.message||e) }; }
    }
    return { ok:false, reason:'not_logged_in' };
  }
  return { acct, pos, connected, placeOrder, closeOrder, TRADE_API,
    leverage, setLeverage, balance, equity, floating, usedMargin, freeMargin, marginFor, maxVolume };
}

/* ── One-click order box (SELL orange / vol / BUY blue) — live Ask/Bid inside the
   buttons; clicks route through useTradeEngine (server-authoritative, no local money). ── */
// MT5 big-figure price: small head · large pips · superscript last digit (e.g. 1.14 37⁶)
function BigFig({ symbol, v }){
  const s=fmtPx(symbol,v); if(s==='—') return <span className="bf">—</span>;
  return <span className="bf"><span className="sm">{s.slice(0,-3)}</span><span className="bg">{s.slice(-3,-1)}</span><span className="fr">{s.slice(-1)}</span></span>;
}
function OrderBox({ symbol }){
  const [m,setM]=React.useState(priceStore.get(symbol)||{});
  const [vol,setVol]=React.useState('0.01');
  const eng=useTradeEngine();
  React.useEffect(()=> priceStore.subscribe(throttle(mids=>setM({...(mids[symbol]||{})}),400)), [symbol]);
  const send=async(side)=>{
    const q=priceStore.get(symbol)||m; const price=side==='buy'?q.ask:q.bid;
    const r=await eng.placeOrder({ symbol, side, volume:vol, leverage:eng.leverage });   // one-click B-Book
    if(r.ok) return;
    if(r.reason==='not_logged_in'){ positionsStore.addDemo({ symbol, side, volume:+vol||0.01, price }); return; }   // demo
    alert('주문 거절(Rejected): '+(r.reason||'unknown'));
  };
  return (
    <div className="obox">
      <div className="side sell" title="Sell at Bid" onClick={(e)=>{e.stopPropagation();send('sell');}}>
        <span className="lbl">SELL</span><BigFig symbol={symbol} v={m.bid} />
      </div>
      <div className="vol" onClick={e=>e.stopPropagation()}>
        <b className="dn" onClick={()=>setVol((Math.max(0.01,(+vol||0.01)-0.01)).toFixed(2))} title="−0.01">▼</b>
        <input value={vol} onChange={e=>setVol(e.target.value)} title="Volume (lots)" />
        <b className="up" onClick={()=>setVol((Math.max(0.01,(+vol||0)+0.01)).toFixed(2))} title="+0.01">▲</b>
      </div>
      <div className="side buy" title="Buy at Ask" onClick={(e)=>{e.stopPropagation();send('buy');}}>
        <span className="lbl">BUY</span><BigFig symbol={symbol} v={m.ask} />
      </div>
    </div>
  );
}

/* ── Chart cell: one Lightweight Charts instance, seeded history + throttled live last-bar.
   Draws a green dotted createPriceLine + "BUY 0.01 at 1.14318" flag for every open position. ── */
// build the main price series for a chart in the requested MT5 chart type
function makePriceSeries(c, type){
  if(type==='line'){
    const o={ color:'#e8b23a', lineWidth:2, priceLineVisible:false, lastValueVisible:true };
    return c.addLineSeries ? c.addLineSeries(o) : c.addSeries(LightweightCharts.LineSeries, o);
  }
  if(type==='bar'){
    const o={ upColor:'#00ff00', downColor:'#ff2020', thinBars:false };
    return c.addBarSeries ? c.addBarSeries(o) : c.addSeries(LightweightCharts.BarSeries, o);
  }
  const o={ upColor:'#00ff00', downColor:'#ff2020', wickUpColor:'#00ff00', wickDownColor:'#ff2020',
    borderUpColor:'#00ff00', borderDownColor:'#ff2020', borderVisible:true };
  return c.addCandlestickSeries ? c.addCandlestickSeries(o) : c.addSeries(LightweightCharts.CandlestickSeries, o);
}
const asSeriesData=(data,type)=> type==='line' ? data.map(d=>({time:d.time,value:d.close})) : data;
// pixel distance from point to a line segment (trend-line hit-test)
function distSeg(px,py,x1,y1,x2,y2){ const dx=x2-x1,dy=y2-y1,L2=dx*dx+dy*dy;
  let t=L2? ((px-x1)*dx+(py-y1)*dy)/L2 : 0; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy)); }

function ChartCell({ symbol, tf, indicators, chartType, tool, initial, idx, isActive, onActivate, savedGeo, onGeo }){

  // ── floating-window geometry (imperative for 60fps; React only owns z + active) ──

  const drag=React.useRef(null);
  const [z,setZ]=React.useState(()=> ++WIN_Z);
  const activeRef=React.useRef(isActive); activeRef.current=isActive;   // for toolbar-signal gating
  const applyGeo=()=>{ const el=win.current; if(!el) return; const g=geo.current;
    el.style.left=g.x+'px'; el.style.top=g.y+'px'; el.style.width=g.w+'px'; el.style.height=g.h+'px'; };
  const resizeChart=()=>{ try{ if(chart.current&&box.current) chart.current.resize(box.current.clientWidth, box.current.clientHeight); }catch(e){} };
  const focus=()=>{ setZ(++WIN_Z); onActivate&&onActivate(idx); };   // click → raise + become the active chart
  const reportGeo=()=>{ try{ onGeo&&onGeo(idx, { ...geo.current }); }catch(e){} };   // persist window box
  // ── window controls (real MT5 title-bar buttons) ──
  const prevGeo=React.useRef(null), winMode=React.useRef('normal');   // prevGeo = geometry saved before min/max
  const setGeo=(g)=>{ geo.current=g; applyGeo(); resizeChart(); };
  const tileGeo=()=>{ const par=win.current&&win.current.parentElement; const f=initial||{fx:.02,fy:.02,fw:.48,fh:.48};
    const W=(par&&par.clientWidth)||800, H=(par&&par.clientHeight)||500;
    return { x:Math.round(f.fx*W), y:Math.round(f.fy*H), w:Math.max(WIN_MINW,Math.round(f.fw*W)), h:Math.max(WIN_MINH,Math.round(f.fh*H)) }; };
  const ctlMin=(e)=>{ e&&e.stopPropagation(); focus();
    if(winMode.current==='min'){ setGeo(prevGeo.current||tileGeo()); winMode.current='normal'; }
    else { prevGeo.current={...geo.current}; geo.current={...geo.current, h:19}; applyGeo(); winMode.current='min'; } reportGeo(); };
  const ctlMax=(e)=>{ e&&e.stopPropagation(); focus();
    if(winMode.current==='max'){ setGeo(prevGeo.current||tileGeo()); winMode.current='normal'; }
    else { const par=win.current&&win.current.parentElement; prevGeo.current={...geo.current};
      setGeo({ x:0, y:0, w:(par?par.clientWidth:800), h:(par?par.clientHeight:500) }); winMode.current='max'; } reportGeo(); };
  const ctlReset=(e)=>{ e&&e.stopPropagation(); focus(); setGeo(tileGeo()); winMode.current='normal'; reportGeo(); };   // ✕ → back to its tile slot
  // remove ONLY user-drawn objects (hline/fib/trend/vline/text) — keeps indicators + position lines
  const drawStack=React.useRef([]);   // chronological removers for undo (Ctrl+Z / menu)
  const selDraw=React.useRef(null);   // currently-selected horizontal line entry {pl,price}
  const deselect=()=>{ const e=selDraw.current; if(e){ try{ (e.pl||e.ls).applyOptions({lineWidth:e.w0||1}); }catch(_){} selDraw.current=null; } };
  const clearDrawings=()=>{ const s=series.current, c=chart.current; deselect();
    drawLines.current.forEach(l=>{ try{ s&&s.removePriceLine(l.pl); }catch(e){} }); drawLines.current=[];
    drawSeries.current.forEach(e=>{ try{ c&&c.removeSeries(e.ls); }catch(_){} }); drawSeries.current=[];
    overlays.current.forEach(o=>{ try{o.el.remove();}catch(e){} }); overlays.current=[]; drawStack.current=[]; };
  const undoDraw=()=>{ const rm=drawStack.current.pop(); if(rm) try{ rm(); }catch(e){} };   // remove the most recent object
  // seed initial geometry from the workspace size BEFORE paint (no flash), then size the chart
  React.useLayoutEffect(()=>{
    const el=win.current, par=el&&el.parentElement; if(!par) return;
    const W=par.clientWidth||800, H=par.clientHeight||500;
    if(savedGeo && savedGeo.w>0){   // restore the remembered window box (clamped into view)
      geo.current={ x:Math.max(0,Math.min(savedGeo.x, W-60)), y:Math.max(0,Math.min(savedGeo.y, H-24)),
        w:Math.max(WIN_MINW,savedGeo.w), h:Math.max(WIN_MINH,savedGeo.h) };
    } else {
      const f=initial||{fx:0.02,fy:0.02,fw:0.48,fh:0.48};

  React.useEffect(()=>{
    let raf=null;

    (indRef.current||[]).forEach(id=>{ const def=INDICATORS[id]; if(!def) return;
      def.build(candles.current).forEach(ln=>{
        try{ const opts={ color:ln.color, lineWidth:1, lastValueVisible:false, priceLineVisible:false,

          if(def.pane==='sub'){ try{ c.priceScale('ind').applyOptions({ scaleMargins:{top:0.72, bottom:0} }); }catch(e){} }

  React.useEffect(()=>{
    if(!window.LightweightCharts || !box.current) return;      // CDN blocked → no chart, no crash
    // MT5 look: pure-black canvas, dense grey DOTTED gridlines, Tahoma scales.
    const DOT=(window.LightweightCharts&&LightweightCharts.LineStyle&&LightweightCharts.LineStyle.Dotted)!=null?LightweightCharts.LineStyle.Dotted:1;
    const c=LightweightCharts.createChart(box.current, {

      grid:{ vertLines:{color:'#363c46', style:DOT}, horzLines:{color:'#363c46', style:DOT} },
      timeScale:{ borderColor:'#555', timeVisible:true, secondsVisible:false },

    const unsub=priceStore.subscribe(onTick);
    return ()=>{ unsub(); unreg(); indSeries.current=[]; lines.current=[]; drawLines.current=[]; drawSeries.current=[]; drawStack.current=[]; selDraw.current=null;
      overlays.current.forEach(o=>{ try{o.el.remove();}catch(e){} }); overlays.current=[];   // chart recreated → clear drawings
      try{ c.remove(); }catch(e){} };
  }, [symbol, tf]);   // recreate + reload on symbol OR timeframe change (toolbar sync)

  // switch chart type WITHOUT recreating the whole chart (swap the price series, re-seed data)
  React.useEffect(()=>{
    const c=chart.current; if(!c||!series.current) return;
    try{ c.removeSeries(series.current); }catch(e){}
    const s=makePriceSeries(c, chartType||'candle'); series.current=s;
    try{ s.setData(asSeriesData(candles.current,chartType||'candle')); }catch(e){}
  }, [chartType]);

  // toolbar zoom (± bar spacing) + tile (reset this window to its 2×2 slot)
  React.useEffect(()=> terminalBus.subscribe((cmd,arg)=>{
    if(cmd==='chart.zoom' && activeRef.current && chart.current){ try{ const ts=chart.current.timeScale();   // ← active chart only
      const bs=(ts.options&&ts.options().barSpacing)||6;
      ts.applyOptions({ barSpacing: Math.max(2, Math.min(60, bs*(arg==='in'?1.25:0.8))) }); }catch(e){} }
    else if(cmd==='window.tile'){ const el=win.current, par=el&&el.parentElement; if(!par) return;
      const W=par.clientWidth||800, H=par.clientHeight||500, f=initial||{fx:0.02,fy:0.02,fw:0.48,fh:0.48};
      geo.current={ x:Math.round(f.fx*W), y:Math.round(f.fy*H), w:Math.max(WIN_MINW,Math.round(f.fw*W)), h:Math.max(WIN_MINH,Math.round(f.fh*H)) };
      applyGeo(); resizeChart(); winMode.current='normal'; reportGeo(); }
    else if(cmd==='chart.grid' && arg===idx && chart.current){ gridOn.current=!gridOn.current;   // right-click Grid toggle (this chart)
      try{ chart.current.applyOptions({ grid:{ vertLines:{visible:gridOn.current}, horzLines:{visible:gridOn.current} } }); }catch(e){} }
    else if(cmd==='chart.clear' && arg===idx){ clearDrawings(); }   // Delete all objects (this chart)
    else if(cmd==='chart.undo' && arg===idx){ undoDraw(); }         // Delete last object (this chart)
  }), [initial]);

  // repaint indicators whenever the active set changes (Charts → Indicators menu)
  React.useEffect(()=>{ paintIndicators(); }, [(indicators||[]).join(','), paintIndicators]);

  // ── DRAWING ENGINE — arm a tool → drag/click on the chart draws real objects.
  //    hline = price line · trend = 2-pt line series · fib = level price lines ·
  //    vline/text = time-anchored DOM overlays (repositioned as the chart pans). ──
  const posOverlays=React.useCallback(()=>{ const c=chart.current,s=series.current; if(!c||!dlayer.current) return;
    overlays.current.forEach(o=>{ let x=null; try{ x=c.timeScale().timeToCoordinate(o.time); }catch(e){}
      if(x==null){ o.el.style.display='none'; return; } o.el.style.display=''; o.el.style.left=Math.round(x)+'px';
      if(o.type==='text'){ let y=null; try{ y=s&&s.priceToCoordinate(o.price); }catch(e){} o.el.style.top=Math.round(y==null?10:y)+'px'; }
    });
  }, []);
  // reflect the armed tool onto the overlay's pointer-capture + cursor
  React.useEffect(()=>{ const el=dlayer.current; if(!el) return;
    const armed = tool && tool!=='arrow' && tool!=='cross';
    el.className='drawlayer'+(armed?' arm':'');
    try{ if(chart.current) chart.current.applyOptions({ crosshair:{ mode: tool==='cross'?0:1 } }); }catch(e){}
  }, [tool]);
  // attach the draw handlers once (they read the live refs)
  React.useEffect(()=>{
    const el=dlayer.current; if(!el) return;
    const xy=(e)=>{ const r=el.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; };
    const addVLine=(time)=>{ const d=document.createElement('div'); d.className='dov vline'; el.appendChild(d);
      const o={type:'vline',time,el:d}; overlays.current.push(o);
      drawStack.current.push(()=>{ try{d.remove();}catch(e){} overlays.current=overlays.current.filter(x=>x!==o); }); posOverlays(); };
    const addText=(time,price,txt)=>{ const d=document.createElement('div'); d.className='dov text'; d.textContent=txt; el.appendChild(d);
      const o={type:'text',time,price,el:d}; overlays.current.push(o);
      drawStack.current.push(()=>{ try{d.remove();}catch(e){} overlays.current=overlays.current.filter(x=>x!==o); }); posOverlays(); };
    const onDown=(e)=>{ const t=toolRef.current, c=chart.current, s=series.current;
      if(!t||t==='arrow'||t==='cross'||!c||!s) return;
      e.preventDefault(); e.stopPropagation();
      const [x,y]=xy(e); let time=null,price=null;
      try{ time=c.timeScale().coordinateToTime(x); price=s.coordinateToPrice(y); }catch(e){}
      if(t==='hline'){ if(price==null) return; try{ const pl=s.createPriceLine({price,color:'#e8b23a',lineWidth:1,lineStyle:0,axisLabelVisible:true,title:''});
        const ent={kind:'h',pl,price,w0:1}; drawLines.current.push(ent); drawStack.current.push(()=>{ try{s.removePriceLine(pl);}catch(e){} drawLines.current=drawLines.current.filter(x=>x!==ent); }); }catch(e){} return; }
      if(t==='vline'){ if(time==null) return; addVLine(time); return; }
      if(t==='text'){ if(time==null||price==null) return; const txt=window.prompt('Text label:'); if(txt) addText(time,price,txt); return; }
      dragDraw.current={ tool:t, time, price };   // trend / fib — finish on mouseup
    };
    const onUp=(e)=>{ const d=dragDraw.current; if(!d) return; dragDraw.current=null;
      const c=chart.current, s=series.current; if(!c||!s) return; const [x,y]=xy(e);
      let t2=null,p2=null; try{ t2=c.timeScale().coordinateToTime(x); p2=s.coordinateToPrice(y); }catch(e){}
      if(d.time==null||d.price==null||t2==null||p2==null) return;
      if(d.tool==='trend'){ const pts=[{time:d.time,value:d.price},{time:t2,value:p2}].sort((a,b)=>a.time-b.time);
        if(pts[0].time===pts[1].time) return;
        try{ const ls=c.addLineSeries?c.addLineSeries({color:'#e02020',lineWidth:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false})
                                     :c.addSeries(LightweightCharts.LineSeries,{color:'#e02020',lineWidth:2}); ls.setData(pts);
          const ent={kind:'t',ls,pts,w0:2}; drawSeries.current.push(ent);
          drawStack.current.push(()=>{ try{c.removeSeries(ls);}catch(e){} drawSeries.current=drawSeries.current.filter(x=>x!==ent); }); }catch(e){} }
      else if(d.tool==='fib'){ const hi=Math.max(d.price,p2), lo=Math.min(d.price,p2);
        const lv=[0,0.236,0.382,0.5,0.618,0.786,1], col=['#8a9098','#e0709a','#f0c674','#82d982','#5fb0ff','#c792ea','#8a9098']; const grp=[];
        lv.forEach((L,i)=>{ try{ const price=lo+(hi-lo)*L; const pl=s.createPriceLine({price,color:col[i],lineWidth:1,lineStyle:2,axisLabelVisible:true,title:(L*100).toFixed(1)+'%'}); const ent={kind:'h',pl,price,w0:1}; drawLines.current.push(ent); grp.push(ent); }catch(e){} });
        drawStack.current.push(()=>{ grp.forEach(e=>{ try{s.removePriceLine(e.pl);}catch(e){} }); drawLines.current=drawLines.current.filter(x=>grp.indexOf(x)<0); }); }
    };
    const onKey=(e)=>{
      if(!activeRef.current) return;
      if(/INPUT|SELECT|TEXTAREA/.test((e.target&&e.target.tagName)||'')) return;   // don't hijack form typing
      if((e.ctrlKey||e.metaKey) && (e.key==='z'||e.key==='Z')){ e.preventDefault(); undoDraw(); return; }
      const ent=selDraw.current; if(!ent) return;
      if(e.key==='Delete'||e.key==='Backspace'){ e.preventDefault();
        if(ent.kind==='t'){ try{ chart.current.removeSeries(ent.ls); }catch(_){} drawSeries.current=drawSeries.current.filter(x=>x!==ent); }
        else { try{ series.current.removePriceLine(ent.pl); }catch(_){} drawLines.current=drawLines.current.filter(x=>x!==ent); }
        selDraw.current=null; }
      else if(ent.kind==='h' && (e.key==='ArrowUp'||e.key==='ArrowDown')){ e.preventDefault();
        const np=ent.price+(e.key==='ArrowUp'?pip(symbol):-pip(symbol));
        try{ ent.pl.applyOptions({price:np}); }catch(_){} ent.price=np; }
    };
    el.addEventListener('mousedown',onDown); document.addEventListener('mouseup',onUp); document.addEventListener('keydown',onKey);
    return ()=>{ el.removeEventListener('mousedown',onDown); document.removeEventListener('mouseup',onUp); document.removeEventListener('keydown',onKey); };
  }, [posOverlays]);

  // ── ORDER PRICE LINE (🔴 most important): redraw green dotted lines whenever this
  //    symbol's open positions change. One createPriceLine per position at its open_price.
  React.useEffect(()=>{
    const draw=(store)=>{
      const s=series.current; if(!s||!s.createPriceLine) return;
      lines.current.forEach(l=>{ try{ s.removePriceLine(l); }catch(e){} });
      lines.current=[];
      const mine=store.forSymbol(symbol);
      const DOT=(window.LightweightCharts&&LightweightCharts.LineStyle&&LightweightCharts.LineStyle.Dotted)!=null?LightweightCharts.LineStyle.Dotted:1;
      mine.forEach(p=>{ const price=+p.open_price; if(!price) return;
        const title=sideUp(p.side)+' '+lotsOf(p);
        try{ lines.current.push(s.createPriceLine({ price, color:'#00ff00', lineWidth:1,
          lineStyle:DOT, axisLabelVisible:true, title })); }catch(e){}
      });
      setPosLbl(mine.map(p=>({ side:sideUp(p.side), lots:lotsOf(p), price:+p.open_price })));
    };
    return positionsStore.subscribe(draw);
  }, [symbol]);

  const [cmenu,setCmenu]=React.useState(null);   // chart right-click menu {x,y}
  const onCtx=(e)=>{ e.preventDefault(); onActivate&&onActivate(idx); setCmenu({ x:e.clientX, y:e.clientY }); };
  return (
    <div className={"win"+(isActive?' active':'')} ref={win} style={{zIndex:z}} onMouseDown={focus} onContextMenu={onCtx}>
      <div className="cell-title" onMouseDown={(e)=>beginDrag(e,'move')}>
        <span className="ti">
          <svg viewBox="0 0 24 24" fill="none" stroke="#8fd08f" strokeWidth="2"><path d="M3 3v18h18"/><rect x="7" y="12" width="3" height="6" fill="#8fd08f" stroke="none"/><rect x="12" y="6" width="3" height="12" fill="#8fd08f" stroke="none"/><rect x="17" y="14" width="3" height="4" fill="#8fd08f" stroke="none"/></svg>
          <svg viewBox="0 0 24 24" fill="none" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M8 21V6M8 6l-3 3M8 6l3 3" stroke="#e23a2d"/><path d="M16 3v15M16 18l-3-3M16 18l3-3" stroke="#2f6fd6"/></svg>
        </span>
        <span>{symbol}.FX,{tf||'H1'}</span>
        {posLbl.map((p,i)=><span key={i} style={{color:'#00c800',fontWeight:600}}>{p.side} {p.lots} at {fmtPx(symbol,p.price)}</span>)}
        <span className="wc">
          <span onMouseDown={e=>e.stopPropagation()} onClick={ctlMin} title="Minimize">—</span>
          <span onMouseDown={e=>e.stopPropagation()} onClick={ctlMax} title="Maximize / Restore">▢</span>
          <span onMouseDown={e=>e.stopPropagation()} onClick={ctlReset} title="Restore to tile">✕</span>
        </span>
      </div>
      <div className="canvas" ref={box}>
        <div className="drawlayer" ref={dlayer}></div>
        <OrderBox symbol={symbol} />
        <div className="cell-lbl">{ohlc
          ? (ohlc.o!=null ? <span>O {fmtPx(symbol,ohlc.o)} H {fmtPx(symbol,ohlc.h)} L {fmtPx(symbol,ohlc.l)} C {fmtPx(symbol,ohlc.c)}</span>
                          : <span className="px">{fmtPx(symbol,ohlc.c)}</span>)
          : <span className="px">{fmtPx(symbol,px)}</span>}</div>
      </div>
      {['n','s','e','w','ne','nw','se','sw'].map(d=>
        <div key={d} className={"rsz "+d} onMouseDown={(e)=>beginDrag(e,d)}></div>)}
      {cmenu && <ChartMenu x={cmenu.x} y={cmenu.y} idx={idx} symbol={symbol} chartType={chartType} tf={tf} indicators={indicators} onClose={()=>setCmenu(null)} />}
    </div>
  );
}

/* ── Chart right-click context menu (MT5): Type / Timeframes / Indicators submenus,

function ChartMenu({ x, y, idx, symbol, chartType, tf, indicators, onClose }){

  React.useEffect(()=>{ const h=()=>onClose(); const k=(e)=>{ if(e.key==='Escape') onClose(); };
    document.addEventListener('click',h); document.addEventListener('contextmenu',h); document.addEventListener('keydown',k);

    {l:'New Order', ic:'order', k:'F9', run:()=>terminalBus.emit('order.new',symbol)},

      {l:'Bars', ck:chartType==='bar', run:()=>terminalBus.emit('chart.type','bar')},
      {l:'Line', ck:chartType==='line', run:()=>terminalBus.emit('chart.type','line')},
    ]},
    {l:'Timeframes', ic:'tick', children: TFS.map(t=>({l:t, ck:t===tf, run:()=>terminalBus.emit('chart.tf',t)}))},
    {l:'Indicators', ic:'line', children: Object.keys(INDICATORS).map(id=>({l:INDICATORS[id].label, ck:act.has(id), keep:1, run:()=>terminalBus.emit('chart.indicator',id)}))},
    {sep:1},
    {l:'Grid', ck:true, keep:1, run:()=>terminalBus.emit('chart.grid', idx)},
    {sep:1},
    {l:'Delete last object', k:'Ctrl+Z', run:()=>terminalBus.emit('chart.undo', idx)},
    {l:'Delete all objects', ic:'exp', run:()=>terminalBus.emit('chart.clear', idx)},
    {sep:1},
    {l:'Properties...', dis:1},
  ];
  const style={ left:Math.min(x, window.innerWidth-250), top:Math.min(y, window.innerHeight-330) };
  const click=(it)=>{ if(it.dis||it.children) return; it.run&&it.run(); if(!it.keep) onClose(); };
  return (
    <div className="ctxmenu" style={style} onClick={e=>e.stopPropagation()} onContextMenu={e=>{e.preventDefault();e.stopPropagation();}}>
      {items.map((it,i)=> it.sep ? <div key={i} className="ctxsep"></div> : (
        <div key={i} className={"ci"+(it.dis?' dis':'')+(it.children?' has':'')} onMouseEnter={()=>setSub(it.children?i:null)} onClick={()=>click(it)}>
          <span className="ck">{it.ck?'✓':''}</span>
          <span className="ic">{it.ic?IC[it.ic]:null}</span>
          <span className="lbl">{it.l}</span>
          {it.children ? <span className="ar">▸</span> : it.k ? <span className="sc">{it.k}</span> : null}
          {it.children && sub===i && (
            <div className="ctxmenu sub" onClick={e=>e.stopPropagation()}>
              {it.children.map((ch,j)=>(
                <div key={j} className="ci" onClick={(e)=>{ e.stopPropagation(); ch.run&&ch.run(); if(!ch.keep) onClose(); }}>
                  <span className="ck">{ch.ck?'✓':''}</span><span className="lbl">{ch.l}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* reusable seeded tick chart (Market Watch Ticks tab) — full density + time axis */
function TickChart({ symbol }){
  const box=React.useRef(null);
  React.useEffect(()=>{
    if(!window.LightweightCharts || !box.current) return;
    const DOT=(window.LightweightCharts&&LightweightCharts.LineStyle&&LightweightCharts.LineStyle.Dotted)!=null?LightweightCharts.LineStyle.Dotted:1;
    const c=LightweightCharts.createChart(box.current, {
      layout:{ background:{color:'#ffffff'}, textColor:'#4a4f57', fontSize:10, fontFamily:"Consolas,'Courier New',monospace" },
      grid:{ vertLines:{color:'#e6e9ec', style:DOT}, horzLines:{color:'#e6e9ec', style:DOT} },
      timeScale:{ visible:true, timeVisible:true, secondsVisible:false, borderColor:'#d0d4d8', rightOffset:2, barSpacing:3 },
      rightPriceScale:{ borderColor:'#d0d4d8' }, crosshair:{ mode:0 }, handleScroll:false, handleScale:false });
    c.resize(box.current.clientWidth, box.current.clientHeight);
    const STEP=(window.LightweightCharts&&LightweightCharts.LineType&&LightweightCharts.LineType.WithSteps)!=null?LightweightCharts.LineType.WithSteps:0;
    const mk=(color)=> c.addLineSeries ? c.addLineSeries({color,lineWidth:1,lineType:STEP,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false})
                                       : c.addSeries(LightweightCharts.LineSeries,{color,lineWidth:1,lineType:STEP,priceLineVisible:false,lastValueVisible:true});
    const ask=mk('#d13438'), bid=mk('#2f6ec0');
    const N=220, STEPT=2, q0=priceStore.get(symbol)||{}, pv=pip(symbol);
    let m0=q0.mid||((q0.ask+q0.bid)/2)||BASE[symbol]||1; const half=Math.max(pv/2,((q0.ask-q0.bid)/2)||pv/2);
    const t0=Math.floor(Date.now()/1000)-N*STEPT, seedA=[],seedB=[]; let m=m0-(Math.random()*pv*10);
    for(let i=0;i<N;i++){ m+=(Math.random()-0.5)*pv*3; const t=t0+i*STEPT; seedA.push({time:t,value:m+half}); seedB.push({time:t,value:m-half}); }
    if(q0.ask) seedA[N-1].value=q0.ask; if(q0.bid) seedB[N-1].value=q0.bid;
    const buf={ t:t0+N*STEPT, ask:seedA, bid:seedB };
    try{ ask.setData(seedA); bid.setData(seedB); c.timeScale().fitContent(); }catch(e){}
    const onTick=throttle((mids)=>{ const q=mids[symbol]; if(!q) return; buf.t+=STEPT;
      buf.ask.push({time:buf.t,value:q.ask}); buf.bid.push({time:buf.t,value:q.bid});
      if(buf.ask.length>N){ buf.ask.shift(); buf.bid.shift(); }
      try{ ask.setData(buf.ask); bid.setData(buf.bid); c.timeScale().fitContent(); }catch(e){}   // keep it full-width
    }, 220);
    const un=priceStore.subscribe(onTick);
    const onR=()=>{ try{ c.resize(box.current.clientWidth, box.current.clientHeight); c.timeScale().fitContent(); }catch(e){} };
    window.addEventListener('resize',onR);
    const raf=requestAnimationFrame(onR);   // re-fit once the container has real width
    return ()=>{ un(); window.removeEventListener('resize',onR); cancelAnimationFrame(raf); try{c.remove();}catch(e){} };
  }, [symbol]);
  return <div className="mwtick" ref={box}></div>;
}

const MW_TABS=['Symbols','Details','Trading','Ticks'];
function MarketWatch({ onPick }){
  const [mids,setMids]=React.useState({});
  const [dirs,setDirs]=React.useState({});      // per-symbol last-tick direction for bid/ask
  const [sel,setSel]=React.useState(null);      // blue-selected row
  const [tab,setTab]=React.useState('Symbols');
  const [menu,setMenu]=React.useState(null);    // {sym,x,y} right-click context menu

  React.useEffect(()=>{ const u=()=>{ const d=new Date(),p2=n=>String(n).padStart(2,'0'); setClock(p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds())); }; u(); const id=setInterval(u,1000); return ()=>clearInterval(id); }, []);
  const prev=React.useRef({});
  React.useEffect(()=> priceStore.subscribe(throttle(m=>{
    const nd={}; WATCH.forEach(s=>{ const c=m[s]||{}, p=prev.current[s]||{};

  const ctx=(e,sym)=>{ e.preventDefault(); setSel(sym); setMenu({ sym, x:e.clientX, y:e.clientY }); };
  const tc=(d)=> d>0?'uptick':d<0?'dntick':'';   // directional colour only (no flashing — was too jittery)
  const cur=sel||WATCH[0];
  return (
    <div className="watch">
      <div className="mwhead"><span>Market Watch: {clock}</span><span className="x" title="Close (Ctrl+M)" onClick={()=>terminalBus.emit('view.toggle','marketwatch')}>✕</span></div>
      {tab==='Ticks' ? <TickChart symbol={cur} /> :

          <tbody>
            {WATCH.map(sym=>{ const m=mids[sym]||{}, d=dirs[sym]||{}; const chg=m.chg>=0?'up':'down';
              return (
                <tr key={sym} className={sym===sel?'sel':''} onClick={()=>{setSel(sym);onPick&&onPick(sym);}}
                    onDoubleClick={()=>terminalBus.emit('order.new',sym)} onContextMenu={(e)=>ctx(e,sym)} title="우클릭: 메뉴 · 더블클릭: 주문창">
                  <td className="sym">{sym}.FX</td>
                  <td className={tc(d.bid)}>{fmtPx(sym,m.bid)}</td>
                  <td className={tc(d.ask)}>{fmtPx(sym,m.ask)}</td>
                  <td className={chg}>{m.chg!=null?(m.chg>=0?'+':'')+m.chg.toFixed(2):'—'}</td>
                </tr>
              ); })}
          </tbody>
        </table>}
      </div>}
      <div className="mwtabs">{MW_TABS.map(t=><div key={t} className={"mt"+(t===tab?' on':'')} onClick={()=>setTab(t)}>{t}</div>)}</div>
      {menu && <ContextMenu x={menu.x} y={menu.y} sym={menu.sym} onPick={onPick} onClose={()=>setMenu(null)} />}

  );

function BottomBar(){
  const [acct,setAcct]=React.useState(positionsStore.acct);
  const [pos,setPos]=React.useState(positionsStore.pos);
  const [mids,setMids]=React.useState({});
  const [tab,setTab]=React.useState('Trade');
  const [leverage,setLev]=React.useState(tradeSettings.leverage);
  const eng=useTradeEngine();
  React.useEffect(()=> positionsStore.subscribe(s=>{ setAcct(s.acct); setPos([...s.pos]); }), []);
  React.useEffect(()=> priceStore.subscribe(throttle(m=>setMids({...m}),300)), []);   // 0.3s live P&L
  React.useEffect(()=> tradeSettings.subscribe(setLev), []);   // margin/level track the chosen leverage
  const closePos=async(p)=>{
    if(p._demo){ positionsStore.removeDemo(p.local_id); return; }        // demo row → just drop it
    const r=await eng.closeOrder(p.local_id);                            // real → fx_close banks P&L server-side
    if(!r.ok) alert('청산 실패(Close failed): '+(r.reason||'unknown'));
  };

  // floating P&L marked at the live mid (display approx — production should use trading.html's
  // fxClosePx lockstep so floating == what fx_close realizes). No open FX positions → 0.
  const plOf=(p)=>{ if(p._demo && p.profit!=null) return +p.profit;   // demo seed carries a pinned P/L
    const m=mids[p.symbol]; if(!m) return 0;
    const dir=sideUp(p.side)==='SELL'?-1:1; const contract=100000;
    return dir*(m.mid-(+p.open_price||m.mid))*lotsOf(p)*contract*(p.symbol.includes('JPY')?0.0067:1); };
  const floating = pos.reduce((s,p)=> s+plOf(p), 0);
  const balance=acct?+acct.balance||0:0, equity=balance+floating;
  const marginUsed=pos.reduce((s,p)=> s+requiredMargin(p.symbol, lotsOf(p), leverage), 0);  // leverage-driven
  const level=marginUsed>0?(equity/marginUsed*100):0;
  const num=(n)=>(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  return (
    <div className="bottom">
      <BottomResizer />
      <div className="tbxtabs">{TBX_TABS.map(t=><div key={t} className={"t"+(t===tab?' on':'')} onClick={()=>setTab(t)}>{t}</div>)}</div>
      {tab==='Exposure' ? <ExposureTab pos={pos} mids={mids} />
       : tab==='Journal' ? <JournalTab />
       : (tab!=='Trade' && tab!=='History') ? <EmptyTab tab={tab} />
       : (<React.Fragment>
      <div className="postbl">
        <table className="pos">
          <thead><tr><th>Symbol</th><th>Ticket</th><th>Time</th><th>Type</th><th>Volume</th><th>Price</th><th>S / L</th><th>T / P</th><th>Price</th><th>Profit</th><th></th></tr></thead>
          <tbody>
            {tab==='History' && <tr><td className="empty" colSpan="11">No history in the selected period</td></tr>}
            {tab==='Trade' && !pos.length && <tr><td className="empty" colSpan="11">{window.AlpexaSync&&AlpexaSync.me?'No open positions':'로그인하면 실계정 잔고·포지션이 표시됩니다 (지금은 데모 시세)'}</td></tr>}
            {tab==='Trade' && pos.map(p=>{ const m=mids[p.symbol]||{}; const pl=plOf(p);
              const tkt=String(p.local_id||'').replace(/\D/g,'').slice(-8)||p.local_id;
              const tm=p.created_at?String(p.created_at).slice(0,19).replace('T',' ').replace(/-/g,'.'):'—';  // MT5: 2026.07.09 20:17:40
              return (<tr key={p.local_id}>
                <td>{p.symbol.toLowerCase()}.fx</td><td>{tkt}</td><td>{tm}</td><td className={sideUp(p.side)==='SELL'?'down':'up'}>{sideUp(p.side).toLowerCase()}</td>
                <td>{lotsOf(p).toFixed(2)}</td><td>{fmtPx(p.symbol,+p.open_price)}</td><td>—</td><td>—</td>
                <td>{fmtPx(p.symbol,m.mid)}</td><td className={pl>=0?'up':'down'}>{num(pl)}</td>
                <td><button className="xclose" title="Close position" onClick={()=>closePos(p)}>✕</button></td>
              </tr>); })}
          </tbody>
        </table>
      </div>
      {tab==='Trade' && <div className="acctline">
        <span><span className="k">Balance:</span> <b>{num(balance)} USD</b></span>
        <span><span className="k">Equity:</span> <b>{num(equity)}</b></span>
        <span><span className="k">Margin:</span> <b>{num(marginUsed)}</b></span>
        <span><span className="k">Free Margin:</span> <b>{num(equity-marginUsed)}</b></span>
        <span><span className="k">Margin Level:</span> <b className={marginUsed>0&&level<100?'down':''}>{marginUsed>0?num(level)+' %':'—'}</b>
          {marginUsed>0&&level<50 && <b style={{color:'#ff5252',marginLeft:6}}>⚠ Stop Out &lt;30%</b>}</span>
        <span><span className="k">Profit:</span> <b className={floating>=0?'up':'down'}>{num(floating)}</b></span>
      </div>}
       </React.Fragment>)}
    </div>
  );
}

  React.useEffect(()=>{ if(!open) return; const h=()=>setOpen(null); document.addEventListener('click',h); return ()=>document.removeEventListener('click',h); }, [open]);

/* ── Resizable splitter: drag the bar left/right to size the Market Watch column
   (200–450px). During drag it sets --leftw on .terminal and, in a rAF loop, calls
   chartResizer.resizeAll() so all 4 charts follow live instead of squishing. ── */
function Splitter(){
  const drag=React.useRef(false), self=React.useRef(null);
  React.useEffect(()=>{
    const term=document.querySelector('.terminal'); let raf=null;
    const onMove=(e)=>{ if(!drag.current||!term) return;
      const rect=term.getBoundingClientRect();
      const w=Math.max(200, Math.min(450, e.clientX-rect.left));
      term.style.setProperty('--leftw', w+'px');
      if(!raf) raf=requestAnimationFrame(()=>{ raf=null; chartResizer.resizeAll(); });
    };
    const onUp=()=>{ if(!drag.current) return; drag.current=false;
      if(self.current) self.current.classList.remove('drag');
      document.body.style.cursor=''; document.body.style.userSelect='';
      chartResizer.resizeAll();
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    return ()=>{ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); if(raf)cancelAnimationFrame(raf); };
  }, []);
  const onDown=(e)=>{ e.preventDefault(); drag.current=true;
    if(self.current) self.current.classList.add('drag');
    document.body.style.cursor='col-resize'; document.body.style.userSelect='none';
  };
  return <div className="splitter" ref={self} onMouseDown={onDown} title="드래그해서 시세창 너비 조절"></div>;
}

/* ── Bottom Toolbox row-resizer: a row-resize bar that is ALWAYS present as panel
   chrome (independent of the positions table being empty). Drag up/down sets
   --bottomh on .terminal; the 1fr charts row absorbs the change; chart.resize() in
   a rAF loop keeps the charts crisp. ── */
function BottomResizer(){
  const self=React.useRef(null);
  React.useEffect(()=>{
    const el=self.current, term=document.querySelector('.terminal'); if(!el) return; let raf=null, on=false;
    const onDown=(e)=>{ e.preventDefault(); on=true; el.classList.add('drag');
      document.body.style.cursor='row-resize'; document.body.style.userSelect='none'; };
    const onMove=(e)=>{ if(!on||!term) return;
      const h=Math.max(90, Math.min(window.innerHeight*0.85, window.innerHeight - e.clientY));
      term.style.setProperty('--bottomh', h+'px');
      if(!raf) raf=requestAnimationFrame(()=>{ raf=null; chartResizer.resizeAll(); });
    };
    const onUp=()=>{ if(!on) return; on=false; el.classList.remove('drag');
      document.body.style.cursor=''; document.body.style.userSelect=''; chartResizer.resizeAll(); };
    el.addEventListener('mousedown',onDown);
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    return ()=>{ el.removeEventListener('mousedown',onDown); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); if(raf)cancelAnimationFrame(raf); };
  }, []);
  return <div className="hsplit" ref={self} title="드래그해서 거래창 높이 조절"></div>;
}

/* ── Left-panel internal row-resizer between Market Watch and Navigator. Also pure
   chrome — works regardless of list contents; sets --navh on the .left column. ── */
function NavResizer(){
  const self=React.useRef(null);
  React.useEffect(()=>{
    const el=self.current; if(!el) return; const left=el.closest('.left'); let on=false;
    const onDown=(e)=>{ e.preventDefault(); on=true; el.classList.add('drag');
      document.body.style.cursor='row-resize'; document.body.style.userSelect='none'; };

      const navh=Math.max(70, Math.min(r.height-110, r.bottom - e.clientY));
      left.style.setProperty('--navh', navh+'px');
    };
    const onUp=()=>{ if(!on) return; on=false; el.classList.remove('drag');
      document.body.style.cursor=''; document.body.style.userSelect=''; };
    el.addEventListener('mousedown',onDown);
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    return ()=>{ el.removeEventListener('mousedown',onDown); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
  }, []);

    const t0=Math.floor(Date.now()/1000)-N*STEPT; const seedA=[],seedB=[]; let m=mid0-(Math.random()*pv*10);

  // ── command reducer: toolbar chart signals hit ONLY the active chart window ──
  React.useEffect(()=> terminalBus.subscribe((cmd,arg)=>{
    if(cmd==='chart.tf') setTfs(a=> a.map((v,i)=> i===actRef.current ? arg : v));       // active chart only
    else if(cmd==='chart.type') setTypes(a=> a.map((v,i)=> i===actRef.current ? arg : v)); // active chart only
    else if(cmd==='chart.tool') setTool(arg);
    else if(cmd==='view.toggle') setView(v=>({ ...v, [arg]: !v[arg] }));
    else if(cmd==='view.fullscreen'){ try{ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }catch(e){} }
    else if(cmd==='chart.indicator'){
      if(arg==='__clear__') setIndicators([]);
      else setIndicators(list=> list.indexOf(arg)>=0 ? list.filter(x=>x!==arg) : list.concat(arg));
    }
    else if(cmd==='order.new') setOrderSym(arg||grid[0]);   // open the popup Order dialog
    // chart.zoom → the active ChartCell (gated on its isActive); window.tile → all windows
  }), [grid]);
  const swap=(sym)=> setGrid(g=> g.indexOf(sym)>=0 ? g : [sym, g[1], g[2], g[3]]);   // click watch → replace top-left
  const leftShown = view.marketwatch || view.navigator;
  // dynamic grid: View toggles collapse the corresponding rows/cols (real Windows behaviour)
  const gridStyle = {
    gridTemplateColumns: leftShown ? 'var(--leftw,240px) 6px 1fr' : '0 0 1fr',
    gridTemplateRows: `23px ${view.toolbars?'33px':'0'} 1fr ${view.toolbox?'var(--bottomh,188px)':'0'} ${view.statusbar?'22px':'0'}`,
    gridTemplateAreas: '"menu menu menu" "tools tools tools" "left splitter charts" "bottom bottom bottom" "status status status"',
  };
  return (
    <div className="terminal" style={gridStyle}>
      <MenuBar indicators={indicators} view={view} tool={tool} />
      {view.toolbars && <Toolbar tf={tfs[activeIdx]} chartType={types[activeIdx]} tool={tool} />}
      {leftShown && <div className="left">
        {view.marketwatch && <MarketWatch onPick={swap} />}
        {view.marketwatch && view.navigator && <NavResizer />}
        {view.navigator && <Navigator indicators={indicators} />}
      </div>}
      {leftShown && <Splitter />}
      <div className="charts">
        {grid.map((s,i)=><ChartCell key={s+i} idx={i} isActive={i===activeIdx} onActivate={setActiveIdx}
          symbol={s} tf={tfs[i]} indicators={indicators} chartType={types[i]} tool={tool}
          initial={WINLAYOUT[i]||WINLAYOUT[0]} savedGeo={geos[i]} onGeo={setGeo1} />)}
        <div className="charttabs">{grid.map((s,i)=>
          <div key={i} className={"ctab"+(i===activeIdx?' on':'')} onClick={()=>setActiveIdx(i)}>{s}.FX,{tfs[i]}</div>)}</div>
      </div>
      {view.toolbox && <BottomBar />}
      {view.statusbar && <StatusBar tool={tool} chartType={types[activeIdx]} tf={tfs[activeIdx]} />}
      {orderSym && <OrderModal symbol={orderSym} onClose={()=>setOrderSym(null)} />}
    </div>
  );
}

// Boot when Babel+React actually loaded (guarded so a blocked CDN doesn't throw a render error).
try{ if(window.React && window.ReactDOM){ ReactDOM.createRoot(document.getElementById('app')).render(<App/>); } }catch(e){ console.warn('webtrade boot skipped:', e && e.message); }
</script>
</body>
</html>
