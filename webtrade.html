<!DOCTYPE html>
<!-- Alpexa WebTrade — PC-only MetaTrader-style FX terminal. Mobile apps untouched. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpexa WebTrade — FX Terminal</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://unpkg.com">
<style>
  /* MT5 classic terminal — pure black, grey Excel gridlines, Tahoma. */
  :root{ --bg:#000000; --panel:#050708; --panel2:#04060a; --line:#333333; --cellbd:#444444;
    --text:#d0d4da; --dim:#8890a0; --up:#00ff00; --down:#ff2020; --accent:#3a6ea5; --r:0; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:Tahoma,'Segoe UI','Malgun Gothic',Arial,sans-serif;font-size:12px;overflow:hidden}
  #app{height:100vh}
  /* ── thin dark custom scrollbars (kill the ugly white browser bars; keep scrolling) ── */
  .terminal *{scrollbar-width:thin;scrollbar-color:#333a44 transparent}
  .terminal ::-webkit-scrollbar{width:8px;height:8px}
  .terminal ::-webkit-scrollbar-track{background:transparent}
  .terminal ::-webkit-scrollbar-corner{background:transparent}
  .terminal ::-webkit-scrollbar-thumb{background:#333a44;border-radius:4px;border:2px solid transparent;background-clip:content-box}
  .terminal ::-webkit-scrollbar-thumb:hover{background:#48505c;background-clip:content-box}
  /* ── MT5-style CSS Grid: toolbar / [market-watch | 2×2 charts] / bottom bar ── */
  .terminal{display:grid;height:100vh;position:relative;   /* position:relative → floating toolbox anchors to it */
    grid-template-columns:var(--leftw,240px) 6px 1fr;
    grid-template-rows:23px 33px 1fr var(--dockh,150px);
    grid-template-areas:"menu menu menu" "tools tools tools" "left splitter right" "dock dock dock";}
  /* horizontal (row-resize) splitters — layout CHROME, always present & draggable
     regardless of table/data content (the resize engine is data-independent). */
  /* thin 1px line, but a 7px transparent grab zone; cursor snaps to row-resize on hover */
  .hsplit,.lhsplit{flex:none;height:7px;cursor:row-resize;background:transparent;position:relative;user-select:none}
  .hsplit::before,.lhsplit::before{content:"";position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:1px;background:#222}
  .hsplit:hover::before,.hsplit.drag::before,.lhsplit:hover::before,.lhsplit.drag::before{height:2px;background:#3a6ea5}
  /* vertical splitter: thin 1px line inside a 6px transparent grab zone; col-resize on hover */
  .splitter{grid-area:splitter;cursor:col-resize;background:transparent;position:relative;user-select:none}
  .splitter::before{content:"";position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:1px;background:#222}
  .splitter:hover::before,.splitter.drag::before{width:2px;background:#3a6ea5}
  /* ── menu bar (File View …) ── */
  .menu{grid-area:menu;display:flex;align-items:center;gap:1px;padding:0 3px;background:linear-gradient(#2c3138,#20242a);border-bottom:1px solid #0a0a0a;font-size:11px;font-weight:400}
  .menu .mi{padding:2px 7px;color:#d0d4da;cursor:default;border-radius:2px}.menu .mi:hover{background:#3a6ea5;color:#fff}
  .menu .mi{position:relative}
  .menu .mi.on{background:#3a6ea5;color:#fff}
  .mdrop{position:absolute;top:100%;left:0;min-width:190px;background:#0E1015 !important;border:1px solid #1D212A !important;border-radius:0 !important;
    box-shadow:0 6px 18px rgba(0,0,0,.6);z-index:100000;padding:3px 0;font-size:11.5px}   /* app-core matte black, above floating charts (WIN_Z grows) + toolbox */
  .mdrop .row{display:flex;align-items:center;gap:8px;padding:5px 12px;color:#E1E4ED !important;cursor:pointer;white-space:nowrap}
  .mdrop .row:hover{background:#1C1F26 !important;color:#ffffff !important}   /* Robinhood shadow highlight — no more #3a6ea5 blue */
  .mdrop .row .ck{width:12px;text-align:center;color:#00d060}
  .mdrop .sep{height:1px;background:#3a3f47;margin:3px 0}
  .mdrop .hd{padding:3px 12px;color:#79808c;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
  .mdrop .row .sc{margin-left:auto;color:#79808c;font-size:10.5px;padding-left:20px}
  .mdrop .row.dis{color:#6a7078;cursor:default}.mdrop .row.dis:hover{background:transparent;color:#6a7078}
  .mdrop .row .ar{margin-left:auto;color:#8a9098}
  .mdrop .row.has{position:relative}
  .mdrop.sub{position:absolute;left:100%;top:-4px;min-width:180px}   /* fly-out submenu (Insert → Lines/Fibonacci/…) */
  /* ── bottom status bar (View → Status Bar) ── */
  .statusbar{grid-area:status;display:flex;align-items:center;gap:14px;padding:0 8px;font-size:11px;color:#9aa2b0;
    background:linear-gradient(#20242a,#171a1f);border-top:1px solid #000;white-space:nowrap;overflow:hidden}
  .statusbar .s{display:flex;align-items:center;gap:5px}.statusbar b{color:#c8ccd2;font-weight:600}
  .statusbar .grow{margin-left:auto}
  /* ── toolbox non-Trade tab content (News/Mailbox/…): themed empty panels ── */
  .tbxbody{flex:1;overflow:auto;padding:0}
  .tbxempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#6a7078;gap:6px;font-size:12px}
  .tbxempty .ic{font-size:22px;opacity:.5}
  table.jrnl{width:100%;border-collapse:collapse;font:11px Consolas,monospace}
  table.jrnl td{padding:2px 10px;border-bottom:1px solid #14181e;color:#9aa2b0;white-space:nowrap}
  table.jrnl td.t{color:#6f778a;width:150px}
  table.jrnl td.ok{color:#59c26a}
  table.jrnl td.err{color:#e5533a}
  /* Company & licensing panel */
  .cinfo{padding:16px 18px;max-width:660px}
  .cinfo-hd{font-size:12.5px;font-weight:700;color:#cdd4e0;margin-bottom:12px;display:flex;align-items:center;gap:7px}
  table.cinfo-tbl{width:100%;border-collapse:collapse;font-size:12px}
  table.cinfo-tbl td{padding:6px 10px;border-bottom:1px solid #14181e;vertical-align:top}
  table.cinfo-tbl td.ck{color:#6f778a;width:200px;white-space:nowrap}
  table.cinfo-tbl td.cv{color:#c8ccd2}
  .cinfo-note{margin-top:12px;font-size:10.5px;color:#6a7078;line-height:1.5}
  /* Mailbox — account notices from settlements */
  table.mbx{width:100%;border-collapse:collapse;font-size:11.5px}
  table.mbx th{position:sticky;top:0;background:#141414;color:var(--dim);font-weight:600;font-size:11px;text-align:right;padding:3px 10px;border-bottom:1px solid #222}
  table.mbx th:first-child,table.mbx th:nth-child(2){text-align:left}
  table.mbx td{padding:3px 10px;border-bottom:1px solid #1a1a1a;text-align:right;color:#c8ccd2}
  table.mbx td:first-child,table.mbx td:nth-child(2){text-align:left}
  table.mbx tr.mbx-row{cursor:pointer}table.mbx tr.mbx-row:hover td{background:#0d1420}
  table.mbx tr.mbx-detail td{background:#0a0d12;color:#9aa2b0;font-size:11px;white-space:normal;text-align:left;padding:6px 12px}
  .terminal.light table.mbx th{background:#0E1015;color:#7a828e;border-bottom:1px solid #1D212A}
  .terminal.light table.mbx td{border-bottom:1px solid #1D212A;color:#e6e9ee}
  .terminal.light table.mbx tr.mbx-detail td{background:#000000;color:#a2aab6}
  .menu .conn{margin-left:auto;color:#9aa2b0;display:flex;align-items:center;gap:6px;padding-right:6px}
  .menu .conn-out{cursor:pointer;color:#8a93a3;font-size:12px;font-weight:700;line-height:1;padding:1px 6px;border-radius:3px;transition:color .12s,background .12s}   /* X = log out → website */
  .menu .conn-out:hover{color:#fff;background:#c0392b}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--up)}
  /* ── icon toolbar (New Order · Algo · chart tools · timeframes) — compact, 2–4px gaps ── */
  .tools{grid-area:tools;display:flex;align-items:center;gap:3px;padding:0 4px;background:linear-gradient(#22262c,#15181d);border-bottom:1px solid #000}
  .tbtn{display:flex;align-items:center;gap:5px;height:26px;padding:0 9px;background:linear-gradient(#3a4048,#2a2e34);border:1px solid #4a5059;border-radius:3px;color:#e0e4ea;font-size:12px;cursor:pointer;white-space:nowrap;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
  .tbtn:hover{background:linear-gradient(#464c55,#34393f);border-color:#5a636e}
  .tbtn:active{box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
  .tbtn svg{width:17px;height:17px;flex:none}
  .tbtn.algo .play{color:#37c837}
  .tbtn.algo:hover{border-color:#4f8a4f;box-shadow:inset 0 0 8px rgba(60,220,80,.28),inset 0 1px 0 rgba(255,255,255,.08)}
  .tbtn.algo.on{background:linear-gradient(#2f7a35,#1e5a26);color:#eaffea;border-color:#3c8a44}
  /* square icon buttons (chart type / zoom / tile) */
  .tibtn{display:flex;align-items:center;justify-content:center;width:26px;height:26px;color:#c2c8d0;cursor:pointer;
    background:linear-gradient(#31363d,#252a30);border:1px solid #454b54;border-radius:3px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
  .tibtn:hover{background:linear-gradient(#3b414a,#2c3138);color:#fff;border-color:#5a636e}
  .tibtn:active{box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
  .tibtn.on{background:#3a6ea5;color:#fff;border-color:#3a6ea5}
  .tibtn svg{width:17px;height:17px}
  .tigrp{display:flex;gap:2px}
  .tsep{width:1px;height:18px;background:#3a3f47;margin:0 3px}
  .tf{display:flex;gap:1px}
  .tf b{padding:4px 8px;background:#23272d;border:1px solid #383d45;color:#b8bcc4;font-weight:600;font-size:12.5px;cursor:pointer;border-radius:2px}
  .tf b:hover{background:#2b3037;color:#dfe3ea}
  .tf b.on{background:#3a6ea5;color:#fff;border-color:#3a6ea5}
  .tbrand{margin-left:auto;font-weight:700;letter-spacing:.3px;color:#8890a0;font-size:11px}.tbrand span{color:#7fb0e0}
  /* ── left column: Market Watch (top) + Navigator (bottom) ── */
  .left{grid-area:left;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .watch{flex:1;background:var(--panel);overflow:auto;min-height:0}
  .nav{height:var(--navh,186px);background:var(--panel);border-top:1px solid var(--cellbd);overflow-x:hidden;overflow-y:auto;flex:none}
  .nav .navhd{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:3px 4px 3px 8px;background:#0a0d12;color:var(--dim);font-size:11px;font-weight:600;border-bottom:1px solid var(--line)}
  .nav .navhd .x{cursor:pointer;width:16px;text-align:center;border-radius:2px}
  .nav .navhd .x:hover{background:#e81123;color:#fff}
  .nav ul{list-style:none;margin:0;padding:2px 0}
  .nav li{padding:2px 8px;color:#c4c8d0;cursor:default;white-space:nowrap}
  .nav li:hover{background:#0d1420}
  .nav li.root{font-weight:700;color:#dfe3ea}
  .nav li.child{padding-left:26px;color:#aeb6c2}
  .nav li.navf{cursor:pointer;color:#c4c8d0}
  .nav li.ind{cursor:pointer;color:#aeb6c2}.nav li.ind.on{color:#8fd3a0}
  .nav li.ind .ic{color:#e0b84a}.nav li.ind.on .ic{color:#8fd3a0}
  .nav li.dim{color:#6a7078}
  .nav .tw{display:inline-block;width:12px;text-align:center;color:#8a9098}
  .nav li.leaf{color:#8fd3a0;font-size:11px}
  .nav li.leaf .ic{margin-right:4px}
  .nav .ic{display:inline-block;width:15px;text-align:center;margin-right:5px}
  /* ── one-click order box (top-left of each chart) ── */
  /* MT5 one-click panel — MID 190x64. ONE-SHELL design (2026-07-13 B안, user-approved mockup):
     the .obox is the single bordered card; labels/volume/prices carry NO own borders or skins —
     seams are translucent 1px dividers, so the whole widget reads as one connected MT5 unit. */
  .obox{position:absolute;top:6px;left:6px;z-index:1000;width:190px;height:64px;display:flex;flex-direction:column;
    border:1px solid #3c4049;box-shadow:0 1px 4px rgba(0,0,0,.6);
    background:linear-gradient(to bottom,#15171c 0%,#0b0d11 100%);
    font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif}
  .obox *{border-radius:0 !important;box-sizing:border-box;font-family:inherit}
  /* Session CLOSED: BUY/SELL click-blocked + dimmed (order gate). Volume stepper stays usable. */
  .obox.oc-closed .oc-lbl,.obox.oc-closed .oc-price{pointer-events:none;opacity:.4}
  /* top layer (20px) — labels + centered volume, split from the price row by a translucent seam */
  .oc-top{height:20px;flex:none;display:flex;align-items:stretch;border-bottom:1px solid rgba(255,255,255,.18)}
  .oc-lbl{flex:1;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:normal;letter-spacing:.5px;
    cursor:pointer;font-family:"Arial Black","Segoe UI",Arial,sans-serif}
  .oc-lbl:hover{filter:brightness(1.13)}
  .oc-vol{width:58px;flex:none;position:relative;background:rgba(0,0,0,.35) !important;display:flex;align-items:center;justify-content:center;border-left:1px solid rgba(255,255,255,.18) !important;border-right:1px solid rgba(255,255,255,.18) !important}
  .oc-vol b{position:absolute;top:50%;transform:translateY(-50%);cursor:pointer;color:#8a94a6 !important;font-size:9px;width:14px;text-align:center;user-select:none;line-height:1}
  .oc-vol b.dn{left:0}.oc-vol b.up{right:0}
  .oc-vol b:hover{color:#ffffff !important}
  .oc-vol input{width:30px;height:16px;text-align:center;padding:0;border:none;background:transparent !important;color:#ffffff !important;font-weight:bold;font-size:12px;outline:none}
  /* bottom layer (44px) — SELL | BUY big quotes, 50:50 */
  .oc-bot{flex:1;display:flex;align-items:stretch}
  .oc-price{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;margin:0;
    color:#fff;cursor:pointer;white-space:nowrap;overflow:hidden}
  .oc-price:first-child{border-right:1px solid rgba(255,255,255,.18)}
  .oc-price:hover{filter:brightness(1.1)}
  .oc-price:active{box-shadow:inset 0 2px 5px rgba(0,0,0,.55)}
  .oc-price .bf{display:inline-flex;flex-wrap:nowrap;white-space:nowrap;align-items:baseline;justify-content:center;line-height:1;margin:0;padding:0;font-variant-numeric:tabular-nums}   /* one line, never wrap (MT5) */
  .oc-price .bf .sm{font-size:10px;font-weight:normal;color:#ffffff}                                  /* 앞자리 1.14 */
  .oc-price .bf .bg{font-size:20px;font-weight:normal;color:#ffffff;line-height:1;font-family:"Arial Black","Segoe UI",Arial,sans-serif}  /* 핵심 핍 — 한 줄에 맞게 (24→20) */
  .oc-price .bf .fr{align-self:flex-start;font-size:11px;font-weight:normal;color:#ffffff;margin-left:1px;transform:translateY(-4px)}  /* 위첨자 */
  /* MT5 one-click DIRECTION SKIN — the WHOLE shell follows the last tick, exactly like MT5:
     up-tick → blue, down-tick → red, sticky until the direction flips. Applied by direct
     classList on .obox from the tick handler (no re-render). Children stay transparent. */
  .obox.tick-up{background:linear-gradient(to bottom,#0d47c8 0%,#082d85 100%) !important;border-color:#3095ff !important}
  .obox.tick-down{background:linear-gradient(to bottom,#c62828 0%,#7f1616 100%) !important;border-color:#ff6b60 !important}
  /* live spread tag — a small RECTANGLE dead-centre between the two prices (price row = the
     bottom 44px of the 64px box → centre at 42px). Read-only (pointer-events none); square
     corners come free from the `.obox *` radius reset. */
  .obox .oc-spr{position:absolute;top:42px;left:50%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;
    background:#121418;border:1px solid #3c4049;font-size:9px;color:#c8ccd2;padding:1px 6px;line-height:1.4}
  /* ── ECN order interaction (overlay only — 190x64 치수/대칭 불변) ──
     처리중: 클릭한 쪽 호가를 dim+blur, 코너에 미세 스피너. 체결완료: 패널 0.1s 플래시. */
  .obox.ecn-flash{animation:ecnFlash .1s ease-out}
  @keyframes ecnFlash{0%{filter:brightness(2.5) saturate(1.25)}55%{filter:brightness(1.6)}100%{filter:brightness(1)}}
  .oc-busy{cursor:progress !important}
  .oc-lbl.oc-busy{opacity:.55}
  .oc-price.oc-busy .bf{opacity:.30;filter:blur(1.3px)}                 /* 호가 매칭 중 — 흐릿하게 */
  .oc-spin{position:absolute;top:3px;right:4px;width:10px;height:10px;pointer-events:none;
    border:1.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50% !important;
    animation:ecnSpin .5s linear infinite}                              /* Processing… 미세 로딩 휠 */
  @keyframes ecnSpin{to{transform:rotate(360deg)}}
  .mwt{width:100%;border-collapse:collapse}
  .mwt th{position:sticky;top:0;background:#0a0d12;color:var(--dim);font-weight:600;font-size:11px;text-align:right;padding:3px 6px;border:1px solid var(--line)}
  .mwt th:first-child{text-align:left}
  .mwt td{padding:2px 6px;border:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .mwt td.mwspr{color:#8a9098}   /* Spread column (right-click → Spread) */
  .mwt td.sym{text-align:left;font-weight:600;color:#c8ccd2}
  .mwt tr{cursor:pointer}.mwt tr:hover td{background:#0d1420}
  .up{color:var(--up)}.down{color:var(--down)}
  /* ── MDI workspace: charts area is a positioning context; each chart is a free
     floating window (absolute) that can move, resize and overlap like real MT5. ── */
  /* RIGHT column = vertical stack: charts (1f) → chart-tab bar → terminal toolbox.
     Left Symbols column sits beside this whole stack at full height (grid: left|splitter|right). */
  .right{grid-area:right;display:flex;flex-direction:column;height:100%;min-width:0;min-height:0;overflow:hidden}
  /* chart layer GROWS/SHRINKS with the terminal (never overlaid): flex-grow+shrink, floor 100px */
  .charts{flex:1 1 0%;min-height:100px;display:flex;flex-direction:column;overflow:hidden;background:#0a0d12}
  /* free-floating MDI stage — each chart window is absolute, independently moved & resized */
  .chartstage{flex:1;min-height:0;position:relative;overflow:hidden;background:#0a0d12}
  .win{position:absolute;background:#000;display:flex;flex-direction:column;
    border:1px solid var(--cellbd);box-shadow:0 2px 12px rgba(0,0,0,.55);
    min-width:220px;min-height:150px;overflow:hidden}
  .win.active{border-color:#3a6ea5;box-shadow:0 4px 20px rgba(0,0,0,.8)}
  .win.dropok{box-shadow:inset 0 0 0 2px #00c800 !important}   /* Market-Watch symbol drag over this chart → drop-here highlight */
  /* tiled mode: chart fills its grid cell instead of floating */
  .win.tiled{position:relative !important;left:auto !important;top:auto !important;width:auto !important;height:auto !important;
    min-width:0;min-height:0;box-shadow:none}
  .cell-title{display:flex;align-items:center;gap:4px;height:18px;padding:0 5px;flex:none;
    cursor:move;user-select:none;border-radius:0;
    /* Metallic Silver Dark — native MT5 steel: light-reflecting gradient + embossed top + shadow bottom */
    background:linear-gradient(to bottom,#2d3139 0%,#20232a 50%,#181a20 100%);
    border-top:1px solid #434956;border-bottom:1px solid #111317;
    font:600 11px "Segoe UI",Tahoma,sans-serif;color:#e1e4ed;text-shadow:0 1px 1px rgba(0,0,0,.8)}  /* MT5 header */
  .win.tiled .cell-title{cursor:default}
  .cell-title .ti{display:inline-flex;align-items:center;gap:2px;margin-right:1px;flex:none}
  .cell-title .ti svg{width:12px;height:12px;display:block}
  .win.active .cell-title{border-top:1px solid #1b46e6}  /* ACTIVE (dark) = royal-blue neon top line (thin); metallic body stays */
  .win.active{border-color:#2f7fe0}
  .cell-title>span:nth-child(2){flex:none;white-space:nowrap}
  .cell-title .poslbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#00c800;font-weight:600;margin-left:2px}
  .cell-title .hdr-ohlc{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:10px;font-weight:400;color:#8fa0b4;font-variant-numeric:tabular-nums}   /* hover OHLC in the header — never over the candles */
  .cell-title .wc{margin-left:auto;flex:none;display:flex;gap:4px}
  .cell-title .wc span{cursor:pointer;width:16px;text-align:center;border-radius:2px;color:#cdd4e0}
  .cell-title .wc span:hover{background:#3a3f4d;color:#fff}   /* dark-silver box pop on hover */
  .win.active .cell-title .wc span{color:#eaf2ff}
  .cell-title .wc span.cl:hover,.cell-title .wc span:last-child:hover{background:#e81123;color:#fff}
  .canvas{position:relative;flex:1;min-height:0}
  /* 8-direction resize handles hugging the window border */
  .rsz{position:absolute;z-index:7}
  .rsz.n{top:-2px;left:6px;right:6px;height:6px;cursor:ns-resize}
  .rsz.s{bottom:-2px;left:6px;right:6px;height:6px;cursor:ns-resize}
  .rsz.e{right:-2px;top:6px;bottom:6px;width:6px;cursor:ew-resize}
  .rsz.w{left:-2px;top:6px;bottom:6px;width:6px;cursor:ew-resize}
  .rsz.ne{top:-3px;right:-3px;width:12px;height:12px;cursor:nesw-resize}
  .rsz.nw{top:-3px;left:-3px;width:12px;height:12px;cursor:nwse-resize}
  .rsz.se{bottom:-3px;right:-3px;width:12px;height:12px;cursor:nwse-resize}
  .rsz.sw{bottom:-3px;left:-3px;width:12px;height:12px;cursor:nesw-resize}
  .cell-lbl{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:1001;pointer-events:none;white-space:nowrap;
    font:400 11px Tahoma,'Segoe UI',Arial,sans-serif;color:#8fa0b4;letter-spacing:.2px;text-shadow:0 0 3px #000,0 0 3px #000}   /* hover OHLC — top CENTRE */
  .cell-lbl b{font-weight:600}
  /* drawing layer over each chart — captures the mouse only when a draw tool is armed */
  .drawlayer{position:absolute;inset:0;z-index:4;pointer-events:none}
  .drawlayer.arm{pointer-events:auto;cursor:crosshair}
  .dov{position:absolute;pointer-events:none;z-index:4}
  .dov.vline{top:0;bottom:0;width:0;border-left:1px solid #e8b23a}
  .dov.text{transform:translate(0,-50%);color:#e6c14a;font:600 11px Tahoma,sans-serif;white-space:nowrap;text-shadow:0 0 3px #000,0 0 3px #000}
  .dov.pt{width:9px;height:9px;margin:-5px 0 0 -5px;background:#ffffff;border:1px solid #000;box-shadow:0 0 2px #000;pointer-events:auto;cursor:move}   /* draggable selected-line handle */
  .dov.pt:hover{background:#ffe14d}
  /* selected horizontal-line grab strip — full width, drag up/down to move the line (white center knob) */
  .dov.hgrab{left:0;right:0;height:11px;margin-top:-6px;background:transparent;pointer-events:auto;cursor:ns-resize}
  .dov.hgrab::after{content:'';position:absolute;left:50%;top:50%;width:9px;height:9px;transform:translate(-50%,-50%);background:#fff;border:1px solid #000;box-shadow:0 0 2px #000}
  /* crosshair MEASURE ruler (MT5): drag with the Crosshair tool → bars / pips / price delta */
  .measure{position:absolute;inset:0;pointer-events:none;z-index:5}
  .measure svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .measure line{stroke:#dfe4ea;stroke-width:1;stroke-dasharray:4 3}
  .measure .ml{position:absolute;background:#1c2733;color:#e6ebf2;font:11px Tahoma,sans-serif;padding:3px 7px;border:1px solid #3a4756;border-radius:3px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.5)}
  /* ── Market Watch: sticky tick colours (hold until next up/down) + daily arrows ── */
  .mwt td.tick-up,.mwt td.text-up{color:#00ff00 !important;font-weight:bold}
  .mwt td.tick-down,.mwt td.text-down{color:#ff3b30 !important;font-weight:bold}
  .mwt .au{color:#00ff00;font-weight:bold}.mwt .ad{color:#ff3b30;font-weight:bold}
  .mwt tr.sel td{background:#3a6ea5 !important;color:#fff}
  /* Session CLOSED: frozen greyed price, no tick colour, a grey 'Closed' tag at the right */
  .mwt tr.mw-closed td.sym{color:#6a7180}.mwt tr.mw-closed .au,.mwt tr.mw-closed .ad{color:#6a7180 !important}
  .mwt td.mw-closed-cell{color:#6a7180 !important;font-weight:normal}
  .mwt td.mw-closed-tag{color:#8a9098;font-weight:600;letter-spacing:.3px}
  .terminal.light .mwt tr.mw-closed td.sym{color:#5c6472}.terminal.light .mwt td.mw-closed-cell{color:#5c6472 !important}
  .terminal.light .mwt td.mw-closed-tag{color:#7a828e}
  .mwt tr.sel td.sym,.mwt tr.sel td.up,.mwt tr.sel td.down,.mwt tr.sel td.uptick,.mwt tr.sel td.dntick{color:#fff}
  .mwtabs{display:flex;flex:none;background:linear-gradient(#20242a,#14171c);border-top:1px solid #000}
  .mwtabs .mt{padding:3px 10px;font-size:11px;color:#a2aab6;border-right:1px solid #2a2e34;cursor:default}
  .mwtabs .mt.on{background:#000;color:#00ff00;border-top:2px solid transparent;margin-top:-1px}   /* active tab = green TEXT, no accent line */
  /* Market Watch title bar (live clock + close) */
  .mwhead{flex:none;display:flex;align-items:center;justify-content:space-between;height:20px;padding:0 4px 0 8px;border-radius:0;
    background:linear-gradient(to bottom,#2d3139 0%,#20232a 50%,#181a20 100%);color:#e1e4ed;font-size:11px;font-weight:600;text-shadow:0 1px 1px rgba(0,0,0,.8);
    border-top:1px solid #434956;border-bottom:1px solid #111317}

  .mwhead .x:hover{background:#e81123}
  /* Market Watch search — Top 20 default, ingest from the background pool on query/class */
  .mwsearch{flex:none;display:flex;align-items:center;gap:6px;padding:4px 6px;background:#0d0d0d;border-bottom:1px solid #1a1a1a}
  .mwsearch input{flex:1;height:22px;background:#141414;border:1px solid #2a2e34;color:#c8ccd2;font-size:11px;padding:0 8px;border-radius:3px}
  .mwsearch input:focus{border-color:#3a6ea5;outline:none}
  .mwsearch .mwsc{font-size:10px;color:#6a7180;min-width:34px;text-align:right}
  .terminal.light .mwsearch{background:#0E1015;border-bottom:1px solid #1D212A}
  .terminal.light .mwsearch input{background:#000000;border:1px solid #1D212A}
  .terminal.light .mwsearch input:focus{border-color:#2f3542}
  /* Details tab */

  .mwdet table{width:100%;border-collapse:collapse;font-size:11.5px}

  .mwdet td.k{color:#c4c8d0}.mwdet td.v{text-align:right;font-variant-numeric:tabular-nums}
  .mwdet td .ar{display:inline-block;width:12px;text-align:center}
  .mwdet td .ar.up{color:#26c281}.mwdet td .ar.dn{color:#ff4d4d}.mwdet td .ar.nu{color:#8a9098}
  .mwdet td.v.up{color:#5b9bff}.mwdet td.v.dn{color:#ff4d4d}.mwdet td.v.nu{color:#c4c8d0}
  /* Trading tab — stacked one-click panels */
  .mwtrade{padding:0}
  .mwtp{border-bottom:1px solid #23272d;padding:4px 6px 6px}
  .mwtp .hd{display:flex;justify-content:space-between;color:#c8ccd2;font-size:11px;font-weight:600;margin-bottom:3px}
  .mwtp .hd .tm{color:#8890a0;font-weight:400}
  .mwtp .row{display:flex;height:38px;gap:2px;align-items:stretch}
  .mwtp .sd{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;cursor:pointer;line-height:1.05}
  .mwtp .sd.sell{background:linear-gradient(#2f7fd6,#1d63b4)}.mwtp .sd.buy{background:linear-gradient(#e2574c,#d23a2d)}
  .mwtp .sd:hover{filter:brightness(1.08)}
  .mwtp .sd .lbl{font-size:9px;letter-spacing:.5px;opacity:.9}
  .mwtp .sd .pr{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}.mwtp .sd .pr sup{font-size:10px}
  .mwtp .mid{width:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0d12}
  .mwtp .mid .q{color:#e6ebf2;font:700 12px Tahoma}.mwtp .mid .sp{color:#8890a0;font-size:9px;margin-top:2px}
  .mwtp .lh{display:flex;justify-content:space-between;font-size:9.5px;color:#8890a0;margin-top:2px}
  .mwtp .lh b{color:#c4c8d0;font-weight:600}
  /* Ticks tab chart */
  .mwtick{flex:1;min-height:0;position:relative;background:#000000}
  .watch{display:flex;flex-direction:column;overflow:hidden}
  .watch .mwscroll{flex:1;overflow-x:hidden;overflow-y:auto;min-height:0}
  .ctxmenu{position:fixed;z-index:1200;min-width:216px;background:#f0f0f0;border:1px solid #9a9a9a;
    box-shadow:2px 2px 5px rgba(0,0,0,.2);padding:2px;font:12px 'Segoe UI',Tahoma,sans-serif;color:#1c1c1c}
  .ctxmenu .ci{display:flex;align-items:center;gap:8px;height:24px;padding:0 10px 0 8px;cursor:default;border-radius:2px}
  .ctxmenu .ci:hover{background:#cfe3fb}
  .ctxmenu .ci.dis{color:#a0a0a0}.ctxmenu .ci.dis:hover{background:transparent}
  .ctxmenu .ci .ic{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#3a3f46}
  .ctxmenu .ci .ic svg{width:15px;height:15px}
  .ctxmenu .ci .lbl{flex:1;white-space:nowrap}
  .ctxmenu .ci .sc{color:#6a6a6a;font-size:11px;padding-left:22px}
  .ctxmenu .ci .ar{color:#6a6a6a;margin-left:auto}
  .ctxmenu .ci .ck{width:14px;text-align:center;color:#2e7d32}
  .ctxsep{height:1px;background:#c8c8c8;margin:3px 6px}
  .ctxmenu .ci.has{position:relative}
  /* ── Market-Watch MT5 classic dark context menu (right-click) ── */
  .mt5-context-menu{position:fixed;z-index:200000 !important;min-width:178px;background:#1e1e1e;border:1px solid #444;
    box-shadow:0 4px 14px rgba(0,0,0,.6);padding:2px 0;font:11px "Segoe UI",Tahoma,sans-serif;border-radius:0}
  .mt5-context-menu .mt5-mi{padding:5px 24px 5px 14px;color:#fff;cursor:pointer;white-space:nowrap;border-radius:0}
  .mt5-context-menu .mt5-mi:hover{background:#2b579a;color:#fff}
  .mt5-context-menu .mt5-mi.dis{color:#777;cursor:default}
  .mt5-context-menu .mt5-mi.dis:hover{background:transparent}
  .mt5-context-menu .mt5-sep{height:0;border-top:1px solid #444;margin:3px 0}
  .ctxmenu.sub{position:absolute;left:100%;top:-3px;min-width:150px;z-index:1201}
  .ctxmenu .ci .ic svg{width:15px;height:15px}
  /* ── Bottom: KPI strip + Excel-grid positions table ── */
  /* GLOBAL floating toolbox — pinned to the whole-window bottom, full width, above everything.
     Pulling it up covers the chart Y-axis AND the left navigator's bottom tabs (opaque overlay). */
  .toolbox{position:absolute;left:0;bottom:0;width:100%;z-index:9999;display:flex;flex-direction:column;
    background:#0d0d0d;box-shadow:0 -2px 10px rgba(0,0,0,.7)}
  .bottom{flex:none;height:var(--bottomh,126px);background:#0d0d0d;border-top:1px solid var(--cellbd);display:flex;flex-direction:column;overflow:hidden;
    font-family:"Segoe UI",Tahoma,sans-serif;font-size:11px}
  /* terminal menu tab bar — glued to the BOTTOM of the floating toolbox (integral, always bottom) */
  .tbxtabs{flex:none;height:24px;display:flex;align-items:stretch;background:linear-gradient(#20242a,#14171c);border-top:1px solid #000;overflow-x:auto}
  .tbxtabs .t{padding:3px 11px;font-size:11px;color:#a2aab6;border-right:1px solid #2a2e34;cursor:default}
  .tbxtabs .t.on{background:#000;color:#2f7fe0;border-top:2px solid transparent;border-bottom:2px solid #2f7fe0;margin-top:-1px}   /* DARK: active tab = window BLUE text + underline */
  .acctline{display:flex;align-items:center;gap:18px;padding:4px 12px;background:#0d0d0d;border-top:1px solid #222;font-size:11.5px;color:#c8ccd2;white-space:nowrap;overflow-x:auto}
  .acctline .k{color:#8890a0}.acctline b{color:#fff;font-variant-numeric:tabular-nums}
  .acctline .up{color:var(--up)}.acctline .down{color:var(--down)}   /* Profit / Margin-Level keep their up=green / down=red (beats the white .acctline b) */
  /* History period filter bar (MT5: right-click → period; here a visible toolbar) */
  .histbar{flex:none;display:flex;align-items:center;gap:6px;padding:4px 10px;background:#141414;border-bottom:1px solid #222;font-size:11px;color:#8890a0;white-space:nowrap;overflow-x:auto}
  .histbar .hb{background:transparent;border:1px solid #333;color:#c8ccd2;font-size:11px;padding:2px 9px;border-radius:3px;cursor:pointer}
  .histbar .hb:hover{border-color:#4a4a4a;color:#fff}
  .histbar .hb.on{border-color:#3a6ea5;color:#fff;background:#182130}
  .histbar .hbrange{display:flex;align-items:center;gap:5px}
  .histbar .hbrange input{background:#0d0d0d;border:1px solid #333;color:#c8ccd2;font-size:11px;padding:1px 5px;border-radius:3px}
  .histbar .hbcount{margin-left:auto;color:#6a7180}
  .terminal.light .histbar{background:#0E1015;border-bottom:1px solid #1D212A;color:#7a828e}
  .terminal.light .histbar .hb{border:1px solid #242831;color:#a2aab6}
  .terminal.light .histbar .hb:hover{border-color:#2f3542;color:#fff}
  .terminal.light .histbar .hb.on{border-color:#242831;background:#000000;color:#00FF55}   /* active period = green TEXT (Legend accent) */
  .terminal.light .histbar .hbrange input{background:#000000;border:1px solid #1D212A;color:#c8ccd2}
  .postbl{flex:1;overflow:auto}
  /* table-layout:fixed → column widths come from the header %s, NOT the cell values, so a ticking
     price/Profit can't reflow the columns (kills the left/right jitter on every update). */
  table.pos{width:100%;table-layout:fixed;border-collapse:collapse;font-variant-numeric:tabular-nums}
  table.pos th:nth-child(1){width:9%}table.pos th:nth-child(2){width:9%}table.pos th:nth-child(3){width:14%}
  table.pos th:nth-child(4){width:7%}table.pos th:nth-child(5){width:8%}table.pos th:nth-child(6){width:10%}
  table.pos th:nth-child(7){width:9%}table.pos th:nth-child(8){width:9%}table.pos th:nth-child(9){width:10%}
  table.pos th:nth-child(10){width:11%}table.pos th:nth-child(11){width:4%}
  table.pos th{position:sticky;top:0;background:#141414;color:var(--dim);font-weight:600;font-size:11px;text-align:right;padding:3px 10px;border:1px solid #222}
  table.pos th:first-child,table.pos td:first-child{text-align:left}
  table.pos td{padding:3px 10px;border:1px solid #222;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Balance bar row (tfoot): borderless full-width cell so the bar hugs the rows above */
  table.pos tfoot td{padding:0;border:0;text-align:left}
  /* balance bar + P/L are ONE row: P/L is a right-aligned cell sitting under the Profit column, on the bar itself */
  table.pos tr.acctrow td{background:#0d0d0d;border-top:1px solid #222;vertical-align:middle}
  table.pos .acctline.pl-bar{overflow:visible}   /* no scroll-collapse → the sibling P/L cell stays aligned under its column */
  table.pos td.pl-total{padding:4px 10px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700}   /* grand total under the P/L column */
  table.pos tfoot .acctline{border-top:0}
  /* bare ✕ — no card behind it (2026-07-13/14 user request); silver glyph, hover → white */
  .xclose{width:18px;height:18px;line-height:1;padding:0;border:none;border-radius:0;
    background:transparent;color:#8a94a6;font-size:11px;cursor:pointer}
  .xclose:hover{background:transparent;color:#ffffff}
  /* Alerts tab — add-row controls (dark cards, silver rails like the lot box) */

  .alert-add input{width:110px}
  .alert-add button{background:#1B3955;border:1px solid #2E6FB0;color:#fff;font-size:11px;padding:3px 10px;cursor:pointer}
  .alert-add button:hover{filter:brightness(1.2)}
  .empty{padding:16px;color:var(--dim);text-align:center;border:none!important}
  .note{padding:2px 14px;color:var(--dim);font-size:11px}

  .charttabs{flex:none;height:24px;display:flex;align-items:stretch;overflow-x:auto;overflow-y:hidden;
    background:#0a0e14;border-top:1px solid #000;font-family:"Segoe UI",Tahoma,sans-serif}
  .charttabs .ctab{position:relative;display:flex;align-items:center;padding:0 12px 0 15px;font-size:11px;color:#9aa1ad;
    cursor:pointer;border-right:1px solid #1b1f27;background:#0a0e14;white-space:nowrap;border-radius:0}

  .charttabs .ctab.on::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:#2f7fe0}  /* 활성탭 왼쪽 파란 인디케이터 */
  .charttabs .ctab .tclose{margin-left:9px;color:#8890a0;font-size:10px;line-height:1;border-radius:0}
  .charttabs .ctab .tclose:hover{color:#fff;background:#e81123;padding:0 3px}
  .noch{margin:auto;color:#6a7078;font-size:12px;text-align:center;padding:20px}
  /* ── order form spinner steppers (Volume / SL / TP) ── */
  .orow .in.step input{border-right:none;border-top-right-radius:0;border-bottom-right-radius:0}

  .spin b:hover{background:#d7e6fb}
  .spin b:first-child{border-bottom:1px solid #bbb}
  /* ── MT5 popup Order dialog (light theme, matches the desktop terminal dialog) ── */
  /* ── New Order popup — MODERN single-column dark card (400×550, matte black) ── */
  .omodal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100000 !important;display:flex;
    align-items:center;justify-content:center;font-family:"Segoe UI",Tahoma,Arial,sans-serif}   /* above the floating toolbox (z-9999) */
  /* Login gate — full-terminal overlay when logged out (production) */
  .logingate{position:absolute;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;
    background:rgba(6,8,12,.82);backdrop-filter:blur(3px);font-family:"Segoe UI",Tahoma,Arial,sans-serif}
  .logingate .lg-card{width:320px;max-width:92vw;background:#0d0e12;border:1px solid #242831;padding:30px 28px 22px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.55)}
  .logingate .lg-logo{font-size:17px;letter-spacing:.5px;color:#c8ccd2;font-weight:400}.logingate .lg-logo b{font-weight:700;color:#fff}
  .logingate .lg-sub{font-size:12px;color:#8890a0;margin:8px 0 20px}
  .logingate .lg-btn{width:100%;height:44px;border:none;background:#2f7fe0;color:#fff;font-size:14px;font-weight:700;letter-spacing:.3px;cursor:pointer;transition:opacity .15s}
  .logingate .lg-btn:hover{opacity:.9}
  .logingate .lg-dismiss{margin-top:14px;font-size:11.5px;color:#6a7180;cursor:pointer}.logingate .lg-dismiss:hover{color:#9aa1ad}
  .terminal.light .logingate{background:rgba(14,16,21,.86)}

  .omodal{width:400px;max-width:96vw;height:550px;max-height:94vh;background:#0a0e14;border:1px solid #222;
    box-shadow:0 16px 50px rgba(0,0,0,.7);display:flex;flex-direction:column;color:#fff}
  .omodal *{border-radius:0 !important;box-sizing:border-box;font-family:inherit}
  .omodal .obar{display:flex;align-items:center;height:34px;padding:0 6px 0 14px;background:#0d1420;
    border-bottom:1px solid #222;font-weight:600;color:#fff;font-size:13px}
  .omodal .obar .t{flex:1;letter-spacing:.3px}
  .omodal .obar .wb{width:30px;height:26px;display:inline-flex;align-items:center;justify-content:center;color:#8890a0;cursor:pointer;font-size:13px}
  .omodal .obar .wb.x:hover{background:#e81123;color:#fff}
  .om-body{flex:1;display:flex;flex-direction:column;gap:13px;padding:16px 18px;overflow-y:auto;min-height:0}
  /* fields */
  .om-field{display:flex;flex-direction:column;gap:5px}
  .om-field>label{font-size:10.5px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:#8890a0}
  .om-field select,.om-field input,.om-vol input{width:100%;height:34px;background:#0d1420;border:1px solid #222;color:#fff;
    font-size:14px;padding:0 10px;outline:none}

  .om-vol input{text-align:center;border-left:0;border-right:0}
  /* SL/TP input with an internal ±10-pip mini spinner (respects the volume-arrow style) */
  .om-price{position:relative;display:flex;align-items:stretch}
  .om-price input{flex:1;padding-right:24px}
  .om-pspin{position:absolute;right:0;top:0;bottom:0;width:22px;display:flex;flex-direction:column;border-left:1px solid #222}
  .om-pspin b{flex:1;display:flex;align-items:center;justify-content:center;background:#0d1420;color:#fff;cursor:pointer;font-size:8px;line-height:1;user-select:none}
  .om-pspin b:first-child{border-bottom:1px solid #222}
  .om-pspin b:hover{background:#16202e;color:#1a5cff}
  /* big Bid/Ask quote — SAME Arial-Black BigFig pixel-look as the one-click panel */
  .om-quote{display:flex;align-items:stretch;gap:8px}
  .om-px{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:11px 0;border:1px solid #222;background:#0d1420}

<!-- defer = non-blocking + IN-ORDER: the shell above paints first, libs download in parallel and
     execute in sequence after parse (supabase → sync → charts → react → react-dom → babel).
     Babel then transforms the text/babel app on DOMContentLoaded. -->

<script type="text/babel" data-presets="react">
/* ══════════════════════════════════════════════════════════════════════════
   OVERLOAD-SAFE PIPELINE: the whole page subscribes to prices ONCE (priceStore),
   through the 1s-cache `feed` Edge. Every chart cell + market-watch + bottom bar
   reads from that single in-memory store (browser fan-out) — NOT their own poll.
   Fan-out to the UI is throttled to ~2.5/sec (mirrors _shared/throttle.ts).
   ══════════════════════════════════════════════════════════════════════════ */

// throttle — trailing edge, keeps the newest value (mirror of supabase/functions/_shared/throttle.ts)
function throttle(fn, interval){
  let last=0, pending=null, timer=null;
  const fire=()=>{ last=Date.now(); const a=pending; pending=null; timer=null; fn.apply(null,a); };
  return function(){ const now=Date.now(), wait=interval-(now-last);
    if(wait<=0){ last=now; fn.apply(null,arguments); return; }
    pending=arguments; if(!timer) timer=setTimeout(fire, wait); };
}

// ── MOBILE device splitter (iOS/Android) — drives render throttling + lazy chart init below.
//    PC unchanged; only phones/in-app-webviews take the lighter path.
const IS_MOBILE = (typeof navigator!=='undefined') &&
  /Android|iPhone|iPad|iPod|Mobile|IEMobile|Opera Mini/i.test(navigator.userAgent||'');

/* ══ MT5 ORDER-LIFECYCLE SOUNDS ══════════════════════════════════════════════
   Preloaded HTML5 Audio, one per lifecycle event. Files live at /assets/sounds/.
   (Drop the MT5 originals there — paths below are the standard.) Every trigger is
   fire-and-forget with .catch so a missing file / policy block never breaks a fill.
   Playback happens up to ~550ms AFTER the click (past the ECN delay), so we UNLOCK
   the audio on the user's very first gesture (see below) to dodge autoplay blocking. */
// Each event has (a) an optional MT5 .wav in /assets/sounds/ AND (b) a built-in WebAudio
// fallback tone that ALWAYS plays even when the file is absent — so sound works out of the
// box right now, and auto-swaps to the real MT5 clip the moment you drop the .wav in.
let _actx=null;
function _primeCtx(){ try{ _actx=_actx||new (window.AudioContext||window.webkitAudioContext)(); if(_actx.state==='suspended') _actx.resume(); }catch(e){} return _actx; }
function _tone(specs){   // specs: [{f0, f1?, type?, t0, dur, gain?}] — layered oscillator blips
  const ctx=_primeCtx(); if(!ctx) return; const now=ctx.currentTime;
  specs.forEach(s=>{ try{
    const osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type=s.type||'square'; osc.frequency.setValueAtTime(s.f0, now+s.t0);
    if(s.f1) osc.frequency.exponentialRampToValueAtTime(s.f1, now+s.t0+s.dur);
    g.gain.setValueAtTime(0.0001, now+s.t0);
    g.gain.exponentialRampToValueAtTime(s.gain||0.2, now+s.t0+0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, now+s.t0+s.dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(now+s.t0); osc.stop(now+s.t0+s.dur+0.03);
  }catch(e){} });
}
const synOpen  = ()=>_tone([{f0:1750,f1:950,type:'square',t0:0,dur:0.055,gain:0.22}]);                                          // 진입: 칼틱!
const synClose = ()=>_tone([{f0:680,f1:1020,type:'sine',t0:0,dur:0.10,gain:0.20}]);                                             // 청산: 상승 확인음
const synError = ()=>_tone([{f0:320,f1:170,type:'sawtooth',t0:0,dur:0.20,gain:0.17}]);                                          // 실패: 낮은 부저
const synStop  = ()=>_tone([{f0:500,type:'square',t0:0,dur:0.10,gain:0.20},{f0:500,type:'square',t0:0.14,dur:0.10,gain:0.20}]); // 스탑아웃: 삐-삐 경보
const synLogin = ()=>_tone([{f0:660,f1:880,type:'sine',t0:0,dur:0.10,gain:0.16},{f0:990,f1:1320,type:'sine',t0:0.10,dur:0.14,gain:0.18}]); // 로그인: 3음 상승 차임
// wrap: prefer the real file once it actually loads, else the fallback synth.
function mkSnd(src, syn){
  let ok=false; const a=new Audio(src); a.preload='auto';
  const good=()=>{ ok=true; }; a.addEventListener('canplaythrough',good); a.addEventListener('loadeddata',good);
  a.addEventListener('error',()=>{ ok=false; });
  try{ a.load(); }catch(e){}
  return { el:a,
    play(){ if(ok){ try{ a.currentTime=0; const p=a.play(); if(p&&p.catch) p.catch(()=>syn()); return; }catch(e){} } syn(); },
    unlock(){ try{ const v=a.volume; a.volume=0; const p=a.play(); if(p&&p.then) p.then(()=>{ a.pause(); a.currentTime=0; a.volume=v; }).catch(()=>{ a.volume=v; }); }catch(e){} } };
}
const sndOpen    = mkSnd('/assets/sounds/ok.wav',      synOpen);   // fx_open  성공 (주문 진입)
const sndClose   = mkSnd('/assets/sounds/close.wav',   synClose);  // fx_close 성공 (포지션 청산) — "딩~"
const sndError   = mkSnd('/assets/sounds/timeout.wav', synError);  // RPC 에러 / 마진 게이트 차단
const sndStopout = mkSnd('/assets/sounds/stops.wav',   synStop);   // 30% 스탑아웃 강제청산 (서버 크론)
const sndLogin   = mkSnd('/assets/sounds/startup.wav', synLogin);  // 로그인 성공 — "띠리링~" 스타트업

// ── Journal: a REAL system-communication log (HTS-style). Records the actual events that happen —
//    terminal start, login, order fills/rejections, closes, SL/TP edits, errors — each with a
//    Vegas-time stamp. Memory-only (session-lived, no localStorage): it's a log, not money. ──
const journalStore = {
  entries:[], listeners:new Set(),
  log(msg, ok=1){ const d=new Date(), p2=n=>String(n).padStart(2,'0');
    const ts=d.getFullYear()+'.'+p2(d.getMonth()+1)+'.'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());
    this.entries=[{ts, msg, ok}, ...this.entries].slice(0,300);   // newest first, capped
    this.notify(); },
  notify(){ this.listeners.forEach(fn=>{ try{fn(this.entries);}catch(e){} }); },
  subscribe(fn){ this.listeners.add(fn); fn(this.entries); return ()=>this.listeners.delete(fn); },
};

// Autoplay Unlock — first user gesture primes the AudioContext + the <audio> elements, so
// playback that fires ~250–550ms after the click (past the ECN delay) isn't autoplay-blocked.
let _audioUnlocked=false;
// MOBILE (iOS Safari / Android Chrome WebView) autoplay unlock: on the FIRST user gesture — touch,
// pointer, click OR key — resume the AudioContext and prime every preloaded clip so the login /
// order / close sounds fire in ~0.1s at the RPC callback (no first-play delay).
function unlockAudio(){ if(_audioUnlocked) return; _audioUnlocked=true; _primeCtx();
  [sndOpen, sndClose, sndError, sndStopout, sndLogin].forEach(s=>s.unlock()); }
if(typeof document!=='undefined'){ ['touchstart','pointerdown','click','keydown'].forEach(ev=>
  document.addEventListener(ev, unlockAudio, {once:true, passive:true})); }

// Market Watch symbols by CLASS (Forex / Stocks / Crypto). Prices are simulated in this DEMO
// terminal (WT_DEMO) — stocks/crypto get a BASE seed + random walk like FX, honest for a demo.
const SYMBOLS = {
  Forex:  ['EURUSD','GBPUSD','USDJPY','AUDUSD','USDCAD','USDCHF','NZDUSD','GBPJPY','AUDJPY','EURJPY'],   // 7 FX majors first (canonical order), then JPY crosses
  Stocks: ['AAPL','MSFT','NVDA','TSLA','AMZN','GOOGL','META'],
  Crypto: ['BTCUSD','ETHUSD','SOLUSD','XRPUSD','DOGEUSD'],
};
const SYM_CAT = {}; Object.keys(SYMBOLS).forEach(cat=> SYMBOLS[cat].forEach(s=> SYM_CAT[s]=cat));
const WATCH = [...SYMBOLS.Forex, ...SYMBOLS.Stocks, ...SYMBOLS.Crypto];
const GRID  = ['EURUSD','USDJPY','GBPUSD','USDCHF'];   // the default 2×2 (TL·TR·BL·BR — 2026-07-13 user-approved login layout)
// ── Server-driven symbol master. The Market Watch renders the LIVE symbol set from the server
//    (prices table = what the feed actually serves), with each symbol's asset class inherited from
//    fx_specs.cls (the same class the server margins with). No digits/active column exists server-
//    side, so digits are derived from class. Memory-only. The hardcoded SYMBOLS above are only the
//    BOOT default (initial paint / chart grid / offline) until symbolStore.load() replaces the list. ──
// TOP 20 — the popular symbols shown by default. The rest of the live pool stays in memory (symbolStore)
// and surfaces only when the user searches or switches the asset-class tab. Order = display order.
const TOP20 = ['EURUSD','GBPUSD','USDJPY','AUDUSD','USDCAD','USDCHF','NZDUSD',   // FX grouped first
  'BTCUSD','ETHUSD','SOLUSD','XRPUSD','DOGEUSD',                               // crypto
  'AAPL','MSFT','NVDA','TSLA','AMZN','GOOGL','META','SPACEX'];                 // stocks
// The 7 classic FX majors — pinned to the TOP of the Market Watch in this exact order, ahead of every
// crypto/stock/cross, in EVERY view (default Top-20, class filter, search) via the symbolStore sort.
const MAJORS = ['EURUSD','GBPUSD','USDJPY','AUDUSD','USDCAD','USDCHF','NZDUSD'];
const SERVER_CLS = {};   // symbol → fx_specs.cls (FX/CRYPTO/STOCK/INDEX), filled by symbolStore.load()
const CLS_MAP = { FX:'Forex', FOREX:'Forex', CRYPTO:'Crypto', STOCK:'Stocks', STK:'Stocks', INDEX:'Index' };
// Asset class for ANY symbol: known Market-Watch default → SYM_CAT; else the server class (fx_specs);
// else infer (XXXUSD = crypto, 6-char currency pair = FX, else a stock).
const CCY = /^(EUR|USD|GBP|JPY|AUD|CAD|CHF|NZD|CNY|HKD|SGD)/;
const catOf = (s)=> SYM_CAT[s] || CLS_MAP[SERVER_CLS[s]] || (/USD$/.test(s) ? 'Crypto' : (CCY.test(s)&&s.length===6 ? 'Forex' : 'Stocks'));
// LIVE symbol list from the server — memory-only, notifies the Market Watch on load.
const symbolStore = {
  list: WATCH.slice(), listeners:new Set(), loaded:false,
  async load(){ try{ if(window.AlpexaSync&&AlpexaSync.db){
    const [pr, sp] = await Promise.all([
      AlpexaSync.db.from('prices').select('symbol'),
      AlpexaSync.db.from('fx_specs').select('symbol,cls'),
    ]);
    if(sp&&sp.data) sp.data.forEach(x=>{ if(x.symbol&&x.cls) SERVER_CLS[x.symbol]=String(x.cls).toUpperCase(); });
    if(pr&&pr.data&&pr.data.length){
      const live=pr.data.map(x=>x.symbol).filter(Boolean);
      // order: 7 FX majors (fixed order) → Forex → Stocks → Crypto → Index → other, alphabetical within
      const rank={Forex:0,Stocks:1,Crypto:2,Index:3};
      live.sort((a,b)=>{
        const ma=MAJORS.indexOf(a), mb=MAJORS.indexOf(b);
        if(ma>=0||mb>=0){ if(ma>=0&&mb>=0) return ma-mb; return ma>=0?-1:1; }   // majors pinned to the very top, in canonical order
        const ra=rank[catOf(a)]??9, rb=rank[catOf(b)]??9; return ra-rb || (a<b?-1:a>b?1:0);
      });
      this.list=live; this.loaded=true; this.notify();
    }
  } }catch(e){} },
  notify(){ this.listeners.forEach(fn=>{ try{fn(this.list);}catch(e){} }); },
  subscribe(fn){ this.listeners.add(fn); fn(this.list); return ()=>this.listeners.delete(fn); },
};
const sfx   = (s)=> catOf(s)==='Forex' ? '.FX' : catOf(s)==='Crypto' ? '.CR' : '.STK';   // display suffix per class
const pip   = (s)=> (catOf(s)==='Stocks'||catOf(s)==='Crypto') ? 0.01 : (s.slice(3)==='JPY'||s.slice(0,3)==='JPY' ? 0.01 : 0.0001);
const digits= (s)=> catOf(s)==='Stocks' ? 2 : catOf(s)==='Crypto' ? ({SOLUSD:3,XRPUSD:4,DOGEUSD:5}[s]||2) : (s.includes('JPY') ? 3 : 5);   // MT5-style per-price-scale quoting — flat 2dp rounded XRP/DOGE bid==ask on screen (Spread 0.0) while fx_close charged the 10bps floor
const fmtPx = (s,v)=> (v==null?'—':(+v).toFixed(digits(s)));
// ONE formatter for every spread readout (MW table, MW popup tiles, one-click tag):
// Forex → pips at .1 · Stocks → raw gap at .1 · Crypto → raw gap with digits-1 decimals so
// sub-cent spreads (XRP 0.001, DOGE 0.0001) survive — a flat .toFixed(1) showed a lying 0.0.
const sprText = (s,d)=> catOf(s)==='Crypto' ? d.toFixed(Math.max(1,digits(s)-1)) : (catOf(s)==='Stocks' ? d : d/pip(s)).toFixed(1);
// MT5 SYMBOL_TRADE_TICK_SIZE / point = 10^-digits (5-digit FX 0.00001, 3-digit JPY 0.001, crypto/stock 0.01).
// ⚠ NOT the spread unit: prices.spr_pts arrives in per-class units (FX pips · crypto bps · stock 0)
// and converts via halfPx (fx_close.sql lockstep) — spr×tickSize was the 2026-07-13 unit-mixup bug.
const tickSize = (s)=> Math.pow(10, -digits(s));
// Cold-start ONLY dealing-spread master table, in the SAME per-class units the feed writers use
// (FX rows/Forex row = PIPS, Crypto/Stocks rows = BPS — see halfPx below). The live feed's spr_pts
// always wins, then the symbol's own last-known value; this seeds the very first tick when neither
// exists yet. Unknown symbols take their asset-class row from this SAME table — the pipeline
// carries no bare numeric fallback (flat-10 bomb family; diagnose SPREAD-flat-fallback).
const DEFAULT_SPREAD = { EURUSD:1.0, GBPUSD:1.2, USDJPY:1.9, AUDUSD:1.2, USDCAD:1.5, USDCHF:1.6, NZDUSD:1.8,
  EURGBP:1.4, EURJPY:1.8, GBPJPY:2.2, AUDJPY:1.9, EURAUD:2.0, GBPAUD:2.4,
  Forex:1.5, Crypto:10, Stocks:8 };
const seedSpread = (s)=> DEFAULT_SPREAD[s]!=null ? DEFAULT_SPREAD[s] : DEFAULT_SPREAD[catOf(s)];
// Half-spread in PRICE units — EXACT mirror of fx_close.sql v_half / trading.html fxHalfSpread
// (floating == server realized). prices.spr_pts is ONE column with THREE unit regimes, set by the
// writer Edge per class (verified against the live DB + Edge sources 2026-07-13):
//   fx-prices    → FX in PIPS ((ask−bid)/pip; its "reported in points" comment is WRONG)
//   crypto-prices→ real exchange spread in BPS (Binance bookTicker)
//   stock-prices → always 0 (the house floor below IS the stock spread)
// FX: greatest(0.1, spr+markup)*pip/2 · non-FX: mid*greatest(FLOOR_BPS, spr)/10000/2. Reading ONE
// unit for all classes (spr×tickSize) was the 2026-07-13 flat/absurd-spread bug — 결함-로그.md.
const SPREAD_FLOOR_BPS = { Crypto:10, Stocks:8 };   // lockstep: ALPEXA_SPREAD_BPS (trading.html) ↔ fx_close.sql
const halfPx = (sym, mid, spr, mk)=> catOf(sym)==='Forex'
  ? Math.max(0.1, (+spr||0) + (+mk||0)) * pip(sym) / 2
  : mid * Math.max(SPREAD_FLOOR_BPS[catOf(sym)]||0, +spr||0) / 10000 / 2;
// MT5-style X-axis tick: "12 Jul 23:22" (UTC-aligned, matches the bucketed candle times).
const MON3 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtMt5Tick = (t)=>{ const d=new Date((typeof t==='number'?t:0)*1000), p=n=>(n<10?'0':'')+n;
  return p(d.getUTCDate())+' '+MON3[d.getUTCMonth()]+' '+p(d.getUTCHours())+':'+p(d.getUTCMinutes()); };
// ── Trading-hours session calendar (CLIENT GATE). A regulated broker opens/closes by SESSION, not
//    by feed freshness: prices.updated_at re-stamps even on weekends (harness finding) so it is
//    useless as an "open" signal. Crypto 24/7; Forex Sun 22:00 → Fri 22:00 UTC; US stocks Mon–Fri
//    13:30–20:00 UTC (ET 09:30–16:00) minus US market holidays. This gates DISPLAY + the DEMO order
//    path; when WT_DEMO flips to real B-Book the fx_open RPC must ALSO enforce sessions (server = the
//    real gate, client = show only). NOTE: the stock window is fixed to EDT (13:30–20:00 UTC); EST
//    winter shifts it +1h — add a DST rule when needed.
const US_MARKET_HOLIDAYS = new Set(['2026-01-01','2026-01-19','2026-02-16','2026-04-03','2026-05-25',
  '2026-06-19','2026-07-03','2026-09-07','2026-11-26','2026-12-25','2027-01-01']);
function marketOpen(symbol, at){
  const cat=catOf(symbol);   // classify via catOf (server class + inference), NOT SYM_CAT-default-Forex — so a
  //   dynamic stock like SPACEX (absent from SYM_CAT) is session-gated as a STOCK (weekend '—'), not Forex.
  const d = at!=null ? new Date(at) : new Date();
  if(cat==='Crypto') return true;                                  // 24/7 — never closed
  const day=d.getUTCDay();                                         // 0=Sun … 6=Sat
  const min=d.getUTCHours()*60+d.getUTCMinutes();                  // minutes past 00:00 UTC
  if(cat==='Forex'){
    if(day===6) return false;                                      // Sat: closed
    if(day===0) return min>=22*60;                                 // Sun: opens 22:00 UTC
    if(day===5) return min< 22*60;                                 // Fri: closes 22:00 UTC
    return true;                                                   // Mon–Thu: open
  }
  // US Stocks
  if(day===0||day===6) return false;                               // weekend
  if(US_MARKET_HOLIDAYS.has(d.toISOString().slice(0,10))) return false;  // US market holiday
  return min>=13*60+30 && min<20*60;                               // 13:30–20:00 UTC regular session
}
// Max ADVERSE slippage (in pips) the trader will accept between click and server fill — passed to
// fx_open's slippage guard. Wide by default (only a violent spike trips it); operator-overridable.
const SLIP_PIPS = (typeof window!=='undefined' && +window.ALPEXA_MAX_SLIP_PIPS) || 15;

// ── read prices via the cache proxy (feed-first → direct DB fallback → dev simulator) ──
async function feedPrices(){
  try{ if(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.db.functions){
    const x=await AlpexaSync.db.functions.invoke('feed',{body:{t:'prices'}});
    if(x&&!x.error&&Array.isArray(x.data)) return x.data;
  } }catch(e){}
  try{ if(window.AlpexaSync&&AlpexaSync.db){
    const r=await AlpexaSync.db.from('prices').select('symbol,mid,spr_pts');
    if(r&&r.data) return r.data;
  } }catch(e){}
  return null;   // → simulator seed keeps the terminal alive in dev / logged-out
}

const BASE = { EURUSD:1.143, AUDUSD:0.694, USDJPY:162.36, GBPUSD:1.3417, USDCAD:1.417,
  NZDUSD:0.5758, USDCHF:0.8068, GBPJPY:217.8, AUDJPY:112.7, EURJPY:185.6,
  AAPL:229.5, MSFT:465.2, NVDA:128.4, TSLA:248.6, AMZN:198.3, GOOGL:178.9, META:562.1,   // stocks
  BTCUSD:64250, ETHUSD:3420, SOLUSD:148.5, XRPUSD:0.612, DOGEUSD:0.145 };                 // crypto

const priceStore = {
  mids:{}, listeners:new Set(), timer:null, live:false,
  _set(sym,mid,half,spr,now,jit){
    const prev=this.mids[sym];
    // jit (SIMULATOR ONLY): independent per-side noise so the spread breathes and Bid/Ask can
    // tick in OPPOSITE directions — the MT5 "left blue / right red diverging" feel. Real feed
    // (_apply) passes no jit → truthful bid=mid-half, ask=mid+half (never fake real prices, #5).
    const jb=jit?(Math.random()-0.5)*jit:0, ja=jit?(Math.random()-0.5)*jit:0;
    const bid=mid-half+jb, ask=mid+half+ja;
    this.mids[sym]={ mid, bid, ask, spr, open: prev? prev.open : mid, chg: prev? (mid-prev.open)/prev.open*100 : 0, ts:now,
      bidHi: prev? Math.max(prev.bidHi,bid):bid, bidLo: prev? Math.min(prev.bidLo,bid):bid,
      askHi: prev? Math.max(prev.askHi,ask):ask, askLo: prev? Math.min(prev.askLo,ask):ask };
  },
  _apply(rows, src){
    const now=Date.now();
    rows.forEach(p=>{
      const sym=p.symbol; if(!sym) return;   // keep EVERY priced symbol (not just WATCH) so positions on
      const mid=+p.mid||0; if(mid<=0) return; //   off-watch symbols (e.g. SPACEX) still get a live price + P&L
      // PRIORITY GATE: a symbol with a fresh (<10s) Binance-WS tick must not be dragged backwards
      // by the 3s cron row (poll/Realtime YIELD); after 10s of WS silence the cron feed takes back
      // over, so a dead socket degrades to exactly the pre-WS behaviour instead of freezing.
      if(src==='ws'){ (this.wsAt=this.wsAt||{})[sym]=now; }
      else if(this.wsAt && this.wsAt[sym] && now-this.wsAt[sym]<10000) return;
      // spr stays in the writer's per-class units (FX pips · crypto bps · stock 0); halfPx does the
      // class-correct conversion (fx_close.sql lockstep). On a transient feed dropout keep this
      // symbol's OWN last-known spread; only a cold start with no history reads DEFAULT_SPREAD.
      const prev=this.mids[sym];
      const spr=(p.spr_pts!=null && p.spr_pts!=='') ? +p.spr_pts : (prev && prev.spr!=null ? prev.spr : seedSpread(sym));
      this._set(sym, mid, halfPx(sym, mid, spr, (this.marks&&this.marks[sym])||0), spr, now);
    });
  },
  _simulate(){ // dev fallback: random walk + a small PERSISTENT per-symbol drift so the daily
    const now=Date.now(); if(!this.drift) this.drift={};   // change has a stable sign (no arrow flicker)
    WATCH.forEach(sym=>{
      if(this.drift[sym]==null) this.drift[sym]=(Math.random()-0.5)*0.00009;
      const cur=this.mids[sym]? this.mids[sym].mid : BASE[sym];
      // SESSION LOCKSTEP (Method A): a CLOSED symbol (weekend/after-hours FX & US stocks) must NOT random-walk
      // — freeze it at its last/close price so the whole app (chart, quotes, P&L) holds. Crypto is 24/7 → walks.
      const sp=(this.mids[sym] && this.mids[sym].spr!=null) ? this.mids[sym].spr : seedSpread(sym);   // last-known spread (feed units); cold seed = DEFAULT_SPREAD table
      const mk=(this.marks&&this.marks[sym])||0;
      if(!marketOpen(sym)){ if(!this.mids[sym]) this._set(sym, cur, halfPx(sym, cur, sp, mk), sp, now); return; }
      const mid=cur*(1+(Math.random()-0.5)*0.0006 + this.drift[sym]); this._set(sym, mid, halfPx(sym, mid, sp, mk), sp, now, 3*pip(sym));
    });
  },
  async pull(){
    const rows=await feedPrices();
    if(rows && rows.length){ this.live=true; this._apply(rows); } else { this.live=false; this._simulate(); }
    this.notify();
  },
  // FX markup_pts (pips) from pricing_marks — same source + [0,50] clamp as trading.html, so the
  // FX half-gap includes the house markup exactly like fx_close.sql (spr+markup). Best-effort:
  // a fetch failure just means markup 0 until the next start (server still charges it at close).
  async loadMarks(){ try{ const r=await AlpexaSync.db.from('pricing_marks').select('symbol,markup_pts');
    if(r&&r.data){ const m={}; r.data.forEach(p=>{ m[p.symbol]=Math.max(0,Math.min(50,+p.markup_pts||0)); }); this.marks=m; } }catch(e){} },
  // Realtime push: prices UPDATEs stream straight into the SAME _apply pipeline (one parser, one
  // halfPx — a second parsing path would re-incubate the 2026-07-13 unit drift). Requires the
  // prices table in the supabase_realtime publication; until then no events arrive and the 1s
  // polling below keeps the terminal exactly as live as before. Junk events are ignored.
  startRealtime(){ try{
    if(this.rt || !(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.db.channel)) return;
    this.rt=AlpexaSync.db.channel('prices-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'prices'},(m)=>{
        const row=m&&m.new; if(!row||!row.symbol) return;
        this.live=true; this._apply([row]); this.notify();
      })
      .subscribe();
  }catch(e){} },
  // Binance WS direct (crypto only, stage 3): bookTicker bid/ask off the PUBLIC data mirror
  // (binance.vision — binance.com is geo-fenced; the crypto-prices Edge samples this SAME book,
  // so display and execution track one upstream). Frames become {symbol, mid, spr_pts in BPS} —
  // the exact row shape crypto-prices writes — and flow through the one _apply/halfPx pipeline
  // tagged src='ws' for the priority gate. Auto-reconnects; a dead socket just means the 3s
  // cron/Realtime feed takes back over after 10s (see _apply gate).
  startCryptoWS(){ try{
    if(this.ws || typeof WebSocket==='undefined') return;
    const MAP={ BTCUSD:'btcusdt', ETHUSD:'ethusdt', SOLUSD:'solusdt', XRPUSD:'xrpusdt', DOGEUSD:'dogeusdt' };
    const REV={}; Object.keys(MAP).forEach(k=>{ REV[MAP[k].toUpperCase()]=k; });
    const ws=new WebSocket('wss://data-stream.binance.vision/stream?streams='+Object.values(MAP).map(s=>s+'@bookTicker').join('/'));
    ws.onmessage=(ev)=>{ try{
      const d=JSON.parse(ev.data).data; if(!d||!d.s) return;
      const sym=REV[d.s]; if(!sym) return;
      const b=+d.b, a=+d.a; if(!(b>0&&a>0)) return;
      const mid=(a+b)/2, spr=Math.round((a-b)/mid*10000*100)/100;   // REAL spread in BPS — the unit crypto-prices writes
      this.live=true; this._apply([{symbol:sym, mid, spr_pts:spr}], 'ws'); this.notify();
    }catch(e){} };
    ws.onclose=()=>{ this.ws=null; setTimeout(()=>this.startCryptoWS(), 5000); };
    ws.onerror=()=>{ try{ ws.close(); }catch(e){} };
    this.ws=ws;
  }catch(e){} },
  start(){ if(this.timer) return; this.loadMarks(); this.startRealtime(); this.startCryptoWS(); this.pull(); this.timer=setInterval(()=>this.pull(), 1000); }, // ws + realtime push + 1s poll fallback
  subscribe(fn){ this.listeners.add(fn); fn(this.mids); return ()=>this.listeners.delete(fn); },
  get(sym){ return this.mids[sym]; },
};
priceStore.notify = throttle(function(){ priceStore.listeners.forEach(fn=>{ try{fn(priceStore.mids);}catch(e){} }); }, 400);

  histOffset:0, histDone:false, _histBusy:false,

// lots for a position row (MT5 "Volume") + display helpers shared by chart flags & tables

/* ── MT5 chart-follow toggles (toolbar, global, session-scoped like an MT5 profile):
   · Auto Scroll ON (default) = every tick snaps the view to the live edge, MT5-authentic —
     including while you browse history (that IS the button's job; turn it OFF to study the past).
     OFF = the tick path never touches the time scale; the view belongs to the user.
   · Chart Shift ON (default) = keep the 15-bar future gap on the right; OFF = flush right edge.
   Read by the tick handler, doFit and chartResizer; the toolbar buttons flip them and emit
   'chart.opts' so every chart re-applies instantly. ── */
const chartOpts={ autoScroll:true, shift:true };
const shiftOffset=()=> chartOpts.shift ? 15 : 0;

/* ── chartResizer: every chart registers its instance + container. The splitter drag loop
   and window-resize call resizeAll() → chart.resize(w,h) so the 4 charts follow the layout
   instead of squishing. (autoSize is OFF so these explicit calls actually apply.) ── */
const chartResizer = {
  items:new Set(),
  resizeOne(it){ try{ const w=it.el.clientWidth, h=it.el.clientHeight; if(w>0&&h>0){ it.chart.resize(w,h);   // fit the FULL live parent height (responsive; no fixed px)
    try{ it.chart.timeScale().applyOptions({ barSpacing:5, rightOffset:shiftOffset() }); }catch(_){} } }catch(e){} },   // weld the 5px density + the Chart-Shift gap into the splitter/window-resize path too (no rollback)
  resizeAll(){ this.items.forEach(it=>this.resizeOne(it)); },
  add(chart, el){ const it={chart,el}; this.items.add(it); this.resizeOne(it); return ()=>this.items.delete(it); },
};
if(typeof window!=='undefined') window.addEventListener('resize', ()=>chartResizer.resizeAll());

// ── candle history: try the fx-prices Edge, fall back to a synthetic seed (live bars are REAL feed). ──
// REAL history upgrade — returns validated real bars, or NULL (never throws, never blocks the chart).
// The caller ALWAYS seeds synthCandles first, so a null here just leaves the full deterministic chart.
// This request is NOT gated by market hours — a closed weekend Forex/Stock symbol still fetches its
// historical bars. We accept the feed ONLY when it's a genuinely FULL, finite, strictly-ascending,
// de-duplicated history (≥160 bars) — otherwise the sparse/"2 giant candles"/unsorted response is
// dropped so it can never blank or corrupt the chart. Capped at 4s so a slow feed never stalls a tile.
// DEEP HISTORY (2026-07-13 user request): bars per timeframe, sized to what a browser chart can
// actually hold — H4 ≈ 6.8y · D1 ≈ 15y · W1 ≈ 30y of real history; minute TFs stay shallow on
// purpose (10y of M1 ≈ 3.7M bars — MT5 makes the same trade-off via "Max bars in chart").
const HIST_N={ M1:5000, M5:5000, M15:10000, M30:10000, H1:15000, H4:15000, D1:3900, W1:1560 };
async function fetchRealCandles(symbol, tf){
  if(WT_DEMO) return null;
  try{
    const t=tf||'M15', n=HIST_N[t]||5000;
    // Transport is a plain GET with a QUERY STRING — the Edge reads url.searchParams, and the old
    // {body:{candles}} invoke never reached it (triple-dead path, 2026-07-13). No cron token here:
    // candles are read-only market data served before the Edge's CRON gate.
    let raw=null;
    if(catOf(symbol)==='Crypto'){
      // Binance public mirror klines — the SAME book the live WS streams; no key, real OHLC.
      // 1000 bars per request → walk endTime backwards up to 5 pages for the deep history.
      const IV={M1:'1m',M5:'5m',M15:'15m',M30:'30m',H1:'1h',H4:'4h',D1:'1d',W1:'1w'};
      const req=(async()=>{ let out=[], end=Date.now();
        for(let p=0;p<5&&out.length<Math.min(5000,n);p++){
          const r=await fetch('https://data-api.binance.vision/api/v3/klines?symbol='+symbol+'T&interval='+(IV[t]||'15m')+'&limit=1000&endTime='+end);
          if(!r.ok) break; const j=await r.json(); if(!Array.isArray(j)||!j.length) break;
          out=j.concat(out); end=j[0][0]-1; if(j.length<1000) break;
        }
        return out.length?out.map(k=>({t:+k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4]})):null; })();
      raw=await Promise.race([req,new Promise(res=>setTimeout(()=>res(null),10000))]);
    } else if(catOf(symbol)==='Forex'){
      const req=fetch('https://grxnbgtfnaayeluenvqh.supabase.co/functions/v1/fx-prices?candles='+symbol+'&tf='+t+'&n='+n)
        .then(r=>r.ok?r.json():null).then(j=>(j&&Array.isArray(j.candles))?j.candles:null);
      raw=await Promise.race([req,new Promise(res=>setTimeout(()=>res(null),10000))]);
    } else return null;   // stocks: no real OHLC source wired yet → deterministic synth fallback
    if(!Array.isArray(raw)) return null;
    const bars=raw.map(c=>({ time:Math.floor((c.t||c.time)/1000), open:+c.o||+c.open, high:+c.h||+c.high, low:+c.l||+c.low, close:+c.c||+c.close }))
      .filter(b=> Number.isFinite(b.time)&&Number.isFinite(b.open)&&Number.isFinite(b.high)&&Number.isFinite(b.low)&&Number.isFinite(b.close));
    if(bars.length<160) return null;                                   // must be a FULL history
    for(let i=1;i<bars.length;i++){ if(bars[i].time<=bars[i-1].time) return null; }   // sorted+distinct or LWC rejects → empty
    return bars;
  }catch(e){}
  return null;
}
const TF_SEC = { M1:60, M5:300, M15:900, M30:1800, H1:3600, H4:14400, D1:86400 };
// DETERMINISTIC synthetic history — a pure function of (symbol, absolute bar time). The SAME bar
// always renders the SAME OHLC, so a refresh keeps the identical chart (no more random walk that
// redraws on every reload). Only the final bar anchors to the live mid, so the history connects to
// the live price line. No storage — the determinism is in the seed, not a cache. (#5 intact.)
function synthCandles(symbol, tf){
  const step=TF_SEC[tf]||900, n=400;   // long history for backward scroll (was 200)
  const nowB=Math.floor(Date.now()/1000/step)*step;     // current bar open-time, bucketed → identical across quick refreshes
  const t0=nowB-(n-1)*step;
  const end=(priceStore.get(symbol)&&priceStore.get(symbol).mid)||BASE[symbol]||1;
  // FNV-1a hash → [0,1): stable pseudo-random keyed by symbol + a bar's absolute time.
  const h=(k)=>{ let s=0x811c9dc5>>>0; const str=symbol+'|'+k; for(let i=0;i<str.length;i++){ s=Math.imul(s^str.charCodeAt(i),0x01000193); } return (s>>>0)/4294967296; };
  // Per-bar log-return scale ∝ √time (diffusion): the base was tuned on M15, so an M1 fallback
  // scales down ~3.9× (was a flat 0.0009 ≈ 9 pips/M1 bar — the "6× wilder than MT5" look).
  const vol=(symbol.indexOf('JPY')>=0?0.0011:0.0009)*Math.sqrt((TF_SEC[tf]||900)/900);
  // integrate a deterministic zero-mean walk, then shift so the LAST close == live mid (shape fixed,
  // only a tiny vertical offset tracks the drifting mid → the chart looks stable between refreshes).
  const cum=[0]; for(let i=0;i<n;i++) cum.push(cum[i]+(h(t0+i*step)-0.5)*vol);
  const shift=cum[n];
  const out=[];
  for(let i=0;i<n;i++){
    const o=end*Math.exp(cum[i]-shift), c=end*Math.exp(cum[i+1]-shift);
    const wk=(0.00006+h(t0+i*step+7)*vol*0.5);          // deterministic wick beyond the body
    const hi=Math.max(o,c)*(1+wk), lo=Math.min(o,c)*(1-wk);
    out.push({ time:t0+i*step, open:o, high:hi, low:lo, close:c });
  }
  return out;
}

/* ══════════════════════════════════════════════════════════════════════════
   INDICATOR ENGINE — extensible, chart-engine-agnostic. Each indicator is a pure
   compute + a render descriptor (main overlay | bottom sub-band). Adding one = a
   single registry entry; ChartCell needs no change. This is the seam a future
   'TradingView Advanced Charts' / server-computed overlay drops into.
   ══════════════════════════════════════════════════════════════════════════ */
function _sma(c,p){ const o=[]; let s=0; for(let i=0;i<c.length;i++){ s+=c[i].close; if(i>=p) s-=c[i-p].close; if(i>=p-1) o.push({time:c[i].time,value:s/p}); } return o; }
function _ema(c,p){ const o=[],k=2/(p+1); let e=null; for(let i=0;i<c.length;i++){ const x=c[i].close; e=e==null?x:x*k+e*(1-k); if(i>=p-1) o.push({time:c[i].time,value:e}); } return o; }
function _rsi(c,p){ const o=[]; let g=0,l=0; for(let i=1;i<c.length;i++){ const d=c[i].close-c[i-1].close,u=Math.max(d,0),w=Math.max(-d,0);
  if(i<=p){ g+=u; l+=w; if(i===p){ g/=p; l/=p; o.push({time:c[i].time,value:l===0?100:100-100/(1+g/l)}); } }
  else { g=(g*(p-1)+u)/p; l=(l*(p-1)+w)/p; o.push({time:c[i].time,value:l===0?100:100-100/(1+g/l)}); } } return o; }
function _macd(c){ const a=_ema(c,12), b=new Map(_ema(c,26).map(x=>[x.time,x.value])); return a.filter(x=>b.has(x.time)).map(x=>({time:x.time,value:x.value-b.get(x.time)})); }

/* ══ useTradeEngine — the single hook the order box + trade panel talk to. It is a
   thin CLIENT INTERFACE over the server: it READS balance/positions (positionsStore,
   server-owned, realtime) and exposes placeOrder/closeOrder that route to a
   configurable execution endpoint. It NEVER writes balances locally (CLAUDE.md #5 —
   server is the sole owner). Wire window.ALPEXA_TRADE_API (external MT5 Web API) or
   the fx_open RPC to go live; until then placeOrder reports 'not connected' rather
   than faking money. ══ */
const TRADE_API = (typeof window!=='undefined' && window.ALPEXA_TRADE_API) || '/api/trade/order';
const CONTRACT = 100000;   // FX standard lot (units of base ccy per 1.00 lot)
// Per-asset CONTRACT SIZE (units per 1.00 lot). FX = 100,000 base units; crypto & stocks = 1
// coin/share per lot. Using 100k for crypto/stocks was the margin/P&L blow-up ($120k on 0.01 lot):
// margin & floating both key off THIS. Mirrors the server exactly (fx_notional_usd: FX→100000 else 1).
const contractSize = (symbol)=> (catOf(symbol)==='Forex' ? CONTRACT : 1);
// DEMO P&L VISIBILITY WEIGHT (crypto only). A 0.01-lot crypto position's TRUE P&L is sub-cent, so on
// a clean 2-decimal display it froze at 0.00. This weight scales the crypto floating P&L (DISPLAY +
// equity only) so a 0.01-lot trade ticks in visible cents (+0.15 / -0.30). It does NOT touch MARGIN:
// requiredMargin() keeps the unscaled contractSize (server fx_notional_usd lockstep). ⚠ DEMO-ONLY —
// this makes crypto floating ≠ true realized P&L; reset to 1 before wiring real B-Book (WT_DEMO off).
// House leverage cap per asset class — LOCKSTEP with the server (fx_open_margin.sql: FX 100, STOCK 5,
// CRYPTO 5). The client clamps the trader's chosen leverage to this cap so the DISPLAYED required
// margin == what the server will actually enforce; the server stays the real authority.
const LEV_CAP = (symbol)=> catOf(symbol)==='Forex' ? 100 : 5;   // Stocks & Crypto capped at 5×
// ── ONE source of truth for a position's live floating P&L + its current close price. Each
//    position marks against ITS OWN symbol's live quote and ITS OWN stored entry (open_price);
//    nothing is shared between rows, so N positions never copy each other's price/P&L. MT5 side
//    convention: a BUY closes at the BID, a SELL closes at the ASK (so a fresh trade shows the
//    spread as a small loss). q = the live {bid,ask} for p.symbol.
const closePx = (p, q)=> !q ? null : (sideUp(p.side)==='SELL' ? (q.ask==null?null:q.ask) : (q.bid==null?null:q.bid));
function positionPnL(p, q){
  if(p._demo && p.profit!=null) return +p.profit;                 // pinned demo-seed P/L
  const cur=closePx(p, q); if(cur==null) return 0;                // BUY→BID · SELL→ASK
  const dir=sideUp(p.side)==='SELL'?-1:1;
  return dir*(cur-(+p.open_price||cur))*lotsOf(p)*contractSize(p.symbol)*(p.symbol.includes('JPY')?0.0067:1);
}
const LEVERAGES = [10,50,100,500];
