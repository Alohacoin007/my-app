// base-currency → USD rate for margin conversion (MT5-standard). USD base = 1; USD quote
// = the pair price; a cross (EURJPY) uses the base's USD pair if the feed has it.
function baseUsdRate(symbol){
  const base=symbol.slice(0,3), quote=symbol.slice(3), px=priceStore.get(symbol);
  if(base==='USD') return 1;
  if(quote==='USD') return px? px.mid : 0;
  const b=priceStore.get(base+'USD'); if(b) return b.mid;
  const inv=priceStore.get('USD'+base); if(inv&&inv.mid) return 1/inv.mid;
  return px? px.mid : 0;   // best-effort fallback
}
// required margin (in USD account ccy) for a volume at a leverage — the MT5 formula.
function requiredMargin(symbol, volume, leverage){
  const lev=Math.max(1, Math.min(+leverage||100, LEV_CAP(symbol))); return (+volume||0)*contractSize(symbol)*baseUsdRate(symbol)/lev;   // leverage clamped to the house cap (server lockstep)
}

function useTradeEngine(){
  const [acct,setAcct]=React.useState(positionsStore.acct);
  const [pos,setPos]=React.useState(positionsStore.pos);
  const [leverage,setLeverageState]=React.useState(tradeSettings.leverage);
  const [tick,setTick]=React.useState(0);   // re-render on price ticks so margin figures stay live
  React.useEffect(()=> positionsStore.subscribe(s=>{ setAcct(s.acct); setPos([...s.pos]); }), []);
  React.useEffect(()=> tradeSettings.subscribe(setLeverageState), []);
  React.useEffect(()=> priceStore.subscribe(throttle(()=>setTick(t=>t+1),RENDER_MS)), []);   // live P&L/equity (mobile-throttled)
  const connected = !!(window.ALPEXA_TRADE_API);   // real execution endpoint present?
  const setLeverage = (n)=> tradeSettings.setLeverage(n);
  // ── leverage → real-time order affordability (all display; server stays the money owner) ──
  const floating = pos.reduce((s,p)=> s + positionPnL(p, priceStore.get(p.symbol)), 0);   // per-position, per-side (BID/ASK)
  const balance = acct?+acct.balance||0:0;
  const equity  = balance + floating;
  const usedMargin = pos.reduce((s,p)=> s + requiredMargin(p.symbol, lotsOf(p), leverage), 0);
  const freeMargin = equity - usedMargin;
  const marginFor  = (symbol, volume)=> requiredMargin(symbol, volume, leverage);
  const maxVolume  = (symbol)=>{ const one=requiredMargin(symbol, 1, leverage);
    return one>0 ? Math.max(0, Math.floor(freeMargin/one*100)/100) : 0; };   // lots affordable with free margin
  // B-BOOK ORDER EXECUTION — the client only CALLS the server; it never sets the fill
  // price, inserts a position, or moves balance. fx_open decides the entry price, enforces
  // the free-margin gate, and inserts the position server-side (idempotent by local_id).
  async function placeOrder({ symbol, side, volume, leverage:lev, requestedPrice, maxSlippage }){
    const size=+volume||0.01;
    const local_id='wt-'+Date.now()+'-'+Math.floor(Math.random()*1e6);
    // 1) external MT5 Web API (only if the operator wired one)
    if(window.ALPEXA_TRADE_API){
      try{ const r=await fetch(TRADE_API,{ method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ symbol, side, volume:size, leverage:+lev||undefined, local_id, ts:Date.now() }) });
        playSnd(r.ok? sndOpen : sndError);   // MT5 fill / reject sound
        return { ok:r.ok, status:r.status, local_id }; }catch(e){ playSnd(sndError); return { ok:false, reason:String(e) }; }
    }
    // 2) B-Book: our Supabase fx_open RPC (server-authoritative — it sets the fill price, enforces
    //    the free-margin gate + SLIPPAGE guard, inserts the position). We pass leverage (server
    //    CLAMPS to the house cap) plus the requested price + max slippage so a violent tick between
    //    click and arrival is REJECTED server-side. If the consolidated fn isn't deployed yet we
    //    transparently retry the base signature (slippage/leverage simply not enforced until then).
    if(!WT_DEMO && window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.me){   // WT_DEMO skips the server → falls through to the demo ledger (nothing hits admin)
      try{
        const base={ p_local_id:local_id, p_symbol:symbol, p_side:side, p_size:size };
        const full={ ...base,
          p_leverage:(lev?+lev:null),
          p_requested_price:(requestedPrice!=null?+requestedPrice:null),
          p_max_slippage:(maxSlippage!=null?+maxSlippage:null) };
        let r=await AlpexaSync.db.rpc('fx_open', full);
        if(r&&r.error && /PGRST202|could not find the function|does not exist|schema cache/i.test(((r.error&&r.error.message)||'')+((r.error&&r.error.code)||''))){
          r=await AlpexaSync.db.rpc('fx_open', lev ? { ...base, p_leverage:+lev } : base);   // pre-slippage deploy → older signature
        }
        const d=r&&r.data;
        if(r&&!r.error&&d&&d.ok){ positionsStore.loadPos(); playSnd(sndOpen);   // ← fx_open 성공 정확한 시점
          journalStore.log('Order filled — '+side.toUpperCase()+' '+size+' '+symbol+' @ '+d.open, 1);
          return { ok:true, server:true, open:d.open, margin:d.margin, local_id }; }
        playSnd(sndError);   // 슬리피지 초과(SLIPPAGE)/잔고부족(MARGIN)/RPC 에러 → 실패음(timeout.wav)
        const _rj=(d&&d.error)||(r&&r.error&&r.error.message)||'rejected';
        journalStore.log('Order rejected — '+side.toUpperCase()+' '+size+' '+symbol+': '+_rj, 0);
        return { ok:false, server:true, reason:_rj, code:(d&&d.code)||null };
      }catch(e){ playSnd(sndError); return { ok:false, server:true, reason:String(e&&e.message||e) }; }
    }
    // 3) logged out → caller may fall back to the demo ledger (no real money)
    return { ok:false, reason:'not_logged_in' };
  }
  // CLOSE — fx_close computes realized P&L server-side and banks it via settlements
  // (trg_settlement_balance → accounts.balance). The client never touches balance.
  async function closeOrder(localId){
    if(window.ALPEXA_TRADE_API){ try{ const r=await fetch(TRADE_API+'?close='+encodeURIComponent(localId),{method:'POST'}); playSnd(r.ok? sndClose : sndError); return {ok:r.ok}; }catch(e){ playSnd(sndError); return {ok:false,reason:String(e)}; } }
    if(!WT_DEMO && window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.me){   // WT_DEMO: demo rows close via removeDemo (see BottomBar) — never server
      try{ const r=await AlpexaSync.db.rpc('fx_close',{ p_local_id:localId });
        const d=r&&r.data;
        if(r&&!r.error&&d&&d.ok){ positionsStore.loadPos(); positionsStore.loadAcct(); playSnd(sndClose);   // ← fx_close 완공
          journalStore.log('Position closed — '+localId+'  P&L '+(d.pnl!=null?(+d.pnl).toFixed(2):'—'), (d.pnl==null||d.pnl>=0)?1:0);
          return { ok:true, pnl:d.pnl }; }
        playSnd(sndError);
        return { ok:false, reason:(d&&d.error)||'close failed' };
      }catch(e){ playSnd(sndError); return { ok:false, reason:String(e&&e.message||e) }; }
    }
    return { ok:false, reason:'not_logged_in' };
  }
  return { acct, pos, connected, placeOrder, closeOrder, TRADE_API,
    leverage, setLeverage, balance, equity, floating, usedMargin, freeMargin, marginFor, maxVolume };
}

function OrderBox({ symbol }){
  const [m,setM]=React.useState(priceStore.get(symbol)||{});
  const [vol,setVol]=React.useState('0.10');   // one-click starts at 0.1 lot (min 0.1)
  const prevBid=React.useRef(null);
  const oboxEl=React.useRef(null);             // .obox DOM node (MT5 direction-skin target)
  const eng=useTradeEngine();
  const [busy,setBusy]=React.useState(null);   // null | 'sell' | 'buy' — ECN 처리중 상태(렌더용)
  const [flashOk,setFlashOk]=React.useState(false); // 체결 성공 순간 패널 플래시
  const busyRef=React.useRef(null);            // 동기 레이스 가드(state는 비동기라 클릭 중복 못 막음)
  // MT5 direction skin — pure DOM (no re-render): the WHOLE panel turns blue on an up-tick,
  // red on a down-tick, and KEEPS the colour until the direction flips (sticky, like MT5's
  // one-click widget). Idempotent per direction so a run of same-way ticks does zero DOM work.
  const paint=(el,dir)=>{ if(!el||el._dir===dir) return; el._dir=dir;
    el.classList.remove('tick-up','tick-down'); el.classList.add(dir); };
  React.useEffect(()=> priceStore.subscribe(throttle(mids=>{ const q=mids[symbol]||{}; setM({...q});
    if(q.bid!=null){ const p=prevBid.current;
      if(p!=null && q.bid!==p) paint(oboxEl.current, q.bid>p?'tick-up':'tick-down');   // flat tick → keep colour
      prevBid.current=q.bid; }
  }, 400)), [symbol]);
  const sellCls = 'oc-sell';   // fixed red-neon skin; the tick drives the 160ms digit flash above (glow = hover only)
  const buyCls  = 'oc-buy';    // fixed blue-neon skin
  const open=marketOpen(symbol);   // session gate — closed → BUY/SELL locked, order refused
  const tradable = open && eng.freeMargin>0;   // free-margin gate — no free margin → lock BUY/SELL
  const send=async(side)=>{
    if(!marketOpen(symbol)){ playSnd(sndError); alert(t('Market closed')); return; }   // reject before any RPC — 뚜엑
    const need=eng.marginFor(symbol, +vol||0.1);     // margin this order would lock
    if(eng.freeMargin<=0 || need>eng.freeMargin+1e-9){ playSnd(sndError); alert(t('Margin Call — insufficient free margin')); return; }   // 증거금 부족 → 거절
    if(busyRef.current) return;                       // debounce — 한 번에 한 주문만(레이스/이중발사 차단)
    busyRef.current=side; setBusy(side);
    const q=priceStore.get(symbol)||m; const price=side==='buy'?q.ask:q.bid;   // the quote the trader is looking at = requested price
    const maxSlip=SLIP_PIPS*pip(symbol);   // adverse-deviation tolerance passed to the server slippage guard
    // ── ECN 오더 샌드박스: LP 왕복 지연(250~550ms)을 RPC 발사 '앞단'에만 시뮬레이션 ──
    const lat=250+Math.floor(Math.random()*301);      // 250..550 ms
    await new Promise(res=>setTimeout(res,lat));
    let r; try{ r=await eng.placeOrder({ symbol, side, volume:vol, leverage:eng.leverage, requestedPrice:price, maxSlippage:maxSlip }); }  // one-click B-Book (+slippage)
    catch(e){ r={ok:false,reason:'error'}; }
    if(!r||!r.ok){
      // PRODUCTION: no client demo fill. A server rejection (slippage/margin/rpc) already fired
      // sndError; logged-out just prompts login. The demo ledger path is CLOSED (#5: server owns money).
      if(r&&r.reason==='not_logged_in'){ playSnd(sndError); alert(t('Please log in to trade')); }
      else { const rs=(r&&(r.reason||r.code))||'unknown'; console.warn('one-click order rejected:', rs); alert(t('Order rejected')+': '+rs); }   // show WHY (server reason) — sndError already fired

          <b className="up" onMouseDown={(e)=>{e.stopPropagation();hold(1);}} onMouseUp={release} onMouseLeave={release} onTouchStart={(e)=>{e.preventDefault();hold(1);}} onTouchEnd={release} title="+0.01 (hold to speed up)">▲</b>
        </div>
        <div className={"oc-lbl "+buyCls+(busyBuy?' oc-busy':'')} title="Buy at Ask" onClick={(e)=>{e.stopPropagation();send('buy');}}>BUY</div>
      </div>
      <div className="oc-bot">
        <div className={"oc-price "+sellCls+(busySell?' oc-busy':'')} title="Sell at Bid" onClick={(e)=>{e.stopPropagation();send('sell');}}><BigFig symbol={symbol} v={m.bid} />{busySell&&<span className="oc-spin" aria-hidden="true"></span>}</div>
        <div className={"oc-price "+buyCls+(busyBuy?' oc-busy':'')} title="Buy at Ask" onClick={(e)=>{e.stopPropagation();send('buy');}}><BigFig symbol={symbol} v={m.ask} />{busyBuy&&<span className="oc-spin" aria-hidden="true"></span>}</div>
      </div>
      {m.bid!=null&&m.ask!=null&&(()=>{   // live spread pill — same per-row DISPLAYED-price reading as the MW table
        const d=Math.abs(parseFloat(fmtPx(symbol,m.ask))-parseFloat(fmtPx(symbol,m.bid)));
        return <div className="oc-spr">{sprText(symbol,d)}</div>; })()}
    </div>
  );
}

// build the main price series for a chart in the requested MT5 chart type
function makePriceSeries(c, type, sym){
  // FX/crypto precision: Y-axis + price-line axis labels show FULL 5 digits (JPY 3), never
  // the library default precision:2 (that was the "1.41" truncation). minMove = 10^-precision.
  const d=sym?digits(sym):5;
  const pf={ type:'price', precision:d, minMove:Math.pow(10,-d) };
  if(type==='line'){
    const o={ color:'#e8b23a', lineWidth:2, priceLineVisible:false, lastValueVisible:true, priceFormat:pf };
    return c.addLineSeries ? c.addLineSeries(o) : c.addSeries(LightweightCharts.LineSeries, o);
  }
  if(type==='bar'){
    const o={ upColor:'#00ff00', downColor:'#ff2020', thinBars:false, priceFormat:pf };
    return c.addBarSeries ? c.addBarSeries(o) : c.addSeries(LightweightCharts.BarSeries, o);
  }
  const ct=CANDLE_THEME[themeBus.theme]||CANDLE_THEME.dark;   // up=green hollow, down=red filled
  const o={ upColor:ct.upBody, downColor:ct.downBody, wickUpColor:ct.upLine, wickDownColor:ct.downLine,
    borderUpColor:ct.upLine, borderDownColor:ct.downLine, borderVisible:true, priceFormat:pf,
    priceLineColor: themeBus.theme==='light' ? '#5a6472' : '' };   // LEGEND: mute the current-price line to grey (was loud red)
  return c.addCandlestickSeries ? c.addCandlestickSeries(o) : c.addSeries(LightweightCharts.CandlestickSeries, o);
}

// pixel distance from point to a line segment (trend-line hit-test)
function distSeg(px,py,x1,y1,x2,y2){ const dx=x2-x1,dy=y2-y1,L2=dx*dx+dy*dy;
  let t=L2? ((px-x1)*dx+(py-y1)*dy)/L2 : 0; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy)); }

    const NEON='#ff1a1a';   // 네온 빨강 추세선
    const killPreview=()=>{ if(previewLine.current){ try{ chart.current.removeSeries(previewLine.current); }catch(_){} previewLine.current=null; }
      if(previewFib.current.length){ previewFib.current.forEach(pl=>{ try{ series.current.removePriceLine(pl); }catch(_){} }); previewFib.current=[]; }
      if(startPt.current){ try{ startPt.current.remove(); }catch(_){} startPt.current=null; } };
    // live preview while dragging: trend = rubber-band line; fib = the level lines follow the cursor
    const onMoveDraw=(e)=>{ const d=dragDraw.current; if(!d||(d.tool!=='trend'&&d.tool!=='fib')) return;
      const c=chart.current, s=series.current; if(!c||!s) return; const [x,y]=xy(e);
      let t2=null,p2=null; try{ t2=c.timeScale().coordinateToTime(x); p2=s.coordinateToPrice(y); }catch(_){}
      if(t2==null||p2==null||d.time==null||d.price==null) return;
      if(d.tool==='fib'){ const hi=Math.max(d.price,p2), lo=Math.min(d.price,p2);
        // base diagonal line ATTACHED to the start point, following the cursor (MT5)
        const bp=[{time:d.time,value:d.price},{time:t2,value:p2}].sort((a,b)=>a.time-b.time);
        if(bp[0].time!==bp[1].time){
          if(!previewLine.current){ try{ previewLine.current = c.addLineSeries
            ? c.addLineSeries({color:NEON,lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false})
            : c.addSeries(LightweightCharts.LineSeries,{color:NEON,lineWidth:1}); }catch(_){} }
          try{ previewLine.current.setData(bp); }catch(_){} }
        if(!previewFib.current.length){ FIB_LV.forEach((L,i)=>{ try{ previewFib.current.push(
          s.createPriceLine({price:lo+(hi-lo)*L,color:FIB_COL[i],lineWidth:1,lineStyle:2,axisLabelVisible:true,title:(L*100).toFixed(1)+'%'})); }catch(_){} }); }
        else { previewFib.current.forEach((pl,i)=>{ try{ pl.applyOptions({price:lo+(hi-lo)*FIB_LV[i]}); }catch(_){} }); }
        return; }
      const pts=[{time:d.time,value:d.price},{time:t2,value:p2}].sort((a,b)=>a.time-b.time);
      if(pts[0].time===pts[1].time) return;
      if(!previewLine.current){ try{ previewLine.current = c.addLineSeries
        ? c.addLineSeries({color:NEON,lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false})
        : c.addSeries(LightweightCharts.LineSeries,{color:NEON,lineWidth:1}); }catch(_){} }
      try{ previewLine.current.setData(pts); }catch(_){} };
    const onUp=(e)=>{ const d=dragDraw.current; if(!d) return; dragDraw.current=null;
      const c=chart.current, s=series.current; if(!c||!s){ killPreview(); return; } const [x,y]=xy(e);
      let t2=null,p2=null; try{ t2=c.timeScale().coordinateToTime(x); p2=s.coordinateToPrice(y); }catch(e){}
      killPreview();
      if(d.time==null||d.price==null||t2==null||p2==null) return;
      if(d.tool==='trend'){ const pts=[{time:d.time,value:d.price},{time:t2,value:p2}].sort((a,b)=>a.time-b.time);
        if(pts[0].time===pts[1].time) return;
        try{ const ls=c.addLineSeries?c.addLineSeries({color:NEON,lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false})
                                     :c.addSeries(LightweightCharts.LineSeries,{color:NEON,lineWidth:1}); ls.setData(pts);
          const ent={kind:'t',ls,pts,w0:1}; drawSeries.current.push(ent);
          drawStack.current.push(()=>{ try{c.removeSeries(ls);}catch(e){} drawSeries.current=drawSeries.current.filter(x=>x!==ent); }); }catch(e){} }
      else if(d.tool==='fib'){ const pts=[{time:d.time,value:d.price},{time:t2,value:p2}].sort((a,b)=>a.time-b.time);
        if(pts[0].time===pts[1].time) return;
        const hi=Math.max(d.price,p2), lo=Math.min(d.price,p2);
        try{ const ls=c.addLineSeries?c.addLineSeries({color:NEON,lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false})   // base diagonal
                                     :c.addSeries(LightweightCharts.LineSeries,{color:NEON,lineWidth:1}); ls.setData(pts);
          const levels=[]; FIB_LV.forEach((L,i)=>{ try{ levels.push(s.createPriceLine({price:lo+(hi-lo)*L,color:FIB_COL[i],lineWidth:1,lineStyle:2,axisLabelVisible:true,title:(L*100).toFixed(1)+'%'})); }catch(_){} });
          const ent={kind:'f',ls,levels,pts,w0:1}; drawSeries.current.push(ent);   // ONE grouped fib object (base + levels)
          drawStack.current.push(()=>{ try{c.removeSeries(ls);}catch(_){} levels.forEach(pl=>{try{s.removePriceLine(pl);}catch(_){}}); drawSeries.current=drawSeries.current.filter(x=>x!==ent); }); }catch(e){} }
      terminalBus.emit('chart.tool', null);   // MT5: object placed → auto-revert to cursor so you can click-select it
    };
    const onKey=(e)=>{
      if(!activeRef.current) return;
      if(/INPUT|SELECT|TEXTAREA/.test((e.target&&e.target.tagName)||'')) return;   // don't hijack form typing
      if((e.ctrlKey||e.metaKey) && (e.key==='z'||e.key==='Z')){ e.preventDefault(); undoDraw(); return; }

    };
    el.addEventListener('mousedown',onDown); el.addEventListener('mousemove',onMoveDraw);
    document.addEventListener('mouseup',onUp); document.addEventListener('keydown',onKey);
    return ()=>{ el.removeEventListener('mousedown',onDown); el.removeEventListener('mousemove',onMoveDraw);
      document.removeEventListener('mouseup',onUp); document.removeEventListener('keydown',onKey); };
  }, [posOverlays]);

  // ── ORDER PRICE LINE (🔴 most important): redraw green dotted lines whenever this
  //    symbol's open positions change. One createPriceLine per position at its open_price.
  React.useEffect(()=>{
    const draw=(store)=>{
      const s=series.current; if(!s||!s.createPriceLine) return;

        const col=sideUp(p.side)==='SELL'?'#ff2020':'#00ff00';   // SELL=red, BUY=green (colour carries the side)
        try{ lines.current.push(s.createPriceLine({ price, color:col, lineWidth:1,
          lineStyle:DOT, axisLabelVisible:true, title:'' })); }catch(e){}   // price-only tag (no "BUY 0.01") so it doesn't cover the candles
      });
      setPosLbl(mine.map(p=>({ side:sideUp(p.side), lots:lotsOf(p), price:+p.open_price })));
    };
    return positionsStore.subscribe(draw);
  }, [symbol, tf, lazyHold, hydrated]);   // redraw the position lines when the chart/series is recreated (tf change) — else they vanish

  const [cmenu,setCmenu]=React.useState(null);   // chart right-click menu {x,y}
  const [delMenu,setDelMenu]=React.useState(null);   // selected-drawing Delete popup {x,y}
  const [showOC,setShowOC]=React.useState(true);   // per-window One-Click panel visibility (right-click toggle)
  // (right-click is handled by a capture-phase native listener on the chart box — see the chart

  return (
    <div className={"win"+(isActive?' active':'')+(tiled?' tiled':'')} ref={win} style={tiled?null:{zIndex:z}} onMouseDown={focus}
      onDragOver={(e)=>{ if((e.dataTransfer.types||[]).indexOf('text/mwsymbol')>=0){ e.preventDefault(); e.dataTransfer.dropEffect='copy'; win.current&&win.current.classList.add('dropok'); } }}
      onDragLeave={()=>{ win.current&&win.current.classList.remove('dropok'); }}
      onDrop={(e)=>{ win.current&&win.current.classList.remove('dropok'); const s=e.dataTransfer.getData('text/mwsymbol'); if(s && WATCH.indexOf(s)>=0){ e.preventDefault(); onActivate&&onActivate(idx); onSymbol&&onSymbol(idx, s); } }}>
      <div className="cell-title" onMouseDown={(e)=>beginDrag(e,'move')}>

          <svg viewBox="0 0 24 24" fill="none" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M8 21V6M8 6l-3 3M8 6l3 3" stroke="#e23a2d"/><path d="M16 3v15M16 18l-3-3M16 18l3-3" stroke="#2f6fd6"/></svg>
        </span>

        {(ohlc && ohlc.o!=null)   /* hover → OHLC in the header (replaces the position label, never covers the candles) */
          ? <span className="hdr-ohlc">O {fmtPx(symbol,ohlc.o)}  H {fmtPx(symbol,ohlc.h)}  L {fmtPx(symbol,ohlc.l)}  C {fmtPx(symbol,ohlc.c)}</span>
          : (posLbl.length>0 && (()=>{ const net=posLbl.reduce((s,p)=>s+(p.side==='SELL'?-1:1)*p.lots,0);
              const one=posLbl.length===1; const col=one?(posLbl[0].side==='SELL'?'#ff2020':'#00c800'):undefined;  // SELL=red, BUY=green
              return <span className="poslbl" style={col?{color:col}:null}>{one

        <span className="wc">

        {lazyHold && <div onClick={()=>onActivate&&onActivate(idx)} title="Tap to load chart"
          style={{position:'absolute',inset:0,zIndex:2,display:'flex',alignItems:'center',justifyContent:'center',
            background:'#000',color:'#5a6472',font:'12px -apple-system,Segoe UI,sans-serif',cursor:'pointer'}}>Tap to load chart</div>}

      {delMenu && <DrawMenu x={delMenu.x} y={delMenu.y}

/* ── Market watch: reads the shared store (fan-out), click to swap a grid symbol ── */
// MT5 Market-Watch right-click menu — the classic desktop-terminal sub-menu (exact order).
const MW_MENU=[
  {l:'Forex', act:'cat', arg:'Forex'},   // ── class filter (show only this asset class) ──
  {l:'Stocks', act:'cat', arg:'Stocks'},
  {l:'Crypto', act:'cat', arg:'Crypto'},
  {l:'All Symbols', act:'cat', arg:'All'},
  {sep:1},
  {l:'Spread', act:'spread'},            // toggle a live Spread column (all symbols)
  {sep:1},
  {l:'New Chart', act:'chart'},          // → addChart (tile-aware multi-chart)
  {l:'New Order', act:'order'},          // → order.new popup for this symbol
  {sep:1},
  {l:'Hide', act:'hide'},                // hide this symbol row (memory-only, no storage)
  {l:'Show All', act:'showall'},         // restore every hidden symbol
];
function ContextMenu({ x, y, sym, cat, spread, onClose, onPick, onHide, onShowAll, onCat, onSpread }){
  React.useEffect(()=>{ const close=()=>onClose(); const k=(e)=>{ if(e.key==='Escape') onClose(); };
    // Attach outside-close on the NEXT tick — otherwise the SAME right-click that OPENED the menu
    // (its contextmenu/mousedown still bubbling to document) instantly closes it → menu never shows.
    const id=setTimeout(()=>{ document.addEventListener('mousedown',close); }, 0);
    document.addEventListener('keydown',k);
    return ()=>{ clearTimeout(id); document.removeEventListener('mousedown',close); document.removeEventListener('keydown',k); }; }, [onClose]);
  const run=(it)=>{ if(it.dis||it.sep) return;
    if(it.act==='cat') onCat&&onCat(it.arg);                       // class filter (Forex/Stocks/Crypto/All)
    else if(it.act==='spread') onSpread&&onSpread();               // toggle the Spread column
    else if(it.act==='chart') onPick&&onPick(sym);                 // New Chart → tile-aware chart of THIS symbol
    else if(it.act==='order') terminalBus.emit('order.new', sym);  // New Order → popup for THIS symbol
    else if(it.act==='hide') onHide&&onHide(sym);                  // Hide → drop the row (client display only)
    else if(it.act==='showall') onShowAll&&onShowAll();            // Show All → restore hidden rows
    onClose();
  };
  const style={ left:Math.min(x, window.innerWidth-190), top:Math.min(y, window.innerHeight-260) };
  const on=(it)=> (it.act==='cat' && (it.arg||'')===(cat||'All')) || (it.act==='spread' && spread);   // active class / spread-on → ✓
  return (
    <div className="mt5-context-menu" style={style} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} onContextMenu={e=>{e.preventDefault();e.stopPropagation();}}>
      {MW_MENU.map((it,i)=> it.sep ? <div key={i} className="mt5-sep"></div> : (
        <div key={i} className={"mt5-mi"+(it.dis?' dis':'')+(on(it)?' ck':'')} onClick={()=>run(it)}>{on(it)?'✓ ':''}{t(it.l)}</div>
      ))}
    </div>
  );
}
/* reusable seeded tick chart (Market Watch Ticks tab) — full density + time axis */
function TickChart({ symbol }){
  const box=React.useRef(null);
  React.useEffect(()=>{
    if(!window.LightweightCharts || !box.current) return;
    const DOT=(window.LightweightCharts&&LightweightCharts.LineStyle&&LightweightCharts.LineStyle.Dotted)!=null?LightweightCharts.LineStyle.Dotted:1;
    const th=CHART_THEME[themeBus.theme]||CHART_THEME.dark, legend=themeBus.theme==='light';   // follow the terminal theme
    const c=LightweightCharts.createChart(box.current, {
      layout:{ background:{color:th.bg}, textColor:th.text, fontSize:10, fontFamily:"Consolas,'Courier New',monospace" },
      grid:{ vertLines:{color:th.grid, style:DOT}, horzLines:{color:th.grid, style:DOT} },
      timeScale:{ visible:true, timeVisible:true, secondsVisible:false, borderColor:th.border, rightOffset:2, barSpacing:3 },
      rightPriceScale:{ borderColor:th.border }, crosshair:{ mode:0 }, handleScroll:false, handleScale:false });
    c.resize(box.current.clientWidth, box.current.clientHeight);
    const STEP=(window.LightweightCharts&&LightweightCharts.LineType&&LightweightCharts.LineType.WithSteps)!=null?LightweightCharts.LineType.WithSteps:0;
    const mk=(color)=> c.addLineSeries ? c.addLineSeries({color,lineWidth:1,lineType:STEP,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false})
                                       : c.addSeries(LightweightCharts.LineSeries,{color,lineWidth:1,lineType:STEP,priceLineVisible:false,lastValueVisible:true});
    const ask=mk(legend?'#FF453A':'#d13438'), bid=mk(legend?'#00FF55':'#2f6ec0');   // Legend: ask red / bid green
    const N=220, STEPT=2, q0=priceStore.get(symbol)||{}, pv=pip(symbol);
    let m0=q0.mid||((q0.ask+q0.bid)/2)||BASE[symbol]||1; const half=Math.max(pv/2,((q0.ask-q0.bid)/2)||pv/2);
    const t0=Math.floor(Date.now()/1000)-N*STEPT, seedA=[],seedB=[]; let m=m0-(Math.random()*pv*10);
    for(let i=0;i<N;i++){ m+=(Math.random()-0.5)*pv*3; const t=t0+i*STEPT; seedA.push({time:t,value:m+half}); seedB.push({time:t,value:m-half}); }
    if(q0.ask) seedA[N-1].value=q0.ask; if(q0.bid) seedB[N-1].value=q0.bid;
    const buf={ t:t0+N*STEPT, ask:seedA, bid:seedB };
    try{ ask.setData(seedA); bid.setData(seedB); c.timeScale().fitContent(); }catch(e){}
    const onTick=throttle((mids)=>{ const q=mids[symbol]; if(!q) return; buf.t+=STEPT;
      buf.ask.push({time:buf.t,value:q.ask}); buf.bid.push({time:buf.t,value:q.bid});
      if(buf.ask.length>N){ buf.ask.shift(); buf.bid.shift(); }
      try{ ask.setData(buf.ask); bid.setData(buf.bid); c.timeScale().fitContent(); }catch(e){}   // keep it full-width
    }, 220);
    const un=priceStore.subscribe(onTick);
    const onR=()=>{ try{ c.resize(box.current.clientWidth, box.current.clientHeight); c.timeScale().fitContent(); }catch(e){} };
    window.addEventListener('resize',onR);
    const raf=requestAnimationFrame(onR);   // re-fit once the container has real width
    return ()=>{ un(); window.removeEventListener('resize',onR); cancelAnimationFrame(raf); try{c.remove();}catch(e){} };
  }, [symbol]);
  return <div className="mwtick" ref={box}></div>;
}
/* Market Watch → Details tab: Bid/Ask + session Hi/Lo + Open/Close for the selected symbol */
function MWDetails({ sym }){

function ExposureTab({ pos, mids, equity, leverage }){
  // aggregate per symbol into long/short lots so a HEDGED book (buy 0.01 + sell 0.01) still shows:
  // Net = long−short (can be 0 = Flat), but Notional/Margin are GROSS (both legs) — the capital really
  // at work, matching the bottom bar's margin. Any symbol with an open position renders (net 0 or not).
  const agg={}; pos.forEach(p=>{ const s=p.symbol, lots=lotsOf(p); const a=agg[s]||(agg[s]={long:0,short:0});
    if(sideUp(p.side)==='SELL') a.short+=lots; else a.long+=lots; });
  const rows=Object.keys(agg).filter(s=>(agg[s].long+agg[s].short)>1e-9);
  const num=(n)=>(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const net=(s)=> agg[s].long-agg[s].short;                  // signed net volume (0 → fully hedged)
  const gross=(s)=> agg[s].long+agg[s].short;                // GROSS lots = real exposure / capital at work
  const notl=(s)=> gross(s)*contractSize(s)*baseUsdRate(s);  // full market value of BOTH legs
  const marg=(s)=> requiredMargin(s, gross(s), leverage);    // margin locked by BOTH legs (matches the bottom bar)
  const totN=rows.reduce((a,s)=>a+notl(s),0), totM=rows.reduce((a,s)=>a+marg(s),0), eq=+equity||0;
  return (
    <div className="postbl"><table className="pos">
      <thead><tr><th>Symbol</th><th>Net Volume</th><th>Direction</th><th>Notional (USD)</th><th>Margin (USD)</th><th>% of Equity</th></tr></thead>
      <tbody>
        {!rows.length && <tr><td className="empty" colSpan="6">No open exposure</td></tr>}
        {rows.map(s=>{ const v=net(s), mg=marg(s), flat=Math.abs(v)<1e-9, cls=flat?'':(v>0?'up':'down');
          return (<tr key={s}><td>{s.toLowerCase()}{sfx(s).toLowerCase()}</td><td className={cls}>{v.toFixed(2)}</td>
            <td className={cls}>{flat?'Flat (hedged)':(v>0?'Long':'Short')}</td>
            <td>{num(notl(s))}</td><td>{num(mg)}</td><td>{eq>0?(mg/eq*100).toFixed(2)+' %':'—'}</td></tr>); })}
      </tbody>
      {rows.length>0 && <tfoot><tr className="acctrow"><td colSpan="6"><div className="acctline">
        <span><span className="k">Notional:</span> <b>{num(totN)} USD</b></span>
        <span><span className="k">{t('Margin')}:</span> <b>{num(totM)}</b></span>
        <span><span className="k">{t('Equity')}:</span> <b>{num(eq)}</b></span>
        <span><span className="k">Margin used:</span> <b>{eq>0?(totM/eq*100).toFixed(2)+' %':'—'}</b></span>
      </div></td></tr></tfoot>}
    </table></div>
  );
}

// ── Price alerts (Alerts tab). UI data ONLY → localStorage is allowed (#5: settings OK, money
//    forbidden). The engine rides the ONE priceStore subscription; a hit fires ONCE (disarms),
//    logs to the Journal and rings the close-bell. No server writes, no money touched. ──
const alertHit=(a,mid)=> a.cond==='>=' ? mid>=+a.px : mid<=+a.px;
const alertsStore={
  list:(()=>{ try{ return JSON.parse(localStorage.getItem('alpexa.alerts')||'[]'); }catch(e){ return []; } })(),
  listeners:new Set(), timer:null,
  save(){ try{ localStorage.setItem('alpexa.alerts', JSON.stringify(this.list)); }catch(e){}
    this.listeners.forEach(fn=>{ try{ fn(this.list.slice()); }catch(e){} }); },
  add(sym,cond,px){ this.list.push({ id:Date.now()+'-'+Math.floor(Math.random()*1e4), sym, cond, px:+px, armed:true, hitAt:null }); this.save(); this.start(); },
  remove(id){ this.list=this.list.filter(a=>a.id!==id); this.save(); },
  subscribe(fn){ this.listeners.add(fn); fn(this.list.slice()); return ()=>this.listeners.delete(fn); },
  start(){ if(this.timer) return;
    this.timer=priceStore.subscribe(throttle((mids)=>{
      let hit=false;
      this.list.forEach(a=>{ if(!a.armed) return; const m=mids[a.sym]; if(!m||!(m.mid>0)) return;
        if(alertHit(a,m.mid)){ a.armed=false; a.hitAt=Date.now(); hit=true;
          journalStore.log('Alert — '+a.sym+' '+a.cond+' '+a.px+' hit @ '+fmtPx(a.sym,m.mid), 1); } });
      if(hit){ playSnd(sndClose); this.save(); }
    },1000)); },
};

/* ── Modify Position (SL/TP) — MT5-style. Accepts a PRICE (1.1400) or PIPS (no decimal / small
   number → offset from entry). Validates the side (BUY: SL below current, TP above; SELL: reverse).
   Saves via the fx_modify RPC (server writes meta.sl/tp + the stop-out cron enforces it). If the RPC
   isn't deployed yet, the dialog shows a safe "server deploy pending" note instead of failing. ── */
function ModifyPos({ p, onClose }){
  const symbol=p.symbol, d=digits(symbol), pv=pip(symbol);
  const isBuy=sideUp(p.side)!=='SELL', entry=+p.open_price||0;
  const [m,setM]=React.useState(priceStore.get(symbol)||{});
  React.useEffect(()=> priceStore.subscribe(throttle(mids=>{ const q=mids[symbol]; if(q) setM({...q}); }, 400)), [symbol]);
  const cur = isBuy ? (m.bid!=null?m.bid:entry) : (m.ask!=null?m.ask:entry);   // BUY closes at BID, SELL at ASK
  const meta=p.meta||{};
  const [sl,setSl]=React.useState(meta.sl!=null?String(+meta.sl):'');
  const [tp,setTp]=React.useState(meta.tp!=null?String(+meta.tp):'');
  const [busy,setBusy]=React.useState(false), [note,setNote]=React.useState('');
  React.useEffect(()=>{ const k=(e)=>{ if(e.key==='Escape') onClose(); }; document.addEventListener('keydown',k); return ()=>document.removeEventListener('keydown',k); }, [onClose]);
  // price-or-pips → absolute target price (null = cleared)
  const toPx=(val,isTp)=>{ if(val===''||val==null) return null; const x=Math.abs(parseFloat(String(val).trim())); if(isNaN(x)||x===0) return null;
    const isPip = !String(val).includes('.') || x < entry*0.5;                 // no decimal OR tiny → pips
    if(!isPip) return x;
    const off=x*pv; return isTp ? (isBuy?entry+off:entry-off) : (isBuy?entry-off:entry+off); };
  const slPx=toPx(sl,false), tpPx=toPx(tp,true);
  const slBad = slPx!=null && (isBuy ? slPx>=cur : slPx<=cur);                 // SL on the wrong side of the market
  const tpBad = tpPx!=null && (isBuy ? tpPx<=cur : tpPx>=cur);                 // TP on the wrong side
  const bad = slBad||tpBad;
  const save=async()=>{
    if(bad) return; setBusy(true); setNote('');
    try{
      const r=await AlpexaSync.db.rpc('fx_modify',{ p_local_id:p.local_id,
        p_sl:(slPx!=null?+(+slPx).toFixed(d):null), p_tp:(tpPx!=null?+(+tpPx).toFixed(d):null) });
      if(r&&r.error){ const msg=((r.error&&r.error.message)||'')+((r.error&&r.error.code)||'');
        if(/PGRST202|could not find|does not exist|schema cache/i.test(msg)){ playSnd(sndError); setNote(t('SL/TP not enabled yet (server deploy pending)')); }
        else { playSnd(sndError); setNote('Failed: '+((r.error&&r.error.message)||'error')); }
        setBusy(false); return; }
      const dd=r&&r.data; if(dd&&dd.ok===false){ playSnd(sndError); setNote('Rejected: '+(dd.error||'')); setBusy(false); return; }
      journalStore.log('SL/TP modified — '+symbol+(slPx!=null?'  SL '+fmtPx(symbol,slPx):'')+(tpPx!=null?'  TP '+fmtPx(symbol,tpPx):''), 1);
      positionsStore.loadPos(); playSnd(sndOpen); onClose();
    }catch(e){ playSnd(sndError); setNote('Failed'); setBusy(false); }
  };
  return (
    <div className="omodal-ov" onMouseDown={onClose}>
      <div className="mpos" onMouseDown={e=>e.stopPropagation()}>
        <div className="obar"><div className="t">{t('Modify')} — {symbol}{sfx(symbol)}</div><span className="wb x" onClick={onClose}>✕</span></div>
        <div className="mpos-body">
          <div className="mpos-row"><span>{sideUp(p.side).toLowerCase()} {lotsOf(p).toFixed(2)}</span><span>{t('Price')} <b>{fmtPx(symbol,entry)}</b></span><span>{fmtPx(symbol,cur)}</span></div>
          <div className="om-field"><label>{t('Stop Loss')}</label>
            <input value={sl} onChange={e=>setSl(e.target.value)} placeholder="price / pips" className={slBad?'bad':''} autoFocus />
            <span className="mpos-tp">{slPx!=null?('→ '+fmtPx(symbol,slPx)):''}</span></div>
          <div className="om-field"><label>{t('Take Profit')}</label>
            <input value={tp} onChange={e=>setTp(e.target.value)} placeholder="price / pips" className={tpBad?'bad':''} />
            <span className="mpos-tp">{tpPx!=null?('→ '+fmtPx(symbol,tpPx)):''}</span></div>
          {bad && <div className="mpos-err">⚠ {isBuy ? 'SL must be below and TP above the current price' : 'SL must be above and TP below the current price'}</div>}
          {note && <div className="mpos-note">{note}</div>}
          <div className="om-btns"><button className="om-buy" disabled={busy||bad} onClick={save}>{busy?'…':t('Modify')}</button></div>
        </div>
      </div>
    </div>
  );
}
// VIRTUAL WINDOWING — render only the visible slice of a long list (History/Journal) so the DOM holds
// ~a screenful of rows no matter how many are loaded. onScroll tracks scrollTop → [start,end); spacer
// rows above/below preserve the true scroll height. onEnd fires near the bottom (→ chunk-page more).
function useVirtual(total, rowH, onEnd){
  const [range,setRange]=React.useState({start:0,end:40});
  const onScroll=(e)=>{ const el=e.currentTarget, st=el.scrollTop;
    const start=Math.max(0, Math.floor(st/rowH)-8);
    setRange({start, end:start+40});
    if(onEnd && el.scrollHeight-st-el.clientHeight < 240) onEnd();   // within ~240px of the bottom → page
  };
  const start=Math.min(range.start, Math.max(0,total)), end=Math.min(range.end, total);
  return { start, end, topH:start*rowH, botH:Math.max(0,(total-end)*rowH), onScroll };
}
function BottomBar({ onResize, tab }){   // `tab` is owned by App now (the full-width tab bar lives at screen bottom)
  const [acct,setAcct]=React.useState(positionsStore.acct);
  const [pos,setPos]=React.useState(positionsStore.pos);
  const [hist,setHist]=React.useState(positionsStore.history);
  const [modifyP,setModifyP]=React.useState(null);   // position being SL/TP-modified (double-click a S/L or T/P cell)
  const [histPeriod,setHistPeriod]=React.useState('all');   // MT5 History period filter
  const [histFrom,setHistFrom]=React.useState('');
  const [histTo,setHistTo]=React.useState('');
  const [mids,setMids]=React.useState({});
  const [leverage,setLev]=React.useState(tradeSettings.leverage);
  const eng=useTradeEngine();
  React.useEffect(()=> positionsStore.subscribe(s=>{ setAcct(s.acct); setPos([...s.pos]); setHist([...s.history]); }), []);
  React.useEffect(()=> priceStore.subscribe(throttle(m=>setMids({...m}),RENDER_MS)), []);   // live P&L (mobile-throttled)
  React.useEffect(()=> tradeSettings.subscribe(setLev), []);   // margin/level track the chosen leverage
  const closePos=async(p)=>{
    if(p._demo){ const m=mids[p.symbol]||{}; positionsStore.recordClose(p, closePx(p,m)||m.mid, plOf(p));   // log the closed deal (per-side close px) → History tab
      positionsStore.removeDemo(p.local_id); playSnd(sndClose); return; }   // demo row → drop it (+청산음)
    const m=mids[p.symbol]||{}; const pl=plOf(p);
    const r=await eng.closeOrder(p.local_id);                            // real → fx_close banks P&L server-side
    if(!r.ok){ alert('Close failed: '+(r.reason||'unknown')); return; }
    positionsStore.recordClose(p, closePx(p,m)||m.mid, pl);              // realized (per-side close px) → History tab
  };

  // floating P&L — the SAME per-position, per-side helper the engine uses (BUY→BID, SELL→ASK).
  // Each row marks against its own symbol quote + its own entry; no shared/copied state.
  const plOf=(p)=> positionPnL(p, mids[p.symbol]);
  const floating = pos.reduce((s,p)=> s+plOf(p), 0);
  const balance=acct?+acct.balance||0:0, equity=balance+floating;
  const marginUsed=pos.reduce((s,p)=> s+requiredMargin(p.symbol, lotsOf(p), leverage), 0);  // leverage-driven
  const level=marginUsed>0?(equity/marginUsed*100):0;
  const num=(n)=>(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  // MT5 History customization — filter the closed-deal log by period (All / Today / Last Week /
  // Last Month / Custom from-to). close_ms is stamped at close time for exact date filtering.
  const histShown = React.useMemo(()=>{
    const now=Date.now(), sod=()=>{ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); };
    return hist.filter(h=>{ const ms=+h.close_ms||0;
      if(histPeriod==='today') return ms>=sod();
      if(histPeriod==='week')  return ms>=now-7*864e5;
      if(histPeriod==='month') return ms>=now-30*864e5;
      if(histPeriod==='custom'){ const f=histFrom?Date.parse(histFrom+'T00:00:00'):null, tt=histTo?Date.parse(histTo+'T23:59:59'):null;
        if(f!=null&&ms<f) return false; if(tt!=null&&ms>tt) return false; return true; }
      return true; });   // 'all'
  }, [hist, histPeriod, histFrom, histTo]);
  const histProfit = histShown.reduce((s,h)=>s+(+h.profit||0),0);   // partial sum over the LOADED chunks only (memory), 2-dp below
  const histV = useVirtual(histShown.length, 22, ()=>positionsStore.loadMoreHistory());   // window the rows + page more on scroll-to-bottom

  return (
    <div className="bottom">
      {modifyP && <ModifyPos p={modifyP} onClose={()=>setModifyP(null)} />}
      <BottomResizer onDone={onResize} />
      {tab==='Exposure' ? <ExposureTab pos={pos} mids={mids} equity={equity} leverage={leverage} />
       : tab==='Journal' ? <JournalTab />
       : tab==='Mailbox' ? <MailboxTab />
       : tab==='Alerts' ? <AlertsTab />
       : tab==='Company' ? <CompanyTab />
       : (tab!=='Trade' && tab!=='History') ? <EmptyTab tab={tab} />
       : (<React.Fragment>
      {tab==='History' && (
        <div className="histbar">
          {[['all','All'],['today','Today'],['week','Last Week'],['month','Last Month'],['custom','Custom']].map(([k,l])=>(
            <button key={k} className={'hb'+(histPeriod===k?' on':'')} onClick={()=>setHistPeriod(k)}>{l}</button>
          ))}
          {histPeriod==='custom' && (
            <span className="hbrange">
              <input type="date" value={histFrom} onChange={e=>setHistFrom(e.target.value)} />
              <span>→</span>
              <input type="date" value={histTo} onChange={e=>setHistTo(e.target.value)} />
            </span>
          )}
          <span className="hbcount">{histShown.length} deals</span>
        </div>
      )}
      <div className="postbl" onScroll={tab==='History'?histV.onScroll:undefined}>
        <table className="pos">
          <thead><tr><th>{t('Symbol')}</th><th>{t('Ticket')}</th><th>{t('Time')}</th><th>{t('Type')}</th><th>{t('Volume')}</th><th>{t('Price')}</th><th>S / L</th><th>T / P</th><th>{t('Price')}</th><th>{t('Profit')}</th><th></th></tr></thead>
          <tbody>
            {tab==='History' && !histShown.length && <tr><td className="empty" colSpan="11">No history in the selected period</td></tr>}
            {tab==='History' && histV.topH>0 && <tr aria-hidden="true" style={{height:histV.topH}}><td colSpan="11"></td></tr>}
            {tab==='History' && histShown.slice(histV.start,histV.end).map(h=>(
              <tr key={h.local_id+'-'+h.close_time}>
                <td>{h.symbol.toLowerCase()}.fx</td><td>{String(h.local_id||'').replace(/\D/g,'').slice(-8)||h.local_id}</td>
                <td>{h.close_time}</td><td className={h.side==='SELL'?'down':'up'}>{h.side.toLowerCase()}</td>
                <td>{(+h.volume||0).toFixed(2)}</td><td>{fmtPx(h.symbol,h.open_price)}</td><td>—</td><td>—</td>
                <td>{fmtPx(h.symbol,h.close_price)}</td><td className={h.profit>=0?'up':'down'}>{num(h.profit)}</td>
                <td></td>
              </tr>
            ))}
            {tab==='History' && histV.botH>0 && <tr aria-hidden="true" style={{height:histV.botH}}><td colSpan="11"></td></tr>}
            {tab==='Trade' && !pos.length && <tr><td className="empty" colSpan="11">{(!WT_DEMO && window.AlpexaSync&&AlpexaSync.me)?'No open positions':'Log in to see your live positions (Log in to trade)'}</td></tr>}
            {tab==='Trade' && pos.map(p=>{ const m=mids[p.symbol]||{}; const pl=plOf(p);
              const tkt=String(p.local_id||'').replace(/\D/g,'').slice(-8)||p.local_id;
              const _tt=p.updated_at||p.created_at; const tm=_tt?String(_tt).slice(0,19).replace('T',' ').replace(/-/g,'.'):'—';  // real positions carry updated_at (no created_at col); demo seed carries created_at. MT5: 2026.07.09 20:17:40
              return (<tr key={p.local_id}>
                <td>{p.symbol.toLowerCase()}{sfx(p.symbol).toLowerCase()}</td><td>{tkt}</td><td>{tm}</td><td className={sideUp(p.side)==='SELL'?'down':'up'}>{sideUp(p.side).toLowerCase()}</td>
                <td>{lotsOf(p).toFixed(2)}</td><td>{fmtPx(p.symbol,+p.open_price)}</td>
                <td className="sltp" onDoubleClick={()=>setModifyP(p)} title="더블클릭: SL/TP 수정 (Modify)">{(p.meta&&p.meta.sl!=null)?fmtPx(p.symbol,+p.meta.sl):'—'}</td>
                <td className="sltp" onDoubleClick={()=>setModifyP(p)} title="더블클릭: SL/TP 수정 (Modify)">{(p.meta&&p.meta.tp!=null)?fmtPx(p.symbol,+p.meta.tp):'—'}</td>
                <td>{fmtPx(p.symbol,closePx(p,m))}</td><td className={pl>=0?'up':'down'}>{num(pl)}</td>
                <td><button className="xclose" title="Close position" onClick={()=>closePos(p)}>✕</button></td>
              </tr>); })}
          </tbody>
          {/* Balance bar lives INSIDE the table as <tfoot> → glued right under the last position
              row; grows/shrinks WITH the rows (no more floating at the terminal-box bottom). */}
          {tab==='History' && histShown.length>0 && <tfoot><tr className="acctrow"><td colSpan="11">
            <div className="acctline">
              <span><span className="k">Deals:</span> <b>{histShown.length}</b></span>
              <span><span className="k">P/L:</span> <b className={histProfit>=0?'up':'down'}>{num(histProfit)}</b></span>
            </div>
          </td></tr></tfoot>}
          {tab==='Trade' && <tfoot>
            <tr className="acctrow">
            <td colSpan="9"><div className="acctline pl-bar">
              <span><span className="k">{t('Balance')}:</span> <b>{num(balance)} USD</b></span>
              <span><span className="k">{t('Equity')}:</span> <b>{num(equity)}</b></span>
              <span><span className="k">{t('Margin')}:</span> <b>{num(marginUsed)}</b></span>
              <span><span className="k">{t('Free Margin')}:</span> <b>{num(equity-marginUsed)}</b></span>
              <span><span className="k">{t('Margin Level')}:</span> <b className={marginUsed>0&&level<100?'down':''}>{marginUsed>0?num(level)+' %':'—'}</b>{/* MT5-style: safe = neutral (default), red ONLY at ≤100% (margin call) / ≤30% (stop out) — no green */}
                {marginUsed>0&&level<100&&level>=30 && <b style={{color:'#e0a020',marginLeft:6}}>⚠ Margin Call</b>}
                {marginUsed>0&&level<30 && <b style={{color:'#ff5252',marginLeft:6}}>⛔ Stop Out &lt;30%</b>}</span>
            </div></td>
            <td className={"pl-total "+(floating>=0?'up':'down')}><span className="k" style={{marginRight:5}}>P/L</span>{num(floating)}</td>
            <td></td>
            </tr>
          </tfoot>}
        </table>
      </div>
       </React.Fragment>)}
    </div>
  );
}

/* ── Resizable splitter: drag the bar left/right to size the Market Watch column
   (200–450px). During drag it sets --leftw on .terminal and, in a rAF loop, calls
   chartResizer.resizeAll() so all 4 charts follow live instead of squishing. ── */
function Splitter({ onDone }){
  const drag=React.useRef(false), self=React.useRef(null);
  React.useEffect(()=>{
    const term=document.querySelector('.terminal'); let raf=null, lastW=0;
    const onMove=(e)=>{ if(!drag.current||!term) return;
      const rect=term.getBoundingClientRect();
      lastW=Math.max(200, Math.min(450, e.clientX-rect.left));
      term.style.setProperty('--leftw', lastW+'px');
      if(!raf) raf=requestAnimationFrame(()=>{ raf=null; chartResizer.resizeAll(); });
    };
    const onUp=()=>{ if(!drag.current) return; drag.current=false;
      if(self.current) self.current.classList.remove('drag');
      document.body.style.cursor=''; document.body.style.userSelect='';
      chartResizer.resizeAll();
      if(lastW && onDone) onDone(Math.round(lastW));   // persist the new width
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    return ()=>{ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); if(raf)cancelAnimationFrame(raf); };
  }, []);
  const onDown=(e)=>{ e.preventDefault(); drag.current=true;
    if(self.current) self.current.classList.add('drag');
    document.body.style.cursor='col-resize'; document.body.style.userSelect='none';
  };
  return <div className="splitter" ref={self} onMouseDown={onDown} title="드래그해서 시세창 너비 조절"></div>;
}

/* ── Bottom Toolbox row-resizer: a row-resize bar that is ALWAYS present as panel
   chrome (independent of the positions table being empty). Drag up/down sets
   --bottomh on .terminal; the 1fr charts row absorbs the change; chart.resize() in
   a rAF loop keeps the charts crisp. ── */
function BottomResizer({ onDone }){
  const self=React.useRef(null);
  React.useEffect(()=>{
    const el=self.current, term=document.querySelector('.terminal'); if(!el) return; let raf=null, on=false, lastH=0;
    const onDown=(e)=>{ e.preventDefault(); on=true; el.classList.add('drag');
      document.body.style.cursor='row-resize'; document.body.style.userSelect='none'; };
    const onMove=(e)=>{ if(!on||!term) return;
      // DOCKED toolbox: its tab bar (24px) sits at the very bottom, content above it. Dragging the top
      // edge to cursorY sets the terminal (content) height = (window bottom − tab bar) − cursorY. The
      // grid dock row = this height + tab bar, so the charts/left panel shrink to fit above it. Clamp
      // so the toolbox never shrinks below its 126 home (dock 150 = 126 + 24 tab bar → taller charts)
      // and always leaves room on top.
      const TAB=24;
      const h = window.innerHeight - TAB - e.clientY;
      lastH = Math.max(126, Math.min(window.innerHeight - 200, h));
      term.style.setProperty('--bottomh', lastH+'px');
      if(!raf) raf=requestAnimationFrame(()=>{ raf=null; chartResizer.resizeAll(); });
    };
    const onUp=()=>{ if(!on) return; on=false; el.classList.remove('drag');
      document.body.style.cursor=''; document.body.style.userSelect=''; chartResizer.resizeAll();
      if(lastH && onDone) onDone(Math.round(lastH)); };
    el.addEventListener('mousedown',onDown);
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    return ()=>{ el.removeEventListener('mousedown',onDown); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); if(raf)cancelAnimationFrame(raf); };
  }, []);
  return <div className="hsplit" ref={self} title="드래그해서 거래창 높이 조절"></div>;
}

/* ── Left-panel internal row-resizer between Market Watch and Navigator. Also pure

    const pb=prev.current; dir.current={ bid:q.bid-(pb.bid||q.bid)>0?1:q.bid<(pb.bid||q.bid)?-1:0, ask:q.ask-(pb.ask||q.ask)>0?1:q.ask<(pb.ask||q.ask)?-1:0 };
    prev.current={bid:q.bid,ask:q.ask}; setM({...q}); }, IS_MOBILE?RENDER_MS:180)); return un; }, [symbol]);

  React.useEffect(()=>{ const k=(e)=>{ if(e.key==='Escape') onClose(); }; document.addEventListener('keydown',k); return ()=>document.removeEventListener('keydown',k); }, [onClose]);
  // ── VOLUME long-press acceleration: hold −/+ to ramp 0.01 → 0.1 → 1.0 lot/tick (~10 lots in ~1.5s) ──
  const holdRef=React.useRef(null);
  const stopHold=()=>{ if(holdRef.current){ clearInterval(holdRef.current); holdRef.current=null; } };
  React.useEffect(()=>stopHold, []);   // clear any running accel on unmount
  const startVolHold=(sign)=>{
    stopHold();
    const bump=(step)=> setVol(v=> Math.max(0.01, (+v||0) + sign*step).toFixed(2));   // .toFixed(2) → no float dust
    bump(0.01);                                                                        // immediate single 0.01 on press
    const t0=Date.now();
    holdRef.current=setInterval(()=>{ const el=Date.now()-t0;                          // 0–0.3s ×0.01 · 0.3–1.2s ×0.1 · >1.2s ×1.0
      bump(el>1200 ? 1.0 : el>300 ? 0.1 : 0.01); }, 40);
  };
  // ── SL/TP price stepper: the STEP is LOCKED at 1 pipette (last 5-digit place, 0.00001; JPY 0.001)
  //    — never a volume/weight. Long-press only compresses the TIMER interval, not the amount:
  //    single click = 1 pipette · 0.3–1.0s → 30ms fire · >1.0s → 6ms fire. parseFloat().toFixed(5) always.
  const pHoldRef=React.useRef(null);
  const stopPHold=()=>{ if(pHoldRef.current){ clearTimeout(pHoldRef.current); pHoldRef.current=null; } };
  React.useEffect(()=>stopPHold, []);
  const startPriceHold=(setter, sign)=>{
    stopPHold();
    const d=digits(symbol), step=Math.pow(10,-d);                                        // exactly 1 pipette — fixed
    const bump=()=> setter(v=> Math.max(0, parseFloat(v||0) + sign*step).toFixed(d));    // parseFloat.toFixed(5) — no float dust
    bump();                                                                              // single click = one pipette
    const t0=Date.now();
    const tick=()=>{ const el=Date.now()-t0; bump();
      pHoldRef.current=setTimeout(tick, el<1000 ? 30 : 6); };                            // 0.3–1.0s → 30ms · >1.0s → 6ms
    pHoldRef.current=setTimeout(tick, 300);                                              // first repeat only after 0.3s
  };

  // ── leverage-driven order affordability, live (updates on price / volume / leverage) ──
  const need = eng.marginFor(symbol, vol);          // margin this order would lock
  const canAfford = need <= eng.freeMargin + 1e-9;  // gate against free margin
  const usd=(n)=>'$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  const open=marketOpen(symbol);   // session gate — closed → Buy/Sell locked, order refused
  const submit=async(side)=>{
    if(!marketOpen(symbol)){ playSnd(sndError); alert(t('Market closed')); return; }   // reject before any RPC — 뚜엑
    if(!canAfford){ playSnd(sndError); alert(t('Margin Call — insufficient free margin')); return; }   // 증거금 부족 → 거절 (server gate is the real authority)
    const q=priceStore.get(symbol)||m; const price=side==='buy'?q.ask:q.bid;   // requested price the trader sees
    const maxSlip=SLIP_PIPS*pip(symbol);
    const r=await eng.placeOrder({ symbol, side, volume:vol, leverage:eng.leverage, requestedPrice:price, maxSlippage:maxSlip });   // +leverage +slippage
    if(r.ok){ onClose(); return; }                                   // B-Book fill booked server-side (sndOpen in placeOrder)
    // PRODUCTION: no client demo fill. Server rejection already fired sndError; logged-out prompts login.
    if(r.reason==='not_logged_in'){ playSnd(sndError); alert(t('Please log in to trade')); return; }
    else if(r.reason){ console.warn('order rejected:', r.code||r.reason); alert(t('Order rejected')+': '+(r.reason||r.code)); return; }   // show WHY (server reason)
    onClose();
  };
  const spin=(set,cur,step,dg)=>({ up:()=>set((+cur+step).toFixed(dg)), dn:()=>set(Math.max(0,+cur-step).toFixed(dg)) });

  return (
    <div className="omodal-ov" onMouseDown={onClose}>
      <div className="omodal" ref={cardRef} style={pos?{position:'absolute',left:pos.left+'px',top:pos.top+'px',margin:0}:null} onMouseDown={e=>e.stopPropagation()}>
        <div className="obar" onMouseDown={onHeaderDown} style={{cursor:'move'}}>
          <div className="t">{t('New Order')} — {symbol}{sfx(symbol)}</div>
          <span className="wb x" onMouseDown={e=>e.stopPropagation()} onClick={onClose}>✕</span>
        </div>
        <div className="om-body">
          {/* Symbol */}
          <div className="om-field"><label>{t('Symbol')}</label>
            <select value={symbol} onChange={e=>setSymbol(e.target.value)}>{WATCH.map(s=><option key={s} value={s}>{s}{sfx(s)}</option>)}</select></div>
          {/* Big Bid / Ask + live SPREAD in the middle — same Arial-Black BigFig look as the panel */}
          <div className="om-quote">
            <div className="om-px"><span className="om-tag">BID · SELL</span><BigFig symbol={symbol} v={m.bid} /></div>
            <div className="om-spread"><span className="om-sp-l">{t('SPREAD')}</span>
              <b>{(m.ask!=null&&m.bid!=null) ? ((m.ask-m.bid)/pip(symbol)).toFixed(1) : '—'}</b></div>
            <div className="om-px"><span className="om-tag">ASK · BUY</span><BigFig symbol={symbol} v={m.ask} /></div>
          </div>
          {/* Volume */}
          <div className="om-field"><label>{t('Volume (lots)')}</label>
            <div className="om-vol">
              <b onMouseDown={()=>startVolHold(-1)} onMouseUp={stopHold} onMouseLeave={stopHold}>−</b>
              <input value={vol} onChange={e=>setVol(e.target.value)} />
              <b onMouseDown={()=>startVolHold(1)} onMouseUp={stopHold} onMouseLeave={stopHold}>+</b></div></div>
          {/* Precision-order settings (always available now the toggle is gone) */}
          <div className="om-adv">
            <div className="om-field"><label>{t('Stop Loss')}</label>
              <div className="om-price">
                <input value={sl} onChange={e=>setSl(e.target.value)}
                  onFocus={()=>{ const q=priceStore.get(symbol)||m; if(q.bid!=null) setSl((+q.bid).toFixed(digits(symbol))); }} />{/* focus → inject live BID */}
                <span className="om-pspin">{/* ±1 pipette; hold = timer accel only */}
                  <b onMouseDown={()=>startPriceHold(setSl,1)} onMouseUp={stopPHold} onMouseLeave={stopPHold}>▲</b>
                  <b onMouseDown={()=>startPriceHold(setSl,-1)} onMouseUp={stopPHold} onMouseLeave={stopPHold}>▼</b>
                </span></div></div>
            <div className="om-field"><label>{t('Take Profit')}</label>
              <div className="om-price">
                <input value={tp} onChange={e=>setTp(e.target.value)}
                  onFocus={()=>{ const q=priceStore.get(symbol)||m; if(q.ask!=null) setTp((+q.ask).toFixed(digits(symbol))); }} />{/* focus → inject live ASK */}
                <span className="om-pspin">{/* ±1 pipette; hold = timer accel only */}
                  <b onMouseDown={()=>startPriceHold(setTp,1)} onMouseUp={stopPHold} onMouseLeave={stopPHold}>▲</b>
                  <b onMouseDown={()=>startPriceHold(setTp,-1)} onMouseUp={stopPHold} onMouseLeave={stopPHold}>▼</b>
                </span></div></div>
          </div>
          {/* Margin */}
          <div className="om-margin" style={{color:canAfford?'#8890a0':'#ff5252'}}>
            {t('Margin')} <b style={{color:'#fff'}}>{usd(need)}</b> &nbsp;·&nbsp; {t('Free')} <b style={{color:'#fff'}}>{usd(eng.freeMargin)}</b>
            {!canAfford && <span> &nbsp;·&nbsp; ⚠ insufficient</span>}
          </div>
          {!open && <div className="om-closed">🔒 {t('Market closed')}</div>}
          {open && !canAfford && <div className="om-closed">⚠ {t('Margin Call — insufficient free margin')}</div>}
          {/* Sell / Buy by Market — matte flat (Binance/TradingView pro) */}
          <div className="om-btns">
            <button className="om-sell" disabled={!canAfford||!open} onClick={()=>submit('sell')}>{t('Sell by Market')}</button>
            <button className="om-buy" disabled={!canAfford||!open} onClick={()=>submit('buy')}>{t('Buy by Market')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

const DEFAULT_VIEW={ toolbars:true, statusbar:true, marketwatch:true, navigator:true, toolbox:true };
// initial floating geometry (fractions of the stage) — first four lay out as a clean 2×2 of
// INDEPENDENT windows; extras cascade down-right so a new chart never lands exactly on another.
function floatGeo(i){
  // edge-to-edge 2×2: bottom row fy:.5+fh:.5 reaches y=1.0, right col fx:.5+fw:.5 reaches x=1.0 → the
  // four charts fill the WHOLE stage with ZERO bottom/side gap (no black hole under the time axis).
  const quad=[{fx:0,fy:0,fw:.5,fh:.5},{fx:.5,fy:0,fw:.5,fh:.5},
              {fx:0,fy:.5,fw:.5,fh:.5},{fx:.5,fy:.5,fw:.5,fh:.5}];
  if(i<4) return quad[i];
  const k=i-4; return { fx:Math.min(.45,.10+k*.03), fy:Math.min(.45,.12+k*.05), fw:.5, fh:.5 };
}
/* ── Login gate: production (WT_DEMO=false) needs a real account. We REUSE the single proven auth
   path (login.html — it does sign-in + profile lookup + the #5 cross-account cache wipe), round-
   tripping back to the terminal so the per-tab sessionStorage session lands in THIS tab. The chime
   plays on return (login.html sets alpexa.loginChime). No auth logic is duplicated here. ── */
/* Sign out + leave to the marketing site. Mirrors the idle-logout in alpexa-sync.js (same keys):
   kill the Supabase session, drop the persistent identity tag (else the load gate shows a phantom
   session), then land on the FX website. Money stays server-only — this only touches the session. */
function wtLogout(){
  try{ if(!window.confirm('Log out of WebTrade?')) return; }catch(e){}
  try{ var db=window.AlpexaSync&&AlpexaSync.db; if(db&&db.auth) db.auth.signOut(); }catch(e){}
  try{ ['alpexa.me','alpexa.userName','alpexa.userEmail'].forEach(function(k){ localStorage.removeItem(k); }); }catch(e){}
  try{ if(document.fullscreenElement) document.exitFullscreen(); }catch(e){}
  try{ location.replace('fx.html'); }catch(e){ try{ location.href='fx.html'; }catch(_){} }
}
function LoginGate({ onClose }){
  const go=()=>{ try{ location.href='login.html?skin=wt'; }catch(e){} };   // terminal-skinned login (same ONE auth path; device routing lands PC back here)
  return (
    <div className="logingate" onMouseDown={e=>{ if(e.target===e.currentTarget) onClose&&onClose(); }}>
      <div className="lg-card" onMouseDown={e=>e.stopPropagation()}>
        <div className="lg-logo">ALPEXA <b>WebTrade</b></div>
        <div className="lg-sub">Log in to your live account to trade.</div>
        <button className="lg-btn" onClick={go}>Log in</button>
        <div className="lg-dismiss" onClick={()=>onClose&&onClose()}>Browse charts (read-only)</div>
      </div>
    </div>
  );
}
function App(){

  // DEFAULT LOGIN LAYOUT (2026-07-13, MT5-style): boot the full 2×2 — one M1 candle chart per GRID

  const initCharts=React.useRef(GRID.map((sym,i)=>({ id:i+1, symbol:sym, tf:'M1', type:'candle', inds:(cfg.indicators||[]).slice() }))).current;   // indicators are PER-CHART

  const chartsRef=React.useRef(charts); chartsRef.current=charts;
  const [orderSym,setOrderSym]=React.useState(null);     // popup Order dialog target (null = closed)
  const [tool,setTool]=React.useState(null);             // armed drawing tool (cross/vline/…)

  React.useEffect(()=>{ themeBus.set(theme); }, [theme]);   // broadcast to live chart canvases
  const [lang,setLang]=React.useState(['ko','ja','zh'].indexOf(cfg.lang)>=0?cfg.lang:'en');   // View → Languages (UI setting)
  LANG.cur=lang;   // set during render so every child's t() reads the current language immediately
  // effective active chart (id may point at a closed one after a close)
  const activeChart = charts.find(c=>c.id===activeId) || charts[0] || null;
  const activeInds = activeChart ? (activeChart.inds||[]) : [];   // indicators of the SELECTED chart (menus reflect this)
  const actRef=React.useRef(null); actRef.current = activeChart ? activeChart.id : null;

  React.useEffect(()=>{ priceStore.start(); positionsStore.start(); symbolStore.load();   // pull the LIVE symbol set from the server (prices + fx_specs class)

            {charts.map((c,i)=><ChartCell key={c.id} idx={c.id} isActive={c.id===(activeChart&&activeChart.id)} onActivate={activate}
              symbol={c.symbol} tf={c.tf} indicators={c.inds||[]} chartType={c.type} tool={tool}
              initial={charts.length===1?{fx:0,fy:0,fw:1,fh:1}:floatGeo(i)} savedGeo={geos.current[c.id]} onGeo={onGeo}
              lazyHold={IS_MOBILE && !revealed.has(c.id)}
              onClose={()=>closeChart(c.id)} onSymbol={changeSymbol} />)}
            {!charts.length && <div className="noch">No charts open — File → New Chart Window, or double-click a Market Watch symbol.</div>}
          </div>
        </div>
        {/* layer 2: chart-window tab bar — glued directly under the charts. click=focus, ✕=close+unsubscribe */}
        {!!charts.length && <div className="charttabs">{charts.map(c=>
          <div key={c.id} className={"ctab"+(c.id===(activeChart&&activeChart.id)?' on':'')} onClick={()=>activate(c.id)} title={c.symbol+sfx(c.symbol)+','+c.tf}>{c.symbol}{sfx(c.symbol)},{c.tf}
            <span className="tclose" onClick={(e)=>{e.stopPropagation();closeChart(c.id);}} title="Close chart">✕</span></div>)}</div>}
      </div>
      {/* GLOBAL floating toolbox overlay — pinned to window bottom (absolute, z-9999), covers the
          chart + left navigator when pulled up. Terminal history on top, menu tab bar glued at its bottom. */}
      {view.toolbox && <div className="toolbox">
        <BottomBar onResize={setBottomh} tab={termTab} />
        <div className="tbxtabs">{TBX_TABS.map(tb=><div key={tb} className={"t"+(tb===termTab?' on':'')} onClick={()=>setTermTab(tb)}>{t(tb)}</div>)}</div>
      </div>}
      {orderSym && <OrderModal symbol={orderSym} onClose={()=>setOrderSym(null)} />}
    </div>
  );
}

// Boot when Babel+React actually loaded (guarded so a blocked CDN doesn't throw a render error).
try{ if(window.React && window.ReactDOM){ ReactDOM.createRoot(document.getElementById('app')).render(<App/>); } }catch(e){ console.warn('webtrade boot skipped:', e && e.message); }
</script>
</body>
</html>
