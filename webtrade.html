<!DOCTYPE html>
<!-- Alpexa WebTrade — PC-only MetaTrader-style FX terminal. Mobile apps untouched. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpexa WebTrade — FX Terminal</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://unpkg.com">
<style>
  /* MT5 classic terminal — pure black, grey Excel gridlines, Tahoma. */
  :root{ --bg:#000000; --panel:#050708; --panel2:#04060a; --line:#333333; --cellbd:#444444;
    --text:#d0d4da; --dim:#8890a0; --up:#00ff00; --down:#ff2020; --accent:#3a6ea5; --r:0; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:Tahoma,'Segoe UI','Malgun Gothic',Arial,sans-serif;font-size:12px;overflow:hidden}
  #app{height:100vh}
  /* ── thin dark custom scrollbars (kill the ugly white browser bars; keep scrolling) ── */
  .terminal *{scrollbar-width:thin;scrollbar-color:#333a44 transparent}
  .terminal ::-webkit-scrollbar{width:8px;height:8px}
  .terminal ::-webkit-scrollbar-track{background:transparent}
  .terminal ::-webkit-scrollbar-corner{background:transparent}
  .terminal ::-webkit-scrollbar-thumb{background:#333a44;border-radius:4px;border:2px solid transparent;background-clip:content-box}
  .terminal ::-webkit-scrollbar-thumb:hover{background:#48505c;background-clip:content-box}
  /* ── MT5-style CSS Grid: toolbar / [market-watch | 2×2 charts] / bottom bar ── */
  .terminal{display:grid;height:100vh;position:relative;   /* position:relative → floating toolbox anchors to it */
    grid-template-columns:var(--leftw,240px) 6px 1fr;
    grid-template-rows:23px 33px 1fr var(--dockh,212px);
    grid-template-areas:"menu menu menu" "tools tools tools" "left splitter right" "dock dock dock";}
  /* horizontal (row-resize) splitters — layout CHROME, always present & draggable
     regardless of table/data content (the resize engine is data-independent). */
  /* thin 1px line, but a 7px transparent grab zone; cursor snaps to row-resize on hover */
  .hsplit,.lhsplit{flex:none;height:7px;cursor:row-resize;background:transparent;position:relative;user-select:none}
  .hsplit::before,.lhsplit::before{content:"";position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:1px;background:#222}
  .hsplit:hover::before,.hsplit.drag::before,.lhsplit:hover::before,.lhsplit.drag::before{height:2px;background:#3a6ea5}
  /* vertical splitter: thin 1px line inside a 6px transparent grab zone; col-resize on hover */
  .splitter{grid-area:splitter;cursor:col-resize;background:transparent;position:relative;user-select:none}
  .splitter::before{content:"";position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:1px;background:#222}
  .splitter:hover::before,.splitter.drag::before{width:2px;background:#3a6ea5}
  /* ── menu bar (File View …) ── */
  .menu{grid-area:menu;display:flex;align-items:center;gap:1px;padding:0 3px;background:linear-gradient(#2c3138,#20242a);border-bottom:1px solid #0a0a0a;font-size:11px;font-weight:400}
  .menu .mi{padding:2px 7px;color:#d0d4da;cursor:default;border-radius:2px}.menu .mi:hover{background:#3a6ea5;color:#fff}
  .menu .mi{position:relative}
  .menu .mi.on{background:#3a6ea5;color:#fff}
  .mdrop{position:absolute;top:100%;left:0;min-width:190px;background:#1b1f25;border:1px solid #3a3f47;
    box-shadow:0 6px 18px rgba(0,0,0,.6);z-index:100000;padding:3px 0;font-size:11.5px}   /* above floating charts (WIN_Z grows) + toolbox */
  .mdrop .row{display:flex;align-items:center;gap:8px;padding:5px 12px;color:#cfd4dc;cursor:pointer;white-space:nowrap}
  .mdrop .row:hover{background:#3a6ea5;color:#fff}
  .mdrop .row .ck{width:12px;text-align:center;color:#00d060}
  .mdrop .sep{height:1px;background:#3a3f47;margin:3px 0}
  .mdrop .hd{padding:3px 12px;color:#79808c;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
  .mdrop .row .sc{margin-left:auto;color:#79808c;font-size:10.5px;padding-left:20px}
  .mdrop .row.dis{color:#6a7078;cursor:default}.mdrop .row.dis:hover{background:transparent;color:#6a7078}
  .mdrop .row .ar{margin-left:auto;color:#8a9098}
  .mdrop .row.has{position:relative}
  .mdrop.sub{position:absolute;left:100%;top:-4px;min-width:180px}   /* fly-out submenu (Insert → Lines/Fibonacci/…) */
  /* ── bottom status bar (View → Status Bar) ── */
  .statusbar{grid-area:status;display:flex;align-items:center;gap:14px;padding:0 8px;font-size:11px;color:#9aa2b0;
    background:linear-gradient(#20242a,#171a1f);border-top:1px solid #000;white-space:nowrap;overflow:hidden}
  .statusbar .s{display:flex;align-items:center;gap:5px}.statusbar b{color:#c8ccd2;font-weight:600}
  .statusbar .grow{margin-left:auto}
  /* ── toolbox non-Trade tab content (News/Mailbox/…): themed empty panels ── */
  .tbxbody{flex:1;overflow:auto;padding:0}
  .tbxempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#6a7078;gap:6px;font-size:12px}
  .tbxempty .ic{font-size:22px;opacity:.5}
  table.jrnl{width:100%;border-collapse:collapse;font:11px Consolas,monospace}
  table.jrnl td{padding:2px 10px;border-bottom:1px solid #14181e;color:#9aa2b0;white-space:nowrap}
  table.jrnl td.t{color:#6f778a;width:150px}
  table.jrnl td.ok{color:#59c26a}
  .menu .conn{margin-left:auto;color:#9aa2b0;display:flex;align-items:center;gap:6px;padding-right:6px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--up)}
  /* ── icon toolbar (New Order · Algo · chart tools · timeframes) — compact, 2–4px gaps ── */
  .tools{grid-area:tools;display:flex;align-items:center;gap:3px;padding:0 4px;background:linear-gradient(#22262c,#15181d);border-bottom:1px solid #000}
  .tbtn{display:flex;align-items:center;gap:5px;height:26px;padding:0 9px;background:linear-gradient(#3a4048,#2a2e34);border:1px solid #4a5059;border-radius:3px;color:#e0e4ea;font-size:12px;cursor:pointer;white-space:nowrap;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
  .tbtn:hover{background:linear-gradient(#464c55,#34393f);border-color:#5a636e}
  .tbtn:active{box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
  .tbtn svg{width:17px;height:17px;flex:none}
  .tbtn.algo .play{color:#37c837}
  .tbtn.algo:hover{border-color:#4f8a4f;box-shadow:inset 0 0 8px rgba(60,220,80,.28),inset 0 1px 0 rgba(255,255,255,.08)}
  .tbtn.algo.on{background:linear-gradient(#2f7a35,#1e5a26);color:#eaffea;border-color:#3c8a44}
  /* square icon buttons (chart type / zoom / tile) */
  .tibtn{display:flex;align-items:center;justify-content:center;width:26px;height:26px;color:#c2c8d0;cursor:pointer;
    background:linear-gradient(#31363d,#252a30);border:1px solid #454b54;border-radius:3px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
  .tibtn:hover{background:linear-gradient(#3b414a,#2c3138);color:#fff;border-color:#5a636e}
  .tibtn:active{box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
  .tibtn.on{background:#3a6ea5;color:#fff;border-color:#3a6ea5}
  .tibtn svg{width:17px;height:17px}
  .tigrp{display:flex;gap:2px}
  .tsep{width:1px;height:18px;background:#3a3f47;margin:0 3px}
  .tf{display:flex;gap:1px}
  .tf b{padding:4px 8px;background:#23272d;border:1px solid #383d45;color:#b8bcc4;font-weight:600;font-size:12.5px;cursor:pointer;border-radius:2px}
  .tf b:hover{background:#2b3037;color:#dfe3ea}
  .tf b.on{background:#3a6ea5;color:#fff;border-color:#3a6ea5}
  .tbrand{margin-left:auto;font-weight:700;letter-spacing:.3px;color:#8890a0;font-size:11px}.tbrand span{color:#7fb0e0}
  /* ── left column: Market Watch (top) + Navigator (bottom) ── */
  .left{grid-area:left;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .watch{flex:1;background:var(--panel);overflow:auto;min-height:0}
  .nav{height:var(--navh,186px);background:var(--panel);border-top:1px solid var(--cellbd);overflow-x:hidden;overflow-y:auto;flex:none}
  .nav .navhd{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:3px 4px 3px 8px;background:#0a0d12;color:var(--dim);font-size:11px;font-weight:600;border-bottom:1px solid var(--line)}
  .nav .navhd .x{cursor:pointer;width:16px;text-align:center;border-radius:2px}
  .nav .navhd .x:hover{background:#e81123;color:#fff}
  .nav ul{list-style:none;margin:0;padding:2px 0}
  .nav li{padding:2px 8px;color:#c4c8d0;cursor:default;white-space:nowrap}
  .nav li:hover{background:#0d1420}
  .nav li.root{font-weight:700;color:#dfe3ea}
  .nav li.child{padding-left:26px;color:#aeb6c2}
  .nav li.navf{cursor:pointer;color:#c4c8d0}
  .nav li.ind{cursor:pointer;color:#aeb6c2}.nav li.ind.on{color:#8fd3a0}
  .nav li.ind .ic{color:#e0b84a}.nav li.ind.on .ic{color:#8fd3a0}
  .nav li.dim{color:#6a7078}
  .nav .tw{display:inline-block;width:12px;text-align:center;color:#8a9098}
  .nav li.leaf{color:#8fd3a0;font-size:11px}
  .nav li.leaf .ic{margin-right:4px}
  .nav .ic{display:inline-block;width:15px;text-align:center;margin-right:5px}
  /* ── one-click order box (top-left of each chart) ── */
  /* MT5 one-click panel — MID 190x64, whole-panel colour follows the tick */
  .obox{position:absolute;top:6px;left:6px;z-index:1000;width:190px;height:64px;display:flex;flex-direction:column;
    border:1px solid #050505;box-shadow:0 1px 4px rgba(0,0,0,.6);background:#0d0e12;
    font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif}
  .obox *{border-radius:0 !important;box-sizing:border-box;font-family:inherit}
  /* top layer (20px) — labels + centered volume */
  .oc-top{height:20px;flex:none;display:flex;align-items:stretch}
  .oc-lbl{flex:1;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:normal;letter-spacing:.5px;
    cursor:pointer;font-family:"Arial Black","Segoe UI",Arial,sans-serif}
  .oc-lbl:hover{filter:brightness(1.13)}
  .oc-vol{width:58px;flex:none;position:relative;background:#e1e1e1;display:flex;align-items:center;justify-content:center;border-left:1px solid #555;border-right:1px solid #555}
  .oc-vol b{position:absolute;top:50%;transform:translateY(-50%);cursor:pointer;color:#333;font-size:9px;width:14px;text-align:center;user-select:none;line-height:1}
  .oc-vol b.dn{left:0}.oc-vol b.up{right:0}
  .oc-vol b:hover{color:#1e3d70}
  .oc-vol input{width:30px;height:16px;text-align:center;padding:0;border:none;background:#fff;color:#111;font-weight:bold;font-size:12px;outline:none}
  /* bottom layer (44px) — SELL | BUY big quotes, 50:50 */
  .oc-bot{flex:1;display:flex;align-items:stretch}
  .oc-price{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;margin:0;
    color:#fff;cursor:pointer}
  .oc-price:hover{filter:brightness(1.1)}
  .oc-price:active{box-shadow:inset 0 2px 5px rgba(0,0,0,.55)}
  .oc-price .bf{display:inline-flex;align-items:baseline;justify-content:center;line-height:1;margin:0;padding:0;font-variant-numeric:tabular-nums}
  .oc-price .bf .sm{font-size:11px;font-weight:normal;color:#ffffff}                                  /* 앞자리 1.14 */
  .oc-price .bf .bg{font-size:24px;font-weight:normal;color:#ffffff;line-height:1;font-family:"Arial Black","Segoe UI",Arial,sans-serif}  /* 핵심 핍 — 각진 묵직 폰트 */
  .oc-price .bf .fr{align-self:flex-start;font-size:11px;font-weight:normal;color:#ffffff;margin-left:1px;transform:translateY(-4px)}  /* 위첨자 */
  /* per-side GLOSSY radial colour — blue = up/hold, red = down (SELL↔Bid, BUY↔Ask, independent) */
  .oc-blue{background:#3a63e0 !important;border:1px solid #1f3fb0 !important}   /* royal blue */
  .oc-red{background:#f5342a !important;border:1px solid #c11f17 !important}   /* bright red */
  /* ── ECN order interaction (overlay only — 190x64 치수/대칭 불변) ──
     처리중: 클릭한 쪽 호가를 dim+blur, 코너에 미세 스피너. 체결완료: 패널 0.1s 플래시. */
  .obox.ecn-flash{animation:ecnFlash .1s ease-out}
  @keyframes ecnFlash{0%{filter:brightness(2.5) saturate(1.25)}55%{filter:brightness(1.6)}100%{filter:brightness(1)}}
  .oc-busy{cursor:progress !important}
  .oc-lbl.oc-busy{opacity:.55}
  .oc-price.oc-busy .bf{opacity:.30;filter:blur(1.3px)}                 /* 호가 매칭 중 — 흐릿하게 */
  .oc-spin{position:absolute;top:3px;right:4px;width:10px;height:10px;pointer-events:none;
    border:1.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50% !important;
    animation:ecnSpin .5s linear infinite}                              /* Processing… 미세 로딩 휠 */
  @keyframes ecnSpin{to{transform:rotate(360deg)}}
  .mwt{width:100%;border-collapse:collapse}
  .mwt th{position:sticky;top:0;background:#0a0d12;color:var(--dim);font-weight:600;font-size:11px;text-align:right;padding:3px 6px;border:1px solid var(--line)}
  .mwt th:first-child{text-align:left}
  .mwt td{padding:2px 6px;border:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .mwt td.mwspr{color:#8a9098}   /* Spread column (right-click → Spread) */
  .mwt td.sym{text-align:left;font-weight:600;color:#c8ccd2}
  .mwt tr{cursor:pointer}.mwt tr:hover td{background:#0d1420}
  .up{color:var(--up)}.down{color:var(--down)}
  /* ── MDI workspace: charts area is a positioning context; each chart is a free
     floating window (absolute) that can move, resize and overlap like real MT5. ── */
  /* RIGHT column = vertical stack: charts (1f) → chart-tab bar → terminal toolbox.
     Left Symbols column sits beside this whole stack at full height (grid: left|splitter|right). */
  .right{grid-area:right;display:flex;flex-direction:column;height:100%;min-width:0;min-height:0;overflow:hidden}
  /* chart layer GROWS/SHRINKS with the terminal (never overlaid): flex-grow+shrink, floor 100px */
  .charts{flex:1 1 0%;min-height:100px;display:flex;flex-direction:column;overflow:hidden;background:#0a0d12}
  /* free-floating MDI stage — each chart window is absolute, independently moved & resized */
  .chartstage{flex:1;min-height:0;position:relative;overflow:hidden;background:#0a0d12}
  .win{position:absolute;background:#000;display:flex;flex-direction:column;
    border:1px solid var(--cellbd);box-shadow:0 2px 12px rgba(0,0,0,.55);
    min-width:220px;min-height:150px;overflow:hidden}
  .win.active{border-color:#3a6ea5;box-shadow:0 4px 20px rgba(0,0,0,.8)}
  /* tiled mode: chart fills its grid cell instead of floating */
  .win.tiled{position:relative !important;left:auto !important;top:auto !important;width:auto !important;height:auto !important;
    min-width:0;min-height:0;box-shadow:none}
  .cell-title{display:flex;align-items:center;gap:4px;height:18px;padding:0 5px;flex:none;
    cursor:move;user-select:none;
    background:#1e1e1e;border-bottom:1px solid #000;font:600 11px "Segoe UI",Tahoma,sans-serif;color:#eaeaea}  /* MT5 header */
  .win.tiled .cell-title{cursor:default}
  .cell-title .ti{display:inline-flex;align-items:center;gap:2px;margin-right:1px;flex:none}
  .cell-title .ti svg{width:12px;height:12px;display:block}
  .win.active .cell-title{background:linear-gradient(#2f7fe0,#1c5ec0);color:#ffffff}  /* active = vivid program blue */
  .win.active{border-color:#2f7fe0}
  .cell-title>span:nth-child(2){flex:none;white-space:nowrap}
  .cell-title .poslbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#00c800;font-weight:600;margin-left:2px}
  .cell-title .wc{margin-left:auto;flex:none;display:flex;gap:4px}
  .cell-title .wc span{cursor:pointer;width:16px;text-align:center;border-radius:2px;color:#c8ccd2}
  .cell-title .wc span:hover{background:rgba(255,255,255,.22)}
  .win.active .cell-title .wc span{color:#eaf2ff}
  .cell-title .wc span.cl:hover,.cell-title .wc span:last-child:hover{background:#e81123;color:#fff}
  .canvas{position:relative;flex:1;min-height:0}
  /* 8-direction resize handles hugging the window border */
  .rsz{position:absolute;z-index:7}
  .rsz.n{top:-2px;left:6px;right:6px;height:6px;cursor:ns-resize}
  .rsz.s{bottom:-2px;left:6px;right:6px;height:6px;cursor:ns-resize}
  .rsz.e{right:-2px;top:6px;bottom:6px;width:6px;cursor:ew-resize}
  .rsz.w{left:-2px;top:6px;bottom:6px;width:6px;cursor:ew-resize}
  .rsz.ne{top:-3px;right:-3px;width:12px;height:12px;cursor:nesw-resize}
  .rsz.nw{top:-3px;left:-3px;width:12px;height:12px;cursor:nwse-resize}
  .rsz.se{bottom:-3px;right:-3px;width:12px;height:12px;cursor:nwse-resize}
  .rsz.sw{bottom:-3px;left:-3px;width:12px;height:12px;cursor:nesw-resize}
  .cell-lbl{position:absolute;top:48px;left:8px;z-index:3;pointer-events:none;
    font:400 11px Tahoma,'Segoe UI',Arial,sans-serif;color:#8fa0b4;letter-spacing:.2px;text-shadow:0 0 3px #000,0 0 3px #000}
  .cell-lbl b{font-weight:600}
  /* drawing layer over each chart — captures the mouse only when a draw tool is armed */
  .drawlayer{position:absolute;inset:0;z-index:4;pointer-events:none}
  .drawlayer.arm{pointer-events:auto;cursor:crosshair}
  .dov{position:absolute;pointer-events:none;z-index:4}
  .dov.vline{top:0;bottom:0;width:0;border-left:1px solid #e8b23a}
  .dov.text{transform:translate(0,-50%);color:#e6c14a;font:600 11px Tahoma,sans-serif;white-space:nowrap;text-shadow:0 0 3px #000,0 0 3px #000}
  .dov.pt{width:9px;height:9px;margin:-5px 0 0 -5px;background:#ffffff;border:1px solid #000;box-shadow:0 0 2px #000;pointer-events:auto;cursor:move}   /* draggable selected-line handle */
  .dov.pt:hover{background:#ffe14d}
  /* selected horizontal-line grab strip — full width, drag up/down to move the line (white center knob) */
  .dov.hgrab{left:0;right:0;height:11px;margin-top:-6px;background:transparent;pointer-events:auto;cursor:ns-resize}
  .dov.hgrab::after{content:'';position:absolute;left:50%;top:50%;width:9px;height:9px;transform:translate(-50%,-50%);background:#fff;border:1px solid #000;box-shadow:0 0 2px #000}
  /* crosshair MEASURE ruler (MT5): drag with the Crosshair tool → bars / pips / price delta */
  .measure{position:absolute;inset:0;pointer-events:none;z-index:5}
  .measure svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .measure line{stroke:#dfe4ea;stroke-width:1;stroke-dasharray:4 3}
  .measure .ml{position:absolute;background:#1c2733;color:#e6ebf2;font:11px Tahoma,sans-serif;padding:3px 7px;border:1px solid #3a4756;border-radius:3px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.5)}
  /* ── Market Watch: sticky tick colours (hold until next up/down) + daily arrows ── */
  .mwt td.tick-up,.mwt td.text-up{color:#00ff00 !important;font-weight:bold}
  .mwt td.tick-down,.mwt td.text-down{color:#ff3b30 !important;font-weight:bold}
  .mwt .au{color:#00ff00;font-weight:bold}.mwt .ad{color:#ff3b30;font-weight:bold}
  .mwt tr.sel td{background:#3a6ea5 !important;color:#fff}
  .mwt tr.sel td.sym,.mwt tr.sel td.up,.mwt tr.sel td.down,.mwt tr.sel td.uptick,.mwt tr.sel td.dntick{color:#fff}
  .mwtabs{display:flex;flex:none;background:linear-gradient(#20242a,#14171c);border-top:1px solid #000}
  .mwtabs .mt{padding:3px 10px;font-size:11px;color:#a2aab6;border-right:1px solid #2a2e34;cursor:default}
  .mwtabs .mt.on{background:#000;color:#fff;border-top:2px solid #3a6ea5;margin-top:-1px}
  /* Market Watch title bar (live clock + close) */
  .mwhead{flex:none;display:flex;align-items:center;justify-content:space-between;height:20px;padding:0 4px 0 8px;
    background:linear-gradient(#2f7fe0,#1c60c0);color:#fff;font-size:11px;font-weight:600;border-bottom:1px solid #000}
  .mwhead .x{cursor:pointer;width:16px;text-align:center;border-radius:2px}
  .mwhead .x:hover{background:#e81123}
  /* Details tab */
  .mwdet{padding:0}.mwdet .sh{padding:5px 8px;color:#7fb0e0;font-size:11px;font-weight:600;border-bottom:1px solid var(--line)}
  .mwdet table{width:100%;border-collapse:collapse;font-size:11.5px}
  .mwdet td{padding:3px 8px;border-bottom:1px solid #14181e;white-space:nowrap}
  .mwdet td.k{color:#c4c8d0}.mwdet td.v{text-align:right;font-variant-numeric:tabular-nums}
  .mwdet td .ar{display:inline-block;width:12px;text-align:center}
  .mwdet td .ar.up{color:#26c281}.mwdet td .ar.dn{color:#ff4d4d}.mwdet td .ar.nu{color:#8a9098}
  .mwdet td.v.up{color:#5b9bff}.mwdet td.v.dn{color:#ff4d4d}.mwdet td.v.nu{color:#c4c8d0}
  /* Trading tab — stacked one-click panels */
  .mwtrade{padding:0}
  .mwtp{border-bottom:1px solid #23272d;padding:4px 6px 6px}

  .mwtp .hd .tm{color:#8890a0;font-weight:400}
  .mwtp .row{display:flex;height:38px;gap:2px;align-items:stretch}

  .mwtp .sd.sell{background:linear-gradient(#2f7fd6,#1d63b4)}.mwtp .sd.buy{background:linear-gradient(#e2574c,#d23a2d)}
  .mwtp .sd:hover{filter:brightness(1.08)}
  .mwtp .sd .lbl{font-size:9px;letter-spacing:.5px;opacity:.9}
  .mwtp .sd .pr{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}.mwtp .sd .pr sup{font-size:10px}
  .mwtp .mid{width:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0d12}
  .mwtp .mid .q{color:#e6ebf2;font:700 12px Tahoma}.mwtp .mid .sp{color:#8890a0;font-size:9px;margin-top:2px}
  .mwtp .lh{display:flex;justify-content:space-between;font-size:9.5px;color:#8890a0;margin-top:2px}
  .mwtp .lh b{color:#c4c8d0;font-weight:600}
  /* Ticks tab chart */
  .mwtick{flex:1;min-height:0;position:relative;background:#ffffff}
  .watch{display:flex;flex-direction:column;overflow:hidden}
  .watch .mwscroll{flex:1;overflow-x:hidden;overflow-y:auto;min-height:0}
  .ctxmenu{position:fixed;z-index:1200;min-width:216px;background:#f0f0f0;border:1px solid #9a9a9a;
    box-shadow:2px 2px 5px rgba(0,0,0,.2);padding:2px;font:12px 'Segoe UI',Tahoma,sans-serif;color:#1c1c1c}
  .ctxmenu .ci{display:flex;align-items:center;gap:8px;height:24px;padding:0 10px 0 8px;cursor:default;border-radius:2px}
  .ctxmenu .ci:hover{background:#cfe3fb}
  .ctxmenu .ci.dis{color:#a0a0a0}.ctxmenu .ci.dis:hover{background:transparent}
  .ctxmenu .ci .ic{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#3a3f46}
  .ctxmenu .ci .ic svg{width:15px;height:15px}
  .ctxmenu .ci .lbl{flex:1;white-space:nowrap}
  .ctxmenu .ci .sc{color:#6a6a6a;font-size:11px;padding-left:22px}
  .ctxmenu .ci .ar{color:#6a6a6a;margin-left:auto}
  .ctxmenu .ci .ck{width:14px;text-align:center;color:#2e7d32}
  .ctxsep{height:1px;background:#c8c8c8;margin:3px 6px}
  .ctxmenu .ci.has{position:relative}
  /* ── Market-Watch MT5 classic dark context menu (right-click) ── */
  .mt5-context-menu{position:fixed;z-index:200000 !important;min-width:178px;background:#1e1e1e;border:1px solid #444;
    box-shadow:0 4px 14px rgba(0,0,0,.6);padding:2px 0;font:11px "Segoe UI",Tahoma,sans-serif;border-radius:0}
  .mt5-context-menu .mt5-mi{padding:5px 24px 5px 14px;color:#fff;cursor:pointer;white-space:nowrap;border-radius:0}
  .mt5-context-menu .mt5-mi:hover{background:#2b579a;color:#fff}
  .mt5-context-menu .mt5-mi.dis{color:#777;cursor:default}
  .mt5-context-menu .mt5-mi.dis:hover{background:transparent}
  .mt5-context-menu .mt5-sep{height:0;border-top:1px solid #444;margin:3px 0}

  .ctxmenu .ci .ic svg{width:15px;height:15px}
  /* ── Bottom: KPI strip + Excel-grid positions table ── */
  /* GLOBAL floating toolbox — pinned to the whole-window bottom, full width, above everything.
     Pulling it up covers the chart Y-axis AND the left navigator's bottom tabs (opaque overlay). */
  .toolbox{position:absolute;left:0;bottom:0;width:100%;z-index:9999;display:flex;flex-direction:column;
    background:#0d0d0d;box-shadow:0 -2px 10px rgba(0,0,0,.7)}
  .bottom{flex:none;height:var(--bottomh,188px);background:#0d0d0d;border-top:1px solid var(--cellbd);display:flex;flex-direction:column;overflow:hidden;
    font-family:"Segoe UI",Tahoma,sans-serif;font-size:11px}
  /* terminal menu tab bar — glued to the BOTTOM of the floating toolbox (integral, always bottom) */
  .tbxtabs{flex:none;height:24px;display:flex;align-items:stretch;background:linear-gradient(#20242a,#14171c);border-top:1px solid #000;overflow-x:auto}
  .tbxtabs .t{padding:3px 11px;font-size:11px;color:#a2aab6;border-right:1px solid #2a2e34;cursor:default}
  .tbxtabs .t.on{background:#000;color:#fff;border-top:2px solid #3a6ea5;margin-top:-1px}
  .acctline{display:flex;align-items:center;gap:18px;padding:4px 12px;background:#0d0d0d;border-top:1px solid #222;font-size:11.5px;color:#c8ccd2;white-space:nowrap;overflow-x:auto}
  .acctline .k{color:#8890a0}.acctline b{color:#fff;font-variant-numeric:tabular-nums}
  .postbl{flex:1;overflow:auto}
  table.pos{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  table.pos th{position:sticky;top:0;background:#141414;color:var(--dim);font-weight:600;font-size:11px;text-align:right;padding:3px 10px;border:1px solid #222}
  table.pos th:first-child,table.pos td:first-child{text-align:left}
  table.pos td{padding:3px 10px;border:1px solid #222;text-align:right}
  /* Balance bar row (tfoot): borderless full-width cell so the bar hugs the rows above */
  table.pos tfoot td{padding:0;border:0;text-align:left}
  table.pos tfoot .acctline{border-top:1px solid #222}
  .xclose{width:18px;height:18px;line-height:1;padding:0;border:1px solid #5a2020;border-radius:2px;
    background:linear-gradient(#7a2b2b,#5a1e1e);color:#ffd7d7;font-size:11px;cursor:pointer}
  .xclose:hover{background:linear-gradient(#a03636,#7a2626);color:#fff}
  .empty{padding:16px;color:var(--dim);text-align:center;border:none!important}
  .note{padding:2px 14px;color:var(--dim);font-size:11px}
  /* ── TIER 2: chart-window tab bar (bottommost, its own grid row) — MT5 navy/black ── */
  .charttabs{flex:none;height:24px;display:flex;align-items:stretch;overflow-x:auto;overflow-y:hidden;
    background:#0a0e14;border-top:1px solid #000;font-family:"Segoe UI",Tahoma,sans-serif}
  .charttabs .ctab{position:relative;display:flex;align-items:center;padding:0 12px 0 15px;font-size:11px;color:#9aa1ad;
    cursor:pointer;border-right:1px solid #1b1f27;background:#0a0e14;white-space:nowrap;border-radius:0}
  .charttabs .ctab:hover{color:#dfe3ea;background:#0f141c}
  .charttabs .ctab.on{background:#000;color:#fff}
  .charttabs .ctab.on::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:#2f7fe0}  /* 활성탭 왼쪽 파란 인디케이터 */
  .charttabs .ctab .tclose{margin-left:9px;color:#8890a0;font-size:10px;line-height:1;border-radius:0}
  .charttabs .ctab .tclose:hover{color:#fff;background:#e81123;padding:0 3px}
  .noch{margin:auto;color:#6a7078;font-size:12px;text-align:center;padding:20px}
  /* ── order form spinner steppers (Volume / SL / TP) ── */
  .orow .in.step input{border-right:none;border-top-right-radius:0;border-bottom-right-radius:0}
  .spin{display:flex;flex-direction:column;width:16px;height:25px;border:1px solid #777;border-left:none;flex:none}
  .spin b{flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(#fbfbfb,#e6e6e6);
    cursor:pointer;font-size:7px;color:#333;line-height:1;user-select:none}
  .spin b:hover{background:#d7e6fb}
  .spin b:first-child{border-bottom:1px solid #bbb}
  /* ── MT5 popup Order dialog (light theme, matches the desktop terminal dialog) ── */
  /* ── New Order popup — MODERN single-column dark card (400×550, matte black) ── */
  .omodal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100000 !important;display:flex;
    align-items:center;justify-content:center;font-family:"Segoe UI",Tahoma,Arial,sans-serif}   /* above the floating toolbox (z-9999) */
  .omodal{width:400px;max-width:96vw;height:550px;max-height:94vh;background:#0a0e14;border:1px solid #222;
    box-shadow:0 16px 50px rgba(0,0,0,.7);display:flex;flex-direction:column;color:#fff}
  .omodal *{border-radius:0 !important;box-sizing:border-box;font-family:inherit}
  .omodal .obar{display:flex;align-items:center;height:34px;padding:0 6px 0 14px;background:#0d1420;
    border-bottom:1px solid #222;font-weight:600;color:#fff;font-size:13px}
  .omodal .obar .t{flex:1;letter-spacing:.3px}
  .omodal .obar .wb{width:30px;height:26px;display:inline-flex;align-items:center;justify-content:center;color:#8890a0;cursor:pointer;font-size:13px}
  .omodal .obar .wb.x:hover{background:#e81123;color:#fff}
  .om-body{flex:1;display:flex;flex-direction:column;gap:13px;padding:16px 18px;overflow-y:auto;min-height:0}
  /* fields */
  .om-field{display:flex;flex-direction:column;gap:5px}
  .om-field>label{font-size:10.5px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:#8890a0}
  .om-field select,.om-field input,.om-vol input{width:100%;height:34px;background:#0d1420;border:1px solid #222;color:#fff;
    font-size:14px;padding:0 10px;outline:none}
  .om-field select:focus,.om-field input:focus,.om-vol input:focus{border-color:#1a5cff;box-shadow:0 0 0 2px rgba(26,92,255,.28)}  /* electric-blue focus glow */
  .om-vol{display:flex;align-items:stretch}
  .om-vol b{width:38px;flex:none;display:flex;align-items:center;justify-content:center;background:#0d1420;border:1px solid #222;color:#fff;cursor:pointer;font-size:18px;user-select:none}
  .om-vol b:hover{background:#16202e}
  .om-vol input{text-align:center;border-left:0;border-right:0}
  /* SL/TP input with an internal ±10-pip mini spinner (respects the volume-arrow style) */
  .om-price{position:relative;display:flex;align-items:stretch}
  .om-price input{flex:1;padding-right:24px}
  .om-pspin{position:absolute;right:0;top:0;bottom:0;width:22px;display:flex;flex-direction:column;border-left:1px solid #222}
  .om-pspin b{flex:1;display:flex;align-items:center;justify-content:center;background:#0d1420;color:#fff;cursor:pointer;font-size:8px;line-height:1;user-select:none}
  .om-pspin b:first-child{border-bottom:1px solid #222}
  .om-pspin b:hover{background:#16202e;color:#1a5cff}
  /* big Bid/Ask quote — SAME Arial-Black BigFig pixel-look as the one-click panel */
  .om-quote{display:flex;align-items:stretch;gap:8px}
  .om-px{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:11px 0;border:1px solid #222;background:#0d1420}
  /* live SPREAD box between BID and ASK */
  .om-spread{flex:none;width:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    background:#161b22;border:1px solid #30363d}
  .om-spread .om-sp-l{font-size:8.5px;font-weight:700;letter-spacing:1px;color:#8890a0}
  .om-spread b{font-size:16px;font-weight:700;color:#00ff66;font-variant-numeric:tabular-nums;line-height:1}
  .om-px .om-tag{font-size:10px;font-weight:700;letter-spacing:1px;color:#8890a0}
  .om-px .bf{display:inline-flex;align-items:baseline;justify-content:center;line-height:1;font-variant-numeric:tabular-nums;color:#fff}
  .om-px .bf .sm{font-size:15px;font-weight:normal;color:#fff}
  .om-px .bf .bg{font-size:30px;font-weight:normal;line-height:1;color:#fff;font-family:"Arial Black","Segoe UI",Arial,sans-serif}
  .om-px .bf .fr{align-self:flex-start;font-size:14px;font-weight:normal;color:#fff;margin-left:1px;transform:translateY(-5px)}
  /* advanced settings — slide down when One-Click is OFF */
  .om-adv{display:flex;flex-direction:column;gap:13px}   /* precision settings — always visible (toggle removed) */
  .om-margin{font-size:11.5px;color:#8890a0}
  /* bottom Sell/Buy — MATTE FLAT (Binance/TradingView pro), no gradient/gloss */
  .om-btns{display:flex;gap:10px;margin-top:auto}
  .om-btns button{flex:1;height:52px;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px;
    font-family:"Segoe UI",Arial,sans-serif;transition:opacity .15s ease}
  .om-btns .om-sell{background:#ff3b30 !important}
  .om-btns .om-buy{background:#007aff !important}
  .om-btns button:hover{opacity:.88}
  .om-btns button:disabled{opacity:.4;cursor:not-allowed}
  .obtns button:active{box-shadow:inset 0 2px 4px rgba(0,0,0,.35)}
  .obtns button:disabled{background:#c2c7cd;color:#eef0f2;border-color:#9aa0a7;cursor:not-allowed;filter:none;box-shadow:inset 1px 1px 2px rgba(0,0,0,.12)}
  .otick{flex:1;min-width:0;margin:8px 8px 8px 0;border:1px solid #cfd4da;background:#ffffff;display:flex;flex-direction:column}
  .otick .ttool{height:26px;flex:none;border-bottom:1px solid #e6e9ec;display:flex;align-items:center;gap:10px;padding:0 8px;background:#f3f5f7}
  .otick .ttool span{color:#6a7078;font-size:13px}
  .otick .tcanvas{flex:1;min-height:0;position:relative}

  /* ══════════════ LEGEND THEME (Robinhood jet-black) — View → Color Theme → Legend Mode. Charts
     re-theme via themeBus. The DEFAULT MT5 dark candle theme is UNTOUCHED. Robinhood palette:
     master #0E1015 · inner boxes #000000 · borders #1D212A · up #00FF55 · down #FF453A. ══ */
  .terminal.light{ --bg:#0E1015; --panel:#000000; --panel2:#000000; --line:#1D212A; --cellbd:#1D212A;
    --text:#e6e9ee; --dim:#7a828e; --accent:#00FF55; --up:#00FF55; --down:#FF453A; background:#0E1015; color:#e6e9ee; }
  /* top bars — matte master black, thin #1D212A divider */
  .terminal.light .menu{background:#0E1015;border-bottom:1px solid #1D212A;color:#e6e9ee}
  .terminal.light .menu .mi{color:#e6e9ee}.terminal.light .menu .mi.on{background:#000000}
  .terminal.light .tools{background:#0E1015;border-bottom:1px solid #1D212A}
  .terminal.light .statusbar{background:#0E1015;color:#e6e9ee;border-top:1px solid #1D212A}
  /* menu dropdowns — real black, neon-green hover */
  .terminal.light .mdrop{background:#000000;border:1px solid #1D212A;box-shadow:0 6px 18px rgba(0,0,0,.85)}
  .terminal.light .mdrop .row{color:#e6e9ee}
  .terminal.light .mdrop .row:hover{background:#0E1015;color:#00FF55}   /* subtle: dark highlight + green text, not a full green bar */
  .terminal.light .mdrop .sep{background:#1D212A}
  .terminal.light .mdrop .hd{color:#7a828e}.terminal.light .mdrop .row .sc,.terminal.light .mdrop .row .ar{color:#7a828e}
  .terminal.light .mdrop .row.dis{color:#4a4f57}
  /* Market-Watch right-click menu */
  .terminal.light .mt5-context-menu{background:#000000;border:1px solid #1D212A;box-shadow:0 6px 18px rgba(0,0,0,.85)}
  .terminal.light .mt5-context-menu .mt5-mi{color:#e6e9ee}
  .terminal.light .mt5-context-menu .mt5-mi:hover{background:#0E1015;color:#00FF55}
  .terminal.light .mt5-context-menu .mt5-mi.dis{color:#4a4f57}
  .terminal.light .mt5-context-menu .mt5-sep{border-top-color:#1D212A}
  /* TOP TOOLBAR — flat, light icons, neon-green hover/active (no cobalt filter in Legend) */
  .terminal.light .tbtn,.terminal.light .tf b,.terminal.light .tibtn{background:transparent !important;border:1px solid transparent !important;border-radius:0 !important;color:#e6e9ee !important;box-shadow:none !important}
  .terminal.light .tbtn svg,.terminal.light .tibtn svg{color:#c8ccd2}
  .terminal.light .tibtn svg [stroke]{stroke:#c8ccd2}.terminal.light .tibtn svg [fill]:not([fill="none"]){fill:#c8ccd2}
  .terminal.light .tf b{color:#7a828e !important}
  .terminal.light .tbtn:hover,.terminal.light .tf b:hover,.terminal.light .tibtn:hover{background:transparent !important;border:1px solid #1D212A !important;color:#ffffff !important}
  .terminal.light .tbtn:hover svg,.terminal.light .tibtn:hover svg{color:#ffffff}
  .terminal.light .tf b.on,.terminal.light .tibtn.on,.terminal.light .tbtn.algo.on{background:#000000 !important;border:1px solid #00FF55 !important;color:#00FF55 !important}
  .terminal.light .tf b.on svg,.terminal.light .tibtn.on svg{color:#00FF55 !important}
  .terminal.light .tbtn.algo .play{color:#00FF55}
  .terminal.light .tsep{background:#1D212A !important;width:1px;height:16px;margin:0 6px}
  /* LEFT: Market Watch + Navigator — real black boxes, light text */
  .terminal.light .left,.terminal.light .watch,.terminal.light .nav{background:#000000;color:#e6e9ee}
  .terminal.light .nav .navhd{background:#0E1015;color:#e6e9ee;border-bottom:1px solid #1D212A}
  .terminal.light .nav li,.terminal.light .nav li.navf,.terminal.light .nav li.child,
  .terminal.light .nav li.ind,.terminal.light .nav li.dim{color:#e6e9ee !important;font-weight:500}
  .terminal.light .nav li.root{color:#e6e9ee !important;font-weight:700}
  .terminal.light .nav li:hover{background:#0E1015}
  .terminal.light .nav li.ind.on,.terminal.light .nav li.leaf{color:#00FF55 !important}   /* applied indicator = neon green */
  .terminal.light .nav li.ind .ic{color:#7a828e}.terminal.light .nav li.ind.on .ic{color:#00FF55}
  .terminal.light .nav .tw{color:#7a828e}
  .terminal.light .mwhead{background:#0E1015;color:#e6e9ee;border-bottom:1px solid #1D212A;font-weight:600}
  .terminal.light .mwt{color:#e6e9ee}
  .terminal.light .mwt th{background:#0E1015;color:#7a828e;border:none;border-bottom:1px solid #1D212A;font-weight:600}
  .terminal.light .mwt td{border:none;border-bottom:1px solid #1D212A;color:#e6e9ee;font-weight:600}   /* no vertical grid — data floats on jet-black */
  .terminal.light .mwt td.sym{color:#e6e9ee;font-weight:700}
  /* Robinhood signature: up = neon green #00FF55, down = orange-red #FF453A (ticks + change unified) */
  .terminal.light .mwt td.tick-up{color:#00FF55 !important}
  .terminal.light .mwt td.tick-down{color:#FF453A !important}
  .terminal.light .mwt td.text-up{color:#00FF55 !important}
  .terminal.light .mwt td.text-down{color:#FF453A !important}
  .terminal.light .mwt .au{color:#00FF55 !important}.terminal.light .mwt .ad{color:#FF453A !important}
  .terminal.light .mwt tr.sel td{background:rgba(0,255,85,.10) !important;color:#ffffff !important}   /* subtle green tint, not a solid green row */
  .terminal.light .mwt tr:not(.sel):hover td{background:#0E1015 !important}
  .terminal.light .mwt td.mwspr{color:#7a828e}
  .terminal.light .mwtabs{background:#0E1015;border-top:1px solid #1D212A}
  .terminal.light .mwtabs .mt{color:#7a828e}
  .terminal.light .mwtabs .mt.on{background:#000000;color:#e6e9ee;border-top-color:#00FF55}
  /* Details tab */
  .terminal.light .mwdet .sh{color:#00FF55;border-bottom-color:#1D212A}
  .terminal.light .mwdet td{border-bottom-color:#1D212A}
  .terminal.light .mwdet td.k{color:#e6e9ee;font-weight:600}
  .terminal.light .mwdet td .ar.up{color:#00FF55}.terminal.light .mwdet td .ar.dn{color:#FF453A}.terminal.light .mwdet td .ar.nu{color:#7a828e}
  .terminal.light .mwdet td.v.up{color:#00FF55}.terminal.light .mwdet td.v.dn{color:#FF453A}.terminal.light .mwdet td.v.nu{color:#e6e9ee}
  /* CHART workspace — master-black stage, real-black windows, thin #1D212A borders */
  .terminal.light .charts,.terminal.light .chartstage{background:#0E1015}
  .terminal.light .win{background:#000000;border:1px solid #1D212A;box-shadow:none}
  .terminal.light .win.active{border-color:#1D212A;box-shadow:0 0 0 1px #1D212A}   /* no glow-box, just the hairline */
  /* header MELTS into the window — same #000000, only a bottom hairline; no gray 3D frame */
  .terminal.light .cell-title{background:#000000;color:#ffffff;border:none;border-bottom:1px solid #1D212A}
  .terminal.light .win.active .cell-title{background:#000000;color:#00FF55;border-bottom:1px solid #1D212A}
  /* min / max / close — thin glyphs, no boxes; hover just recolours */
  .terminal.light .cell-title .wc span{color:#7a828e;background:transparent}
  .terminal.light .cell-title .wc span:hover{background:transparent;color:#ffffff}
  .terminal.light .cell-title .wc span.cl:hover{background:transparent;color:#FF453A}
  .terminal.light .charttabs{background:#0E1015;border-top:1px solid #1D212A}
  .terminal.light .charttabs .ctab{background:#0E1015;color:#7a828e;border-right:1px solid #1D212A}
  .terminal.light .charttabs .ctab:hover{background:#000000;color:#e6e9ee}
  .terminal.light .charttabs .ctab.on{background:#000000;color:#00FF55}
  .terminal.light .noch{color:#7a828e}
  /* BOTTOM terminal toolbox — real black, up green / down red */
  .terminal.light .bottom{background:#000000;border-top:1px solid #1D212A;color:#e6e9ee}

/* ══ MT5 ORDER-LIFECYCLE SOUNDS ══════════════════════════════════════════════
   Preloaded HTML5 Audio, one per lifecycle event. Files live at /assets/sounds/.
   (Drop the MT5 originals there — paths below are the standard.) Every trigger is
   fire-and-forget with .catch so a missing file / policy block never breaks a fill.
   Playback happens up to ~550ms AFTER the click (past the ECN delay), so we UNLOCK
   the audio on the user's very first gesture (see below) to dodge autoplay blocking. */
// Each event has (a) an optional MT5 .wav in /assets/sounds/ AND (b) a built-in WebAudio
// fallback tone that ALWAYS plays even when the file is absent — so sound works out of the
// box right now, and auto-swaps to the real MT5 clip the moment you drop the .wav in.
let _actx=null;

function _tone(specs){   // specs: [{f0, f1?, type?, t0, dur, gain?}] — layered oscillator blips
  const ctx=_primeCtx(); if(!ctx) return; const now=ctx.currentTime;
  specs.forEach(s=>{ try{
    const osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type=s.type||'square'; osc.frequency.setValueAtTime(s.f0, now+s.t0);
    if(s.f1) osc.frequency.exponentialRampToValueAtTime(s.f1, now+s.t0+s.dur);
    g.gain.setValueAtTime(0.0001, now+s.t0);
    g.gain.exponentialRampToValueAtTime(s.gain||0.2, now+s.t0+0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, now+s.t0+s.dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(now+s.t0); osc.stop(now+s.t0+s.dur+0.03);
  }catch(e){} });
}

const priceStore = {

    const now=Date.now();
    rows.forEach(p=>{
      const sym=p.symbol; if(WATCH.indexOf(sym)<0) return;
      const mid=+p.mid||0; if(mid<=0) return;
      const spr=(+p.spr_pts||10); this._set(sym, mid, spr*pip(sym)/2, spr, now);
    });
  },
  _simulate(){ // dev fallback: random walk + a small PERSISTENT per-symbol drift so the daily
    const now=Date.now(); if(!this.drift) this.drift={};   // change has a stable sign (no arrow flicker)
    WATCH.forEach(sym=>{
      if(this.drift[sym]==null) this.drift[sym]=(Math.random()-0.5)*0.00009;
      const cur=this.mids[sym]? this.mids[sym].mid : BASE[sym];
      const mid=cur*(1+(Math.random()-0.5)*0.0006 + this.drift[sym]); this._set(sym, mid, 10*pip(sym)/2, 10, now, 3*pip(sym));
    });
  },
  async pull(){
    const rows=await feedPrices();
    if(rows && rows.length){ this.live=true; this._apply(rows); } else { this.live=false; this._simulate(); }
    this.notify();
  },
  start(){ if(this.timer) return; this.pull(); this.timer=setInterval(()=>this.pull(), 1000); }, // 1 poll/sec — server 1s-cached
  subscribe(fn){ this.listeners.add(fn); fn(this.mids); return ()=>this.listeners.delete(fn); },
  get(sym){ return this.mids[sym]; },
};

// ── candle history: try the fx-prices Edge, fall back to a synthetic seed (live bars are REAL feed). ──
async function loadCandles(symbol, tf){
  // WebTrader is a SERVER-INDEPENDENT demo (WT_DEMO): use the deterministic 200-bar synth for EVERY
  // timeframe. The live fx-prices feed returned a sparse/clustered history for some TFs (M5/M30 came
  // back as 2 giant candles), so we don't depend on it here. Flip WT_DEMO off to wire a real feed.
  if(!WT_DEMO){ try{ if(window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.db.functions){
    const x=await AlpexaSync.db.functions.invoke('fx-prices',{body:{candles:symbol,tf:tf||'M15'}});
    if(x&&!x.error&&x.data&&Array.isArray(x.data.candles)&&x.data.candles.length>=30)
      return x.data.candles.map(c=>({ time:Math.floor((c.t||c.time)/1000), open:+c.o||+c.open, high:+c.h||+c.high, low:+c.l||+c.low, close:+c.c||+c.close }));
  } }catch(e){} }
  return synthCandles(symbol, tf);   // full 200-bar deterministic history for every timeframe
}
const TF_SEC = { M1:60, M5:300, M15:900, M30:1800, H1:3600, H4:14400, D1:86400 };
// DETERMINISTIC synthetic history — a pure function of (symbol, absolute bar time). The SAME bar
// always renders the SAME OHLC, so a refresh keeps the identical chart (no more random walk that
// redraws on every reload). Only the final bar anchors to the live mid, so the history connects to
// the live price line. No storage — the determinism is in the seed, not a cache. (#5 intact.)
function synthCandles(symbol, tf){
  const step=TF_SEC[tf]||900, n=200;
  const nowB=Math.floor(Date.now()/1000/step)*step;     // current bar open-time, bucketed → identical across quick refreshes
  const t0=nowB-(n-1)*step;
  const end=(priceStore.get(symbol)&&priceStore.get(symbol).mid)||BASE[symbol]||1;
  // FNV-1a hash → [0,1): stable pseudo-random keyed by symbol + a bar's absolute time.
  const h=(k)=>{ let s=0x811c9dc5>>>0; const str=symbol+'|'+k; for(let i=0;i<str.length;i++){ s=Math.imul(s^str.charCodeAt(i),0x01000193); } return (s>>>0)/4294967296; };
  const vol=(symbol.indexOf('JPY')>=0?0.0011:0.0009);   // per-bar log-return scale
  // integrate a deterministic zero-mean walk, then shift so the LAST close == live mid (shape fixed,
  // only a tiny vertical offset tracks the drifting mid → the chart looks stable between refreshes).
  const cum=[0]; for(let i=0;i<n;i++) cum.push(cum[i]+(h(t0+i*step)-0.5)*vol);
  const shift=cum[n];
  const out=[];
  for(let i=0;i<n;i++){
    const o=end*Math.exp(cum[i]-shift), c=end*Math.exp(cum[i+1]-shift);
    const wk=(0.00006+h(t0+i*step+7)*vol*0.5);          // deterministic wick beyond the body
    const hi=Math.max(o,c)*(1+wk), lo=Math.min(o,c)*(1-wk);
    out.push({ time:t0+i*step, open:o, high:hi, low:lo, close:c });
  }
  return out;
}

/* ══════════════════════════════════════════════════════════════════════════
   INDICATOR ENGINE — extensible, chart-engine-agnostic. Each indicator is a pure
   compute + a render descriptor (main overlay | bottom sub-band). Adding one = a
   single registry entry; ChartCell needs no change. This is the seam a future
   'TradingView Advanced Charts' / server-computed overlay drops into.
   ══════════════════════════════════════════════════════════════════════════ */
function _sma(c,p){ const o=[]; let s=0; for(let i=0;i<c.length;i++){ s+=c[i].close; if(i>=p) s-=c[i-p].close; if(i>=p-1) o.push({time:c[i].time,value:s/p}); } return o; }
function _ema(c,p){ const o=[],k=2/(p+1); let e=null; for(let i=0;i<c.length;i++){ const x=c[i].close; e=e==null?x:x*k+e*(1-k); if(i>=p-1) o.push({time:c[i].time,value:e}); } return o; }
function _rsi(c,p){ const o=[]; let g=0,l=0; for(let i=1;i<c.length;i++){ const d=c[i].close-c[i-1].close,u=Math.max(d,0),w=Math.max(-d,0);
  if(i<=p){ g+=u; l+=w; if(i===p){ g/=p; l/=p; o.push({time:c[i].time,value:l===0?100:100-100/(1+g/l)}); } }
  else { g=(g*(p-1)+u)/p; l=(l*(p-1)+w)/p; o.push({time:c[i].time,value:l===0?100:100-100/(1+g/l)}); } } return o; }
function _macd(c){ const a=_ema(c,12), b=new Map(_ema(c,26).map(x=>[x.time,x.value])); return a.filter(x=>b.has(x.time)).map(x=>({time:x.time,value:x.value-b.get(x.time)})); }

const TRADE_API = (typeof window!=='undefined' && window.ALPEXA_TRADE_API) || '/api/trade/order';

// base-currency → USD rate for margin conversion (MT5-standard). USD base = 1; USD quote
// = the pair price; a cross (EURJPY) uses the base's USD pair if the feed has it.
function baseUsdRate(symbol){
  const base=symbol.slice(0,3), quote=symbol.slice(3), px=priceStore.get(symbol);
  if(base==='USD') return 1;
  if(quote==='USD') return px? px.mid : 0;
  const b=priceStore.get(base+'USD'); if(b) return b.mid;
  const inv=priceStore.get('USD'+base); if(inv&&inv.mid) return 1/inv.mid;
  return px? px.mid : 0;   // best-effort fallback
}
// required margin (in USD account ccy) for a volume at a leverage — the MT5 formula.
function requiredMargin(symbol, volume, leverage){
  const lev=Math.max(1,+leverage||100); return (+volume||0)*CONTRACT*baseUsdRate(symbol)/lev;
}

function useTradeEngine(){
  const [acct,setAcct]=React.useState(positionsStore.acct);
  const [pos,setPos]=React.useState(positionsStore.pos);
  const [leverage,setLeverageState]=React.useState(tradeSettings.leverage);
  const [tick,setTick]=React.useState(0);   // re-render on price ticks so margin figures stay live
  React.useEffect(()=> positionsStore.subscribe(s=>{ setAcct(s.acct); setPos([...s.pos]); }), []);
  React.useEffect(()=> tradeSettings.subscribe(setLeverageState), []);
  React.useEffect(()=> priceStore.subscribe(throttle(()=>setTick(t=>t+1),RENDER_MS)), []);   // live P&L/equity (mobile-throttled)
  const connected = !!(window.ALPEXA_TRADE_API);   // real execution endpoint present?
  const setLeverage = (n)=> tradeSettings.setLeverage(n);
  // ── leverage → real-time order affordability (all display; server stays the money owner) ──
  const floating = pos.reduce((s,p)=>{ if(p._demo && p.profit!=null) return s+(+p.profit);
    const m=priceStore.get(p.symbol); if(!m) return s; const dir=sideUp(p.side)==='SELL'?-1:1;
    return s + dir*(m.mid-(+p.open_price||m.mid))*lotsOf(p)*CONTRACT*(p.symbol.includes('JPY')?0.0067:1); }, 0);
  const balance = acct?+acct.balance||0:0;
  const equity  = balance + floating;
  const usedMargin = pos.reduce((s,p)=> s + requiredMargin(p.symbol, lotsOf(p), leverage), 0);
  const freeMargin = equity - usedMargin;
  const marginFor  = (symbol, volume)=> requiredMargin(symbol, volume, leverage);
  const maxVolume  = (symbol)=>{ const one=requiredMargin(symbol, 1, leverage);
    return one>0 ? Math.max(0, Math.floor(freeMargin/one*100)/100) : 0; };   // lots affordable with free margin
  // B-BOOK ORDER EXECUTION — the client only CALLS the server; it never sets the fill
  // price, inserts a position, or moves balance. fx_open decides the entry price, enforces
  // the free-margin gate, and inserts the position server-side (idempotent by local_id).
  async function placeOrder({ symbol, side, volume, leverage:lev, requestedPrice, maxSlippage }){
    const size=+volume||0.01;
    const local_id='wt-'+Date.now()+'-'+Math.floor(Math.random()*1e6);
    // 1) external MT5 Web API (only if the operator wired one)
    if(window.ALPEXA_TRADE_API){
      try{ const r=await fetch(TRADE_API,{ method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ symbol, side, volume:size, leverage:+lev||undefined, local_id, ts:Date.now() }) });
        playSnd(r.ok? sndOpen : sndError);   // MT5 fill / reject sound
        return { ok:r.ok, status:r.status, local_id }; }catch(e){ playSnd(sndError); return { ok:false, reason:String(e) }; }
    }
    // 2) B-Book: our Supabase fx_open RPC (server-authoritative — it sets the fill price, enforces
    //    the free-margin gate + SLIPPAGE guard, inserts the position). We pass leverage (server
    //    CLAMPS to the house cap) plus the requested price + max slippage so a violent tick between
    //    click and arrival is REJECTED server-side. If the consolidated fn isn't deployed yet we
    //    transparently retry the base signature (slippage/leverage simply not enforced until then).
    if(!WT_DEMO && window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.me){   // WT_DEMO skips the server → falls through to the demo ledger (nothing hits admin)
      try{
        const base={ p_local_id:local_id, p_symbol:symbol, p_side:side, p_size:size };
        const full={ ...base,
          p_leverage:(lev?+lev:null),
          p_requested_price:(requestedPrice!=null?+requestedPrice:null),
          p_max_slippage:(maxSlippage!=null?+maxSlippage:null) };
        let r=await AlpexaSync.db.rpc('fx_open', full);
        if(r&&r.error && /PGRST202|could not find the function|does not exist|schema cache/i.test(((r.error&&r.error.message)||'')+((r.error&&r.error.code)||''))){
          r=await AlpexaSync.db.rpc('fx_open', lev ? { ...base, p_leverage:+lev } : base);   // pre-slippage deploy → older signature
        }
        const d=r&&r.data;
        if(r&&!r.error&&d&&d.ok){ positionsStore.loadPos(); playSnd(sndOpen);   // ← fx_open 성공 정확한 시점
          return { ok:true, server:true, open:d.open, margin:d.margin, local_id }; }
        playSnd(sndError);   // 슬리피지 초과(SLIPPAGE)/잔고부족(MARGIN)/RPC 에러 → 실패음(timeout.wav)
        return { ok:false, server:true, reason:(d&&d.error)||(r&&r.error&&r.error.message)||'rejected', code:(d&&d.code)||null };
      }catch(e){ playSnd(sndError); return { ok:false, server:true, reason:String(e&&e.message||e) }; }
    }
    // 3) logged out → caller may fall back to the demo ledger (no real money)
    return { ok:false, reason:'not_logged_in' };
  }
  // CLOSE — fx_close computes realized P&L server-side and banks it via settlements
  // (trg_settlement_balance → accounts.balance). The client never touches balance.
  async function closeOrder(localId){
    if(window.ALPEXA_TRADE_API){ try{ const r=await fetch(TRADE_API+'?close='+encodeURIComponent(localId),{method:'POST'}); playSnd(r.ok? sndClose : sndError); return {ok:r.ok}; }catch(e){ playSnd(sndError); return {ok:false,reason:String(e)}; } }
    if(!WT_DEMO && window.AlpexaSync&&AlpexaSync.db&&AlpexaSync.me){   // WT_DEMO: demo rows close via removeDemo (see BottomBar) — never server
      try{ const r=await AlpexaSync.db.rpc('fx_close',{ p_local_id:localId });
        const d=r&&r.data;
        if(r&&!r.error&&d&&d.ok){ positionsStore.loadPos(); positionsStore.loadAcct(); playSnd(sndClose);   // ← fx_close 완공
          return { ok:true, pnl:d.pnl }; }
        playSnd(sndError);
        return { ok:false, reason:(d&&d.error)||'close failed' };
      }catch(e){ playSnd(sndError); return { ok:false, reason:String(e&&e.message||e) }; }
    }
    return { ok:false, reason:'not_logged_in' };
  }
  return { acct, pos, connected, placeOrder, closeOrder, TRADE_API,
    leverage, setLeverage, balance, equity, floating, usedMargin, freeMargin, marginFor, maxVolume };
}

/* ── One-click order box (SELL orange / vol / BUY blue) — live Ask/Bid inside the
   buttons; clicks route through useTradeEngine (server-authoritative, no local money). ── */
// MT5 big-figure price: small head · large pips · superscript last digit (e.g. 1.14 37⁶)
function BigFig({ symbol, v }){
  const s=fmtPx(symbol,v); if(s==='—') return <span className="bf">—</span>;
  return <span className="bf"><span className="sm">{s.slice(0,-3)}</span><span className="bg">{s.slice(-3,-1)}</span><span className="fr">{s.slice(-1)}</span></span>;
}
function OrderBox({ symbol }){
  const [m,setM]=React.useState(priceStore.get(symbol)||{});
  const [vol,setVol]=React.useState('0.01');
  const [bidDir,setBidDir]=React.useState('up');   // SELL side follows Bid; BUY side follows Ask (independent, sticky)
  const [askDir,setAskDir]=React.useState('up');
  const prevBid=React.useRef(null), prevAsk=React.useRef(null);
  const eng=useTradeEngine();
  const [busy,setBusy]=React.useState(null);   // null | 'sell' | 'buy' — ECN 처리중 상태(렌더용)
  const [flash,setFlash]=React.useState(false); // 체결 성공 순간 패널 플래시
  const busyRef=React.useRef(null);            // 동기 레이스 가드(state는 비동기라 클릭 중복 못 막음)
  React.useEffect(()=> priceStore.subscribe(throttle(mids=>{ const q=mids[symbol]||{}; setM({...q});
    if(q.bid!=null){ const p=prevBid.current; if(p!=null){ if(q.bid>p) setBidDir('up'); else if(q.bid<p) setBidDir('down'); } prevBid.current=q.bid; }
    if(q.ask!=null){ const p=prevAsk.current; if(p!=null){ if(q.ask>p) setAskDir('up'); else if(q.ask<p) setAskDir('down'); } prevAsk.current=q.ask; }
  }, 400)), [symbol]);
  const sellCls = bidDir==='down' ? 'oc-red' : 'oc-blue';   // blue on up/hold, red on down
  const buyCls  = askDir==='down' ? 'oc-red' : 'oc-blue';
  const send=async(side)=>{
    if(busyRef.current) return;                       // debounce — 한 번에 한 주문만(레이스/이중발사 차단)
    busyRef.current=side; setBusy(side);
    const q=priceStore.get(symbol)||m; const price=side==='buy'?q.ask:q.bid;   // the quote the trader is looking at = requested price
    const maxSlip=SLIP_PIPS*pip(symbol);   // adverse-deviation tolerance passed to the server slippage guard
    // ── ECN 오더 샌드박스: LP 왕복 지연(250~550ms)을 RPC 발사 '앞단'에만 시뮬레이션 ──
    const lat=250+Math.floor(Math.random()*301);      // 250..550 ms
    await new Promise(res=>setTimeout(res,lat));
    let r; try{ r=await eng.placeOrder({ symbol, side, volume:vol, leverage:eng.leverage, requestedPrice:price, maxSlippage:maxSlip }); }  // one-click B-Book (+slippage)
    catch(e){ r={ok:false,reason:'error'}; }
    if(!r||!r.ok){
      // A REAL server rejection (slippage/margin/rpc error, r.server===true) must NOT land — the
      // trade was refused; sndError already fired in placeOrder (뚜엑/timeout.wav). Only the
      // logged-out path falls back to the demo ledger so the terminal stays usable for testing.
      if(r&&r.reason==='not_logged_in'){ positionsStore.addDemo({ symbol, side, volume:+vol||0.01, price }); playSnd(sndOpen); }
      else console.warn('one-click order rejected:', (r&&(r.code||r.reason))||'unknown');   // slippage/margin → error sound only, no fill
    }
    // ── The Snap: 처리 상태 해제 → 패널 0.1s 플래시 (사운드는 placeOrder에서 sndOpen/sndError로 발동) ──
    busyRef.current=null; setBusy(null);
    setFlash(true); setTimeout(()=>setFlash(false),120);
  };
  const dec=()=>setVol((Math.max(0.01,(+vol||0.01)-0.01)).toFixed(2));
  const inc=()=>setVol((Math.max(0.01,(+vol||0)+0.01)).toFixed(2));
  const busySell=busy==='sell', busyBuy=busy==='buy';
  return (   // always shown — the 190×64 one-click panel is locked visible on every chart
    <div className={"obox"+(flash?' ecn-flash':'')}>
      <div className="oc-top">
        <div className={"oc-lbl "+sellCls+(busySell?' oc-busy':'')} title="Sell at Bid" onClick={(e)=>{e.stopPropagation();send('sell');}}>SELL</div>
        <div className="oc-vol" onClick={e=>e.stopPropagation()}>
          <b className="dn" onClick={dec} title="−0.01">▼</b>
          <input value={vol} onChange={e=>setVol(e.target.value)} title="Volume (lots)" />
          <b className="up" onClick={inc} title="+0.01">▲</b>
        </div>
        <div className={"oc-lbl "+buyCls+(busyBuy?' oc-busy':'')} title="Buy at Ask" onClick={(e)=>{e.stopPropagation();send('buy');}}>BUY</div>
      </div>
      <div className="oc-bot">
        <div className={"oc-price "+sellCls+(busySell?' oc-busy':'')} title="Sell at Bid" onClick={(e)=>{e.stopPropagation();send('sell');}}><BigFig symbol={symbol} v={m.bid} />{busySell&&<span className="oc-spin" aria-hidden="true"></span>}</div>
        <div className={"oc-price "+buyCls+(busyBuy?' oc-busy':'')} title="Buy at Ask" onClick={(e)=>{e.stopPropagation();send('buy');}}><BigFig symbol={symbol} v={m.ask} />{busyBuy&&<span className="oc-spin" aria-hidden="true"></span>}</div>
      </div>
    </div>
  );
}

// build the main price series for a chart in the requested MT5 chart type
function makePriceSeries(c, type, sym){
  // FX/crypto precision: Y-axis + price-line axis labels show FULL 5 digits (JPY 3), never
  // the library default precision:2 (that was the "1.41" truncation). minMove = 10^-precision.
  const d=sym?digits(sym):5;
  const pf={ type:'price', precision:d, minMove:Math.pow(10,-d) };
  if(type==='line'){
    const o={ color:'#e8b23a', lineWidth:2, priceLineVisible:false, lastValueVisible:true, priceFormat:pf };
    return c.addLineSeries ? c.addLineSeries(o) : c.addSeries(LightweightCharts.LineSeries, o);
  }
  if(type==='bar'){
    const o={ upColor:'#00ff00', downColor:'#ff2020', thinBars:false, priceFormat:pf };
    return c.addBarSeries ? c.addBarSeries(o) : c.addSeries(LightweightCharts.BarSeries, o);
  }
  const ct=CANDLE_THEME[themeBus.theme]||CANDLE_THEME.dark;   // up=green hollow, down=red filled
  const o={ upColor:ct.upBody, downColor:ct.downBody, wickUpColor:ct.upLine, wickDownColor:ct.downLine,
    borderUpColor:ct.upLine, borderDownColor:ct.downLine, borderVisible:true, priceFormat:pf };
  return c.addCandlestickSeries ? c.addCandlestickSeries(o) : c.addSeries(LightweightCharts.CandlestickSeries, o);
}

// Fibonacci retracement levels + colours (module scope so both the draw handlers and the
// handle-drag recompute can reach them).
const FIB_LV=[0,0.236,0.382,0.5,0.618,0.786,1], FIB_COL=['#8a9098','#e0709a','#f0c674','#82d982','#5fb0ff','#c792ea','#8a9098'];
// pixel distance from point to a line segment (trend-line hit-test)
function distSeg(px,py,x1,y1,x2,y2){ const dx=x2-x1,dy=y2-y1,L2=dx*dx+dy*dy;
  let t=L2? ((px-x1)*dx+(py-y1)*dy)/L2 : 0; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy)); }

// MT5 Market-Watch right-click menu — the classic desktop-terminal sub-menu (exact order).
const MW_MENU=[
  {l:'Forex', act:'cat', arg:'Forex'},   // ── class filter (show only this asset class) ──
  {l:'Stocks', act:'cat', arg:'Stocks'},
  {l:'Crypto', act:'cat', arg:'Crypto'},
  {l:'All Symbols', act:'cat', arg:'All'},
  {sep:1},
  {l:'Spread', act:'spread'},            // toggle a live Spread column (all symbols)
  {sep:1},
  {l:'New Chart', act:'chart'},          // → addChart (tile-aware multi-chart)
  {l:'New Order', act:'order'},          // → order.new popup for this symbol
  {sep:1},
  {l:'Hide', act:'hide'},                // hide this symbol row (memory-only, no storage)
  {l:'Show All', act:'showall'},         // restore every hidden symbol
];
function ContextMenu({ x, y, sym, cat, spread, onClose, onPick, onHide, onShowAll, onCat, onSpread }){
  React.useEffect(()=>{ const close=()=>onClose(); const k=(e)=>{ if(e.key==='Escape') onClose(); };
    // Attach outside-close on the NEXT tick — otherwise the SAME right-click that OPENED the menu
    // (its contextmenu/mousedown still bubbling to document) instantly closes it → menu never shows.
    const id=setTimeout(()=>{ document.addEventListener('mousedown',close); }, 0);
    document.addEventListener('keydown',k);
    return ()=>{ clearTimeout(id); document.removeEventListener('mousedown',close); document.removeEventListener('keydown',k); }; }, [onClose]);
  const run=(it)=>{ if(it.dis||it.sep) return;
    if(it.act==='cat') onCat&&onCat(it.arg);                       // class filter (Forex/Stocks/Crypto/All)
    else if(it.act==='spread') onSpread&&onSpread();               // toggle the Spread column
    else if(it.act==='chart') onPick&&onPick(sym);                 // New Chart → tile-aware chart of THIS symbol
    else if(it.act==='order') terminalBus.emit('order.new', sym);  // New Order → popup for THIS symbol
    else if(it.act==='hide') onHide&&onHide(sym);                  // Hide → drop the row (client display only)
    else if(it.act==='showall') onShowAll&&onShowAll();            // Show All → restore hidden rows
    onClose();
  };
  const style={ left:Math.min(x, window.innerWidth-190), top:Math.min(y, window.innerHeight-260) };
  const on=(it)=> (it.act==='cat' && (it.arg||'')===(cat||'All')) || (it.act==='spread' && spread);   // active class / spread-on → ✓
  return (
    <div className="mt5-context-menu" style={style} onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} onContextMenu={e=>{e.preventDefault();e.stopPropagation();}}>
      {MW_MENU.map((it,i)=> it.sep ? <div key={i} className="mt5-sep"></div> : (
        <div key={i} className={"mt5-mi"+(it.dis?' dis':'')+(on(it)?' ck':'')} onClick={()=>run(it)}>{on(it)?'✓ ':''}{t(it.l)}</div>
      ))}
    </div>
  );
}
/* reusable seeded tick chart (Market Watch Ticks tab) — full density + time axis */
function TickChart({ symbol }){
  const box=React.useRef(null);
  React.useEffect(()=>{
    if(!window.LightweightCharts || !box.current) return;
    const DOT=(window.LightweightCharts&&LightweightCharts.LineStyle&&LightweightCharts.LineStyle.Dotted)!=null?LightweightCharts.LineStyle.Dotted:1;
    const c=LightweightCharts.createChart(box.current, {
      layout:{ background:{color:'#ffffff'}, textColor:'#4a4f57', fontSize:10, fontFamily:"Consolas,'Courier New',monospace" },
      grid:{ vertLines:{color:'#e6e9ec', style:DOT}, horzLines:{color:'#e6e9ec', style:DOT} },
      timeScale:{ visible:true, timeVisible:true, secondsVisible:false, borderColor:'#d0d4d8', rightOffset:2, barSpacing:3 },
      rightPriceScale:{ borderColor:'#d0d4d8' }, crosshair:{ mode:0 }, handleScroll:false, handleScale:false });
    c.resize(box.current.clientWidth, box.current.clientHeight);
    const STEP=(window.LightweightCharts&&LightweightCharts.LineType&&LightweightCharts.LineType.WithSteps)!=null?LightweightCharts.LineType.WithSteps:0;
    const mk=(color)=> c.addLineSeries ? c.addLineSeries({color,lineWidth:1,lineType:STEP,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false})
                                       : c.addSeries(LightweightCharts.LineSeries,{color,lineWidth:1,lineType:STEP,priceLineVisible:false,lastValueVisible:true});
    const ask=mk('#d13438'), bid=mk('#2f6ec0');
    const N=220, STEPT=2, q0=priceStore.get(symbol)||{}, pv=pip(symbol);
    let m0=q0.mid||((q0.ask+q0.bid)/2)||BASE[symbol]||1; const half=Math.max(pv/2,((q0.ask-q0.bid)/2)||pv/2);
    const t0=Math.floor(Date.now()/1000)-N*STEPT, seedA=[],seedB=[]; let m=m0-(Math.random()*pv*10);
    for(let i=0;i<N;i++){ m+=(Math.random()-0.5)*pv*3; const t=t0+i*STEPT; seedA.push({time:t,value:m+half}); seedB.push({time:t,value:m-half}); }
    if(q0.ask) seedA[N-1].value=q0.ask; if(q0.bid) seedB[N-1].value=q0.bid;
    const buf={ t:t0+N*STEPT, ask:seedA, bid:seedB };
    try{ ask.setData(seedA); bid.setData(seedB); c.timeScale().fitContent(); }catch(e){}
    const onTick=throttle((mids)=>{ const q=mids[symbol]; if(!q) return; buf.t+=STEPT;
      buf.ask.push({time:buf.t,value:q.ask}); buf.bid.push({time:buf.t,value:q.bid});
      if(buf.ask.length>N){ buf.ask.shift(); buf.bid.shift(); }
      try{ ask.setData(buf.ask); bid.setData(buf.bid); c.timeScale().fitContent(); }catch(e){}   // keep it full-width
    }, 220);
    const un=priceStore.subscribe(onTick);
    const onR=()=>{ try{ c.resize(box.current.clientWidth, box.current.clientHeight); c.timeScale().fitContent(); }catch(e){} };
    window.addEventListener('resize',onR);
    const raf=requestAnimationFrame(onR);   // re-fit once the container has real width
    return ()=>{ un(); window.removeEventListener('resize',onR); cancelAnimationFrame(raf); try{c.remove();}catch(e){} };
  }, [symbol]);
  return <div className="mwtick" ref={box}></div>;
}
/* Market Watch → Details tab: Bid/Ask + session Hi/Lo + Open/Close for the selected symbol */
function MWDetails({ sym }){
  const [m,setM]=React.useState(priceStore.get(sym)||{});
  const st=React.useRef({pb:null,pa:null,db:0,da:0});   // prev bid/ask + last live tick direction
  React.useEffect(()=>{ st.current={pb:null,pa:null,db:0,da:0};
    return priceStore.subscribe(throttle(mids=>{ const q=mids[sym]||{}, s=st.current;
      if(q.bid!=null && s.pb!=null && q.bid!==s.pb) s.db=q.bid>s.pb?1:-1;
      if(q.ask!=null && s.pa!=null && q.ask!==s.pa) s.da=q.ask>s.pa?1:-1;
      s.pb=q.bid; s.pa=q.ask; setM({...q});

function ExposureTab({ pos, mids }){
  const net={}; pos.forEach(p=>{ const d=sideUp(p.side)==='SELL'?-1:1; net[p.symbol]=(net[p.symbol]||0)+d*lotsOf(p); });
  const rows=Object.keys(net).filter(s=>Math.abs(net[s])>1e-9);

      <thead><tr><th>Symbol</th><th>Net Volume</th><th>Direction</th><th>Notional (USD)</th></tr></thead>
      <tbody>
        {!rows.length && <tr><td className="empty" colSpan="4">No net exposure</td></tr>}
        {rows.map(s=>{ const v=net[s]; const m=mids[s]||{};
          return (<tr key={s}><td>{s.toLowerCase()}.fx</td><td className={v>=0?'up':'down'}>{v.toFixed(2)}</td>
            <td className={v>=0?'up':'down'}>{v>=0?'Long':'Short'}</td>
            <td>{num(Math.abs(v)*100000*(m.mid||0))}</td></tr>); })}

  );
}

function BottomBar({ onResize, tab }){   // `tab` is owned by App now (the full-width tab bar lives at screen bottom)
  const [acct,setAcct]=React.useState(positionsStore.acct);
  const [pos,setPos]=React.useState(positionsStore.pos);
  const [mids,setMids]=React.useState({});
  const [leverage,setLev]=React.useState(tradeSettings.leverage);
  const eng=useTradeEngine();
  React.useEffect(()=> positionsStore.subscribe(s=>{ setAcct(s.acct); setPos([...s.pos]); }), []);
  React.useEffect(()=> priceStore.subscribe(throttle(m=>setMids({...m}),RENDER_MS)), []);   // live P&L (mobile-throttled)
  React.useEffect(()=> tradeSettings.subscribe(setLev), []);   // margin/level track the chosen leverage
  const closePos=async(p)=>{
    if(p._demo){ positionsStore.removeDemo(p.local_id); playSnd(sndClose); return; }   // demo row → drop it (+청산음)
    const r=await eng.closeOrder(p.local_id);                            // real → fx_close banks P&L server-side
    if(!r.ok) alert('청산 실패(Close failed): '+(r.reason||'unknown'));
  };

  // floating P&L marked at the live mid (display approx — production should use trading.html's
  // fxClosePx lockstep so floating == what fx_close realizes). No open FX positions → 0.
  const plOf=(p)=>{ if(p._demo && p.profit!=null) return +p.profit;   // demo seed carries a pinned P/L
    const m=mids[p.symbol]; if(!m) return 0;
    const dir=sideUp(p.side)==='SELL'?-1:1; const contract=100000;
    return dir*(m.mid-(+p.open_price||m.mid))*lotsOf(p)*contract*(p.symbol.includes('JPY')?0.0067:1); };
  const floating = pos.reduce((s,p)=> s+plOf(p), 0);
  const balance=acct?+acct.balance||0:0, equity=balance+floating;
  const marginUsed=pos.reduce((s,p)=> s+requiredMargin(p.symbol, lotsOf(p), leverage), 0);  // leverage-driven
  const level=marginUsed>0?(equity/marginUsed*100):0;
  const num=(n)=>(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  return (
    <div className="bottom">
      <BottomResizer onDone={onResize} />
      {tab==='Exposure' ? <ExposureTab pos={pos} mids={mids} />
       : tab==='Journal' ? <JournalTab />
       : (tab!=='Trade' && tab!=='History') ? <EmptyTab tab={tab} />
       : (<React.Fragment>
      <div className="postbl">
        <table className="pos">
          <thead><tr><th>{t('Symbol')}</th><th>{t('Ticket')}</th><th>{t('Time')}</th><th>{t('Type')}</th><th>{t('Volume')}</th><th>{t('Price')}</th><th>S / L</th><th>T / P</th><th>{t('Price')}</th><th>{t('Profit')}</th><th></th></tr></thead>
          <tbody>
            {tab==='History' && <tr><td className="empty" colSpan="11">No history in the selected period</td></tr>}
            {tab==='Trade' && !pos.length && <tr><td className="empty" colSpan="11">{(!WT_DEMO && window.AlpexaSync&&AlpexaSync.me)?'No open positions':'데모 터미널 — 주문하면 여기에 데모 포지션이 표시됩니다 (서버·어드민 기록 없음)'}</td></tr>}
            {tab==='Trade' && pos.map(p=>{ const m=mids[p.symbol]||{}; const pl=plOf(p);
              const tkt=String(p.local_id||'').replace(/\D/g,'').slice(-8)||p.local_id;
              const tm=p.created_at?String(p.created_at).slice(0,19).replace('T',' ').replace(/-/g,'.'):'—';  // MT5: 2026.07.09 20:17:40
              return (<tr key={p.local_id}>
                <td>{p.symbol.toLowerCase()}.fx</td><td>{tkt}</td><td>{tm}</td><td className={sideUp(p.side)==='SELL'?'down':'up'}>{sideUp(p.side).toLowerCase()}</td>
                <td>{lotsOf(p).toFixed(2)}</td><td>{fmtPx(p.symbol,+p.open_price)}</td><td>—</td><td>—</td>
                <td>{fmtPx(p.symbol,m.mid)}</td><td className={pl>=0?'up':'down'}>{num(pl)}</td>
                <td><button className="xclose" title="Close position" onClick={()=>closePos(p)}>✕</button></td>
              </tr>); })}
          </tbody>
          {/* Balance bar lives INSIDE the table as <tfoot> → glued right under the last position
              row; grows/shrinks WITH the rows (no more floating at the terminal-box bottom). */}
          {tab==='Trade' && <tfoot><tr className="acctrow"><td colSpan="11">
            <div className="acctline">
              <span><span className="k">{t('Balance')}:</span> <b>{num(balance)} USD</b></span>
              <span><span className="k">{t('Equity')}:</span> <b>{num(equity)}</b></span>
              <span><span className="k">{t('Margin')}:</span> <b>{num(marginUsed)}</b></span>
              <span><span className="k">{t('Free Margin')}:</span> <b>{num(equity-marginUsed)}</b></span>
              <span><span className="k">{t('Margin Level')}:</span> <b className={marginUsed>0&&level<100?'down':''}>{marginUsed>0?num(level)+' %':'—'}</b>
                {marginUsed>0&&level<50 && <b style={{color:'#ff5252',marginLeft:6}}>⚠ Stop Out &lt;30%</b>}</span>
              <span><span className="k">{t('Profit')}:</span> <b className={floating>=0?'up':'down'}>{num(floating)}</b></span>
            </div>
          </td></tr></tfoot>}
        </table>
      </div>
       </React.Fragment>)}
    </div>
  );
}

const MENU_DEF = {
  File:  [ {l:'New Chart Window', cmd:'chart.new'}, {l:'Open Deleted', dis:1}, {sep:1},
           {l:'Save As Picture...', dis:1}, {l:'Print...', k:'Ctrl+P', dis:1}, {sep:1}, {l:'Exit', dis:1} ],

function MenuBar({ indicators, view, tool }){
  const [live,setLive]=React.useState(priceStore.live);
  const [open,setOpen]=React.useState(null);
  const [sub,setSub]=React.useState(null);   // open fly-out submenu index (Insert → Lines/Fibonacci/…)
  React.useEffect(()=> priceStore.subscribe(()=>setLive(priceStore.live)), []);
  React.useEffect(()=>{ if(!open) return; const h=()=>{setOpen(null);setSub(null);}; document.addEventListener('click',h); return ()=>document.removeEventListener('click',h); }, [open]);
  const active=new Set(indicators||[]);
  const click=(m,e)=>{ e.stopPropagation(); setSub(null); setOpen(open===m?null:m); };
  const run=(it)=>{ if(it.dis) return;
    if(it.v) terminalBus.emit('view.toggle', it.v);
    else if(it.tool) terminalBus.emit('chart.tool', it.tool);
    else if(it.cmd) terminalBus.emit(it.cmd, it.arg);
    if(!it.keep) setOpen(null);
  };
  // Insert → Indicators submenu is built live (dynamic checkmarks + Remove All)
  const indChildren=()=> Object.keys(INDICATORS).map(id=>({l:INDICATORS[id].label, ind:id}))
    .concat([{sep:1},{l:t('Remove All Indicators'), cmd:'chart.indicator', arg:'__clear__'}]);
  const runChild=(ch)=>{ if(ch.dis) return;
    if(ch.ind){ terminalBus.emit('chart.indicator', ch.ind); return; }   // keep the menu open to toggle several
    if(ch.tool) terminalBus.emit('chart.tool', ch.tool);
    else if(ch.cmd) terminalBus.emit(ch.cmd, ch.arg);
    setOpen(null); setSub(null); };
  const Row = (it,i)=>{
    if(it.sep) return <div key={i} className="sep"></div>;
    if(it.hd) return <div key={i} className="hd">{t(it.l)}</div>;
    const kids = it.indicators ? indChildren() : it.children;   // submenu items (dynamic for Indicators)
    return (
      <div key={i} className={"row"+(it.dis?' dis':'')+(kids?' has':'')} onMouseEnter={()=>setSub(kids?i:null)}
           onClick={()=>{ if(!kids) run(it); }}>
        <span className="ck">{(it.v && view[it.v]) || (it.lang && it.lang===LANG.cur) ? '✓' : ''}</span>{t(it.l)}
        {kids ? <span className="ar">▸</span> : it.k ? <span className="sc">{it.k}</span> : null}
        {kids && sub===i && (
          <div className="mdrop sub" onClick={e=>e.stopPropagation()}>
            {kids.map((ch,j)=> ch.sep ? <div key={j} className="sep"></div>
              : <div key={j} className={"row"+(ch.dis?' dis':'')} onClick={()=>runChild(ch)}>
                  <span className="ck">{ch.ind && active.has(ch.ind) ? '✓' : ''}</span>{t(ch.l)}
                </div>)}
          </div>
        )}
      </div>
    );
  };
  return (
    <div className="menu">
      {MENUS.map(m=>(
        <div key={m} className={"mi"+(open===m?' on':'')} onClick={(e)=>click(m,e)}>{t(m)}
          {open===m && m==='Charts' && (
            <div className="mdrop" onClick={e=>e.stopPropagation()}>
              <div className="hd">Chart Type</div>
              {CHART_TYPES.map(([k,ic,t])=><div key={k} className="row" onClick={()=>{terminalBus.emit('chart.type',k);setOpen(null);}}><span className="ck">{k===tool?'':''}</span>{t}</div>)}
              <div className="sep"></div>
              <div className="hd">Indicators</div>
              {Object.keys(INDICATORS).map(id=>(
                <div key={id} className="row" onClick={()=>terminalBus.emit('chart.indicator',id)}>
                  <span className="ck">{active.has(id)?'✓':''}</span>{INDICATORS[id].label}
                </div>
              ))}
              <div className="sep"></div>
              <div className="row" onClick={()=>{terminalBus.emit('chart.indicator','__clear__');setOpen(null);}}>Remove all indicators</div>
            </div>
          )}
          {open===m && m!=='Charts' && (
            <div className="mdrop" onClick={e=>e.stopPropagation()}>{MENU_DEF[m].map(Row)}</div>
          )}
        </div>
      ))}
      <div className="conn"><span className="dot" style={{background:live?'#00d060':'#e5a13a'}}></span>{live?'Live feed (1s cache)':'Demo feed'}</div>
    </div>
  );
}
