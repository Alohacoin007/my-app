/* ── Resizable splitter: drag the bar left/right to size the Market Watch column
   (200–450px). During drag it sets --leftw on .terminal and, in a rAF loop, calls
   chartResizer.resizeAll() so all 4 charts follow live instead of squishing. ── */
function Splitter({ onDone }){
  const drag=React.useRef(false), self=React.useRef(null);
  React.useEffect(()=>{
    const term=document.querySelector('.terminal'); let raf=null, lastW=0;
    const onMove=(e)=>{ if(!drag.current||!term) return;
      const rect=term.getBoundingClientRect();
      lastW=Math.max(200, Math.min(450, e.clientX-rect.left));
      term.style.setProperty('--leftw', lastW+'px');
      if(!raf) raf=requestAnimationFrame(()=>{ raf=null; chartResizer.resizeAll(); });
    };
    const onUp=()=>{ if(!drag.current) return; drag.current=false;
      if(self.current) self.current.classList.remove('drag');
      document.body.style.cursor=''; document.body.style.userSelect='';
      chartResizer.resizeAll();
      if(lastW && onDone) onDone(Math.round(lastW));   // persist the new width
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    return ()=>{ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); if(raf)cancelAnimationFrame(raf); };
  }, []);
  const onDown=(e)=>{ e.preventDefault(); drag.current=true;
    if(self.current) self.current.classList.add('drag');
    document.body.style.cursor='col-resize'; document.body.style.userSelect='none';
  };
  return <div className="splitter" ref={self} onMouseDown={onDown} title="드래그해서 시세창 너비 조절"></div>;
}

/* ── Bottom Toolbox row-resizer: a row-resize bar that is ALWAYS present as panel
   chrome (independent of the positions table being empty). Drag up/down sets
   --bottomh on .terminal; the 1fr charts row absorbs the change; chart.resize() in
   a rAF loop keeps the charts crisp. ── */
function BottomResizer({ onDone }){
  const self=React.useRef(null);
  React.useEffect(()=>{
    const el=self.current, term=document.querySelector('.terminal'); if(!el) return; let raf=null, on=false, lastH=0;
    const onDown=(e)=>{ e.preventDefault(); on=true; el.classList.add('drag');
      document.body.style.cursor='row-resize'; document.body.style.userSelect='none'; };
    const onMove=(e)=>{ if(!on||!term) return;
      // DOCKED toolbox: its tab bar (24px) sits at the very bottom, content above it. Dragging the top
      // edge to cursorY sets the terminal (content) height = (window bottom − tab bar) − cursorY. The
      // grid dock row = this height + tab bar, so the charts/left panel shrink to fit above it. Clamp
      // so the toolbox never shrinks below its 188 home and always leaves ~140px of content on top.
      const TAB=24;
      const h = window.innerHeight - TAB - e.clientY;
      lastH = Math.max(188, Math.min(window.innerHeight - 200, h));
      term.style.setProperty('--bottomh', lastH+'px');
      if(!raf) raf=requestAnimationFrame(()=>{ raf=null; chartResizer.resizeAll(); });
    };
    const onUp=()=>{ if(!on) return; on=false; el.classList.remove('drag');
      document.body.style.cursor=''; document.body.style.userSelect=''; chartResizer.resizeAll();
      if(lastH && onDone) onDone(Math.round(lastH)); };
    el.addEventListener('mousedown',onDown);
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    return ()=>{ el.removeEventListener('mousedown',onDown); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); if(raf)cancelAnimationFrame(raf); };
  }, []);
  return <div className="hsplit" ref={self} title="드래그해서 거래창 높이 조절"></div>;
}

/* ── Left-panel internal row-resizer between Market Watch and Navigator. Also pure
   chrome — works regardless of list contents; sets --navh on the .left column. ── */
function NavResizer({ onDone }){
  const self=React.useRef(null);
  React.useEffect(()=>{
    const el=self.current; if(!el) return; const left=el.closest('.left'); let on=false, lastH=0;
    const onDown=(e)=>{ e.preventDefault(); on=true; el.classList.add('drag');
      document.body.style.cursor='row-resize'; document.body.style.userSelect='none'; };
    const onMove=(e)=>{ if(!on||!left) return; const r=left.getBoundingClientRect();
      lastH=Math.max(70, Math.min(r.height-110, r.bottom - e.clientY));
      left.style.setProperty('--navh', lastH+'px');
    };
    const onUp=()=>{ if(!on) return; on=false; el.classList.remove('drag');
      document.body.style.cursor=''; document.body.style.userSelect='';
      if(lastH && onDone) onDone(Math.round(lastH)); };
    el.addEventListener('mousedown',onDown);
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    return ()=>{ el.removeEventListener('mousedown',onDown); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
  }, []);
  return <div className="lhsplit" ref={self} title="드래그해서 네비게이터 높이 조절"></div>;
}

const SYM_NAME={ EURUSD:'Euro vs US Dollar', AUDUSD:'Australian Dollar vs US Dollar', USDJPY:'US Dollar vs Japanese Yen',

// order-dialog left menu icons (MT5-style thin line-chart + arrow marks)
const OIC = {

function OrderModal({ symbol:sym0, onClose }){
  const [symbol,setSymbol]=React.useState(sym0);
  const [vol,setVol]=React.useState('0.01');
  const [sl,setSl]=React.useState('0.00000');
  const [tp,setTp]=React.useState('0.00000');
  const [m,setM]=React.useState(priceStore.get(symbol)||{});
  const dir=React.useRef({bid:0,ask:0}); const prev=React.useRef({});
  const eng=useTradeEngine();
  // ── draggable popup: move by the header, absolute left/top once dragged (null = centered) ──
  const cardRef=React.useRef(null), dragRef=React.useRef(null);
  const [pos,setPos]=React.useState(null);
  React.useEffect(()=>{
    const onMove=(e)=>{ const d=dragRef.current; if(!d) return;
      let left=Math.max(0, Math.min(window.innerWidth-60,  e.clientX-d.dx));
      let top =Math.max(0, Math.min(window.innerHeight-30, e.clientY-d.dy));
      setPos({left,top}); };
    const onUp=()=>{ if(!dragRef.current) return; dragRef.current=null; document.body.style.userSelect=''; };
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    return ()=>{ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
  }, []);
  const onHeaderDown=(e)=>{ if(e.button!==0||!cardRef.current) return; e.stopPropagation();
    const r=cardRef.current.getBoundingClientRect();
    dragRef.current={ dx:e.clientX-r.left, dy:e.clientY-r.top };
    if(pos===null) setPos({left:r.left, top:r.top});       // switch from flex-centered → absolute at current spot
    document.body.style.userSelect='none'; };

  React.useEffect(()=>{ const un=priceStore.subscribe(throttle(mids=>{ const q=mids[symbol]; if(!q) return;
    const pb=prev.current; dir.current={ bid:q.bid-(pb.bid||q.bid)>0?1:q.bid<(pb.bid||q.bid)?-1:0, ask:q.ask-(pb.ask||q.ask)>0?1:q.ask<(pb.ask||q.ask)?-1:0 };
    prev.current={bid:q.bid,ask:q.ask}; setM({...q}); }, IS_MOBILE?RENDER_MS:180)); return un; }, [symbol]);

  React.useEffect(()=>{ const k=(e)=>{ if(e.key==='Escape') onClose(); }; document.addEventListener('keydown',k); return ()=>document.removeEventListener('keydown',k); }, [onClose]);
  // ── VOLUME long-press acceleration: hold −/+ to ramp 0.01 → 0.1 → 1.0 lot/tick (~10 lots in ~1.5s) ──
  const holdRef=React.useRef(null);
  const stopHold=()=>{ if(holdRef.current){ clearInterval(holdRef.current); holdRef.current=null; } };
  React.useEffect(()=>stopHold, []);   // clear any running accel on unmount
  const startVolHold=(sign)=>{
    stopHold();
    const bump=(step)=> setVol(v=> Math.max(0.01, (+v||0) + sign*step).toFixed(2));   // .toFixed(2) → no float dust
    bump(0.01);                                                                        // immediate single 0.01 on press
    const t0=Date.now();
    holdRef.current=setInterval(()=>{ const el=Date.now()-t0;                          // 0–0.3s ×0.01 · 0.3–1.2s ×0.1 · >1.2s ×1.0
      bump(el>1200 ? 1.0 : el>300 ? 0.1 : 0.01); }, 40);
  };
  // ── SL/TP price stepper: the STEP is LOCKED at 1 pipette (last 5-digit place, 0.00001; JPY 0.001)
  //    — never a volume/weight. Long-press only compresses the TIMER interval, not the amount:
  //    single click = 1 pipette · 0.3–1.0s → 30ms fire · >1.0s → 6ms fire. parseFloat().toFixed(5) always.
  const pHoldRef=React.useRef(null);
  const stopPHold=()=>{ if(pHoldRef.current){ clearTimeout(pHoldRef.current); pHoldRef.current=null; } };
  React.useEffect(()=>stopPHold, []);
  const startPriceHold=(setter, sign)=>{
    stopPHold();
    const d=digits(symbol), step=Math.pow(10,-d);                                        // exactly 1 pipette — fixed
    const bump=()=> setter(v=> Math.max(0, parseFloat(v||0) + sign*step).toFixed(d));    // parseFloat.toFixed(5) — no float dust
    bump();                                                                              // single click = one pipette
    const t0=Date.now();
    const tick=()=>{ const el=Date.now()-t0; bump();
      pHoldRef.current=setTimeout(tick, el<1000 ? 30 : 6); };                            // 0.3–1.0s → 30ms · >1.0s → 6ms
    pHoldRef.current=setTimeout(tick, 300);                                              // first repeat only after 0.3s
  };

  // ── leverage-driven order affordability, live (updates on price / volume / leverage) ──
  const need = eng.marginFor(symbol, vol);          // margin this order would lock
  const canAfford = need <= eng.freeMargin + 1e-9;  // gate against free margin
  const usd=(n)=>'$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  const submit=async(side)=>{
    if(!canAfford) return;   // client pre-gate; the server margin gate is the real authority
    const q=priceStore.get(symbol)||m; const price=side==='buy'?q.ask:q.bid;   // requested price the trader sees
    const maxSlip=SLIP_PIPS*pip(symbol);
    const r=await eng.placeOrder({ symbol, side, volume:vol, leverage:eng.leverage, requestedPrice:price, maxSlippage:maxSlip });   // +leverage +slippage
    if(r.ok){ onClose(); return; }                                   // B-Book fill booked server-side (sndOpen in placeOrder)
    // real server rejection (slippage/margin) → do NOT land a demo fill; sndError already fired.
    if(r.reason==='not_logged_in'){ positionsStore.addDemo({ symbol, side, volume:+vol||0.01, price }); playSnd(sndOpen); }
    else if(r.reason) console.warn('order rejected:', r.code||r.reason);
    onClose();
  };
  const spin=(set,cur,step,dg)=>({ up:()=>set((+cur+step).toFixed(dg)), dn:()=>set(Math.max(0,+cur-step).toFixed(dg)) });

  return (
    <div className="omodal-ov" onMouseDown={onClose}>
      <div className="omodal" ref={cardRef} style={pos?{position:'absolute',left:pos.left+'px',top:pos.top+'px',margin:0}:null} onMouseDown={e=>e.stopPropagation()}>
        <div className="obar" onMouseDown={onHeaderDown} style={{cursor:'move'}}>
          <div className="t">{t('New Order')} — {symbol}.FX</div>
          <span className="wb x" onMouseDown={e=>e.stopPropagation()} onClick={onClose}>✕</span>
        </div>
        <div className="om-body">
          {/* Symbol */}
          <div className="om-field"><label>{t('Symbol')}</label>
            <select value={symbol} onChange={e=>setSymbol(e.target.value)}>{WATCH.map(s=><option key={s} value={s}>{s}.FX</option>)}</select></div>
          {/* Big Bid / Ask + live SPREAD in the middle — same Arial-Black BigFig look as the panel */}
          <div className="om-quote">
            <div className="om-px"><span className="om-tag">BID · SELL</span><BigFig symbol={symbol} v={m.bid} /></div>
            <div className="om-spread"><span className="om-sp-l">{t('SPREAD')}</span>
              <b>{(m.ask!=null&&m.bid!=null) ? ((m.ask-m.bid)/pip(symbol)).toFixed(1) : '—'}</b></div>
            <div className="om-px"><span className="om-tag">ASK · BUY</span><BigFig symbol={symbol} v={m.ask} /></div>
          </div>
          {/* Volume */}
          <div className="om-field"><label>{t('Volume (lots)')}</label>
            <div className="om-vol">
              <b onMouseDown={()=>startVolHold(-1)} onMouseUp={stopHold} onMouseLeave={stopHold}>−</b>
              <input value={vol} onChange={e=>setVol(e.target.value)} />
              <b onMouseDown={()=>startVolHold(1)} onMouseUp={stopHold} onMouseLeave={stopHold}>+</b></div></div>
          {/* Precision-order settings (always available now the toggle is gone) */}
          <div className="om-adv">
            <div className="om-field"><label>{t('Stop Loss')}</label>
              <div className="om-price">
                <input value={sl} onChange={e=>setSl(e.target.value)}
                  onFocus={()=>{ const q=priceStore.get(symbol)||m; if(q.bid!=null) setSl((+q.bid).toFixed(digits(symbol))); }} />{/* focus → inject live BID */}
                <span className="om-pspin">{/* ±1 pipette; hold = timer accel only */}
                  <b onMouseDown={()=>startPriceHold(setSl,1)} onMouseUp={stopPHold} onMouseLeave={stopPHold}>▲</b>
                  <b onMouseDown={()=>startPriceHold(setSl,-1)} onMouseUp={stopPHold} onMouseLeave={stopPHold}>▼</b>
                </span></div></div>
            <div className="om-field"><label>{t('Take Profit')}</label>
              <div className="om-price">
                <input value={tp} onChange={e=>setTp(e.target.value)}
                  onFocus={()=>{ const q=priceStore.get(symbol)||m; if(q.ask!=null) setTp((+q.ask).toFixed(digits(symbol))); }} />{/* focus → inject live ASK */}
                <span className="om-pspin">{/* ±1 pipette; hold = timer accel only */}
                  <b onMouseDown={()=>startPriceHold(setTp,1)} onMouseUp={stopPHold} onMouseLeave={stopPHold}>▲</b>
                  <b onMouseDown={()=>startPriceHold(setTp,-1)} onMouseUp={stopPHold} onMouseLeave={stopPHold}>▼</b>
                </span></div></div>
          </div>
          {/* Margin */}
          <div className="om-margin" style={{color:canAfford?'#8890a0':'#ff5252'}}>
            {t('Margin')} <b style={{color:'#fff'}}>{usd(need)}</b> &nbsp;·&nbsp; {t('Free')} <b style={{color:'#fff'}}>{usd(eng.freeMargin)}</b>
            {!canAfford && <span> &nbsp;·&nbsp; ⚠ insufficient</span>}
          </div>
          {/* Sell / Buy by Market — matte flat (Binance/TradingView pro) */}
          <div className="om-btns">
            <button className="om-sell" disabled={!canAfford} onClick={()=>submit('sell')}>{t('Sell by Market')}</button>
            <button className="om-buy" disabled={!canAfford} onClick={()=>submit('buy')}>{t('Buy by Market')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

const DEFAULT_VIEW={ toolbars:true, statusbar:true, marketwatch:true, navigator:true, toolbox:true };
// initial floating geometry (fractions of the stage) — first four lay out as a clean 2×2 of
// INDEPENDENT windows; extras cascade down-right so a new chart never lands exactly on another.
function floatGeo(i){
  const quad=[{fx:.006,fy:.008,fw:.492,fh:.492},{fx:.502,fy:.008,fw:.492,fh:.492},
              {fx:.006,fy:.5,fw:.492,fh:.492},{fx:.502,fy:.5,fw:.492,fh:.492}];
  if(i<4) return quad[i];
  const k=i-4; return { fx:Math.min(.45,.10+k*.03), fy:Math.min(.45,.12+k*.05), fw:.5, fh:.5 };
}
function App(){
  const cfg=React.useRef(wtConfig.load()).current;     // saved layout (persists across reloads)
  // ALWAYS boot to the fixed default 2×2 @ M1 (chart layout is intentionally NOT persisted, so a
  // refresh always shows this exact setup regardless of what was open last session).
  const initCharts=React.useRef(GRID.map((s,i)=>({ id:i+1, symbol:s, tf:'M1', type:'candle', inds:(cfg.indicators||[]).slice() }))).current;   // indicators are PER-CHART
  const [charts,setCharts]=React.useState(initCharts);   // dynamic chart windows [{id,symbol,tf,type}]
  const [activeId,setActiveId]=React.useState(initCharts[0]?initCharts[0].id:null);
  const geos=React.useRef({});   // id → last {x,y,w,h} so a re-mounted window restores where you left it
  const onGeo=React.useCallback((id,g)=>{ geos.current[id]=g; }, []);
  // MOBILE lazy chart init: only mount the chart(s) the user has REVEALED (seeded with the active
  // one). Hidden tiles create their Lightweight Charts instance the moment they're tapped or on
  // Window→Tile. Desktop reveals eagerly (lazyHold below is gated on IS_MOBILE → all charts mount).
  const [revealed,setRevealed]=React.useState(()=> new Set(IS_MOBILE && initCharts[0] ? [initCharts[0].id] : []));
  const revealChart=React.useCallback((id)=>{ if(IS_MOBILE) setRevealed(s=> s.has(id)?s:new Set(s).add(id)); }, []);
  const activate=React.useCallback((id)=>{ setActiveId(id);
    if(IS_MOBILE) setRevealed(s=> s.has(id)?s:new Set(s).add(id)); }, []);
  const idRef=React.useRef(initCharts.reduce((mx,c)=>Math.max(mx,c.id),0));
  const chartsRef=React.useRef(charts); chartsRef.current=charts;
  const [orderSym,setOrderSym]=React.useState(null);     // popup Order dialog target (null = closed)
  const [tool,setTool]=React.useState(null);             // armed drawing tool (cross/vline/…)
  const [view,setView]=React.useState({ ...DEFAULT_VIEW, ...(cfg.view||{}) });
  const [leftw,setLeftw]=React.useState(cfg.leftw||270);
  const [bottomh,setBottomh]=React.useState(cfg.bottomh||188);
  const [navh,setNavh]=React.useState(cfg.navh||186);
  const [termTab,setTermTab]=React.useState('Trade');   // terminal tab bar lives full-width at screen bottom
  const [theme,setTheme]=React.useState(cfg.theme==='light'?'light':'dark');   // View → Color Theme (UI setting)
  React.useEffect(()=>{ themeBus.set(theme); }, [theme]);   // broadcast to live chart canvases
  const [lang,setLang]=React.useState(['ko','ja','zh'].indexOf(cfg.lang)>=0?cfg.lang:'en');   // View → Languages (UI setting)
  LANG.cur=lang;   // set during render so every child's t() reads the current language immediately
  // effective active chart (id may point at a closed one after a close)
  const activeChart = charts.find(c=>c.id===activeId) || charts[0] || null;
  const activeInds = activeChart ? (activeChart.inds||[]) : [];   // indicators of the SELECTED chart (menus reflect this)
  const actRef=React.useRef(null); actRef.current = activeChart ? activeChart.id : null;
  // ── chart window life-cycle ──
  const addChart=React.useCallback((symbol)=>{ const id=++idRef.current;
    setCharts(cs=>cs.concat([{ id, symbol:symbol||WATCH[0], tf:'M1', type:'candle' }])); setActiveId(id);
    if(IS_MOBILE) setRevealed(s=> new Set(s).add(id)); }, []);   // a freshly-opened chart is revealed
  const closeChart=React.useCallback((id)=>{ setCharts(cs=>cs.filter(c=>c.id!==id));   // unmount → ChartCell cleanup unsubscribes + chart.remove (no leak)
    delete geos.current[id]; setActiveId(a=> a===id ? null : a); }, []);
  React.useEffect(()=>{ priceStore.start(); positionsStore.start(); }, []);
  React.useEffect(()=>{ wtConfig.save({ view, leftw, bottomh, navh, theme, lang }); }, [view, leftw, bottomh, navh, theme, lang]);   // charts (+ their per-chart indicators) NOT persisted → refresh = fixed default
  React.useEffect(()=>{ requestAnimationFrame(()=>chartResizer.resizeAll()); }, [charts.length]);   // reflow on add/close
  // ── MT5 keyboard shortcuts (View menu + New Order) ──
  React.useEffect(()=>{
    const onKey=(e)=>{
      if(/INPUT|SELECT|TEXTAREA/.test((e.target&&e.target.tagName)||'')) return;
      const k=(e.key||'').toLowerCase();
      if(e.ctrlKey && k==='m'){ e.preventDefault(); setView(v=>({ ...v, marketwatch:!v.marketwatch })); }
      else if(e.ctrlKey && k==='n'){ e.preventDefault(); setView(v=>({ ...v, navigator:!v.navigator })); }
      else if(e.ctrlKey && k==='t'){ e.preventDefault(); setView(v=>({ ...v, toolbox:!v.toolbox })); }
      else if(e.key==='F9'){ e.preventDefault(); const ac=chartsRef.current.find(c=>c.id===actRef.current)||chartsRef.current[0]; setOrderSym(s=> s||(ac&&ac.symbol)||WATCH[0]); }
      else if(e.key==='F11'){ e.preventDefault(); try{ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }catch(_){} }
    };
    document.addEventListener('keydown',onKey);
    return ()=>document.removeEventListener('keydown',onKey);
  }, []);
  // ── command reducer: toolbar chart signals hit ONLY the active chart window ──
  React.useEffect(()=> terminalBus.subscribe((cmd,arg)=>{
    if(cmd==='chart.tf') setCharts(cs=> cs.map(c=> c.id===actRef.current ? {...c, tf:arg} : c));       // active chart only
    else if(cmd==='chart.type') setCharts(cs=> cs.map(c=> c.id===actRef.current ? {...c, type:arg} : c)); // active chart only
    else if(cmd==='chart.new') addChart();
    else if(cmd==='chart.tool') setTool(arg);
    else if(cmd==='view.toggle') setView(v=>({ ...v, [arg]: !v[arg] }));
    else if(cmd==='theme.toggle') setTheme(t=> t==='light'?'dark':'light');   // View → Color Theme (Light ⇄ Dark)
    else if(cmd==='lang.set'){ LANG.cur=arg; setLang(arg); }                  // View → Languages (en/ko/ja/zh)
    else if(cmd==='view.fullscreen'){ try{ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }catch(e){} }
    else if(cmd==='chart.indicator'){   // PER-CHART: apply to the ACTIVE chart only (not all 4)
      setCharts(cs=>cs.map(c=>{ if(c.id!==actRef.current) return c;
        const list=c.inds||[];
        return { ...c, inds: arg==='__clear__' ? [] : (list.indexOf(arg)>=0 ? list.filter(x=>x!==arg) : list.concat(arg)) };
      }));
    }
    else if(cmd==='order.new'){ const ac=chartsRef.current.find(c=>c.id===actRef.current)||chartsRef.current[0]; setOrderSym(arg||(ac&&ac.symbol)||WATCH[0]); }
    else if(cmd==='window.tile'){
      if(IS_MOBILE) setRevealed(new Set(chartsRef.current.map(c=>c.id)));   // tile = load EVERY chart (lazy → eager)
      // Toolbox is DOCKED now → the grid already sizes .charts above it. Just clear any leftover
      // inline clamp (from the old overlay era) and re-fit every chart to its box.
      const chartsEl=document.querySelector('.charts'); if(chartsEl){ chartsEl.style.flex=''; chartsEl.style.height=''; }
      requestAnimationFrame(()=>chartResizer.resizeAll());
    }
    // chart.zoom → the active ChartCell (gated on its isActive); window.tile → grid clamp (above)
  }), []);
  const leftShown = view.marketwatch || view.navigator;
  const gridStyle = {
    '--leftw': leftw+'px', '--bottomh': bottomh+'px',
    gridTemplateColumns: leftShown ? 'var(--leftw) 6px 1fr' : '0 0 1fr',
    // DOCKED toolbox (MT5): the dock row = the toolbox's real height (content + 24px tab bar), so the
    // 1fr content row (left panel + charts) SHRINKS to sit above it — no overlap, everything visible.
    '--dockh': (view.toolbox ? (bottomh+24) : 0)+'px',
    gridTemplateRows: `23px ${view.toolbars?'33px':'0'} 1fr var(--dockh)`,
    gridTemplateAreas: '"menu menu menu" "tools tools tools" "left splitter right" "dock dock dock"',
  };
  const activeSym = activeChart ? activeChart.symbol : null;
  return (
    <div className={"terminal"+(theme==='light'?' light':'')} style={gridStyle}>
      <MenuBar indicators={activeInds} view={view} tool={tool} />
      {view.toolbars && <Toolbar tf={activeChart?activeChart.tf:'H1'} chartType={activeChart?activeChart.type:'candle'} tool={tool} />}
      {leftShown && <div className="left" style={{'--navh': navh+'px'}}>
        {view.marketwatch && <MarketWatch onPick={addChart} />}
        {view.marketwatch && view.navigator && <NavResizer onDone={setNavh} />}
        {view.navigator && <Navigator indicators={activeInds} />}
      </div>}
      {leftShown && <Splitter onDone={setLeftw} />}
      {/* RIGHT vertical stack — layer 1: charts · layer 2: chart-window tab bar · layer 3+4: terminal */}
      <div className="right">
        <div className="charts">
          <div className="chartstage">
            {charts.map((c,i)=><ChartCell key={c.id} idx={c.id} isActive={c.id===(activeChart&&activeChart.id)} onActivate={activate}
              symbol={c.symbol} tf={c.tf} indicators={c.inds||[]} chartType={c.type} tool={tool}
              initial={floatGeo(i)} savedGeo={geos.current[c.id]} onGeo={onGeo}
              lazyHold={IS_MOBILE && !revealed.has(c.id)}
              onClose={()=>closeChart(c.id)} />)}
            {!charts.length && <div className="noch">No charts open — File → New Chart Window, or double-click a Market Watch symbol.</div>}
          </div>
        </div>
        {/* layer 2: chart-window tab bar — glued directly under the charts. click=focus, ✕=close+unsubscribe */}
        {!!charts.length && <div className="charttabs">{charts.map(c=>
          <div key={c.id} className={"ctab"+(c.id===(activeChart&&activeChart.id)?' on':'')} onClick={()=>activate(c.id)} title={c.symbol+'.FX,'+c.tf}>{c.symbol}.FX,{c.tf}
            <span className="tclose" onClick={(e)=>{e.stopPropagation();closeChart(c.id);}} title="Close chart">✕</span></div>)}</div>}
      </div>
      {/* GLOBAL floating toolbox overlay — pinned to window bottom (absolute, z-9999), covers the
          chart + left navigator when pulled up. Terminal history on top, menu tab bar glued at its bottom. */}
      {view.toolbox && <div className="toolbox">
        <BottomBar onResize={setBottomh} tab={termTab} />
        <div className="tbxtabs">{TBX_TABS.map(tb=><div key={tb} className={"t"+(tb===termTab?' on':'')} onClick={()=>setTermTab(tb)}>{t(tb)}</div>)}</div>
      </div>}
      {orderSym && <OrderModal symbol={orderSym} onClose={()=>setOrderSym(null)} />}
    </div>
  );
}

// Boot when Babel+React actually loaded (guarded so a blocked CDN doesn't throw a render error).
try{ if(window.React && window.ReactDOM){ ReactDOM.createRoot(document.getElementById('app')).render(<App/>); } }catch(e){ console.warn('webtrade boot skipped:', e && e.message); }
</script>
</body>
</html>
