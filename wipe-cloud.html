<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Alpexa — Cloud Reset</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif;background:#0F1729;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:380px;background:#1A2334;border:1px solid #2F384C;border-radius:18px;padding:26px 22px;text-align:center}
  h1{font-size:20px;font-weight:800;margin-bottom:8px}
  p{font-size:13.5px;color:#9FB0C4;line-height:1.6;margin-bottom:18px}
  .btn{display:block;width:100%;padding:14px 0;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;text-decoration:none}
  .danger{background:#E04141;color:#fff}
  .ghost{background:#232B3D;color:#cdd7e4}
  .ok{background:#1e8e3e;color:#fff}
  .big{font-size:40px;margin-bottom:6px}
  #log{font-size:12px;color:#9FB0C4;margin-top:16px;text-align:left;background:#11192A;border:1px solid #2F384C;border-radius:10px;padding:12px;line-height:1.7;display:none;white-space:pre-wrap;word-break:break-all}
  .row{display:flex;justify-content:space-between;gap:8px}
  .g{color:#5ED27A}.r{color:#ff7a7a}.m{color:#cdd7e4}
</style>
</head>
<body>
  <div class="card">
    <div class="big">☁️🧹</div>
    <h1>클라우드(서버) 데이터 초기화</h1>
    <p>Supabase에 저장된 <b>모든 계정·거래·요청·결제 기록</b>을 삭제합니다.<br>
       <b>모든 사용자/기기</b>에 영향을 주는 작업이에요. 되돌릴 수 없어요.</p>
    <button class="btn danger" id="go" onclick="run()">서버 데이터 전부 지우기</button>
    <a class="btn ghost" href="login.html">취소 (로그인으로)</a>
    <div id="log"></div>
    <a class="btn ok" id="next" href="signup.html" style="display:none">새로 가입하기</a>
  </div>

<script>
var SB='https://grxnbgtfnaayeluenvqh.supabase.co/rest/v1';
var KEY='sb_publishable_ow1DihBdAAvNtnb1H0Kojw_7vbeMKFu';
var H={apikey:KEY,Authorization:'Bearer '+KEY};
var logEl=document.getElementById('log');
function line(html){logEl.style.display='block';var d=document.createElement('div');d.className='row';d.innerHTML=html;logEl.appendChild(d);}

async function fetchRows(t){
  var r=await fetch(SB+'/'+t+'?select=*',{headers:H});
  if(!r.ok){return {err:'GET '+r.status};}
  var rows=await r.json();
  return {rows:Array.isArray(rows)?rows:[]};
}
async function wipeTable(t){
  var f=await fetchRows(t);
  if(f.err){line('<span class="m">'+t+'</span><span class="r">읽기 실패 ('+f.err+')</span>');return;}
  var rows=f.rows;
  if(!rows.length){line('<span class="m">'+t+'</span><span class="g">이미 비어 있음</span>');return;}
  var key=('id' in rows[0])?'id':(('local_id' in rows[0])?'local_id':Object.keys(rows[0])[0]);
  var del=0,err=0;
  for(var i=0;i<rows.length;i++){
    var v=rows[i][key];
    if(v===null||v===undefined)continue;
    var url=SB+'/'+t+'?'+key+'=eq.'+encodeURIComponent(String(v));
    try{
      var d=await fetch(url,{method:'DELETE',headers:Object.assign({Prefer:'return=minimal'},H)});
      if(d.ok)del++;else err++;
    }catch(e){err++;}
  }
  // verify
  var after=await fetchRows(t);
  var left=after.rows?after.rows.length:'?';
  if(left===0)line('<span class="m">'+t+'</span><span class="g">'+del+'개 삭제됨 ✓</span>');
  else line('<span class="m">'+t+'</span><span class="r">'+del+'개 시도, '+left+'개 남음 (권한/RLS 차단)</span>');
}

async function run(){
  var btn=document.getElementById('go');btn.disabled=true;btn.style.opacity=.5;btn.textContent='지우는 중…';
  logEl.innerHTML='';logEl.style.display='block';
  // Delete children before parents (accounts FK -> players).
  await wipeTable('accounts');
  await wipeTable('payments');
  await wipeTable('requests');
  await wipeTable('players');
  line('<span class="m">완료</span><span class="g">끝났어요</span>');
  document.getElementById('next').style.display='block';
  btn.textContent='다시 지우기';btn.disabled=false;btn.style.opacity=1;
}
</script>
</body>
</html>
