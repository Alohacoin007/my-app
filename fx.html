<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Alpexa FX — Trade forex, stocks & indices</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=4">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
  :root{
    --navy:#1B3955; --navy-deep:#0F2742; --navy-press:#12314c;
    --ink:#0F1B2D; --muted:#5A6478; --line:#E7EBF1; --surface:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--surface);color:var(--ink)}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
       letter-spacing:-0.2px;min-height:100dvh}

  /* ── Header ── */
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);
    backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);
    border-bottom:1px solid var(--line)}
  .hd-in{max-width:1200px;margin:0 auto;height:64px;padding:0 24px;
    display:flex;align-items:center;gap:26px}
  .logo{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);
    font-weight:800;font-size:18px;letter-spacing:-0.4px;flex:0 0 auto}
  .logo .mark{width:30px;height:30px;border-radius:2px;
    background:linear-gradient(160deg,#2D5478,#1B3955 60%,#0F2742);
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    color:#fff;font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:16px;letter-spacing:-1px}
  .nav{display:flex;align-items:center;gap:22px;margin-left:8px}
  .nav a{text-decoration:none;color:var(--muted);font-size:14.5px;font-weight:600;transition:color .15s}
  .nav a:hover{color:var(--navy)}
  .hd-right{margin-left:auto;display:flex;align-items:center;gap:16px}
  .login{text-decoration:none;color:var(--ink);font-size:14.5px;font-weight:600}
  .login:hover{color:var(--navy)}
  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--navy);color:#fff;
    font-size:14px;font-weight:700;padding:10px 18px;border:none;border-radius:9999px;cursor:pointer;
    text-decoration:none;transition:background .18s,transform .05s}
  .pill:hover{background:var(--navy-press)}
  .pill:active{transform:scale(.97)}
  .pill svg{display:block}

  /* mobile */
  .menu-btn{display:none;margin-left:auto;width:40px;height:40px;border:none;background:transparent;cursor:pointer;
    align-items:center;justify-content:center}
  .menu-btn span,.menu-btn span::before,.menu-btn span::after{content:'';display:block;width:20px;height:2px;
    background:var(--ink);border-radius:2px;position:relative}
  .menu-btn span::before{position:absolute;top:-6px}
  .menu-btn span::after{position:absolute;top:6px}
  @media(max-width:820px){
    .nav{display:none}
    .hd-right .login{display:none}
    .menu-btn{display:flex}
    .hd-right{margin-left:0}
  }

  /* placeholder body (header-only for now) */
  .placeholder{max-width:1200px;margin:0 auto;padding:80px 24px;color:#9aa3b2;font-size:14px}
</style>
</head>
<body>

  <header>
    <div class="hd-in">
      <a class="logo" href="/fx.html"><span class="mark">A</span>Alpexa FX</a>
      <nav class="nav">
        <a href="#markets">Markets</a>
        <a href="#platform">Platform</a>
        <a href="#pricing">Pricing</a>
        <a href="#company">Company</a>
      </nav>
      <div class="hd-right">
        <a class="login" href="login.html?switch=1" rel="noopener">Log in</a>
        <a class="pill" href="signup.html" target="_blank" rel="noopener">Open account
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
      </div>
      <button class="menu-btn" aria-label="Menu"><span></span></button>
    </div>
  </header>

  <div class="placeholder">헤더 — 이후 히어로/상품/CTA가 아래에 들어갈 자리.</div>

</body>
</html>
