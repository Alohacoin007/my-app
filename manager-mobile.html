<!doctype html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Alpexa Manager · Back Office</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="shortcut icon" href="favicon.ico">
<meta name="theme-color" content="#ffffff">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200');
  :root{ --acc:#1F2A37; --ink:#0F1B2D; --dim:#5A6478; --line:#E6EAF0; --bg:#F7F8FA;
    --pos:#1B5E20; --pos-bg:#E8F5E9; --neg:#C62828; --neg-bg:#FFEBEE; --warn:#B06A00; --warn-bg:#FFF6E6; --card:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg)}
  body{font-family:'Roboto',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;color:var(--ink);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:30px;padding-left:58px}
  .top{background:#fff;color:var(--ink);padding:9px 14px;position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line)}
  .top .row{display:flex;align-items:center;justify-content:space-between}
  .top h1{font-size:14.5px;font-weight:800;letter-spacing:-.2px}
  .top .sub{font-size:9.5px;color:var(--dim);margin-top:1px;font-weight:600;letter-spacing:.6px;text-transform:uppercase}
  .pill{background:#F1F3F6;border:1px solid var(--line);border-radius:4px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--ink)}
  /* Corporate left rail: monochrome icons + small labels (Supabase-style) */
  .tabs{position:fixed;top:0;bottom:0;width:58px;left:max(0px,calc(50% - 240px));display:flex;flex-direction:column;gap:1px;background:#fff;border-right:1px solid var(--line);padding:10px 4px;overflow-y:auto;z-index:30;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{background:none;color:var(--dim);border:none;border-radius:4px;padding:8px 1px 6px;font:600 8.5px system-ui;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.2px;white-space:nowrap}
  .tab .msi{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;font-size:21px;line-height:1;display:inline-block;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;-webkit-font-feature-settings:'liga';font-feature-settings:'liga';user-select:none}
  .tab.on{background:#EEF2F7;color:var(--ink);font-weight:800}
  .tab.on .msi{font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24}
  .sec{margin:12px 12px 5px;font-size:11px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .card{margin:0 12px 8px;background:var(--card);border-radius:4px;padding:10px 12px;border:1px solid var(--line);box-shadow:none}
  .lbl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .big{font-size:21px;font-weight:800;letter-spacing:-.5px;margin-top:2px}
  .pos{color:var(--pos)}.neg{color:var(--neg)}.muted{color:var(--dim)}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:0 12px 8px}
  .kpi{background:var(--card);border-radius:4px;padding:9px 11px;border:1px solid var(--line);box-shadow:none}
  .kpi .k{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
  .kpi .v{font-size:17px;font-weight:800;margin-top:3px;letter-spacing:-.3px;font-variant-numeric:tabular-nums}
  .kpi .s{font-size:10px;color:var(--dim);margin-top:1px}
  .row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .row:last-child{border-bottom:none}
  .row b{font-variant-numeric:tabular-nums}
  .badge{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:4px}
  .badge.deposit{background:var(--pos-bg);color:var(--pos)} .badge.withdraw{background:var(--neg-bg);color:var(--neg)} .badge.transfer{background:#E3F2FD;color:#1565C0}
  .badge.open{background:#E3F2FD;color:#1565C0}.badge.won{background:var(--pos-bg);color:var(--pos)}.badge.lost{background:var(--neg-bg);color:var(--neg)}.badge.cashed{background:#FFF3E0;color:#B06A00}
  .req-amt{font-size:18px;font-weight:800}
  .req-meta{font-size:12px;color:var(--dim);margin:3px 0}
  .req-addr{font-family:ui-monospace,monospace;font-size:11px;color:var(--ink);background:#f1f3f4;border-radius:4px;padding:7px 9px;word-break:break-all;cursor:pointer;margin-top:4px}
  .req-addr-lbl{font-size:10px;font-weight:800;color:var(--neg);text-transform:uppercase;margin-top:8px}
  .btns{display:flex;gap:10px;margin-top:11px}
  .btns button{flex:1;border:none;border-radius:4px;padding:12px;font:800 14px system-ui;cursor:pointer}
  .ok{background:var(--pos);color:#fff}.no{background:#fff;color:var(--neg);border:1.5px solid #f0c0c0}
  .in{width:100%;font-size:13.5px;color:var(--ink);background:#f1f3f4;border:1px solid var(--line);border-radius:4px;padding:10px 11px;margin-top:6px;font-family:inherit}
  .save{margin-top:10px;background:var(--acc);color:#fff;border:none;border-radius:4px;padding:10px 16px;font:700 13px system-ui;cursor:pointer}
  .save.ghost{background:#eef0f3;color:var(--acc)}
  .hint{font-size:11px;color:#9aa3b2;margin-top:7px}
  .flag{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
  .flag:last-child{border-bottom:none}
  .empty{padding:22px 8px;text-align:center;color:#9aa3b2;font-size:13px}
  .tag{font-size:10px;font-weight:800;color:#fff;background:var(--warn);border-radius:4px;padding:2px 6px;vertical-align:middle;margin-left:6px}
  .danger{background:var(--neg)!important;color:#fff!important;width:100%}
</style>
</head>
<body>
  <div class="top">
    <div class="row">
      <div><h1>Alpexa Manager</h1><div class="sub">Back office · Operations</div></div>
      <div class="pill"><span id="pendN">0</span> pending</div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="alpexa-sync.js?v=6"></script>
<script>
  // ── Back-office PIN lock (demo-level: deters casual access; upgrade to real
  //    admin login before production). ──
  (function lockGate(){
    var PIN='0070';
    if(sessionStorage.getItem('alpexa.mgrUnlocked')==='1') return;
    var ov=document.createElement('div');
    ov.id='mgrLock';
    ov.style.cssText='position:fixed;inset:0;z-index:2147483647;background:#0F1B2D;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:Roboto,system-ui,-apple-system,sans-serif;padding:24px;text-align:center';
    ov.innerHTML='<div style="font-size:21px;font-weight:800;letter-spacing:-.3px">Alpexa Manager</div>'+
      '<div style="font-size:12.5px;opacity:.8;text-transform:uppercase;letter-spacing:.6px">Back office · enter PIN</div>'+
      '<input id="mgrPin" type="password" inputmode="numeric" maxlength="8" placeholder="••••" style="width:170px;text-align:center;font-size:24px;letter-spacing:10px;padding:13px 10px;border-radius:4px;border:none;outline:none;background:#1A2740;color:#fff">'+
      '<button id="mgrPinBtn" style="background:#1565C0;color:#fff;border:none;border-radius:4px;padding:13px 34px;font-size:15px;font-weight:700;cursor:pointer">Unlock</button>'+
      '<div id="mgrPinErr" style="color:#ff8a8a;font-size:12.5px;height:14px"></div>';
    document.body.appendChild(ov);
    function tryUnlock(){ var el=document.getElementById('mgrPin'); if(el.value===PIN){ try{sessionStorage.setItem('alpexa.mgrUnlocked','1');}catch(e){} ov.remove(); } else { document.getElementById('mgrPinErr').textContent='Wrong PIN'; el.value=''; el.focus(); } }
    ov.querySelector('#mgrPinBtn').onclick=tryUnlock;
    ov.querySelector('#mgrPin').addEventListener('keydown',function(e){ if(e.key==='Enter')tryUnlock(); });
    setTimeout(function(){ var el=document.getElementById('mgrPin'); if(el)el.focus(); },120);
  })();
  function getJSON(k,d){try{var v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}}
  function setJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
  function num(k,d){var v=parseFloat(localStorage.getItem(k));return isNaN(v)?d:v;}
  function usd(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function k0(n){return '$'+Math.round(Number(n)||0).toLocaleString('en-US');}
  function ago(ts){if(!ts)return '';var s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+'s ago';var m=(s/60|0);if(m<60)return m+'m ago';var h=(m/60|0);if(h<24)return h+'h ago';return (h/24|0)+'d ago';}
  // Requests pulled from the shared server (all customers). Filled by pullServer().
  var SRV_REQS=[];
  // Real customers + their accounts, pulled from Supabase (players/accounts tables).
  var SRV_PLAYERS=[], SRV_ACCOUNTS=[], PLAYER_FILTER='', PLAYER_OPEN=null, PLAYER_EDIT=null;
  var PLAYER_SORT='joined', PLAYER_DIR=-1; // default: newest first · tap a sort chip again to flip
  // Scalable positions access: never pull ALL rows. Summary = count + top-N by
  // exposure; per-customer = query only that customer's rows (on demand).
  var POS_TOP=[], POS_COUNT=0, POS_BY_CUST={}, OPEN_SEARCH='';
  function custName(id){ for(var i=0;i<SRV_PLAYERS.length;i++){ if(SRV_PLAYERS[i].cust_id===id) return SRV_PLAYERS[i].name||id; } return id; }
  function badgeKyc(k){ k=k||'pending'; var c=k==='verified'?'won':k==='rejected'?'lost':'cashed'; return '<span class="badge '+c+'">KYC '+k+'</span>'; }
  function badgeStatus(s){ s=s||'active'; var c=s==='blocked'?'lost':s==='limited'?'cashed':'won'; return '<span class="badge '+c+'">'+s+'</span>'; }
  function pullOpenSummary(){ if(!window.AlpexaSync||!AlpexaSync.db) return;
    AlpexaSync.db.from('positions').select('id',{count:'exact',head:true}).eq('status','open').then(function(r){ if(r&&typeof r.count==='number'){ POS_COUNT=r.count; if(cur==='bets'&&!busyEditing())render(); } },function(){});
    AlpexaSync.db.from('positions').select('*').eq('status','open').order('potential',{ascending:false,nullsFirst:false}).limit(40).then(function(r){ if(r&&r.data){ POS_TOP=r.data; if(cur==='bets'&&!busyEditing())render(); } },function(){});
  }
  function pullCustPos(custId){ if(!window.AlpexaSync||!AlpexaSync.db||!custId) return;
    AlpexaSync.db.from('positions').select('*').eq('status','open').eq('cust_id',custId).limit(200).then(function(r){ if(r&&r.data){ POS_BY_CUST[custId]=r.data; if(!busyEditing())render(); } },function(){}); }
  // Shared renderer for one open position/bet/holding (with Close/Void control).
  function posRowHTML(x){
    var s=x.server, who=custName(x.cust_id)||x.cust_id||'';
    var right, cls='pos';
    if(s==='fx'){ right=((+x.pnl>=0?'+':'')+usd(x.pnl||0)); cls=(+x.pnl<0?'neg':'pos'); }
    else if(s==='sports'){ right='→ '+usd(x.potential||0); cls='open'; }
    else { right=usd(x.stake||0); cls='muted'; }
    var sub = s==='fx' ? ((x.side||'')+' '+(x.size||0)+' @ '+(x.open_price||0))
            : s==='sports' ? ('Stake '+usd(x.stake||0))
            : (x.kind==='stake'?'Staked':'Holding');
    var esc=function(v){return String(v==null?'':v).replace(/"/g,'&quot;');};
    var label=s==='sports'?'Void':'Close';
    return '<div class="row"><span><b>'+(x.symbol||'')+'</b>'+
      '<div class="req-meta" style="margin:2px 0 0">👤 '+who+' · '+(x.acct_no||'')+'</div>'+
      '<div class="req-meta" style="margin:1px 0 0">'+sub+'</div></span>'+
      '<span style="text-align:right"><div class="'+cls+'" style="font-weight:800">'+right+'</div>'+
        '<button class="save ghost" data-close="'+esc(x.cust_id)+'|'+esc(x.server)+'|'+esc(x.local_id)+'" style="margin-top:5px;padding:5px 11px;font-size:11.5px">'+label+'</button></span></div>';
  }
  // Save edited customer profile + per-server balances back to Supabase.
  function savePlayer(custId){
    if(!window.AlpexaSync||!AlpexaSync.db){ toast('Not connected to server',true); return; }
    var p=null; SRV_PLAYERS.forEach(function(x){ if(x.cust_id===custId)p=x; }); if(!p){ toast('Customer not found',true); return; }
    var patch={ name:val('ed_name'), email:val('ed_email'), phone:val('ed_phone'), dob:val('ed_dob'), country:val('ed_country'), leverage:val('ed_lev'), currency:val('ed_cur'), kyc:val('ed_kyc'), status:val('ed_status') };
    AlpexaSync.db.from('players').update(patch).eq('cust_id',custId).then(function(r){ if(r&&r.error)toast('Profile error: '+r.error.message,true); },function(){});
    var accs=SRV_ACCOUNTS.filter(function(a){ return a.player_id===p.id; });
    ['fx','crypto','sports'].forEach(function(s){
      var a=null; accs.forEach(function(x){ if(x.server===s)a=x; }); if(!a)return;
      var b=parseFloat(val('ed_bal_'+s)); if(isNaN(b))return; b=Math.round(b*100)/100;
      var oldB=+a.balance||0;
      AlpexaSync.db.from('accounts').update({balance:b}).eq('acct_no',a.acct_no).then(function(){},function(){});
      if(Math.abs(b-oldB)>0.009){
        // Also send a set_balance command so an OPEN app applies it within ~4s
        // instead of overwriting our edit with its own pushed balance.
        AlpexaSync.db.from('commands').insert({cust_id:custId,server:s,action:'set_balance',local_id:String(b),status:'pending'}).then(function(){},function(){});
        if(s==='fx' && b<oldB){
          var hasPos=(POS_BY_CUST[custId]||[]).some(function(x){ return x.server==='fx'; });
          if(hasPos) toast('⚠️ FX lowered with open positions — stop-out may liquidate them',true);
        }
      }
    });
    try{ logAction('edit_customer', custId, 'profile · balances · KYC '+patch.kyc+' · status '+patch.status); }catch(e){}
    toast('Saved ✓ — synced'); PLAYER_EDIT=null; render(); setTimeout(pullPlayers,500);
  }
  // Permanently remove a customer: profile + all accounts + open positions.
  // Transaction history (requests) and audit logs are kept on purpose.
  // Note: the auth login (email/password) lives in auth.users and is removed
  // separately via the Supabase dashboard or the admin backend (M4).
  function deletePlayer(custId){
    if(!window.AlpexaSync||!AlpexaSync.db){ toast('Not connected to server',true); return; }
    var p=null; SRV_PLAYERS.forEach(function(x){ if(x.cust_id===custId)p=x; });
    if(!p){ toast('Customer not found',true); return; }
    var nm=p.name||custId;
    if(!confirm('Delete '+nm+' ('+custId+')?\n\nThis removes their profile, all 3 accounts and open positions. This cannot be undone.')) return;
    if(!confirm('Last chance — really delete '+nm+' permanently?')) return;
    var db=AlpexaSync.db;
    db.from('positions').delete().eq('cust_id',custId).then(function(){},function(){});
    db.from('commands').delete().eq('cust_id',custId).then(function(){},function(){});
    db.from('accounts').delete().eq('player_id',p.id).then(function(){
      db.from('players').delete().eq('cust_id',custId).then(function(r){
        if(r&&r.error){ toast('Delete failed: '+r.error.message+' (run the delete SQL)',true); return; }
        try{ logAction('delete_customer', custId, 'removed profile + accounts + positions ('+nm+')'); }catch(e){}
        SRV_PLAYERS=SRV_PLAYERS.filter(function(x){ return x.cust_id!==custId; });
        PLAYER_EDIT=null; PLAYER_OPEN=null;
        toast('Deleted ✓'); render(); setTimeout(pullPlayers,500);
      },function(){ toast('Delete failed (check connection / SQL)',true); });
    },function(){ toast('Could not delete accounts',true); });
  }
  var SRV_MAP={fx:'Alpexa Live (FX)',live:'Alpexa Live (FX)',stocks:'Alpexa Crypto',crypto:'Alpexa Crypto',demo:'Alpexa Sports',sports:'Alpexa Sports'};
  function pullPlayers(){
    if(!window.AlpexaSync||!AlpexaSync.db) return;
    AlpexaSync.db.from('players').select('id,cust_id,name,email,created_at,phone,dob,country,server,leverage,currency,kyc,status').then(function(r){
      if(r&&r.data){ SRV_PLAYERS=r.data; if(cur==='players'&&!busyEditing())render(); }
    },function(){
      // Older DB without the profile columns — fall back to the core fields.
      AlpexaSync.db.from('players').select('id,cust_id,name,email,created_at').then(function(r2){ if(r2&&r2.data){SRV_PLAYERS=r2.data; if(cur==='players'&&!busyEditing())render();} },function(){});
    });
    AlpexaSync.db.from('accounts').select('player_id,server,acct_no,balance').then(function(r){
      if(r&&r.data){ SRV_ACCOUNTS=r.data; if(cur==='players'&&!busyEditing())render(); }
    },function(){});
  }
  // Approximate balance for a customer = approved deposits − approved withdrawals.
  // (Live balances live on the customer's device; this is the server-side proxy.)
  function custBalance(custId){
    var dep=0,wd=0;
    SRV_REQS.forEach(function(r){ if(r.cust_id!==custId||r.status!=='approved')return;
      if(r.type==='deposit')dep+=(+r.amount||0); else if(r.type==='withdraw')wd+=(+r.amount||0); });
    return dep-wd;
  }
  // Presence: customers whose app reported a heartbeat in the last 90 seconds.
  var ONLINE=[];
  function pullOnline(){ if(!window.AlpexaSync||!AlpexaSync.db) return;
    var cutoff=new Date(Date.now()-90000).toISOString();
    AlpexaSync.db.from('players').select('cust_id,name,email,last_seen,last_app').gt('last_seen',cutoff).order('last_seen',{ascending:false}).limit(300).then(function(r){ if(r&&r.data){ ONLINE=r.data; if(cur==='online'&&!busyEditing())render(); } },function(){}); }
  // Audit log: record every back-office action (approval, edit, force-action).
  var LOGS=[];
  function logAction(action,target,detail){ if(!window.AlpexaSync||!AlpexaSync.db) return;
    AlpexaSync.db.from('logs').insert({actor:'back-office',action:action,target_cust:target||'',detail:detail||''}).then(function(){ if(cur==='logs')pullLogs(); },function(){}); }
  function pullLogs(){ if(!window.AlpexaSync||!AlpexaSync.db) return;
    AlpexaSync.db.from('logs').select('*').order('created_at',{ascending:false}).limit(100).then(function(r){ if(r&&r.data){ LOGS=r.data; if(cur==='logs'&&!busyEditing())render(); } },function(){}); }
  function srvToLocal(r){return {id:r.local_id,ts:r.created_at?Date.parse(r.created_at):Date.now(),
    type:r.type,server:r.server,amount:+r.amount||0,fee:+r.fee||0,net:+r.net||0,
    asset:r.asset,network:r.network,address:r.address,from:r.from_label,to:r.to_label,
    status:r.status,decidedTs:r.decided_at?Date.parse(r.decided_at):0,txid:r.txid||'',
    custName:r.name,custId:r.cust_id,acctNo:r.acct_no,_srv:true};}
  function reqs(){
    var srv=SRV_REQS.map(srvToLocal), local=getJSON('alpexa.withdrawals',[]);
    var seen={},out=[]; srv.forEach(function(w){seen[w.id]=true;out.push(w);});
    local.forEach(function(w){if(!seen[w.id])out.push(w);}); return out;
  }
  function openB(){return getJSON('alpexa.openBets',[]);}
  function settB(){return getJSON('alpexa.settledBets',[]);}
  function sportsBal(){return num('alpexa.sportsBalance',0);}
  function cryptoBal(){return num('alpexa.cryptoBalance',3150);}
  function fxBal(){try{var sb=JSON.parse(localStorage.getItem('alpexa.serverBalances')||'{}')||{};return +sb.fx||0;}catch(e){return 0;}}
  function CO_ADDR(){return localStorage.getItem('alpexa.companyAddr')||'0xeB25999eF152AFcb70A7C1867d85814B13369C3c';}
  // demo customer identity + 3 account numbers (generated once; real server issues these per user)
  function customer(){
    var c=getJSON('alpexa.customer',null);
    if(!c){ function n(p){return p+'-'+Math.floor(100000+Math.random()*900000);}
      c={id:'P-1001',name:'Player #1001',email:'demo@alpexa.io',acct:{sports:n('SP'),crypto:n('CR'),fx:n('FX')}};
      setJSON('alpexa.customer',c); }
    return c;
  }

  function finance(){
    var R=reqs(), ob=openB(), sb=settB();
    var dep=R.filter(function(w){return w.type==='deposit'&&w.status==='approved';}).reduce(function(a,w){return a+(+w.amount||0);},0);
    var wd =R.filter(function(w){return w.type==='withdraw'&&w.status==='approved';}).reduce(function(a,w){return a+(+w.amount||0);},0);
    var turnover=ob.reduce(function(a,b){return a+(+b.stake||0);},0)+sb.reduce(function(a,b){return a+(+b.stake||0);},0);
    var settledStake=sb.reduce(function(a,b){return a+(+b.stake||0);},0);
    var payouts=sb.reduce(function(a,b){return a+(((b.result==='won'||b.result==='cashed')?(+b.payout||0):0));},0);
    var ggr=settledStake-payouts;
    var liab=ob.reduce(function(a,b){return a+(+b.potential||0);},0);
    return {dep:dep,wd:wd,turnover:turnover,ggr:ggr,payouts:payouts,net:dep-wd,liab:liab,openCount:ob.length,
      hold: settledStake? (ggr/settledStake*100):0, pending:R.filter(function(w){return w.status==='pending';}).length};
  }

  // Sports risk + hedging.
  var RISK_POS=[], HEDGES=[], RISK_OPEN=null;
  function decOdds(am){ am=+am||0; return am>0?1+am/100:am<0?1+100/(-am):2; }
  function pullRisk(){ if(!window.AlpexaSync||!AlpexaSync.db) return;
    AlpexaSync.db.from('positions').select('*').eq('status','open').eq('server','sports').limit(1000).then(function(r){ if(r&&r.data){ RISK_POS=r.data; if(cur==='risk'&&!busyEditing())render(); } },function(){});
    AlpexaSync.db.from('hedges').select('*').order('created_at',{ascending:false}).limit(500).then(function(r){ if(r&&r.data){ HEDGES=r.data; if(cur==='risk'&&!busyEditing())render(); } },function(){}); }
  function recordHedge(game,pick,amount,odds){
    if(!window.AlpexaSync||!AlpexaSync.db){ toast('Not connected to server',true); return; }
    var book=prompt('Record hedge for "'+pick+'"\nRecommended lay-off: $'+Math.round(amount)+' at odds '+(+odds).toFixed(2)+'\n\nWhere did you place it? (e.g., Betfair):');
    if(book===null) return;
    AlpexaSync.db.from('hedges').insert({game:game,pick:pick,amount:Math.round(amount*100)/100,odds:Math.round((+odds||0)*100)/100,book:book||'manual'}).then(function(r){ if(r&&r.error)toast('Error: '+r.error.message,true); else { toast('Hedge recorded ✓'); setTimeout(pullRisk,300); } },function(){});
    try{ logAction('hedge','',game+' · '+pick+' · $'+Math.round(amount)+' @ '+(book||'manual')); }catch(e){}
  }
  function viewRisk(f){
    if(!window.AlpexaSync||!AlpexaSync.db) return '<div class="sec">Risk</div><div class="card"><div class="empty">Not connected to server.</div></div>';
    var esc=function(v){return String(v==null?'':v).replace(/"/g,'&quot;');};
    var pos=RISK_POS.slice();
    var singles=pos.filter(function(x){return (+x.size||1)<=1;});
    var parlays=pos.filter(function(x){return (+x.size||1)>1;});
    var games={};
    singles.forEach(function(x){ var g=x.game||'(unknown game)'; games[g]=games[g]||{stake:0,picks:{}}; games[g].stake+=(+x.stake||0);
      var pk=x.pick||x.symbol||'?'; var p=games[g].picks[pk]=games[g].picks[pk]||{stake:0,payout:0,n:0,decSum:0}; p.stake+=(+x.stake||0); p.payout+=(+x.potential||0); p.n++; p.decSum+=decOdds(x.odds); });
    var gameArr=Object.keys(games).map(function(g){ var G=games[g]; var worst=0, wp='';
      Object.keys(G.picks).forEach(function(pk){ var net=G.stake - G.picks[pk].payout; if(net<worst){worst=net;wp=pk;} });
      return {game:g, stake:G.stake, picks:G.picks, worst:worst, worstPick:wp}; }).sort(function(a,b){return a.worst-b.worst;});
    var totalLiab=0; gameArr.forEach(function(g){ if(g.worst<0) totalLiab+=g.worst; });
    var parlayLiab=parlays.reduce(function(a,x){return a+(+x.potential||0);},0);
    var limit=num('alpexa.riskLimit',20000);
    // hedges grouped by game|pick
    var hg={}; HEDGES.forEach(function(hh){ var k=(hh.game||'')+'|'+(hh.pick||''); hg[k]=hg[k]||{amt:0,recoup:0}; hg[k].amt+=(+hh.amount||0); hg[k].recoup+=((+hh.amount||0)*((+hh.odds||1)-1)); });
    var totalHedged=HEDGES.reduce(function(a,hh){return a+(+hh.amount||0);},0);
    var h='<div class="sec">Risk · exposure by event</div>'+
      '<div class="kpis">'+
        kpi('Worst-case liability',(totalLiab<0?'-':'')+k0(Math.abs(totalLiab)),'if worst outcomes hit','neg')+
        kpi('Hedged so far',k0(totalHedged),HEDGES.length+' lay-offs','pos')+
      '</div>';
    if(!gameArr.length && !parlays.length){ h+='<div class="card"><div class="empty">No open sports bets. (Place bets in the app, keep it open ~15s.)</div></div>'; }
    if(gameArr.length){ h+='<div class="sec">Events · '+gameArr.length+'</div>'; }
    gameArr.forEach(function(g){
      var over=g.worst <= -limit, open=(RISK_OPEN===g.game);
      // One line per event: name + worst-case. Details (picks + hedge calc) on expand.
      h+='<div class="card" style="padding:9px 12px">'+
        '<div class="row" data-rg="'+esc(g.game)+'" style="border:none;padding:0;cursor:pointer">'+
        '<span style="display:flex;align-items:center;gap:6px;min-width:0"><span class="muted" style="font-size:10px">'+(open?'▾':'▸')+'</span><b style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+g.game+'</b>'+(over?'<span style="font-size:10px">🔴</span>':'')+'</span>'+
        '<b class="'+(g.worst<0?'neg':'pos')+'" style="white-space:nowrap;padding-left:8px">'+(g.worst>=0?'+':'')+k0(g.worst)+'</b></div>';
      if(!open){ h+='</div>'; return; }
      Object.keys(g.picks).forEach(function(pk){ var P=g.picks[pk]; var net=g.stake - P.payout;
        h+='<div class="row" style="border:none;padding:9px 0 4px"><span><b>'+pk+'</b><div class="req-meta" style="margin:2px 0 0">'+P.n+' bet(s) · stake '+usd(P.stake)+' · payout '+usd(P.payout)+'</div></span>'+
          '<span class="'+(net<0?'neg':'pos')+'" style="font-weight:800">'+(net>=0?'+':'')+k0(net)+'</span></div>';
        // Hedge box appears under EVERY losing (red) pick, so any exposure can be covered.
        if(net<0){
          var L=-net; var dec=(P.decSum/P.n)||2; var H=L/Math.max(0.01,dec-1);
          var k=g.game+'|'+pk; var hAmt=(hg[k]||{}).amt||0; var hRecoup=(hg[k]||{}).recoup||0; var netAfter=net+hRecoup;
          h+='<div style="background:#FFF6E6;border-radius:4px;padding:10px 12px;margin:2px 0 10px">'+
            '<div class="lbl" style="color:var(--warn);margin-bottom:4px">⚖️ To cover this '+k0(net)+' — place this bet:</div>'+
            '<div style="font-size:14.5px;font-weight:700;line-height:1.55">Bet <span style="color:var(--acc)">'+usd(H)+'</span> on <b>'+pk+'</b> @ odds <b>'+dec.toFixed(2)+'</b></div>'+
            '<div class="hint" style="margin:4px 0 0">If it wins, you win back ~'+usd(L)+' to cancel the loss. Exchange odds differ? amount = '+usd(L)+' ÷ (odds − 1).</div>'+
            (hAmt>0?('<div class="row" style="border:none;padding:6px 0 0"><span>Already hedged '+usd(hAmt)+' → net</span><b class="'+(netAfter<0?'neg':'pos')+'">'+k0(netAfter)+'</b></div>'):'')+
            '<button class="save" data-hedge="'+esc(g.game)+'|'+esc(pk)+'|'+Math.round(H*100)/100+'|'+dec.toFixed(2)+'" style="width:100%;margin-top:7px;padding:9px">Record hedge ✓</button>'+
          '</div>';
        }
      });
      h+='</div>';
    });
    if(parlays.length){ h+='<div class="sec">Parlays / multi · '+parlays.length+'</div><div class="card">'+
      '<div class="row"><span>Combined potential liability</span><b class="neg">'+k0(parlayLiab)+'</b></div>'+
      '<div class="hint">Parlays span multiple games — shown as combined max payout.</div></div>'; }
    h+='<div class="hint" style="margin:0 14px">🔴 alert when a game\'s worst-case exceeds '+usd(limit)+'. Record a hedge after laying it off externally — net exposure updates.</div>';
    return h;
  }

  function agentCommission(code,lo,hi){
    var ag=null; SRV_AGENTS.forEach(function(a){ if(a.code===code)ag=a; }); ag=ag||{};
    var share={}; SRV_ALINKS.forEach(function(l){ if(l.agent_code===code) share[l.cust_id]=(+l.share||100)/100; });
    var fxLots=0, sportsNet=0, cryptoFees=0, n=0;
    SRV_SETTLE.forEach(function(s){
      var sh=share[s.cust_id]; if(sh==null)return;
      var t=s.created_at?Date.parse(s.created_at):0; if(!(t>=lo&&t<=hi))return; n++;
      if(s.server==='fx'&&s.kind==='fx_close'){ fxLots+=(+s.stake||0)*sh; }
      else if(s.server==='sports'&&String(s.kind||'').indexOf('bet_')===0){ sportsNet+=(-(+s.pnl||0))*sh; }
      else if(s.kind==='crypto_fee'){ cryptoFees+=(+s.stake||0)*sh; }
    });
    var cFx=fxLots*(+ag.fx_per_lot||0), cSp=sportsNet*((+ag.sports_net_pct||0)/100), cCr=cryptoFees*((+ag.crypto_fee_pct||0)/100);
    return {fxLots:fxLots,sportsNet:sportsNet,cryptoFees:cryptoFees,cFx:cFx,cSp:cSp,cCr:cCr,total:cFx+cSp+cCr,n:n};
  }

  function decide(id,status){
    try{ var rq=findReq(id); logAction(status==='approved'?'approve':'reject', rq?rq.custId:'', (rq?(typeLabel(rq.type)+' '+usd(rq.amount)):'')+' (#'+id+')'); }catch(e){}
    // local copy (this device's own requests, if any)
    var loc=getJSON('alpexa.withdrawals',[]); for(var i=0;i<loc.length;i++){if(loc[i].id===id){loc[i].status=status;loc[i].decidedTs=Date.now();break;}} setJSON('alpexa.withdrawals',loc);
    // server cache (so the UI updates instantly) + server write (so the customer's app sees it)
    for(var j=0;j<SRV_REQS.length;j++){if(SRV_REQS[j].local_id===id){SRV_REQS[j].status=status;SRV_REQS[j].decided_at=new Date().toISOString();break;}}
    render();
    if(window.AlpexaSync&&AlpexaSync.db){
      AlpexaSync.setStatus(id,status).then(function(res){
        if(res&&res.error){ toast('Server error: '+res.error.message,true); }
        else if(res&&res.data&&res.data.length===0){ toast('⚠ No matching server row (id '+id+')',true); }
        else { toast(status==='approved'?'Approved on server ✓':'Rejected on server ✓'); }
        pullServer();
      });
    } else { toast('⚠ Not connected to server',true); }
  }
  // Manual payout: record the on-chain tx hash and approve the withdrawal.
  function markPaid(id){
    var el=document.getElementById('tx_'+id); var tx=el?(el.value||'').trim():'';
    if(tx && !/^0x[0-9a-fA-F]{6,}$/.test(tx)){ if(!confirm('That doesn\'t look like a tx hash (0x…). Mark paid anyway?')) return; }
    for(var j=0;j<SRV_REQS.length;j++){ if(SRV_REQS[j].local_id===id){ SRV_REQS[j].status='approved'; SRV_REQS[j].txid=tx; SRV_REQS[j].decided_at=new Date().toISOString(); break; } }
    var loc=getJSON('alpexa.withdrawals',[]); for(var i=0;i<loc.length;i++){ if(loc[i].id===id){ loc[i].status='approved'; loc[i].txid=tx; loc[i].decidedTs=Date.now(); break; } } setJSON('alpexa.withdrawals',loc);
    render();
    try{ var rq=findReq(id); logAction('approve', rq?rq.custId:'', 'withdraw '+(rq?usd(rq.amount):'')+(tx?(' · tx '+tx.slice(0,12)+'…'):' (no txid)')); }catch(e){}
    if(window.AlpexaSync&&AlpexaSync.db){
      AlpexaSync.db.from('requests').update({status:'approved',txid:tx,decided_at:new Date().toISOString()}).eq('local_id',id).then(function(r){
        if(r&&r.error)toast('Server error: '+r.error.message,true); else toast('Marked paid ✓ — synced'); pullServer();
      },function(){ toast('Save failed',true); });
    } else { toast('⚠ Not connected to server',true); }
  }

    document.querySelectorAll('[data-agopen]').forEach(function(b){b.onclick=function(){var c=b.getAttribute('data-agopen');AGENT_OPEN=(AGENT_OPEN===c?null:c);render();};});
    document.querySelectorAll('[data-agnew]').forEach(function(b){b.onclick=agentPopup;});
    document.querySelectorAll('[data-psort]').forEach(function(b){b.onclick=function(){var s=b.getAttribute('data-psort');
      if(PLAYER_SORT===s){ PLAYER_DIR=-PLAYER_DIR; }
      else { PLAYER_SORT=s; PLAYER_DIR=(s==='name'?1:-1); } // name: A→Z · balance/joined: big/new first
      render();};});
    document.querySelectorAll('[data-aglink]').forEach(function(b){b.onclick=function(){agentLink(b.getAttribute('data-aglink'));};});
    document.querySelectorAll('[data-agsave]').forEach(function(b){b.onclick=function(){agentSave(b.getAttribute('data-agsave'));};});
    document.querySelectorAll('[data-agdel]').forEach(function(b){b.onclick=function(){agentDel(b.getAttribute('data-agdel'));};});
    document.querySelectorAll('[data-aglinkdel]').forEach(function(b){b.onclick=function(){
      AlpexaSync.db.from('agent_links').delete().eq('id',b.getAttribute('data-aglinkdel')).then(function(){ toast('Unlinked ✓'); pullAgents(); },function(){ toast('Failed',true); });};});
    document.querySelectorAll('[data-close]').forEach(function(b){b.onclick=function(){var p=(b.getAttribute('data-close')||'').split('|');sendCommand(p[0],p[1],p[2]);};});
    var os=document.getElementById('openSearch'); if(os){os.oninput=function(){OPEN_SEARCH=os.value;render();var n=document.getElementById('openSearch');if(n){n.focus();var v=n.value;n.value='';n.value=v;}};}
    document.querySelectorAll('[data-pcust]').forEach(function(b){b.onclick=function(){PLAYER_OPEN=b.getAttribute('data-pcust');PLAYER_FILTER='';cur='players';render();};});
    document.querySelectorAll('[data-rr]').forEach(function(b){b.onclick=function(){REPORT_RANGE=b.getAttribute('data-rr');render();};});
    var rf=document.getElementById('rpFrom'); if(rf) rf.onchange=function(){ REPORT_FROM=this.value; render(); };
    var rt=document.getElementById('rpTo'); if(rt) rt.onchange=function(){ REPORT_TO=this.value; render(); };
    document.querySelectorAll('[data-hedge]').forEach(function(b){b.onclick=function(){var p=(b.getAttribute('data-hedge')||'').split('|');recordHedge(p[0],p[1],+p[2],+p[3]);};});
    document.querySelectorAll('[data-rg]').forEach(function(b){b.onclick=function(){var g=b.getAttribute('data-rg');RISK_OPEN=(RISK_OPEN===g?null:g);render();};});
    var g;
    if(g=document.getElementById('kycToggle'))g.onclick=function(){var k=localStorage.getItem('alpexa.kyc')||'pending';localStorage.setItem('alpexa.kyc',k==='verified'?'pending':'verified');render();};
    if(g=document.getElementById('rgSave'))g.onclick=function(){var st=getJSON('alpexaSettings',{});st.depositLimit=parseFloat(val('rgDep'))||0;st.lossLimit=parseFloat(val('rgLoss'))||0;var d=parseFloat(val('rgSE'))||0;st.selfExcludeUntil=d>0?Date.now()+d*86400000:0;setJSON('alpexaSettings',st);flash(g,'Saved ✓');render();};
    if(g=document.getElementById('saveLimits'))g.onclick=function(){localStorage.setItem('alpexa.maxBet',val('cfgMaxBet'));localStorage.setItem('alpexa.maxDeposit',val('cfgMaxDep'));localStorage.setItem('alpexa.maxWithdraw',val('cfgMaxWd'));flash(g);};
    if(g=document.getElementById('saveMargin'))g.onclick=function(){localStorage.setItem('alpexa.margin',val('cfgMargin'));flash(g);};
    if(g=document.getElementById('savePromo'))g.onclick=function(){localStorage.setItem('alpexa.cashback',val('cfgCashback'));flash(g);};
    if(g=document.getElementById('saveFee'))g.onclick=function(){localStorage.setItem('alpexa.wdFee',val('cfgFee'));flash(g);};
    var ai=document.getElementById('coAddrIn'); if(ai)ai.value=CO_ADDR();
    if(g=document.getElementById('coSave'))g.onclick=function(){var v=(ai.value||'').trim();if(v)localStorage.setItem('alpexa.companyAddr',v);flash(g);};
    if(g=document.getElementById('coCopy'))g.onclick=function(){copy((ai.value||'').trim());flash(g,'Copied!');};
    if(g=document.getElementById('resetBtn'))g.onclick=function(){if(!confirm('Reset ALL demo data? Clears balances, bets, requests & activity.'))return;
      Object.keys(localStorage).forEach(function(k){var keep=(k==='alpexa.companyAddr'||k==='alpexa.wdFee'||k==='alpexa.maxBet'||k==='alpexa.maxDeposit'||k==='alpexa.maxWithdraw'||k==='alpexa.margin'||k==='alpexa.cashback');if(k.indexOf('alpexa')===0 && !keep)localStorage.removeItem(k);});
      alert('Done. Apps start fresh — Sports $50,000.');render();};
  }

  // Don't redraw while the operator is mid-edit or typing a search (would lose input).
  function busyEditing(){ return (cur==='history' && (EDIT_ID || (document.activeElement && (document.activeElement.id==='histSearch'||document.activeElement.id==='hsFrom'||document.activeElement.id==='hsTo')))) || (cur==='players' && (PLAYER_EDIT || (document.activeElement && document.activeElement.id==='plSearch'))) || (cur==='bets' && document.activeElement && document.activeElement.id==='openSearch') || (cur==='report' && document.activeElement && (document.activeElement.id==='rpFrom'||document.activeElement.id==='rpTo')) || (cur==='agents' && document.activeElement && String(document.activeElement.id||'').indexOf('ag_')===0); }
  window.addEventListener('storage',function(e){ if(e.key&&e.key.indexOf('alpexa')===0 && !busyEditing()) render(); });
  setInterval(function(){ if(cur==='overview'||cur==='approvals'||cur==='risk'||cur==='bets') render(); }, 4000);
  // Pull every customer's requests from the shared server.
  function pullServer(){ if(!window.AlpexaSync||!AlpexaSync.db) return; AlpexaSync.pullAll().then(function(rows){ SRV_REQS=rows||[]; if(!busyEditing()) render(); }).catch(function(){}); }
  pullServer(); pullPlayers(); pullOpenSummary(); pullOnline(); pullSettle(); pullAgents();
  setInterval(function(){ if(!document.hidden){ pullServer(); pullPlayers();
    if(cur==='bets') pullOpenSummary();
    if(cur==='online') pullOnline();
    if(cur==='report'||cur==='history') pullSettle();
    if(cur==='agents'){ pullAgents(); pullSettle(); }
    if(cur==='logs') pullLogs();
    if(cur==='risk') pullRisk();
    if(cur==='players' && PLAYER_OPEN){ pullCustPos(PLAYER_OPEN); pullSettle(); }
  } }, 3000);
  render();
  // Version stamp so we can tell at a glance if the latest manager loaded.
  (function(){try{var b=document.createElement('div');b.textContent='Mgr v10';
  b.style.cssText='position:fixed;left:50%;top:8px;transform:translateX(-50%);z-index:2147483647;background:#16243F;color:#fff;font:700 11px system-ui;padding:5px 10px;border-radius:4px;opacity:.95;box-shadow:0 3px 10px rgba(0,0,0,.3)';
  document.body.appendChild(b);setTimeout(function(){b.style.transition='opacity .5s';b.style.opacity='0';},3500);setTimeout(function(){b.remove();},4200);}catch(e){}})();
</script>
</body>
</html>
