<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Alpexa Manager · Mobile</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<meta name="theme-color" content="#1565C0">
<style>
  :root{
    --acc:#1565C0; --ink:#0F1B2D; --dim:#5A6478; --line:#E6EAF0; --bg:#F0F2F5;
    --pos:#1B5E20; --pos-bg:#E8F5E9; --neg:#C62828; --neg-bg:#FFEBEE; --card:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg)}
  body{font-family:'Roboto',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;color:var(--ink);
    max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:30px}
  /* header */
  .top{background:var(--acc);color:#fff;padding:18px 18px 20px;position:sticky;top:0;z-index:10}
  .top .row{display:flex;align-items:center;justify-content:space-between}
  .top h1{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .top .sub{font-size:11px;opacity:.85;margin-top:2px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
  .pill{background:rgba(255,255,255,.2);border-radius:14px;padding:5px 12px;font-size:13px;font-weight:700}
  /* balance card */
  .bal{margin:14px;background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:0 2px 8px rgba(15,27,45,.06)}
  .bal .lbl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .bal .v{font-size:26px;font-weight:800;letter-spacing:-.6px;margin-top:3px}
  /* section */
  .sec{margin:18px 14px 6px;font-size:13px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.6px}
  /* request card */
  .req{margin:0 14px 10px;background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:0 2px 8px rgba(15,27,45,.06)}
  .req-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:7px}
  .badge.deposit{background:var(--pos-bg);color:var(--pos)}
  .badge.withdraw{background:var(--neg-bg);color:var(--neg)}
  .req-amt{font-size:19px;font-weight:800;letter-spacing:-.4px}
  .req-meta{font-size:12.5px;color:var(--dim);margin-bottom:3px}
  .req-addr{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#8a93a6;word-break:break-all;margin:4px 0 0}
  .req-btns{display:flex;gap:10px;margin-top:12px}
  .req-btns button{flex:1;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
  .ok{background:var(--pos);color:#fff}
  .no{background:#fff;color:var(--neg);border:1.5px solid #f0c0c0}
  .empty{margin:0 14px;background:var(--card);border-radius:14px;padding:30px 16px;text-align:center;color:#9aa3b2;font-size:14px}
  /* history */
  .hist{margin:0 14px;background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(15,27,45,.06)}
  .hrow{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px}
  .hrow:last-child{border-bottom:none}
  .hrow .st{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px}
  .st.approved{background:var(--pos-bg);color:var(--pos)}
  .st.rejected{background:var(--neg-bg);color:var(--neg)}
  .foot{text-align:center;color:#aab2c0;font-size:11px;margin-top:18px}
  .foot a{color:var(--acc);font-weight:700;text-decoration:none}
</style>
</head>
<body>
  <div class="top">
    <div class="row">
      <div>
        <h1>Alpexa Manager</h1>
        <div class="sub">Back office · Mobile</div>
      </div>
      <div class="pill"><span id="pendN">0</span> 대기</div>
    </div>
  </div>

  <div class="bal">
    <div class="lbl">Sports 계좌 잔액</div>
    <div class="v" id="sportsBal">$0.00</div>
  </div>

  <div class="sec">승인 대기</div>
  <div id="pending"></div>

  <div class="sec">최근 처리</div>
  <div id="history"></div>

  <div class="foot">같은 브라우저의 앱들과 데이터를 공유해요 · <a href="launcher.html">← 런처</a></div>

<script>
  var STORE='alpexa.withdrawals';
  function load(){try{return JSON.parse(localStorage.getItem(STORE)||'[]');}catch(e){return [];}}
  function save(a){try{localStorage.setItem(STORE,JSON.stringify(a));}catch(e){}}
  function usd(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function sportsBalance(){try{var s=localStorage.getItem('alpexa.sportsBalance');return s!==null?parseFloat(s):0;}catch(e){return 0;}}
  function ago(ts){ if(!ts) return ''; var s=Math.floor((Date.now()-ts)/1000);
    if(s<60)return s+'초 전'; var m=Math.floor(s/60); if(m<60)return m+'분 전';
    var h=Math.floor(m/60); if(h<24)return h+'시간 전'; return Math.floor(h/24)+'일 전'; }

  function decide(id,status){
    var all=load(),w=null;
    for(var i=0;i<all.length;i++){ if(all[i].id===id){ w=all[i]; break; } }
    if(!w)return; w.status=status; w.decidedTs=Date.now(); save(all); render();
  }
  window.decide=decide;

  function render(){
    var all=load();
    var pend=all.filter(function(w){return w.status==='pending';});
    var done=all.filter(function(w){return w.status!=='pending';})
                .sort(function(a,b){return (b.decidedTs||0)-(a.decidedTs||0);}).slice(0,10);
    document.getElementById('pendN').textContent=pend.length;
    document.getElementById('sportsBal').textContent=usd(sportsBalance());

    var p=document.getElementById('pending');
    if(!pend.length){ p.innerHTML='<div class="empty">대기 중인 요청이 없어요 👍</div>'; }
    else{
      p.innerHTML=pend.map(function(w){
        var type=w.type||'withdraw';
        var label=type==='deposit'?'입금 DEPOSIT':'출금 WITHDRAW';
        return '<div class="req">'+
          '<div class="req-top"><span class="badge '+type+'">'+label+'</span><span class="req-amt">'+usd(w.amount)+'</span></div>'+
          '<div class="req-meta">'+w.server+' · '+(w.asset||'USDT')+(w.network?' ('+w.network+')':'')+' · '+ago(w.ts)+'</div>'+
          (type==='withdraw'?'<div class="req-meta">받는 금액(수수료 후): <b>'+usd(w.net)+'</b></div>':'')+
          (w.address?'<div class="req-addr">'+w.address+'</div>':'')+
          '<div class="req-btns"><button class="ok" onclick="decide(\''+w.id+'\',\'approved\')">승인</button>'+
          '<button class="no" onclick="decide(\''+w.id+'\',\'rejected\')">거절</button></div>'+
        '</div>';
      }).join('');
    }

    var h=document.getElementById('history');
    if(!done.length){ h.innerHTML='<div class="empty">아직 처리한 내역이 없어요.</div>'; }
    else{
      h.innerHTML='<div class="hist">'+done.map(function(w){
        var label=(w.type||'withdraw')==='deposit'?'입금':'출금';
        return '<div class="hrow"><span>'+label+' · '+w.server+' · '+usd(w.amount)+'</span>'+
          '<span class="st '+w.status+'">'+(w.status==='approved'?'승인됨':'거절됨')+'</span></div>';
      }).join('')+'</div>';
    }
  }

  window.addEventListener('storage',function(e){ if(e.key===STORE||e.key==='alpexa.sportsBalance') render(); });
  setInterval(render,2000);
  render();
</script>
</body>
</html>
