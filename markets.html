  /* 레전드 다크 (2026-07-15 스펙 §6.3 — 웹사이트-디자인-스펙.md) */
  .mkt{max-width:1240px;margin:0 auto;padding:0 22px 26px;--m-accent:#CDF138;--m-accent-ink:#101418;--m-up:#00C805;--m-down:#EB5D2A;

  /* 카테고리 탭 레일 (샘플 문법: 활성 = 액센트 텍스트 + 2px 밑줄) */
  .mkt .mkt-rail{display:flex;gap:26px;margin:26px 0 28px;overflow-x:auto;scrollbar-width:none}

    border-bottom:2px solid transparent;border-radius:0;cursor:pointer;font-family:inherit;white-space:nowrap}
  .mkt .m-tab:hover{color:var(--m-accent)}
  .mkt .m-tab.on{color:var(--m-accent);border-bottom-color:var(--m-accent)}
  /* Long, Google-Finance style: no inner scrollbars — both columns stretch to the taller
     one and the whole page scrolls. */
  .mkt .mkt-shell{display:grid;grid-template-columns:384px 1fr;gap:0;background:var(--m-panel);
    border:1px solid var(--m-line);border-top:0;border-radius:0;overflow:hidden;box-shadow:none}
  @media(max-width:820px){ .mkt .mkt-shell{grid-template-columns:1fr} .mkt .mkt-side{border-right:0;border-bottom:1px solid var(--m-line)} }
  .mkt .mkt-side{border-right:1px solid var(--m-line);padding:0 0 14px;background:var(--m-panel)}
  .mkt .m-grp{padding:14px 16px 6px;font-size:10.5px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;
    color:var(--m-muted);display:flex;justify-content:space-between;align-items:center}
  .mkt .m-grp .c{background:rgba(255,255,255,.06);border:1px solid var(--m-line);border-radius:999px;padding:1px 7px;font-size:9.5px}

  /* 3 equal cells: name | chart | price — uniform & aligned across all tabs */

  .mkt .m-nm small{display:block;font-size:11px;color:var(--m-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mkt .m-row.on .m-nm b{color:var(--m-text)}  /* 좌 액센트 바가 이미 신호 — 이름은 잉크 유지 (스펙 §6.2-D) */

  .mkt .m-chartbox{border:1px solid var(--m-line);border-radius:12px;overflow:hidden}
  .mkt .m-chart{padding:8px 6px 0}
  .mkt svg.m-svg{display:block;width:100%;height:auto}

  .mkt .m-stat .v{font-family:var(--m-mono);font-size:14px;font-weight:700;color:var(--m-text)}
  .mkt .m-relh{font-size:14px;font-weight:800;margin:24px 0 12px;color:var(--m-text)}

  .mkt .m-relc .rp{font-family:var(--m-mono);font-size:13px;font-weight:700;margin-top:4px;color:var(--m-text)}
  .mkt .m-note{margin-top:22px;font-size:11px;color:var(--m-muted);text-align:center}
  :focus-visible{outline:2px solid #CDF138;outline-offset:2px}
</style>

  <script>
  (function(){
    var URL_='https://grxnbgtfnaayeluenvqh.supabase.co';
    var KEY_='sb_publishable_ow1DihBdAAvNtnb1H0Kojw_7vbeMKFu';
    var ORDER=['US','Europe','Asia'];
    function fmtVal(v){ var a=Math.abs(v);
      if(a>=1000) return v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
      if(a>=100)  return v.toFixed(2);
      if(a>=1)    return v.toFixed(4);
      return v.toFixed(5); }
    function esc(s){return String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
    function itemHTML(c){
      var pts=c.v-c.prev, pct=c.prev?(pts/c.prev*100):0, up=pts>=0, cls=up?'up':'dn';
      return '<span class="tk-item">'
        +'<span class="tk-nm">'+esc(c.n)+'</span>'
        +'<span class="tk-v">'+fmtVal(c.v)+'</span>'
        +'<span class="tk-c '+cls+'">'+(up?'+':'')+pct.toFixed(2)+'%<span class="ar">'+(up?'▲':'▼')+'</span></span>'
        +'</span>';
    }
    function load(){
      fetch(URL_+'/rest/v1/sparklines?id=eq.strip&select=data',{headers:{apikey:KEY_,Authorization:'Bearer '+KEY_}})
        .then(function(r){return r.ok?r.json():null;})
        .then(function(j){
          var d=j&&j[0]&&j[0].data; if(!d) return;
          var items=[];
          ORDER.forEach(function(t){ (d[t]||[]).forEach(function(c){ if(c&&c.v>0) items.push(c); }); });
          if(!items.length) return;
          var one=items.map(itemHTML).join('');
          var track=document.getElementById('tkTrack');
          track.innerHTML=one+one;
          track.style.animationDuration=(items.length*10)+'s';
          document.getElementById('tkbar').style.display='';
        }).catch(function(){});
    }
    load();
  })();
  </script>

    // catalog — every symbol here exists in the server `prices` feed. td = Twelve Data symbol.
    var CAT=[
      // ── FX (20) ──
      {sym:'EURUSD',td:'EUR/USD',name:'Euro / US Dollar',cls:'fx',dp:5},
      {sym:'GBPUSD',td:'GBP/USD',name:'British Pound / US Dollar',cls:'fx',dp:5},
      {sym:'USDJPY',td:'USD/JPY',name:'US Dollar / Japanese Yen',cls:'fx',dp:3},
      {sym:'AUDUSD',td:'AUD/USD',name:'Australian Dollar / US Dollar',cls:'fx',dp:5},
      {sym:'USDCHF',td:'USD/CHF',name:'US Dollar / Swiss Franc',cls:'fx',dp:5},
      {sym:'USDCAD',td:'USD/CAD',name:'US Dollar / Canadian Dollar',cls:'fx',dp:5},
      {sym:'NZDUSD',td:'NZD/USD',name:'New Zealand Dollar / US Dollar',cls:'fx',dp:5},
      {sym:'EURJPY',td:'EUR/JPY',name:'Euro / Japanese Yen',cls:'fx',dp:3},
      {sym:'EURGBP',td:'EUR/GBP',name:'Euro / British Pound',cls:'fx',dp:5},
      {sym:'GBPJPY',td:'GBP/JPY',name:'British Pound / Japanese Yen',cls:'fx',dp:3},
      {sym:'EURAUD',td:'EUR/AUD',name:'Euro / Australian Dollar',cls:'fx',dp:5},
      {sym:'AUDJPY',td:'AUD/JPY',name:'Australian Dollar / Japanese Yen',cls:'fx',dp:3},
      {sym:'CHFJPY',td:'CHF/JPY',name:'Swiss Franc / Japanese Yen',cls:'fx',dp:3},
      {sym:'EURCHF',td:'EUR/CHF',name:'Euro / Swiss Franc',cls:'fx',dp:5},
      {sym:'USDKRW',td:'USD/KRW',name:'US Dollar / Korean Won',cls:'fx',dp:2},
      {sym:'USDCNH',td:'USD/CNH',name:'US Dollar / Chinese Yuan',cls:'fx',dp:4},
      {sym:'USDSGD',td:'USD/SGD',name:'US Dollar / Singapore Dollar',cls:'fx',dp:5},
      {sym:'USDMXN',td:'USD/MXN',name:'US Dollar / Mexican Peso',cls:'fx',dp:4},
      {sym:'XAUUSD',td:'XAU/USD',name:'Gold / US Dollar',cls:'fx',dp:2},
      {sym:'XAGUSD',td:'XAG/USD',name:'Silver / US Dollar',cls:'fx',dp:3},
      // ── Stocks (20) ──
      {sym:'AAPL',td:'AAPL',name:'Apple',cls:'stock',dp:2},
      {sym:'MSFT',td:'MSFT',name:'Microsoft',cls:'stock',dp:2},
      {sym:'NVDA',td:'NVDA',name:'NVIDIA',cls:'stock',dp:2},
      {sym:'AMZN',td:'AMZN',name:'Amazon',cls:'stock',dp:2},
      {sym:'GOOGL',td:'GOOGL',name:'Alphabet',cls:'stock',dp:2},
      {sym:'META',td:'META',name:'Meta Platforms',cls:'stock',dp:2},
      {sym:'TSLA',td:'TSLA',name:'Tesla',cls:'stock',dp:2},
      {sym:'NFLX',td:'NFLX',name:'Netflix',cls:'stock',dp:2},
      {sym:'AMD',td:'AMD',name:'Advanced Micro Devices',cls:'stock',dp:2},
      {sym:'JPM',td:'JPM',name:'JPMorgan Chase',cls:'stock',dp:2},
      {sym:'TSM',td:'TSM',name:'TSMC',cls:'stock',dp:2},
      {sym:'INTC',td:'INTC',name:'Intel',cls:'stock',dp:2},
      {sym:'QCOM',td:'QCOM',name:'Qualcomm',cls:'stock',dp:2},
      {sym:'AVGO',td:'AVGO',name:'Broadcom',cls:'stock',dp:2},
      {sym:'MU',td:'MU',name:'Micron Technology',cls:'stock',dp:2},
      {sym:'PLTR',td:'PLTR',name:'Palantir',cls:'stock',dp:2},
      {sym:'ARM',td:'ARM',name:'Arm Holdings',cls:'stock',dp:2},
      {sym:'ORCL',td:'ORCL',name:'Oracle',cls:'stock',dp:2},
      {sym:'CRM',td:'CRM',name:'Salesforce',cls:'stock',dp:2},
      {sym:'ADBE',td:'ADBE',name:'Adobe',cls:'stock',dp:2},
      // ── Crypto (20) ──
      {sym:'BTC',td:'BTC/USD',name:'Bitcoin',cls:'crypto',dp:2},
      {sym:'ETH',td:'ETH/USD',name:'Ethereum',cls:'crypto',dp:2},
      {sym:'SOL',td:'SOL/USD',name:'Solana',cls:'crypto',dp:2},
      {sym:'XRP',td:'XRP/USD',name:'XRP',cls:'crypto',dp:4},
      {sym:'BNB',td:'BNB/USD',name:'BNB',cls:'crypto',dp:2},
      {sym:'DOGE',td:'DOGE/USD',name:'Dogecoin',cls:'crypto',dp:5},
      {sym:'ADA',td:'ADA/USD',name:'Cardano',cls:'crypto',dp:4},
      {sym:'AVAX',td:'AVAX/USD',name:'Avalanche',cls:'crypto',dp:2},
      {sym:'LINK',td:'LINK/USD',name:'Chainlink',cls:'crypto',dp:2},
      {sym:'DOT',td:'DOT/USD',name:'Polkadot',cls:'crypto',dp:3},
      {sym:'MATIC',td:'MATIC/USD',name:'Polygon',cls:'crypto',dp:4},
      {sym:'TRX',td:'TRX/USD',name:'TRON',cls:'crypto',dp:5},
      {sym:'NEAR',td:'NEAR/USD',name:'NEAR Protocol',cls:'crypto',dp:3},
      {sym:'APT',td:'APT/USD',name:'Aptos',cls:'crypto',dp:3},
      {sym:'ATOM',td:'ATOM/USD',name:'Cosmos',cls:'crypto',dp:3},
      {sym:'UNI',td:'UNI/USD',name:'Uniswap',cls:'crypto',dp:3},
      {sym:'AAVE',td:'AAVE/USD',name:'Aave',cls:'crypto',dp:2},
      {sym:'SHIB',td:'SHIB/USD',name:'Shiba Inu',cls:'crypto',dp:8},
      {sym:'PEPE',td:'PEPE/USD',name:'Pepe',cls:'crypto',dp:8},
      {sym:'FET',td:'FET/USD',name:'Artificial Superintelligence',cls:'crypto',dp:4}
    ];
    var BY={}; CAT.forEach(function(c){ BY[c.sym]=c; c.mid=0; });
    // 레전드 다크 차트 상수 (스펙 §6.1 처방 — CSS 변수 밖 JS 하드코딩 지점 전용)
    var COL={up:'#00C805',dn:'#EB5D2A',grid:'rgba(255,255,255,.07)',base:'rgba(255,255,255,.25)',dim:'#8b93a5'};
    var TABS=[{k:'fx',label:'FX'},{k:'metals',label:'Metals'},{k:'stock',label:'Stocks'},{k:'crypto',label:'Crypto'}];
    function tabItems(k){ return k==='metals' ? CAT.filter(function(c){ return c.cls==='fx' && /^XA[UG]/.test(c.sym); })
      : CAT.filter(function(c){ return c.cls===k; }); }
    var ICON={fx:'#1e40d8',crypto:'#f59e0b',stock:'#7c3aed'}, BADGE={fx:'FX',crypto:'Crypto',stock:'Stock'};
    var TFS=[['1D','15min',96],['1W','1h',120],['1M','4h',120],['3M','1day',90],['1Y','1day',260]];
    var CUR='EURUSD', TAB='fx', TF='1D', prev={}, cache={}, curOpen=0;
    // open on the tab requested by the landing links (markets.html?tab=fx|stock|crypto)
    try{ var _qt=(new URLSearchParams(location.search)).get('tab');
      if(_qt && ['fx','metals','stock','crypto'].indexOf(_qt)>=0){ TAB=_qt; var _f=(_qt==='metals'?CAT.filter(function(c){return /^XA[UG]/.test(c.sym);}):CAT.filter(function(c){return c.cls===_qt;}))[0]; if(_f) CUR=_f.sym; } }catch(e){}
    var side=document.getElementById('mktSide'), main=document.getElementById('mktMain');

    function fmt(v,dp){ return (v||0).toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp}); }
    function chgHTML(pct,big){ if(pct==null||!isFinite(pct)) return ''; var up=pct>=0;
      return '<span class="'+(up?'up':'dn')+'">'+(up?'▲ ':'▼ ')+(up?'+':'')+pct.toFixed(2)+'%</span>'; }
    // Live sparkline built from accumulated feed ticks (no extra API calls).
    function sparkSVG(c){
      var h=c.hist||[]; if(h.length<2) return '';
      var w=54,ht=26,mn=Math.min.apply(null,h),mx=Math.max.apply(null,h); if(mx<=mn){ mx=mn+1; }
      var n=h.length, X=function(i){ return (i/(n-1))*w; }, Y=function(v){ return 4+(1-(v-mn)/(mx-mn))*(ht-8); };
      var d='M'+X(0).toFixed(1)+' '+Y(h[0]).toFixed(1);
      for(var i=1;i<n;i++) d+=' L'+X(i).toFixed(1)+' '+Y(h[i]).toFixed(1);
      var col=(h[n-1]>=h[0])?COL.up:COL.dn;
      var by=Y(h[0]).toFixed(1);   // dotted baseline at the session-open level
      var area=d+' L'+w+' '+ht+' L0 '+ht+' Z';
      return '<svg viewBox="0 0 '+w+' '+ht+'" preserveAspectRatio="none">'
        +'<path d="'+area+'" fill="'+col+'" fill-opacity="0.18"/>'
        +'<line x1="0" y1="'+by+'" x2="'+w+'" y2="'+by+'" stroke="'+COL.base+'" stroke-width="1" stroke-dasharray="1.5 2"/>'
        +'<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>';
    }

    function sessChg(c){ var h=c.hist||[]; if(h.length<2||!(h[0]>0)) return null; return (h[h.length-1]-h[0])/h[0]*100; }
    function chgCell(pc){ if(pc==null) return ''; var up=pc>=0; return '<span>'+(up?'+':'')+pc.toFixed(2)+'%</span><span class="m-ar">'+(up?'▲':'▼')+'</span>'; }
    function renderRail(){
      var rail=document.getElementById('mktRail'); if(!rail) return;
      rail.innerHTML=TABS.map(function(t){
        return '<button class="m-tab'+(t.k===TAB?' on':'')+'" data-tab="'+t.k+'">'+t.label+'</button>'; }).join('');
      rail.querySelectorAll('.m-tab').forEach(function(t){ t.onclick=function(){ switchTab(t.dataset.tab); }; });
    }
    function renderSide(){
      var tabs='';
      var items=tabItems(TAB);
      var rows=items.map(function(c){
        var pc=sessChg(c), chgCls=(pc==null?'':(pc>=0?'up':'dn'));
        return '<div class="m-row'+(c.sym===CUR?' on':'')+'" role="button" tabindex="0" data-sym="'+c.sym+'">'
          +'<div class="m-nm"><b>'+c.name+'</b><small>'+(c.cls==='fx'?c.td:c.sym)+'</small></div>'
          +'<div class="m-spark">'+sparkSVG(c)+'</div>'
          +'<div class="m-rt"><div class="m-px">'+(c.mid>0?(c.cls==='fx'?'':'$')+fmt(c.mid,c.dp):'—')+'</div>'
            +'<div class="m-chg '+chgCls+'">'+chgCell(pc)+'</div></div>'
        +'</div>';
      }).join('');
      side.innerHTML=tabs+rows;
      side.querySelectorAll('.m-row').forEach(function(r){
        var go=function(){ select(r.dataset.sym); };
        r.onclick=go; r.onkeydown=function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } };
      });
    }
    function switchTab(k){ if(TAB===k) return; TAB=k; renderRail();
      var first=tabItems(k)[0];
      if(first) select(first.sym); else renderSide(); }

    function select(sym){ if(!BY[sym]) return; CUR=sym; TF='1D'; renderSide(); renderMain(); loadChart(); }
    function renderMain(){
      var c=BY[CUR];
      main.innerHTML=''
        +'<div class="m-dh">'
          +'<div style="min-width:180px;flex:1"><div class="m-name">'+c.name+' <span class="m-badge">'+BADGE[c.cls]+'</span></div>'
            +'<div class="m-sub">'+(c.cls==='fx'?c.td:c.sym)+'</div></div>'
        +'</div>'
        +'<div class="m-pxrow"><div class="m-big" id="mktBig">'+(c.mid>0?(c.cls==='fx'?'':'$')+fmt(c.mid,c.dp):'—')+'</div>'
          +'<div class="m-chg" id="mktChg"></div></div>'
        +'<div class="m-asof" id="mktAsof">Loading real market history…</div>'
        +'<div class="m-chartbox"><div class="m-chart" id="mktChart"><div class="m-loading">Loading chart…</div></div>'
          +'<div class="m-tfbar">'+TFS.map(function(t){ return '<span class="m-tf'+(t[0]===TF?' on':'')+'" data-tf="'+t[0]+'">'+t[0]+'</span>'; }).join('')+'</div></div>'
        +'<div class="m-stats" id="mktStats"></div>'
        +'<div class="m-relh">Related</div><div class="m-rel" id="mktRel"></div>'
        +'<div class="m-note">Live prices from the Alpexa server feed · chart history via market data provider.</div>';
      main.querySelectorAll('.m-tf').forEach(function(t){ t.onclick=function(){ TF=t.dataset.tf;
        main.querySelectorAll('.m-tf').forEach(function(x){ x.classList.toggle('on',x===t); }); loadChart(); }; });
      var rel=CAT.filter(function(x){ return x.cls===c.cls && x.sym!==c.sym; }).slice(0,4);
      document.getElementById('mktRel').innerHTML=rel.map(function(r){
        return '<div class="m-relc" role="button" tabindex="0" data-sym="'+r.sym+'"><div class="rn">'+r.name+'</div>'
          +'<div class="rp">'+(r.mid>0?(r.cls==='fx'?'':'$')+fmt(r.mid,r.dp):'—')+'</div></div>';
      }).join('');
      document.getElementById('mktRel').querySelectorAll('.m-relc').forEach(function(el){
        var go=function(){ select(el.dataset.sym); };
        el.onclick=go; el.onkeydown=function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } };
      });
    }

    function loadChart(){
      var c=BY[CUR], tfDef=TFS.filter(function(t){ return t[0]===TF; })[0]||TFS[0];
      var key=c.sym+'|'+TF, box=document.getElementById('mktChart');
      var cached=cache[key];
      if(cached && (Date.now()-cached.t)<60000){ drawChart(cached.candles); return; }
      box.innerHTML='<div class="m-loading">Loading chart…</div>';
      var u='https://api.twelvedata.com/time_series?symbol='+encodeURIComponent(c.td)
        +'&interval='+tfDef[1]+'&outputsize='+tfDef[2]+'&order=ASC&apikey='+TD_KEY;
      fetch(u).then(function(r){ return r.json(); }).then(function(j){
        if(!j || !Array.isArray(j.values) || !j.values.length){
          box.innerHTML='<div class="m-loading">Chart data unavailable right now — the live price above is current.</div>';
          document.getElementById('mktAsof').textContent='Live price · chart history temporarily unavailable';
          return; }
        var candles=j.values.map(function(v){ return {t:Date.parse(v.datetime),o:+v.open,h:+v.high,l:+v.low,c:+v.close}; })
          .filter(function(x){ return isFinite(x.c)&&x.c>0; });
        if(CUR!==c.sym) return;
        cache[key]={t:Date.now(),candles:candles};
        drawChart(candles);
      }).catch(function(){
        box.innerHTML='<div class="m-loading">Chart data unavailable right now — the live price above is current.</div>';
      });
    }
    function drawChart(candles){
      if(!candles.length) return;
      var c=BY[CUR], W=760,H=240,pad=14;
      var lo=Math.min.apply(null,candles.map(function(x){return x.l;}));
      var hi=Math.max.apply(null,candles.map(function(x){return x.h;}));
      if(hi<=lo) hi=lo+1;
      var n=candles.length, closes=candles.map(function(x){return x.c;});
      curOpen=candles[0].o;
      var X=function(i){ return pad+i/(n-1)*(W-pad*2); };
      var Y=function(v){ return pad+(1-(v-lo)/(hi-lo))*(H-pad*2); };
      var up=(c.mid||closes[n-1])>=curOpen, col=up?COL.up:COL.dn;
      var d='M'+X(0).toFixed(1)+' '+Y(closes[0]).toFixed(1);
      for(var i=1;i<n;i++) d+=' L'+X(i).toFixed(1)+' '+Y(closes[i]).toFixed(1);
      var area=d+' L'+X(n-1).toFixed(1)+' '+(H-pad)+' L'+X(0).toFixed(1)+' '+(H-pad)+' Z';
      var grid=''; for(var g=0;g<5;g++){ var yy=pad+g/4*(H-pad*2); grid+='<line x1="'+pad+'" y1="'+yy.toFixed(1)+'" x2="'+(W-pad)+'" y2="'+yy.toFixed(1)+'" stroke="'+COL.grid+'" stroke-width="1"/>'; }
      var gid='mg'+CUR;
      var svg='<svg class="m-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'
        +'<defs><linearGradient id="'+gid+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="'+col+'" stop-opacity="0.16"/><stop offset="1" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs>'
        +grid+'<path d="'+area+'" fill="url(#'+gid+')"/>'
        +'<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
        +'<circle cx="'+X(n-1).toFixed(1)+'" cy="'+Y(closes[n-1]).toFixed(1)+'" r="4" fill="'+col+'"/></svg>';
      var intraday=(TF==='1D'||TF==='1W');
      var xl=''; for(var k=0;k<5;k++){ var idx=Math.round(k/4*(n-1)); var dt=new Date(candles[idx].t);
        var lbl=intraday? (('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2)) : ((dt.getMonth()+1)+'/'+dt.getDate());
        xl+='<span>'+lbl+'</span>'; }
      document.getElementById('mktChart').innerHTML=svg+'<div class="m-xax">'+xl+'</div>';
      updateHeader();
      var pHi=Math.max.apply(null,candles.map(function(x){return x.h;}));
      var pLo=Math.min.apply(null,candles.map(function(x){return x.l;}));
      var stats=[['Open ('+TF+')',(c.cls==='fx'?'':'$')+fmt(curOpen,c.dp)],
        ['High ('+TF+')',(c.cls==='fx'?'':'$')+fmt(pHi,c.dp)],
        ['Low ('+TF+')',(c.cls==='fx'?'':'$')+fmt(pLo,c.dp)],
        ['Last close',(c.cls==='fx'?'':'$')+fmt(closes[n-1],c.dp)],
        ['Bars',String(n)],
        ['Class',BADGE[c.cls]]];
      document.getElementById('mktStats').innerHTML=stats.map(function(s){
        return '<div class="m-stat"><div class="k">'+s[0]+'</div><div class="v">'+s[1]+'</div></div>'; }).join('');
      var dt2=new Date(candles[n-1].t);
      document.getElementById('mktAsof').innerHTML='As of '+dt2.toLocaleString()+' · <span style="color:'+COL.up+'">● Live price</span>';
    }
    function updateHeader(){
      var c=BY[CUR], big=document.getElementById('mktBig'), chg=document.getElementById('mktChg');
      if(!big) return;
      if(c.mid>0) big.textContent=(c.cls==='fx'?'':'$')+fmt(c.mid,c.dp);
      if(curOpen>0 && c.mid>0 && chg){ var pct=(c.mid-curOpen)/curOpen*100;
        chg.className='m-chg '+(pct>=0?'up':'dn'); chg.innerHTML=chgHTML(pct,true)+' <span style="color:'+COL.dim+';font-weight:600">'+TF+'</span>'; }
    }

    function pull(){
      if(!sb) return;
      sb.from('prices').select('symbol,mid,spr_pts').then(function(r){
        if(!r||r.error||!r.data) return;
        var m={}; r.data.forEach(function(x){ m[x.symbol]={mid:+x.mid||0,spr:+x.spr_pts||0}; });
        CAT.forEach(function(c){ var q=m[c.sym]; if(q&&q.mid>0){ prev[c.sym]=c.mid; c.mid=q.mid; c.spr=q.spr;
          (c.hist=c.hist||[]).push(q.mid); if(c.hist.length>60) c.hist.shift(); } });
        updateSide(); updateHeader();
      }, function(){});
    }
    // Patch prices/change/sparkline in place (no full re-render → no chart flicker).
    function updateSide(){
      var rows=side.querySelectorAll('.m-row'); if(!rows.length){ renderSide(); return; }
      rows.forEach(function(r){ var c=BY[r.dataset.sym]; if(!c) return;
        var px=r.querySelector('.m-px'); if(px) px.textContent=(c.mid>0?(c.cls==='fx'?'':'$')+fmt(c.mid,c.dp):'—');
        var pc=sessChg(c), chg=r.querySelector('.m-chg');
        if(chg){ chg.innerHTML=chgCell(pc); chg.className='m-chg '+(pc==null?'':(pc>=0?'up':'dn')); }
        var sp=r.querySelector('.m-spark'); if(sp) sp.innerHTML=sparkSVG(c);
      });
    }
    // Seed each symbol's mini-chart from the server sparkline cache so the sparklines
    // show a real recent trend INSTANTLY (instead of accumulating live ticks for minutes).
    // Live pull() keeps appending after, so they stay current. Falls back to live-accumulate
    // if the cache is empty/unavailable.
    function loadSparkCache(){
      if(!sb) return;
      sb.from('sparklines').select('data').eq('id','all').maybeSingle().then(function(r){
        if(!r||r.error||!r.data||!r.data.data) return;
        var d=r.data.data;
        CAT.forEach(function(c){ var arr=d[c.sym];
          if(Array.isArray(arr)&&arr.length>=2 && (!c.hist || c.hist.length<arr.length)){ c.hist=arr.slice(-60); } });
        updateSide();
      }, function(){});
    }
    if(sb){ loadSparkCache(); renderRail(); renderSide(); renderMain(); pull(); loadChart(); setInterval(pull,3000); }
    else { if(main) main.innerHTML='<div class="m-loading">Live feed unavailable.</div>'; }
  })();
  </script>
