<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpexa Sports — Header redesign (statement concept)</title>
<!-- MOCKUP ONLY — redesign of the sports app balance header in the confirmed
     statement aesthetic (white, big number, royal blue accent). Not wired into the app. -->
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#e9ecf2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif;color:#1c1c1e;padding:30px 14px;}
  .stack{max-width:390px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
  .cap{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#9aa2ad;padding:0 4px 8px;}
  .phone{background:#f4f6f8;border-radius:22px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,.06),0 12px 36px rgba(15,23,42,.10);border:1px solid #e6e8ee;}
  .tnum{font-variant-numeric:tabular-nums;}
  .mut{color:#9b9ba1;}
  .blue{color:#2F54EB;}
  /* header card */
  .hd{background:#fff;padding:20px 20px 18px;border-bottom:1px solid #eef0f3;}
  .hrow{display:flex;align-items:center;justify-content:space-between;}
  .wm{display:flex;align-items:center;gap:9px;}
  .dot{width:9px;height:9px;border-radius:50%;background:#2F54EB;}
  .wm .nm{font-size:15px;font-weight:800;letter-spacing:-.2px;}
  .icons{display:flex;gap:8px;}
  .ic{width:34px;height:34px;border-radius:10px;background:#f3f5f8;display:flex;align-items:center;justify-content:center;color:#5a6473;}
  .lbl{font-size:11px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:#aab2bd;margin-top:18px;}
  .bal{font-size:40px;font-weight:800;letter-spacing:-1.6px;line-height:1;margin-top:7px;}
  .sub{display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
  .pend{font-size:13px;color:#767f8c;}
  .pend b{color:#1c1c1e;font-weight:700;}
  .dep{display:inline-flex;align-items:center;gap:6px;background:#2F54EB;color:#fff;font-size:13.5px;font-weight:700;padding:10px 16px;border-radius:999px;}
  /* tiny sparkline strip */
  .spark{padding:12px 18px 6px;background:#fff;}
  /* below: tabs + a teaser row to show context */
  .tabs{display:flex;gap:8px;padding:14px 16px;background:#fff;border-bottom:1px solid #eef0f3;}
  .tab{flex:1;text-align:center;font-size:13px;font-weight:700;padding:9px 0;border-radius:9px;color:#8a94a6;background:#f4f6f8;}
  .tab.on{background:#eaeefe;color:#2F54EB;}
  .teaser{padding:16px;color:#aab2bd;font-size:12px;background:#f4f6f8;}
</style>
</head>
<body>
  <div class="stack">

    <div>
      <div class="cap">제안 — 명세서 컨셉 헤더</div>
      <div class="phone">

        <div class="hd">
          <div class="hrow">
            <div class="wm"><span class="dot"></span><span class="nm">Alpexa Sports</span></div>
            <div class="icons">
              <div class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="7" rx="2"/><rect x="3" y="13" width="18" height="7" rx="2"/></svg></div>
              <div class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
              <div class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
            </div>
          </div>

          <div class="lbl">Balance · USD</div>
          <div class="bal tnum">$254.00</div>

          <div class="sub">
            <div class="pend">Pending <b class="tnum">$100.00</b></div>
            <span class="dep"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Deposit</span>
          </div>
        </div>

        <!-- subtle blue sparkline -->
        <div class="spark">
          <svg width="100%" height="40" viewBox="0 0 350 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2F54EB" stop-opacity=".16"/><stop offset="1" stop-color="#2F54EB" stop-opacity="0"/></linearGradient></defs>
            <path d="M0,32 L50,30 L90,34 L140,22 L180,26 L230,14 L270,18 L320,8 L350,12" fill="none" stroke="#2F54EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M0,32 L50,30 L90,34 L140,22 L180,26 L230,14 L270,18 L320,8 L350,12 L350,40 L0,40 Z" fill="url(#g)"/>
          </svg>
        </div>

        <div class="tabs">
          <div class="tab on">Home</div><div class="tab">Live</div><div class="tab">My Bets</div><div class="tab">Wallet</div>
        </div>
        <div class="teaser">↓ 경기 목록 / 베팅 영역 (생략)</div>
      </div>
    </div>

    <div>
      <div class="cap">참고 — 현재 (블루 카드)</div>
      <div class="phone" style="background:#fff;">
        <div style="background:#2F46D8;color:#fff;padding:18px 20px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:15px;font-weight:800;letter-spacing:.4px;">ALPEXA SPORTS</div>
            <div style="opacity:.85;font-size:13px;">▦ ◔ ⚙</div>
          </div>
          <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;opacity:.75;margin-top:14px;">Balance · USD</div>
          <div style="font-size:30px;font-weight:800;margin-top:4px;">$254.00</div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;">
            <div style="font-size:12px;opacity:.85;">Pending <b>$100.00</b></div>
            <span style="background:rgba(255,255,255,.18);padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:700;">+ Deposit</span>
          </div>
        </div>
        <div style="padding:14px;color:#aab2bd;font-size:12px;">↓ 경기 목록 / 베팅 영역 (생략)</div>
      </div>
    </div>

  </div>
</body>
</html>
