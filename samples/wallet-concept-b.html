<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet — redesign B (blue hero + breakdown)</title>
<!-- MOCKUP B — keeps a premium blue hero, adds per-server breakdown, card activity. App not touched. -->
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif;color:#0e1726;padding:22px 14px 40px;}
  .wrap{max-width:430px;margin:0 auto;}
  .tnum{font-variant-numeric:tabular-nums;}
  .h1{font-size:24px;font-weight:800;letter-spacing:-.4px;margin:4px 4px 16px;}
  .lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  /* blue hero card */
  .hero{background:linear-gradient(140deg,#3B5BDB 0%,#2742C9 100%);border-radius:16px;padding:20px 20px 16px;color:#fff;box-shadow:0 10px 26px rgba(39,66,201,.22);margin-bottom:12px;}
  .hero .lbl{color:rgba(255,255,255,.7);}
  .hero .big{font-size:36px;font-weight:800;letter-spacing:-1.4px;margin-top:7px;line-height:1;}
  .hero .split{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.16);}
  .hero .sp .k{font-size:10.5px;color:rgba(255,255,255,.7);font-weight:600;}
  .hero .sp .v{font-size:14px;font-weight:700;margin-top:3px;}
  /* action buttons */
  .acts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
  .act{background:#fff;border:1px solid #e7ebf2;border-radius:12px;box-shadow:0 1px 2px rgba(60,64,67,.05);padding:13px 6px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;color:#2F54EB;}
  .act .ai{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
  .act .ai svg{width:20px;height:20px;}
  .act span{font-size:13px;font-weight:700;}
  /* recent activity card */
  .card{background:#fff;border:1px solid #e7ebf2;border-radius:14px;box-shadow:0 1px 2px rgba(60,64,67,.05);}
  .ra{padding:6px 16px 8px;}
  .ra-head{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;}
  .ra-head .t{font-size:15px;font-weight:800;}
  .ra-date{font-size:12px;font-weight:700;color:#5a6473;background:#f4f6fb;border:1px solid #e7ebf2;border-radius:999px;padding:5px 11px;cursor:pointer;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:6px;}
  .chip{font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;background:#f4f6fb;color:#8a94a6;cursor:pointer;}
  .chip.on{background:#eaeefe;color:#2F54EB;}
  .row{display:flex;align-items:center;gap:13px;padding:13px 0;border-top:1px solid #f1f3f7;}
  .row .ic{width:32px;height:32px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#0e1726;opacity:.6;}
  .row .ic svg{width:25px;height:25px;}
  .row .d{flex:1;min-width:0;}
  .row .t1{font-size:14.5px;font-weight:700;}
  .row .t2{font-size:11.5px;color:#8a94a6;font-weight:600;margin-top:2px;}
  .row .amt{font-weight:700;font-size:15px;}
  .p{color:#1ba35e;} .n{color:#e5484d;}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
  var I={
    deposit:'<path d="M4 13v5a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-5"/><path d="M12 3v10"/><path d="M8 9l4 4 4-4"/>',
    withdraw:'<path d="M4 13v5a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-5"/><path d="M12 13V3"/><path d="M8 7l4-4 4 4"/>',
    transfer:'<path d="M4 9h12"/><path d="M13 6l3 3-3 3"/><path d="M20 15H8"/><path d="M11 12l-3 3 3 3"/>',
    bet:'<path d="M4 7.5h16a1 1 0 0 1 1 1V11a1.6 1.6 0 0 0 0 3v2.5a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V14a1.6 1.6 0 0 0 0-3V8.5a1 1 0 0 1 1-1Z"/><path d="M14.5 8v8" stroke-dasharray="1.5 2.4"/>'
  };
  function svg(k,w){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+(w||1.9)+'" stroke-linecap="round" stroke-linejoin="round">'+I[k]+'</svg>'; }
  var rows=[
    ['bet','Bet placed','Parlay · 2 legs · 2h ago','-$20.00','n'],
    ['transfer','Transfer','Received · Approved · 2h ago','+$274.00','p'],
    ['bet','Bet placed','Single · 2h ago','-$20.00','n'],
    ['bet','Bet placed','Single · 2h ago','-$20.00','n'],
    ['bet','Bet placed','Single · 2h ago','-$20.00','n'],
    ['deposit','Deposit','USDT · Rejected · 1d ago','-$0.00','n']
  ];
  var acts=[['deposit','Deposit'],['withdraw','Withdraw'],['transfer','Transfer']];
  var split=[['Sports','$254.00'],['Crypto','$681.19'],['FX','$246.00']];
  document.getElementById('root').innerHTML =
    '<div class="h1">Wallet</div>'
    + '<div class="hero"><div class="lbl">Total Assets · all servers</div>'
    +   '<div class="big tnum">$1,181.19</div>'
    +   '<div class="split">'+split.map(function(s){return '<div class="sp"><div class="k">'+s[0]+'</div><div class="v tnum">'+s[1]+'</div></div>';}).join('')+'</div>'
    +   '</div>'
    + '<div class="acts">'+acts.map(function(a){
        return '<div class="act"><div class="ai">'+svg(a[0],2)+'</div><span>'+a[1]+'</span></div>';
      }).join('')+'</div>'
    + '<div class="card ra">'
    +   '<div class="ra-head"><div class="t">Recent Activity</div><div class="ra-date">7 days ▾</div></div>'
    +   '<div class="chips"><div class="chip on">All</div><div class="chip">Deposits</div><div class="chip">Withdrawals</div><div class="chip">Bets</div></div>'
    +   rows.map(function(r){
          return '<div class="row"><div class="ic">'+svg(r[0])+'</div>'
            + '<div class="d"><div class="t1">'+r[1]+'</div><div class="t2">'+r[2]+'</div></div>'
            + '<div class="amt '+r[4]+'">'+r[3]+'</div></div>';
        }).join('')
    + '</div>';
</script>
</body>
</html>
