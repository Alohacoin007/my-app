<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw — premium-minimal (matches Deposit C2)</title>
<!-- MOCKUP — Withdraw sheet restyled to match the new Deposit (C2) look:
     big centered amount, clean chips, hairline address, summary card, one blue action.
     App not touched. -->
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#e9ecf2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif;color:#0b0d12;padding:26px 14px;}
  .sheet{max-width:390px;margin:0 auto;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,.05),0 16px 44px rgba(15,23,42,.12);}
  .tnum{font-variant-numeric:tabular-nums;}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 4px;}
  .hd .t{font-size:18px;font-weight:800;letter-spacing:-.3px;}
  .x{width:30px;height:30px;border-radius:50%;background:#f4f6f8;border:none;color:#8a94a6;font-size:14px;cursor:pointer;}
  .lbl{font-size:11px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:#b6bdc8;}
  /* source row */
  .src{display:flex;align-items:center;gap:11px;margin:16px 24px 0;background:#f7f8fb;border:1px solid #edf0f5;border-radius:13px;padding:12px 14px;}
  .src .ic{width:34px;height:34px;border-radius:9px;background:#eef1fe;color:#2742C9;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .src .d{flex:1;min-width:0;}
  .src .t1{font-size:14px;font-weight:800;letter-spacing:-.2px;}
  .src .t2{font-size:11.5px;color:#8a94a6;font-weight:600;margin-top:1px;}
  .src .av{font-size:10.5px;font-weight:800;letter-spacing:.4px;color:#2742C9;background:#eef1fe;border-radius:999px;padding:5px 9px;}
  /* amount */
  .amt{text-align:center;padding:24px 24px 4px;}
  .amt .row{display:flex;align-items:baseline;justify-content:center;gap:5px;margin-top:8px;}
  .amt .cur{font-size:23px;font-weight:800;color:#b6bdc8;align-self:center;}
  .amt .big{font-size:48px;font-weight:800;letter-spacing:-2.5px;line-height:1;color:#0b0d12;}
  .amt .u{font-size:17px;font-weight:700;color:#b6bdc8;}
  .amt .wd{font-size:12px;font-weight:700;color:#9aa2ad;margin-top:9px;}
  .amt .wd b{color:#5a6473;}
  .chips{display:flex;gap:8px;justify-content:center;padding:16px 24px 0;}
  .chip{flex:1;border:none;background:#f4f6fa;border-radius:10px;padding:10px 0;font-size:12.5px;font-weight:700;color:#5a6473;cursor:pointer;}
  /* address */
  .sec{padding:22px 24px 0;}
  .addr{display:flex;align-items:center;gap:8px;}
  .addr input{flex:1;min-width:0;background:#f7f8fb;border:1px solid #edf0f5;border-radius:12px;padding:13px 14px;font-size:13px;color:#0b0d12;font-family:inherit;outline:none;}
  .addr input::placeholder{color:#aab2bd;}
  .qr{width:46px;height:46px;flex:0 0 auto;border:1px solid #e3e8f2;border-radius:12px;background:#fff;color:#2742C9;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .netrow{display:flex;align-items:center;justify-content:space-between;margin-top:16px;}
  .net{display:inline-flex;align-items:center;gap:6px;border:1px solid #d7def0;color:#2742C9;font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;background:#fff;}
  /* summary */
  .sum{margin:18px 24px 0;background:#f7f8fb;border:1px solid #edf0f5;border-radius:14px;padding:14px 16px;}
  .sline{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:4px 0;}
  .sline .k{color:#6b7686;font-weight:600;}
  .sline .v{font-weight:700;color:#0b0d12;}
  .sline .v.neg{color:#e5484d;}
  .sdiv{height:1px;background:#e7ebf2;margin:8px 0;}
  .sline.big .k{font-weight:800;color:#0b0d12;}
  .sline.big .v{font-size:18px;font-weight:800;color:#2742C9;}
  /* footer */
  .foot{padding:18px 24px 24px;}
  .go{display:block;width:100%;background:#2742C9;color:#fff;font-size:15px;font-weight:800;padding:16px 0;border-radius:14px;border:none;cursor:pointer;}
  .note{text-align:center;font-size:11px;color:#aab2bd;margin-top:11px;line-height:1.5;}
  .note b{color:#8a94a6;}
</style>
</head>
<body>
  <div class="sheet">
    <div class="hd"><div class="t">Withdraw</div><button class="x">✕</button></div>

    <div class="src">
      <div class="ic"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V4h12v5a6 6 0 0 1-12 0Z"/><path d="M6 5H3v2a3 3 0 0 0 3 3M18 5h3v2a3 3 0 0 1-3 3M9 21h6M12 15v6"/></svg></div>
      <div class="d"><div class="t1">Sports Server</div><div class="t2 tnum">$340.95</div></div>
      <span class="av">AVAILABLE</span>
    </div>

    <div class="amt">
      <div class="lbl">Withdrawal Amount</div>
      <div class="row"><span class="cur">$</span><span class="big tnum">100</span><span class="u">USDT</span></div>
      <div class="wd tnum">Withdrawable <b>$240.95</b></div>
    </div>
    <div class="chips"><button class="chip">25%</button><button class="chip">50%</button><button class="chip">Max</button></div>

    <div class="sec">
      <div class="lbl" style="margin-bottom:9px;">USDT Wallet Address</div>
      <div class="addr">
        <input placeholder="USDT (ERC-20) address"/>
        <button class="qr"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3M21 14v3M14 21h3M21 18v3"/></svg></button>
      </div>
      <div class="netrow"><span class="lbl">Network</span><span class="net">USDT · ERC-20 ▾</span></div>
    </div>

    <div class="sum">
      <div class="sline"><span class="k">Withdrawal Amount</span><span class="v tnum">$100.00</span></div>
      <div class="sline"><span class="k">Network Fee</span><span class="v neg tnum">−$5.00</span></div>
      <div class="sdiv"></div>
      <div class="sline big"><span class="k">You Receive</span><span class="v tnum">$95.00</span></div>
    </div>

    <div class="foot">
      <button class="go">Request Withdrawal</button>
      <div class="note">Sent in <b>USDT</b> · routed automatically via the Crypto server.<br>No manual transfer needed.</div>
    </div>
  </div>
</body>
</html>
