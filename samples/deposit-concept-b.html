<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit — redesign B (minimal, amount-first)</title>
<!-- MOCKUP B — more minimal/airy: amount hero on top, hairline dividers, card-buy demoted. App not touched. -->
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#e9ecf2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif;color:#0e1115;padding:24px 14px;}
  .sheet{max-width:390px;margin:0 auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,.06),0 14px 40px rgba(15,23,42,.12);}
  .tnum{font-variant-numeric:tabular-nums;}
  .lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#aab2bd;}
  .pad{padding:0 22px;}
  .hr{height:1px;background:#f0f1f4;margin:0 22px;}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 6px;}
  .hd .t{font-size:19px;font-weight:800;letter-spacing:-.3px;}
  .x{width:30px;height:30px;border-radius:9px;background:#f4f6f8;border:none;color:#5a6473;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  /* amount hero */
  .amt{padding:18px 22px 6px;}
  .amtbig{display:flex;align-items:baseline;gap:8px;margin-top:8px;}
  .amtbig input{border:none;outline:none;background:transparent;font-size:44px;font-weight:800;letter-spacing:-2px;width:auto;max-width:230px;color:#0e1115;}
  .amtbig .u{font-size:16px;font-weight:700;color:#aab2bd;}
  .chips{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .chip{flex:1;min-width:64px;border:1px solid #e7ebf2;background:#fff;border-radius:999px;padding:9px 0;text-align:center;font-size:12.5px;font-weight:700;color:#46506b;cursor:pointer;}
  /* method rows */
  .sec{padding:16px 22px 4px;}
  .mrow{display:flex;align-items:center;gap:13px;padding:13px 22px;cursor:pointer;}
  .mrow .ic{width:38px;height:38px;border-radius:11px;background:#eef1fe;color:#2742C9;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .mrow .ic svg{width:20px;height:20px;}
  .mrow.sel{background:#fafbff;}
  .mrow .d{flex:1;min-width:0;}
  .mrow .t1{font-size:14.5px;font-weight:700;color:#0e1115;}
  .mrow .t2{font-size:11.5px;color:#8a94a6;font-weight:600;margin-top:2px;}
  .mrow .chev{color:#c4cad3;}
  /* mini credit-card graphic — gives the "buy with card" feel */
  .cardgfx{width:48px;height:31px;border-radius:6px;background:linear-gradient(135deg,#3B5BDB,#2742C9);position:relative;flex:0 0 auto;box-shadow:0 2px 7px rgba(39,66,201,.32);overflow:hidden;}
  .cardgfx::after{content:'';position:absolute;top:-10px;right:-10px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.10);}
  .cardgfx .chip{position:absolute;top:7px;left:7px;width:10px;height:7px;border-radius:2px;background:linear-gradient(135deg,#ffe08a,#e9b53d);}
  .cardgfx .dots{position:absolute;bottom:5px;left:7px;font-size:6.5px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:1.5px;}
  .mrow .dot{width:18px;height:18px;border-radius:50%;border:2px solid #d7def0;flex:0 0 auto;}
  .mrow.sel .dot{border-color:#2742C9;background:radial-gradient(circle,#2742C9 0 5px,#fff 6px);}
  /* expanded crypto address */
  .exp{padding:2px 22px 14px;}
  .net{display:inline-flex;align-items:center;gap:6px;border:1px solid #d7def0;color:#2742C9;font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;margin-bottom:10px;}
  .addr{display:flex;align-items:center;gap:10px;border:1px solid #eceff5;border-radius:12px;padding:11px 11px 11px 14px;}
  .addr .a{flex:1;min-width:0;font-family:'SF Mono',ui-monospace,monospace;font-size:12px;color:#0e1115;word-break:break-all;line-height:1.4;}
  .copy{background:#2742C9;color:#fff;border:none;font-size:12px;font-weight:700;padding:8px 13px;border-radius:9px;cursor:pointer;flex-shrink:0;}
  .submit{display:block;width:100%;background:#2742C9;color:#fff;font-size:15px;font-weight:800;padding:15px 0;border-radius:12px;border:none;text-align:center;cursor:pointer;}
  .foot{padding:14px 22px 22px;}
  .note{font-size:11px;color:#aab2bd;text-align:center;margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
  <div class="sheet">
    <div class="hd"><div class="t">Deposit</div><button class="x">✕</button></div>

    <div class="amt">
      <div class="lbl">Amount · USDT</div>
      <div class="amtbig"><input value="100" class="tnum"/><span class="u">USDT</span></div>
      <div class="chips"><div class="chip">$50</div><div class="chip">$100</div><div class="chip">$500</div><div class="chip">$1,000</div></div>
    </div>

    <div class="hr" style="margin-top:8px;"></div>
    <div class="sec"><span class="lbl">How to pay</span></div>

    <!-- card (selected — most people pay by card) -->
    <div class="mrow sel">
      <div class="cardgfx"><span class="chip"></span><span class="dots">•••• ••••</span></div>
      <div class="d"><div class="t1">Buy USDT with card</div><div class="t2">Instant · card or Apple Pay</div></div>
      <span class="dot"></span>
    </div>

    <div class="hr"></div>
    <!-- crypto (alternative) -->
    <div class="mrow">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 8h4.2c1.5 0 1.9 2 .5 2.7-1.3.5-2.9.4-4.3.4m0 0c1.6-.1 3.4-.2 4.8.3 1.4.6 1.3 2.7-.3 3.1-1.4.4-3 .3-4.5.2M9.5 7.8v8.4M11.8 6.2v1.6M11.8 16.2v1.6"/></svg></div>
      <div class="d"><div class="t1">Send USDT you have</div><div class="t2">To your deposit address</div></div>
      <span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></span>
    </div>

    <div class="foot">
      <button class="submit">Buy $100 with card</button>
    </div>
  </div>
</body>
</html>
