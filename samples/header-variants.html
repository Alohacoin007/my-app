<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpexa Sports — Header variants</title>
<!-- MOCKUP — 3 header directions to fix "too white / no card feel". App not touched. -->
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif;color:#0e1726;padding:26px 14px;}
  .stack{max-width:400px;margin:0 auto;display:flex;flex-direction:column;gap:26px;}
  .cap{font-size:12px;font-weight:800;color:#2742C9;padding:0 4px 9px;}
  .page{background:#f4f6fb;border-radius:20px;padding:12px 12px 26px;border:1px solid #e7ebf2;}
  .tnum{font-variant-numeric:tabular-nums;}
  /* shared header bits */
  .htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .wm{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:800;letter-spacing:-.2px;}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .icons{display:flex;gap:4px;}
  .ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .bal{font-size:33px;font-weight:800;letter-spacing:-1.3px;line-height:1.02;margin-top:6px;}
  .sub{display:flex;align-items:center;justify-content:space-between;margin-top:13px;}
  .pend{font-size:13px;}
  .pend b{font-weight:700;}
  .dep{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;padding:9px 16px;border-radius:999px;}
  .teaser{padding:16px;color:#aab2bd;font-size:12px;text-align:center;}

  /* A — white elevated card */
  .vA .card{background:#fff;border-radius:16px;padding:18px 18px 16px;box-shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.07);}
  .vA .wm{color:#0e1726;} .vA .dot{background:#2742C9;}
  .vA .ic{background:#f3f5f9;color:#5a6473;} .vA .lbl{color:#9aa2ad;} .vA .bal{color:#0e1726;}
  .vA .pend{color:#767f8c;} .vA .pend b{color:#0e1726;}
  .vA .dep{background:#2742C9;color:#fff;}

  /* B — soft blue tint card */
  .vB .card{background:linear-gradient(160deg,#eef2ff 0%,#e4ebff 100%);border:1px solid #dfe6ff;border-radius:16px;padding:18px 18px 16px;}
  .vB .wm{color:#1b2a6b;} .vB .dot{background:#2742C9;}
  .vB .ic{background:rgba(39,66,201,.08);color:#3b4aa0;} .vB .lbl{color:#7b86c4;} .vB .bal{color:#15225e;}
  .vB .pend{color:#5a66a8;} .vB .pend b{color:#15225e;}
  .vB .dep{background:#2742C9;color:#fff;}

  /* C — refined brand-blue card (white text) */
  .vC .card{background:linear-gradient(135deg,#3B5BDB 0%,#2742C9 100%);border-radius:16px;padding:18px 18px 16px;box-shadow:0 8px 24px rgba(39,66,201,.22);}
  .vC .wm{color:#fff;} .vC .dot{background:#fff;}
  .vC .ic{background:rgba(255,255,255,.14);color:#fff;} .vC .lbl{color:rgba(255,255,255,.72);} .vC .bal{color:#fff;}
  .vC .pend{color:rgba(255,255,255,.85);} .vC .pend b{color:#fff;}
  .vC .dep{background:#fff;color:#2742C9;}
</style>
</head>
<body>
  <div class="stack" id="root"></div>
  <script>
    var icons = '<div class="icons">'
      + '<div class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="7" rx="2"/><rect x="3" y="13" width="18" height="7" rx="2"/></svg></div>'
      + '<div class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>'
      + '<div class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M5 19l2-2M17 7l2-2"/></svg></div>'
      + '</div>';
    var inner = function(){ return ''
      + '<div class="card">'
      +   '<div class="htop"><div class="wm"><span class="dot"></span>Alpexa Sports</div>' + icons + '</div>'
      +   '<div class="lbl">Balance · USD</div>'
      +   '<div class="bal tnum">$254.00</div>'
      +   '<div class="sub"><div class="pend">Pending <b class="tnum">$100.00</b></div>'
      +     '<span class="dep">+ Deposit</span></div>'
      + '</div>'
      + '<div class="teaser">↓ 검색 · 경기 목록 (그대로)</div>'; };
    var defs = [['A','흰 카드 + 그림자 (카드 느낌, 미니멀)'],
                ['B','연한 블루 틴트 카드 (은은한 색 + 카드)'],
                ['C','브랜드 블루 카드 — 모던하게 (색 살림, 원래 느낌)']];
    document.getElementById('root').innerHTML = defs.map(function(d){
      return '<div><div class="cap">'+d[0]+' — '+d[1]+'</div><div class="page v'+d[0]+'">'+inner()+'</div></div>';
    }).join('');
  </script>
</body>
</html>
