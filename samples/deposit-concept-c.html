<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit — redesign C (premium minimal)</title>
<!-- MOCKUP C — stripped to premium-minimal: segmented toggle, big clean amount, one action. No gimmicks. App not touched. -->
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#e9ecf2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif;color:#0b0d12;padding:26px 14px;}
  .sheet{max-width:390px;margin:0 auto;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,.05),0 16px 44px rgba(15,23,42,.12);}
  .tnum{font-variant-numeric:tabular-nums;}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 4px;}
  .hd .t{font-size:18px;font-weight:800;letter-spacing:-.3px;}
  .x{width:30px;height:30px;border-radius:50%;background:#f4f6f8;border:none;color:#8a94a6;font-size:14px;cursor:pointer;}
  /* segmented toggle */
  .seg{display:flex;background:#f3f5f8;border-radius:11px;padding:3px;margin:18px 24px 0;}
  .seg button{flex:1;border:none;background:transparent;font-family:inherit;font-size:13.5px;font-weight:700;color:#8a94a6;padding:9px 0;border-radius:9px;cursor:pointer;}
  .seg button.on{background:#fff;color:#0b0d12;box-shadow:0 1px 3px rgba(16,24,40,.10);}
  /* amount */
  .amt{padding:30px 24px 8px;text-align:center;}
  .amt .lbl{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#b6bdc8;}
  .amt .big{font-size:52px;font-weight:800;letter-spacing:-2.5px;line-height:1;margin-top:10px;}
  .amt .big .u{font-size:19px;font-weight:700;color:#b6bdc8;letter-spacing:0;margin-left:4px;}
  .chips{display:flex;gap:8px;justify-content:center;padding:18px 24px 0;}
  .chip{flex:1;border:none;background:#f4f6fa;border-radius:10px;padding:9px 0;font-size:12.5px;font-weight:700;color:#5a6473;cursor:pointer;}
  /* footer / action */
  .foot{padding:26px 24px 26px;}
  .pay{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#111317;color:#fff;font-size:15px;font-weight:700;padding:16px 0;border-radius:14px;border:none;cursor:pointer;}
  .sub{text-align:center;font-size:11.5px;color:#aab2bd;margin-top:12px;}
</style>
</head>
<body>
  <div class="sheet">
    <div class="hd"><div class="t">Deposit</div><button class="x">✕</button></div>

    <div class="seg">
      <button class="on">Card</button>
      <button>Crypto</button>
    </div>

    <div class="amt">
      <div class="lbl">Amount</div>
      <div class="big tnum">$100<span class="u">USDT</span></div>
    </div>
    <div class="chips"><button class="chip">$50</button><button class="chip">$100</button><button class="chip">$500</button><button class="chip">$1k</button></div>

    <div class="foot">
      <button class="pay">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18"/></svg>
        Pay $100 with card
      </button>
      <div class="sub">Instant · Visa, Mastercard &amp; Apple Pay</div>
    </div>
  </div>
</body>
</html>
