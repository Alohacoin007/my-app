  // One stake term per coin: if this coin is already staked, you can only add to
  // the SAME term (unstake first to switch terms). Lock the picker to that term.
  const existingStake = (staked[assetId] && staked[assetId].usd > 0) ? staked[assetId] : null;
  const lockedTerm = existingStake ? existingStake.period : null;
  React.useEffect(() => { if (lockedTerm) setPeriodId(lockedTerm); }, [assetId, lockedTerm]);



  // Pull metadata from STAKE_ASSETS but fall back if the user picks an asset
  // that isn't in the seed table (e.g. brand-new buys).
  const stakeMeta = STAKE_ASSETS[assetId] || {
    name: (typeof COIN_NAMES !== 'undefined' && COIN_NAMES[assetId]) || assetId,
    symbol: assetId.slice(0, 1),
    color: RH.accent,
    balance: 0,
    balanceUsd: 0,
    apy: 5.0,
  };
  // Stakes are funded from USDT. The user pays USDT and earns the staked asset's APY.
  const liveBalanceUsd = balances.USDT || 0;
  const asset  = { ...stakeMeta, balanceUsd: liveBalanceUsd };
  const period = STAKE_PERIODS.find((p) => p.id === periodId);
  const apy    = stakePeriodApy(assetId, periodId);
  const amount = parseFloat(amountStr) || 0;
  const availableUsd = liveBalanceUsd;
  const insufficient = amount > availableUsd;
  const valid = amount > 0 && !insufficient;

  // Live projections
  const yearly  = amount * (apy / 100);
  const monthly = yearly / 12;
  const daily   = yearly / 365;

  const onKey = (k) => {
    if (k === '⌫') { setAmountStr((s) => s.length <= 1 ? '0' : s.slice(0, -1)); return; }
    if (k === '.') { if (amountStr.includes('.')) return; setAmountStr((s) => s + '.'); return; }
    setAmountStr((s) => {
      if (s === '0') return k;
      if (s.includes('.')) { const [, frac = ''] = s.split('.'); if (frac.length >= 2) return s; }
      return s + k;
    });
  };

  const [intPart, fracPart] = amountStr.includes('.') ? amountStr.split('.') : [amountStr, null];
  const fracDisplay = fracPart === null ? '.00' : `.${fracPart}`;

  // Confirmation → full-screen HeroConfirm. Done button returns to dashboard.
  if (confirmed) {
    return (
      <HeroConfirm
        heroColor={RH.heroBlue}
        label={`$${amount.toFixed(2)} staked`}
        sublabel={`${assetId} · ${apy.toFixed(2)}% APY · ${period.label}`}
        rows={[
          { label: 'Asset',  value: assetId },
          { label: 'APY',    value: `${apy.toFixed(2)}%` },
          { label: 'Period', value: period.label },
          { label: 'Earning', value: `+$${daily.toFixed(4)}/day` },
        ]}
        footnote={`Your ${assetId} stake is active. Rewards accrue continuously and pay out weekly.`}
        onDone={() => { setConfirmed(false); setAmountStr('0'); if (onBack) onBack(); }}
      />
    );
  }

  return (
    <Phone width={390} height={844} bg={RH.bg}>
      <StatusBar/>

      {/* Header */}
      <div style={{
        padding: '6px 16px 10px', display: 'flex',
        alignItems: 'center', justifyContent: 'space-between', flexShrink: 0,
      }}>
        <button onClick={onBack} aria-label="Back" style={{
          width: 36, height: 36, borderRadius: 18,
          background: 'transparent', border: 'none', display: 'flex',
          alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 6 L9 12 L15 18"/>
          </svg>
        </button>
        <div style={{ fontSize: 16, fontWeight: 700, color: RH.text, letterSpacing: -0.2 }}>Stake</div>
        <div style={{ width: 36, height: 36 }}/>
      </div>

      <div className="alpexa-hide-scrollbar" style={{
        flex: 1, overflowY: 'auto', overflowX: 'hidden',
        display: 'flex', flexDirection: 'column',
      }}>
        {/* Asset chip + APY badge */}
        <div style={{ padding: '6px 0 14px', display: 'flex', justifyContent: 'center', gap: 8 }}>
          <div
            onClick={() => setAssetOpen((o) => !o)}
            style={{
              padding: '8px 14px',
              background: RH.surface, border: `1px solid ${RH.line}`,
              borderRadius: 999,
              display: 'inline-flex', alignItems: 'center', gap: 8, cursor: 'pointer',
            }}
          >
            <AssetIcon sym={assetId} size={20}/>
            <span style={{ fontSize: 13, fontWeight: 600, color: RH.text, letterSpacing: -0.1 }}>
              Stake {assetId}
            </span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="2.4"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div style={{
            padding: '8px 14px',
            background: `${RH.green}1A`, border: `1px solid ${RH.green}55`,
            borderRadius: 999,
            display: 'inline-flex', alignItems: 'center', gap: 6,
          }}>
            <span style={{
              fontFamily: 'Geist Mono, monospace', fontSize: 10, color: RH.green,
              letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 700,
            }}>APY</span>
            <span style={{
              fontSize: 13, fontWeight: 700, color: RH.text,
              fontVariantNumeric: 'tabular-nums',
            }}>{apy.toFixed(2)}%</span>
          </div>
        </div>

        {assetOpen ? (
          <div style={{
            margin: '0 22px 12px',
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 12, padding: 4,
          }}>
            {Object.entries(STAKE_ASSETS).map(([id, a]) => {
              const active = id === assetId;
              return (
                <button key={id} onClick={() => { setAssetId(id); setAssetOpen(false); }} style={{
                  width: '100%', textAlign: 'left',
                  background: active ? RH.surfaceUp : 'transparent',
                  border: 'none', borderRadius: 8, padding: '10px 12px',
                  display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer',
                }}>
                  <AssetIcon sym={id} size={24}/>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: RH.text }}>{a.name}</div>
                    <div style={{ fontSize: 11, color: RH.textDim, marginTop: 1 }}>
                      Fund with USDT · ${(balances.USDT || 0).toFixed(2)}
                    </div>
                  </div>
                  <span style={{
                    fontSize: 12, color: RH.green, fontWeight: 700,
                    fontVariantNumeric: 'tabular-nums',
                  }}>up to {stakeMaxApy(id)}%</span>
                  {active ? (
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={RH.green} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M5 12 l5 5 L20 7"/>
                    </svg>
                  ) : null}
                </button>
              );
            })}
          </div>
        ) : null}

        {/* Big amount */}
        <div style={{
          padding: '18px 22px 12px',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
        }}>
          <div style={{
            display: 'inline-flex', alignItems: 'baseline',
            color: insufficient ? RH.red : RH.text,
            letterSpacing: -2, lineHeight: 1, fontVariantNumeric: 'tabular-nums',
          }}>
            <span style={{ fontSize: 24, fontWeight: 500, marginRight: 4, opacity: 0.6 }}>$</span>
            <span style={{ display: 'inline-flex', fontSize: 48, fontWeight: 600 }}>
              {[...intPart].map((ch, i) => (
                <OdometerDigit key={'i'+i} ch={ch} fontSize={48} color={insufficient ? RH.red : RH.text}/>
              ))}
            </span>
            <span style={{ display: 'inline-flex', fontSize: 30, fontWeight: 500, opacity: 0.45 }}>
              {[...fracDisplay].map((ch, i) => (
                <OdometerDigit key={'f'+i} ch={ch} fontSize={30} color={insufficient ? RH.red : RH.text}/>
              ))}
            </span>
          </div>
          <div style={{
            marginTop: 8, fontSize: 11,
            color: insufficient ? RH.red : RH.textDim,
            fontFamily: 'Geist Mono, monospace',
            fontVariantNumeric: 'tabular-nums', letterSpacing: 0.6,
          }}>
            {insufficient
              ? `Insufficient — only $${availableUsd.toFixed(2)} available`
              : `Available · ${asset.balance} ${assetId}  ($${availableUsd.toFixed(2)})`}
          </div>
        </div>

        {/* Period selector */}
        <div style={{ margin: '0 22px 12px', display: 'flex', gap: 6 }}>
          {STAKE_PERIODS.map((p) => {
            const active = p.id === periodId;
            const disabled = lockedTerm && p.id !== lockedTerm;
            return (
              <button
                key={p.id}
                onClick={disabled ? undefined : () => setPeriodId(p.id)}
                style={{
                  flex: 1, padding: '10px 0', borderRadius: 12,
                  background: active ? `${RH.green}1A` : RH.surface,
                  border: `1px solid ${active ? RH.green : RH.line}`,
                  cursor: disabled ? 'not-allowed' : 'pointer',
                  opacity: disabled ? 0.4 : 1,
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
                }}
              >
                <span style={{
                  fontSize: 12, fontWeight: 700, color: RH.text, letterSpacing: -0.1,
                }}>{p.label}</span>
                <span style={{
                  fontFamily: 'Geist Mono, monospace', fontSize: 9.5,
                  color: active ? RH.green : RH.textDim,
                  letterSpacing: 0.4, fontWeight: 700,
                }}>{stakePeriodApy(assetId, p.id)}% APY</span>
              </button>
            );
          })}
        </div>
        {lockedTerm ? (
          <div style={{ margin: '-4px 22px 12px', fontSize: 11, color: RH.textDim, lineHeight: 1.5 }}>
            You already have a {(STAKE_PERIODS.find(function(p){return p.id===lockedTerm;})||{}).label} {assetId} stake — adding more keeps that term. Unstake it first to choose a different term.
          </div>
        ) : null}

        {/* Projected earnings */}
        <div style={{
          margin: '4px 22px 0', padding: '12px 14px',
          background: RH.surface, border: `1px solid ${RH.line}`,
          borderRadius: 14,
        }}>
          <div style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 10, color: RH.textDim,
            letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700, marginBottom: 8,
          }}>You'll earn (estimated)</div>
          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6,
          }}>
            {[
              { label: 'Daily',   value: daily   },
              { label: 'Monthly', value: monthly },
              { label: 'Yearly',  value: yearly  },
            ].map((row) => (
              <div key={row.label} style={{
                padding: '8px 10px',
                background: RH.surfaceUp, borderRadius: 10,
                display: 'flex', flexDirection: 'column', gap: 2,
              }}>
                <span style={{ fontSize: 10, color: RH.textDim, fontWeight: 600, letterSpacing: 0.6, textTransform: 'uppercase' }}>{row.label}</span>
                <span style={{
                  fontSize: 13, fontWeight: 700, color: RH.green,
                  fontVariantNumeric: 'tabular-nums', letterSpacing: -0.1,
                }}>+${row.value.toFixed(2)}</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{ flex: 1 }}/>

        {/* Keypad */}
        <div style={{
          padding: '10px 18px 0',
          display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
          rowGap: 4, columnGap: 4,
        }}>
          {['1','2','3','4','5','6','7','8','9','.','0','⌫'].map((k) => (
            <button key={k} onClick={() => onKey(k)} style={{
              background: 'transparent', border: 'none', padding: '12px 0',
              color: RH.text, fontSize: 22, fontWeight: 500,
              letterSpacing: -0.5, cursor: 'pointer', fontFamily: 'Geist, Inter, system-ui',
            }}>{k}</button>
          ))}
        </div>

        {/* Stake button */}
        <div style={{ padding: '12px 22px 22px' }}>
          <button
            disabled={!valid}
            onClick={() => {
              if (!valid) return;
              if (typeof AudioFX !== 'undefined') AudioFX.success();
              if (typeof AudioFX !== 'undefined') AudioFX.success();
              if (onStaked) onStaked(assetId, amount, periodId);
              setConfirmed(true);
            }}
            style={{
              width: '100%', padding: '16px 0', borderRadius: 999,
              background: valid ? RH.green : RH.surfaceUp,
              color: valid ? '#000' : RH.textMute,
              border: 'none', cursor: valid ? 'pointer' : 'not-allowed',
              fontSize: 15, fontWeight: 700, letterSpacing: 0.2,
              transition: 'background 180ms ease, color 180ms ease',
            }}>
            {valid ? `Stake $${amount.toFixed(2)}` : 'Enter amount'}
          </button>
        </div>
      </div>

    </Phone>
  );
}


// ─── Transfer screen — move USD between Alpexa servers ────────────
function Transfer({ onBack, serverBalances = {}, onTransferred }) {
  const ids       = ['crypto', 'fx', 'sports'];
  const [fromId, setFromId] = React.useState('crypto');
  const [toId,   setToId]   = React.useState('sports');
  const [fromOpen, setFromOpen] = React.useState(false);
  const [toOpen,   setToOpen]   = React.useState(false);
  const [amountStr, setAmountStr] = React.useState('0');
  const [confirmed, setConfirmed] = React.useState(false);
  const [transferQuick, setTransferQuick] = React.useState(null);

  // Note: confirmation handled via HeroConfirm below, no auto-timeout.

  // Swap from/to if user picks same on both
  React.useEffect(() => { if (fromId === toId) {
    const other = ids.find((i) => i !== fromId);
    if (other) setToId(other);
  } }, [fromId]);
  React.useEffect(() => { if (toId === fromId) {
    const other = ids.find((i) => i !== toId);
    if (other) setFromId(other);
  } }, [toId]);

  const fromBal = effBal(fromId, serverBalances[fromId] != null ? serverBalances[fromId] : 0);
  const amount  = parseFloat(amountStr) || 0;
  const insufficient = amount > fromBal;
  // Don't let a stale/zero cached balance disable the button — the app_transfer RPC
  // is the real guard (checks live USDT cash server-side) and reports the reason.
  const valid = amount > 0 && fromId !== toId;

  const onKey = (k) => {
    setTransferQuick(null);
    if (k === '⌫') { setAmountStr((s) => s.length <= 1 ? '0' : s.slice(0, -1)); return; }
    if (k === '.') { if (amountStr.includes('.')) return; setAmountStr((s) => s + '.'); return; }
    setAmountStr((s) => {
      if (s === '0') return k;
      if (s.includes('.')) { const [, frac = ''] = s.split('.'); if (frac.length >= 2) return s; }
      return s + k;
    });
  };
  const setQuick = (frac) => { setAmountStr(Math.round(fromBal * frac * 100) / 100 + ''); };
  const swapServers = () => { const a = fromId; setFromId(toId); setToId(a); };

  const [intPart, fracPart] = amountStr.includes('.') ? amountStr.split('.') : [amountStr, null];
  const fracDisplay = fracPart === null ? '.00' : `.${fracPart}`;

  const renderServerCard = (label, sid, open, setOpen, otherSid, locked) => {
    const meta = SERVERS[sid];
    const bal  = effBal(sid, serverBalances[sid] != null ? serverBalances[sid] : 0);
    return (
      <div style={{ position: 'relative' }}>
        <div
          onClick={locked ? undefined : () => setOpen((o) => !o)}
          style={{
            padding: '14px 16px',
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 14,
            display: 'flex', alignItems: 'center', gap: 12, cursor: locked ? 'default' : 'pointer',

          }}
        >
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: RH.text, letterSpacing: -0.15 }}>
              {meta.label}
            </div>
            <div style={{
              marginTop: 3, fontSize: 13, fontWeight: 500, color: RH.textDim,
              fontFamily: 'Geist Mono, monospace',
              fontVariantNumeric: 'tabular-nums', letterSpacing: -0.1,
            }}>${bal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
          </div>
          {locked ? null : (
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{
            transform: open ? 'rotate(180deg)' : 'rotate(0deg)',
            transition: 'transform 200ms ease',
          }}>
            <path d="M6 9l6 6 6-6"/>
          </svg>
          )}
        </div>
        {(!locked && open) ? (
          <div style={{
            position: 'absolute', left: 0, right: 0, top: 'calc(100% + 6px)',
            background: RH.surface, border: `1px solid ${RH.line}`,

            boxShadow: '0 16px 40px -12px rgba(0,0,0,0.6)',
          }}>
            {ids.filter((i) => i !== otherSid).map((i) => {
              const m = SERVERS[i]; const b = effBal(i, serverBalances[i] != null ? serverBalances[i] : 0);
              const active = i === sid;
              return (
                <button key={i} onClick={() => { (label === 'FROM' ? setFromId : setToId)(i); setOpen(false); }} style={{
                  width: '100%', textAlign: 'left',

                  display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer',

                  <span style={{
                    width: 26, height: 26, borderRadius: 13,
                    background: RH.surfaceUp, border: `1px solid ${RH.line}`,
                    color: RH.text, fontWeight: 700, fontSize: 10,

                  <div style={{ flex: 1, minWidth: 0 }}>

                    <div style={{ fontSize: 11, color: RH.textDim, marginTop: 1, fontVariantNumeric: 'tabular-nums' }}>
                      ${b.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                    </div>
                  </div>
                  {active ? (
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={RH.green} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M5 12 l5 5 L20 7"/>
                    </svg>
                  ) : null}
                </button>
              );
            })}
          </div>
        ) : null}
      </div>
    );
  };

  // ── Confirmation — full HeroConfirm to match Deposit / Withdraw / Buy / Send.
  if (confirmed) {
    return (
      <HeroConfirm
        heroColor={RH.accent}
        label={`$${amount.toFixed(2)} transferred`}
        sublabel={`${SERVERS[fromId].label} → ${SERVERS[toId].label}`}
        rows={[
          { label: 'From',   value: SERVERS[fromId].label },
          { label: 'To',     value: SERVERS[toId].label },
          { label: 'Amount', value: `$${amount.toFixed(2)}` },
          { label: 'Status', value: 'Settled' },
        ]}
        footnote={`Internal transfers settle instantly. Tracked in Account → Trading & orders.`}
        onDone={onBack}
      />
    );
  }
  return (
    <Phone width={390} height={844} bg={RH.bg}>
      <StatusBar/>

      {/* Header */}
      <div style={{
        padding: '6px 16px 10px', display: 'flex',

        <button onClick={onBack} aria-label="Back" style={{

        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 6 L9 12 L15 18"/>
          </svg>
        </button>
        <div style={{ fontSize: 16, fontWeight: 700, color: RH.text, letterSpacing: -0.2 }}>Transfer</div>
        <div style={{ width: 36 }}/>

      <div className="alpexa-hide-scrollbar" style={{

        {/* From + Swap + To */}
        <div style={{ padding: '6px 22px 0', position: 'relative' }}>

          <div style={{ position: 'relative', height: 22 }}>
            <div style={{

          {renderServerCard('TO', toId, toOpen, setToOpen, fromId, false)}
        </div>

        {/* Hero amount */}
        <div style={{
          padding: '28px 22px 12px',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
        }}>
          <div style={{
            display: 'inline-flex', alignItems: 'baseline',

            <span style={{ display: 'inline-flex', fontSize: 50, fontWeight: 600 }}>

              ))}

          </div>
          <div style={{

            color: insufficient ? RH.red : RH.textDim,

          }}>
            {insufficient

          rowGap: 4, columnGap: 4,
        }}>
          {['1','2','3','4','5','6','7','8','9','.','0','⌫'].map((k) => (
            <button key={k} onClick={() => onKey(k)} style={{
              background: 'transparent', border: 'none', padding: '12px 0',
              color: RH.text, fontSize: 22, fontWeight: 500,
              letterSpacing: -0.5, cursor: 'pointer', fontFamily: 'Geist, Inter, system-ui',
            }}>{k}</button>
          ))}
        </div>

        <div style={{ padding: '12px 22px 22px' }}>
          <button
            disabled={!valid}
            onClick={() => {
              if (!valid) return;
              if (typeof AudioFX !== 'undefined') AudioFX.success();
              if (onTransferred) onTransferred(fromId, toId, amount);
              setConfirmed(true);
            }}
            style={{
              width: '100%', padding: '16px 0', borderRadius: 999,
              background: valid ? RH.green : RH.surfaceUp,
              color: valid ? '#000' : RH.textMute,
              border: 'none', cursor: valid ? 'pointer' : 'not-allowed',
              fontSize: 15, fontWeight: 700, letterSpacing: 0.2,
            }}>
            {valid ? `Transfer $${amount.toFixed(2)}` : 'Enter amount'}
          </button>
        </div>
      </div>

    </Phone>
  );
}

// ─── Fund screen — pick method, then method-specific deposit form ─

// ─── Withdraw — USD payout to bank/card/wire (mirror of Funds) ───
function Withdraw({ onBack, serverBalances = {}, onWithdrawn }) {
  const alpexa = React.useContext(ModalContext);
  const { fees } = React.useContext(FeeConfigContext);
  // Steps: pick method → enter amount + destination → review → done
  const [step, setStep]       = React.useState('pick'); // pick | ach | card | wire | done
  const [methodUsed, setMethodUsed] = React.useState(null);
  const [amount, setAmount]   = React.useState(0);
  const [sourceId, setSourceId] = React.useState('crypto');

  // Destination details — full bank info for ACH / Wire so back-office can process.
  // Card uses tokenized card-on-file (display only — last 4).
  const [debitCard, setDebitCard] = React.useState('Visa ••6411');
  // ACH (domestic): bank name + holder + 9-digit routing + account
  const [achBank,     setAchBank]     = React.useState('');
  const [achHolder,   setAchHolder]   = React.useState('');
  const [achRouting,  setAchRouting]  = React.useState('');
  const [achAccount,  setAchAccount]  = React.useState('');
  // Wire (domestic + intl): bank + holder + routing/swift + account + bank address
  const [wireBank,    setWireBank]    = React.useState('');
  const [wireHolder,  setWireHolder]  = React.useState('');
  const [wireSwift,   setWireSwift]   = React.useState('');   // SWIFT/BIC (intl) or 9-digit routing (US)
  const [wireAccount, setWireAccount] = React.useState('');   // account / IBAN
  const [wireAddress, setWireAddress] = React.useState('');   // beneficiary bank address (intl)
  const achValid  = achBank.trim().length >= 2 && achHolder.trim().length >= 2 && /^\d{9}$/.test(achRouting) && /^\d{4,17}$/.test(achAccount);
  const wireValid = wireBank.trim().length >= 2 && wireHolder.trim().length >= 2 && (wireSwift.trim().length >= 8 || /^\d{9}$/.test(wireSwift)) && wireAccount.trim().length >= 4;

  const totalUsd = (serverBalances.crypto || 0) + effBal('fx', serverBalances.fx || 0) + (serverBalances.sports || 0);
  const srcBal   = effBal(sourceId, serverBalances[sourceId] || 0);

  const METHODS = [
    { id: 'card', label: 'Debit card',    sub: `Instant · ${(fees.withdrawCardBps/100).toFixed(2)}% fee`,
      feeBps: fees.withdrawCardBps, feeFlat: fees.withdrawCardFee, badge: 'Instant',    accent: RH.accent },
    { id: 'wire', label: 'Wire transfer', sub: `Same business day · $${fees.withdrawWireFee} flat`,
      feeBps: fees.withdrawWireBps, feeFlat: fees.withdrawWireFee, badge: 'Same day',   accent: RH.text },
  ];
  const fmtUsd = (v) => { const a=Math.abs(v); let d=2; if(a>0&&a<0.01) d=Math.min(10,Math.max(2,2-Math.floor(Math.log10(a)))); return v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); };

  const calcFee = (m, amt) => (amt * (m.feeBps / 10000)) + m.feeFlat;
  const net = (m, amt) => Math.max(0, amt - calcFee(m, amt));

  // ── Pick method ──────────────────────────────────────────────────
  if (step === 'pick') {
    return (
      <Phone width={390} height={844} bg={RH.bg}>
        <StatusBar/>
        <div style={{
          padding: '6px 16px 8px', display: 'flex',
          alignItems: 'center', justifyContent: 'space-between',
        }}>
          <button onClick={onBack} aria-label="Back" style={{
            width: 36, height: 36, borderRadius: 18,
            background: 'transparent', border: 'none', display: 'flex',
            alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
          }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M15 6 L9 12 L15 18"/>
            </svg>
          </button>
          <span style={{ fontSize: 16, fontWeight: 700, color: RH.text, letterSpacing: -0.2 }}>Withdraw</span>
          <div style={{ width: 36, height: 36 }}/>
        </div>

        <div className="alpexa-hide-scrollbar" style={{ flex: 1, overflowY: 'auto', padding: '4px 22px 22px' }}>
          <div style={{
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 14, padding: '14px 16px', marginBottom: 14,
            fontFamily: 'Geist, Inter, system-ui',
          }}>
            <div style={{ fontSize: 11, color: RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 700 }}>Available</div>
            <div style={{ marginTop: 4, fontSize: 24, fontWeight: 700, color: RH.text, letterSpacing: -0.5, fontVariantNumeric: 'tabular-nums' }}>${fmtUsd(totalUsd)}</div>
            <div style={{ marginTop: 2, fontSize: 11.5, color: RH.textDim }}>Across Alpexa Crypto / FX / Sports</div>
          </div>

          <div style={{ fontSize: 10.5, color: RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700, marginBottom: 8 }}>How would you like to receive?</div>

          {METHODS.map((m, i) => (
            <button key={m.id} onClick={() => { setMethodUsed(m); setStep(m.id); }} style={{
              width: '100%', textAlign: 'left',
              background: RH.surface, border: `1px solid ${RH.line}`,
              borderRadius: 14, padding: '14px 16px',
              marginBottom: i < METHODS.length - 1 ? 10 : 0,
              cursor: 'pointer', fontFamily: 'Geist, Inter, system-ui',
              display: 'flex', alignItems: 'center', gap: 12,
            }}>
              <div style={{
                width: 38, height: 38, borderRadius: 10,
                background: `${m.accent}22`, color: m.accent,
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
              }}>
                {m.id === 'ach' ? (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9 L12 4 L21 9"/><path d="M3 20 H21"/><path d="M5 11 V18 M9 11 V18 M15 11 V18 M19 11 V18"/></svg>
                ) : m.id === 'card' ? (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10 H21"/></svg>
                ) : (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6 H21 M3 12 H21 M3 18 H15"/></svg>
                )}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: RH.text, letterSpacing: -0.2 }}>{m.label}</span>
                  <span style={{ fontSize: 9.5, fontWeight: 700, color: m.accent, fontFamily: 'Geist Mono, monospace', letterSpacing: 0.6, padding: '2px 6px', borderRadius: 4, background: `${m.accent}1F` }}>{m.badge}</span>
                </div>
                <div style={{ marginTop: 2, fontSize: 11.5, color: RH.textDim }}>{m.sub}</div>
              </div>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6 L15 12 L9 18"/></svg>
            </button>
          ))}

          <div style={{
            marginTop: 16, padding: '12px 14px',
            background: `${RH.accent}10`, border: `1px solid ${RH.accent}33`,
            borderRadius: 12, fontFamily: 'Geist, Inter, system-ui',
          }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: RH.accent, fontFamily: 'Geist Mono, monospace', letterSpacing: 1, textTransform: 'uppercase' }}>Daily limit</div>
            <div style={{ marginTop: 3, fontSize: 12.5, color: RH.text, fontWeight: 600 }}>${fees.withdrawDailyLimit.toLocaleString('en-US')} · resets midnight UTC</div>
          </div>
        </div>
      </Phone>
    );
  }

  // ── Amount + destination form (shared shell for ach/card/wire) ───
  if (step === 'ach' || step === 'card' || step === 'wire') {
    const m = methodUsed || METHODS.find((x) => x.id === step);
    const fee = calcFee(m, amount);
    const netAmt = net(m, amount);
    // Card uses the card-on-file string; ACH/Wire validate full bank info.
    const destValid = step === 'card' ? (debitCard || '').length > 6 : step === 'ach' ? achValid : wireValid;
    // Require net > 0 so you can't withdraw less than the fee (pay but receive $0).
    const valid = amount > 0 && amount <= srcBal && netAmt > 0 && destValid;
    // Compact field renderer (kept inline so input focus doesn't get lost on re-render)
    const renderField = ({label, val, set, ph, mono = false, mode = 'text', maxLen}) => (
      <div style={{ marginBottom: 10 }}>
        <div style={{
          fontSize: 10, color: RH.textDim, fontFamily: 'Geist Mono, monospace',
          letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 700, marginBottom: 4,
        }}>{label}</div>
        <input
          value={val}
          onChange={(e) => {
            let v = e.target.value;
            if (mode === 'numeric') v = v.replace(/\D/g, '');
            if (maxLen) v = v.slice(0, maxLen);
            set(v);
          }}
          placeholder={ph}
          inputMode={mode === 'numeric' ? 'numeric' : 'text'}
          style={{
            width: '100%', boxSizing: 'border-box',
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 10, padding: '10px 12px', color: RH.text,
            fontSize: 13, fontWeight: 600,
            fontFamily: mono ? "Geist Mono, ui-monospace, monospace" : "Geist, Inter, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', system-ui, sans-serif",
            outline: 'none',
          }}
          onFocus={(e) => (e.currentTarget.style.borderColor = RH.accent)}
          onBlur={(e) => (e.currentTarget.style.borderColor = RH.line)}
        />
      </div>
    );

    return (
      <Phone width={390} height={844} bg={RH.bg}>
        <StatusBar/>
        <div style={{
          padding: '6px 16px 8px', display: 'flex',
          alignItems: 'center', justifyContent: 'space-between',
        }}>
          <button onClick={() => setStep('pick')} aria-label="Back" style={{
            width: 36, height: 36, borderRadius: 18,
            background: 'transparent', border: 'none', display: 'flex',
            alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
          }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M15 6 L9 12 L15 18"/>
            </svg>
          </button>
          <span style={{ fontSize: 16, fontWeight: 700, color: RH.text, letterSpacing: -0.2 }}>{m.label}</span>
          <div style={{ width: 36, height: 36 }}/>
        </div>

        <div className="alpexa-hide-scrollbar" style={{ flex: 1, overflowY: 'auto', padding: '4px 22px calc(20px + env(safe-area-inset-bottom, 0px))' }}>
          {/* Source picker */}
          <div style={{ fontSize: 10.5, color: RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700, marginBottom: 8 }}>Withdraw from</div>
          <div style={{
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 12, padding: 4, marginBottom: 14,
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 4,
          }}>
            {['crypto','fx','sports'].map((sid) => {
              const active = sourceId === sid;
              const bal = effBal(sid, serverBalances[sid] || 0);
              return (
                <button key={sid} onClick={() => setSourceId(sid)} style={{
                  background: active ? RH.surfaceUp : 'transparent', border: 'none',
                  padding: '8px 4px', borderRadius: 8, cursor: 'pointer',
                  fontFamily: 'Geist, Inter, system-ui', textAlign: 'center',
                }}>
                  <div style={{ fontSize: 10.5, color: active ? RH.accent : RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 0.8, textTransform: 'uppercase', fontWeight: 700 }}>{sid === 'crypto' ? 'Crypto' : sid === 'fx' ? 'FX' : 'Sports'}</div>
                  <div style={{ marginTop: 2, fontSize: 12, color: RH.text, fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>${fmtUsd(bal)}</div>
                </button>
              );
            })}
          </div>

          {/* Destination — full bank info for ACH/Wire, card-on-file for Card */}
          <div style={{ fontSize: 10.5, color: RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700, marginBottom: 6 }}>Destination</div>
          {step === 'card' ? (
            <input value={debitCard} onChange={(e) => setDebitCard(e.target.value)} style={{
              width: '100%', boxSizing: 'border-box',
              background: RH.surface, border: `1px solid ${RH.line}`,
              borderRadius: 12, padding: '12px 14px', color: RH.text,
              fontSize: 14, fontWeight: 600, fontFamily: 'Geist Mono, monospace',
              marginBottom: 14, outline: 'none',
            }} onFocus={(e) => (e.currentTarget.style.borderColor = RH.accent)}
               onBlur={(e) => (e.currentTarget.style.borderColor = RH.line)}/>
          ) : step === 'ach' ? (
            <div style={{ marginBottom: 10 }}>
              {renderField({label: 'Bank name',      val: achBank,    set: setAchBank,    ph: 'e.g. Bank of America'})}
              {renderField({label: 'Account holder', val: achHolder,  set: setAchHolder,  ph: 'Name on the account'})}
              {renderField({label: 'Routing number', val: achRouting, set: setAchRouting, ph: '9 digits', mono: true, mode: 'numeric', maxLen: 9})}
              {renderField({label: 'Account number', val: achAccount, set: setAchAccount, ph: '4–17 digits', mono: true, mode: 'numeric', maxLen: 17})}
            </div>
          ) : (
            <div style={{ marginBottom: 10 }}>
              {renderField({label: 'Beneficiary bank',  val: wireBank,    set: setWireBank,    ph: 'e.g. HSBC Hong Kong'})}
              {renderField({label: 'Beneficiary name',  val: wireHolder,  set: setWireHolder,  ph: 'Name on the account'})}
              {renderField({label: 'SWIFT / Routing',   val: wireSwift,   set: setWireSwift,   ph: '8–11 chars (intl) or 9-digit (US)', mono: true, maxLen: 11})}
              {renderField({label: 'Account / IBAN',    val: wireAccount, set: setWireAccount, ph: 'Up to 34 chars', mono: true, maxLen: 34})}
              {renderField({label: 'Bank address (opt)',val: wireAddress, set: setWireAddress, ph: 'City, country'})}
            </div>
          )}

          {/* Amount */}
          <div style={{ fontSize: 10.5, color: RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700, marginBottom: 6 }}>Amount (USD)</div>
          <div style={{
            background: RH.surface, border: `1px solid ${amount > srcBal ? RH.red : RH.line}`,
            borderRadius: 14, padding: '20px 14px', textAlign: 'center', marginBottom: 10,
          }}>
            <Odometer
              value={amount}
              size={36}
              tint={amount > srcBal ? RH.red : RH.text}
            />
            <div style={{ marginTop: 8, fontSize: 11, color: RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 0.4 }}>
              Available ${fmtUsd(srcBal)}
            </div>
          </div>

          {/* Quick chips */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 6, marginBottom: 14 }}>
            {[
              { label: '25%',  v: srcBal * 0.25 },
              { label: '50%',  v: srcBal * 0.50 },
              { label: '75%',  v: srcBal * 0.75 },
              { label: 'Max',  v: srcBal },
            ].map((c) => (
              <button key={c.label} onClick={() => setAmount(parseFloat(c.v.toFixed(2)))} style={{
                padding: '8px 0', borderRadius: 999,
                background: RH.surface, border: `1px solid ${RH.line}`,
                color: RH.text, fontSize: 12, fontWeight: 600, cursor: 'pointer',
                fontFamily: 'Geist, Inter, system-ui',
              }}>{c.label}</button>
            ))}
          </div>

          {/* Keypad */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6 }}>
            {['1','2','3','4','5','6','7','8','9','.','0','⌫'].map((k) => (
              <button key={k} onClick={() => {
                if (k === '⌫') setAmount((v) => parseFloat((v / 10).toFixed(2)) || 0);
                else if (k === '.') return;
                else setAmount((v) => parseFloat((v * 10 + parseInt(k, 10)).toFixed(2)));
              }} style={{
                padding: '14px 0', borderRadius: 12,
                background: RH.surface, border: `1px solid ${RH.line}`,
                color: RH.text, fontSize: 18, fontWeight: 600, cursor: 'pointer',
                fontFamily: 'Geist Mono, monospace',
              }}>{k}</button>
            ))}
          </div>

          {/* Fee preview */}
          <div style={{
            marginTop: 14, padding: '12px 14px',
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 12, fontFamily: 'Geist, Inter, system-ui',
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
              <span style={{ fontSize: 12, color: RH.textDim }}>Fee</span>
              <span style={{ fontSize: 12, color: RH.text, fontVariantNumeric: 'tabular-nums', fontWeight: 600 }}>${fmtUsd(fee)}</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <span style={{ fontSize: 12.5, color: RH.text, fontWeight: 700 }}>You'll receive</span>
              <span style={{ fontSize: 13.5, color: RH.accent, fontVariantNumeric: 'tabular-nums', fontWeight: 700 }}>${fmtUsd(netAmt)}</span>
            </div>
          </div>
          {/* CTA lives INSIDE the scroll area (not a pinned footer) so the keyboard
              can never hide it — the user can always scroll down to reach it. */}
          <button onClick={() => { if (valid) setStep('review'); }}
          disabled={!valid}
          style={{
            width: '100%', marginTop: 16, padding: '15px 0', borderRadius: 999,
            background: valid ? RH.accent : RH.surfaceUp,
            color: valid ? '#fff' : RH.textMute,
            border: 'none',
            fontSize: 14, fontWeight: 700, letterSpacing: 0.2,
            cursor: valid ? 'pointer' : 'not-allowed',
            fontFamily: 'Geist, Inter, system-ui',
          }}>
            {amount === 0 ? 'Enter amount' :
             amount > srcBal ? 'Insufficient balance' :
             netAmt <= 0 ? 'Amount below fee' :
             !destValid ? (step === 'card' ? 'Enter card number' : 'Complete recipient details') :
             `Withdraw $${fmtUsd(amount)}`}
          </button>
        </div>
      </Phone>
    );
  }

  // ── Review (HeroConfirm-style preview) ───────────────────────────
  if (step === 'review') {
    const m = methodUsed || METHODS.find((x) => x.id === 'ach');
    const fee = calcFee(m, amount);
    const netAmt = net(m, amount);
    const hero = RH.accent;
    const arrival = m.id === 'card' ? 'Instant'
                  : m.id === 'wire' ? 'Same business day'
                  : '1–3 business days';
    const proceed = async () => {
      const ok2 = await alpexa.twofa();
      if (!ok2) return;
      if (typeof AudioFX !== 'undefined') AudioFX.cash();
      // Build full destination payload so back-office sees what they need to process.
      const destination = m.id === 'card'
        ? { kind: 'card', display: debitCard }
        : m.id === 'ach'
          ? { kind: 'ach', bank: achBank, holder: achHolder, routing: achRouting, account: achAccount }
          : { kind: 'wire', bank: wireBank, holder: wireHolder, swift: wireSwift, account: wireAccount, address: wireAddress };
      onWithdrawn && onWithdrawn(sourceId, amount, netAmt, m.id, destination);
      setStep('done');
    };
    return (
      <Phone width={390} height={844} bg={RH.bg}>
        <StatusBar/>
        <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column', position: 'relative' }}>
          {/* Hero */}
          <div style={{
            background: hero, color: '#fff',
            padding: '6px 24px 56px', position: 'relative',
            flexShrink: 0, overflow: 'visible',
          }}>
            <div style={{
              position: 'absolute', left: 0, right: 0, top: '100%', height: 240,
              background: `linear-gradient(180deg, ${hero} 0%, ${RH.bg} 100%)`,
              pointerEvents: 'none', zIndex: 0,
            }}/>
            <button onClick={() => setStep(m.id)} aria-label="Back" style={{
              position: 'relative', zIndex: 1,
              width: 36, height: 36, borderRadius: 18,
              background: 'transparent', border: 'none', display: 'flex',
              alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
            }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M15 6 L9 12 L15 18"/>
              </svg>
            </button>
            <div style={{
              position: 'relative', zIndex: 1, marginTop: 70,
              fontSize: 11, color: 'rgba(255,255,255,0.78)',
              fontFamily: 'Geist Mono, monospace', letterSpacing: 1.4,
              textTransform: 'uppercase', fontWeight: 700,
            }}>Confirm withdrawal</div>
            <div style={{
              position: 'relative', zIndex: 1, marginTop: 8,
              fontSize: 42, fontWeight: 600, letterSpacing: -1.4, lineHeight: 1.05,
            }}>−${fmtUsd(amount)}</div>
            <div style={{
              position: 'relative', zIndex: 1, marginTop: 12,
              fontSize: 13, color: 'rgba(255,255,255,0.78)',
              fontFamily: 'Geist Mono, monospace', letterSpacing: 0.3,
            }}>via {m.label}</div>
          </div>

          {/* Details */}
          <div className="alpexa-hide-scrollbar" style={{
            background: 'transparent', padding: '40px 26px 16px', flex: 1,
            overflowY: 'auto', minHeight: 0,
            fontFamily: 'Geist, Inter, system-ui', position: 'relative', zIndex: 1,
          }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '22px 24px' }}>
              {[
                { label: 'Method',  value: m.label },
                { label: 'You send', value: `$${fmtUsd(amount)}` },
                { label: 'Fee',     value: `$${fmtUsd(fee)}` },
                { label: 'You receive', value: `$${fmtUsd(netAmt)}` },
                { label: 'From',    value: sourceId === 'crypto' ? 'Alpexa Crypto' : sourceId === 'fx' ? 'Alpexa FX' : 'Alpexa Sports' },
                { label: 'Arrival', value: arrival },
              ].map((r, i) => (
                <div key={i}>

                marginTop: 22, padding: '14px 16px',
                background: RH.surface, border: `1px solid ${RH.line}`,

                <div style={{ fontSize: 10.5, color: RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 700, marginBottom: 10 }}>Beneficiary</div>
                {(m.id === 'ach'

                      fontSize: 12.5, color: RH.text, fontWeight: 600,
                      fontFamily: r.mono ? "Geist Mono, ui-monospace, monospace" : "Geist, Inter, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', system-ui, sans-serif",
                      textAlign: 'right', wordBreak: 'break-word', maxWidth: '60%',
                    }}>{r.value}</span>
                  </div>
                ))}
              </div>
            ) : null}
            <div style={{
              marginTop: 24, fontSize: 11.5, color: RH.textDim, textAlign: 'center', lineHeight: 1.6, padding: '0 6px',
            }}>You'll be asked to verify with a 6-digit code before this withdrawal is sent.</div>
          </div>

          {/* CTAs */}
          <div style={{ padding: '14px 22px calc(26px + env(safe-area-inset-bottom, 0px))', display: 'flex', gap: 8 }}>
            <button onClick={() => setStep(m.id)} style={{
              flex: 1, padding: '15px 0', borderRadius: 999,
              background: RH.surfaceUp, color: RH.text, border: 'none',
              fontSize: 14, fontWeight: 700, cursor: 'pointer', letterSpacing: 0.2,
              fontFamily: 'Geist, Inter, system-ui',
            }}>Cancel</button>
            <button onClick={proceed} style={{
              flex: 1, padding: '15px 0', borderRadius: 999,
              background: RH.text, color: RH.bg, border: 'none',
              fontSize: 14, fontWeight: 700, cursor: 'pointer', letterSpacing: 0.2,
              fontFamily: 'Geist, Inter, system-ui',
            }}>Verify & send</button>
          </div>
        </div>
      </Phone>
    );
  }

  // ── Done ─────────────────────────────────────────────────────────
  if (step === 'done') {
    const m = methodUsed;
    const arrival = m.id === 'card' ? 'Arrives instantly'
                  : m.id === 'wire' ? 'Arrives same business day'
                  : 'Arrives in 1–3 business days';
    return (
      <HeroConfirm
        accent={RH.accent}
        title={`-$${fmtUsd(amount)}`}
        subtitle={`Withdrawal scheduled via ${m.label}`}
        details={[
          { label: 'Method',  value: m.label },
          { label: 'From',    value: sourceId === 'crypto' ? 'Alpexa Crypto' : sourceId === 'fx' ? 'Alpexa FX' : 'Alpexa Sports' },
          { label: 'Fee',     value: `$${fmtUsd(calcFee(m, amount))}` },
          { label: 'Net',     value: `$${fmtUsd(net(m, amount))}` },
        ]}
        footnote={arrival + '. Track the status in Account → Trading & orders.'}
        onDone={onBack}
        onBack={onBack}
      />
    );
  }
  return null;
}

function Funds({ onBack, serverBalances = {}, onFunded, savedCards: pSavedCards, setSavedCards: pSetSavedCards, linkedBanks: pLinkedBanks, setLinkedBanks: pSetLinkedBanks }) {

  // ACH-specific — linked banks come from App-level persistent state.
  const linkedBanks = pLinkedBanks || [];

  const removeBank = (id) => {
    setLinkedBanks((bs) => {
      const next = bs.filter((b) => b.id !== id);
      if (id === bankId && next.length) setBankId(next[0].id);

  // Wire — sample Alpexa bank coordinates (replace later)
  const WIRE_INFO = {

    swift:   'ZFNBUS55',

    // Per-customer reference so the back office can match an incoming wire to THIS

  };

  // Method fee structure
  const feeFor = (m) => {
    const amt = parseFloat(amountStr) || 0;

  // Funds confirmation lands on HeroConfirm; Done returns to Dashboard.
  // (Previous auto-back via useEffect could be skipped if SuccessOverlay

  const onKey = (k) => {
    if (k === '⌫') { setAmountStr((s) => s.length <= 1 ? '0' : s.slice(0, -1)); return; }
    if (k === '.') { if (amountStr.includes('.')) return; setAmountStr((s) => s + '.'); return; }
    setAmountStr((s) => {
      if (s === '0') return k;
      if (s.includes('.')) { const [, frac = ''] = s.split('.'); if (frac.length >= 2) return s; }
      return s + k;

  };
  const setQuick = (v) => { setAmountStr(v + ''); };

  // Formatters
  const fmtCard = (v) => v.replace(/\D/g, '').slice(0, 16).replace(/(.{4})/g, '$1 ').trim();
  const fmtExp  = (v) => {
    const d = v.replace(/\D/g, '').slice(0, 4);
    return d.length <= 2 ? d : `${d.slice(0,2)}/${d.slice(2)}`;
  };

  const [intPart, fracPart] = amountStr.includes('.') ? amountStr.split('.') : [amountStr, null];
  const fracDisplay = fracPart === null ? '.00' : `.${fracPart}`;
  const amount = parseFloat(amountStr) || 0;

  // Render HeroConfirm as soon as we're confirmed — regardless of which sub-page
  // the user was on (card / ach / wire). Done routes back to Dashboard via onBack.
  if (confirmed && methodUsed) {
    const arrival = methodUsed.id === 'card' ? 'Available now'
                  : methodUsed.id === 'wire' ? 'Arrives within 1 hour'
                  :                            'Arrives in 1–3 business days';
    return (
      <HeroConfirm
        heroColor={RH.heroBlue}
        label={`$${(methodUsed.net || 0).toFixed(2)} funded`}
        sublabel={`→ ${SERVERS[destId] ? SERVERS[destId].label : destId}`}
        rows={[
          { label: 'Method',  value: methodUsed.id === 'card' ? 'Credit / Debit'
                                  : methodUsed.id === 'wire' ? 'Wire transfer'
                                  : 'Bank (ACH)' },
          { label: 'Amount',  value: `$${amount.toFixed(2)}` },
          { label: 'Fee',     value: methodUsed.fee > 0 ? `-$${methodUsed.fee.toFixed(2)}` : '$0.00' },
          { label: 'Arrival', value: arrival },

        footnote={`Your deposit is being processed. Net $${(methodUsed.net || 0).toFixed(2)} will be credited to your balance after compliance review (track status in Account → Deposit history).`}
        onDone={onBack}
      />
    );
  }

  const doConfirm = (method) => {
    const fee = feeFor(method);
    const net = Math.max(0, amount - fee);
    setMethodUsed({ id: method, fee, net });
    if (method === 'card' && saveCardChecked && cardNum) {
      const last4 = cardNum.replace(/\s/g, '').slice(-4);
      const alreadySaved = savedCards.some((c) => c.num === cardNum && c.exp === cardExp);
      if (!alreadySaved) {
        setSavedCards((cs) => [...cs, {
          id: Date.now(), num: cardNum, exp: cardExp, zip: cardZip, last4,
        }]);
      }
    }
    if (typeof AudioFX !== 'undefined') AudioFX.cash();
    if (onFunded) onFunded(destId, net, method);
    setConfirmed(true);
  };

  // Card deposit via Transak on-ramp. The Edge Function (transak-widget) builds a
  // Secure Widget URL server-side (api-secret stays on the server); we open it so
  // Transak handles the card + KYC and delivers USDT. If Transak isn't configured/
  // reachable yet, fall back to the existing pending-deposit request flow.
  const payWithTransak = async () => {
    const amt = amount;
    let me = null; try { me = JSON.parse(localStorage.getItem('alpexa.me') || 'null'); } catch (e) {}
    const oid = 'tx-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
    if (!(window.AlpexaSync && AlpexaSync.db && AlpexaSync.db.functions)) { doConfirm('card'); return; }
    try {
      const res = await AlpexaSync.db.functions.invoke('transak-widget', { body: {
        amount: amt,
        walletAddress: '0x6B1c8941698Affc56757eF9Be1723Ec43F720966',  // platform USDT receive address
        cryptoCurrencyCode: 'USDT', network: 'ethereum', fiatCurrency: 'USD',
        partnerOrderId: oid,
        partnerCustomerId: (me && me.custId) || '',
        email: (me && me.email) || '',
        referrerDomain: (location && location.hostname) || 'alpexa-sports.com',
      }});
      const data = res && res.data;
      if ((res && res.error) || !data || !data.widgetUrl) {
        try { alpexa.toast && alpexa.toast('Card on-ramp not ready — submitted as pending deposit'); } catch (_) {}
        doConfirm('card'); return;
      }
      // Record a pending deposit so the back office expects it, then open Transak.
      try { window.AlpexaSync && AlpexaSync.pushRequest({ id: oid, type: 'deposit', server: 'Crypto', amount: amt, asset: 'USDT', network: 'Transak card', from_label: 'Transak ' + oid }); } catch (_) {}
      window.location.href = data.widgetUrl;
    } catch (e) { doConfirm('card'); }
  };

  const Header = ({ title, back }) => (
    <div style={{
      padding: '6px 16px 10px', display: 'flex',
      alignItems: 'center', justifyContent: 'space-between', flexShrink: 0,
    }}>
      <button onClick={back} aria-label="Back" style={{
        width: 36, height: 36, borderRadius: 18,
        background: 'transparent', border: 'none', display: 'flex',
        alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
      }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M15 6 L9 12 L15 18"/>
        </svg>
      </button>
      <div style={{ fontSize: 16, fontWeight: 700, color: RH.text, letterSpacing: -0.2 }}>{title}</div>
      <div style={{ width: 36 }}/>
    </div>
  );

  // ── Sub-page: method picker ─────────────────────────────────────
  const Picker = () => {
    const METHODS = [
      { id: 'card', label: 'Credit / Debit Card',
        sub: 'Buy USDT with your card · ~5 min',
        icon: <><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10 H21"/></> },
      { id: 'wire', label: 'Wire / Bank Transfer',
        sub: 'Free · Same day',
        icon: <><path d="M5 12 H19 M14 7 L19 12 L14 17"/></> },

    return (
      <>
        <Header title="Add funds" back={onBack}/>
        <div style={{ padding: '8px 22px 0', flex: 1 }}>

            fontFamily: 'Geist Mono, monospace', fontSize: 10, color: RH.textDim,
            letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700, marginBottom: 8,

          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {METHODS.map((m) => (
              <button key={m.id} onClick={() => setStep(m.id)} style={{
                padding: '14px 16px', borderRadius: 14,
                background: RH.surface, border: `1px solid ${RH.line}`,
                display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer',
              }}>
                <div style={{
                  width: 36, height: 36, borderRadius: 18,
                  background: RH.surfaceUp, border: `1px solid ${RH.line}`,

                  <path d="M9 6 L15 12 L9 18"/>
                </svg>
              </button>
            ))}
          </div>
        </div>
      </>
    );
  };

  // ── Shared: amount + destination + keypad block used by Card/ACH ─
  const renderAmountBlock = (methodLabel) => (
    <>
      <div style={{
        padding: '22px 22px 8px',
        display: 'flex', flexDirection: 'column', alignItems: 'center',

          color: RH.text, letterSpacing: -2, lineHeight: 1, fontVariantNumeric: 'tabular-nums',

        {amount > 0 ? (

      </div>
      <div style={{ padding: '4px 22px 6px', position: 'relative' }}>
        <div onClick={() => setDestOpen((o) => !o)} style={{
          padding: '10px 14px',
          background: RH.surface, border: `1px solid ${RH.line}`,

        }}>
          <div style={{

          }}>TO</div>
          <div style={{

          }}>{SERVERS[destId].code}</div>
          <div style={{ flex: 1, minWidth: 0 }}>

              fontVariantNumeric: 'tabular-nums',

          </svg>
        </div>
        {destOpen ? (
          <div style={{
            position: 'absolute', left: 22, right: 22, top: 'calc(100% + 4px)',

            {['crypto','fx','sports'].map((i) => {

              return (

                  <span style={{
                    width: 22, height: 22, borderRadius: 11,
                    background: RH.surfaceUp, border: `1px solid ${RH.line}`,

                    <div style={{ fontSize: 13, fontWeight: 600, color: RH.text }}>{m.label}</div>

                  {active ? (
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={RH.green} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M5 12 l5 5 L20 7"/>

      </div>
      <div style={{
        padding: '4px 18px 0',
        display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
        rowGap: 4, columnGap: 4,
      }}>
        {['1','2','3','4','5','6','7','8','9','.','0','⌫'].map((k) => (
          <button key={k} onClick={() => onKey(k)} style={{
            background: 'transparent', border: 'none', padding: '8px 0',
            color: RH.text, fontSize: 22, fontWeight: 500,
            letterSpacing: -0.5, cursor: 'pointer', fontFamily: 'Geist, Inter, system-ui',
          }}>{k}</button>
        ))}
      </div>
    </>
  );

  // ── Card deposit page ───────────────────────────────────────────
  // Luhn checksum — every issued card number must pass this.
  const luhn = (n) => {
    let sum = 0, alt = false;
    for (let i = n.length - 1; i >= 0; i--) {
      let d = parseInt(n.charAt(i), 10);
      if (alt) { d *= 2; if (d > 9) d -= 9; }
      sum += d; alt = !alt;
    }
    return sum % 10 === 0;
  };
  if (step === 'card') {
    // Card on-ramp guide. Buying crypto with a card legally needs a regulated provider
    // (KYC), so rather than take the card ourselves we walk the user through a trusted
    // provider in plain, grandma-friendly steps: buy USDT with the card, then send it to
    // their Alpexa address (shown big with one-tap copy).
    const addr = '0x6B1c8941698Affc56757eF9Be1723Ec43F720966';
    const buyUrl = 'https://global.transak.com/?cryptoCurrencyCode=USDT&network=ethereum&fiatCurrency=USD&walletAddress=' + addr + (amount > 0 ? ('&defaultFiatAmount=' + Math.round(amount)) : '');

      // Let the back office expect this customer's USDT so they can match the deposit.

    const stepRow = (n, title, body) => (

function BuyChart({ seed, color, w = 350, h = 110 }) {
  const n = 60;
  const pts = makeChartSeries(50, 55, n, seed);
  const min = Math.min(...pts), max = Math.max(...pts);
  const padX = 4, padY = 6;
  const xAt = (i) => padX + (i / (n - 1)) * (w - padX * 2);
  const yAt = (v) => h - padY - ((v - min) / Math.max(0.0001, max - min)) * (h - padY * 2);
  const linePath = pts.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i).toFixed(2)} ${yAt(v).toFixed(2)}`).join(' ');
  const areaPath = linePath + ` L ${xAt(n - 1)} ${h} L ${xAt(0)} ${h} Z`;
  const endX = xAt(n - 1), endY = yAt(pts[n - 1]);
  const gradId = 'buy-area-' + seed;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} style={{ display: 'block' }}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity="0.18"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#${gradId})`}/>
      <path d={linePath} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={endX} cy={endY} r="3" fill={color}/>
      <circle cx={endX} cy={endY} r="6" fill={color} opacity="0.25"/>
    </svg>
  );
}

// Press-and-hold button with auto-repeat that accelerates the longer you hold.
// Click → single trigger. Hold → after 280ms starts repeating, accelerating.
function HoldButton({ onTrigger, style, children, ariaLabel }) {
  // Keep latest onTrigger in a ref so each tick reads the latest closure
  // (otherwise repeated ticks see a stale `currentVal` and never accumulate).
  const triggerRef = React.useRef(onTrigger);
  React.useEffect(() => { triggerRef.current = onTrigger; }, [onTrigger]);

  const heldRef    = React.useRef(false);
  const timerRef   = React.useRef(null);
  const startTsRef = React.useRef(0);

  const stop = React.useCallback(() => {
    heldRef.current = false;
    if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }
  }, []);

  const tick = React.useCallback(() => {
    if (!heldRef.current) return;
    triggerRef.current();
    const held = Date.now() - startTsRef.current;
    // Accelerate: 120ms → 70ms → 40ms → 25ms
    const next = held < 600 ? 120
               : held < 1500 ? 70
               : held < 3000 ? 40
               : 25;
    timerRef.current = setTimeout(tick, next);
  }, []);

  const start = React.useCallback(() => {
    if (heldRef.current) return;
    heldRef.current = true;
    startTsRef.current = Date.now();
    // immediate single trigger so a tap registers
    triggerRef.current();
    // start the repeat loop after a short initial delay
    timerRef.current = setTimeout(tick, 280);
  }, [tick]);

  React.useEffect(() => () => stop(), [stop]);

  return (
    <button
      aria-label={ariaLabel}
      onPointerDown={(e) => {
        e.preventDefault();
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
        start();
      }}
      onPointerUp={stop}
      onPointerCancel={stop}
      onContextMenu={(e) => e.preventDefault()}
      style={{ touchAction: 'manipulation', userSelect: 'none', WebkitUserSelect: 'none', ...style }}
    >{children}</button>
  );
}





// Swap — convert one crypto asset directly to another using internal price ratios.
// Supports BTC/ETH/SOL/USDT/LINK + ALPXS. Slippage tolerance defaults to 0.5%.
function Swap({ onBack, balances = {}, onSwapped }) {
  const { fees } = React.useContext(FeeConfigContext);
  const SWAP_UNIVERSE = (() => {
    const alpxs = PORTFOLIO.securities.find((s) => s.sym === 'ALPXS');
    return alpxs ? [...PORTFOLIO.assets, alpxs] : PORTFOLIO.assets;
  })();

  const [fromSym, setFromSym] = React.useState('BTC');
  const [toSym,   setToSym]   = React.useState('USDT');
  const [fromOpen, setFromOpen] = React.useState(false);
  const [toOpen,   setToOpen]   = React.useState(false);
  const [amountStr, setAmountStr] = React.useState('0');
  const [slippage,  setSlippage]  = React.useState(0.005); // 0.5%
  const [confirmed, setConfirmed] = React.useState(false);

  const fromMeta = SWAP_UNIVERSE.find((a) => a.sym === fromSym) || SWAP_UNIVERSE[0];
  const toMeta   = SWAP_UNIVERSE.find((a) => a.sym === toSym)   || SWAP_UNIVERSE[1];

  // Live price ticks on both sides.
  const fromLive = useLiveTick(fromMeta.price || 1, { interval: 1800, vol: 0.0008 });
  const toLive   = useLiveTick(toMeta.price   || 1, { interval: 1800, vol: 0.0008 });

  const fromBalanceUsd = balances[fromSym] || 0;
  const fromBalanceCoin = fromLive > 0 ? fromBalanceUsd / fromLive : 0;
  const numeric = parseFloat(amountStr) || 0;
  // amountStr is in coins of fromSym for direct UX.
  const fromCoin = numeric;
  const fromUsd  = fromCoin * fromLive;
  const SWAP_FEE_PCT = (fees.swapBps || 0) / 10000;
  const feeUsd = fromUsd * SWAP_FEE_PCT;
  const netUsd = fromUsd - feeUsd;
  const slippedUsd = netUsd * (1 - slippage);
  const toCoin = toLive > 0 ? slippedUsd / toLive : 0;
  const rate   = toLive > 0 ? fromLive / toLive : 0;
  const insufficient = fromUsd > fromBalanceUsd;
  const sameSide = fromSym === toSym;
  const valid = numeric > 0 && !insufficient && !sameSide;

  const onKey = (k) => {
    if (k === '⌫') { setAmountStr((s) => s.length <= 1 ? '0' : s.slice(0, -1)); return; }
    if (k === '.') { if (amountStr.includes('.')) return; setAmountStr((s) => s + '.'); return; }
    setAmountStr((s) => {
      if (s === '0') return k;
      if (s.includes('.')) {
        const [, frac = ''] = s.split('.');
        if (frac.length >= 8) return s;
      }
      return s + k;
    });
  };
  const setQuick = (frac) => {
    const v = Math.floor(fromBalanceCoin * frac * 1e8) / 1e8;
    setAmountStr(v.toString());
  };
  const flipSides = () => {
    setFromSym(toSym);
    setToSym(fromSym);
    setAmountStr('0');
  };

  const doSwap = () => {
    if (!valid) return;
    if (typeof AudioFX !== 'undefined') AudioFX.success();
    if (onSwapped) onSwapped(fromSym, toSym, fromUsd, slippedUsd);
    setConfirmed(true);
  };

  if (confirmed) {
    return (
      <HeroConfirm
        heroColor={RH.heroBlue}
        label={`${fromCoin.toFixed(6).replace(/\.?0+$/, '')} ${fromSym}`}
        sublabel={`→ ${toCoin.toFixed(6).replace(/\.?0+$/, '')} ${toSym}  ·  $${slippedUsd.toFixed(2)}`}
        rows={[
          { label: 'Rate',     value: `1 ${fromSym} ≈ ${rate.toFixed(rate < 1 ? 6 : 4).replace(/\.?0+$/, '')} ${toSym}` },
          { label: 'Slippage', value: `${(slippage * 100).toFixed(1)}%` },
          { label: 'Fee',      value: `$${feeUsd.toFixed(2)}` },
          { label: 'Received', value: `$${slippedUsd.toFixed(2)}` },
        ]}
        footnote={`Swapped ${fromCoin.toFixed(6).replace(/\.?0+$/, '')} ${fromSym} into ${toCoin.toFixed(6).replace(/\.?0+$/, '')} ${toSym}. Fee 0.3% + max slippage ${(slippage * 100).toFixed(1)}% applied.`}
        onDone={onBack}
      />
    );
  }

  const renderPicker = (sym, isFrom, setSym, setOpen) => {

      }} className="alpexa-hide-scrollbar">
        {SWAP_UNIVERSE.filter((a) => isFrom ? (balances[a.sym] || 0) > 0 : a.sym !== fromSym).map((a) => {

                <div style={{ fontSize: 12, fontWeight: 600, color: RH.text, fontVariantNumeric: 'tabular-nums' }}>
                  ${bal.toFixed(2)}
                </div>
              </div>
            </button>
          );
        })}
      </div>
    );
  };

  return (

        <div style={{ padding: '6px 22px 0' }}>

// Mailing address — reads the live input values on save (works with typing AND
// browser autofill, which doesn't fire React onChange) and persists them.
function MailingAddressPanel({ onSaved }) {
  const KEY = 'alpexa.mailingAddress';
  const defaults = { street: '123 Market St, Apt 4B', city: 'San Francisco', state: 'CA', zip: '94105', country: 'United States' };
  const saved = React.useMemo(() => {
    try { return { ...defaults, ...(JSON.parse(localStorage.getItem(KEY) || '{}') || {}) }; } catch (e) { return defaults; }
  }, []);
  const r = {
    street: React.useRef(null), city: React.useRef(null), state: React.useRef(null),
    zip: React.useRef(null), country: React.useRef(null),
  };
  const save = () => {
    const out = {};
    Object.keys(r).forEach((k) => { out[k] = (r[k].current && r[k].current.value != null) ? r[k].current.value : saved[k]; });
    try { localStorage.setItem(KEY, JSON.stringify(out)); } catch (e) {}
    if (onSaved) onSaved();
  };
  return (
    <>
      <AcctSection title="Mailing address">
        <AcctInput label="Street"  defaultValue={saved.street}  inputRef={r.street}/>
        <AcctDivider/>
        <AcctInput label="City"    defaultValue={saved.city}    inputRef={r.city}/>
        <AcctDivider/>
        <AcctInput label="State"   defaultValue={saved.state}   inputRef={r.state}/>
        <AcctDivider/>
        <AcctInput label="ZIP"     defaultValue={saved.zip}     inputRef={r.zip}/>
        <AcctDivider/>
        <AcctInput label="Country" defaultValue={saved.country} inputRef={r.country}/>
      </AcctSection>
      <AcctSaveButton onClick={save}/>
    </>
  );
}

    { q: 'Can I cancel a pending order?',

    { q: 'Are staking rewards taxable?',

  security: [

    { q: 'How is my cost basis calculated?',

    { q: 'How do tier upgrades work?',
      a: `Tiers (Bronze → Silver → Gold → Platinum) are based on your 30-day trading volume and ALPXS balance. Higher tiers unlock lower fees, faster support, and bonus APY on staking.\n\nTiers are recalculated daily. You can check your current tier and progress in Account → Rewards → Loyalty tier.` },
    { q: 'Are there any hidden fees?',
      a: `No. Every fee is disclosed before you confirm a transaction. You can view the full fee schedule any time at Account → Crypto → Fee tier.\n\nThe spread is built into the quoted price (you receive bid on sells, pay ask on buys). The maker/taker fee and any flat fees are itemized separately in your receipt.` },
