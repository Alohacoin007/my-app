<style>

  * { box-sizing: border-box; }
  .stage { min-height: var(--app-vh, 100vh); display: flex; align-items: center; justify-content: center;
    padding: 20px; background: #FFFFFF; }
  /* Wide / desktop preview: cap the phone to the REAL visible height (--app-vh is the
     JS-measured visualViewport height, so it excludes a mobile browser's toolbars —
     plain 100vh overestimates there and pushed the bottom buttons behind the bar).
     Keeps the bottom buttons visible on every screen. Mobile (<=600) is full-screen below. */
  @media (min-width: 601px) {
    .phone-shell { max-height: calc(var(--app-vh, 100svh) - 40px) !important; }
  }
  .phone-shadow { border-radius: 54px; box-shadow:
    0 50px 90px -30px rgba(0,0,0,0.28),
    0 24px 48px -24px rgba(0,0,0,0.18),
    0 0 0 1px rgba(0,0,0,0.06); }
  /* On a real phone: render at the device's own size (NO zoom) so text stays crisp
     and the footer pins to the bottom of a normal flex column — like the FX app.
     Height comes from CSS (100dvh) so Safari's address bar can't make the footer
     jump. */
  @media (max-width: 600px) {
    html, body { background: #FFFFFF !important; height: var(--app-vh, 100dvh) !important; max-height: 100svh !important; min-height: 0 !important; overflow: hidden !important; overscroll-behavior: none !important; }
    .stage { padding: 0 !important; min-height: 0 !important; height: var(--app-vh, 100dvh) !important; max-height: 100svh !important; overflow: hidden !important; background: #FFFFFF !important; display: block !important; }
    #phone.phone-shadow { box-shadow: none !important; border-radius: 0 !important; width: 100vw; height: var(--app-vh, 100dvh); max-height: 100svh; overflow: hidden; }
    .phone-shell { border-radius: 0 !important;
      width: 100% !important;
      height: 100% !important;
      transform: none !important; }
    .fake-statusbar { display: none !important; }
  }
  /* Installed app: no Safari toolbar — use full 100vh so the footer reaches the
     physical bottom, and keep a thin notch spacer up top. */
  @media (max-width: 600px) and (display-mode: standalone) {
    html, body, .stage { height: 100vh !important; }
    #phone.phone-shadow { height: 100vh !important; }
    .fake-statusbar { display: block !important; height: env(safe-area-inset-top) !important; min-height: 0 !important; padding: 0 !important; overflow: hidden !important; visibility: hidden !important; }

<script>
  /* Pin the app to the ACTUAL visible height. In-app browsers (KakaoTalk,
     Instagram, etc.) report 100dvh wrong, which left a white gap under the
     footer (footer "floated up"). window.innerHeight is reliable there, so we
     mirror it into --app-vh and the mobile CSS heights use that. */
  (function(){
    function setVH(){
      try{
        // visualViewport.height = the ACTUAL visible area in Safari (excludes the
        // top/bottom toolbars), so the footer lands on the real bottom and the
        // bottom holdings (Securities/Staked) aren't hidden behind Safari's bar.
        var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
        document.documentElement.style.setProperty('--app-vh', Math.round(h) + 'px');
      }catch(e){}
    }
    setVH();
    window.addEventListener('resize', setVH);
    window.addEventListener('orientationchange', setVH);
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize', setVH);
      window.visualViewport.addEventListener('scroll', setVH);
    }
    // Safari settles its toolbars a beat after load — re-measure shortly after.
    setTimeout(setVH, 300);
    window.addEventListener('load', setVH);
  })();
</script>

<script>
/* One-time crypto reset: open crypto-live.html?reset=1 to clear stale local crypto
   holdings/balances on THIS device, then re-login so it re-seeds clean from the server. */
(function(){try{ if(/[?&]reset=1/.test(location.search)){ ['alpexa.cryptoHoldings','alpexa.staked','alpexa.serverBalances','alpexa.balances','alpexa.me'].forEach(function(k){ localStorage.removeItem(k); }); location.replace('login.html?switch=1'); } }catch(e){}})();
/* Restore identity from the URL (#alpexa=...) so a home-screen install can inherit the account created in Safari (iOS isolates their storage) - no re-login. */
(function(){try{var m=(location.hash||"").match(/alpexa=([^&]+)/);if(m){var id=JSON.parse(decodeURIComponent(atob(m[1])));if(id&&id.accts){localStorage.setItem("alpexa.me",JSON.stringify(id));}}}catch(e){}})();
/* Login gate (real service): no anonymous guest trading. Require a logged-in identity (email or authId); guests/empty go to login. */
(function(){try{var m=JSON.parse(localStorage.getItem("alpexa.me")||"null");if(!(m&&m.accts&&(m.email||m.authId))){location.replace("login.html");}}catch(e){location.replace("login.html");}})();
/* Default to the light (white) theme. One-time migration flips existing devices
   (which auto-saved 'dark' under the old default) to light; after that the user's
   manual Dark/Light choice in Account → Appearance is respected. */
(function(){try{if(!localStorage.getItem("alpexa.themeDefaultLight")){localStorage.setItem("alpexa.theme",JSON.stringify("light"));localStorage.setItem("alpexa.themeDefaultLight","1");}}catch(e){}})();
</script>
<script src="alpexa-sync.js?v=10"></script>
<script>
/* Session guard. The identity gate above only checks alpexa.me (a local name tag).
   But reading your OWN holdings/positions needs a real Supabase auth SESSION —
   without it, RLS hides every row and the wallet looks EMPTY ("my coins vanished"),
   which is exactly what happens when the app is opened via a shared #alpexa link or
   after the session expired. So: if Supabase is reachable and there is NO session,
   send the user to log in (which establishes one). Guarded with a per-tab flag so it
   can never loop, and silent if Supabase is simply unreachable (offline degraded). */
(function(){
  try {
    if (!window.AlpexaSync || !AlpexaSync.db || !AlpexaSync.db.auth) return;
    var m = JSON.parse(localStorage.getItem("alpexa.me")||"null");
    if (!(m && m.accts)) return;                          // no identity → handled by the gate above
    if (sessionStorage.getItem("alpexa.sessChecked")) return; // already checked this tab → no loop
    AlpexaSync.db.auth.getSession().then(function(r){
      var hasSession = !!(r && r.data && r.data.session);
      if (!hasSession) {
        sessionStorage.setItem("alpexa.sessChecked","1");  // set BEFORE redirect → cannot loop
        location.replace("login.html?expired=1");
      }
    }).catch(function(){ /* Supabase unreachable → stay in local degraded mode */ });
  } catch(e) {}
})();
</script>

// Deterministic per-user deposit address generator. Each Alpexa user gets a
// unique address per network — funds sent there are auto-credited (in production
// monitored by Alpexa's deposit pipeline that sweeps into the company's master
// custody and credits the user's balance).
function genDepositAddresses(seed) {
  let h = 0;
  for (let i = 0; i < (seed || '').length; i++) h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
  const rnd = () => { h = (h * 9301 + 49297) | 0; return ((h >>> 0) % 1e9) / 1e9; };
  const hex = (n) => {
    let s = '';
    for (let i = 0; i < n; i++) s += Math.floor(rnd() * 16).toString(16);
    return s;
  };
  const b58 = (n) => {
    const A = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
    let s = '';
    for (let i = 0; i < n; i++) s += A[Math.floor(rnd() * A.length)];
    return s;
  };
  return {
    BTC:        'bc1q'  + hex(38),
    ETH:        '0x6B1c8941698Affc56757eF9Be1723Ec43F720966',
    USDT_ERC20: '0x6B1c8941698Affc56757eF9Be1723Ec43F720966',
    USDT_TRC20: 'T'     + b58(33),
    SOL:        b58(43),
  };
}

// Cache one generator's output per AppRoot mount so all readers see the same address.
let _addrCache = null;
function getDepositAddresses() {
  const REAL='0x6B1c8941698Affc56757eF9Be1723Ec43F720966';

  try {
    const saved = window.localStorage.getItem('alpexa.depositAddrs');
    if (saved) { _addrCache = JSON.parse(saved); _addrCache.ETH=REAL; _addrCache.USDT_ERC20=REAL; return _addrCache; }
  } catch (_) {}
  const seed = (() => {
    try { return window.localStorage.getItem('alpexa.userEmail') || 'demo'; }
    catch (_) { return 'demo'; }
  })();
  _addrCache = genDepositAddresses(seed);
  try { window.localStorage.setItem('alpexa.depositAddrs', JSON.stringify(_addrCache)); } catch (_) {}
  return _addrCache;
}

// quantity for the server-side qty model). Stablecoins/USDT = $1. Falls back
// to PORTFOLIO/securities, then 1 so USD == qty for unknown stables.
function cryptoPriceOf(sym){
  if(!sym) return 1;
  if(sym==='USDT'||sym==='USDC'||sym==='DAI') return 1;
  try{

  function median(a){ a.sort(function(x,y){return x-y;}); var n=a.length; return n%2 ? a[(n-1)/2] : (a[n/2-1]+a[n/2])/2; }

    var rec=map[sym]||(map[sym]={}); rec.price=median(vals); rec.srcs=vals.length;

    if(typeof WebSocket==='undefined')return;

// Seeded RNG so the same range always produces the same chart
function seedRnd(seed) {
  let s = seed;
  return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}

// Generate a believable chart: random walk anchored to start/end values
function makeChartSeries(open, close, n, seed) {
  const rnd = seedRnd(seed);
  // 1) raw walk
  const walk = [0];
  for (let i = 1; i < n; i++) walk.push(walk[i-1] + (rnd() - 0.5));
  // 2) normalize so first/last are 0/1
  const min = Math.min(...walk), max = Math.max(...walk);
  const norm = walk.map((v) => (v - min) / Math.max(0.0001, max - min));
  // 3) linear trend from open → close, with the random walk layered on top
  const out = [];
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1);
    const trend = open + (close - open) * t;
    const wobble = (norm[i] - t) * (close * 0.06);  // ±6% wobble around trend
    out.push(trend + wobble);
  }
  // force exact endpoints
  out[0] = open;
  out[n-1] = close;
  return out;
}

// ALPXS (Alpexa's own token) — fictional, so we give it a steady +2%/month
// uptrend over real time; the live tick then makes it wiggle up/down around that.
const ALPXS_EPOCH=Date.UTC(2024,0,1), ALPXS_P0=1.00;
function alpxsPrice(){ var mo=(Date.now()-ALPXS_EPOCH)/2629800000; return ALPXS_P0*Math.pow(1.02,mo); }
(function(){ try{ var p=alpxsPrice();
  if(typeof PORTFOLIO!=='undefined'&&PORTFOLIO.securities){ var s=PORTFOLIO.securities.find(function(x){return x.sym==='ALPXS';}); if(s){ s.price=p; s.mine=(s.qty||0)*p; s.chg=2.0; } }

}catch(e){} })();
// Live tick — slowly walks the value toward base with small random noise.
// Drives the dummy data feed so the balance fluctuates and the odometer animates.
// Slow sine sway around baseValue so the close visibly swings above + below
// the day's open — that flips the color from blue (up) to red (down).
function useLiveTick(baseValue, { interval = 1800, vol = 0.0006, swayPct = 0.024, jumpProb = 0, jumpSize = 0.04, reversion = 0.18 } = {}) {
  const [v, setV] = React.useState(baseValue);
  React.useEffect(() => {
    let phase = Math.random() * Math.PI * 2;
    const id = setInterval(() => {
      phase += 0.16;                                              // ~40s full cycle
      const target = baseValue + Math.sin(phase) * swayPct * baseValue;
      setV((cur) => {
        const revert = (target - cur) * reversion;                // chase the sine target
        const noise  = (Math.random() - 0.5) * 2 * vol * baseValue;
        // Occasional bigger jump (exchange token volatility)
        const jump = (jumpProb > 0 && Math.random() < jumpProb)
          ? (Math.random() < 0.5 ? -1 : 1) * jumpSize * baseValue * (0.6 + Math.random() * 0.8)
          : 0;
        return cur + revert + noise + jump;
      });
    }, interval);
    return () => clearInterval(id);
  }, [baseValue, interval, vol, swayPct, jumpProb, jumpSize, reversion]);
  return v;
}

// Tick profile lookup — exchange tokens get higher vol + occasional jumps.
function tickProfile(sym) {
  if (sym === 'ALPXS')  return { interval: 1500, vol: 0.0045, swayPct: 0.045, jumpProb: 0.04, jumpSize: 0.06, reversion: 0.12 };
  if (sym === 'USDT' || sym === 'USDC') return { interval: 2400, vol: 0.00006, swayPct: 0.001, reversion: 0.40 };
  return { interval: 1800, vol: 0.0008, swayPct: 0.024 }; // default crypto
}

// One tick that updates many assets at once — single interval, batched setState.
// Each asset gets independent noise around its own base value.
function useLiveAssetTicks(bases, { interval = 1800, vol = 0.0014 } = {}) {
  const [vals, setVals] = React.useState(() => bases.slice());
  // Signature of the holdings set/values — changes only on a trade/adopt, not on
  // ticks (ticks don't change `bases`).
  const sig = bases.map((b) => Math.round((+b || 0) * 100) / 100).join(',') + '#' + bases.length;
  const sigRef = React.useRef(sig);
  // Re-seed live values to the true bases whenever the set changes, so a newly
  // adopted coin starts at its real value (no fake +900% jump) and indices can
  // never misalign after an insert/removal.
  React.useEffect(() => {
    if (sig !== sigRef.current) { sigRef.current = sig; setVals(bases.slice()); }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [sig]);
  React.useEffect(() => {
    const id = setInterval(() => {
      // Map over BASES (not the stale prev array) so length always matches and
      // any missing entry seeds at its base.
      setVals((cur) => bases.map((base, i) => {
        const v = (cur[i] == null) ? base : cur[i];
        const revert = (base - v) * 0.04;
        const noise  = (Math.random() - 0.5) * 2 * vol * base;
        return v + revert + noise;
      }));
    }, interval);
    return () => clearInterval(id);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [interval, vol, sig]);
  return vals;
}

// Continuous rAF tween — eases displayed value toward target each frame.
// Used so the balance keeps rolling between ticks (not just at tick boundaries).
function useSmoothNumber(target, duration = 1500) {
  const [v, setV] = React.useState(target);
  React.useEffect(() => {
    let raf;
    const start = performance.now();
    const from  = v;
    const ease  = (t) => 1 - Math.pow(1 - t, 3);
    const step = (now) => {
      const t = Math.min(1, (now - start) / duration);
      setV(from + (target - from) * ease(t));
      if (t < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [target, duration]);
  return v;
}

// Each digit slot is a clipped 0-9 column that slides to its target digit
// via a single CSS transition. Simple and clean.
function OdometerDigit({ ch, fontSize, color }) {
  const isDigit = /^\d$/.test(ch);
  if (!isDigit) {
    return (
      <span style={{
        display: 'inline-block', lineHeight: `${fontSize}px`,
        color, fontVariantNumeric: 'tabular-nums',
      }}>{ch}</span>
    );
  }
  const d = parseInt(ch, 10);
  return (
    <span style={{
      display: 'inline-block', height: fontSize, overflow: 'hidden',
      verticalAlign: 'top', fontVariantNumeric: 'tabular-nums',
    }}>
      <span style={{
        display: 'block',
        transform: `translateY(${-d * fontSize}px)`,
        transition: 'transform 620ms cubic-bezier(0.22, 1, 0.36, 1)',
        color,
      }}>
        {Array.from({ length: 10 }, (_, i) => (
          <span key={i} style={{
            display: 'block', height: fontSize, lineHeight: `${fontSize}px`,
          }}>{i}</span>
        ))}
      </span>
    </span>
  );
}

// Odometer — full number with optional prefix/suffix, commas, decimals.
// centsScale<1 renders the decimal part (".XX") smaller; the flex-start row
// top-aligns it so it reads as a raised superscript.
function Odometer({ value, decimals = 2, fontSize = 38, color = RH.text, prefix = '$', suffix = '', centsScale = 1, centsColor = null }) {
  const formatted = prefix + Math.abs(value).toLocaleString('en-US', {
    minimumFractionDigits: decimals, maximumFractionDigits: decimals,
  }) + suffix;
  const dotIdx = (centsScale !== 1 || centsColor) ? formatted.indexOf('.') : -1;
  const smallFs = Math.round(fontSize * centsScale);
  return (
    <span style={{ display: 'inline-flex', alignItems: 'flex-end', lineHeight: 1 }}>
      {[...formatted].map((ch, i) => {
        const isCents = dotIdx >= 0 && i >= dotIdx;
        return <OdometerDigit key={`${i}-${ch}`} ch={ch} fontSize={isCents ? smallFs : fontSize} color={isCents && centsColor ? centsColor : color}/>;
      })}
    </span>
  );
}

// $XX,XXX.XX formatter
function fmtUsd(n, decimals = 2) {
  n = +n || 0;   // coerce undefined/null/NaN -> 0 so we never render "$NaN"
  const neg = n < 0; const v = Math.abs(n);
  let dec = decimals;
  // Tiny prices (meme coins like SHIB/PEPE/BONK) round to $0.00 at 2 decimals —
  // show enough digits to be meaningful instead.
  if (v > 0 && v < 0.01 && decimals === 2) {
    dec = Math.min(10, Math.max(2, 2 - Math.floor(Math.log10(v))));
  }
  return (neg ? '-' : '') + '$' + v.toLocaleString('en-US', {
    minimumFractionDigits: dec, maximumFractionDigits: dec,
  });
}
function fmtPct(n, decimals = 2) {
  const sign = n > 0 ? '+' : n < 0 ? '−' : '';
  return sign + Math.abs(n).toFixed(decimals) + '%';
}
// ── Crypto notifications: real events (fills, deposits, withdrawals, P2P, alerts)
//    feed a persisted list; the header bell shows the unread count. ──
function getCryptoNotifs(){ try{ return JSON.parse(localStorage.getItem('alpexa.cryptoNotifs')||'[]')||[]; }catch(e){ return []; } }
function setCryptoNotifs(arr){ try{ localStorage.setItem('alpexa.cryptoNotifs', JSON.stringify((arr||[]).slice(0,100))); }catch(e){} try{ window.dispatchEvent(new Event('alpexa-crypto-notif')); }catch(e){} }
function cryptoNotify(n){

    var item=Object.assign({ id:'n'+Date.now()+Math.random().toString(36).slice(2,6), ts:Date.now(), unread:true }, n||{});
    // de-dupe identical title within 4s (avoid double-fire from optimistic + adopt)
    if(arr[0] && arr[0].title===item.title && (item.ts-(arr[0].ts||0))<4000) return;
    arr.unshift(item);
    setCryptoNotifs(arr);
  }catch(e){}
}
function cryptoUnreadCount(){ try{ return getCryptoNotifs().filter(function(n){return n.unread;}).length; }catch(e){ return 0; } }
window.cryptoNotify = cryptoNotify;
// Parse an Alpexa pay request. A "Request amount" QR encodes the amount/asset as
// alpexa:<address>?amt=<n>&asset=<SYM> ; a plain address (or @handle / 0x…) returns
// amount 0. Used by the QR scanner + paste so the Send form pre-fills the amount.
function parseAlpexaPay(s){
  s = String(s || '').trim();
  var out = { address: s, amount: 0, asset: '' };
  try {
    var m = s.match(/^alpexa:([^?]+)(?:\?(.*))?$/i);
    if (m) {
      out.address = decodeURIComponent(m[1]);
      (m[2] || '').split('&').forEach(function (kv) {
        var p = kv.split('='); var k = (p[0] || '').toLowerCase(); var v = decodeURIComponent(p[1] || '');
        if (k === 'amt' || k === 'amount') out.amount = parseFloat(v) || 0;
        if (k === 'asset') out.asset = v;
      });
    }
  } catch (e) {}
  return out;
}

<script type="text/babel" data-presets="react">

function Chart({ series, color, baseline, scrubIdx, onScrub }) {
  const W = 390, H = 220;
  const padLeft = 16, padRight = 56, padY = 22;

  const min = Math.min(...series, baseline);
  const max = Math.max(...series, baseline);
  const range = Math.max(0.0001, max - min);
  const xAt = (i) => padLeft + (i / (series.length - 1)) * (W - padLeft - padRight);
  const yAt = (v) => H - padY - ((v - min) / range) * (H - padY * 2);

  // Line path
  const linePath = series.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i).toFixed(2)} ${yAt(v).toFixed(2)}`).join(' ');
  // Area path (line down to baseline-y at edges)
  const baselineY = yAt(baseline);
  const areaPath = linePath + ` L ${xAt(series.length - 1).toFixed(2)} ${H} L ${xAt(0).toFixed(2)} ${H} Z`;

  const ref = React.useRef(null);
  const onPointer = (e) => {
    const rect = ref.current.getBoundingClientRect();
    const px = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const ratio = Math.max(0, Math.min(1, (px - padLeft * rect.width / W) / (rect.width - (padLeft + padRight) * rect.width / W)));
    const idx = Math.round(ratio * (series.length - 1));
    onScrub(idx);
  };
  const endScrub = () => onScrub(null);

  // Endpoint coordinates (for the glow + dot)
  const endX = xAt(series.length - 1);
  const endY = yAt(series[series.length - 1]);
  const isScrubbing = scrubIdx !== null && scrubIdx !== undefined;

  return (
    <svg
      ref={ref} viewBox={`0 0 ${W} ${H}`} width="100%" height={H}
      style={{ display: 'block', touchAction: 'none', userSelect: 'none', overflow: 'visible' }}
      onMouseDown={onPointer} onMouseMove={(e) => e.buttons === 1 && onPointer(e)}
      onMouseUp={endScrub} onMouseLeave={endScrub}
      onTouchStart={onPointer} onTouchMove={onPointer} onTouchEnd={endScrub}
    >
      <defs>
        <linearGradient id="chart-area" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity="0.20"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
        {/* Radial bleed centered on the chart endpoint — softened so the top edge fades to 0 within the rect */}
        <radialGradient id="chart-bleed" gradientUnits="userSpaceOnUse"
          cx={endX} cy={endY} r={W * 0.42}>
          <stop offset="0%"   stopColor={color} stopOpacity="0.18"/>
          <stop offset="50%"  stopColor={color} stopOpacity="0.05"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </radialGradient>
      </defs>

      {/* Color bleed behind everything */}
      <rect x="0" y="0" width={W} height={H} fill="url(#chart-bleed)"/>

      {/* Area fill */}
      <path d={areaPath} fill="url(#chart-area)"/>
      {/* Dashed baseline */}
      <line x1={padLeft} y1={baselineY} x2={W - padRight} y2={baselineY}
        stroke={RH.textMute} strokeWidth="1" strokeDasharray="3 4"/>
      {/* Main line */}
      <path d={linePath} fill="none" stroke={color} strokeWidth="2.2"
        strokeLinecap="round" strokeLinejoin="round"/>

      {/* End-of-line dot with pulsing halo (when not scrubbing) */}
      {!isScrubbing ? (
        <g>
          <circle cx={endX} cy={endY} r="8" fill={color} opacity="0.18">
            <animate attributeName="r"       values="8;18;8"       dur="2.0s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.32;0;0.32"  dur="2.0s" repeatCount="indefinite"/>
          </circle>
          <circle cx={endX} cy={endY} r="5" fill={color} opacity="0.45"/>
          <circle cx={endX} cy={endY} r="3.4" fill={color}/>
        </g>
      ) : null}

      {/* Scrub overlay */}
      {isScrubbing ? (
        <g>
          <line x1={xAt(scrubIdx)} y1={padY} x2={xAt(scrubIdx)} y2={H - padY}
            stroke={RH.textDim} strokeWidth="1" strokeDasharray="2 3" opacity="0.6"/>
          <circle cx={xAt(scrubIdx)} cy={yAt(series[scrubIdx])} r="6" fill={color}/>
          <circle cx={xAt(scrubIdx)} cy={yAt(series[scrubIdx])} r="3" fill={RH.bg}/>
        </g>
      ) : null}
    </svg>
  );
}

// Mini sparkline for list rows
// Mini sparkline.
// When `stable` is true (stablecoins like USDT pegged at $1) the chart shows
// near-flat micro-wobble in dim neutral color — matches real stablecoin behavior.
function MiniSpark({ seed, sym, w = 56, h = 18, color, stable = false }) {
  if (stable) {
    const n = 24;
    const rnd = seedRnd(seed);
    // Wobble: ±1.5px around vertical midline — barely perceptible
    const pts = Array.from({ length: n }, () => (h / 2) + (rnd() - 0.5) * 3);
    const d = pts.map((y, i) => `${i === 0 ? 'M' : 'L'} ${((i / (n - 1)) * w).toFixed(2)} ${y.toFixed(2)}`).join(' ');
    return (
      <svg width={w} height={h} style={{ display: 'block' }}>
        {/* Subtle baseline dash so the eye sees "pegged" */}
        <line x1="0" y1={h/2} x2={w} y2={h/2} stroke={RH.textMute} strokeWidth="0.8" strokeDasharray="2 3" opacity="0.5"/>
        <path d={d} fill="none" stroke={RH.textDim} strokeWidth="1.2"
          strokeLinecap="round" strokeLinejoin="round" opacity="0.85"/>
      </svg>
    );
  }
  const n = 24;
  const realSpark = sym && window.__alpexaSpark && window.__alpexaSpark[sym];
  const pts = (realSpark && realSpark.length > 3)
    ? alpexaDownsample(realSpark, n)
    : makeChartSeries(50, 55, n, seed);
  const min = Math.min(...pts), max = Math.max(...pts);
  const xAt = (i) => (i / (n - 1)) * w;
  const yAt = (v) => h - ((v - min) / Math.max(0.0001, max - min)) * h;
  const d = pts.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i).toFixed(2)} ${yAt(v).toFixed(2)}`).join(' ');
  return <svg width={w} height={h} style={{ display: 'block' }}>
    <path d={d} fill="none" stroke={color} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

// Range tabs (LIVE · 1D · 1W · 1M · 3M · YTD · 1Y · ALL)
function RangeTabs({ range, setRange, color }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between',
      padding: '6px 22px 10px', fontFamily: 'Geist Mono, monospace',
    }}>
      {RANGES.map((r) => {
        const active = r === range;
        return (
          <button
            key={r}
            onClick={() => setRange(r)}
            style={{
              background: 'transparent', border: 'none', cursor: 'pointer',
              padding: '6px 4px',
              fontSize: 11, fontWeight: 700, letterSpacing: 0.4,
              color: active ? color : RH.textDim,
              borderBottom: active ? `2px solid ${color}` : '2px solid transparent',
              transition: 'color 160ms ease, border-color 160ms ease',
            }}
          >{r}</button>
        );
      })}
    </div>
  );
}
</script>

function WatchRow({ a, liveValue }) {

  const livePct = ((v - startBasis) / startBasis) * 100;

      </div>
    </div>
  );
}

// 4-tab navigation: Home / Trade / Discover / Account.
// Alerts handled via header bell + Account settings (industry convention).
// Floating server switcher — shown on every non-home tab so the user can
// change servers from any page (home already has one in its header).
// FX equity bridge: the FX app (trading.html) publishes its live equity (cash +
// floating P/L) to localStorage. We show that — not raw cash balance — for FX so the
// dropdown / Accounts / withdraw / transfer reflect money the user can actually move.
// Falls back to the raw balance if equity hasn't been published (e.g. fresh device).
function fxEquityUsd() {
  try { var v = parseFloat(localStorage.getItem('alpexa.fxEquity')); return isFinite(v) ? v : null; } catch (e) { return null; }
}
function effBal(id, raw) {
  if (id === 'fx') { var e = fxEquityUsd(); if (e != null) return e; }
  return raw;
}

function ServerSwitcher({ cryptoBal }) {
  const [open, setOpen] = React.useState(false);
  const [, bump] = React.useState(0);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h); document.addEventListener('touchstart', h);
    return () => { document.removeEventListener('mousedown', h); document.removeEventListener('touchstart', h); };
  }, [open]);
  // Re-render in real time as the live crypto wallet total ticks.
  React.useEffect(() => {
    const h = () => bump((x) => x + 1);
    window.addEventListener('alpexa-crypto-live', h);
    return () => window.removeEventListener('alpexa-crypto-live', h);
  }, []);
  let SB = { crypto: 0, fx: 0, sports: 0 };
  try { SB = Object.assign(SB, JSON.parse(localStorage.getItem('alpexa.serverBalances') || '{}')); } catch (e) {}
  // Prefer the live wallet total (matches the home hero, updates every tick); fall
  // back to the value passed in, then the persisted balance.
  // Single shared live value so the dropdown and the Accounts row always MATCH (the
  // drift is applied in ONE place — whoever owns the ticker — not independently here).
  if (typeof window.__cryptoLiveUsd === 'number') SB.crypto = window.__cryptoLiveUsd;
  else if (typeof cryptoBal === 'number') SB.crypto = cryptoBal;
  const money = (n) => '$' + (Number(n) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const servers = [
    { id: 'crypto', label: 'Alpexa Crypto', desc: 'Crypto · securities', code: 'CR', bal: SB.crypto },
    { id: 'fx',     label: 'Alpexa FX',   desc: 'FX · Stocks · Indices', code: 'FX', bal: effBal('fx', SB.fx) },
    { id: 'sports', label: 'Alpexa Sports', desc: 'Sports markets',      code: 'SP', bal: SB.sports },
  ];
  const go = (id) => { if (id === 'fx') { window.location.href = 'trading.html'; return; } if (id === 'sports') { window.location.href = 'sports-live.html'; return; } setOpen(false); };
  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <button aria-label="Switch server" onClick={() => setOpen((o) => !o)} style={{
        width: 38, height: 38, borderRadius: 19, background: open ? RH.surfaceUp : RH.surface,

        cursor: 'pointer', padding: 0 }}>

          <rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/>
          <circle cx="7" cy="7" r="0.6" fill={RH.text}/><circle cx="7" cy="17" r="0.6" fill={RH.text}/></svg>
      </button>
      {open ? (
        <div style={{ position: 'absolute', top: 40, right: 0, zIndex: 9001, width: 290, maxWidth: '92vw', background: RH.surface,
          border: `1px solid ${RH.line}`, borderRadius: 12, boxShadow: '0 16px 40px -12px rgba(0,0,0,0.6)', padding: 4,
          fontFamily: 'Geist, Inter, system-ui' }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: RH.textMute, letterSpacing: 1.4, textTransform: 'uppercase', padding: '8px 12px 6px' }}>Switch server</div>
          {servers.map((s) => { const active = s.id === 'crypto'; return (
            <button key={s.id} onClick={() => go(s.id)} style={{ width: '100%', textAlign: 'left',
              background: active ? RH.surfaceUp : 'transparent', border: 'none', padding: '10px 12px', borderRadius: 8,
              cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 28, height: 28, borderRadius: 8, background: RH.surfaceUp, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 800, color: RH.text }}>{s.code}</div>
              <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontSize: 13, fontWeight: 600, color: RH.text, whiteSpace: 'nowrap' }}>{s.label}</div><div style={{ fontSize: 11, color: RH.textMute, whiteSpace: 'nowrap' }}>{s.desc}</div></div>
              <div style={{ textAlign: 'right', flexShrink: 0 }}>
                <div className="mono" style={{ fontSize: 12, fontWeight: 700, color: RH.text, whiteSpace: 'nowrap' }}>{money(s.bal)}</div>

    document.addEventListener('touchstart', onDown);

      document.removeEventListener('mousedown', onDown);
      document.removeEventListener('touchstart', onDown);
    };
  }, [serverMenuOpen]);

  // Hero balance — sum of every crypto balance + active stakes + held securities.
  const heroBase = React.useMemo(() => {
    let total = 0;
    // Dashboard hero = Crypto wallet only (balances + staked).
    // FX / Sports pools are displayed separately in Account → Accounts.
    Object.entries(balances).forEach(([, v]) => { total += (v || 0); });
    Object.values(staked).forEach((s) => { if (s && s.usd) total += s.usd; });
    return total;
  }, [balances, staked, securityRedeemed]);
  const liveClose = useLiveTick(heroBase || 1, { interval: 1800, vol: 0.0006 });
  // Cash (USDT / stablecoins) is 1:1 and has NO daily change. Exclude it from the
  // simulated "open" so the home %/change reflects only the volatile coins — a
  // cash-only wallet correctly shows 0% (was showing a fake +/- before).
  const stableBase = React.useMemo(() => {
    let s = 0;
    Object.entries(balances).forEach(([sym, v]) => {
      const meta = (typeof PORTFOLIO !== 'undefined') && PORTFOLIO.assets.find((a) => a.sym === sym);
      const mkt  = (typeof MARKET !== 'undefined') && MARKET.find((x) => x.sym === sym);
      if (sym === 'USDT' || (meta && meta.stable) || (mkt && mkt.stable)) s += (v || 0);
    });
    return s;
  }, [balances]);
  const open      = stableBase + (heroBase - stableBase) * RANGE_OPEN_MULT[range];
  // Crypto rows show only the AVAILABLE balance (after Send / Stake deductions).
  const liveAssets = React.useMemo(() => {
    // Union: PORTFOLIO.assets ∪ any other balances the user has bought.
    // Securities (ALPXS, ALPX-RE1, ALPX-CR2) belong to the Securities section,
    // not Crypto — exclude them here.
    const SECURITY_SYMS = new Set(PORTFOLIO.securities.map((s) => s.sym));
    const byPortfolio = PORTFOLIO.assets.map((a) => {
      const mine = balances[a.sym] != null ? balances[a.sym] : 0;
      // Stablecoins are exactly 1:1, so qty == USD value. Others: value / price.
      const qty = a.stable ? mine : (a.price > 0 ? mine / a.price : a.qty);
      return { ...a, mine, qty };
    });
    const known = new Set(PORTFOLIO.assets.map((a) => a.sym));
    const extras = Object.keys(balances)
      .filter((sym) => !known.has(sym) && !SECURITY_SYMS.has(sym) && balances[sym] > 0)
      .map((sym) => {
        // Look up market data so the chart/spark/price/chg work for the new row.
        const m = (typeof MARKET !== 'undefined' && MARKET.find((x) => x.sym === sym)) || {};
        return {
          sym,
          name: (typeof COIN_NAMES !== 'undefined' && COIN_NAMES[sym]) || m.name || sym,
          price: m.price || 1,
          mine: balances[sym],
          qty: m.price ? balances[sym] / m.price : 0,
          seed: m.seed || (sym.charCodeAt(0) * 17 + sym.length * 31),
          chg: m.chg || 0,
          stable: !!m.stable,
        };
      });
    return [...byPortfolio, ...extras].filter((a) => a.mine > 0.01);
  }, [balances]);
  const cryptoBases     = React.useMemo(() => liveAssets.map((a) => a.mine), [liveAssets]);
  // Securities = full holding from balances minus any redeemed amount.
  // NOTE: Stake is funded from USDT (not from the asset's balance), so we do
  // NOT subtract `staked[sym].usd` here — staked positions live in their own
  // Staked section. balances[sym] alone is the source of truth for the row.
  const liveSecurities = React.useMemo(() => PORTFOLIO.securities
    .map((s) => {
      const liveBase = balances[s.sym] != null ? balances[s.sym] : 0;
      const redeemed = securityRedeemed[s.sym] || 0;
      const availUsd = Math.max(0, liveBase - redeemed);
      const availQty = (s.price > 0) ? availUsd / s.price : s.qty;
      return { ...s, mine: availUsd, qty: availQty };
    })
    .filter((s) => s.mine > 0.01)
  , [balances, securityRedeemed]);
  const securityBases   = React.useMemo(() => liveSecurities.map((s) => s.mine), [liveSecurities]);
  const watchBases      = React.useMemo(() => WATCHLIST.map((a) => a.price), []);
  const cryptoLive      = useLiveAssetTicks(cryptoBases,   { interval: 1800, vol: 0.0014 });
  const securityLive    = useLiveAssetTicks(securityBases, { interval: 1800, vol: 0.0004 });
  const watchLive       = useLiveAssetTicks(watchBases,    { interval: 1800, vol: 0.0022 });
  // Hero total = sum of the SAME live values shown in the rows (stablecoins flat,
  // staked at principal), so the big number moves with the rows and always matches.
  const heroLive = (() => {
    let t = 0;
    liveAssets.forEach((a, i) => { t += a.stable ? a.mine : (cryptoLive[i] != null ? cryptoLive[i] : a.mine); });
    liveSecurities.forEach((s, i) => { t += (securityLive[i] != null ? securityLive[i] : s.mine); });
    Object.values(staked).forEach((info) => { if (info && info.usd > 0) t += info.usd; });
    return t;
  })();
  // ANCHOR total: the same sum but from the stable adopted values (a.mine), WITHOUT the
  // per-tick price simulation. heroLive (above) is for the live on-screen hero only;
  // anything PERSISTED or written to the SERVER must use this stable anchor, or the
  // simulated noise would wobble the server balance every 3s (and disagree with the
  // real holdings the other apps read).
  const anchorTotal = (() => {
    let t = 0;
    liveAssets.forEach((a) => { t += +a.mine || 0; });
    liveSecurities.forEach((s) => { t += +s.mine || 0; });
    Object.values(staked).forEach((info) => { if (info && info.usd > 0) t += info.usd; });
    return t;
  })();
  // Publish the live wallet total so the server switcher shows a real-time value here,
  // while persisting/writing the STABLE anchor (no simulated drift).
  React.useEffect(() => {
    window.__cryptoLiveUsd = heroLive;
    try {
      const sb = JSON.parse(localStorage.getItem('alpexa.serverBalances') || '{}') || {};
      if (Math.abs((sb.crypto || 0) - anchorTotal) > 0.005) {
        sb.crypto = anchorTotal;
        localStorage.setItem('alpexa.serverBalances', JSON.stringify(sb));
      }
    } catch (e) {}
    window.dispatchEvent(new Event('alpexa-crypto-live'));
    // Push the STABLE wallet total to the server (throttled) so the back-office
    // Players list shows a steady crypto balance, not a simulated wobble.
    try {
      if (window.AlpexaSync && AlpexaSync.db) {
        const meId = JSON.parse(localStorage.getItem('alpexa.me') || 'null');
        const acct = meId && meId.accts && meId.accts.crypto;
        const now = Date.now();
        window.__balPush = window.__balPush || {};
        if (acct && now - (window.__balPush.crypto || 0) > 3000 && Math.abs((window.__balPush.cryptoVal||0) - anchorTotal) > 0.01) {
          window.__balPush.crypto = now; window.__balPush.cryptoVal = anchorTotal;
          AlpexaSync.db.from('accounts').update({ balance: Math.round(anchorTotal * 100) / 100 }).eq('acct_no', acct).then(function(){}, function(){});
        }
      }
    } catch (e) {}
  }, [heroLive, anchorTotal]);

  // Per-range seeded series. Last point uses live close so the chart's tip
  // moves with the tick.
  const series = React.useMemo(() => {
    const m = RANGE_META[range];
    const real = (typeof alpexaPortfolioSeries === 'function')
      ? alpexaPortfolioSeries(range, m.points, liveClose) : null;
    if (real && real.length > 3) return real;
    const seedByRange = { '1D': 7771, '1W': 442, '1M': 9118, '3M': 3344, 'YTD': 5099, '1Y': 1822, 'ALL': 2233 };
    return makeChartSeries(open, liveClose, m.points, seedByRange[range]);
  }, [range, open, liveClose]);

  const baseline      = open;
  // Hero number = live total (moves with the market), matching the live rows.
  const scrubValue    = scrubIdx !== null ? series[scrubIdx] : heroLive;
  const change        = scrubValue - baseline;

  const color         = isUp ? RH.green : RH.red;
  const sym           = isUp ? '▲' : '▼';

  // Footer label under change
  const footerLabel = scrubIdx !== null
    ? scrubLabel(range, scrubIdx, series.length)
    : RANGE_META[range].label;

  return (

                <circle cx="7" cy="7" r="0.6" fill={RH.text}/>
                <circle cx="7" cy="17" r="0.6" fill={RH.text}/>
              </svg>
            </button>

            {serverMenuOpen ? (
              <div style={{
                position: 'absolute', top: 46, right: 0, zIndex: 50,
                width: 296,
                background: RH.surface,
                border: `1px solid ${RH.line}`,
                borderRadius: 12,
                boxShadow: '0 16px 40px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.4)',

                {[
                  { id: 'crypto', label: 'Alpexa Crypto', desc: 'Crypto · securities', balance: serverBalances.crypto != null ? serverBalances.crypto : PORTFOLIO.buyingPower, code: 'CR' },

                          </span>
                        </div>

          <Odometer value={scrubValue} fontSize={38} color={RH.text} centsColor={RH.textMute}/>
        </div>

            <span>)</span>

      {/* Scroll body — chart + holdings scroll under the pinned balance card */}
      <div style={{

        scrollbarWidth: 'none', overscrollBehavior: 'none', WebkitOverflowScrolling: 'touch',
      }}>
        {/* Chart */}
        <div style={{ marginTop: 4 }}>
          <Chart
            series={series}
            color={color}
            baseline={baseline}
            scrubIdx={scrubIdx}

        </div>

        {/* Range tabs */}
        <RangeTabs range={range} setRange={setRange} color={color}/>


        {/* Quick actions */}
        <ActionRow onAction={onAction}/>

        {/* Open Orders — Limit / Stop orders waiting for trigger */}
        {pendingOrders.length > 0 ? (
          <>
            <SectionHeader
              title={<span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={RH.accent} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="9"/>

              const name = (typeof COIN_NAMES !== 'undefined' && COIN_NAMES[o.sym]) || meta.name || o.sym;
              return (

                  <div style={{ minWidth: 0 }}>

                      <span style={{

                    </div>

                  <div style={{

                  <button

                    }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={RH.red} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M6 6 L18 18 M18 6 L6 18"/>
                    </svg>
                  </button>
                </div>
              );
            })}
          </>
        ) : null}

        {/* Crypto */}
        <SectionHeader title="Crypto" count={`${liveAssets.length} holdings`} live/>
        {liveAssets.map((a, i) => (
          <AssetRow key={a.sym} a={a} kind="crypto" liveValue={cryptoLive[i]} pulse={pulseAsset === a.sym} onTap={() => onTapAsset && onTapAsset('crypto', a.sym)}/>
        ))}


        {/* Securities */}
        <SectionHeader title="Securities" count={`${liveSecurities.length} holdings`} live/>
        {liveSecurities.map((s, i) => (
          <AssetRow key={s.sym} a={s} kind="security" liveValue={securityLive[i]} onTap={() => onTapAsset && onTapAsset('security', s.sym)}/>
        ))}

        {/* Staked — only assets currently locked up. Lock icon + period chip per row. */}
        {Object.keys(staked).filter((k) => (staked[k] && staked[k].usd) > 0).length > 0 ? (
          <>
            <SectionHeader
              title={<span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={RH.red} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="5" y="11" width="14" height="10" rx="2"/>
                  <path d="M8 11 V7 a4 4 0 0 1 8 0 V11"/>
                </svg>
                Staked
              </span>}
              count={`${Object.keys(staked).filter((k) => (staked[k] && staked[k].usd) > 0).length} positions`}
            />
            {Object.entries(staked).filter(([, v]) => v && v.usd > 0).map(([sym, info]) => {
              const usd    = info.usd;
              const period = info.period || 'flexible';
              const meta   = (PORTFOLIO.securities.find((x) => x.sym === sym))
                          || (PORTFOLIO.assets.find((x) => x.sym === sym))
                          || { sym, seed: 100, chg: 0 };
              const stakeMeta = (typeof STAKE_ASSETS !== 'undefined') ? STAKE_ASSETS[sym] : null;
              const apy = stakePeriodApy(sym, period);
              const name = meta.name || (stakeMeta && stakeMeta.name) || sym;
              return (
                <AssetRow
                  key={'staked-' + sym}
                  a={{ ...meta, sym, name, mine: usd, qty: usd / (meta.price || 1), apy, isStakedRow: true, lockPeriod: period }}
                  kind="security"
                  liveValue={usd}
                  pulse={pulseAsset === sym}
                  onTap={() => onTapAsset && onTapAsset('staked', sym)}
                />
              );
            })}
          </>
        ) : null}

        <div style={{ height: 28 }}/>
      </div>


    {tabBar}
    {alertsOpen ? <NotificationsSheet onClose={() => setAlertsOpen(false)}/> : null}
    </Phone>
  );
}

// Time-of-day greeting
function getGreeting() {
  const h = new Date().getHours();
  if (h < 5)  return 'Good night';
  if (h < 12) return 'Good morning';
  if (h < 18) return 'Good afternoon';
  return 'Good evening';
}

// Friendly label like "9:32 AM" / "Mar 12" / "May 2024" based on range + index
function scrubLabel(range, idx, n) {
  const t = idx / (n - 1);
  switch (range) {
    case '1D': {
      // Trading day 9:30 AM → 4:00 PM
      const startMin = 9 * 60 + 30;
      const endMin   = 16 * 60;
      const m = startMin + Math.round(t * (endMin - startMin));
      const hh = Math.floor(m / 60);
      const mm = m % 60;
      const period = hh >= 12 ? 'PM' : 'AM';
      const h12 = ((hh + 11) % 12) + 1;
      return `${h12}:${String(mm).padStart(2,'0')} ${period}`;
    }
    case '1W': {
      const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      return days[Math.min(6, Math.floor(t * 7))];
    }
    case '1M':  return `${Math.max(1, Math.round(t * 30))}d ago`;
    case '3M':  return `${Math.max(1, Math.round(t * 90))}d ago`;
    case 'YTD': {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[Math.min(11, Math.floor(t * 12))] + ' 2026';
    }
    case '1Y': {
      const months = ['Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May'];
      return months[Math.min(11, Math.floor(t * 12))];
    }
    case 'ALL': {
      const yrs = ['2021','2022','2023','2024','2025','2026'];
      return yrs[Math.min(5, Math.floor(t * 6))];
    }
  }
  return '';
}

// ─── Send screen ───────────────────────────────────────────────────
// Darken a hex colour by a factor (0..1).
function _hx(c) { return c.replace('#','').match(/.{2}/g).map((h) => parseInt(h, 16)); }
function _toHex(n) { return Math.round(Math.max(0, Math.min(255, n))).toString(16).padStart(2,'0'); }
function darken(hex, f) {
  const [r,g,b] = _hx(hex);
  return '#' + _toHex(r*(1-f)) + _toHex(g*(1-f)) + _toHex(b*(1-f));
}

// QR scanner — opens camera, runs jsQR on frames. Gracefully falls back to
// a demo address when the camera isn't available (e.g. file:// or denied).
function QrScanner({ onResult, onClose }) {
  const videoRef  = React.useRef(null);
  const canvasRef = React.useRef(null);
  const [status, setStatus] = React.useState('Requesting camera…');
  const [needsFallback, setNeedsFallback] = React.useState(false);

  React.useEffect(() => {
    let stream;
    let raf;
    let stopped = false;

    const stopAll = () => {
      stopped = true;
      if (raf) cancelAnimationFrame(raf);
      if (stream) stream.getTracks().forEach((t) => t.stop());
    };

    const tick = () => {
      if (stopped) return;
      const v = videoRef.current;
      const c = canvasRef.current;
      if (v && c && v.videoWidth) {
        c.width  = v.videoWidth;
        c.height = v.videoHeight;
        const ctx = c.getContext('2d');
        ctx.drawImage(v, 0, 0, c.width, c.height);
        const img = ctx.getImageData(0, 0, c.width, c.height);
        const code = window.jsQR && window.jsQR(img.data, c.width, c.height, { inversionAttempts: 'attemptBoth' });
        if (code && code.data) {
          stopAll();
          onResult(code.data.trim());
          onClose();
          return;
        }
      }
      raf = requestAnimationFrame(tick);
    };

    (async () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('Camera not supported');
        setNeedsFallback(true);
        return;
      }
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }, audio: false,
        });
        if (stopped) { stream.getTracks().forEach((t) => t.stop()); return; }
        const v = videoRef.current;
        v.srcObject = stream;
        v.setAttribute('playsinline', 'true');
        await v.play();
        setStatus('Point camera at a QR code');
        tick();
      } catch (e) {
        setStatus('Camera unavailable · ' + (e.name || 'error'));
        setNeedsFallback(true);
      }
    })();

    return () => stopAll();
  }, []);

  const useDemoAddress = () => {
    onResult('bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh');
    onClose();
  };

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 200,
      background: '#000',
      display: 'flex', flexDirection: 'column',
    }}>
      {/* Header */}
      <div style={{
        padding: '14px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        background: 'rgba(0,0,0,0.6)',
      }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: '#fff', letterSpacing: 0.2 }}>Scan QR code</div>
        <button onClick={onClose} aria-label="Close" style={{
          width: 32, height: 32, borderRadius: 16,
          background: 'rgba(255,255,255,0.12)', border: 'none',
          display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.4" strokeLinecap="round">
            <path d="M6 6 L18 18 M18 6 L6 18"/>
          </svg>
        </button>
      </div>

      {/* Video / viewport */}
      <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
        <video
          ref={videoRef}
          muted
          playsInline
          style={{ width: '100%', height: '100%', objectFit: 'cover', background: '#000' }}
        />
        <canvas ref={canvasRef} style={{ display: 'none' }}/>

        {/* Dim overlay with a cut-out viewfinder square */}
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{
          position: 'absolute', inset: 0, width: '100%', height: '100%',
          pointerEvents: 'none',
        }}>
          <defs>
            <mask id="qr-mask">
              <rect x="0" y="0" width="100" height="100" fill="#fff"/>
              <rect x="20" y="22" width="60" height="60" rx="3" fill="#000"/>
            </mask>
          </defs>
          <rect x="0" y="0" width="100" height="100" fill="rgba(0,0,0,0.55)" mask="url(#qr-mask)"/>
        </svg>

        {/* Corner brackets */}
        <div style={{
          position: 'absolute', left: '20%', right: '20%', top: '22%', bottom: '22%',
          pointerEvents: 'none',
        }}>
          {[['tl','top','left'],['tr','top','right'],['bl','bottom','left'],['br','bottom','right']].map(([id, v, h]) => (
            <div key={id} style={{
              position: 'absolute', width: 26, height: 26,
              [v]: -2, [h]: -2,
              borderTop:    v === 'top'    ? `3px solid ${RH.green}` : 'none',
              borderBottom: v === 'bottom' ? `3px solid ${RH.green}` : 'none',
              borderLeft:   h === 'left'   ? `3px solid ${RH.green}` : 'none',
              borderRight:  h === 'right'  ? `3px solid ${RH.green}` : 'none',
              borderRadius: 4,
            }}/>
          ))}
        </div>
      </div>

      {/* Status / fallback */}
      <div style={{
        padding: '16px 22px 22px', background: 'rgba(0,0,0,0.7)',
        textAlign: 'center',
      }}>
        <div style={{
          fontSize: 12.5, color: RH.textDim, fontFamily: 'Geist Mono, monospace',
          letterSpacing: 0.4, marginBottom: needsFallback ? 12 : 0,
        }}>{status}</div>
        {needsFallback ? (
          <button onClick={useDemoAddress} style={{
            background: RH.green, color: '#000',
            border: 'none', borderRadius: 999,
            padding: '10px 18px',
            fontSize: 12.5, fontWeight: 700, cursor: 'pointer',
          }}>Use demo address</button>
        ) : null}
      </div>
    </div>
  );
}

function Row({ label, value, strong }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    }}>
      <span style={{ fontSize: 12.5, color: RH.textDim, fontWeight: 500 }}>{label}</span>
      <span style={{
        fontSize: strong ? 14 : 12.5, fontWeight: strong ? 700 : 600,
        color: RH.text, fontVariantNumeric: 'tabular-nums',
      }}>{value}</span>
    </div>
  );
}

function Send({ onBack, balances = {}, onSent }) {
  const { fees } = React.useContext(FeeConfigContext);
  // Send flow has two phases:
  //   'intro' — scan-first hero with QR card + Enter Manually CTA (new)
  //   'form'  — original recipient picker + amount + memo + Review
  const [step, setStep] = React.useState('intro');
  const [introMode, setIntroMode] = React.useState('qr'); // qr | scan toggle
  const [recipient, setRecipient] = React.useState({ id: 'none', name: 'Enter recipient', handle: 'wallet address, @user, or email', initials: '+', color: '#9AA0AB', type: 'none' });
  const [recipientOpen, setRecipientOpen] = React.useState(true);  // open by default so the custom address input is visible
  const [assetId, setAssetId] = React.useState('USDT');
  const [assetOpen, setAssetOpen] = React.useState(false);
  const [amountStr, setAmountStr] = React.useState('0');
  const [addrInput, setAddrInput] = React.useState('');
  const [qrOpen, setQrOpen]       = React.useState(false);
  const [reviewOpen, setReviewOpen] = React.useState(false);
  const [sendState,  setSendState]  = React.useState('idle'); // 'idle' | 'sending' | 'sent'

  // Detect the recipient type and build a recipient object accordingly.
  // 1) @handle → internal user
  // 2) email   → internal-or-invited user
  // 3) other   → external wallet address
  const detectRecipient = (v) => {
    if (/^(CR|SP|FX|P)-?\d{3,}$/i.test((v || '').trim())) {
      const acct = v.trim().toUpperCase();
      return { id: 'alx-' + acct, name: 'Alpexa account', handle: acct, initials: 'AX', color: '#1565C0', type: 'alpexa', account: acct };
    }
    if (v.startsWith('@') && v.length >= 3) {
      return {
        id: 'h-' + v,
        name: v,
        handle: 'Alpexa user',
        initials: v.slice(1, 3).toUpperCase(),
        color: '#627EEA',                          // blue
        type: 'handle',
      };
    }
    if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
      return {
        id: 'em-' + v,
        name: v,
        handle: 'Email',
        initials: v.slice(0, 2).toUpperCase(),
        color: '#D4537E',                          // pink
        type: 'email',
      };
    }
    if (v.length >= 6) {
      return {
        id: 'ext-' + v,
        name: 'External wallet',
        handle: `${v.slice(0, 6)}…${v.slice(-4)}`,
        initials: '↗',
        color: '#7A7A7A',                          // neutral gray
        type: 'wallet',
        external: true,
        address: v,
      };
    }
    return null;
  };
  const confirmAddress = () => {
    const p = parseAlpexaPay(addrInput.trim());   // handles a pasted request URI (with amount)
    if (p.amount > 0) setAmountStr(String(p.amount));
    const r = detectRecipient(p.address);
    if (!r) return;
    setRecipient(r);
    setAddrInput('');
    setRecipientOpen(false);
  };
  // Open the live QR scanner. The scanner calls onResult with whatever was decoded.
  const onScanQR = () => setQrOpen(true);
  const onQrResult = (raw) => {
    const p = parseAlpexaPay(raw);          // pull amount/asset out of a request QR
    setAddrInput(p.address);
    if (p.amount > 0) setAmountStr(String(p.amount));   // pre-fill the requested amount
    // If the decoded text is a complete recipient, auto-confirm and go to amount entry.
    const r = detectRecipient(p.address);
    if (r) {
      setRecipient(r);
      setAddrInput('');
      setRecipientOpen(false);
      setQrOpen(false);
      setStep('form');
    }
  };
  // Detected type for the live hint under the input
  const pending = addrInput.trim() ? detectRecipient(parseAlpexaPay(addrInput.trim()).address) : null;
  const [memo, setMemo] = React.useState('');

  const asset = SEND_ASSETS[assetId];
  const amount = parseFloat(amountStr) || 0;
  // Real spendable balance (cryptoHoldings), not the hardcoded demo value.
  const availableUsd = (balances && balances[assetId] != null) ? balances[assetId]
    : (assetId === 'USDT' ? asset.balance : asset.balanceUsd);
  const insufficient = amount > availableUsd;
  const valid = amount > 0 && !insufficient && recipient && recipient.type !== 'none';

  const onKey = (k) => {
    if (k === '⌫') { setAmountStr((s) => s.length <= 1 ? '0' : s.slice(0, -1)); return; }
    if (k === '.') { if (amountStr.includes('.')) return; setAmountStr((s) => s + '.'); return; }
    setAmountStr((s) => {
      if (s === '0') return k;
      if (s.includes('.')) {
        const [, frac = ''] = s.split('.');
        if (frac.length >= 2) return s;
      }
      return s + k;
    });
  };

  const [intPart, fracPart] = amountStr.includes('.') ? amountStr.split('.') : [amountStr, null];
  const fracDisplay = fracPart === null ? '' : `.${fracPart}`;

  // Intro screen — scan-first wallet hero (new design).
  if (step === 'intro') {
    return (
      <Phone width={390} height={844} bg={RH.bg}>
        <StatusBar/>
        {qrOpen ? <QrScanner onResult={(raw) => { const p = parseAlpexaPay(raw); setAddrInput(p.address); if (p.amount > 0) setAmountStr(String(p.amount)); setStep('form'); setQrOpen(false); setIntroMode('qr'); }} onClose={() => { setQrOpen(false); setIntroMode('qr'); }}/> : null}

        {/* Top bar — ✕ close on the right */}
        <div style={{
          padding: '6px 18px 0', display: 'flex',
          alignItems: 'center', justifyContent: 'flex-end',
        }}>
          <button onClick={onBack} aria-label="Close" style={{
            width: 36, height: 36, borderRadius: 18,
            background: 'transparent', border: 'none', display: 'flex',
            alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
          }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M6 6 L18 18 M18 6 L6 18"/>
            </svg>
          </button>
        </div>

        {/* Scrollable body so the QR + Pay ID + CTA clear iOS Safari's bottom bar. */}
        <div className="alpexa-hide-scrollbar" style={{ flex: 1, overflowY: 'auto', WebkitOverflowScrolling: 'touch', minHeight: 0 }}>
        {/* Mode toggle pill */}
        <div style={{ padding: '14px 0 0', display: 'flex', justifyContent: 'center' }}>
          <div style={{
            display: 'flex', gap: 4, padding: 4,
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 999,
          }}>
            {[
              { id: 'qr',
                icon: (
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="3" y="3" width="7" height="7"/>
                    <rect x="14" y="3" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/>
                    <path d="M14 14 H17 V17 H14 Z M19 14 H21 M14 19 H17 M19 19 V21"/>
                  </svg>
                ) },
              { id: 'scan',
                icon: (
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M4 8 V5 a1 1 0 0 1 1 -1 H8"/>
                    <path d="M20 8 V5 a1 1 0 0 0 -1 -1 H16"/>
                    <path d="M4 16 V19 a1 1 0 0 0 1 1 H8"/>
                    <path d="M20 16 V19 a1 1 0 0 1 -1 1 H16"/>
                  </svg>
                ) },
            ].map((m) => {
              const active = m.id === introMode;
              return (
                <button key={m.id} onClick={() => {
                  setIntroMode(m.id);
                  if (m.id === 'scan') { setQrOpen(true); }
                  else                  { setQrOpen(false); }
                }} style={{
                  width: 56, padding: '6px 0', borderRadius: 999,
                  background: active ? RH.surfaceUp : 'transparent',
                  border: 'none',
                  color: active ? RH.text : RH.textDim,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  cursor: 'pointer',
                }}>{m.icon}</button>
              );
            })}
          </div>
        </div>

        {/* Title block */}
        <div style={{ padding: '18px 22px 4px', textAlign: 'center', fontFamily: 'Geist, Inter, system-ui' }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: RH.text, letterSpacing: -0.4 }}>Wallet</div>
          <div style={{ marginTop: 6, fontSize: 13, color: RH.textDim }}>
            {introMode === 'scan' ? 'Point camera at recipient’s QR' : 'Send or pay with crypto'}
          </div>
        </div>

        {/* Hero scan card */}
        <div style={{ padding: '22px 28px 0', flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <button onClick={() => setQrOpen(true)} aria-label="Open QR scanner" style={{
            position: 'relative',
            width: '100%', maxWidth: 280, aspectRatio: '5 / 7',
            borderRadius: 28,
            background: `linear-gradient(135deg, #1E2F8A 0%, ${RH.accent} 100%)`,
            overflow: 'hidden', cursor: 'pointer',
            border: `1px solid ${RH.line}`,
            padding: 0,
          }}>
            {/* Diagonal left slice for visual interest */}
            <svg width="100%" height="100%" viewBox="0 0 200 280" preserveAspectRatio="none" style={{
              position: 'absolute', inset: 0, pointerEvents: 'none',
            }}>
              <path d="M0 0 L70 0 L20 280 L0 280 Z" fill="rgba(0,0,0,0.35)"/>
              <path d="M70 0 L78 0 L26 280 L20 280 Z" fill="rgba(0,0,0,0.7)"/>
            </svg>
            {/* QR code centered */}
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <div style={{
                background: '#fff', padding: 12, borderRadius: 8,
                boxShadow: '0 8px 24px rgba(0,0,0,0.25)',
              }}>
                {(() => {
                  const myAcct = (window.AlpexaSync && AlpexaSync.me && AlpexaSync.me().accts && AlpexaSync.me().accts.crypto) || '';
                  return myAcct
                    ? <img src={'https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=' + encodeURIComponent(myAcct)} width={140} height={140} alt="My pay QR" style={{ display: 'block', borderRadius: 2 }}/>
                    : <QrPattern data="alpexa-send" size={140} dark="#000" light="#FFF"/>;
                })()}
              </div>
            </div>
          </button>
        </div>

        {/* Your pay ID (share so others can send to you) */}
        {(() => {
          const myAcct = (window.AlpexaSync && AlpexaSync.me && AlpexaSync.me().accts && AlpexaSync.me().accts.crypto) || '';
          if (!myAcct) return null;
          return (
            <div onClick={() => { try { navigator.clipboard && navigator.clipboard.writeText(myAcct); alpexa.toast && alpexa.toast('Pay ID copied'); } catch (e) {} }}
              style={{ textAlign: 'center', marginTop: 14, cursor: 'pointer' }}>
              <div style={{ fontSize: 10.5, color: RH.textMute, letterSpacing: 0.6, textTransform: 'uppercase' }}>Your pay ID · tap to copy</div>
              <div className="mono" style={{ fontSize: 15, fontWeight: 700, color: RH.text, marginTop: 3 }}>{myAcct}</div>
            </div>
          );
        })()}

        {/* Enter Manually CTA */}
        <div style={{ padding: '20px 18px calc(env(safe-area-inset-bottom, 0px) + 44px)' }}>
          <button onClick={() => setStep('form')} style={{
            width: '100%', padding: '15px 0', borderRadius: 999,
            background: RH.text, color: RH.bg, border: 'none',
            fontSize: 14.5, fontWeight: 700, letterSpacing: 0.2, cursor: 'pointer',
            fontFamily: 'Geist, Inter, system-ui',
          }}>Enter Manually</button>
        </div>
        </div>
      </Phone>
    );
  }

  return (
    <Phone width={390} height={844} bg={RH.bg}>
      {qrOpen ? <QrScanner onResult={(raw) => { const p = parseAlpexaPay(raw); setAddrInput(p.address); if (p.amount > 0) setAmountStr(String(p.amount)); setStep('form'); setQrOpen(false); }} onClose={() => setQrOpen(false)}/> : null}
      {reviewOpen ? (
        <SendReview
          recipient={recipient}
          asset={asset}
          assetId={assetId}
          amount={amount}
          memo={memo}
          state={sendState}
          onConfirm={() => {
            setSendState('sending');
            setTimeout(() => {
              setSendState('sent');
              if (typeof AudioFX !== 'undefined') AudioFX.success();
              if (onSent) onSent(assetId, amount, recipient);
            }, 900);
          }}
          onClose={() => {
            if (sendState === 'sending') return;
            if (sendState === 'sent') {
              setReviewOpen(false);
              setSendState('idle');
              setAmountStr('0');
              setMemo('');
              if (onBack) onBack();
              return;
            }
            setReviewOpen(false);
          }}
        />
      ) : null}
      <StatusBar/>

      <div style={{
        padding: '6px 16px 10px', display: 'flex',
        alignItems: 'center', justifyContent: 'space-between', flexShrink: 0,
      }}>
        <button aria-label="Back" onClick={onBack} style={{
          width: 36, height: 36, borderRadius: 18,
          background: 'transparent', border: 'none', display: 'flex',
          alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 6 L9 12 L15 18"/>
          </svg>
        </button>
        <div style={{ fontSize: 16, fontWeight: 700, color: RH.text, letterSpacing: -0.2 }}>Send</div>
        <div style={{ width: 36, height: 36 }}/>
      </div>

      <div className="alpexa-hide-scrollbar" style={{
        flex: 1, overflowY: 'auto', overflowX: 'hidden',
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          margin: '4px 22px 0', padding: '12px 14px',
          background: RH.surface, border: `1px solid ${RH.line}`,
          borderRadius: 14, display: 'flex', alignItems: 'center', gap: 12,
          cursor: 'pointer',
        }} onClick={() => setRecipientOpen((o) => !o)}>
          <div style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 10.5, color: RH.textDim,
            letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700, marginRight: 4,
          }}>To</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: RH.text, letterSpacing: -0.1 }}>{recipient.name}</div>
            <div style={{ fontSize: 11.5, color: RH.textDim, marginTop: 2, fontFamily: 'Geist Mono, monospace' }}>{recipient.handle}</div>
          </div>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{
            transform: recipientOpen ? 'rotate(180deg)' : 'rotate(0deg)',
            transition: 'transform 200ms ease',
          }}>
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </div>

        {recipientOpen ? (
          <>
            {/* Recipient input — accepts @username, email, or wallet address */}
            <div style={{
              margin: '12px 22px 0', display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <input
                type="text"
                value={addrInput}
                onChange={(e) => setAddrInput(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter') confirmAddress(); }}
                placeholder="@username, email, or wallet address"
                style={{
                  flex: 1, minWidth: 0,
                  background: RH.surface, border: `1px solid ${pending ? RH.green : RH.line}`,
                  borderRadius: 12, padding: '11px 14px',
                  color: RH.text, fontSize: 12.5, fontWeight: 500,
                  outline: 'none',
                  fontFamily: 'Geist Mono, monospace',
                  letterSpacing: -0.1,
                  transition: 'border-color 160ms ease',
                }}
              />
              {pending ? (
                <button
                  onClick={confirmAddress}
                  style={{
                    height: 42, padding: '0 14px', borderRadius: 12,
                    background: RH.green, color: '#000', border: 'none',
                    fontSize: 12.5, fontWeight: 700, cursor: 'pointer',
                  }}
                >Use</button>
              ) : (
                <button aria-label="Scan QR" onClick={onScanQR} style={{
                  width: 42, height: 42, borderRadius: 12,
                  background: RH.surface, border: `1px solid ${RH.line}`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  cursor: 'pointer', padding: 0,
                }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="3"  y="3"  width="7" height="7" rx="1"/>
                    <rect x="14" y="3"  width="7" height="7" rx="1"/>
                    <rect x="3"  y="14" width="7" height="7" rx="1"/>
                    <path d="M14 14h3v3h-3z M20 14v3 M14 20h3 M20 20v1"/>
                  </svg>
                </button>
              )}
            </div>
            {/* Live type hint */}
            {pending ? (
              <div style={{
                padding: '6px 22px 0',
                display: 'flex', alignItems: 'center', gap: 6,
                fontFamily: 'Geist Mono, monospace', fontSize: 10.5,
                color: RH.textDim, letterSpacing: 0.8, textTransform: 'uppercase', fontWeight: 700,
              }}>
                <span style={{
                  width: 6, height: 6, borderRadius: 3,
                  background: pending.color, display: 'inline-block',
                }}/>
                <span>{pending.type === 'handle' ? 'Alpexa user' :
                       pending.type === 'email'  ? 'Email transfer' :
                                                   'External wallet (on-chain)'}</span>
              </div>
            ) : null}
            {/* Section label */}
            {RECENT_RECIPIENTS.length > 0 ? (<div style={{
              padding: '14px 22px 6px',
              fontFamily: 'Geist Mono, monospace',
              fontSize: 10.5, color: RH.textDim,
              letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700,
            }}>Recent</div>) : null}
          <div className="alpexa-hide-scrollbar" style={{
            overflowX: 'auto', paddingLeft: 22, paddingRight: 22,
          }}>
            <div style={{ display: 'flex', gap: 8, width: 'max-content' }}>
              {RECENT_RECIPIENTS.map((r) => {
                const active = r.id === recipient.id;
                const firstName = r.name.split(' ')[0];
                return (
                  <button
                    key={r.id}
                    onClick={() => { setRecipient(r); setRecipientOpen(false); }}
                    style={{
                      flex: '0 0 auto',
                      display: 'flex', alignItems: 'center', gap: 10,
                      padding: '8px 14px 8px 8px',
                      background: active ? `${RH.green}1A` : RH.surface,
                      border: `1px solid ${active ? RH.green : RH.line}`,
                      borderRadius: 999,
                      cursor: 'pointer',
                      transition: 'background 160ms ease, border-color 160ms ease',
                    }}
                  >
                    <span style={{
                      fontSize: 13, fontWeight: 600, color: RH.text,
                      letterSpacing: -0.1,
                    }}>{firstName}</span>
                  </button>
                );
              })}
            </div>
          </div>
          </>
        ) : null}

        <div style={{
          flex: '0 0 auto', padding: '34px 22px 16px',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
        }}>
          <div style={{
            display: 'inline-flex', alignItems: 'baseline',
            color: insufficient ? RH.red : RH.text,
            letterSpacing: -2, lineHeight: 1, fontVariantNumeric: 'tabular-nums',
          }}>
            <span style={{ fontSize: 28, fontWeight: 500, marginRight: 4, opacity: 0.6 }}>$</span>
            <span style={{ fontSize: 56, fontWeight: 600 }}>{intPart}</span>
            <span style={{ fontSize: 36, fontWeight: 500, opacity: 0.45 }}>{fracDisplay || '.00'}</span>
          </div>
          <div style={{
            marginTop: 12, padding: '6px 12px',
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 999,
            display: 'inline-flex', alignItems: 'center', gap: 6, cursor: 'pointer',
          }} onClick={() => setAssetOpen((o) => !o)}>
            <AssetIcon sym={assetId} size={16}/>
            <span style={{ fontSize: 12.5, fontWeight: 600, color: RH.text, letterSpacing: 0.2 }}>
              From {assetId}
            </span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="2.4">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
          <div style={{
            marginTop: 10, fontSize: 11.5,
            color: insufficient ? RH.red : RH.textDim,
            fontFamily: 'Geist Mono, monospace',
            fontVariantNumeric: 'tabular-nums', letterSpacing: 0.6,
          }}>
            {insufficient
              ? `Insufficient — only ${fmtUsd(availableUsd)} available`
              : `Available · ${fmtUsd(availableUsd)} in ${assetId}`}
          </div>
        </div>

        {assetOpen ? (
          <div style={{
            margin: '0 22px',
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 12, padding: 4,
          }}>
            {Object.entries(SEND_ASSETS).map(([id, a]) => {
              const active = id === assetId;
              const avail = id === 'USDT' ? a.balance : a.balanceUsd;
              return (
                <button key={id} onClick={() => { setAssetId(id); setAssetOpen(false); }} style={{
                  width: '100%', textAlign: 'left',
                  background: active ? RH.surfaceUp : 'transparent',
                  border: 'none', borderRadius: 8, padding: '10px 12px',
                  display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer',
                }}>
                  <AssetIcon sym={id} size={24}/>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: RH.text }}>{a.name}</div>
                    <div style={{ fontSize: 11, color: RH.textDim, marginTop: 1, fontVariantNumeric: 'tabular-nums' }}>
                      {fmtUsd(avail)}
                    </div>
                  </div>
                  {active ? (
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={RH.green} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M5 12 l5 5 L20 7"/>
                    </svg>
                  ) : null}
                </button>
              );
            })}
          </div>
        ) : null}

        <div style={{ padding: '10px 22px 0' }}>
          <input type="text" value={memo} onChange={(e) => setMemo(e.target.value)} placeholder="Add a note (optional)" style={{
            width: '100%', background: RH.surface,
            border: `1px solid ${RH.line}`, borderRadius: 12,
            padding: '12px 14px',
            color: RH.text, fontSize: 13.5, fontWeight: 500,
            outline: 'none', fontFamily: 'Geist, Inter, system-ui',
          }}/>
        </div>

        <div style={{ flex: 1 }}/>

        <div style={{
          padding: '10px 18px 0',
          display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
          rowGap: 4, columnGap: 4,
        }}>
          {['1','2','3','4','5','6','7','8','9','.','0','⌫'].map((k) => (
            <button key={k} onClick={() => onKey(k)} style={{
              background: 'transparent', border: 'none', padding: '12px 0',
              color: RH.text, fontSize: 22, fontWeight: 500,
              letterSpacing: -0.5, cursor: 'pointer', fontFamily: 'Geist, Inter, system-ui',
            }}>{k}</button>
          ))}
        </div>

        <div style={{ padding: '12px 22px 22px' }}>
          <button
            disabled={!valid}

// Pseudo-QR pattern (looks like a real QR, generated from a seed of the address).
function QrPattern({ data, size = 220, dark = '#000', light = '#FFF' }) {
  const cells = 25;
  const cellSize = size / cells;
  let h = 0;
  for (let i = 0; i < data.length; i++) h = (h * 31 + data.charCodeAt(i)) >>> 0;
  let s = h || 1;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const grid = Array.from({ length: cells }, () =>
    Array.from({ length: cells }, () => rnd() > 0.5 ? 1 : 0));
  // QR position markers (top-left, top-right, bottom-left)
  const drawMarker = (cx, cy) => {
    for (let i = -3; i <= 3; i++) {
      for (let j = -3; j <= 3; j++) {
        const x = cx + i, y = cy + j;
        if (x < 0 || x >= cells || y < 0 || y >= cells) continue;
        const onRing = (Math.abs(i) === 3 || Math.abs(j) === 3) && Math.abs(i) <= 3 && Math.abs(j) <= 3;
        const onDot  = Math.abs(i) <= 1 && Math.abs(j) <= 1;
        grid[y][x] = onRing || onDot ? 1 : 0;
      }
    }
  };
  drawMarker(3, 3);
  drawMarker(cells - 4, 3);
  drawMarker(3, cells - 4);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: 'block' }}>
      <rect x="0" y="0" width={size} height={size} fill={light}/>
      {grid.flatMap((row, y) => row.map((v, x) => v ? (
        <rect key={`${x}-${y}`} x={x * cellSize} y={y * cellSize}
          width={cellSize} height={cellSize} fill={dark}/>
      ) : null))}
    </svg>
  );
}
