  account: [
    { q: 'How do I change my legal name?',
      a: `Account → Personal info → Legal name. Edits require a government ID upload to verify the new name matches. Updates typically process within 1 business day.\n\nMarital name changes require a marriage certificate; court-ordered changes require the order. For typographical fixes (no actual name change), no documentation is required.` },
    { q: 'How do I add or change my email?',
      a: `Account → Personal info → Email. Enter the new address and tap "Update email". We'll send a verification link to the new address — click it within 24 hours to complete the change.\n\nUntil verified, the old email remains active for security notifications. After change, all login alerts and statements go to the new address.` },
    { q: 'Can I have more than one Alpexa account?',
      a: `No. Each individual is limited to one Alpexa account by SSN/government ID. Business and trust accounts are separate from personal accounts — see alpexa-suisse.com/business.\n\nAttempting to open a second account will result in both being flagged and potentially closed.` },
    { q: 'How do I close my account?',
      a: `Withdraw all funds (USD and crypto), then Account → Personal info → Close account. The close request is processed after a 7-day cooling-off period in case you change your mind.\n\nClosed accounts cannot be reopened — you would need to apply as a new user. Tax documents for prior years remain available indefinitely via support.` },
    { q: 'What happens to my account if I pass away?',
      a: `Designate beneficiaries under Account → Personal info → Beneficiaries. On verified death (certified death certificate + court documents), assets transfer directly to your designated beneficiaries without probate.\n\nWithout beneficiaries on file, assets become part of your estate and are distributed per your will or state intestacy laws — a much slower process.` },
  ],
};

function HelpCenterPanel() {
  const [view, setView] = React.useState({ type: 'home' });
  const [query, setQuery] = React.useState('');
  const { register } = React.useContext(BackInterceptorContext);
  React.useEffect(() => {
    return register(() => {
      // Search active → clear search (acts as back step).
      if (query) { setQuery(''); return true; }
      if (view.type === 'article') { setView({ type: 'topic', id: view.tid }); return true; }
      if (view.type === 'topic')   { setView({ type: 'home' }); return true; }
      return false;
    });
  }, [register, view, query]);

  const searchHits = React.useMemo(() => {
    if (!query.trim()) return null;
    const q = query.trim().toLowerCase();
    const hits = [];
    Object.entries(HELP_ARTICLES).forEach(([tid, arts]) => {
      arts.forEach((a, i) => {
        if (a.q.toLowerCase().includes(q) || a.a.toLowerCase().includes(q)) {
          hits.push({ tid, idx: i, q: a.q,
            topic: HELP_TOPICS.find((t) => t.id === tid).label });
        }
      });
    });
    return hits;
  }, [query]);

  const SearchBar = (
    <div style={{ marginBottom: 12 }}>
      <div style={{
        position: 'relative',
        background: RH.surface, border: `1px solid ${RH.line}`,
        borderRadius: 12, padding: '0 12px',
        display: 'flex', alignItems: 'center', gap: 8,
      }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="11" r="7"/><path d="M21 21 L17 17"/>
        </svg>
        <input value={query} onChange={(e) => setQuery(e.target.value)}
          placeholder="Search help articles…"
          style={{
            flex: 1, background: 'transparent', border: 'none', outline: 'none',
            padding: '12px 0', color: RH.text, fontSize: 13,
            fontFamily: 'Geist, Inter, system-ui',
          }}/>
        {query ? (
          <button onClick={() => setQuery('')} style={{
            width: 20, height: 20, borderRadius: 10,
            background: RH.surfaceUp, border: 'none', color: RH.text,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer', fontSize: 13, fontWeight: 700, lineHeight: 1,
          }}>×</button>
        ) : null}
      </div>
    </div>
  );

  if (searchHits) {
    return (
      <>
        {SearchBar}
        {searchHits.length === 0 ? (
          <div style={{
            padding: 24, textAlign: 'center', color: RH.textDim,
            fontSize: 13, fontFamily: 'Geist, Inter, system-ui',
          }}>No results for "{query}".</div>
        ) : (
          <AcctSection title={`${searchHits.length} result${searchHits.length === 1 ? '' : 's'}`}>
            {searchHits.map((h, i) => (
              <React.Fragment key={h.tid + '-' + h.idx}>
                {i > 0 ? <AcctDivider/> : null}
                <AcctRow label={h.q} sub={h.topic}
                  onClick={() => { setQuery(''); setView({ type: 'article', tid: h.tid, idx: h.idx }); }}/>
              </React.Fragment>
            ))}
          </AcctSection>
        )}
      </>
    );
  }

  if (view.type === 'article') {
    const art = HELP_ARTICLES[view.tid][view.idx];
    const topic = HELP_TOPICS.find((t) => t.id === view.tid);
    return (
      <>
        <button onClick={() => setView({ type: 'topic', id: view.tid })} style={{
          display: 'flex', alignItems: 'center', gap: 6,
          background: 'transparent', border: 'none', color: RH.accent,
          padding: '0 0 10px', cursor: 'pointer', fontSize: 12, fontWeight: 600,
          fontFamily: 'Geist, Inter, system-ui',
        }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={RH.accent} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 6 L9 12 L15 18"/>
          </svg>
          Back to {topic.label}
        </button>
        <div style={{
          background: RH.surface, border: `1px solid ${RH.line}`,
          borderRadius: 14, padding: '16px 18px',
          fontFamily: 'Geist, Inter, system-ui',
        }}>
          <div style={{
            fontSize: 10, color: RH.textDim, fontFamily: 'Geist Mono, monospace',
            letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 700, marginBottom: 6,
          }}>{topic.label}</div>
          <div style={{
            fontSize: 16, fontWeight: 700, color: RH.text,
            letterSpacing: -0.3, lineHeight: 1.3, marginBottom: 12,
          }}>{art.q}</div>
          <div style={{
            fontSize: 13, color: RH.text, lineHeight: 1.6,
            whiteSpace: 'pre-line', opacity: 0.92,
          }}>{art.a}</div>
        </div>
      </>
    );
  }

  if (view.type === 'topic') {
    const topic = HELP_TOPICS.find((t) => t.id === view.id);
    const arts  = HELP_ARTICLES[view.id] || [];
    return (
      <>
        <button onClick={() => setView({ type: 'home' })} style={{
          display: 'flex', alignItems: 'center', gap: 6,
          background: 'transparent', border: 'none', color: RH.accent,
          padding: '0 0 10px', cursor: 'pointer', fontSize: 12, fontWeight: 600,
          fontFamily: 'Geist, Inter, system-ui',
        }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={RH.accent} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 6 L9 12 L15 18"/>
          </svg>
          Back to Help center
        </button>
        <div style={{
          marginBottom: 12, padding: '14px 16px',
          background: RH.surface, border: `1px solid ${RH.line}`,
          borderRadius: 14, fontFamily: 'Geist, Inter, system-ui',
        }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: RH.text, letterSpacing: -0.4 }}>{topic.label}</div>
          <div style={{ marginTop: 4, fontSize: 12, color: RH.textDim }}>{arts.length} article{arts.length === 1 ? '' : 's'}</div>
        </div>
        <AcctSection title="Articles">
          {arts.map((a, i) => (
            <React.Fragment key={i}>
              {i > 0 ? <AcctDivider/> : null}
              <AcctRow label={a.q} onClick={() => setView({ type: 'article', tid: view.id, idx: i })}/>
            </React.Fragment>
          ))}
        </AcctSection>
      </>
    );
  }

  const popular = [
    { tid: 'getstarted', idx: 0 },
    { tid: 'deposits',   idx: 0 },
    { tid: 'security',   idx: 0 },
    { tid: 'fees',       idx: 0 },
  ];
  return (
    <>
      {SearchBar}
      <AcctSection title="Popular articles">
        {popular.map((p, i) => {
          const art = HELP_ARTICLES[p.tid][p.idx];
          return (
            <React.Fragment key={p.tid + '-' + p.idx}>
              {i > 0 ? <AcctDivider/> : null}
              <AcctRow label={art.q}
                onClick={() => setView({ type: 'article', tid: p.tid, idx: p.idx })}/>
            </React.Fragment>
          );
        })}
      </AcctSection>
      <AcctSection title="Topics">
        {HELP_TOPICS.map((t, i) => (
          <React.Fragment key={t.id}>
            {i > 0 ? <AcctDivider/> : null}
            <AcctRow label={t.label}
              sub={`${HELP_ARTICLES[t.id].length} articles`}
              onClick={() => setView({ type: 'topic', id: t.id })}/>
          </React.Fragment>
        ))}
      </AcctSection>
    </>
  );
}


// ─── SupportChatPanel — AI chat trained on HELP_ARTICLES ───────────
function SupportChatPanel() {
  const id = React.useContext(IdentityContext);
  const [messages, setMessages] = React.useState([
    { role: 'ai', text: `Hi ${id.name.split(' ')[0]} — I'm Alpexa Assistant. Ask me anything about trading, deposits, staking, taxes, or account settings. If I can't help, I'll connect you to a human agent.` },
  ]);
  const [input, setInput] = React.useState('');
  const [typing, setTyping] = React.useState(false);
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, typing]);

  // Find best matching FAQ article using keyword overlap.
  const findAnswer = (q) => {
    const ql = q.toLowerCase();
    const tokens = ql.split(/\W+/).filter((t) => t.length >= 3);
    if (tokens.length === 0) return null;

    // Greeting / smalltalk shortcuts.
    if (/^(hi|hello|hey|yo|hola|sup|안녕)\b/i.test(q.trim())) {
      return { type: 'greet', text: 'Hello! What can I help you with today? You can ask about deposits, trading, staking, fees, taxes, or your account.' };
    }
    if (/\b(thanks|thank you|thx|고마|감사)\b/i.test(q)) {
      return { type: 'greet', text: 'Glad I could help. Anything else?' };
    }
    if (/\b(human|agent|representative|person|real)\b/i.test(q)) {
      return { type: 'escalate', text: 'I can connect you to a human agent — average wait time is about 3 minutes. Would you like me to do that?' };
    }
    if (/\b(account.+(hack|stolen|compromis|unauthor))/i.test(q) || /\bsuspicious\b/i.test(q)) {
      return { type: 'urgent', text: 'If you suspect unauthorized account access, take these steps immediately:\n\n1. Change your password (Account → Security → Change password).\n2. Sign out all devices (Account → Security → Sign out all other devices).\n3. Disable any 2FA factor you don\'t recognize.\n4. Contact our security team — I am connecting you now.' };
    }

    let best = null;
    let bestScore = 0;
    Object.entries(HELP_ARTICLES).forEach(([tid, arts]) => {
      arts.forEach((a, i) => {
        const corpus = (a.q + ' ' + a.a).toLowerCase();
        let score = 0;
        tokens.forEach((t) => {
          if (corpus.includes(t)) score += 1;
          if (a.q.toLowerCase().includes(t)) score += 2; // weight question matches higher
        });
        if (score > bestScore) { bestScore = score; best = { tid, idx: i, art: a }; }
      });
    });

    if (best && bestScore >= 2) {
      return { type: 'faq', text: best.art.a, source: HELP_TOPICS.find((t) => t.id === best.tid).label + ' · ' + best.art.q };
    }
    return null;
  };

  const send = () => {
    const text = input.trim();
    if (!text) return;
    const userMsg = { role: 'user', text };
    setMessages((m) => [...m, userMsg]);
    setInput('');
    setTyping(true);
    // Simulate thinking delay.
    setTimeout(() => {
      const ans = findAnswer(text);
      const aiMsg = ans
        ? { role: 'ai', text: ans.text, source: ans.source, kind: ans.type }
        : { role: 'ai', text: `I'm not sure about that one. You can browse the Help center for related articles, or tap "Connect to human" below to chat with a live agent.`, kind: 'fallback' };
      setMessages((m) => [...m, aiMsg]);
      setTyping(false);
    }, 600 + Math.min(text.length * 12, 1200));
  };

  const SUGGESTIONS = [
    'How do I withdraw to my bank?',
    'How long does a deposit take?',
    'What are the trading fees?',
    'How do I enable 2FA?',
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', minHeight: 480 }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '8px 12px', marginBottom: 10,
        background: RH.surface, border: `1px solid ${RH.line}`,
        borderRadius: 12, fontFamily: 'Geist, Inter, system-ui',
      }}>
        <div style={{
          width: 32, height: 32, borderRadius: 16,
          background: `linear-gradient(135deg, ${RH.accent}, #6A5BE6)`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: '#fff', fontWeight: 700, fontSize: 14, letterSpacing: -0.5,
        }}>A</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: RH.text }}>Alpexa Assistant</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginTop: 1 }}>
            <span style={{ width: 6, height: 6, borderRadius: 3, background: RH.green, boxShadow: `0 0 6px ${RH.green}` }}/>
            <span style={{ fontSize: 10.5, color: RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 0.4 }}>AI · Online</span>
          </div>
        </div>
      </div>

      <div ref={scrollRef} className="alpexa-hide-scrollbar" style={{
        flex: 1, overflowY: 'auto', padding: '4px 2px 8px',
        display: 'flex', flexDirection: 'column', gap: 8,
        minHeight: 200, maxHeight: 360,
      }}>
        {messages.map((m, i) => (
          <div key={i} style={{
            display: 'flex',
            justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start',
          }}>
            <div style={{
              maxWidth: '82%',
              padding: '9px 13px',
              borderRadius: 14,
              background: m.role === 'user' ? RH.accent : RH.surface,
              border: m.role === 'user' ? 'none' : `1px solid ${RH.line}`,
              color: m.role === 'user' ? '#fff' : RH.text,
              fontSize: 13, lineHeight: 1.5,
              whiteSpace: 'pre-line',
              fontFamily: 'Geist, Inter, system-ui',
            }}>
              {m.text}
              {m.source ? (
                <div style={{
                  marginTop: 6, paddingTop: 6, borderTop: `1px solid ${RH.line}`,
                  fontSize: 10.5, color: RH.textDim, fontWeight: 600,
                  fontFamily: 'Geist Mono, monospace', letterSpacing: 0.3,
                }}>📘 {m.source}</div>
              ) : null}
            </div>
          </div>
        ))}
        {typing ? (
          <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
            <div style={{
              padding: '11px 14px', borderRadius: 14,
              background: RH.surface, border: `1px solid ${RH.line}`,
              display: 'flex', gap: 4,
            }}>
              {[0,1,2].map((i) => (
                <span key={i} style={{
                  width: 6, height: 6, borderRadius: 3, background: RH.textDim,
                  animation: `alpexa-typing 1.2s ${i * 0.15}s infinite ease-in-out`,
                }}/>
              ))}
            </div>
          </div>
        ) : null}
      </div>

      {messages.length <= 1 ? (
        <div style={{
          display: 'flex', flexWrap: 'wrap', gap: 6,
          padding: '4px 0 8px',
        }}>
          {SUGGESTIONS.map((s) => (
            <button key={s} onClick={() => { setInput(s); setTimeout(send, 80); }} style={{
              padding: '7px 11px', borderRadius: 999,
              background: RH.surface, border: `1px solid ${RH.line}`,
              color: RH.text, fontSize: 11.5, fontWeight: 600, cursor: 'pointer',
              fontFamily: 'Geist, Inter, system-ui',
            }}>{s}</button>
          ))}
        </div>
      ) : null}

      <div style={{
        display: 'flex', gap: 6, padding: '6px 0 0',
        borderTop: `1px solid ${RH.line}`,
      }}>
        <input value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') send(); }}
          placeholder="Type your question…"
          style={{
            flex: 1, background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 999, padding: '10px 14px', color: RH.text,
            fontSize: 13, fontWeight: 500, fontFamily: 'Geist, Inter, system-ui',
            outline: 'none', marginTop: 8,
          }}
          onFocus={(e) => (e.currentTarget.style.borderColor = RH.accent)}
          onBlur={(e) => (e.currentTarget.style.borderColor = RH.line)}/>
        <button onClick={send} disabled={!input.trim()} style={{

function WhitelistPanel({ list = [], setList }) {
  const alpexa = React.useContext(ModalContext);
  const [formOpen, setFormOpen] = React.useState(false);
  const [fName, setFName] = React.useState('');
  const [fNetwork, setFNetwork] = React.useState('BTC');
  const [fAddress, setFAddress] = React.useState('');

  const NETWORKS = [
    { id: 'BTC',  label: 'Bitcoin',  example: 'bc1q...' },
    { id: 'ETH',  label: 'Ethereum (ERC-20)', example: '0x...' },
    { id: 'SOL',  label: 'Solana',   example: 'Sol...' },
    { id: 'TRX',  label: 'Tron (TRC-20)', example: 'T...' },
  ];

  const fmtAgo = (ts) => {
    const m = Math.max(0, Math.round((Date.now() - ts) / 60000));
    if (m < 60) return m + 'm ago';
    if (m < 1440) return Math.round(m / 60) + 'h ago';
    return Math.round(m / 1440) + 'd ago';
  };
  const statusOf = (e) => {
    const ageH = (Date.now() - e.ts) / 3600000;
    if (ageH >= 24) return { label: 'Approved', color: RH.green };
    const hLeft = 24 - ageH;
    const label = hLeft < 1 ? Math.ceil(hLeft * 60) + 'm' : Math.ceil(hLeft) + 'h';
    return { label: 'Pending · ' + label, color: RH.accent };
  };

  const submit = () => {
    if (fName.trim().length < 2 || fAddress.trim().length < 10) return;
    setList((l) => [...l, {
      id: 'wl-' + Date.now(),
      name: fName.trim(),
      network: fNetwork,
      address: fAddress.trim(),
      ts: Date.now(),
    }]);
    if (typeof AudioFX !== 'undefined') AudioFX.success();
    setFName(''); setFNetwork('BTC'); setFAddress('');
    setFormOpen(false);

  const remove = async (id, name) => {
    const ok = await alpexa.confirm(`Remove "${name}" from your whitelist?`, { title: 'Remove destination' });

// ─── ChangePasswordPanel — controlled inputs + strength meter ──────
function ChangePasswordPanel({ onSaved }) {
  const alpexa = React.useContext(ModalContext);
  const [cur, setCur] = React.useState('');
  const [nw,  setNw]  = React.useState('');
  const [cf,  setCf]  = React.useState('');
  const [showCur, setShowCur] = React.useState(false);
  const [showNw,  setShowNw]  = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);

  // Strength scoring 0-4.
  const score = React.useMemo(() => {
    let s = 0;
    if (nw.length >= 8)  s++;
    if (nw.length >= 12) s++;
    if (/[a-z]/.test(nw) && /[A-Z]/.test(nw)) s++;
    if (/\d/.test(nw)) s++;
    if (/[^a-zA-Z0-9]/.test(nw)) s++;
    return Math.min(4, s);
  }, [nw]);
  const strengthLabel = ['Too short', 'Weak', 'Fair', 'Good', 'Strong'][score];
  const strengthColor = [RH.red, RH.red, '#E59D2A', RH.green, RH.green][score];

  // Inline validations.
  const errCur = submitted && cur.length === 0 ? 'Enter your current password' : null;
  const errNw  = submitted && nw.length < 12   ? 'New password must be at least 12 characters' : null;
  const errCf  = submitted && cf !== nw         ? 'Passwords do not match' : null;

  const valid = cur.length > 0 && nw.length >= 12 && cf === nw && nw !== cur;

  const save = async () => {
    setSubmitted(true);
    if (!valid) {
      if (typeof AudioFX !== 'undefined') AudioFX.reject();
      return;
    }
    if (nw === cur) {
      alpexa.alert('New password must be different from your current password.', { title: 'Same password' });
      return;
    }
    try {
      window.localStorage.setItem('alpexa.passwordChangedAt', String(Date.now()));
    } catch (_) {}
    if (typeof AudioFX !== 'undefined') AudioFX.success();
    onSaved && onSaved();
  };

  // Option A — grouped iOS-style card. Plain function so inputs don't remount.
  const renderField = ({ label, val, set, show, setShow, error, placeholder, isNew }) => (
    <div style={{ padding: '11px 14px', position: 'relative' }}>
      <div style={{
        fontSize: 10, color: error ? RH.red : RH.textDim,
        fontWeight: 500, marginBottom: 3, letterSpacing: 0.2,

  return (
    <>
      <div style={{

  );
}

function PersonalPhonePanel({ onSaved }) {
  const [stored, setStored] = React.useState(() => {
    try { return window.localStorage.getItem('alpexa.userPhone') || '+1 (415) 555 0182'; }
    catch (_) { return '+1 (415) 555 0182'; }
  });
  const [phone, setPhone] = React.useState(stored);
  const digits = phone.replace(/\D/g, '');
  const valid = digits.length >= 10;
  // Format as US phone: +1 (XXX) XXX XXXX
  const format = (v) => {
    const d = v.replace(/\D/g, '').slice(0, 11);
    let out = '+';
    if (d.length > 0) out += d.slice(0, 1) + ' ';
    if (d.length > 1) out += '(' + d.slice(1, 4);
    if (d.length >= 4) out += ') ' + d.slice(4, 7);
    if (d.length >= 7) out += ' ' + d.slice(7, 11);
    return out.trim();
  };
  const save = () => {
    if (!valid) return;
    try { window.localStorage.setItem('alpexa.userPhone', phone); } catch (_) {}
    setStored(phone);
    if (typeof AudioFX !== 'undefined') AudioFX.success();
    onSaved && onSaved();
  };
  return (
    <>
      <AcctSection title="Mobile number">
        <div style={{ padding: '12px 16px' }}>
          <div style={{
            fontSize: 10.5, color: RH.textDim, fontFamily: 'Geist Mono, monospace',
            letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 700, marginBottom: 6,
          }}>Phone</div>
          <input value={phone} onChange={(e) => setPhone(format(e.target.value))}
            type="tel" autoComplete="tel" inputMode="tel"
            placeholder="+1 (415) 555 0182"
            style={{
              width: '100%', boxSizing: 'border-box',
              background: RH.surfaceUp,
              border: `1px solid ${valid ? RH.line : RH.red}`,
              borderRadius: 10, padding: '12px 14px', color: RH.text,
              fontSize: 15, fontWeight: 600, fontFamily: 'Geist Mono, monospace',
              letterSpacing: 0.4, outline: 'none',
            }}
            onFocus={(e) => valid && (e.currentTarget.style.borderColor = RH.accent)}

          {!valid ? (
            <div style={{ marginTop: 6, fontSize: 11.5, color: RH.red, fontWeight: 600 }}>
              Enter a valid phone number (at least 10 digits).
            </div>
          ) : null}
        </div>
      </AcctSection>
      <div style={{
        marginTop: 12, padding: '11px 14px',

function RecurringPanel({ isBuy, linkedBanks = [], onSaved }) {
  const [amount, setAmount] = React.useState('100.00');
  const [freqIdx, setFreqIdx] = React.useState(1);   // 0=Daily, 1=Weekly, 2=Bi-weekly, 3=Monthly
  const [bankIdx, setBankIdx] = React.useState(0);
  const [assetIdx, setAssetIdx] = React.useState(0);
  const [startIdx, setStartIdx] = React.useState(0); // 0=Next available, 1=Tomorrow, 2=Next 1st

  const FREQUENCIES = [
    { label: 'Daily',     sub: 'Every day' },
    { label: 'Weekly',    sub: 'Mondays' },
    { label: 'Bi-weekly', sub: 'Every other Monday' },
    { label: 'Monthly',   sub: '1st of each month' },
  ];
  const ASSETS = ['BTC', 'ETH', 'SOL', 'ALPXS', 'USDT'];
  const startDate = (() => {
    const d = new Date();
    if (startIdx === 1) { d.setDate(d.getDate() + 1); return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
    if (startIdx === 2) { const next = new Date(d.getFullYear(), d.getMonth() + 1, 1); return next.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
    // Default: next Monday
    const day = d.getDay();
    const diff = (8 - day) % 7 || 7;
    d.setDate(d.getDate() + diff);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  })();

  const startLabels = ['Next Monday', 'Tomorrow', 'Next 1st'];
  const bankLabel = linkedBanks.length > 0
    ? (linkedBanks[bankIdx % linkedBanks.length].bank + ' ••• ' + linkedBanks[bankIdx % linkedBanks.length].tail)
    : 'No banks linked';
  const amtNum = parseFloat(amount) || 0;
  const valid = amtNum > 0 && (isBuy || linkedBanks.length > 0);

  const save = () => {
    if (!valid) return;
    try {
      const entry = {
        id: 'rec-' + Date.now(),
        type: isBuy ? 'buy' : 'deposit',
        amount: amtNum,
        frequency: FREQUENCIES[freqIdx].label,
        startDate, startLabel: startLabels[startIdx],
        bank: isBuy ? null : bankLabel,
        asset: isBuy ? ASSETS[assetIdx] : null,
        createdAt: Date.now(),
      };
      const raw = window.localStorage.getItem('alpexa.recurring') || '[]';
      const arr = JSON.parse(raw);
      arr.push(entry);
      window.localStorage.setItem('alpexa.recurring', JSON.stringify(arr));
      try { if (window.AlpexaSync && AlpexaSync.saveUserData) AlpexaSync.saveUserData('recurring', arr); } catch (_) {}
      setExisting((cur) => [...cur, entry]);
    } catch (_) {}
    if (typeof AudioFX !== 'undefined') AudioFX.success();
    onSaved && onSaved();
  };

  return (
    <>
      <AcctSection title={isBuy ? 'New recurring buy' : 'New recurring deposit'}>
        <div style={{ padding: '12px 16px' }}>
          <div style={{
            fontSize: 10.5, color: RH.textDim, fontFamily: 'Geist Mono, monospace',
            letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 700, marginBottom: 6,
          }}>Amount (USD)</div>
          <input value={amount} onChange={(e) => setAmount(e.target.value.replace(/[^0-9.]/g, ''))}
            inputMode="decimal" placeholder="100.00"
            style={{
              width: '100%', boxSizing: 'border-box',
              background: RH.surfaceUp,
              border: `1px solid ${amtNum > 0 ? RH.line : RH.red}`,
              borderRadius: 10, padding: '12px 14px', color: RH.text,
              fontSize: 15, fontWeight: 700, fontFamily: 'Geist Mono, monospace',
              fontVariantNumeric: 'tabular-nums', outline: 'none',
            }}
            onFocus={(e) => amtNum > 0 && (e.currentTarget.style.borderColor = RH.accent)}
            onBlur={(e) => amtNum > 0 && (e.currentTarget.style.borderColor = RH.line)}/>
        </div>
        <AcctDivider/>
        <AcctRow label="Frequency"
          value={FREQUENCIES[freqIdx].label}
          sub={FREQUENCIES[freqIdx].sub}
          chevron={false}
          onClick={() => setFreqIdx((i) => (i + 1) % FREQUENCIES.length)}/>
        <AcctDivider/>
        {isBuy ? (
          <AcctRow label="Asset" value={ASSETS[assetIdx]}
            chevron={false}
            onClick={() => setAssetIdx((i) => (i + 1) % ASSETS.length)}/>
        ) : (
          <AcctRow label="From" value={bankLabel}
            sub={linkedBanks.length > 1 ? `Tap to cycle (${bankIdx + 1}/${linkedBanks.length})` : (linkedBanks.length === 0 ? 'Link a bank first' : null)}
            chevron={false}
            onClick={() => linkedBanks.length > 0 && setBankIdx((i) => (i + 1) % linkedBanks.length)}/>
        )}
        <AcctDivider/>
        <AcctRow label="Start date"
          value={startLabels[startIdx]}
          sub={startDate}
          chevron={false}
          onClick={() => setStartIdx((i) => (i + 1) % startLabels.length)}/>
      </AcctSection>

      <div style={{
        marginTop: 12, padding: '11px 14px',
        background: `${RH.accent}10`, border: `1px solid ${RH.accent}33`,
        borderRadius: 12, fontFamily: 'Geist, Inter, system-ui',
        fontSize: 11.5, color: RH.text, lineHeight: 1.5,
      }}>
        {isBuy
          ? `We'll buy $${amtNum.toFixed(2)} of ${ASSETS[assetIdx]} ${FREQUENCIES[freqIdx].label.toLowerCase()} starting ${startDate}. Cancel anytime.`
          : `We'll pull $${amtNum.toFixed(2)} from ${bankLabel} ${FREQUENCIES[freqIdx].label.toLowerCase()} starting ${startDate}. ACH takes 1–3 business days.`}
      </div>

      <AcctSaveButton
        label={valid ? (isBuy ? 'Schedule recurring buy' : 'Schedule recurring deposit') : (linkedBanks.length === 0 && !isBuy ? 'Link a bank to continue' : 'Enter amount')}
        onClick={save}/>
    </>
  );
}


// ─── TransferHistoryPanel — deposit/withdraw/transfer history with date filter ───
function TransferHistoryPanel({ kind, transactions, setTransactions, flashAndClose }) {
  const alpexa = React.useContext(ModalContext);
  const [dateFilter, setDateFilter] = React.useState('all');
  const DATE_RANGES = [
    { id: 'all', label: 'All' },
    { id: '24h', label: '24h' },
    { id: '7d',  label: '7d' },
    { id: '30d', label: '30d' },
    { id: '90d', label: '90d' },
    { id: 'ytd', label: 'YTD' },
  ];
  const dateCutoff = React.useMemo(() => {
    const now = Date.now();
    if (dateFilter === '24h') return now - 24 * 3600e3;
    if (dateFilter === '7d')  return now - 7  * 86400e3;
    if (dateFilter === '30d') return now - 30 * 86400e3;
    if (dateFilter === '90d') return now - 90 * 86400e3;
    if (dateFilter === 'ytd') return new Date(new Date().getFullYear(), 0, 1).getTime();
    return 0;
  }, [dateFilter]);

  const allByKind = transactions.filter((t) => t.type === kind);
  const items = allByKind.filter((t) => dateCutoff === 0 || t.ts >= dateCutoff);

  const [dateMenuOpen, setDateMenuOpen] = React.useState(false);
  const dateLabelRaw = (DATE_RANGES.find((r) => r.id === dateFilter) || DATE_RANGES[0]).label;
  const dateLabel = dateLabelRaw === 'All' ? 'All time' : dateLabelRaw;
  const itemNoun = kind === 'deposit' ? 'deposit' : kind === 'withdraw' ? 'withdrawal' : 'transfer';
  const ChipBar = (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14,
      fontSize: 12.5, fontFamily: 'Geist, Inter, system-ui',
    }}>
      <div style={{ position: 'relative' }}>
        <button onClick={() => setDateMenuOpen((o) => !o)} style={{
          color: RH.text, fontWeight: 700,
          background: 'transparent', border: 'none', padding: 0,
          cursor: 'pointer', fontFamily: 'Geist, Inter, system-ui',
          fontSize: 12.5, lineHeight: 1.4,
          borderBottom: `1px dashed ${RH.text}`,
        }}>{dateLabel}</button>
        {dateMenuOpen ? (
          <div style={{
            position: 'absolute', top: 'calc(100% + 4px)', left: 0, zIndex: 30,
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 10, padding: 4, minWidth: 140,
            boxShadow: '0 12px 32px rgba(0,0,0,0.3)',
          }}>
            {DATE_RANGES.map((r) => {
              const active = dateFilter === r.id;
              const lbl = r.label === 'All' ? 'All time' : r.label;
              return (
                <button key={r.id} onClick={() => { setDateFilter(r.id); setDateMenuOpen(false); }} style={{
                  display: 'block', width: '100%', textAlign: 'left',
                  padding: '8px 10px', borderRadius: 6,
                  background: active ? RH.surfaceUp : 'transparent',
                  border: 'none',
                  color: active ? RH.accent : RH.text,
                  fontSize: 12.5, fontWeight: active ? 700 : 500,
                  cursor: 'pointer', fontFamily: 'Geist, Inter, system-ui',
                }}>{lbl}</button>
              );
            })}
          </div>
        ) : null}
      </div>
    </div>
  );

  if (allByKind.length === 0) {
    const emptyMsg = kind === 'deposit'
      ? { icon: 'M12 3 V15 M7 10 L12 15 L17 10 M4 20 H20', title: 'No deposits yet', desc: 'When you fund your account, your deposits will appear here.' }
      : kind === 'withdraw'
        ? { icon: 'M12 3 V15 M7 10 L12 15 L17 10 M4 20 H20', title: 'No withdrawals yet', desc: 'When you cash out to a bank or card, your withdrawals will appear here.' }
        : { icon: 'M3 9 L12 4 L21 9 M3 20 H21', title: 'No transfers yet', desc: 'Movements between Crypto / FX / Sports servers show up here.' };
    return (
      <div style={{ padding: '50px 20px', textAlign: 'center', fontFamily: 'Geist, Inter, system-ui' }}>
        <div style={{
          width: 56, height: 56, borderRadius: 28,
          background: RH.surface, border: `1px solid ${RH.line}`,
          margin: '0 auto 16px', display: 'flex',
          alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke={RH.textDim} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            style={{ transform: kind === 'withdraw' ? 'rotate(180deg)' : 'none' }}>
            <path d={emptyMsg.icon}/>
          </svg>
        </div>
        <div style={{ fontSize: 15, fontWeight: 700, color: RH.text, letterSpacing: -0.2 }}>{emptyMsg.title}</div>
        <div style={{
          marginTop: 6, fontSize: 12.5, color: RH.textDim, lineHeight: 1.5,
          maxWidth: 240, margin: '6px auto 0',
        }}>{emptyMsg.desc}</div>
      </div>
    );
  }

  const fmtAgo = (ts) => {
    const m = Math.max(0, Math.round((Date.now() - ts) / 60000));
    if (m < 60) return m + 'm ago';
    if (m < 1440) return Math.round(m / 60) + 'h ago';
    return Math.round(m / 1440) + 'd ago';
  };
  const statusFor = (t) => {
    const ageH = (Date.now() - t.ts) / 3600000;
    if (t.approvedAt) return { label: 'Approved', color: RH.green };
    if (kind === 'deposit') {
      if (t.method === 'card')  return { label: 'Available', color: RH.green };
      if (t.method === 'wire')  return ageH < 1   ? { label: 'Pending', color: RH.accent } : { label: 'Completed', color: RH.green };
      if (t.method === 'ach')   return ageH < 72  ? { label: 'Pending', color: RH.accent } : { label: 'Completed', color: RH.green };
      return { label: 'Completed', color: RH.green };
    }
    if (kind === 'withdraw') {
      if (t.method === 'card')  return { label: 'Sent', color: RH.green };
      if (t.method === 'wire')  return ageH < 4   ? { label: 'Pending', color: RH.accent } : { label: 'Completed', color: RH.green };
      if (t.method === 'ach')   return ageH < 72  ? { label: 'Pending', color: RH.accent } : { label: 'Completed', color: RH.green };
      return { label: 'Sent', color: RH.green };
    }
    return { label: 'Settled', color: RH.green };
  };
  const methodLabel = (m) => m === 'card' ? 'Debit card' : m === 'ach' ? 'Bank transfer' : m === 'wire' ? 'Wire' : (m || '—');
  const serverLabel = (s) => s === 'crypto' ? 'Crypto' : s === 'fx' ? 'FX' : s === 'sports' ? 'Sports' : (s || '');
  const approveAsOperator = async (txId) => {
    const ok = await alpexa.confirm(
      'Approve this transaction as the back-office operator?\n\nIn production, this action would be performed by your compliance/treasury team after KYC + AML checks. The user would see the status flip to Completed and the funds become available immediately.',
      { title: 'Back-office approval' }
    );
    if (!ok || !setTransactions) return;
    // Find the tx and apply the balance change on approval (demo: credit/deduct now).
    const tx = (transactions || []).find((x) => x.id === txId);
    if (tx && !tx.approvedAt) {
      try {
        const bRaw = window.localStorage.getItem('alpexa.cryptoHoldings');
        const bal  = bRaw ? JSON.parse(bRaw) : { USDT: 0 };
        const sRaw = window.localStorage.getItem('alpexa.serverBalances');
        const srv  = sRaw ? JSON.parse(sRaw) : { crypto: 0, fx: 0, sports: 0 };
        if (tx.type === 'deposit') {
          if (tx.dest === 'crypto') bal.USDT = (bal.USDT || 0) + tx.usd;
          srv[tx.dest] = (srv[tx.dest] || 0) + tx.usd;
        } else if (tx.type === 'withdraw') {
          if (tx.source === 'crypto') bal.USDT = Math.max(0, (bal.USDT || 0) - tx.gross);
          srv[tx.source] = Math.max(0, (srv[tx.source] || 0) - tx.gross);
        }
        window.localStorage.setItem('alpexa.cryptoHoldings', JSON.stringify(bal));
        window.localStorage.setItem('alpexa.serverBalances', JSON.stringify(srv));
      } catch (_) {}
    }
    setTransactions((list) => list.map((x) => x.id === txId ? { ...x, approvedAt: Date.now() } : x));
    if (typeof AudioFX !== 'undefined') AudioFX.cash();
    // Soft reload to propagate balance changes everywhere.
    setTimeout(() => { try { window.location.reload(); } catch (_) {} }, 800);
  };

  return (
    <>
      {ChipBar}
      {items.length === 0 ? (
        <div style={{ padding: '24px 20px', textAlign: 'center', color: RH.textDim, fontSize: 12.5 }}>
          No {kind === 'deposit' ? 'deposits' : kind === 'withdraw' ? 'withdrawals' : 'transfers'} in this time range.
        </div>
      ) : (
        <AcctSection title="">
          {items.map((t, i) => {
            const st = statusFor(t);
            const sub = kind === 'transfer'
              ? `${serverLabel(t.from)} → ${serverLabel(t.to)} · ${fmtAgo(t.ts)}`
              : kind === 'deposit'
                ? `${methodLabel(t.method)} → ${serverLabel(t.dest)} · ${fmtAgo(t.ts)}`
                : `${methodLabel(t.method)} from ${serverLabel(t.source)} · ${fmtAgo(t.ts)}`;
            const canApprove = false; // approvals now happen in the back office only
            return (
              <React.Fragment key={t.id || i}>
                {i > 0 ? <AcctDivider/> : null}
                <AcctRow
                  label={(kind === 'withdraw' ? '−' : kind === 'deposit' ? '+' : '') + '$' + (t.usd || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                  sub={sub}
                  status={st.label}
                  statusColor={st.color}
                  chevron={false}
                  onClick={canApprove ? () => approveAsOperator(t.id) : undefined}
                />
              </React.Fragment>
            );
          })}
        </AcctSection>
      )}
    </>
  );
}

// Referral link with working Copy button + flash feedback.
function ReferralLinkPanel() {
  const URL = alpexaRefLink();
  const [copied, setCopied] = React.useState(false);
  const copy = () => {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(URL).then(() => {
          setCopied(true); setTimeout(() => setCopied(false), 1500);
        });
      } else {
        const el = document.createElement('textarea');
        el.value = URL; document.body.appendChild(el); el.select();
        document.execCommand('copy'); document.body.removeChild(el);
        setCopied(true); setTimeout(() => setCopied(false), 1500);
      }
    } catch (_) {}
  };
  return (
    <>
      <AcctSection title="Your link">
        <div style={{ padding: '14px 16px' }}>
          <div style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 13.5, color: RH.accent,
            letterSpacing: 0.2, wordBreak: 'break-all',
          }}>{URL}</div>
        </div>
      </AcctSection>
      <AcctSaveButton label={copied ? 'Copied!' : 'Copy link'} onClick={copy}/>
    </>
  );
}

function ActivityList({ transactions = [] }) {
  const [assetFilter, setAssetFilter] = React.useState('all');
  const [dateFilter, setDateFilter]   = React.useState('all'); // all | 24h | 7d | 30d | 90d | ytd
  const assets = ['all', ...Array.from(new Set(transactions.map((t) => t.sym)))];
  const DATE_RANGES = [
    { id: 'all',  label: 'All time' },
    { id: '24h',  label: '24h' },
    { id: '7d',   label: '7d' },
    { id: '30d',  label: '30d' },
    { id: '90d',  label: '90d' },
    { id: 'ytd',  label: 'YTD' },
  ];
  const dateCutoff = React.useMemo(() => {
    const now = Date.now();
    if (dateFilter === '24h') return now - 24 * 3600e3;
    if (dateFilter === '7d')  return now - 7  * 86400e3;
    if (dateFilter === '30d') return now - 30 * 86400e3;
    if (dateFilter === '90d') return now - 90 * 86400e3;
    if (dateFilter === 'ytd') return new Date(new Date().getFullYear(), 0, 1).getTime();
    return 0;
  }, [dateFilter]);
  const filtered = transactions.filter((t) =>
    (assetFilter === 'all' || t.sym === assetFilter) &&
    (dateCutoff === 0 || t.ts >= dateCutoff)
  );
  const groups = {};
  filtered.forEach((t) => {
    const key = new Date(t.ts).toISOString().slice(0, 10);
    (groups[key] = groups[key] || []).push(t);
  });
  const dayKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  const fmtDay = (key) => {
    const d = new Date(key + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const dDate = new Date(d); dDate.setHours(0,0,0,0);
    const days = Math.round((today - dDate) / 86400000);
    if (days === 0) return 'Today';
    if (days === 1) return 'Yesterday';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  };
  const fmtTime = (ts) => new Date(ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  const TYPE_META = {
    buy:      { label: 'Bought',      color: RH.green, sign: '+' },
    sell:     { label: 'Sold',        color: RH.red,   sign: '-' },
    stake:    { label: 'Staked',      color: RH.text,  sign: '·' },
    unstake:  { label: 'Unstaked',    color: RH.text,  sign: '·' },
    reward:   { label: 'Staking reward', color: RH.green, sign: '+' },
    redeem:   { label: 'Redeemed',    color: RH.text,  sign: '+' },
    send:     { label: 'Sent',        color: RH.red,   sign: '-' },
    receive:  { label: 'Received',    color: RH.green, sign: '+' },
    deposit:  { label: 'Deposited',   color: RH.green, sign: '+' },
    withdraw: { label: 'Withdrew',    color: RH.red,   sign: '-' },
    swap:     { label: 'Swapped',     color: RH.text,  sign: '·' },
    transfer: { label: 'Transferred', color: RH.text,  sign: '·' },
  };
  const srvLabel = (s) => s === 'crypto' ? 'Crypto' : s === 'fx' ? 'FX' : s === 'sports' ? 'Sports' : s;
  const mthLabel = (m) => m === 'card' ? 'Card' : m === 'ach' ? 'Bank' : m === 'wire' ? 'Wire' : (m || '').toUpperCase();
  const buildSub = (t) => {
    if (t.type === 'transfer') return `${srvLabel(t.from)} → ${srvLabel(t.to)}`;
    if (t.type === 'deposit')  return `${mthLabel(t.method)} → ${srvLabel(t.dest)}`;
    if (t.type === 'withdraw') return `${mthLabel(t.method)} from ${srvLabel(t.source)}`;
    if (t.type === 'swap')     return `${t.fromSym || ''} → ${t.toSym || ''}`;
    if (t.type === 'stake' && t.period) return `${t.period}`;
    if (t.type === 'redeem' && t.mode)  return `${t.mode}`;
    return '';
  };
  const statusChip = (t) => {
    // Pending → approved flow only relevant for deposit/withdraw with ACH/wire.
    if (t.approvedAt) return { label: 'Approved', color: RH.green };
    const ageH = (Date.now() - t.ts) / 3600000;
    if (t.type === 'deposit') {
      if (t.method === 'wire' && ageH < 1) return { label: 'Pending', color: RH.accent };
      if (t.method === 'ach'  && ageH < 72) return { label: 'Pending', color: RH.accent };
    }
    if (t.type === 'withdraw') {
      if (t.method === 'wire' && ageH < 4) return { label: 'Pending', color: RH.accent };
      if (t.method === 'ach'  && ageH < 72) return { label: 'Pending', color: RH.accent };
    }
    return null;
  };

  // ── Filter bar (Option C) — minimal "Showing X · Y · N transactions" line.
  const [dateMenuOpen,  setDateMenuOpen]  = React.useState(false);
  const [assetMenuOpen, setAssetMenuOpen] = React.useState(false);
  const dateLabel  = (DATE_RANGES.find((r) => r.id === dateFilter) || DATE_RANGES[0]).label;
  const assetLabel = assetFilter === 'all' ? 'All assets' : assetFilter;
  const dashedLink = {
    color: RH.text, fontWeight: 700,
    background: 'transparent', border: 'none', padding: 0,
    cursor: 'pointer', fontFamily: 'Geist, Inter, system-ui',
    fontSize: 12.5, lineHeight: 1.4,
    borderBottom: `1px dashed ${RH.text}`,
  };
  const dropdownStyle = {
    position: 'absolute', top: 'calc(100% + 4px)', zIndex: 30,
    background: RH.surface, border: `1px solid ${RH.line}`,
    borderRadius: 10, padding: 4, minWidth: 140,
    boxShadow: '0 12px 32px rgba(0,0,0,0.3)',
  };
  return (
    <div style={{ fontFamily: 'Geist, Inter, system-ui' }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14,
        fontSize: 12.5, flexWrap: 'wrap',
      }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => { setDateMenuOpen((o) => !o); setAssetMenuOpen(false); }} style={dashedLink}>{dateLabel}</button>
          {dateMenuOpen ? (
            <div style={{ ...dropdownStyle, left: 0 }}>
              {DATE_RANGES.map((r) => {
                const active = dateFilter === r.id;
                return (
                  <button key={r.id} onClick={() => { setDateFilter(r.id); setDateMenuOpen(false); }} style={{
                    display: 'block', width: '100%', textAlign: 'left',
                    padding: '8px 10px', borderRadius: 6,
                    background: active ? RH.surfaceUp : 'transparent',
                    border: 'none',
                    color: active ? RH.accent : RH.text,
                    fontSize: 12.5, fontWeight: active ? 700 : 500,
                    cursor: 'pointer', fontFamily: 'Geist, Inter, system-ui',
                  }}>{r.label}</button>
                );
              })}
            </div>
          ) : null}
        </div>

        <span style={{ color: RH.textMute }}>·</span>

        <div style={{ position: 'relative' }}>
          <button onClick={() => { setAssetMenuOpen((o) => !o); setDateMenuOpen(false); }} style={dashedLink}>{assetLabel}</button>
          {assetMenuOpen ? (
            <div style={{ ...dropdownStyle, left: 0, maxHeight: 240, overflowY: 'auto' }} className="alpexa-hide-scrollbar">
              {assets.map((sym) => {
                const active = assetFilter === sym;
                return (
                  <button key={sym} onClick={() => { setAssetFilter(sym); setAssetMenuOpen(false); }} style={{
                    display: 'block', width: '100%', textAlign: 'left',
                    padding: '8px 10px', borderRadius: 6,
                    background: active ? RH.surfaceUp : 'transparent',
                    border: 'none',
                    color: active ? RH.accent : RH.text,
                    fontSize: 12.5, fontWeight: active ? 700 : 500,
                    cursor: 'pointer', fontFamily: 'Geist, Inter, system-ui',
                  }}>{sym === 'all' ? 'All assets' : sym}</button>
                );
              })}
            </div>
          ) : null}
        </div>

      </div>

      {dayKeys.length === 0 ? (
        <div style={{ padding: '40px 20px', textAlign: 'center', color: RH.textDim, fontSize: 13 }}>No activity yet.</div>
      ) : dayKeys.map((day) => (
        <div key={day} style={{ marginBottom: 14 }}>
          <div style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 10, color: RH.textDim,
            letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 700,
            margin: '4px 0 6px',
          }}>{fmtDay(day)}</div>
          <div style={{
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 12, overflow: 'hidden',
          }}>
            {groups[day].map((t, i) => {
              const meta = TYPE_META[t.type] || { label: t.type, color: RH.text, sign: '·' };
              return (
                <div key={t.id} style={{
                  borderTop: i === 0 ? 'none' : `1px solid ${RH.line}`,
                  padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12,
                }}>
                  <AssetIcon sym={t.sym} size={26}/>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{
                      fontSize: 13.5, fontWeight: 600, color: RH.text,
                      display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap',
                    }}>
                      <span>{meta.label} {t.sym}</span>
                      {(() => { const s = statusChip(t); return s ? (
                        <span style={{
                          padding: '1px 6px', borderRadius: 999,
                          background: `${s.color}1F`, color: s.color,
                          fontSize: 9, fontWeight: 700, letterSpacing: 0.6,
                          textTransform: 'uppercase', fontFamily: 'Geist Mono, monospace',
                        }}>{s.label}</span>
                      ) : null; })()}
                    </div>
                    <div style={{
                      marginTop: 2, fontSize: 11, color: RH.textDim,
                      fontFamily: 'Geist Mono, monospace', letterSpacing: 0.3,
                    }}>{t.ticket ? t.ticket + ' · ' : ''}{fmtTime(t.ts)}{(() => { const sub = buildSub(t); return sub ? ` · ${sub}` : ''; })()}</div>
                  </div>
                  <div style={{
                    fontSize: 13.5, fontWeight: 700, color: meta.color,
                    fontFamily: 'Geist Mono, monospace',
                    fontVariantNumeric: 'tabular-nums', letterSpacing: -0.1,
                  }}>{meta.sign} ${t.usd.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function Account({ serverBalances = {}, balances = {}, staked = {}, transactions = [], setTransactions, savedCards = [], setSavedCards, linkedBanks = [], setLinkedBanks, whitelist = [], setWhitelist, beneficiaries = [], setBeneficiaries, tabBar }) {
  const [range, setRange] = React.useState('1D');
  const [subPage, setSubPage] = React.useState(null);
  const [subSub, setSubSub] = React.useState(null);
  const [alertsOpen, setAlertsOpen] = React.useState(false);

  // SINGLE live ticker: drive ONE shared value (window.__cryptoLiveUsd) and fire the
  // event so BOTH the Accounts row and the server-switcher dropdown read the exact same
  // number (no independent drift → they always match). FX/Sports are cash pools (static).
  const [, _balTick] = React.useState(0);
  const _cryptoAnchor = serverBalances.crypto || 0;
  React.useEffect(() => {
    const iv = setInterval(() => {
      if (_cryptoAnchor > 0) {
        window.__cryptoLiveUsd = _cryptoAnchor * (1 + 0.00018 * Math.sin(Date.now() / 640));
        try { window.dispatchEvent(new Event('alpexa-crypto-live')); } catch (e) {}
      }
      _balTick((x) => x + 1);
    }, 700);
    return () => clearInterval(iv);
  }, [_cryptoAnchor]);
  const effBalances = {
    crypto: (typeof window.__cryptoLiveUsd === 'number' && window.__cryptoLiveUsd > 0) ? window.__cryptoLiveUsd : _cryptoAnchor,
    fx:     effBal('fx', serverBalances.fx || 0),
    sports: serverBalances.sports || 0,
  };
  // Portfolio total — sums Crypto wallet (balances + staked) + non-crypto
  // server pools (FX + Sports). Shows the full multi-account picture.
  const baseTotal = React.useMemo(() => {
    let t = 0;
    Object.values(balances).forEach((v) => { t += (v || 0); });
    Object.values(staked).forEach((s) => { if (s && s.usd) t += s.usd; });
    t += effBal('fx', serverBalances.fx || 0);
    t += (serverBalances.sports || 0);
    return t;
  }, [balances, staked, serverBalances]);
  // Live total — moves gently with the market.
  const total = useLiveTick(baseTotal, { interval: 1800, vol: 0.0008, swayPct: 0.012 });

  // Synthetic historical baseline so the chart has data — scaled to current total.
  const RANGE_BASIS = { '1D': 0.995, '1W': 0.985, '1M': 0.92, '3M': 0.81, 'YTD': 0.62, '1Y': 0.50, 'ALL': 0.10 };
  const RANGE_POINTS = { '1D': 78, '1W': 84, '1M': 90, '3M': 120, 'YTD': 150, '1Y': 252, 'ALL': 220 };
  const open  = baseTotal * (RANGE_BASIS[range] || 0.9);
  const close = total;
  const series = React.useMemo(() => {
    const n = RANGE_POINTS[range] || 90;
    const real = (typeof alpexaPortfolioSeries === 'function')
      ? alpexaPortfolioSeries(range, n, close) : null;
    if (real && real.length > 3) return real;
    return makeChartSeries(open, close, n, 4242 + range.charCodeAt(0));
  }, [range, open, close]);
  const baseline = open;
  // Period chart baseline stays at `open`, but the color + headline change
  // track the live total against the steady centre (baseTotal). When the tick
  // dips below the centre, the up/down indicator flips red.
  const liveChange = total - baseTotal;
  const liveChangePct = baseTotal > 0 ? (liveChange / baseTotal) * 100 : 0;
  const change   = liveChange;
  const changePct = liveChangePct;
  const isUp = liveChange >= 0;
  const accent = isUp ? RH.green : RH.red;

  const SERVER_ROWS = ['crypto', 'fx', 'sports'].map((id) => ({
    id,
    code:  (typeof SERVERS !== 'undefined' && SERVERS[id]) ? SERVERS[id].code  : id,
    label: (typeof SERVERS !== 'undefined' && SERVERS[id]) ? SERVERS[id].label : id,
    bal: effBalances[id],
  }));


  // Sub-page view — opened when user taps a category row.
  if (subPage) {
    const cat = ACCOUNT_CATEGORIES.find((c) => c.id === subPage);
    const isSignOut = subPage === 'signout';
    const isActivity = subPage === 'orders';
    return (
      <Phone width={390} height={844} bg={RH.bg}>
        <StatusBar/>
        {subSub ? (
          <SubSubDetail id={subSub} onBack={() => setSubSub(null)} transactions={transactions} setTransactions={setTransactions} savedCards={savedCards} setSavedCards={setSavedCards} linkedBanks={linkedBanks} setLinkedBanks={setLinkedBanks} whitelist={whitelist} setWhitelist={setWhitelist} beneficiaries={beneficiaries} setBeneficiaries={setBeneficiaries}/>
        ) : (
        <>
        <div style={{
          padding: '6px 16px 8px', display: 'flex',
          alignItems: 'center', justifyContent: 'space-between',
        }}>
          <button onClick={() => setSubPage(null)} aria-label="Back" style={{
            width: 36, height: 36, borderRadius: 18,
            background: 'transparent', border: 'none', display: 'flex',
            alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
          }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M15 6 L9 12 L15 18"/>
            </svg>
          </button>
          <span style={{ fontSize: 15, fontWeight: 700, color: RH.text }}>
            {isSignOut ? 'Sign out' : (cat ? cat.title : 'Settings')}
          </span>
          <div style={{ width: 36 }}/>
        </div>
        <div className="alpexa-hide-scrollbar" style={{ flex: 1, overflowY: 'auto', padding: '8px 22px' }}>
          {isActivity ? (
            <ActivityList transactions={transactions}/>
          ) : !isSignOut && subPage ? (
            <AccountSubPageContent subPage={subPage} setSubSub={setSubSub} transactions={transactions} setTransactions={setTransactions} savedCards={savedCards} setSavedCards={setSavedCards} linkedBanks={linkedBanks} setLinkedBanks={setLinkedBanks} whitelist={whitelist} setWhitelist={setWhitelist} beneficiaries={beneficiaries} setBeneficiaries={setBeneficiaries}/>
          ) : isSignOut ? (
            <div style={{
              padding: '40px 12px', textAlign: 'center', fontFamily: 'Geist, Inter, system-ui',
            }}>
              <div style={{ fontSize: 22, fontWeight: 700, color: RH.text, letterSpacing: -0.4 }}>Sign out of Alpexa?</div>
              <div style={{ marginTop: 10, fontSize: 13.5, color: RH.textDim, lineHeight: 1.55 }}>
                You can sign back in quickly with Face ID or your password.
              </div>
              <button onClick={() => doSignOut()} style={{
                marginTop: 26, padding: '14px 28px', borderRadius: 999,
                background: RH.red, color: '#fff', border: 'none',
                fontSize: 14, fontWeight: 700, letterSpacing: 0.2, cursor: 'pointer',
                fontFamily: 'Geist, Inter, system-ui',
              }}>Sign out</button>
              <button onClick={() => setSubPage(null)} style={{
                marginTop: 12, display: 'block', margin: '12px auto 0',
                padding: '12px 28px', borderRadius: 999,
                background: 'transparent', color: RH.text,
                border: `1px solid ${RH.line}`,
                fontSize: 13, fontWeight: 600, cursor: 'pointer',
                fontFamily: 'Geist, Inter, system-ui',
              }}>Cancel</button>
            </div>
          ) : null}
        </div>
        </>
        )}
        {tabBar}
      </Phone>
    );
  }

  return (
    <Phone width={390} height={844} bg={RH.bg}>
      <StatusBar/>
      <div className="alpexa-hide-scrollbar" style={{ flex: 1, overflowY: 'auto' }}>
        {/* Header — "Portfolio overview" + alert bell + menu */}
        <div style={{
          padding: '6px 18px 0', display: 'flex',
          alignItems: 'center', justifyContent: 'space-between',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 16, fontWeight: 700, color: RH.text, letterSpacing: -0.2 }}>Portfolio overview</span>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="9"/>
              <path d="M12 8 V8.01 M12 11 V16"/>
            </svg>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <ServerSwitcher cryptoBal={Object.values(balances).reduce((a,v)=>a+(+v||0),0)+Object.values(staked).reduce((a,s)=>a+((s&&s.usd)||0),0)}/>
            <NotifBell onClick={() => setAlertsOpen(true)}/>
          </div>
        </div>

        {/* Big total balance + change */}
        <div style={{ padding: '12px 22px 0' }}>
          <div style={{
            fontSize: 30, fontWeight: 700, color: RH.text,
            letterSpacing: -0.8, fontVariantNumeric: 'tabular-nums', lineHeight: 1.05,
          }}>{(() => {
            const s = total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const i = s.lastIndexOf('.');
            return i < 0
              ? <>${s}</>
              : <>${s.slice(0, i)}<span style={{ color: RH.textMute }}>{s.slice(i)}</span></>;
          })()}</div>
          <div style={{
            marginTop: 6, display: 'flex', alignItems: 'center', gap: 6,
            fontSize: 13, fontWeight: 600,
            fontFamily: 'Geist Mono, monospace', fontVariantNumeric: 'tabular-nums',
          }}>
            <svg width="9" height="9" viewBox="0 0 24 24" fill={accent}>
              {isUp ? <path d="M12 4 L20 16 H4 Z"/> : <path d="M12 20 L4 8 H20 Z"/>}
            </svg>
            <span style={{ color: accent }}>${Math.abs(change).toFixed(2)}</span>
            <span style={{ color: accent }}>({isUp ? '+' : '-'}{Math.abs(changePct).toFixed(2)}%)</span>
          </div>
        </div>

        {/* Chart with Y-axis labels */}
        <div style={{ position: 'relative', marginTop: 10 }}>
          <Chart series={series} color={accent} baseline={baseline}/>
        </div>

        {/* Range tabs — pill chips */}
        <div style={{ padding: '4px 14px 14px' }}>
          <div style={{
            display: 'flex', justifyContent: 'space-between', gap: 4,
          }}>
            {['1D','1W','1M','3M','YTD','1Y','ALL'].map((r) => {
              const active = r === range;
              return (
                <button key={r} onClick={() => setRange(r)} style={{
                  flex: 1, padding: '7px 0', borderRadius: 999,
                  background: active ? `${accent}22` : 'transparent',
                  border: 'none', color: active ? accent : RH.textDim,
                  fontSize: 12, fontWeight: 700,
                  fontFamily: 'Geist Mono, monospace', letterSpacing: 0.6,
                  cursor: 'pointer',
                }}>{r}</button>
              );
            })}
          </div>
        </div>

        {/* Accounts — compact 3-column row */}
        <div style={{ padding: '8px 22px 0' }}>
          <div style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 10, color: RH.textDim,
            letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700,
            marginBottom: 8,
          }}>Accounts</div>
          <div style={{
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8,
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 12, padding: '12px 14px',
          }}>
            {SERVER_ROWS.map((s) => (
              <button key={s.id}
                onClick={() => { setSubPage('transfers'); setTimeout(() => setSubSub('transfers-internal'), 50); }}
                style={{
                  textAlign: 'left', background: 'transparent', border: 'none',
                  padding: 0, cursor: 'pointer',
                  fontFamily: 'Geist, Inter, system-ui',
                }}>
                <div style={{
                  fontSize: 10, color: RH.textDim,
                  fontFamily: 'Geist Mono, monospace',
                  letterSpacing: 0.8, textTransform: 'uppercase', fontWeight: 700,
                }}>{s.id === 'crypto' ? 'Crypto' : s.id === 'fx' ? 'FX' : 'Sport'}</div>
                <div style={{
                  marginTop: 4, fontSize: 13.5, fontWeight: 600, color: RH.text,
                  fontVariantNumeric: 'tabular-nums', letterSpacing: -0.2,
                }}>${s.bal.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Category list — Robinhood-style title + subtitle */}
        <div style={{ padding: '24px 0 0' }}>
          {ACCOUNT_CATEGORIES.map((c, i) => {
            // Trading & orders gets a live subtitle that reflects current
            // transactions, plus a blue blinking indicator.
            const isLive = c.id === 'orders';
            let dynamicDesc = c.desc;
            if (isLive) {
              const total = transactions.length;
              if (total > 0) {
                const last = transactions[0]; // newest first
                const mins = Math.max(1, Math.round((Date.now() - last.ts) / 60000));
                const ago = mins < 60 ? `${mins}m ago`
                          : mins < 1440 ? `${Math.round(mins / 60)}h ago`
                          : `${Math.round(mins / 1440)}d ago`;
                dynamicDesc = `${total} ${total === 1 ? 'order' : 'orders'} · last ${ago}`;
              } else {
                dynamicDesc = 'Live · no orders yet';
              }
            }
            return (
              <button key={c.id} onClick={() => setSubPage(c.id)} style={{
                width: '100%', textAlign: 'left',
                background: 'transparent', border: 'none',
                borderTop: `1px solid ${RH.line}`,
                padding: '18px 22px', display: 'flex', alignItems: 'center', gap: 14,
                cursor: 'pointer',
                fontFamily: 'Geist, Inter, system-ui',
              }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{
                    fontSize: 15, fontWeight: 700, color: RH.text, letterSpacing: -0.2,
                    display: 'inline-flex', alignItems: 'center', gap: 8,
                  }}>
                    <span>{c.title}</span>
                    {isLive ? (
                      <span style={{
                        position: 'relative', display: 'inline-flex',
                        alignItems: 'center', justifyContent: 'center',
                        width: 10, height: 10,
                      }}>
                        <span style={{
                          position: 'absolute', inset: 0, borderRadius: 5,
                          background: RH.accent,
                          animation: 'alpexa-live-ring 2.4s ease-out infinite',
                        }}/>
                        <span style={{
                          position: 'relative', width: 6, height: 6, borderRadius: 3,
                          background: RH.accent, boxShadow: `0 0 8px ${RH.accent}`,
                          animation: 'alpexa-live-blink 2.4s ease-in-out infinite',
                        }}/>
                      </span>
                    ) : null}
                  </div>
                  <div style={{
                    marginTop: 3, fontSize: 12,
                    color: isLive ? RH.text : RH.textDim,
                    letterSpacing: 0.1,
                    whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                    fontFamily: isLive ? 'Geist Mono, monospace' : 'Geist, Inter, system-ui',
                    fontVariantNumeric: 'tabular-nums',
                  }}>{dynamicDesc}</div>
                </div>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M9 6 L15 12 L9 18"/>
                </svg>
              </button>
            );
          })}
          <button onClick={() => setSubPage('signout')} style={{
            width: '100%', textAlign: 'left',
            background: 'transparent', border: 'none',
            borderTop: `1px solid ${RH.line}`,
            borderBottom: `1px solid ${RH.line}`,
            padding: '18px 22px', display: 'flex', alignItems: 'center',
            cursor: 'pointer', color: RH.red,
            fontFamily: 'Geist, Inter, system-ui',
          }}>
            <div style={{ fontSize: 15, fontWeight: 700 }}>Sign out</div>
          </button>
        </div>

        <div style={{ height: 18 }}/>
      </div>
    {tabBar}

// Unstake — flow opened from AssetDetail when a staked position is tapped.
// Flexible OR past maturity: full principal + accrued APY back to wallet.
// Locked & before maturity: hard-locked — cannot unstake until the term ends.
function Unstake({ onBack, sym, staked = {}, onUnstaked }) {
  const info = staked[sym] || { usd: 0, period: 'flexible' };
  const meta = PORTFOLIO.securities.find((s) => s.sym === sym)
            || PORTFOLIO.assets.find((a) => a.sym === sym)
            || { sym, name: sym, price: 1, apy: 5 };
  const apy = stakePeriodApy(sym, info.period);
  const principal = info.usd;
  // Real accrual — principal × APY × time staked.
  const accrued = stakeAccruedUsd(info, apy);
  // Hard lock: 90-day / 1-year terms cannot be unstaked before maturity.
  const locked = stakeIsLocked(info);
  const unlockDate = info.since ? new Date(stakeMaturity(info)).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '';
  const periodLabel = (STAKE_PERIODS.find(function(p){return p.id===info.period;})||{}).label || '';
  const finalAmt = principal + accrued;   // full principal + rewards (only when unlocked)

  const [confirmed, setConfirmed] = React.useState(false);
  const doUnstake = () => {
    if (locked) return;                    // can't unstake before maturity
    if (typeof AudioFX !== 'undefined') AudioFX.success();
    if (onUnstaked) onUnstaked(sym, finalAmt, accrued, principal);
    setConfirmed(true);
  };

  if (confirmed) {
    const coinAmt = finalAmt / ((meta.price) || 1);
    return (
      <HeroConfirm
        heroColor={RH.heroBlue}
        label={`$${finalAmt.toFixed(2)} unstaked`}
        sublabel={`${coinAmt.toFixed(6).replace(/\.?0+$/, '')} ${sym}`}
        rows={[
          { label: 'Principal',   value: `$${principal.toFixed(2)}` },
          { label: 'Accrued APY', value: `+$${accrued.toFixed(2)}` },
          { label: 'To wallet',   value: `$${finalAmt.toFixed(2)}` },
        ]}
        footnote={`Returned to your ${sym} balance. Rewards included.`}
        onDone={onBack}
      />
    );
  }

  return (
    <Phone width={390} height={844} bg={RH.bg}>
      <StatusBar/>
      <div style={{
        padding: '6px 16px 10px', display: 'flex',
        alignItems: 'center', justifyContent: 'space-between',
      }}>
        <button onClick={onBack} aria-label="Back" style={{
          width: 36, height: 36, borderRadius: 18,
          background: 'transparent', border: 'none', display: 'flex',
          alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 6 L9 12 L15 18"/>
          </svg>
        </button>
        <span style={{ fontSize: 16, fontWeight: 700, color: RH.text }}>Unstake {sym}</span>
        <div style={{ width: 36 }}/>
      </div>

      <div className="alpexa-hide-scrollbar" style={{ flex: 1, overflowY: 'auto', padding: '4px 22px 22px' }}>
        <div style={{
          padding: 16, background: RH.surface, border: `1px solid ${RH.line}`,
          borderRadius: 14, fontFamily: 'Geist, Inter, system-ui',
        }}>
          <div style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 10,
            color: locked ? RH.red : RH.textDim,
            letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700,
          }}>{locked ? 'Locked' : 'Unstake'}</div>
          <div style={{
            marginTop: 6, fontSize: locked ? 22 : 28, fontWeight: locked ? 700 : 600, color: RH.text,
            letterSpacing: -0.8, fontVariantNumeric: 'tabular-nums',
          }}>{locked ? `Locked until ${unlockDate}` : `$${finalAmt.toFixed(2)}`}</div>
          <div style={{ marginTop: 4, fontSize: 12, color: RH.textDim }}>
            {locked
              ? `Your ${periodLabel} stake unlocks at maturity — no early withdrawal`
              : info.period === 'flexible' ? 'Flexible stake — instant withdrawal' : 'Lock period complete'}
          </div>
        </div>

        {/* Breakdown */}
        <div style={{ marginTop: 14, padding: 14, background: RH.surface, border: `1px solid ${RH.line}`, borderRadius: 12 }}>
          <BreakRow label="Principal staked"
                    value={`$${principal.toFixed(2)}`} />
          <BreakRow label={`Accrued APY (${apy.toFixed(1)}%)`}
                    value={`+$${accrued.toFixed(2)}`}
                    colorValue={RH.green}/>
          <div style={{ height: 1, background: RH.line, margin: '8px 0' }}/>
          <BreakRow label={locked ? 'Available at maturity' : 'To wallet'} value={`$${finalAmt.toFixed(2)}`} strong/>
        </div>

        {locked ? (
          <div style={{
            marginTop: 10, padding: 10,
            background: RH.red + '15', border: `1px solid ${RH.red}55`,
            borderRadius: 10,
            fontFamily: 'Geist Mono, monospace', fontSize: 11,
            color: RH.red, letterSpacing: 0.4, textAlign: 'center',

            Locked until {unlockDate} — funds release with full rewards

        ) : null}

        <div style={{ height: 16 }}/>
        <button onClick={doUnstake} disabled={locked} style={{
          width: '100%', padding: '14px 0', borderRadius: 999,
          background: locked ? RH.surfaceUp : `${RH.green}26`,
          color: locked ? RH.textMute : RH.green,
          border: `1px solid ${locked ? RH.line : RH.green}`,

          cursor: locked ? 'not-allowed' : 'pointer',
        }}>{locked ? `Locked until ${unlockDate}` : `Unstake · $${finalAmt.toFixed(2)}`}</button>
      </div>

    </Phone>
  );
}

// Redeem — opened from AssetDetail for non-ALPXS securities (ALPX-RE1/CR2).
// Two paths: Standard (T+7, 0% fee) or Instant (immediate, 1% fee).
function Redeem({ onBack, sym, securityRedeemed = {}, onRedeemed, balances = {} }) {
  const { fees } = React.useContext(FeeConfigContext);
  const meta = PORTFOLIO.securities.find((s) => s.sym === sym)
            || { sym, name: sym, mine: 0, qty: 0, price: 1, apy: 0 };
  // Held amount: prefer the live `balances` value (post-buy/sell). If the
  // caller didn't pass balances (legacy), fall back to seed - redeemed.
  const heldUsd    = Math.max(
    0,
    (typeof balances !== 'undefined' && balances && balances[sym] != null)
      ? balances[sym]
      : ((meta.mine || 0) - (securityRedeemed[sym] || 0))
  );
  const heldShares = heldUsd / (meta.price || 1);

  const [mode, setMode] = React.useState('standard');
  const [confirmed, setConfirmed] = React.useState(false);

  const INSTANT_FEE_PCT = (fees.redeemInstantBps || 0) / 10000;
  const fee      = mode === 'instant' ? heldUsd * INSTANT_FEE_PCT : 0;
  const finalAmt = heldUsd - fee;
  const eta      = mode === 'standard' ? 'Settled in 7 business days' : 'Credited immediately';

  const doRedeem = () => {
    if (heldUsd <= 0) return;
    if (typeof AudioFX !== 'undefined') AudioFX.success();
    if (onRedeemed) onRedeemed(sym, heldUsd, finalAmt, mode);
    setConfirmed(true);
  };

  if (confirmed) {
    return (
      <HeroConfirm
        heroColor={RH.heroBlue}
        label={`$${finalAmt.toFixed(2)} redeemed`}
        sublabel={`${heldShares.toFixed(2)} ${sym}`}
        rows={[
          { label: 'Method',     value: mode === 'instant' ? 'Instant' : 'Standard · T+7' },
          { label: 'Fee',        value: mode === 'instant' ? `-$${fee.toFixed(2)}` : '$0.00' },
          { label: 'Settlement', value: mode === 'instant' ? 'Now' : '7 business days' },
          { label: 'To USDT',    value: `$${finalAmt.toFixed(2)}` },
        ]}
        footnote={mode === 'instant'
          ? `Your ${sym} position was fully redeemed. USDT was credited to your wallet immediately.`
          : `Your ${sym} redemption is queued. USDT will settle to your wallet in 7 business days at full NAV.`}
        onDone={onBack}
      />
    );
  }

  return (
    <Phone width={390} height={844} bg={RH.bg}>
      <StatusBar/>
      <div style={{
        padding: '6px 16px 10px', display: 'flex',
        alignItems: 'center', justifyContent: 'space-between',
