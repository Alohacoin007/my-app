// ─── TwoFAFullScreen — REAL TOTP 2FA (Supabase MFA) before a withdrawal ────
// Modes: loading → (verify | prompt). prompt → enroll. enroll/verify → done.
function TwoFAFullScreen({ item, onClose }) {
  const mfa = (window.AlpexaSync && AlpexaSync.db && AlpexaSync.db.auth && AlpexaSync.db.auth.mfa) ? AlpexaSync.db.auth.mfa : null;
  const [mode, setMode] = React.useState('loading'); // loading|verify|prompt|enroll
  const [factorId, setFactorId] = React.useState(null);
  const [challengeId, setChallengeId] = React.useState(null);
  const [enroll, setEnroll] = React.useState(null); // {qr, secret}
  const [digits, setDigits] = React.useState(['', '', '', '', '', '']);
  const [error,  setError]  = React.useState('');
  const [busy,   setBusy]   = React.useState(false);
  const inputsRef = React.useRef([]);
  const clearDigits = () => setDigits(['', '', '', '', '', '']);
  const focusFirst = () => setTimeout(() => { if (inputsRef.current[0]) inputsRef.current[0].focus(); }, 150);

  // Detect an enrolled, verified authenticator on mount.
  React.useEffect(() => {
    let alive = true;
    (async () => {
      if (!mfa) { if (alive) setMode('prompt'); return; }
      try {
        const r = await mfa.listFactors();
        if (!alive) return;
        const totp = (r && r.data && (r.data.totp || ((r.data.all || []).filter((f) => f.factor_type === 'totp')))) || [];
        const verified = totp.find((f) => f.status === 'verified');
        if (verified) {
          setFactorId(verified.id);
          try { const c = await mfa.challenge({ factorId: verified.id }); if (c && c.data) setChallengeId(c.data.id); } catch (e) {}
          if (alive) { setMode('verify'); focusFirst(); }
        } else if (alive) { setMode('prompt'); }
      } catch (e) { if (alive) setMode('prompt'); }
    })();
    return () => { alive = false; };
  }, []);

  const handleDigit = (idx, val) => {
    const digit = (val || '').replace(/\D/g, '').slice(-1);
    setError('');
    setDigits((arr) => { const next = [...arr]; next[idx] = digit; return next; });
    if (digit && idx < 5 && inputsRef.current[idx + 1]) inputsRef.current[idx + 1].focus();
  };
  const handleKeyDown = (idx, e) => {
    if (e.key === 'Backspace' && !digits[idx] && idx > 0 && inputsRef.current[idx - 1]) inputsRef.current[idx - 1].focus();
  };
  const handlePaste = (e) => {
    const text = (e.clipboardData || window.clipboardData).getData('text');
    const nums = (text || '').replace(/\D/g, '').slice(0, 6);
    if (!nums) return;
    e.preventDefault();
    const arr = ['', '', '', '', '', '']; nums.split('').forEach((c, i) => { arr[i] = c; });
    setDigits(arr);
    setTimeout(() => { const last = Math.min(nums.length, 5); if (inputsRef.current[last]) inputsRef.current[last].focus(); }, 0);
  };

  // Begin enrollment: get a QR + secret to scan, plus a challenge to verify it.
  const startEnroll = async () => {
    if (!mfa) { onClose(true); return; }
    setBusy(true); setError('');
    try {
      const r = await mfa.enroll({ factorType: 'totp' });
      if (r && r.error) { setError(r.error.message || 'Could not start 2FA setup'); setBusy(false); return; }
      const d = r.data;
      setFactorId(d.id);
      setEnroll({ qr: (d.totp && d.totp.qr_code) || '', secret: (d.totp && d.totp.secret) || '' });
      try { const c = await mfa.challenge({ factorId: d.id }); if (c && c.data) setChallengeId(c.data.id); } catch (e) {}
      clearDigits(); setMode('enroll'); setBusy(false); focusFirst();
    } catch (e) { setError('Setup failed — try again'); setBusy(false); }
  };

  // Verify the 6-digit code (works for both enroll-confirm and withdrawal-verify).
  const doVerify = async () => {
    const code = digits.join('');
    if (code.length !== 6 || !mfa || !factorId || busy) return;
    setBusy(true); setError('');
    try {
      let ch = challengeId;
      if (!ch) { const c = await mfa.challenge({ factorId }); ch = c && c.data && c.data.id; setChallengeId(ch); }
      const r = await mfa.verify({ factorId, challengeId: ch, code });
      if (r && r.error) {
        setError('Incorrect code — try again');
        try { if (typeof AudioFX !== 'undefined') AudioFX.reject(); } catch (e) {}
        clearDigits(); setBusy(false); focusFirst();
        try { const c2 = await mfa.challenge({ factorId }); setChallengeId(c2 && c2.data ? c2.data.id : null); } catch (e) { setChallengeId(null); }
        return;
      }
      onClose(true);
    } catch (e) { setError('Verification failed — try again'); setBusy(false); }
  };

  const submit = () => { if (mode === 'verify' || mode === 'enroll') doVerify(); };

  const hero = RH.accent;
  const filled = digits.join('').length;
  const headline = mode === 'enroll' ? 'Set up\n2FA' : '2-factor\nauthentication';
  const subline = mode === 'loading' ? 'Checking your security settings…'
    : mode === 'prompt' ? 'Protect withdrawals with an authenticator app (Google Authenticator, Authy, 1Password…).'
    : mode === 'enroll' ? 'Scan the QR with your authenticator app, then enter the 6-digit code it shows.'
    : 'Enter the 6-digit code from your authenticator app.';
  const Digits = () => (
    <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
      {digits.map((d, i) => (
        <input key={i} ref={(el) => inputsRef.current[i] = el}
          type="text" inputMode="numeric" maxLength={1} value={d}
          onChange={(e) => handleDigit(i, e.target.value)} onKeyDown={(e) => handleKeyDown(i, e)}
          onPaste={i === 0 ? handlePaste : undefined}
          style={{ width: 42, height: 54, textAlign: 'center', background: RH.surface,
            border: `1.5px solid ${error ? RH.red : (d ? RH.accent : RH.line)}`, borderRadius: 12,
            color: error ? RH.red : RH.text, fontSize: 24, fontWeight: 700, fontFamily: 'Geist Mono, monospace',
            fontVariantNumeric: 'tabular-nums', outline: 'none', caretColor: RH.accent,
            transition: 'border-color 140ms ease, color 140ms ease' }}/>
      ))}
    </div>
  );
  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 9999,
      background: 'rgba(8,10,16,0.55)',
      display: 'flex', justifyContent: 'center', alignItems: 'center',
      fontFamily: 'Geist, Inter, system-ui',
      animation: 'alpexa-modal-fade 200ms ease-out both',
    }}>
    <div style={{
      width: 390, maxWidth: '100%',
      height: 844, maxHeight: '100%',
      background: RH.bg,
      borderRadius: 36,
      display: 'flex', flexDirection: 'column',
      overflow: 'hidden', position: 'relative',
      boxShadow: '0 24px 64px rgba(0,0,0,0.5)',
    }}>
      {/* Hero with gradient bleed */}
      <div style={{
        background: hero, color: '#fff',
        padding: '6px 24px 56px', position: 'relative',
        flexShrink: 0, overflow: 'visible',
      }}>
        <div style={{
          position: 'absolute', left: 0, right: 0, top: '100%', height: 240,
          background: `linear-gradient(180deg, ${hero} 0%, ${RH.bg} 100%)`,
          pointerEvents: 'none', zIndex: 0,
        }}/>
        <button onClick={() => onClose(false)} aria-label="Back" style={{
          position: 'relative', zIndex: 1,
          width: 36, height: 36, borderRadius: 18,
          background: 'transparent', border: 'none', display: 'flex',
          alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 6 L9 12 L15 18"/>
          </svg>
        </button>
        <div style={{
          position: 'relative', zIndex: 1, marginTop: 60,
          width: 64, height: 64, borderRadius: 32,
          background: 'rgba(255,255,255,0.16)', border: '1.5px solid rgba(255,255,255,0.32)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 3 L5 6 V12 C5 16 8 19 12 20 C16 19 19 16 19 12 V6 L12 3 Z"/>
            <path d="M9 12 L11 14 L15 10"/>
          </svg>
        </div>
        <div style={{
          position: 'relative', zIndex: 1, marginTop: 22, whiteSpace: 'pre-line',
          fontSize: 32, fontWeight: 600, letterSpacing: -1, lineHeight: 1.1,
        }}>{headline}</div>
        <div style={{
          position: 'relative', zIndex: 1, marginTop: 12,
          fontSize: 13, color: 'rgba(255,255,255,0.78)',
          lineHeight: 1.5, maxWidth: 290,
        }}>
          {subline}
        </div>
      </div>

      {/* Body — mode-aware */}
      <div className="alpexa-hide-scrollbar" style={{
        flex: 1, padding: '30px 28px 0', position: 'relative', zIndex: 1,
        display: 'flex', flexDirection: 'column', alignItems: 'center', overflowY: 'auto',
      }}>
        {mode === 'loading' ? (
          <div style={{ marginTop: 36, fontSize: 13, color: RH.textDim }}>Checking…</div>
        ) : mode === 'prompt' ? (
          <div style={{ maxWidth: 300, textAlign: 'center', marginTop: 4 }}>
            <div style={{ fontSize: 13, color: RH.textDim, lineHeight: 1.6, marginBottom: 8 }}>
              No authenticator is set up yet. Add one to require a fresh code for every withdrawal — a big step up from passwords alone.
            </div>
            {error ? <div style={{ fontSize: 12, color: RH.red, fontWeight: 600 }}>{error}</div> : null}
          </div>
        ) : (
          <React.Fragment>
            {mode === 'enroll' && enroll ? (
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginBottom: 14 }}>
                {/^\s*<svg/i.test(enroll.qr)
                  ? <div style={{ width: 160, height: 160, background: '#fff', borderRadius: 12, padding: 8, boxSizing: 'border-box' }} dangerouslySetInnerHTML={{ __html: enroll.qr }}/>
                  : <img src={enroll.qr} alt="2FA QR" style={{ width: 160, height: 160, background: '#fff', borderRadius: 12, padding: 8, boxSizing: 'border-box' }}/>}
                <div style={{ marginTop: 9, fontSize: 10, color: RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 0.8, textAlign: 'center' }}>Can't scan? Enter this key:</div>
                <div style={{ marginTop: 3, fontSize: 11.5, color: RH.text, fontFamily: 'Geist Mono, monospace', wordBreak: 'break-all', maxWidth: 280, textAlign: 'center' }}>{enroll.secret}</div>
              </div>
            ) : null}
            <div style={{ fontSize: 10.5, color: RH.textDim, fontFamily: 'Geist Mono, monospace', letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700, marginBottom: 14 }}>Authenticator code</div>
            {Digits()}
            {error ? <div style={{ fontSize: 12, color: RH.red, fontWeight: 600, marginBottom: 6 }}>{error}</div> : null}
          </React.Fragment>
        )}
      </div>

      {/* CTA — mode-aware */}
      <div style={{ padding: '14px 22px 26px', position: 'relative', zIndex: 1 }}>
        {mode === 'prompt' ? (
          <React.Fragment>
            <button onClick={startEnroll} disabled={busy} style={{ width: '100%', padding: '16px 0', borderRadius: 999, background: RH.text, color: RH.bg, border: 'none', cursor: busy ? 'default' : 'pointer', fontSize: 15, fontWeight: 700, letterSpacing: 0.2, fontFamily: 'Geist, Inter, system-ui', opacity: busy ? 0.6 : 1 }}>{busy ? 'Setting up…' : 'Set up 2FA'}</button>
            <button onClick={() => onClose(true)} style={{ width: '100%', marginTop: 10, padding: '12px 0', borderRadius: 999, background: 'transparent', color: RH.textDim, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 600, fontFamily: 'Geist, Inter, system-ui' }}>Not now — continue without 2FA</button>
          </React.Fragment>
        ) : (mode === 'verify' || mode === 'enroll') ? (
          <button onClick={submit} disabled={filled !== 6 || busy} style={{ width: '100%', padding: '16px 0', borderRadius: 999, background: (filled === 6 && !busy) ? RH.text : RH.surfaceUp, color: (filled === 6 && !busy) ? RH.bg : RH.textMute, border: 'none', cursor: (filled === 6 && !busy) ? 'pointer' : 'not-allowed', fontSize: 15, fontWeight: 700, letterSpacing: 0.2, fontFamily: 'Geist, Inter, system-ui' }}>{busy ? 'Verifying…' : (mode === 'enroll' ? 'Verify & enable' : 'Verify')}</button>
        ) : null}
      </div>
    </div>
    </div>
  );
}

function AlpexaModal({ item, onClose }) {
  // Soft prompt chime when modal mounts.
  React.useEffect(() => {
    if (!item) return;
    if (typeof AudioFX !== 'undefined') AudioFX.prompt();
  }, [item]);
  // 2FA local digit state — reset on each new modal item.
  const [digits, setDigits] = React.useState(['', '', '', '', '', '']);
  const [twofaError, setTwofaError] = React.useState(false);
  const inputsRef = React.useRef([]);
  React.useEffect(() => {
    if (!item) return;
    setDigits(['', '', '', '', '', '']);
    setTwofaError(false);
    if (item.type === 'twofa') {
      setTimeout(() => { if (inputsRef.current[0]) inputsRef.current[0].focus(); }, 100);
    }
  }, [item]);
  if (!item) return null;
  if (item.type === 'twofa') return <TwoFAFullScreen item={item} onClose={onClose}/>;
  const isConfirm = item.type === 'confirm';
  const isTwofa   = false;

  const handleDigit = (idx, val) => {
    const digit = (val || '').replace(/\D/g, '').slice(-1);
    setTwofaError(false);
    setDigits((arr) => {
      const next = [...arr];
      next[idx] = digit;
      return next;
    });
    if (digit && idx < 5 && inputsRef.current[idx + 1]) {
      inputsRef.current[idx + 1].focus();
    }
  };
  const handleKeyDown = (idx, e) => {
    if (e.key === 'Backspace' && !digits[idx] && idx > 0 && inputsRef.current[idx - 1]) {
      inputsRef.current[idx - 1].focus();
    }
  };
  const handlePaste = (e) => {
    const text = (e.clipboardData || window.clipboardData).getData('text');
    const nums = (text || '').replace(/\D/g, '').slice(0, 6);
    if (!nums) return;
    e.preventDefault();
    const arr = ['', '', '', '', '', ''];
    nums.split('').forEach((c, i) => { arr[i] = c; });
    setDigits(arr);
    const last = Math.min(nums.length, 5);
    setTimeout(() => { if (inputsRef.current[last]) inputsRef.current[last].focus(); }, 0);
  };
  const submitTwofa = () => {
    const entered = digits.join('');
    if (entered.length !== 6) return;
    if (entered === item.code) {
      onClose(true);
    } else {
      setTwofaError(true);
      if (typeof AudioFX !== 'undefined') AudioFX.reject();
      setTimeout(() => { setDigits(['', '', '', '', '', '']); setTwofaError(false); if (inputsRef.current[0]) inputsRef.current[0].focus(); }, 600);
    }
  };

  return (
    <div onClick={() => onClose(false)} style={{
      position: 'absolute', inset: 0, zIndex: 9999,
      background: 'rgba(8,10,16,0.55)', backdropFilter: 'blur(6px)',

        {/* Shield icon for 2FA */}

          <div style={{
            width: 48, height: 48, borderRadius: 24,
            background: `${RH.accent}1A`, border: `1px solid ${RH.accent}40`,
            margin: '0 auto 12px', display: 'flex',
            alignItems: 'center', justifyContent: 'center',
          }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke={RH.accent} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 3 L5 6 V12 C5 16 8 19 12 20 C16 19 19 16 19 12 V6 L12 3 Z"/>
              <path d="M9 12 L11 14 L15 10"/>
            </svg>
          </div>
        ) : null}
        {item.title ? (
          <div style={{
            fontSize: 16, fontWeight: 700, color: RH.text,
            letterSpacing: -0.2, marginBottom: 8, textAlign: 'center',
          }}>{item.title}</div>

        ) : null}

        <button onClick={isTwofa ? submitTwofa : (() => onClose(true))}
          disabled={isTwofa && digits.join('').length !== 6}
          style={{
            width: '100%', padding: '15px 0', borderRadius: 999,
            background: (isTwofa && digits.join('').length !== 6) ? RH.surfaceUp : RH.accent,
            color: (isTwofa && digits.join('').length !== 6) ? RH.textMute : '#fff',
            border: 'none',
            fontSize: 15, fontWeight: 700,
            cursor: (isTwofa && digits.join('').length !== 6) ? 'not-allowed' : 'pointer',
            letterSpacing: 0.2,
            fontFamily: 'Geist, Inter, system-ui',
          }}>{isConfirm ? 'Confirm' : isTwofa ? 'Verify' : 'OK'}</button>
        {(isConfirm || isTwofa) ? (
          <button onClick={() => onClose(false)} style={{
            marginTop: 6, width: '100%', padding: '11px 0', borderRadius: 999,
            background: 'transparent', color: RH.textDim, border: 'none',
            fontSize: 13, fontWeight: 600, cursor: 'pointer',
            fontFamily: 'Geist, Inter, system-ui',
          }}>Cancel</button>
        ) : null}
      </div>
    </div>
  );
}

// AppRoot — owns identity + modal state, wraps everything in providers so any
// descendant (App and below) can read identity or fire alpexa.alert/confirm.
function AppRoot() {
  const [userName,  setUserName]  = usePersistedState('alpexa.userName',  'Jordan Reyes');
  const [userEmail, setUserEmail] = usePersistedState('alpexa.userEmail', 'admin@alpexa-suisse.com');
  // One-time migration of the old demo email so anyone with a stale value sees the new default.
  React.useEffect(() => {
    if (userEmail === 'demo@alpexa.app') setUserEmail('admin@alpexa-suisse.com');
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  // The logged-in account (alpexa.me) is the source of truth for the displayed
  // name/email — overrides the old "Jordan Reyes" demo default after login/signup.
  React.useEffect(() => {
    const sync = () => { try {
      const me = JSON.parse(localStorage.getItem('alpexa.me') || 'null');
      if (me && me.name  && me.name  !== userName)  setUserName(me.name);
      if (me && me.email && me.email !== userEmail) setUserEmail(me.email);
    } catch (e) {} };
    sync();
    const t = setTimeout(sync, 1200); // re-sync after identity auto-refresh settles
    return () => clearTimeout(t);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  const identity = React.useMemo(() => ({
    name: userName, email: userEmail,
    setName: setUserName, setEmail: setUserEmail,
  }), [userName, userEmail]);

  // ── Theme — persisted, applies palette synchronously before children render
  const [theme, setTheme] = usePersistedState('alpexa.theme', 'light');
  React.useMemo(() => { applyTheme(theme); }, [theme]);
  const themeApi = React.useMemo(() => ({ theme, setTheme }), [theme]);

  const [feeOverrides, setFeeOverrides] = usePersistedState('alpexa.fees', {});
  const fees = React.useMemo(() => ({ ...FEE_DEFAULTS, ...feeOverrides }), [feeOverrides]);
  const feeApi = React.useMemo(() => ({
    fees,
    setFees: (patch) => setFeeOverrides((cur) => ({ ...cur, ...patch })),
    resetFees: () => setFeeOverrides({}),
  }), [fees]);

  const [modalQueue, setModalQueue] = React.useState([]);
  const modalApi = React.useMemo(() => ({
    alert: (msg, opts = {}) => new Promise((resolve) => {
      setModalQueue((q) => [...q, { type: 'alert', msg, title: (opts && opts.title) || null, resolve }]);
    }),
    confirm: (msg, opts = {}) => new Promise((resolve) => {
      setModalQueue((q) => [...q, { type: 'confirm', msg, title: (opts && opts.title) || null, resolve }]);
    }),
    twofa: (opts = {}) => new Promise((resolve) => {
      // Real TOTP 2FA (Supabase MFA) — the screen handles enroll/verify itself.
      setModalQueue((q) => [...q, {
        type: 'twofa',
        title: (opts && opts.title) || '2-factor authentication',
        resolve,
      }]);
    }),
  }), []);
  const closeModal = React.useCallback((val) => {
    setModalQueue((q) => {
      if (q.length === 0) return q;
      try { q[0].resolve(val); } catch (_) {}
      return q.slice(1);
    });
  }, []);

  return (
    <ThemeContext.Provider value={themeApi}>
      <IdentityContext.Provider value={identity}>
        <FeeConfigContext.Provider value={feeApi}>
          <ModalContext.Provider value={modalApi}>
            <App/>
            <AlpexaModal item={modalQueue[0]} onClose={closeModal}/>
          </ModalContext.Provider>
        </FeeConfigContext.Provider>
      </IdentityContext.Provider>
    </ThemeContext.Provider>
  );
}

      if (isSecurity || !(window.AlpexaSync && AlpexaSync.db && acct)) {
        return Promise.resolve(clientSell());
      }
      // SERVER-AUTHORITATIVE sell at the server price. p_all liquidates the whole
      // position by quantity, so a client/server price gap can't reject "sell max".
      const held = (balances && +balances[assetId]) || 0;
      const isAll = held > 0 && usdAmount >= held - 0.01;
      window.__cbLocalTs = Date.now();
      return AlpexaSync.db.rpc('crypto_trade', {
        p_ref: 'cs-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8),
        p_acct: acct, p_symbol: assetId, p_usd: usdAmount, p_side: 'sell', p_markup: mkP, p_all: isAll,
      }).then((r) => {
        const d = r && r.data;
        if (!d || d.ok !== true) {
          const err = (d && d.error) || (r && r.error && r.error.message) || 'trade failed';
          if (/no price/i.test(err)) return clientSell();   // not in the server feed → client path
          return { ok: false, error: err };
        }
        const gross = (d.usd != null) ? +d.usd : usdAmount;
        const net   = (d.net != null) ? +d.net : gross;
        pushTx({ type: 'sell', sym: assetId, usd: gross, net });
        try { cryptoNotify({ type: 'fill', title: 'Sell filled', body: fmtUsd(gross) + ' of ' + assetId + ' → ' + fmtUsd(net) + ' USDT' }); } catch (e) {}
        const feeUsd = (d.fee != null) ? +d.fee : (gross * mkP / 100);
        if (feeUsd > 0) { try{ window.__alpexaSettle && window.__alpexaSettle({server:'crypto',kind:'crypto_fee',local_id:'sf-'+Date.now(),symbol:assetId,stake:feeUsd,pnl:0,detail:'sell markup '+mkP+'%'}); }catch(e){} }
        forceCryptoAdopt();
        flashAsset(assetId);
        return { ok: true };
      }, () => ({ ok: false, error: 'network error' }));
    } else {
      setPendingOrders((p) => [
        ...p,
        {
          id: Date.now(),
          sym: assetId,
          side: 'sell',
          type: order.type,
          trigger: order.triggerPrice,
          usd: usdAmount,
          coin: order.coinAmount,
          placedAt: Date.now(),
        },
      ]);
    }
  };
  // Securities redemption tracking — USD already taken out per sym.
  const [securityRedeemed, setSecurityRedeemed] = React.useState({});
  const onRedeemConfirmed = (sym, redeemedUsd, netUsd, mode) => {
    // Mark the security as redeemed (legacy tracker, still used by Dashboard).
    setSecurityRedeemed((m) => ({ ...m, [sym]: (m[sym] || 0) + redeemedUsd }));
    // Credit USDT (net of fee), and zero the source security balance so the
    // Securities row disappears from Dashboard once it's fully redeemed.
    setBalances((b) => ({
      ...b,
      USDT:  (b.USDT || 0) + netUsd,
      [sym]: Math.max(0, (b[sym] || 0) - redeemedUsd),
    }));
    pushTx({ type: 'redeem', sym, usd: redeemedUsd, net: netUsd, mode });
    setPulseAsset('USDT');
    setTimeout(() => setPulseAsset(null), 1400);
  };

  // Unstake → adds USD back to the asset balance, clears staked slot.
  const onUnstakeConfirmed = (sym, amount, accrued, principal) => {
    setBalances((b) => ({ ...b, [sym]: (b[sym] || 0) + amount }));
    setStaked((s) => { const next = { ...s }; delete next[sym]; return next; });
    var _acc = +accrued || 0, _prin = (principal != null ? +principal : (amount - _acc));
    // Record the principal returned, AND the staking reward (interest) as its own
    // history line so the customer sees what they earned — not just the lump sum.
    pushTx({ type: 'unstake', sym, usd: _prin });
    if (_acc > 0.005) pushTx({ type: 'reward', sym, usd: _acc, detail: 'Staking reward' });
    flashAsset(sym);
  };
  // Swap → deduct from source asset, credit destination asset (USD-denominated).
  const onSwapConfirmed = (fromSym, toSym, fromUsd, toUsd) => {
    setBalances((b) => ({
      ...b,
      [fromSym]: Math.max(0, (b[fromSym] || 0) - fromUsd),
      [toSym]:   (b[toSym] || 0) + toUsd,
    }));
    pushTx({ type: 'swap', sym: fromSym, usd: fromUsd, to: toSym, toUsd });
    // Record the swap fee (already deducted inside toUsd) for company P&L.
    try{var swFee=Math.max(0,Math.round((fromUsd-toUsd)*100)/100);
      if(swFee>0&&window.__alpexaSettle)window.__alpexaSettle({server:'crypto',kind:'crypto_fee',local_id:'sw-'+Date.now(),symbol:fromSym+'→'+toSym,stake:swFee,pnl:0,detail:'swap fee+slippage'});}catch(e){}
    flashAsset(toSym);
  };
  // Liquidate every non-stable position into USDT in a single atomic move.
  const onLiquidateAll = (expectedUsd) => {
    setBalances((b) => {
      let usdt = b.USDT || 0;
      const next = { ...b };
      Object.entries(b).forEach(([sym, v]) => {
        if (sym !== 'USDT' && v > 0) {
          usdt += v;
          next[sym] = 0;
        }

      next.USDT = usdt;
      return next;

    if (tab === 'home') {

// ─────────────────────────────────────────────────────────────
// LIVE PRICES — real crypto quotes from CoinGecko (free, no API key).
// Runs once before the app renders, swapping the demo prices in the
// PORTFOLIO / WATCHLIST / MARKET tables for today's real market prices.
// If the network is slow or blocked, it falls back to demo prices.
// ─────────────────────────────────────────────────────────────
const ALPEXA_LIVE_IDS = {
  BTC:'bitcoin', ETH:'ethereum', SOL:'solana', USDT:'tether', LINK:'chainlink',
  DOGE:'dogecoin', AVAX:'avalanche-2', MATIC:'matic-network', XRP:'ripple',
  BNB:'binancecoin', ADA:'cardano', DOT:'polkadot', TON:'the-open-network',
  NEAR:'near', APT:'aptos', TRX:'tron', ATOM:'cosmos', AAVE:'aave', UNI:'uniswap',
  MKR:'maker', USDC:'usd-coin', DAI:'dai', SHIB:'shiba-inu', PEPE:'pepe',
  BONK:'bonk', WIF:'dogwifcoin', WLD:'worldcoin-wld', RNDR:'render-token',
  FET:'fetch-ai', TAO:'bittensor',
};

function alpexaApplyLivePrices(data) {
  const tables = [];
  try { if (typeof PORTFOLIO !== 'undefined' && PORTFOLIO.assets)     tables.push(PORTFOLIO.assets); } catch (e) {}
  try { if (typeof PORTFOLIO !== 'undefined' && PORTFOLIO.securities) tables.push(PORTFOLIO.securities); } catch (e) {}
  try { if (typeof WATCHLIST !== 'undefined') tables.push(WATCHLIST); } catch (e) {}
  try { if (typeof MARKET    !== 'undefined') tables.push(MARKET);    } catch (e) {}
  let hits = 0;
  tables.forEach((arr) => {
    if (!arr) return;
    arr.forEach((row) => {
      const id = ALPEXA_LIVE_IDS[row.sym];
      const d  = id && data[id];
      if (d && typeof d.usd === 'number' && d.usd > 0) {
        row.price = d.usd;
        if (typeof d.usd_24h_change === 'number') row.chg = +d.usd_24h_change.toFixed(2);
        if (typeof row.qty === 'number') row.mine = +(row.qty * row.price).toFixed(2);
        hits++;
      }
    });
  });
  if (hits) window.__alpexaPricesReady = true;   // real prices are loaded → qty math is trustworthy
  return hits;
}

// SERVER price source — the Supabase `prices` table (filled by the crypto-prices
// Edge function). This is the AUTHORITATIVE, region-independent feed: it works
// even where Binance / CoinGecko are blocked (some regions/browsers), so coins
// NEVER vanish just because a client-direct exchange is unreachable. Maps the
// shared prices table (symbol, mid) onto MARKET / PORTFOLIO / WATCHLIST by symbol.
function alpexaApplyServerPrices(rows) {
  if (!rows || !rows.length) return 0;
  const bySym = {};
  rows.forEach((r) => { if (r && r.symbol && +r.mid > 0) bySym[r.symbol] = +r.mid; });
  const tables = [];
  try { if (typeof PORTFOLIO !== 'undefined' && PORTFOLIO.assets)     tables.push(PORTFOLIO.assets); } catch (e) {}
  try { if (typeof PORTFOLIO !== 'undefined' && PORTFOLIO.securities) tables.push(PORTFOLIO.securities); } catch (e) {}
  try { if (typeof WATCHLIST !== 'undefined') tables.push(WATCHLIST); } catch (e) {}
  try { if (typeof MARKET    !== 'undefined') tables.push(MARKET);    } catch (e) {}
  let hits = 0;
  tables.forEach((arr) => {
    if (!arr) return;
    arr.forEach((row) => {
      const p = bySym[row.sym];
      if (p > 0) { row.price = p; if (typeof row.qty === 'number') row.mine = +(row.qty * row.price).toFixed(2); hits++; }
    });
  });
  if (hits) { window.__alpexaPricesReady = true; window.__alpexaServerFeedLive = true; }
  return hits;
}
async function alpexaLoadServerPrices() {
  try {
    if (!(window.AlpexaSync && AlpexaSync.db)) return 0;
    const r = await AlpexaSync.db.from('prices').select('symbol,mid');
    if (!r || r.error || !r.data) return 0;
    return alpexaApplyServerPrices(r.data);
  } catch (e) { return 0; }
}

window.__alpexaSpark = window.__alpexaSpark || {};   // 7-day mini-chart data per symbol

async function alpexaLoadLivePrices() {
  const ids = Array.from(new Set(Object.values(ALPEXA_LIVE_IDS))).join(',');
  // One call returns price + 24h change + a 7-day sparkline for every coin.
  const url = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=' + ids +
              '&sparkline=true&price_change_percentage=24h&per_page=250&page=1';
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const arr = await res.json();
  const idToSym = {};
  Object.keys(ALPEXA_LIVE_IDS).forEach((s) => { idToSym[ALPEXA_LIVE_IDS[s]] = s; });
  const priceData = {};
  arr.forEach((c) => {
    priceData[c.id] = { usd: c.current_price, usd_24h_change: c.price_change_percentage_24h };
    const sym = idToSym[c.id];
    if (sym && c.sparkline_in_7d && Array.isArray(c.sparkline_in_7d.price)) {
      window.__alpexaSpark[sym] = c.sparkline_in_7d.price.filter((n) => typeof n === 'number' && n > 0);
    }
  });
  const hits = alpexaApplyLivePrices(priceData);
  console.log('[ALPEXA] live prices applied to', hits, 'rows; sparklines:', Object.keys(window.__alpexaSpark).length);
}

// Real historical chart data (CoinGecko market_chart). Cached per coin+span
// so flipping ranges / reopening a coin does not re-hit the network.
const __alpexaChartCache = {};
async function alpexaFetchChart(sym, range) {
  const id = ALPEXA_LIVE_IDS[sym];
  if (!id) return null;                          // not a real coin → keep synthetic
  if (range === '1m' || range === '5m') return null; // no free sub-5min data → synthetic
  const days = (range === '1W') ? 7 : 1;
  const key  = id + ':' + days;
  let full = __alpexaChartCache[key];
  if (!full) {
    const url = 'https://api.coingecko.com/api/v3/coins/' + id +
                '/market_chart?vs_currency=usd&days=' + days;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    full = (data.prices || []).map((p) => p[1]).filter((n) => typeof n === 'number' && n > 0);
    __alpexaChartCache[key] = full;
  }
  // days=1 is ~5-min data; slice the tail so shorter ranges zoom in.
  const TAIL = { '30m': 6, '1h': 12, '4h': 48 };
  if (days === 1 && TAIL[range]) {
    return full.length > TAIL[range] ? full.slice(-TAIL[range]) : full;
  }
  return full;                                   // 1D (24h) or 1W (7d)
}

// Resample an array down to exactly n points (even spacing).
function alpexaDownsample(arr, n) {
  if (!arr || arr.length <= n) return arr ? arr.slice() : [];
  const out = [];
  for (let i = 0; i < n; i++) out.push(arr[Math.round(i * (arr.length - 1) / (n - 1))]);
  return out;
}

// Real portfolio value history = sum of (qty x each holding's 7-day price line),
// 1D uses the last ~24h slice, then normalized to end at the current total.
function alpexaPortfolioSeries(range, n, endValue) {
  const spark = window.__alpexaSpark || {};
  const assets = (typeof PORTFOLIO !== 'undefined' && PORTFOLIO.assets) ? PORTFOLIO.assets : [];
  let len = 0;
  assets.forEach((a) => { const s = spark[a.sym]; if (s && s.length > len) len = s.length; });
  if (len < 4) return null;
  let W = new Array(len).fill(0); let any = false;
  assets.forEach((a) => {
    const s = spark[a.sym];
    if (s && s.length) {
      any = true;
      for (let i = 0; i < len; i++) W[i] += (a.qty || 0) * s[Math.round(i * (s.length - 1) / (len - 1))];
    }
  });
  if (!any) return null;
  if (range === '1D' && W.length > 24) W = W.slice(-24);
  const last = W[W.length - 1] || 1;
  const factor = (endValue && last) ? endValue / last : 1;
  return alpexaDownsample(W.map((v) => v * factor), n);
}

(async () => {
  try {
    // Server prices FIRST (Supabase — reachable everywhere, even where Binance/
    // CoinGecko are blocked). Then CoinGecko for 24h-change + sparklines. Either
    // alone is enough to render real prices, so a blocked exchange never blanks
    // the wallet. Whichever resolves first lets us render without waiting.
    await Promise.race([
      alpexaLoadServerPrices(),
      alpexaLoadLivePrices(),
      new Promise((res) => setTimeout(res, 5000)),
    ]);
    alpexaLoadLivePrices().catch(() => {});   // fill sparklines/24h in the background
  } catch (e) {
    console.warn('[ALPEXA] live prices unavailable, using demo prices —', e.message);
  }
  ReactDOM.createRoot(document.getElementById('phone')).render(<AppRoot/>);
})();

// Keep MARKET prices fresh from the SERVER even when the Binance/Coinbase
// WebSocket is blocked (region/browser). Polling the shared `prices` table is
// what makes holdings show correctly EVERYWHERE — not only where Binance works.
(function () {
  function poll() { try { alpexaLoadServerPrices().catch(function () {}); } catch (e) {} }
  setTimeout(poll, 800); setTimeout(poll, 2500);   // early catch-up if AlpexaSync wasn't ready at startup
  setInterval(function () { if (!document.hidden) poll(); }, 8000);
})();

// Mobile fit: stretch the fixed 390x844 design to fill the REAL visible viewport.
// Uses visualViewport so it auto-corrects when Safari's address bar shows/hides
// (no more manual nudge after switching servers).
(function(){
  var root=document.documentElement;
  var baseH=0; // largest stable viewport height seen (keyboard closed)
  var phoneEl=document.getElementById('phone');
  function fit(){
    if(window.innerWidth<=600){
      if(phoneEl){ phoneEl.style.zoom=''; phoneEl.style.transform=''; }  // mobile = full screen, no scale
      var w=(window.visualViewport&&window.visualViewport.width)||window.innerWidth;
      var h=(window.visualViewport&&window.visualViewport.height)||window.innerHeight;
      var s=w/390;                                  // UNIFORM scale by width — no squished text
      root.style.setProperty('--ph-s', s);
      // Keyboard open (viewport shrinks >150px): DON'T bump baseH, so the full height
      // restores when the keyboard closes. But still re-fit the frame to the *visible*
      // height — otherwise the bottom CTA (Withdraw / Verify & send) sits below the
      // keyboard, off-screen and unreachable. Shrinking the frame keeps it visible.
      var keyboardOpen = baseH && h < baseH - 150;
      if(!keyboardOpen && h > baseH) baseH = h;
      root.style.setProperty('--ph-ph', (h/s)+'px'); // design height so scaled = real height
      root.style.setProperty('--ph-vh', h+'px');
    } else {
      // Wide / desktop preview: shrink the fixed 390×844 mock so the WHOLE phone —
      // including the bottom buttons on EVERY screen — always fits the window. Using
      // CSS zoom (not transform) also shrinks the layout box, so it centers cleanly
      // with no overflow/scroll. This is global: one fit covers all screens.
      // Desktop preview: no scaling (it broke rendering / isn't universally supported).
      // The phone height is capped via CSS (.phone-shell max-height) so its internal
      // scroll keeps the bottom buttons visible. Clear any stale inline scale.
      if(phoneEl){ phoneEl.style.transform=''; phoneEl.style.zoom=''; }
      root.style.removeProperty('--ph-s');
      root.style.removeProperty('--ph-ph');
      root.style.removeProperty('--ph-vh');
    }
  }
  fit();
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', function(){ baseH=0; fit(); setTimeout(fit,300); });
  if(window.visualViewport){ window.visualViewport.addEventListener('resize', fit); window.visualViewport.addEventListener('scroll', fit); }
  // catch the address-bar settle right after load
  [60,150,300,600,1000].forEach(function(ms){ setTimeout(fit, ms); });
})();
</script>

<script>
/* Report crypto holdings + stakes to the server for the back office. */
(function(){
  function meX(){try{var m=JSON.parse(localStorage.getItem('alpexa.me')||'null');return m&&m.accts?m:null;}catch(e){return null;}}
  // M4-1: Identity auto-refresh. On every load, pull THIS user's current cust_id +
  // account numbers from the server and rewrite alpexa.me. This kills cust_id drift
  // structurally (no re-login needed) so positions/online/P&L always line up.
  function refreshMe(){ try{
    if(!window.AlpexaSync||!AlpexaSync.db)return;
    var m; try{m=JSON.parse(localStorage.getItem('alpexa.me')||'null');}catch(e){return;}
    if(!m||(!m.authId&&!m.email))return;
    var q=AlpexaSync.db.from('players').select('id,cust_id,name,email,auth_id');
    if(m.authId) q=q.eq('auth_id',m.authId); else q=q.ilike('email',m.email);
    q.order('created_at',{ascending:true}).limit(1).then(function(r){
      var p=r&&r.data&&r.data[0]; if(!p)return;
      AlpexaSync.db.from('accounts').select('server,acct_no').eq('player_id',p.id).then(function(r2){
        var accts={}; (r2&&r2.data||[]).forEach(function(a){ accts[a.server]=a.acct_no; });
        if(!accts.fx&&!accts.crypto&&!accts.sports)return; // never wipe identity if accounts are missing
        var merged=Object.assign({},m,{custId:p.cust_id,name:p.name||m.name,email:p.email||m.email,authId:p.auth_id||m.authId,accts:accts});
        localStorage.setItem('alpexa.me',JSON.stringify(merged));
      },function(){});
    },function(){});
  }catch(e){} }
  setTimeout(refreshMe,800);
  // Record one finished event (trade fee etc.) on the server for company P&L.
  window.__alpexaSettle=function(rec){ try{ if(!window.AlpexaSync||!AlpexaSync.db)return; var m=meX(); if(!m)return;
    AlpexaSync.db.from('settlements').insert({cust_id:m.custId,acct_no:(m.accts&&m.accts[rec.server])||'',server:rec.server||'',kind:rec.kind||'',local_id:String(rec.local_id||''),ticket:String(rec.ticket||''),symbol:rec.symbol||'',stake:Math.round((+rec.stake||0)*100)/100,pnl:Math.round((+rec.pnl||0)*100)/100,detail:rec.detail||''}).then(function(){},function(){});
  }catch(e){} };
  function push(){
    if(!window.AlpexaSync||!AlpexaSync.db)return;
    var m=meX(); if(!m||!m.accts.crypto)return; var cust=m.custId, acct=m.accts.crypto;
    AlpexaSync.db.from('players').update({last_seen:new Date().toISOString(),last_app:'crypto'}).eq('cust_id',cust).then(function(){},function(){});
    var items=[];
    try{var h=JSON.parse(localStorage.getItem('alpexa.cryptoHoldings')||'{}')||{};
      Object.keys(h).forEach(function(sym){ if(sym==='USDT')return; var v=+h[sym]||0; if(v<=0)return;
        items.push({cust_id:cust,acct_no:acct,server:'crypto',kind:'holding',local_id:sym,symbol:sym,side:'',stake:v,status:'open'});});
      var st=JSON.parse(localStorage.getItem('alpexa.staked')||'{}')||{};
      Object.keys(st).forEach(function(sym){ var info=st[sym]; var v=info&&info.usd?+info.usd:0; if(v<=0)return;
        items.push({cust_id:cust,acct_no:acct,server:'crypto',kind:'stake',local_id:'stk-'+sym,symbol:sym,side:'STAKE',stake:v,status:'open'});});
    }catch(e){}
    AlpexaSync.db.from('positions').delete().eq('cust_id',cust).eq('server','crypto').then(function(){
      if(items.length)AlpexaSync.db.from('positions').insert(items).then(function(){},function(){});
    },function(){});
  }
  setTimeout(push,2000); setInterval(function(){ if(!document.hidden){ push(); } else { window.__bgPosPush=window.__bgPosPush||0; if(Date.now()-window.__bgPosPush>9000){ window.__bgPosPush=Date.now(); push(); } } },3000);
  // Dealing-desk: per-coin buy/sell markup % set in the back office.
  window.__alpexaCryptoMarks=window.__alpexaCryptoMarks||{};
  function pullCryptoMarks(){ if(!window.AlpexaSync||!AlpexaSync.db)return;
    AlpexaSync.db.from('pricing_marks').select('symbol,markup_pts').then(function(r){
      if(r&&r.data){ var m={}; r.data.forEach(function(p){ m[p.symbol]=Math.max(0,Math.min(50,+p.markup_pts||0)); }); window.__alpexaCryptoMarks=m; }
    },function(){}); }
  setTimeout(pullCryptoMarks,1300); setInterval(function(){ if(!document.hidden) pullCryptoMarks(); },5000);
  // Kill switch: read the back-office trading-halt flag.
  window.__alpexaHalt=false;
  function pullHalt(){ if(!window.AlpexaSync||!AlpexaSync.db)return;
    AlpexaSync.db.from('controls').select('val').eq('key','trading_halt').limit(1).then(function(r){
      window.__alpexaHalt=!!(r&&r.data&&r.data[0]&&r.data[0].val==='1'); },function(){}); }
  setTimeout(pullHalt,1500); setInterval(function(){ if(!document.hidden) pullHalt(); },5000);
  // Instant: when holdings/stakes change (a trade happened), push right away.
  // Amounts rounded to cents so price ticks don't fire it.
  function posSig(){try{var h=JSON.parse(localStorage.getItem('alpexa.cryptoHoldings')||'{}')||{};var st=JSON.parse(localStorage.getItem('alpexa.staked')||'{}')||{};
    return Object.keys(h).map(function(k){return k+':'+Math.round((+h[k]||0)*100);}).join(',')+'|'+Object.keys(st).join(',');}catch(e){return'';}}
  var _psig=posSig();
  setInterval(function(){var n=posSig(); if(n!==_psig){_psig=n; if(!document.hidden)push();}},700);
  // Lightweight presence heartbeat — runs even in the background.
  function beat(){ if(!window.AlpexaSync||!AlpexaSync.db)return; var m=meX(); if(!m)return;
    var patch={last_seen:new Date().toISOString(),last_app:'crypto'};
    if(m.email) AlpexaSync.db.from('players').update(patch).ilike('email',m.email).then(function(){},function(){});
    else if(m.custId) AlpexaSync.db.from('players').update(patch).eq('cust_id',m.custId).then(function(){},function(){}); }
  setTimeout(beat,1500); setInterval(beat,8000);
  document.addEventListener('visibilitychange',function(){ if(!document.hidden) beat(); });
  /* Execute back-office commands (liquidate holding/stake to USDT). */
  function runCmds(){
    if(!window.AlpexaSync||!AlpexaSync.db)return; var m=meX(); if(!m||!m.accts.crypto)return; var cust=m.custId;
    AlpexaSync.db.from('commands').select('*').eq('cust_id',cust).eq('server','crypto').eq('status','pending').then(function(r){
      if(!r||!r.data||!r.data.length)return;
      r.data.forEach(function(c){ try{
        if(c.action==='set_balance'){ if(window.__alpexaCryptoSetBal) window.__alpexaCryptoSetBal(parseFloat(c.local_id)); }
        else if(window.__alpexaCryptoLiquidate) window.__alpexaCryptoLiquidate(c.local_id); }catch(e){}
        AlpexaSync.db.from('commands').update({status:'done'}).eq('id',c.id).then(function(){},function(){}); });
      setTimeout(push,1000);
    },function(){});
  }
  setTimeout(runCmds,4000); setInterval(function(){if(!document.hidden)runCmds();},4000);
})();
</script>
