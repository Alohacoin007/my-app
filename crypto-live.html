          width: 36, height: 36, borderRadius: 18,
          background: 'transparent', border: 'none', display: 'flex',
          alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 6 L9 12 L15 18"/>
          </svg>
        </button>
        <span style={{ fontSize: 16, fontWeight: 700, color: RH.text }}>Redeem {sym}</span>
        <div style={{ width: 36 }}/>
      </div>

      <div className="alpexa-hide-scrollbar" style={{ flex: 1, overflowY: 'auto', padding: '4px 22px 22px' }}>
        {/* Holdings summary */}
        <div style={{
          padding: 14, background: RH.surface, border: `1px solid ${RH.line}`,
          borderRadius: 14, fontFamily: 'Geist, Inter, system-ui',
        }}>
          <div style={{
            fontFamily: 'Geist Mono, monospace', fontSize: 10, color: RH.textDim,
            letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700,
          }}>You hold</div>
          <div style={{
            marginTop: 6, fontSize: 28, fontWeight: 600, color: RH.text,
            letterSpacing: -0.8, fontVariantNumeric: 'tabular-nums',
          }}>${heldUsd.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
          <div style={{
            marginTop: 4, fontSize: 12, color: RH.textDim,
            fontFamily: 'Geist Mono, monospace', letterSpacing: 0.3,
            fontVariantNumeric: 'tabular-nums',
          }}>
            {heldShares.toFixed(2)} {sym} · {sym === 'ALPX-RE1' ? 'Real Estate fund' : sym === 'ALPX-CR2' ? 'Credit fund' : 'Fund'}
          </div>
        </div>

        {/* Mode options */}
        <div style={{
          marginTop: 14, fontFamily: 'Geist Mono, monospace', fontSize: 10,
          color: RH.textDim, letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700,
          padding: '0 4px',
        }}>Redemption method</div>

        <button onClick={() => setMode('standard')} style={{
          marginTop: 8, width: '100%', textAlign: 'left',
          padding: 14, background: RH.surface,
          border: `1px solid ${mode === 'standard' ? RH.green : RH.line}`,
          borderRadius: 14, cursor: 'pointer',
          fontFamily: 'Geist, Inter, system-ui',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: RH.text }}>Standard · T+7</div>
            <div style={{
              fontSize: 11, fontWeight: 700, color: RH.green,
              padding: '2px 8px', borderRadius: 6, background: RH.green + '22',
              fontFamily: 'Geist Mono, monospace', letterSpacing: 0.6,
            }}>0% fee</div>
          </div>
          <div style={{ marginTop: 6, fontSize: 12, color: RH.textDim, fontFamily: 'Geist Mono, monospace' }}>
            Receive ${heldUsd.toFixed(2)} in 7 business days
          </div>
        </button>

        <button onClick={() => setMode('instant')} style={{
          marginTop: 8, width: '100%', textAlign: 'left',
          padding: 14, background: RH.surface,
          border: `1px solid ${mode === 'instant' ? RH.green : RH.line}`,
          borderRadius: 14, cursor: 'pointer',
          fontFamily: 'Geist, Inter, system-ui',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: RH.text }}>Instant</div>
            <div style={{
              fontSize: 11, fontWeight: 700, color: RH.red,
              padding: '2px 8px', borderRadius: 6, background: RH.red + '22',
              fontFamily: 'Geist Mono, monospace', letterSpacing: 0.6,
            }}>1% fee</div>
          </div>
          <div style={{ marginTop: 6, fontSize: 12, color: RH.textDim, fontFamily: 'Geist Mono, monospace' }}>
            Receive ${(heldUsd * (1 - INSTANT_FEE_PCT)).toFixed(2)} now
          </div>
        </button>

        {/* Breakdown */}
        <div style={{ marginTop: 14, padding: 14, background: RH.surface, border: `1px solid ${RH.line}`, borderRadius: 12 }}>
          <BreakRow label="Redemption value" value={`$${heldUsd.toFixed(2)}`}/>
          <BreakRow label={mode === 'instant' ? 'Instant fee (1%)' : 'Settlement fee'}
                    value={mode === 'instant' ? `-$${fee.toFixed(2)}` : '$0.00'}
                    colorValue={mode === 'instant' ? RH.red : RH.text}/>
          <div style={{ height: 1, background: RH.line, margin: '8px 0' }}/>
          <BreakRow label={mode === 'standard' ? 'Credit in 7 days' : 'To USDT now'}
                    value={`$${finalAmt.toFixed(2)}`} strong/>
        </div>

        <div style={{ height: 16 }}/>
        <button onClick={doRedeem} disabled={heldUsd <= 0} style={{
          width: '100%', padding: '14px 0', borderRadius: 999,
          background: heldUsd > 0 ? `${RH.red}26` : RH.surfaceUp,
          color: heldUsd > 0 ? RH.red : RH.textMute,
          border: heldUsd > 0 ? `1px solid ${RH.red}` : 'none',
          cursor: heldUsd > 0 ? 'pointer' : 'not-allowed',
          fontSize: 14, fontWeight: 700, letterSpacing: 0.2,
        }}>
          {heldUsd > 0
            ? `Redeem · $${finalAmt.toFixed(2)} (${mode === 'instant' ? 'now' : 'T+7'})`
            : 'Nothing to redeem'}
        </button>
      </div>

    </Phone>
  );
}

// Asset detail — full screen. Tapped from Dashboard rows.
// Same surface for: Crypto (BTC/ETH/SOL/USDT/LINK), ALPXS, plain Securities
// (ALPX-RE1/CR2), and Staked positions. Actions branch by kind.
function AssetDetail({ onBack, kind, sym, balances = {}, staked = {}, transactions = [],
                       onBuy, onSell, onStake, onUnstake, onRedeem,
                       inTab = false, onSwitchAsset, tabBar }) {
  const alpexa = React.useContext(ModalContext);
  const { fees } = React.useContext(FeeConfigContext);
  const [range, setRange] = React.useState('5m');
  const [scrubIdx, setScrubIdx] = React.useState(null);
  const [switcherOpen, setSwitcherOpen] = React.useState(false);
  const [alertsOpen, setAlertsOpen] = React.useState(false);
  // Re-check once a minute so the daily interest step shows up when the day rolls over.
  const [, forceAccrue] = React.useState(0);
  React.useEffect(() => { const iv = setInterval(() => forceAccrue((x) => x + 1), 60000); return () => clearInterval(iv); }, []);

  const cryptoMeta = PORTFOLIO.assets.find((a) => a.sym === sym);
  const secMeta    = PORTFOLIO.securities.find((s) => s.sym === sym);
  const marketMeta = (typeof MARKET !== 'undefined') ? MARKET.find((m) => m.sym === sym) : null;
  const meta = cryptoMeta || secMeta || marketMeta || { sym, name: sym, price: 1, seed: 100, chg: 0 };
  const isStaked   = kind === 'staked';
  const isSecurity = kind === 'security' && !isStaked;
  const isCrypto   = kind === 'crypto';
  const isALPXS    = sym === 'ALPXS';
  const fullName = meta.name
                || (typeof COIN_NAMES !== 'undefined' && COIN_NAMES[sym])
                || sym;

  // Live tick + chart series
  const livePrice = useLiveTick(meta.price || 1, tickProfile(sym));
  const RANGE_POINTS = { '1m': 60, '5m': 60, '30m': 60, '1h': 60, '4h': 96, '1D': 78, '1W': 84 };
  const RANGE_OPEN   = { '1m': 0.9998, '5m': 0.999, '30m': 0.997, '1h': 0.995, '4h': 0.99, '1D': 0.981, '1W': 0.965 };
  const close = livePrice;
  const open  = (meta.price || 1) * (sym === 'ALPXS' ? 0.9 : (RANGE_OPEN[range] || 0.98));

  // Real historical chart data (CoinGecko) for the wider ranges; falls back
  // to the synthetic series for very short ranges or if the fetch fails.
  const [realSeries, setRealSeries] = React.useState(null);
  React.useEffect(() => {
    let alive = true;
    setRealSeries(null);
    if (typeof alpexaFetchChart === 'function') {
      alpexaFetchChart(sym, range)
        .then((arr) => { if (alive && arr && arr.length > 3) setRealSeries(arr); })
        .catch(() => {});
    }
    return () => { alive = false; };
  }, [sym, range]);

  const synthSeries = React.useMemo(() => {
    const n = RANGE_POINTS[range] || 78;
    return makeChartSeries(open, close, n, (meta.seed || 100) + range.charCodeAt(0));
  }, [range, sym, open, close]);
  const usingReal = !!(realSeries && realSeries.length > 3);
  // Append the live aggregator price so the chart tip tracks the market in real time.
  const series    = usingReal ? realSeries.concat([close]) : synthSeries;
  const baseline  = usingReal ? series[0] : open;
  const scrubPrice = scrubIdx !== null && series[scrubIdx] != null ? series[scrubIdx] : close;
  const chartChange = scrubPrice - baseline;
  const chartPct    = (chartChange / baseline) * 100;
  const chartIsUp   = chartChange >= 0;
  const accentColor = chartIsUp ? RH.green : RH.red;

  // Trade prices: tiny spread between sell (bid) and buy (ask).
  const SPREAD_BPS = (fees.buySpreadBps || 2) / 10000;
  const bidPrice = livePrice * (1 - SPREAD_BPS);
  const askPrice = livePrice * (1 + SPREAD_BPS);

  // Holdings
  let holdingUsd = 0, holdingCoin = 0;
  let lockPeriod = null, accruedUsd = 0;
  if (isStaked) {
    const info = staked[sym] || { usd: 0, period: 'flexible' };
    holdingUsd  = info.usd;
    holdingCoin = info.usd / (meta.price || 1);
    lockPeriod  = info.period;
    accruedUsd  = stakeAccruedUsd(info, stakePeriodApy(sym, info.period));
  } else if (isCrypto || isALPXS) {
    holdingUsd  = balances[sym] || 0;
    holdingCoin = holdingUsd / (meta.price || 1);
  } else if (isSecurity) {
    holdingUsd  = balances[sym] || 0;
    holdingCoin = (meta.price && meta.price > 0) ? (holdingUsd / meta.price) : 0;
  }

  const ranges = ['1m','5m','30m','1h','4h','1D','1W'];
  const fmtUsd = (v) => { const a=Math.abs(v); let d=2; if(a>0&&a<0.01) d=Math.min(10,Math.max(2,2-Math.floor(Math.log10(a)))); return v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); };

  return (
    <Phone width={390} height={844} bg={RH.bg}>
      <StatusBar/>

      {/* Header — back + top-right icons */}
      <div style={{
        padding: '6px 16px 8px', display: 'flex',
        alignItems: 'center', justifyContent: 'space-between', flexShrink: 0,
      }}>
        {inTab ? (
          <button onClick={() => setSwitcherOpen((o) => !o)} aria-label="Switch asset" style={{
            display: 'flex', alignItems: 'center', gap: 6,
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 999, padding: '6px 12px', cursor: 'pointer',
          }}>
            <AssetIcon sym={sym} size={18}/>
            <span style={{ fontSize: 13, fontWeight: 700, color: RH.text }}>{sym}</span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{
              transform: switcherOpen ? 'rotate(180deg)' : 'rotate(0deg)',
              transition: 'transform 200ms ease',
            }}>
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </button>
        ) : (
          <button onClick={onBack} aria-label="Back" style={{
            width: 36, height: 36, borderRadius: 18,
            background: 'transparent', border: 'none', display: 'flex',
            alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
          }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M15 6 L9 12 L15 18"/>
            </svg>
          </button>
        )}
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {/* Server switcher + bell removed from the Trade/detail page for a cleaner header. */}
        </div>
      </div>

      {switcherOpen ? (() => {
        // Build universe (PORTFOLIO assets + securities + MARKET + held tokens + history)
        const _seen = new Set();
        const UNI = [];
        const push = (a) => { if (a && !_seen.has(a.sym)) { _seen.add(a.sym); UNI.push(a); } };
        PORTFOLIO.assets.forEach(push);
        PORTFOLIO.securities.forEach(push);
        if (typeof MARKET !== 'undefined') MARKET.forEach(push);
        Object.keys(balances).forEach((s) => {
          if (!_seen.has(s) && (balances[s] || 0) > 0) {
            const m = (typeof MARKET !== 'undefined' && MARKET.find((x) => x.sym === s)) || {};
            push({ sym: s, name: (typeof COIN_NAMES !== 'undefined' && COIN_NAMES[s]) || m.name || s, price: m.price || 1, chg: m.chg || 0, stable: !!m.stable });
          }
        });
        // History — newest-first since pushTx prepends
        const histRank = new Map();
        const _txArr = Array.isArray(transactions) ? transactions : [];
        const addHist = (sm) => { if (sm && !histRank.has(sm)) histRank.set(sm, histRank.size); };
        for (let i = 0; i < _txArr.length; i++) { const t = _txArr[i]; if (!t) continue; addHist(t.sym); addHist(t.to); }
        // Inject history-only syms not in catalog
        histRank.forEach((_r, s) => {
          if (!_seen.has(s)) {
            const m = (typeof MARKET !== 'undefined' && MARKET.find((x) => x.sym === s)) || {};
            push({ sym: s, name: (typeof COIN_NAMES !== 'undefined' && COIN_NAMES[s]) || m.name || s, price: m.price || 1, chg: m.chg || 0, stable: !!m.stable });
          }
        });
        const all = UNI.filter((a) => !a.stable);
        const held = [], recent = [], rest = [];
        all.forEach((a) => {
          if ((balances[a.sym] || 0) > 0) held.push(a);
          else if (histRank.has(a.sym)) recent.push(a);
          else rest.push(a);
        });
        held.sort((a, b) => (balances[b.sym] || 0) - (balances[a.sym] || 0));
        recent.sort((a, b) => histRank.get(a.sym) - histRank.get(b.sym));
        const renderRow = (a) => {
          const active = a.sym === sym;
          const bal = balances[a.sym] || 0;
          return (
            <button key={a.sym} onClick={() => { if (onSwitchAsset) onSwitchAsset(a.sym); setSwitcherOpen(false); }} style={{
              width: '100%', textAlign: 'left',
              background: active ? RH.surfaceUp : 'transparent',
              border: 'none', borderRadius: 8, padding: '8px 10px',
              display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer',
            }}>
              <AssetIcon sym={a.sym} size={22}/>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: RH.text }}>{a.name || a.sym}</div>
                <div style={{ fontSize: 11, color: RH.textDim, marginTop: 1, fontFamily: 'Geist Mono, monospace', fontVariantNumeric: 'tabular-nums' }}>
                  ${(a.price || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                </div>
              </div>
              <div style={{ fontSize: 11, color: RH.textDim, fontVariantNumeric: 'tabular-nums', fontFamily: 'Geist Mono, monospace' }}>
                {bal > 0 ? `$${bal.toFixed(2)}` : ''}
              </div>
            </button>
          );
        };
        const Label = ({ text, count }) => (
          <div style={{
            padding: '10px 10px 4px',
            fontSize: 9.5, fontWeight: 700, color: RH.textDim,
            fontFamily: 'Geist Mono, monospace',
            letterSpacing: 1.2, textTransform: 'uppercase',
            display: 'flex', justifyContent: 'space-between',
          }}>
            <span>{text}</span><span>{count}</span>
          </div>
        );
        return (
          <div style={{
            margin: '0 22px 8px',
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 12, padding: 4,
            maxHeight: 320, overflowY: 'auto',
          }} className="alpexa-hide-scrollbar">
            {held.length > 0   ? <Label text="Holdings"        count={held.length}/>   : null}
            {held.map(renderRow)}
            {recent.length > 0 ? <Label text="Recently traded" count={recent.length}/> : null}
            {recent.map(renderRow)}
            {rest.length > 0   ? <Label text="All markets"     count={rest.length}/>   : null}
            {rest.map(renderRow)}
          </div>
        );
      })() : null}
      <div className="alpexa-hide-scrollbar" style={{ flex: 1, overflowY: 'auto' }}>
        {/* Asset name + price block */}
        <div style={{ padding: '4px 22px 0' }}>
          <div style={{
            fontSize: 11, color: RH.textDim, fontFamily: 'Geist Mono, monospace',
            letterSpacing: 0.8, fontWeight: 700, marginBottom: 6,
          }}>{sym}</div>
          <div style={{
            fontSize: 30, fontWeight: 700, color: RH.text,
            letterSpacing: -0.8, lineHeight: 1.05,
          }}>{fullName}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 6 }}>
            <div style={{
              fontSize: 36, fontWeight: 600, color: RH.text,
              letterSpacing: -1.2, lineHeight: 1, fontVariantNumeric: 'tabular-nums',
            }}>{(() => {
              const s = fmtUsd(scrubPrice);
              const i = s.lastIndexOf('.');
              return i < 0
                ? <>${s}</>
                : <>${s.slice(0, i)}<span style={{ color: RH.textMute }}>{s.slice(i)}</span></>;
            })()}</div>
          </div>
          <div style={{
            marginTop: 6, display: 'flex', alignItems: 'center', gap: 6,
            fontSize: 13, fontWeight: 600, fontVariantNumeric: 'tabular-nums',
            color: accentColor,
          }}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill={accentColor}>
              {chartIsUp ? <path d="M12 4 L20 16 H4 Z"/> : <path d="M12 20 L4 8 H20 Z"/>}
            </svg>
            <span>${Math.abs(chartChange).toFixed(2)} ({chartIsUp ? '+' : '-'}{Math.abs(chartPct).toFixed(2)}%)</span>
            <span style={{ color: RH.textDim, fontWeight: 500 }}>Today</span>
          </div>
          <div style={{
            marginTop: 6, fontSize: 11, color: RH.textDim,
            fontFamily: 'Geist Mono, monospace', letterSpacing: 0.4,
            textTransform: 'uppercase', fontWeight: 600,
          }}>24 Hour Market</div>
        </div>

        {/* Chart — big and dramatic */}
        <div style={{ marginTop: 14, position: 'relative' }}>
          <Chart series={series} color={accentColor} baseline={baseline}
                 scrubIdx={scrubIdx} onScrub={setScrubIdx}/>

        </div>

        {/* Range tabs */}
        <div style={{ padding: '8px 18px 0' }}>
          <div style={{
            display: 'flex', alignItems: 'center', gap: 4,
            justifyContent: 'space-between',
          }}>
            {ranges.map((r) => {
              const active = r === range;
              return (
                <button key={r} onClick={() => setRange(r)} style={{
                  flex: 1, padding: '7px 0', borderRadius: 999,
                  background: active ? `${RH.green}22` : 'transparent',
                  border: 'none',
                  color: active ? RH.green : RH.textDim,
                  fontSize: 12, fontWeight: 700,
                  fontFamily: 'Geist Mono, monospace', letterSpacing: 0.6,
                  cursor: 'pointer',
                }}>{r}</button>
              );
            })}

          </div>
        </div>

        {/* Your position */}
        <div style={{ padding: '20px 22px 0' }}>
          <div style={{
            fontSize: 16, fontWeight: 700, color: RH.text,
            letterSpacing: -0.2, marginBottom: 10,
          }}>{isStaked ? 'Staked balance' : 'Your position'}</div>
          <div style={{
            padding: 14, background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 14,
          }}>
            <div style={{
              display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '14px 16px',
              fontFamily: 'Geist Mono, monospace',
            }}>
              <div>
                <div style={{ fontSize: 10.5, color: RH.textDim, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 700 }}>
                  {isStaked ? 'Principal' : 'Market value'}
                </div>
                <div style={{
                  marginTop: 4, fontSize: 16, fontWeight: 600, color: RH.text,
                  fontVariantNumeric: 'tabular-nums', letterSpacing: -0.3,
                }}>${fmtUsd(holdingUsd)}</div>
              </div>
              <div>
                <div style={{ fontSize: 10.5, color: RH.textDim, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 700 }}>
                  {sym} held
                </div>
                <div style={{
                  marginTop: 4, fontSize: 16, fontWeight: 600, color: RH.text,
                  fontVariantNumeric: 'tabular-nums', letterSpacing: -0.3,
                }}>{holdingCoin.toFixed(holdingCoin < 1 ? 6 : 4).replace(/\.?0+$/, '') || '0'}</div>
              </div>
              {isStaked ? (
                <>
                  <div>
                    <div style={{ fontSize: 10.5, color: RH.textDim, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 700 }}>APY</div>
                    <div style={{ marginTop: 4, fontSize: 16, fontWeight: 700, color: RH.green, fontVariantNumeric: 'tabular-nums' }}>
                      {stakePeriodApy(sym, lockPeriod).toFixed(1)}%
                    </div>
                  </div>
                  <div>
                    <div style={{ fontSize: 10.5, color: RH.textDim, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 700 }}>Accrued</div>
                    <div style={{ marginTop: 4, fontSize: 16, fontWeight: 600, color: RH.green, fontVariantNumeric: 'tabular-nums' }}>
                      +${accruedUsd.toFixed(2)}
                    </div>
                  </div>
                </>
              ) : isSecurity ? (
                <>
                  <div>
                    <div style={{ fontSize: 10.5, color: RH.textDim, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 700 }}>APY</div>
                    <div style={{ marginTop: 4, fontSize: 16, fontWeight: 700, color: RH.green, fontVariantNumeric: 'tabular-nums' }}>
                      {(meta.apy || 0).toFixed(1)}%
                    </div>
                  </div>
                  <div>
                    <div style={{ fontSize: 10.5, color: RH.textDim, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 700 }}>Type</div>
                    <div style={{ marginTop: 4, fontSize: 14, fontWeight: 600, color: RH.text }}>
                      {sym === 'ALPX-RE1' ? 'Real Estate' : sym === 'ALPX-CR2' ? 'Credit' : 'Token'}
                    </div>
                  </div>
                </>
              ) : (
                <>
                  <div>
                    <div style={{ fontSize: 10.5, color: RH.textDim, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 700 }}>Today's return</div>
                    <div style={{
                      marginTop: 4, fontSize: 16, fontWeight: 700,
                      color: accentColor, fontVariantNumeric: 'tabular-nums',
                    }}>{chartIsUp ? '+' : '-'}${Math.abs(chartChange * (holdingCoin || 0)).toFixed(2)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 10.5, color: RH.textDim, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 700 }}>Avg cost</div>
                    <div style={{
                      marginTop: 4, fontSize: 16, fontWeight: 600, color: RH.text,
                      fontVariantNumeric: 'tabular-nums', letterSpacing: -0.3,
                    }}>${fmtUsd((meta.price || 1) * 0.94)}</div>
                  </div>
                </>
              )}
            </div>
            {isStaked ? (
              <div style={{
                marginTop: 12, paddingTop: 10, borderTop: `1px solid ${RH.line}`,
                display: 'flex', alignItems: 'center', gap: 6,
              }}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={RH.red} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="5" y="11" width="14" height="10" rx="2"/>
                  <path d="M8 11 V7 a4 4 0 0 1 8 0 V11"/>
                </svg>
                <span style={{
                  fontFamily: 'Geist Mono, monospace', fontSize: 10.5,
                  color: RH.red, letterSpacing: 0.6, fontWeight: 700, textTransform: 'uppercase',
                }}>{lockPeriod === 'flexible' ? 'Flexible' : lockPeriod === '90d' ? '90 days' : lockPeriod === '1y' ? '1 year' : lockPeriod}</span>
              </div>
            ) : null}
          </div>
        </div>

        <div style={{ height: 14 }}/>
      </div>

      {/* Sticky bottom — Robinhood-style. Account picker + Sell + Buy with prices. */}
      <div style={{
        flexShrink: 0,
        borderTop: `1px solid ${RH.line}`,
        background: RH.bg,
        padding: '10px 14px 22px',
      }}>
        {isStaked ? (
          <button onClick={() => onUnstake && onUnstake(sym)} style={{
            width: '100%', padding: '15px 0', borderRadius: 999,
            background: `${RH.red}26`, color: RH.red,
            border: `1px solid ${RH.red}`,
            fontSize: 14, fontWeight: 700, letterSpacing: 0.2, cursor: 'pointer',
          }}>Unstake {sym}</button>
        ) : isSecurity && !isALPXS ? (
          <>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <button onClick={() => holdingUsd > 0 && onRedeem && onRedeem(sym)}
                disabled={holdingUsd <= 0}
                style={{
                  flex: 1, padding: '13px 0', borderRadius: 999,
                  background: holdingUsd > 0 ? `${RH.red}26` : RH.surfaceUp,
                  color: holdingUsd > 0 ? RH.red : RH.textMute,
                  border: `1px solid ${holdingUsd > 0 ? RH.red : RH.line}`,
                  fontSize: 13, fontWeight: 700, letterSpacing: 0.2,
                  cursor: holdingUsd > 0 ? 'pointer' : 'not-allowed',

// Tiny WebAudio FX — a crisp tap for successful order placement and a
// short descending buzz for rejected / blocked orders.
const AudioFX = {
  _ctx: null,
  _ensure() {
    if (!this._ctx) {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) this._ctx = new Ctx();
      } catch (_) { /* ignore */ }
    }
    return this._ctx;
  },
  success() {
    // Order confirm — clean three-note arpeggio that rises C5 → E5 → G5
    // (a major chord). Crisp, confident, distinctly different from the
    // cash() ka-ching or prompt() chime.
    const ctx = this._ensure(); if (!ctx) return;
    const now = ctx.currentTime;
    const tone = (freq, t0, dur, peak, type) => {
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(peak, t0 + 0.006);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g).connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + dur + 0.02);
    };
    // Three-note rising arpeggio
    tone(523.25, now,         0.10, 0.22, 'sine');     // C5
    tone(659.25, now + 0.055, 0.12, 0.22, 'sine');     // E5
    tone(783.99, now + 0.11,  0.18, 0.24, 'sine');     // G5
    // Subtle high sparkle on top
    tone(1568,   now + 0.11,  0.12, 0.08, 'triangle'); // G6
  },
  cash() {
    // Cash register / coin drop — used for deposit + withdrawal confirmations.
    const ctx = this._ensure(); if (!ctx) return;
    const now = ctx.currentTime;
    // Two-tone ascending bell — D5 → A5 with a metallic shimmer.
    const tone = (freq, t0, dur, peak, type) => {
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(peak, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g).connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + dur + 0.02);
    };
    // Sharp metallic "ka" thunk
    tone(587, now,        0.18, 0.18, 'square');     // D5
    // Higher chime
    tone(880, now + 0.06, 0.32, 0.22, 'sine');       // A5
    // Sparkle harmonic
    tone(1760, now + 0.08, 0.20, 0.10, 'triangle');  // A6
  },
  prompt() {
    // Soft two-tone chime — used when a modal asks for confirmation.
    const ctx = this._ensure(); if (!ctx) return;
    const now = ctx.currentTime;
    const tone = (f1, f2, t0, dur, peak) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f1, t0);
      osc.frequency.exponentialRampToValueAtTime(f2, t0 + dur);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(peak, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g).connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + dur + 0.01);
    };
    tone(880, 1100, now,       0.10, 0.14);
    tone(1320, 1500, now + 0.06, 0.10, 0.10);
  },
  reject() {
    const ctx = this._ensure(); if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(320, now);
    osc.frequency.exponentialRampToValueAtTime(110, now + 0.18);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.linearRampToValueAtTime(0.22, now + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
    osc.connect(g).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.24);
  },
};

function Buy({ onBack, balances = {}, transactions = [], onBought, onSold, onLiquidate, side = 'buy', initialAssetId }) {
  const { fees } = React.useContext(FeeConfigContext);
  const isSell = side === 'sell';
  const accent = isSell ? RH.red : RH.green;
  // Buy: any tradeable asset (crypto + ALL securities including ALPX-RE1/CR2).
  // Buy: any tradeable asset (crypto + ALL securities + Discover MARKET coins).
  // Sell: only assets the user actually holds (balance > 0). We union the
  // catalogs and add any held symbol that's missing so even Discover-bought
  // tokens (SHIB, BONK, etc.) appear here.
  const _catalogSyms = new Set();
  const TRADEABLE_UNIVERSE = [
    ...PORTFOLIO.assets,
    ...PORTFOLIO.securities,
    ...(typeof MARKET !== 'undefined' ? MARKET.filter((m) => !PORTFOLIO.assets.find((p) => p.sym === m.sym) && !PORTFOLIO.securities.find((s) => s.sym === m.sym)) : []),
  ];
  TRADEABLE_UNIVERSE.forEach((a) => _catalogSyms.add(a.sym));
  // Any held symbol not in the catalog — wrap as a generic asset.
  Object.keys(balances).forEach((sym) => {
    if (!_catalogSyms.has(sym) && (balances[sym] || 0) > 0) {
      const coinName = (typeof COIN_NAMES !== 'undefined' && COIN_NAMES[sym]) || sym;
      TRADEABLE_UNIVERSE.push({ sym, name: coinName, price: 1, seed: 100, chg: 0 });
      _catalogSyms.add(sym);
    }
  });
  // Auto-include any sym ever traded (buy/sell/swap/send/receive/stake/redeem)
  // — keeps the dropdown rich even after a position is fully closed.
  // Newest tx first so we can compute a "most recent traded at" rank below.
  // Note: transactions are PREPENDED (newest first) by pushTx, so iterate
  // forward to get most-recent-first ranking.
  const historySyms = [];
  const _seenHist = new Set();
  const _txArr = Array.isArray(transactions) ? transactions : [];
  const _addSym = (sym) => {
    if (!sym || _seenHist.has(sym)) return;
    _seenHist.add(sym);
    historySyms.push(sym);
  };
  for (let i = 0; i < _txArr.length; i++) {
    const t = _txArr[i];
    if (!t) continue;
    _addSym(t.sym);
    _addSym(t.to);   // swap destination
  }
  historySyms.forEach((sym) => {
    if (!_catalogSyms.has(sym)) {
      const m = (typeof MARKET !== 'undefined' && MARKET.find((x) => x.sym === sym)) || {};
      const coinName = (typeof COIN_NAMES !== 'undefined' && COIN_NAMES[sym]) || m.name || sym;
      TRADEABLE_UNIVERSE.push({
        sym, name: coinName,
        price: m.price || 1, seed: m.seed || 100, chg: m.chg || 0,
        stable: !!m.stable,
      });
      _catalogSyms.add(sym);
    }
  });
  // Sort: held first (largest balance), then recently-traded, then catalog order.
  // Stable + sell-without-balance filtering applied after sort.
  const _histRank = new Map(historySyms.map((s, i) => [s, i]));
  TRADEABLE_UNIVERSE.sort((a, b) => {
    const ba = balances[a.sym] || 0;
    const bb = balances[b.sym] || 0;
    if ((ba > 0) !== (bb > 0)) return ba > 0 ? -1 : 1;
    if (ba > 0 && bb > 0) return bb - ba;
    const ra = _histRank.has(a.sym) ? _histRank.get(a.sym) : 9999;
    const rb = _histRank.has(b.sym) ? _histRank.get(b.sym) : 9999;
    return ra - rb;
  });
  const TRADEABLE = TRADEABLE_UNIVERSE.filter((a) =>
    !a.stable && (!isSell || (balances[a.sym] || 0) > 0)
  );
  // If initialAssetId points to a stable (e.g. USDT), it's not tradeable in this
  // mode — fall back to the first available asset.
  const _initIsTradeable = initialAssetId && TRADEABLE.some((a) => a.sym === initialAssetId);
  const defaultAsset = (_initIsTradeable ? initialAssetId : null) || (TRADEABLE[0] && TRADEABLE[0].sym) || 'BTC';
  const [assetId, setAssetId]       = React.useState(defaultAsset);
  const [assetOpen, setAssetOpen]   = React.useState(false);
  const [orderType, setOrderType]   = React.useState('Market'); // Market | Limit | Stop
  const [unit, setUnit]             = React.useState('usd');    // usd | coin
  // Sell + initialAssetId → pre-fill amount with the full position so a
  // single tap on the CTA closes the position. toFixed(2) for clean display;
  // insufficient check uses an epsilon so we still pass.
  const _autoMax = isSell && initialAssetId ? (balances[initialAssetId] || 0) : 0;
  const [amountStr, setAmountStr]   = React.useState(_autoMax > 0 ? _autoMax.toFixed(2) : '0');
  const [range, setRange]           = React.useState('1h');
  const [limitPriceStr, setLimitPriceStr] = React.useState('');
  const [stopPriceStr,  setStopPriceStr]  = React.useState('');
  const [scrubIdx, setScrubIdx]     = React.useState(null);
  const [confirmed, setConfirmed]   = React.useState(false);
  const [liquidateAll, setLiquidateAll] = React.useState(false);
  const [activeQuick, setActiveQuick] = React.useState(null);

  // Asset lookup needs the broader universe so ALPXS works too.
  const asset = TRADEABLE_UNIVERSE.find((a) => a.sym === assetId)
              || PORTFOLIO.assets[0];

  // Live tick on the displayed price (same hook the Dashboard uses).
  const livePrice = useLiveTick(asset.price, tickProfile(asset.sym));

  // Per-range chart series (same approach as Dashboard's Chart).
  const close = livePrice;
  const open  = asset.price * (BUY_RANGE_OPEN_MULT[range] != null ? BUY_RANGE_OPEN_MULT[range] : 0.995);

  const [realSeries, setRealSeries] = React.useState(null);
  React.useEffect(() => {
    let alive = true;
    setRealSeries(null);
    if (typeof alpexaFetchChart === 'function') {
      alpexaFetchChart(asset.sym, range)
        .then((arr) => { if (alive && arr && arr.length > 3) setRealSeries(arr); })
        .catch(() => {});
    }
    return () => { alive = false; };
  }, [asset.sym, range]);

  const synthSeries = React.useMemo(() => {
    const meta = BUY_RANGE_META[range] || BUY_RANGE_META['1h'] || { points: 60 };
    const seedByRange = { '1m': 41, '5m': 412, '30m': 1530, '1h': 7771, '4h': 9512, '1D': 4422, '1W': 8801 };
    return makeChartSeries(open, close, meta.points, (seedByRange[range] || 7771) + asset.seed);
  }, [range, asset.sym, asset.seed, open, close]);
  const usingReal = !!(realSeries && realSeries.length > 3);
  const series    = usingReal ? realSeries : synthSeries;
  const baseline   = usingReal ? series[0] : open;
  const scrubPrice = scrubIdx !== null && series[scrubIdx] != null ? series[scrubIdx] : close;
  const chartChange = scrubPrice - baseline;
  const chartPct    = (chartChange / baseline) * 100;
  const chartIsUp   = chartChange >= 0;
  const accentColor = chartIsUp ? RH.green : RH.red;

  // Order-side math uses the LIVE (or scrubbed) price too.
  const buyingPower = balances[isSell ? assetId : 'USDT'] || 0;
  // Sum of every non-stable asset balance — used by liquidate-all MAX.
  const portfolioUsd = Object.entries(balances).reduce(
    (sum, [sym, v]) => (sym !== 'USDT' && v > 0) ? sum + v : sum, 0
  );
  const numeric     = parseFloat(amountStr) || 0;
  const priceForCalc = scrubPrice;
  const usdAmount   = unit === 'usd'  ? numeric : numeric * priceForCalc;
  const coinAmount  = unit === 'coin' ? numeric : (priceForCalc > 0 ? numeric / priceForCalc : 0);
  const fee         = numeric > 0 ? (fees.buyNetworkFee || 0) : 0;
  // Buy:  cost = amount + fee, checked against USDT balance.
  // Sell: amount goes against the asset balance; fee comes out of the
  //       USDT credited, not the asset side.
  const total       = isSell ? usdAmount : (usdAmount + fee);
  const insufficient = total - buyingPower > 0.005;
  const valid       = numeric > 0 && !insufficient;

  const onKey = (k) => {
    setActiveQuick(null);
    if (k === '⌫') { setAmountStr((s) => s.length <= 1 ? '0' : s.slice(0, -1)); return; }
    if (k === '.') { if (amountStr.includes('.')) return; setAmountStr((s) => s + '.'); return; }
    setAmountStr((s) => {
      if (s === '0') return k;
      if (s.includes('.')) {
        const [, frac = ''] = s.split('.');
        const maxFrac = unit === 'coin' ? 8 : 2;
        if (frac.length >= maxFrac) return s;
      }
      return s + k;
    });
  };

  const setQuick = (frac) => {
    // For MAX use the EXACT balance, but format to 2 decimals for clean display.
    // The insufficient check uses a 0.005 epsilon so this still passes.
    const raw = frac === 1 ? buyingPower : Math.floor(buyingPower * frac * 100) / 100;
    setUnit('usd');
    setAmountStr(raw.toFixed(2));
    setActiveQuick(frac);
  };

  const limitPrice = parseFloat(limitPriceStr) || 0;
  const stopPrice  = parseFloat(stopPriceStr)  || 0;
  const triggerPrice = orderType === 'Limit' ? limitPrice
                     : orderType === 'Stop'  ? stopPrice
                     : 0;
  const needsTrigger = orderType !== 'Market';

  // Classify the trigger price against the market.
  //   ok        → within 10%, correct side
  //   warn      → 10–25%, correct side (yellow caution)
  //   wrong-side→ Limit buy above market / Stop buy below market
  //   too-far   → > 25% from market
  //   empty     → no price entered yet
  const triggerTier = (() => {
    if (!needsTrigger) return 'ok';
    if (triggerPrice <= 0) return 'empty';
    const market = livePrice;
    const pct = (triggerPrice - market) / market;
    // Buy:  Limit must be ≤ market, Stop must be ≥ market
    // Sell: Limit must be ≥ market, Stop must be ≤ market
    if (orderType === 'Limit' && (isSell ? pct < 0 : pct > 0)) return 'wrong-side';
    if (orderType === 'Stop'  && (isSell ? pct > 0 : pct < 0)) return 'wrong-side';
    if (Math.abs(pct) > TRIGGER_MAX_PCT)  return 'too-far';
    if (Math.abs(pct) > TRIGGER_WARN_PCT) return 'warn';
    return 'ok';
  })();
  const triggerOk = triggerTier === 'ok' || triggerTier === 'warn';

  const submittingRef = React.useRef(false);
  const doBuy = async () => {
    if (submittingRef.current) return;                 // ignore double-taps while a trade is in flight
    if (window.__alpexaHalt) { AudioFX.reject(); alert('Trading is temporarily paused. Please try again shortly.'); return; }
    if (!valid || !triggerOk) { AudioFX.reject(); return; }
    const cb = isSell ? onSold : onBought;
    if (orderType === 'Market') {
      // Market orders settle on the SERVER (crypto_trade RPC). Await the result so a
      // rejected trade (insufficient funds / stale price) never shows "done".
      let res;
      submittingRef.current = true;
      try { res = cb ? await cb(assetId, usdAmount) : { ok: true }; }
      finally { submittingRef.current = false; }
      if (res && res.ok === false) { AudioFX.reject(); alert('Trade not completed: ' + (res.error || 'please try again')); return; }
    } else {
      // Limit / Stop orders become pending — placed in the App's queue,
      // shown in Dashboard's Open Orders section.
      if (cb) cb(assetId, usdAmount, {
        type: orderType, triggerPrice, coinAmount, side,
      });
    }
    AudioFX.success();
    setConfirmed(true);
  };

  const [intPart, fracPart] = amountStr.includes('.') ? amountStr.split('.') : [amountStr, null];
  const fracDisplay = fracPart === null ? (unit === 'usd' ? '.00' : '') : `.${fracPart}`;

  // After confirm: full-screen HeroConfirm surface.
  if (confirmed) {
    const isMarket = orderType === 'Market';
    const verbPast = isSell ? 'Sold' : 'Bought';
    const verbNoun = isSell ? 'sell' : 'buy';
    const triggerOp = orderType === 'Limit'
      ? (isSell ? '≥' : '≤')
      : (isSell ? '≤' : '≥');
    return (
      <HeroConfirm
        heroColor={RH.heroBlue}
        label={`$${usdAmount.toFixed(2)} of ${assetId}`}
        sublabel={`${coinAmount.toFixed(8).replace(/\.?0+$/, '')} ${assetId}`}
        rows={isMarket
          ? [
              { label: 'Type',        value: 'Market' },
              { label: 'Price',       value: `$${scrubPrice.toFixed(2)}` },
              { label: 'Network fee', value: `$${fee.toFixed(2)}` },
              { label: 'Total',       value: `$${total.toFixed(2)}` },
            ]
          : [
              { label: 'Type',     value: orderType },
              { label: 'Trigger',  value: `${triggerOp} $${triggerPrice.toFixed(2)}` },
              { label: 'Amount',   value: `${coinAmount.toFixed(6).replace(/\.?0+$/, '')} ${assetId}` },
              { label: 'Total',    value: `$${total.toFixed(2)}` },
            ]}
        footnote={isMarket
          ? `${verbPast} ${coinAmount.toFixed(6).replace(/\.?0+$/, '')} ${assetId} at $${scrubPrice.toFixed(2)}. Network fee of $${fee.toFixed(2)} was added.`
          : `Your ${orderType.toLowerCase()} ${verbNoun} order is queued. It will execute when ${assetId} reaches your trigger price.`}
        onDone={onBack}
      />
    );
  }

  // Sell with nothing to sell → friendly empty state instead of a broken ticket.
  if (isSell && TRADEABLE.length === 0) {
    return (
      <Phone width={390} height={844} bg={RH.bg}>
        <StatusBar/>
        <div style={{
          padding: '6px 16px 10px', display: 'flex',
          alignItems: 'center', justifyContent: 'flex-start', flexShrink: 0,
        }}>
          <button onClick={onBack} aria-label="Back" style={{
            width: 36, height: 36, borderRadius: 18,
            background: 'transparent', border: 'none', display: 'flex',
            alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
          }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M15 6 L9 12 L15 18"/>
            </svg>
          </button>
          <span style={{ fontSize: 16, fontWeight: 700, color: RH.text, marginLeft: 4 }}>Sell</span>
        </div>
        <div style={{
          flex: 1, display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', padding: '0 36px',
          textAlign: 'center', fontFamily: 'Geist, Inter, system-ui',
        }}>
          <div style={{
            width: 64, height: 64, borderRadius: 32,
            background: RH.surface, border: `1px solid ${RH.line}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            marginBottom: 18,
          }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="9"/>
              <path d="M8 12 H16"/>
            </svg>
          </div>
          <div style={{ fontSize: 17, fontWeight: 600, color: RH.text, marginBottom: 8 }}>
            Nothing to sell
          </div>
          <div style={{ fontSize: 13, color: RH.textDim, lineHeight: 1.5, marginBottom: 22 }}>
            You need to own a crypto asset before you can sell it.
            Fund your account or buy something first.
          </div>
          <button onClick={onBack} style={{
            padding: '11px 22px', borderRadius: 999,
            background: RH.text, color: RH.bg, border: 'none',
            fontSize: 13, fontWeight: 700, letterSpacing: 0.2, cursor: 'pointer',
          }}>Back to portfolio</button>
        </div>
      </Phone>
    );
  }

  return (
    <Phone width={390} height={844} bg={RH.bg}>
      <StatusBar/>

      {/* Header */}
      <div style={{
        padding: '6px 16px 10px', display: 'flex',
        alignItems: 'center', justifyContent: 'space-between', flexShrink: 0,
      }}>
        <button onClick={onBack} aria-label="Back" style={{
          width: 36, height: 36, borderRadius: 18,
          background: 'transparent', border: 'none', display: 'flex',
          alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={RH.text} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 6 L9 12 L15 18"/>
          </svg>
        </button>
        <div
          onClick={() => setAssetOpen((o) => !o)}
          style={{
            display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer',
          }}
        >
          <AssetIcon sym={assetId} size={20}/>
          <span style={{ fontSize: 16, fontWeight: 700, color: RH.text, letterSpacing: -0.2 }}>
            {isSell ? 'Sell' : 'Buy'} {assetId}
          </span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={RH.textDim} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{
            transform: assetOpen ? 'rotate(180deg)' : 'rotate(0deg)',
            transition: 'transform 200ms ease',
          }}>
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </div>
        <div style={{ width: 36, height: 36 }}/>
      </div>

      {assetOpen ? (() => {
        // Sectioned dropdown: holdings → recently-traded → all-markets
        const held = [], recent = [], rest = [];
        TRADEABLE.forEach((a) => {
          if ((balances[a.sym] || 0) > 0) held.push(a);
          else if (_histRank.has(a.sym)) recent.push(a);
          else rest.push(a);
        });
        const renderRow = (a) => {
          const active = a.sym === assetId;
          return (
            <button key={a.sym} onClick={() => { setAssetId(a.sym); setAssetOpen(false); }} style={{
              width: '100%', textAlign: 'left',
              background: active ? RH.surfaceUp : 'transparent',
              border: 'none', borderRadius: 8, padding: '8px 10px',
              display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer',
            }}>
              <AssetIcon sym={a.sym} size={22}/>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: RH.text }}>
                  {(typeof COIN_NAMES !== 'undefined' && COIN_NAMES[a.sym]) || a.sym}
                </div>
                <div style={{ fontSize: 11, color: RH.textDim, marginTop: 1, fontVariantNumeric: 'tabular-nums' }}>
                  {(() => {
                    const bal = balances[a.sym] || 0;
                    const coins = a.price > 0 ? bal / a.price : 0;
                    const coinStr = coins.toFixed(coins < 1 ? 6 : 4).replace(/\.?0+$/, '');
                    if (isSell) return `${coinStr} ${a.sym} · $${a.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                    return `$${a.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                  })()}
                </div>
              </div>
              <div style={{ textAlign: 'right' }}>
                {isSell ? (
                  <>
                    <div style={{
                      fontSize: 13, fontWeight: 600, color: RH.text,
                      fontVariantNumeric: 'tabular-nums', letterSpacing: -0.2,
                    }}>${(balances[a.sym] || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                    <div style={{
                      marginTop: 2, fontSize: 10.5, fontWeight: 600,
                      fontFamily: 'Geist Mono, monospace', letterSpacing: 0.4,
                      color: a.chg >= 0 ? RH.green : RH.red,
                      fontVariantNumeric: 'tabular-nums',
                    }}>{a.chg >= 0 ? '+' : ''}{a.chg.toFixed(2)}%</div>
                  </>
                ) : (
                  <div style={{
                    fontSize: 12, fontWeight: 700,
                    color: a.chg >= 0 ? RH.green : RH.red,
                    fontVariantNumeric: 'tabular-nums',
                  }}>{a.chg >= 0 ? '+' : ''}{a.chg.toFixed(2)}%</div>
                )}
              </div>
            </button>
          );
        };
        const Label = ({ text, count }) => (
          <div style={{
            padding: '10px 10px 4px',
            fontSize: 9.5, fontWeight: 700, color: RH.textDim,
            fontFamily: 'Geist Mono, monospace',
            letterSpacing: 1.2, textTransform: 'uppercase',
            display: 'flex', justifyContent: 'space-between',
          }}>
            <span>{text}</span>
            <span>{count}</span>
          </div>
        );
        return (
          <div style={{
            margin: '0 22px 8px',
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 12, padding: 4,
            maxHeight: 320, overflowY: 'auto',
          }} className="alpexa-hide-scrollbar">
            {held.length > 0   ? <Label text="Holdings"        count={held.length}/>   : null}
            {held.map(renderRow)}
            {recent.length > 0 ? <Label text="Recently traded" count={recent.length}/> : null}
            {recent.map(renderRow)}
            {rest.length > 0   ? <Label text="All markets"     count={rest.length}/>   : null}
            {rest.map(renderRow)}
          </div>
        );
      })() : null}

      <div className="alpexa-hide-scrollbar" style={{
        flex: 1, overflowY: 'auto', overflowX: 'hidden',
        display: 'flex', flexDirection: 'column',
      }}>
        {/* Price block — uses live or scrubbed value */}
        <div style={{ padding: '4px 22px 0' }}>
          <div style={{
            fontSize: 28, fontWeight: 600, color: RH.text, letterSpacing: -0.8,
            fontVariantNumeric: 'tabular-nums', lineHeight: 1,
          }}>${scrubPrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
          <div style={{
            marginTop: 6, display: 'flex', alignItems: 'center', gap: 8,
            fontSize: 12, fontWeight: 600, fontVariantNumeric: 'tabular-nums',
          }}>
            <span style={{ color: accentColor }}>{chartIsUp ? '▲' : '▼'} ${Math.abs(chartChange).toFixed(2)} ({chartIsUp ? '+' : ''}{chartPct.toFixed(2)}%)</span>
            <span style={{ color: RH.textDim, fontFamily: 'Geist Mono, monospace', fontSize: 10.5, letterSpacing: 0.6, textTransform: 'uppercase' }}>
              {scrubIdx !== null ? 'Scrubbing' : (BUY_RANGE_META[range] && BUY_RANGE_META[range].label) || 'Today'}
            </span>
          </div>
        </div>

        {/* Chart — full Dashboard chart (scrub, glow dot, color bleed, baseline) */}
        <div style={{ marginTop: 6 }}>
          <Chart
            series={series}
            color={accentColor}
            baseline={baseline}
            scrubIdx={scrubIdx}
            onScrub={setScrubIdx}
          />
        </div>

        {/* Range tabs */}
        <div style={{
          display: 'flex', justifyContent: 'space-between',
          padding: '6px 22px 10px', fontFamily: 'Geist Mono, monospace',
        }}>
          {BUY_RANGES.map((r) => {
            const active = r === range;
            return (
              <button key={r} onClick={() => setRange(r)} style={{
                background: 'transparent', border: 'none', cursor: 'pointer',
                padding: '6px 4px',
                fontSize: 11, fontWeight: 700, letterSpacing: 0.4,
                color: active ? accentColor : RH.textDim,
                borderBottom: active ? `2px solid ${accentColor}` : '2px solid transparent',
                transition: 'color 160ms ease, border-color 160ms ease',
              }}>{r}</button>
            );
          })}
        </div>

        {/* Order type tabs */}
        <div style={{ padding: '6px 22px 0', display: 'flex', gap: 4 }}>
          {['Market','Limit','Stop'].map((t) => {
            const active = t === orderType;
            return (
              <button key={t} onClick={() => setOrderType(t)} style={{
                flex: 1, padding: '8px 0', borderRadius: 10,
                background: active ? RH.surfaceUp : RH.surface,
                border: `1px solid ${active ? RH.accent : RH.line}`,
                color: active ? RH.text : RH.textDim,
                fontSize: 11.5, fontWeight: 700, cursor: 'pointer',
                letterSpacing: 0.2,
              }}>{t}</button>
            );
          })}
        </div>

        {/* Trigger price stepper — visible for Limit / Stop */}
        {orderType !== 'Market' ? (() => {
          // Smart step size based on price magnitude.
          const market = livePrice;
          const stepFor = (p) => {
            if (p >= 10000) return 10;
            if (p >= 1000)  return 1;
            if (p >= 100)   return 0.5;
            if (p >= 10)    return 0.05;
            if (p >= 1)     return 0.01;
            return 0.001;
          };
          const step = stepFor(market);
          const decimals = market >= 100 ? 2 : market >= 1 ? 3 : 5;
          const currentStr = orderType === 'Limit' ? limitPriceStr : stopPriceStr;
          const setStr     = orderType === 'Limit' ? setLimitPriceStr : setStopPriceStr;
          const currentVal = parseFloat(currentStr) || 0;
          const fmt = (v) => v.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
          const isLimit = orderType === 'Limit';
          // Hard bounds — clamp at ±25% from market.
          // Limit buy: only allowed at or below market (lower bound = market·0.75).
          // Stop  buy: only allowed at or above market (upper bound = market·1.25).
          // Buy:  Limit ≤ market (min = market·(1-cap), max = market)
          //        Stop  ≥ market (min = market,            max = market·(1+cap))
          // Sell: flipped on both sides.
          const minAllowed = isLimit
            ? (isSell ? market : market * (1 - TRIGGER_MAX_PCT))
            : (isSell ? market * (1 - TRIGGER_MAX_PCT) : market);
          const maxAllowed = isLimit
            ? (isSell ? market * (1 + TRIGGER_MAX_PCT) : market)
            : (isSell ? market : market * (1 + TRIGGER_MAX_PCT));
          const bump = (dir) => {
            const base = currentVal > 0 ? currentVal : market;
            const next = Math.min(maxAllowed, Math.max(minAllowed, base + dir * step));
            setStr(next.toFixed(decimals));
          };
          const setToMarket = () => setStr(market.toFixed(decimals));
          const diff = currentVal > 0 ? currentVal - market : 0;
          const diffPct = currentVal > 0 ? (diff / market) * 100 : 0;
          // Tier color (matches triggerTier for the same logic):
          //   ok    → green / textDim, warn → amber, bad → red.
          const tierColor = triggerTier === 'ok'    ? RH.green
                          : triggerTier === 'warn'  ? '#F5B543'  // amber
                          : triggerTier === 'empty' ? RH.textDim
                          : RH.red;

          return (
            <div style={{ padding: '10px 22px 0' }}>
              <div style={{
                padding: '14px 14px 12px',
                background: RH.surface, border: `1px solid ${RH.line}`,
                borderRadius: 14,
              }}>
                <div style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  marginBottom: 10,
                }}>
                  <div style={{
                    fontFamily: 'Geist Mono, monospace', fontSize: 10, color: RH.textDim,
                    letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 700,
                  }}>{isLimit ? 'Limit price' : 'Stop price'}</div>
                  <button onClick={setToMarket} style={{
                    background: 'transparent', border: `1px solid ${RH.line}`,
                    color: RH.textDim, fontSize: 10, fontWeight: 600,
                    fontFamily: 'Geist Mono, monospace', letterSpacing: 0.8,
                    padding: '4px 10px', borderRadius: 999, cursor: 'pointer',
                    textTransform: 'uppercase',
                  }}>Market</button>
                </div>

                <div style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  gap: 12,
                }}>
                  <HoldButton
                    ariaLabel="Decrease price"
                    onTrigger={() => bump(-1)}
                    style={{
                      width: 44, height: 44, borderRadius: 22,
                      background: RH.surfaceUp, border: `1px solid ${RH.line}`,
                      color: RH.text, fontSize: 22, fontWeight: 400, lineHeight: 1,
                      cursor: 'pointer', display: 'flex',
                      alignItems: 'center', justifyContent: 'center',
                    }}>−</HoldButton>

                  <div style={{
                    flex: 1, textAlign: 'center',
                    fontFamily: 'Geist Mono, monospace',
                    fontSize: 26, fontWeight: 600, color: RH.text,
                    letterSpacing: -0.5, fontVariantNumeric: 'tabular-nums',
                  }}>
                    <span style={{ opacity: 0.55, fontSize: 18, marginRight: 2 }}>$</span>
                    {currentVal > 0 ? fmt(currentVal) : fmt(market)}
                  </div>

                  <HoldButton
                    ariaLabel="Increase price"
                    onTrigger={() => bump(+1)}
                    style={{
                      width: 44, height: 44, borderRadius: 22,
                      background: RH.surfaceUp, border: `1px solid ${RH.line}`,
                      color: RH.text, fontSize: 22, fontWeight: 400, lineHeight: 1,
                      cursor: 'pointer', display: 'flex',
                      alignItems: 'center', justifyContent: 'center',
                    }}>+</HoldButton>
                </div>

                <div style={{
                  marginTop: 10,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  gap: 6,
                  fontFamily: 'Geist Mono, monospace', fontSize: 10.5,
                  letterSpacing: 0.4,
                  color: tierColor,
                }}>
                  {currentVal > 0 ? (
                    <>
                      <span>{diff >= 0 ? '+' : ''}{fmt(diff)}</span>
                      <span style={{ opacity: 0.5 }}>·</span>
                      <span>{diffPct >= 0 ? '+' : ''}{diffPct.toFixed(2)}%</span>
                      <span style={{ opacity: 0.5 }}>vs market</span>
                    </>
                  ) : (
                    <span style={{ opacity: 0.7 }}>Set a {isLimit ? 'limit' : 'stop'} price</span>
                  )}
                </div>
              </div>

              {/* Tier-aware footnote: explanation OR warning */}
              <div style={{
                marginTop: 8, fontSize: 10.5,
                fontFamily: 'Geist Mono, monospace', letterSpacing: 0.4,
                textAlign: 'center',
                color: triggerTier === 'warn' ? '#F5B543'
                     : (triggerTier === 'wrong-side' || triggerTier === 'too-far') ? RH.red
                     : RH.textDim,
              }}>
                {triggerTier === 'wrong-side'
                  ? (isLimit
                      ? (isSell
                          ? 'Limit price below market → would fill immediately as market'
                          : 'Limit price above market → would fill immediately as market')
                      : (isSell
                          ? 'Stop price above market → would trigger immediately'
                          : 'Stop price below market → would trigger immediately'))
                  : triggerTier === 'too-far'
                  ? `More than 5% from market · order blocked`
                  : triggerTier === 'warn'
                  ? `Far from market (>3%) · double-check before placing`
                  : isLimit
                    ? (isSell
                        ? 'Fills when price rises to your limit or higher'
                        : 'Fills when price drops to your limit or lower')
                    : (isSell
                        ? 'Triggers when price falls to your stop or lower'
                        : 'Triggers when price rises to your stop or higher')}
              </div>
            </div>
          );
        })() : null}

        {/* Amount */}
        <div style={{
          padding: '18px 22px 4px',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
        }}>
          <div style={{
            display: 'inline-flex', alignItems: 'baseline',
            color: insufficient ? RH.red : RH.text,
            letterSpacing: -1.8, lineHeight: 1, fontVariantNumeric: 'tabular-nums',
          }}>
            {unit === 'usd' ? (
              <>
                <span style={{ fontSize: 24, fontWeight: 500, marginRight: 4, opacity: 0.6 }}>$</span>
                <span style={{ fontSize: 48, fontWeight: 600 }}>{intPart}</span>
                <span style={{ fontSize: 30, fontWeight: 500, opacity: 0.45 }}>{fracDisplay}</span>
              </>
            ) : (
              <>
                <span style={{ fontSize: 36, fontWeight: 600 }}>{intPart}{fracDisplay}</span>
                <span style={{ fontSize: 18, fontWeight: 500, marginLeft: 6, opacity: 0.6 }}>{assetId}</span>
              </>
            )}
          </div>
          <div style={{
            marginTop: 6, fontSize: 11, color: RH.textDim,
            fontFamily: 'Geist Mono, monospace', letterSpacing: 0.4,
            fontVariantNumeric: 'tabular-nums',
          }}>
            {unit === 'usd'
              ? `≈ ${coinAmount.toFixed(8).replace(/\.?0+$/, '')} ${assetId}`
              : `≈ $${usdAmount.toFixed(2)}`}
          </div>
        </div>

        {/* USD / Coin toggle */}
        <div style={{ padding: '6px 22px 0', display: 'flex', justifyContent: 'center' }}>
          <div style={{
            display: 'inline-flex', background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 999, padding: 3,
          }}>
            {['usd', 'coin'].map((u) => {
              const active = u === unit;
              return (
                <button key={u} onClick={() => { setUnit(u); setAmountStr('0'); }} style={{
                  padding: '6px 14px', borderRadius: 999,
                  background: active ? RH.surfaceUp : 'transparent',
                  border: 'none', cursor: 'pointer',
                  color: active ? RH.text : RH.textDim,
                  fontSize: 11.5, fontWeight: 700, letterSpacing: 0.4,
                }}>{u === 'usd' ? 'USD' : assetId}</button>
              );
            })}
          </div>
        </div>

        {/* Quick chips (visible in USD mode) */}
        {unit === 'usd' ? (
          <div style={{ padding: '8px 22px 0', display: 'flex', gap: 6, justifyContent: 'center' }}>
            {[[0.25, '25%'], [0.5, '50%'], [1, 'Max']].map(([f, l]) => {
              const active = activeQuick === f;
              return (
                <button key={l} onClick={() => setQuick(f)} style={{
                  padding: '5px 12px', borderRadius: 999,
                  background: active ? `${RH.accent}26` : RH.surface,
                  border: `1px solid ${active ? RH.accent : RH.line}`,
                  color: active ? RH.accent : RH.text,
                  fontSize: 11, fontWeight: 700,
                  cursor: 'pointer', letterSpacing: 0.2,
                  fontFamily: 'Geist Mono, monospace',
                  transition: 'background 160ms ease, color 160ms ease, border-color 160ms ease',
                }}>{l}</button>
              );
            })}
          </div>
        ) : null}

        {/* Order summary */}
        <div style={{ padding: '14px 22px 0' }}>
          <div style={{
            padding: '12px 14px',
            background: RH.surface, border: `1px solid ${RH.line}`,
            borderRadius: 14, fontVariantNumeric: 'tabular-nums',
          }}>
            <Row label="Order type"  value={orderType}/>
            <div style={{ height: 1, background: RH.line, margin: '8px 0' }}/>

// Tiny localStorage hook — survives page refresh, JSON-serializes everything.
function usePersistedState(key, initial) {
  const [v, setV] = React.useState(() => {
    try {
      const raw = window.localStorage.getItem(key);
      if (raw != null) return JSON.parse(raw);
    } catch (_) {}
    return typeof initial === 'function' ? initial() : initial;
  });
  React.useEffect(() => {
    try { window.localStorage.setItem(key, JSON.stringify(v)); } catch (_) {}
  }, [key, v]);
  return [v, setV];
}
