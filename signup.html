body{font-family:'Roboto',sans-serif;background:#fff;display:flex;justify-content:center;min-height:100vh;color:#212121;}
#wrap{width:100%;max-width:390px;min-height:100vh;display:flex;flex-direction:column;background:#fff;position:relative;}

.msi{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;display:inline-block;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;-webkit-font-feature-settings:'liga';font-feature-settings:'liga';user-select:none;vertical-align:middle;}

/* ── Header ── */
.hdr{display:flex;align-items:center;padding:14px 16px 10px;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
.hdr-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:#212121;border-radius:18px;}
.hdr-back:active{background:#f5f5f5;}
.hdr-ttl{flex:1;font-size:16px;font-weight:600;text-align:center;color:#212121;margin-right:36px;}

/* ── Progress ── */
.progress{display:flex;align-items:center;padding:18px 24px 8px;gap:6px;flex-shrink:0;}
.pstep{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;}
.pdot{width:22px;height:22px;border-radius:11px;background:#f0f0f0;color:#bdbdbd;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;transition:all .2s;}
.pstep.done .pdot{background:#2196F3;color:#fff;}
.pstep.done .pdot::after{content:'';width:6px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px);}
.pstep.done .pdot .pn{display:none;}
.pstep.active .pdot{background:#2196F3;color:#fff;box-shadow:0 0 0 4px rgba(33,150,243,.15);}
.plabel{font-size:9.5px;color:#bdbdbd;font-weight:500;letter-spacing:.3px;text-align:center;white-space:nowrap;}
.pstep.active .plabel,.pstep.done .plabel{color:#212121;font-weight:600;}
.pbar{flex:1;height:2px;background:#f0f0f0;margin-bottom:24px;}
.pbar.done{background:#2196F3;}

/* ── Body ── */
.body{flex:1;padding:14px 24px 24px;overflow-y:auto;}
.body-title{font-size:22px;font-weight:700;color:#111;margin-bottom:6px;letter-spacing:-.3px;}
.body-sub{font-size:13px;color:#9e9e9e;line-height:1.5;margin-bottom:24px;}

/* ── Step 1: Cards ── */
.opt-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.opt-card{display:flex;align-items:center;padding:14px 14px;border:1.5px solid #e0e0e0;border-radius:10px;cursor:pointer;background:#fff;transition:all .15s;gap:12px;}
.opt-card:active{transform:scale(.99);}
.opt-card.sel{border-color:#2196F3;background:#e3f2fd;}
.opt-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opt-body{flex:1;}
.opt-name{font-size:14px;font-weight:600;color:#212121;display:flex;align-items:center;gap:6px;}
.opt-desc{font-size:11.5px;color:#9e9e9e;margin-top:2px;line-height:1.4;}
.opt-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.3px;}
.opt-check{width:20px;height:20px;border-radius:10px;border:2px solid #e0e0e0;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.opt-check .msi{display:none;font-size:14px;}
.opt-card.sel .opt-check{border-color:#2196F3;background:#2196F3;}
.opt-card.sel .opt-check .msi{display:inline-block;font-size:14px;color:#fff;}

.opt-row{display:flex;gap:8px;margin-bottom:20px;}
.opt-row .opt-card{flex:1;flex-direction:column;align-items:flex-start;padding:12px 10px;}
.opt-row .opt-name{font-size:13px;}
.opt-row .opt-desc{font-size:10.5px;}

.section-label{font-size:11px;font-weight:700;color:#9e9e9e;letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase;}

/* ── Fields ── */
.field{margin-bottom:22px;}
.field-label{font-size:11.5px;color:#9e9e9e;font-weight:500;margin-bottom:6px;display:block;letter-spacing:.2px;}
.field-inner{display:flex;align-items:center;border-bottom:1.5px solid #e0e0e0;padding-bottom:8px;transition:border-color .15s;gap:8px;}
.field-inner:focus-within{border-bottom-color:#2196F3;}
.field-inner input,.field-inner select{flex:1;border:none;outline:none;font-size:15px;color:#212121;font-family:'Roboto',sans-serif;background:transparent;width:100%;}

.field-inner select{appearance:none;-webkit-appearance:none;cursor:pointer;}
.field-inner .msi{color:#bdbdbd;font-size:18px;}
.field-row{display:flex;gap:14px;}
.field-row .field{flex:1;}

/* ── OTP ── */

.otp-cell{width:44px;height:54px;border:1.5px solid #e0e0e0;border-radius:8px;text-align:center;font-size:22px;font-family:'JetBrains Mono',monospace;font-weight:600;color:#212121;outline:none;transition:all .15s;background:#fff;}
.otp-cell:focus{border-color:#2196F3;box-shadow:0 0 0 3px rgba(33,150,243,.12);}
.otp-cell.filled{border-color:#2196F3;background:#fff;}
.otp-help{text-align:center;font-size:12px;color:#9e9e9e;margin-bottom:12px;}
.otp-resend{text-align:center;font-size:13px;color:#2196F3;cursor:pointer;background:none;border:none;padding:8px;font-family:'Roboto',sans-serif;font-weight:500;}
.otp-resend:disabled{color:#bdbdbd;cursor:not-allowed;}

/* ── Terms checkboxes ── */
.term-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;cursor:pointer;}
.term-cb{width:18px;height:18px;border-radius:4px;border:2px solid #e0e0e0;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:#fff;}
.term-cb .msi{display:none;}
.term-cb.on{background:#2196F3;border-color:#2196F3;}
.term-cb.on .msi{display:inline-block;font-size:13px;color:#fff;}
.term-text{flex:1;font-size:13px;color:#424242;line-height:1.5;}
.term-text .req{color:#e53935;font-weight:600;}
.term-text .opt{color:#9e9e9e;font-weight:500;}
.term-link{color:#2196F3;text-decoration:underline;cursor:pointer;}

/* ── Pwd strength ── */
.strength{display:flex;gap:3px;margin-top:6px;}
.s-bar{flex:1;height:3px;background:#f0f0f0;border-radius:2px;}
.s-bar.f1{background:#e53935;}
.s-bar.f2{background:#fb8c00;}
.s-bar.f3{background:#fdd835;}
.s-bar.f4{background:#43a047;}
.strength-txt{font-size:11px;margin-top:4px;color:#9e9e9e;}

/* ── PIN dots ── */
.pin-wrap{display:flex;gap:14px;justify-content:center;margin:18px 0;}
.pin-dot{width:14px;height:14px;border-radius:7px;border:2px solid #e0e0e0;background:#fff;transition:all .15s;}
.pin-dot.on{background:#2196F3;border-color:#2196F3;}

/* ── Success ── */

.suc-ico-big{width:96px;height:96px;border-radius:48px;background:#e8f5e9;display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
.suc-ico-big .msi{font-size:54px;color:#2e7d32;font-variation-settings:'wght' 500;}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.suc-title-big{font-size:24px;font-weight:700;color:#111;margin-bottom:8px;}
.suc-sub-big{font-size:14px;color:#757575;line-height:1.6;margin-bottom:28px;}
.acct-card{width:100%;background:#0d47a1;color:#fff;border-radius:14px;padding:20px;margin-bottom:24px;text-align:left;position:relative;overflow:hidden;}
.acct-card::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:80px;background:rgba(255,255,255,.05);}
.acct-card-label{font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.6);font-weight:600;}
.acct-card-num{font-size:24px;font-weight:700;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin:6px 0 18px;}
.acct-card-meta{display:flex;gap:24px;font-size:11px;}
.acct-card-meta div{display:flex;flex-direction:column;gap:2px;}
.acct-card-meta .l{color:rgba(255,255,255,.55);font-size:9px;letter-spacing:.5px;}
.acct-card-meta .v{font-weight:600;font-size:12px;}
.copy-btn{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.15);border:none;border-radius:6px;padding:6px 10px;font-size:11px;color:#fff;cursor:pointer;font-family:'Roboto',sans-serif;display:flex;align-items:center;gap:4px;}

/* ── Footer ── */
.foot{padding:14px 24px 28px;background:#fff;border-top:1px solid #f5f5f5;flex-shrink:0;}
.primary-btn{width:100%;height:50px;background:#2196F3;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Roboto',sans-serif;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.primary-btn:disabled{background:#bdbdbd;cursor:not-allowed;}
.primary-btn:not(:disabled):active{background:#1976d2;}
.secondary-btn{width:100%;height:46px;background:none;border:none;color:#757575;font-size:13px;font-family:'Roboto',sans-serif;cursor:pointer;margin-top:6px;}
.secondary-btn:active{color:#212121;}

/* ── Toast ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#212121;color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;white-space:nowrap;display:none;z-index:200;}

/* ── Country Sheet ── */
.csheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center;animation:fIn .15s ease;}
.csheet-bg.open{display:flex;}
.csheet{background:#fff;width:100%;max-width:390px;border-radius:14px 14px 0 0;max-height:80vh;display:flex;flex-direction:column;animation:shUp .22s cubic-bezier(.2,.8,.2,1);}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.csheet-grab{width:36px;height:4px;border-radius:2px;background:#e0e0e0;margin:8px auto 4px;flex-shrink:0;}
.csheet-hdr{display:flex;align-items:center;padding:10px 16px 4px;flex-shrink:0;}
.csheet-ttl{flex:1;font-size:16px;font-weight:700;color:#212121;}
.csheet-x{width:30px;height:30px;background:#f5f5f5;border-radius:15px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#757575;}
.csheet-search{display:flex;align-items:center;background:#f5f7fa;border-radius:10px;padding:0 12px;height:42px;margin:12px 16px;flex-shrink:0;}
.csheet-search .msi{color:#9e9e9e;font-size:18px;margin-right:8px;}
.csheet-search input{flex:1;border:none;outline:none;font-size:14px;color:#212121;font-family:'Roboto',sans-serif;background:transparent;}
.csheet-list{overflow-y:auto;flex:1;padding-bottom:24px;}
.cs-item{display:flex;align-items:center;padding:13px 18px;border-bottom:1px solid #f5f5f5;cursor:pointer;gap:12px;}
.cs-item:active{background:#f5f5f5;}
.cs-flag{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;width:30px;height:22px;border-radius:4px;background:#f5f5f5;color:#424242;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;}
.cs-name{flex:1;font-size:14px;color:#212121;font-weight:500;}
.cs-dial{font-size:12px;color:#9e9e9e;font-family:'JetBrains Mono',monospace;}
.cs-chk{font-size:18px;color:#2196F3;flex-shrink:0;display:none;}
.cs-item.sel .cs-chk{display:block;}
.cs-empty{padding:32px;text-align:center;color:#bdbdbd;font-size:13px;}
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
</style>

function footBtns(label, enabled, reasonFn){
  if (enabled) {
    return `<button class="primary-btn" onclick="nextStep()">${label}<span class="msi" style="font-size:18px">arrow_forward</span></button>`;
  }
  return `<button class="primary-btn" style="background:#bdbdbd" onclick="showMissing(${reasonFn||0})">${label}<span class="msi" style="font-size:18px">arrow_forward</span></button>`;
}
function showMissing(which){
  let msg = 'Please complete all required fields';
  if (which === 1) {
    const miss = [];
    if (!data.firstName.trim()) miss.push('first name');
    if (!data.lastName.trim()) miss.push('last name');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) miss.push('valid email');
    if (data.phone.trim().length < 7) miss.push('phone');
    if (!data.dob) miss.push('date of birth');
    if (!data.country) miss.push('country');
    if (miss.length) msg = 'Missing: ' + miss.join(', ');
  } else if (which === 3) {
    const miss = [];
    if (data.password.length < 8) miss.push('password (8+ chars)');
    if (data.pin.length !== 4) miss.push('4-digit PIN');
    if (!data.termsMain) miss.push('Terms of Service');
    if (!data.termsRisk) miss.push('Risk Disclosure');
    if (miss.length) msg = 'Missing: ' + miss.join(', ');
  } else if (which === 2) {
    msg = 'Please enter the 6-digit verification code';
  }
  showToast(msg);
}

// ── Validation ──
function validPersonal(){
  return data.firstName.trim() && data.lastName.trim()
    && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)
    && data.phone.trim().length >= 7
    && data.dob && data.country;
}
function validSecurity(){
  return data.password.length >= 8 && data.pin.length === 4
    && data.termsMain && data.termsRisk;
}
function pwStrength(pw){
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/\d/.test(pw) && /[^A-Za-z0-9]/.test(pw)) score++;
  if (!pw) return { score:0, label:'Use 8+ characters with a mix of cases, numbers, and symbols' };
  return { score, label: ['Too short','Weak','Fair','Good','Strong'][score] || 'Strong' };
}
function updateStrength(){
  const r = pwStrength(data.password);
  const bars = document.getElementById('strBars');
  if (bars) bars.innerHTML = [1,2,3,4].map(n => `<div class="s-bar ${n <= r.score ? 'f'+r.score : ''}"></div>`).join('');
  const txt = document.getElementById('strTxt');
  if (txt) txt.textContent = r.label;
  const foot = document.getElementById('foot');
  if (foot) foot.innerHTML = footBtns('Create Account', validSecurity(), 3);
}

// ── Setters ──
function setData(k,v){ data[k]=v; if(k==='server' && (v==='stocks'||v==='demo')){ data.leverage='1:1'; data.currency='USDT'; } renderStep(); }
function setField(k,v){
  data[k]=v;
  const foot = document.getElementById('foot');
  if (cur === 1) foot.innerHTML = footBtns('Continue', validPersonal(), 1);
  if (cur === 3) foot.innerHTML = footBtns('Create Account', validSecurity(), 3);
}
function toggleTerm(k){ data[k] = !data[k]; renderStep(); }

// ── PIN handling ──
function pinInput(i, v){
  v = v.replace(/[^0-9]/g,'').slice(0,1);
  data.pin = (data.pin.slice(0,i) + v + data.pin.slice(i+1)).slice(0,4);
  const cells = document.querySelectorAll('.pin-cell');
  cells[i].value = v;
  if (v && i < 3) cells[i+1].focus();
  cells.forEach((c,j) => c.classList.toggle('filled', !!data.pin[j]));
  const foot = document.getElementById('foot');
  if (foot) foot.innerHTML = footBtns('Create Account', validSecurity(), 3);
}
function pinKey(e, i){
  if (e.key === 'Backspace' && !e.target.value && i > 0) {
    document.querySelectorAll('.pin-cell')[i-1].focus();
  }
}

// ── OTP handling ──
function otpInput(i, v){
  v = v.replace(/[^0-9]/g,'').slice(0,1);
  data.otp = (data.otp.slice(0,i) + v + data.otp.slice(i+1)).slice(0,6);
  const cells = document.querySelectorAll('.otp-cell');
  cells[i].value = v;
  if (v && i < 5) cells[i+1].focus();
  cells.forEach((c,j) => c.classList.toggle('filled', !!data.otp[j]));
  const foot = document.getElementById('foot');
  foot.innerHTML = footBtns('Verify', data.otp.length === 6, 2);
}
function otpKey(e, i){
  if (e.key === 'Backspace' && !e.target.value && i > 0) {
    document.querySelectorAll('.otp-cell')[i-1].focus();
  }
}
function resendOTP(){
  data.otpSent = generateOTP();
  data.otp = '';
  document.querySelectorAll('.otp-cell').forEach(c => { c.value = ''; c.classList.remove('filled'); });
  const errEl = document.getElementById('otpError');
  if (errEl) errEl.style.display = 'none';
  showToast('New code sent: ' + data.otpSent);
  console.log('[ALPEXA OTP] New code:', data.otpSent);
  startResendTimer();
  startOTPTimer();
}
function generateOTP(){
  let c = '';
  for (let i = 0; i < 6; i++) c += Math.floor(Math.random() * 10);
  return c;
}
let resendTimer = null;
function startResendTimer(){
  let sec = 30;
  const btn = document.getElementById('resendBtn');
  if (!btn) return;
  btn.disabled = true;
  clearInterval(resendTimer);
  resendTimer = setInterval(() => {
    sec--;
    if (btn) btn.textContent = `Resend code (${sec}s)`;
    if (sec <= 0) {
      clearInterval(resendTimer);
      if (btn) { btn.disabled = false; btn.textContent = 'Resend code'; }
    }
  }, 1000);
}
let otpTimerInt = null;
function startOTPTimer(){
  let sec = 179;
  clearInterval(otpTimerInt);
  otpTimerInt = setInterval(() => {
    sec--;
    const m = Math.floor(sec/60), s = sec%60;
    const el = document.getElementById('otpTimer');
    if (el) el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (sec <= 0) clearInterval(otpTimerInt);
  }, 1000);
}

// ── Pw toggle ──
function togglePw(){
  const inp = document.getElementById('pwInput');
  const ico = document.getElementById('eyeIcon');
  if (inp.type === 'password') { inp.type = 'text'; ico.textContent = 'visibility_off'; }
  else { inp.type = 'password'; ico.textContent = 'visibility'; }
}

// ── Nav ──
async function createOnServer(){
  var cust='P-'+Math.floor(1000+Math.random()*9000);
  function aN(p){return p+'-'+Math.floor(100000+Math.random()*900000);}
  data.custId=cust; data.accts={sports:aN('SP'),crypto:aN('CR'),fx:aN('FX')}; data.acctNum=data.accts.sports;
  if(!window._db) throw new Error('No server connection');
  var r1=await window._db.from('players').insert({cust_id:cust,name:(data.firstName+' '+data.lastName).trim(),email:data.email}).select().single();
  if(r1.error) throw r1.error;
  var rows=[{player_id:r1.data.id,server:'sports',acct_no:data.accts.sports,balance:0},{player_id:r1.data.id,server:'crypto',acct_no:data.accts.crypto,balance:0},{player_id:r1.data.id,server:'fx',acct_no:data.accts.fx,balance:0}];
  var r2=await window._db.from('accounts').insert(rows);
  if(r2.error) throw r2.error;
  // Remember who this is on the device so the apps can tag their transactions.
  try{ localStorage.setItem('alpexa.me', JSON.stringify({
    custId:cust, name:(data.firstName+' '+data.lastName).trim(), email:data.email,
    accts:data.accts })); }catch(e){}
}
function nextStep(){
  if (cur === 0) { cur = 1; renderStep(); }
  else if (cur === 1) {
    if (!validPersonal()) return;
    cur = 2;
    data.otpSent = generateOTP();
    renderStep();
    showToast('Code sent to ' + data.email + ': ' + data.otpSent);
    console.log('[ALPEXA OTP] Verification code:', data.otpSent);
    startOTPTimer();
    startResendTimer();
  }
  else if (cur === 2) {
    if (data.otp.length !== 6) return;
    if (data.otp !== data.otpSent) {
      const errEl = document.getElementById('otpError');
      if (errEl) {
        errEl.textContent = 'Incorrect code. Please check your email and try again.';
        errEl.style.display = 'block';
      }
      // Shake the cells
      document.querySelectorAll('.otp-cell').forEach(c => {
        c.style.borderColor = '#e53935';
        c.style.animation = 'shake 0.3s';
        setTimeout(() => { c.style.animation = ''; c.style.borderColor = ''; }, 400);
      });
      return;
    }
    cur = 3; renderStep();
  }
  else if (cur === 3) {
    if (!validSecurity()) return;
    // Simulate API call
    const foot = document.getElementById('foot');
    foot.innerHTML = `<button class="primary-btn" disabled><div style="width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite"></div> Creating account…</button>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
    createOnServer().then(function(){ cur = 4; renderStep(); })
      .catch(function(err){ var m=(err&&err.message)||String(err); alert('Could not create the account on the server:\n\n'+m+'\n\nFix: in Supabase run the table SQL (players, accounts).'); cur=3; renderStep(); });
  }
}
function goBack(){
  if (cur === 0 || cur === 4) { window.location.href = 'login.html'; return; }
  cur = Math.max(0, cur - 1); renderStep();
}
function goToApp(){
  var dest = data.server==='demo' ? 'sports-live.html' : data.server==='stocks' ? 'crypto-live.html' : 'trading.html';
  window.location.href = dest;
}
function copyAcct(){
  if (data.acctNum) { navigator.clipboard?.writeText(data.acctNum); showToast('Account number copied'); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(() => { t.style.display = 'none'; }, 2200);

function renderCountries(list){

function selectCountry(name, dial){

  if (!data.phone.trim() && dial) {
    data.phone = dial + ' ';
  }
  closeCountrySheet({target:{id:'csheetBg'}});
  renderStep();
}

renderStep();
</script>
